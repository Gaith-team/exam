<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAITH TEAM</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;font-family:'Cairo',sans-serif}

body{
    margin:0;
    background:#000814;
    color:#fff;
    overflow-x:hidden;
    transition:.6s;
}

body.light{
    background:#f1f5f9;
    color:#111827;
}

/* CANVAS */
#galaxy{
    position:fixed;
    inset:0;
    z-index:-1;
}

/* INTRO */
#intro{
    position:fixed;
    inset:0;
    background:radial-gradient(circle at center,#0f172a,#000);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
    animation:zoomOut 3s forwards 3s;
}

.intro-title{
    font-size:60px;
    font-weight:900;
    color:#38bdf8;
    text-shadow:0 0 20px #38bdf8,0 0 60px #0ea5e9;
    animation:pulse 2s infinite alternate;
}

@keyframes pulse{
    from{transform:scale(1);}
    to{transform:scale(1.1);}
}

@keyframes zoomOut{
    to{opacity:0;visibility:hidden;transform:scale(1.2);}
}

/* HEADER */
.header{text-align:center;padding:100px 20px 40px;}
.logo{
    font-size:42px;
    font-weight:900;
    background:linear-gradient(135deg,#38bdf8,#6366f1);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* SECTION TITLE */
.section-title{
    text-align:center;
    font-size:22px;
    font-weight:900;
    margin:40px 0 18px;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
}

.section-title::before,
.section-title::after{
    content:"";
    flex:1;
    height:2px;
    max-width:80px;
    border-radius:2px;
}

body:not(.light) .section-title::before,
body:not(.light) .section-title::after{
    background:linear-gradient(90deg,transparent,#38bdf8);
}

body.light .section-title::before,
body.light .section-title::after{
    background:linear-gradient(90deg,transparent,#0ea5e9);
}

/* GRID */
.container{
    width:95%;
    max-width:520px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.subject a{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    border-radius:20px;
    font-weight:800;
    text-decoration:none;
    transition:.3s;
    box-shadow:0 8px 20px rgba(0,0,0,.4);
    text-align:center;
}
.subject a:hover{transform:translateY(-6px);}

.pediatric a{background:linear-gradient(135deg,#a7f3d0,#34d399);color:#064e3b;}
.obstetric a{background:linear-gradient(135deg,#fbcfe8,#f472b6);color:#1f2937;}
.medical a{background:linear-gradient(135deg,#0ea5e9,#075985);color:#fff;}
.management a{background:linear-gradient(135deg,#ff003c,#9f1239);color:#fff;}
.psychiatric a{background:linear-gradient(135deg,#4fa3a5,#2f6f73);color:#fff;}

/* LEVEL 1 STYLES */
.palliative a{background:linear-gradient(135deg,#fde68a,#f59e0b);color:#1c1917;}
.health-edu a{background:linear-gradient(135deg,#bbf7d0,#22c55e);color:#052e16;}
.quality a{background:linear-gradient(135deg,#c4b5fd,#7c3aed);color:#fff;}
.comprehensive a{background:linear-gradient(135deg,#fed7aa,#f97316);color:#1c1917;}

/* DIVIDER BOX */
.level-box{
    width:95%;
    max-width:520px;
    margin:0 auto 0;
    border-radius:20px;
    padding:6px 20px 20px;
    border:2px solid rgba(99,102,241,0.25);
    background:rgba(99,102,241,0.05);
    backdrop-filter:blur(4px);
}

body.light .level-box{
    border-color:rgba(99,102,241,0.3);
    background:rgba(99,102,241,0.07);
}

.level-badge{
    display:inline-block;
    margin-bottom:14px;
    padding:5px 18px;
    border-radius:50px;
    font-size:14px;
    font-weight:900;
    background:linear-gradient(135deg,#6366f1,#38bdf8);
    color:#fff;
    letter-spacing:1px;
    box-shadow:0 4px 14px rgba(99,102,241,0.4);
}

.level-box .container{
    width:100%;
    max-width:100%;
}

.fade-out{animation:fadeOut 1s forwards;}
@keyframes fadeOut{to{opacity:0;transform:scale(1.1);}}

/* JOIN SECTION */
.join-section{
    text-align:center;
    margin:60px 0 100px;
}

.join-btn{
    display:inline-block;
    padding:18px 50px;
    font-size:22px;
    font-weight:900;
    text-decoration:none;
    border-radius:50px;
    background:linear-gradient(135deg,#229ED9,#0ea5e9);
    color:#fff;
    box-shadow:0 10px 30px rgba(0,0,0,.5);
    transition:.4s;
    position:relative;
    overflow:hidden;
}

.join-btn:hover{
    transform:translateY(-8px) scale(1.05);
    box-shadow:0 15px 40px rgba(0,0,0,.7);
}

.join-btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,.5),transparent);
    transition:.6s;
}

.join-btn:hover::before{
    left:100%;
}

/* Toggle */
.toggle{
    position:fixed;
    top:15px;
    left:15px;
    width:50px;height:50px;
    border-radius:50%;
    border:none;
    cursor:pointer;
    font-size:22px;
    background:#0ea5e9;color:#fff;
    transition:.4s;
}
.toggle:hover{transform:rotate(180deg) scale(1.1);}
</style>
</head>

<body>

<canvas id="galaxy"></canvas>

<div id="intro">
    <div class="intro-title">GAITH TEAM</div>
</div>

<button class="toggle" id="modeToggle">🌙</button>

<div class="header">
    <div class="logo">GAITH TEAM</div>
</div>

<!-- المواد الرئيسية -->
<div class="section-title">📚 المواد الدراسية</div>
<div class="container">
    <div class="subject pediatric"><a href="pediatric/index.html">🍼 تمريض أطفال</a></div>
    <div class="subject obstetric"><a href="obstetric/index.html">🤰 تمريض نسا</a></div>
    <div class="subject medical"><a href="practicalmedical/index.html">🩺 باطني جراحي 1 عملي</a></div>
    <div class="subject medical"><a href="medical1/index.html">🩺 باطني جراحي 1 نظري</a></div>
    <div class="subject management"><a href="management/index.html">📊 تمريض إدارة</a></div>
    <div class="subject psychiatric"><a href="psychiatric/index.html">🧠 تمريض نفسية</a></div>
</div>

<!-- مواد فرعية مستوى أول -->
<div class="section-title" style="margin-top:50px;">🎓 مواد فرعية — مستوى أول</div>
<div class="level-box">
    <div style="text-align:center;"><span class="level-badge">✦ Level 1 ✦</span></div>
    <div class="container">
        <div class="subject palliative"><a href="level1/palliative/index.html">🕊️ رعاية تلطيفية</a></div>
        <div class="subject health-edu"><a href="level1/health-education/index.html">📢 تثقيف صحي</a></div>
        <div class="subject quality"><a href="level1/quality-basics/index.html">⭐ أساسيات جودة</a></div>
        <div class="subject comprehensive"><a href="level1/comprehensive-care/index.html">🏥 رعاية تمريضية شاملة</a></div>
    </div>
</div>

<!-- زر الانضمام -->
<div class="join-section">
    <a href="https://t.me/nursing2bu" target="_blank" class="join-btn">
        🚀 انضم إلينا على تليجرام
    </a>
</div>

<audio id="spaceSound" src="https://assets.mixkit.co/sfx/preview/mixkit-space-ambience-142.mp3"></audio>

<script>
window.addEventListener("load",()=>{
    const sound=document.getElementById("spaceSound");
    sound.volume=0.2;
    sound.play().catch(()=>{});
});

/* MODE */
const toggle=document.getElementById("modeToggle");
let currentMode=localStorage.getItem("mode")||"dark";
function applyMode(mode){
    currentMode=mode;
    if(mode==="light"){
        document.body.classList.add("light");
        toggle.textContent="☀️";
    }else{
        document.body.classList.remove("light");
        toggle.textContent="🌙";
    }
    localStorage.setItem("mode",mode);
}
applyMode(currentMode);
toggle.onclick=()=>applyMode(currentMode==="light"?"dark":"light");

/* GALAXY */
const canvas=document.getElementById("galaxy");
const ctx=canvas.getContext("2d");

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let stars=[];
for(let i=0;i<800;i++){
    stars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*2,
        speed:Math.random()*0.5
    });
}

function animate(){
    ctx.fillStyle=currentMode==="dark"?"#000814":"#f1f5f9";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    stars.forEach(s=>{
        s.y+=s.speed;
        if(s.y>canvas.height){s.y=0;}
        ctx.beginPath();
        ctx.fillStyle=currentMode==="dark"?"white":"#0f172a";
        ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
        ctx.fill();
    });

    requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
