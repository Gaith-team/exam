<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHAITH TEAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --c:#e67e22;--c-deep:#b8590a;--c-lite:#f39c12;--c-glow:rgba(230,126,34,0.2);--c-soft:rgba(230,126,34,0.09);
  --green:#27ae60;--red:#e74c3c;--bg:#f9f5f0;--bg2:#f1e8dc;--card:#ffffff;--text:#1a1208;--text2:#5a4a30;
  --text3:#9a8060;--border:rgba(230,126,34,0.15);--radius:18px;--tr:all 0.28s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"]{--bg:#12100c;--bg2:#1c1710;--card:#231e16;--text:#f0e6d6;--text2:#c0a880;--text3:#806848;--border:rgba(230,126,34,0.18);}
html{scroll-behavior:smooth;}
body{font-family:'Cairo','Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .4s,color .4s;overflow-x:hidden;}

nav{position:fixed;top:0;left:0;right:0;z-index:100;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:rgba(249,245,240,0.93);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);transition:var(--tr);}
[data-theme="dark"] nav{background:rgba(18,16,12,0.95);}
.nav-back{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text2);font-size:13px;font-weight:700;padding:7px 13px;border-radius:9px;border:1px solid var(--border);background:var(--card);transition:var(--tr);}
.nav-back:hover{color:var(--c);border-color:var(--c);}
.nav-center{display:flex;align-items:center;gap:9px;}
.nav-pill{display:flex;align-items:center;gap:7px;padding:6px 14px;border-radius:50px;background:linear-gradient(135deg,var(--c),var(--c-lite));color:#fff;font-size:13px;font-weight:800;}
.theme-toggle{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:var(--tr);}
.theme-toggle:hover{border-color:var(--c);transform:rotate(20deg);}

.screen{display:none;}
.screen.active{display:flex;}

/* START */
#startScreen{min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px 40px;text-align:center;}
.start-icon{width:90px;height:90px;border-radius:24px;background:linear-gradient(135deg,var(--c),var(--c-lite));display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 28px;box-shadow:0 12px 40px var(--c-glow);animation:floatIcon 3s ease-in-out infinite;}
@keyframes floatIcon{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.start-title{font-size:clamp(28px,5vw,44px);font-weight:900;color:var(--text);line-height:1.15;margin-bottom:12px;}
.start-title span{color:var(--c);}
.start-sub{font-size:15px;color:var(--text2);line-height:1.7;max-width:400px;margin:0 auto 36px;}
.start-meta{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:44px;}
.meta-pill{display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:12px;background:var(--card);border:1px solid var(--border);font-size:14px;font-weight:700;color:var(--text2);}
.meta-pill strong{color:var(--c);font-size:18px;}
.btn-start{display:inline-flex;align-items:center;gap:10px;padding:16px 44px;border-radius:14px;background:linear-gradient(135deg,var(--c),var(--c-lite));color:#fff;font-size:17px;font-weight:900;border:none;cursor:pointer;box-shadow:0 8px 28px var(--c-glow);transition:var(--tr);font-family:'Cairo',sans-serif;}
.btn-start:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 14px 40px var(--c-glow);}

/* CATEGORY FILTER */
.category-filter{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:28px;}
.cat-btn{padding:8px 18px;border-radius:50px;border:1.5px solid var(--border);background:var(--card);color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;transition:var(--tr);}
.cat-btn:hover,.cat-btn.active{border-color:var(--c);color:var(--c);background:rgba(230,126,34,0.08);}

/* QUIZ */
#quizScreen{min-height:100vh;flex-direction:column;padding:80px 0 40px;}
.quiz-wrap{flex:1;max-width:680px;width:100%;margin:0 auto;padding:32px 24px;display:flex;flex-direction:column;gap:24px;}
.quiz-progress-row{display:flex;align-items:center;justify-content:space-between;gap:14px;}
.progress-track{flex:1;height:6px;border-radius:6px;background:var(--bg2);overflow:hidden;}
.progress-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--c),var(--c-lite));transition:width .5s cubic-bezier(0.4,0,0.2,1);}
.progress-label{font-size:13px;font-weight:800;color:var(--c);white-space:nowrap;}
.q-card{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:32px 28px;box-shadow:0 4px 24px rgba(230,126,34,0.08);animation:slideIn .35s ease;}
@keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
.q-num{font-size:11px;font-weight:800;letter-spacing:2px;color:var(--c);text-transform:uppercase;margin-bottom:14px;}
.q-cat-badge{display:inline-block;padding:3px 10px;border-radius:50px;background:var(--c-soft);color:var(--c);font-size:10px;font-weight:800;margin-bottom:10px;}
.q-text{font-size:clamp(16px,2.5vw,20px);font-weight:700;color:var(--text);line-height:1.6;}
.options-list{display:flex;flex-direction:column;gap:12px;margin-top:28px;}
.opt-btn{display:flex;align-items:center;gap:14px;padding:15px 18px;border-radius:13px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;text-align:left;transition:var(--tr);font-family:'Cairo',sans-serif;font-size:15px;font-weight:600;color:var(--text);width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--c);background:var(--c-soft);transform:translateX(3px);}
.opt-letter{width:34px;height:34px;flex-shrink:0;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:var(--text3);transition:var(--tr);background:var(--card);}
.opt-btn:hover:not(:disabled) .opt-letter{border-color:var(--c);color:var(--c);background:rgba(230,126,34,0.1);}
.opt-btn.correct{border-color:var(--green)!important;background:rgba(39,174,96,0.08)!important;color:var(--green);}
.opt-btn.correct .opt-letter{background:var(--green);border-color:var(--green);color:#fff;}
.opt-btn.wrong{border-color:var(--red)!important;background:rgba(231,76,60,0.08)!important;color:var(--red);}
.opt-btn.wrong .opt-letter{background:var(--red);border-color:var(--red);color:#fff;}
.opt-btn:disabled{cursor:not-allowed;}
.feedback-box{display:none;align-items:center;gap:12px;padding:14px 18px;border-radius:12px;font-size:14px;font-weight:700;margin-top:16px;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.feedback-box.show{display:flex;}
.feedback-box.correct-fb{background:rgba(39,174,96,0.1);border:1px solid rgba(39,174,96,0.25);color:var(--green);}
.feedback-box.wrong-fb{background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.25);color:var(--red);}
.feedback-icon{font-size:20px;}
.quiz-nav{display:flex;gap:12px;justify-content:space-between;align-items:center;}
.btn-nav{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;border-radius:12px;font-size:14px;font-weight:800;border:none;cursor:pointer;font-family:'Cairo',sans-serif;transition:var(--tr);}
.btn-skip{background:var(--bg2);color:var(--text2);border:1px solid var(--border);}
.btn-skip:hover{background:var(--border);}
.btn-next{background:linear-gradient(135deg,var(--c),var(--c-lite));color:#fff;box-shadow:0 4px 16px var(--c-glow);}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 8px 24px var(--c-glow);}
.btn-next:disabled{opacity:.45;pointer-events:none;}

/* RESULT */
#resultScreen{min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px 40px;text-align:center;}
.result-circle{width:140px;height:140px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 28px;position:relative;}
.result-circle svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg);}
.result-circle svg circle{fill:none;stroke-width:8;stroke-linecap:round;}
.circle-bg{stroke:var(--bg2);}
.circle-fill{stroke:var(--c);transition:stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1);}
.result-pct{font-size:36px;font-weight:900;color:var(--text);position:relative;z-index:1;}
.result-pct small{font-size:14px;color:var(--text3);display:block;}
.result-emoji{font-size:56px;margin-bottom:16px;animation:bounce .6s ease;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.result-title{font-size:26px;font-weight:900;color:var(--text);margin-bottom:8px;}
.result-sub{font-size:15px;color:var(--text2);margin-bottom:36px;}
.result-stats{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:40px;}
.rstat{padding:14px 22px;border-radius:14px;background:var(--card);border:1px solid var(--border);min-width:110px;}
.rstat .rv{font-size:26px;font-weight:900;}
.rstat .rl{font-size:12px;color:var(--text3);margin-top:2px;}
.rstat.correct-s .rv{color:var(--green);}
.rstat.wrong-s .rv{color:var(--red);}
.rstat.skip-s .rv{color:var(--text3);}
.result-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.btn-retry{display:inline-flex;align-items:center;gap:9px;padding:14px 32px;border-radius:12px;background:linear-gradient(135deg,var(--c),var(--c-lite));color:#fff;font-size:15px;font-weight:900;border:none;cursor:pointer;font-family:'Cairo',sans-serif;box-shadow:0 6px 22px var(--c-glow);transition:var(--tr);}
.btn-retry:hover{transform:translateY(-3px);}
.btn-review{display:inline-flex;align-items:center;gap:9px;padding:14px 28px;border-radius:12px;background:var(--card);color:var(--text);font-size:15px;font-weight:700;border:1.5px solid var(--border);cursor:pointer;font-family:'Cairo',sans-serif;transition:var(--tr);}
.btn-review:hover{border-color:var(--c);color:var(--c);}

/* REVIEW */
#reviewScreen{min-height:100vh;flex-direction:column;padding:80px 0 60px;}
.review-wrap{max-width:680px;width:100%;margin:0 auto;padding:32px 24px;display:flex;flex-direction:column;gap:18px;}
.review-header{text-align:center;margin-bottom:10px;}
.review-header h2{font-size:22px;font-weight:900;color:var(--text);}
.review-header p{font-size:13px;color:var(--text3);margin-top:4px;}
.review-card{background:var(--card);border-radius:16px;border:1.5px solid var(--border);overflow:hidden;}
.review-card-top{padding:20px 22px;border-bottom:1px solid var(--border);}
.review-q-label{font-size:10px;font-weight:800;letter-spacing:2px;color:var(--text3);margin-bottom:8px;}
.review-q-text{font-size:15px;font-weight:700;color:var(--text);line-height:1.55;}
.review-opts{padding:14px 22px;display:flex;flex-direction:column;gap:8px;}
.review-opt{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;color:var(--text2);background:var(--bg);}
.review-opt.is-correct{background:rgba(39,174,96,0.1);color:var(--green);font-weight:800;}
.review-opt.is-wrong{background:rgba(231,76,60,0.1);color:var(--red);}
.review-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--border);}
.review-opt.is-correct .review-dot{background:var(--green);}
.review-opt.is-wrong .review-dot{background:var(--red);}
.review-status{display:flex;align-items:center;gap:5px;padding:3px 10px;border-radius:50px;font-size:10px;font-weight:800;margin-top:10px;width:fit-content;}
.status-correct{background:rgba(39,174,96,0.12);color:var(--green);}
.status-wrong{background:rgba(231,76,60,0.12);color:var(--red);}
.status-skip{background:var(--bg2);color:var(--text3);}
.btn-back-result{display:inline-flex;align-items:center;gap:9px;padding:13px 28px;border-radius:12px;background:var(--card);color:var(--text);font-size:14px;font-weight:700;border:1.5px solid var(--border);cursor:pointer;font-family:'Cairo',sans-serif;transition:var(--tr);margin-top:8px;align-self:center;}
.btn-back-result:hover{border-color:var(--c);color:var(--c);}

@media(max-width:540px){nav{padding:0 16px;}.quiz-wrap,.review-wrap{padding:24px 16px;}.q-card{padding:22px 18px;}.opt-btn{padding:12px 14px;font-size:14px;}.result-stats{gap:10px;}.rstat{min-width:90px;padding:12px 16px;}}
</style>
</head>
<body>
<nav>
  <a href="#" class="nav-back" onclick="show('startScreen');return false;">← Back</a>
  <div class="nav-center"><div class="nav-pill">📝 GHAITH TEAM</div></div>
  <button class="theme-toggle" id="themeBtn">🌙</button>
</nav>

<!-- START -->
<div class="screen active" id="startScreen">
  <div class="start-icon">📝</div>
  <h1 class="start-title">أسئلة <span>مراجعة شاملة</span></h1>
  <p class="start-sub">أسئلة شاملة على محاضرات أوسكي</p>
  <div class="category-filter" id="categoryFilter"></div>
  <div class="start-meta">
    <div class="meta-pill"><strong id="totalQDisplay">0</strong> Questions</div>
    <div class="meta-pill">⏱ No time limit</div>
    <div class="meta-pill">🎯 Multiple choice</div>
  </div>
  <button class="btn-start" onclick="startQuiz()">🚀 Start Quiz</button>
</div>

<!-- QUIZ -->
<div class="screen" id="quizScreen">
  <div class="quiz-wrap">
    <div class="quiz-progress-row">
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-label" id="progressLabel">1 / 1</div>
    </div>
    <div class="q-card" id="qCard">
      <div class="q-num" id="qNum">QUESTION 1</div>
      <div class="q-cat-badge" id="qCatBadge"></div>
      <div class="q-text" id="qText"></div>
      <div class="options-list" id="optsList"></div>
      <div class="feedback-box" id="feedbackBox">
        <span class="feedback-icon" id="feedbackIcon"></span>
        <span id="feedbackText"></span>
      </div>
    </div>
    <div class="quiz-nav">
      <button class="btn-nav btn-skip" onclick="skipQuestion()">→ Skip</button>
      <button class="btn-nav btn-next" id="btnNext" onclick="nextQuestion()" disabled>Next →</button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="resultScreen">
  <div class="result-emoji" id="resultEmoji">🎉</div>
  <div class="result-circle" id="resultCircle">
    <svg viewBox="0 0 140 140"><circle class="circle-bg" cx="70" cy="70" r="62"/><circle class="circle-fill" cx="70" cy="70" r="62" id="circleArc" stroke-dasharray="389.6" stroke-dashoffset="389.6"/></svg>
    <div class="result-pct"><span id="pctNum">0</span>%<small>Score</small></div>
  </div>
  <h2 class="result-title" id="resultTitle">Well done!</h2>
  <p class="result-sub" id="resultSub">You have completed the quiz</p>
  <div class="result-stats">
    <div class="rstat correct-s"><div class="rv" id="rCorrect">0</div><div class="rl">✅ Correct</div></div>
    <div class="rstat wrong-s"><div class="rv" id="rWrong">0</div><div class="rl">❌ Wrong</div></div>
    <div class="rstat skip-s"><div class="rv" id="rSkip">0</div><div class="rl">⏭ Skipped</div></div>
  </div>
  <div class="result-actions">
    <button class="btn-retry" onclick="retryQuiz()">🔄 Try Again</button>
    <button class="btn-review" onclick="showReview()">📋 Review Answers</button>
  </div>
</div>

<!-- REVIEW -->
<div class="screen" id="reviewScreen">
  <div class="review-wrap">
    <div class="review-header"><h2>📋 Answer Review</h2><p>Correct answers in green — your wrong answers in red</p></div>
    <div id="reviewList"></div>
    <button class="btn-back-result" onclick="showResult()">← Back to Results</button>
  </div>
</div>

<script>
const ALL_SECTIONS = [
  {
    name: "CPR & Defibrillation",
    icon: "❤️",
    qs: [
      {t:"What is the primary reason cardiac arrest causes death or permanent brain damage within minutes?",o:["Lack of oxygen-rich blood delivery to vital organs","Excessive blood pressure causing vessel rupture","Respiratory alkalosis altering brain chemistry","Hypovolemia from internal hemorrhage"],a:0},
      {t:"A nurse finds an unresponsive patient. According to CPR protocol, what is the FIRST action?",o:["Begin chest compressions immediately","Open the airway with head-tilt chin-lift","Tap the shoulder and shout 'Are you ok?'","Call for a defibrillator right away"],a:2},
      {t:"The C-A-B sequence in CPR stands for:",o:["Chest compressions, Airway, Breathing","Circulation, Assessment, Bagging","Compressions, Auscultation, Breathing","Cardiac check, Airway, Bag-mask"],a:0},
      {t:"Why is the carotid artery used to check pulse during CPR rather than peripheral arteries?",o:["It is closer to the heart and more easily found","It has the highest blood pressure in the body","It is unaffected by states of cardiac arrest","It reflects brain perfusion more accurately than any other site"],a:0},
      {t:"During CPR, chest compressions should be performed to a depth of at least:",o:["1 inch (2.5 cm)","2 inches (5 cm)","3 inches (7.5 cm)","1.5 inches (3.8 cm)"],a:1},
      {t:"The recommended compression rate during adult CPR is:",o:["60–80 compressions per minute","80–100 compressions per minute","100–120 compressions per minute","120–140 compressions per minute"],a:2},
      {t:"The correct compression-to-ventilation ratio for a non-intubated adult during CPR is:",o:["15:2","30:2","5:1","20:2"],a:1},
      {t:"The patient is placed supine on a firm surface during CPR primarily to:",o:["Prevent aspiration of stomach contents","Maximize effectiveness of chest compressions","Allow easier airway opening","Reduce risk of rib fracture"],a:1},
      {t:"Why must the chest be allowed to fully recoil after each chest compression?",o:["To prevent rib fractures","To allow the heart to adequately refill with blood","To reduce risk of skin burns","To maintain the airway in an open position"],a:1},
      {t:"Which of the following is a contraindication to beginning chest compressions?",o:["Absence of carotid pulse","Strong and easily palpable pulse","Gray skin discoloration","Loss of consciousness without breathing"],a:1},
      {t:"The head-tilt chin-lift maneuver is contraindicated when:",o:["The patient is obese or morbidly overweight","There is evidence of a neck injury","The patient is unconscious but breathing","The airway appears visually clear"],a:1},
      {t:"The jaw thrust maneuver achieves airway opening by:",o:["Tilting the head firmly backward","Lifting the mandible upward to relieve upper airway obstruction","Inserting an oral airway adjunct","Compressing the cricoid cartilage against the esophagus"],a:1},
      {t:"During rescue breathing, the first rescue breath should last:",o:["0.5 seconds","1 second","2 seconds","3 seconds"],a:1},
      {t:"If the chest does NOT rise during the first rescue breath, the nurse should:",o:["Continue with compressions immediately","Repeat the head-tilt chin-lift and give a second breath","Begin endotracheal suctioning","Increase airway pressure on the next breath"],a:1},
      {t:"A biphasic defibrillator differs from a monophasic defibrillator in that it:",o:["Uses lower frequency alternating current","Sends current in two directions, requiring less total energy","Requires higher joule settings to function","Cannot be used for ventricular fibrillation"],a:1},
      {t:"A monophasic defibrillator charge is typically started at:",o:["100 joules","150 joules","200 joules","360 joules"],a:2},
      {t:"An AED is best described as a device that:",o:["Requires expert medical training to operate safely","Analyzes heart rhythm and determines if a shock is needed, guiding the user","Only works on pulseless ventricular tachycardia","Replaces the need for CPR entirely"],a:1},
      {t:"Which of the following cardiac rhythms is SHOCKABLE with a defibrillator?",o:["Asystole (flat line)","Pulseless electrical activity (PEA)","Ventricular fibrillation (VF)","Normal sinus rhythm"],a:2},
      {t:"After delivering one defibrillation shock, what should be done immediately?",o:["Check the pulse right away before proceeding","Resume CPR starting with chest compressions for 2 minutes","Increase the joule setting and deliver a second shock","Administer amiodarone before resuming CPR"],a:1},
      {t:"Why must the oxygen source be turned OFF during actual defibrillation?",o:["To prevent electrical interference with the ECG tracing","To maintain patient safety and prevent fire hazard","Because oxygen increases transthoracic resistance","To allow more accurate cardiac rhythm interpretation"],a:1},
      {t:"Defibrillator paddles should be pressed against the chest with approximately:",o:["5 kg of pressure","11 kg of pressure","15 kg of pressure","20 kg of pressure"],a:1},
      {t:"During paddle placement, one paddle is placed at the heart's apex, which is located:",o:["Just right of the sternum at the second intercostal space","Just left of the nipple in the midaxillary line","Just below the right clavicle","Over the manubrium"],a:1},
      {t:"The most common complication of defibrillation is:",o:["Liver laceration from pressure","Skin burns from defibrillator paddles","Rib fractures","Permanent brain damage"],a:1},
      {t:"Epinephrine is given during cardiac arrest resuscitation because it:",o:["Suppresses arrhythmias by blocking sodium channels","Causes vasodilation to improve cardiac chamber filling","Causes vasoconstriction and increases myocardial and cerebral blood flow","Reduces transthoracic resistance for better shock delivery"],a:2},
      {t:"Amiodarone works during cardiac arrest by:",o:["Causing vasoconstriction like epinephrine","Affecting sodium, calcium, and potassium channels","Increasing heart rate to improve cardiac output","Selectively blocking beta receptors only"],a:1},
      {t:"Which of the following is NOT a listed complication of CPR?",o:["Rib fracture","Liver laceration","Stomach distension","Pulmonary embolism"],a:3},
      {t:"An implantable (internal) defibrillator differs from external defibrillators primarily because it:",o:["Requires higher energy levels than external devices","Is battery-powered and delivers current directly through cardiac electrodes","Can only treat asystole, not VF","Must be manually activated externally each time it fires"],a:1},
      {t:"The post-resuscitation recovery position is used to:",o:["Facilitate defibrillation if a second arrest occurs","Keep the airway clear and prevent choking on vomit or fluid","Allow easier intravenous access","Enable continuous ECG monitoring more accurately"],a:1},

      {t:"Tension pneumothorax as a complication of chest tube management results from:",o:["Excessive fluid drainage through the tube","Re-clamping or removing the chest tube despite an ongoing air leak","Over-inflation of the endotracheal cuff","Excessive suction pressure applied to the drainage system"],a:1},
      {t:"ROM exercises for the arm and shoulder on the chest tube side are performed to:",o:["Prevent accidental tube dislodgement during movement","Avoid shoulder joint ankylosis and reduce pain and discomfort","Improve gravitational drainage from the pleural space","Stimulate deeper breathing efforts"],a:1},
      {t:"A single-bottle water-seal system is NOT recommended for evacuating pleural fluid because:",o:["It lacks a dedicated suction control chamber","Accumulated fluid raises the water-seal level, increasing expiratory resistance and eventually stopping drainage","It cannot be connected to wall suction","It does not have an adequate atmospheric air outlet"],a:1},
      {t:"Pleurodesis involves inserting chemicals into the pleural space to:",o:["Remove air from the pleural cavity","Cause intentional pleural scarring to prevent recurrent fluid accumulation","Drain blood following traumatic hemothorax","Reduce acute pleural inflammation and pain"],a:1},
      {t:"Re-expansion pulmonary edema as a chest tube complication occurs when:",o:["The tube is inserted in an incorrect anatomical position","More than 1–1.5 L of fluid is drained in less than 30 minutes","The chest tube becomes kinked and drainage suddenly stops","There is a continuous air leak through the drainage system"],a:1},
      {t:"Which assessment finding during chest tube monitoring requires immediate reporting to the physician?",o:["Gentle tidaling in the water-seal chamber with breathing","Total of 200 mL of serosanguinous drainage at the end of a 12-hour shift","Sudden increase of 250 mL of bright red blood appearing in the system within 1 hour","Mild occasional bubbling in the water-seal chamber"],a:2},
      {t:"After chest tube removal, evaluation should include all of the following EXCEPT:",o:["Auscultating lung sounds bilaterally","Reviewing the post-removal chest X-ray","Assessing bowel sounds and abdominal distension","Evaluating for signs of respiratory distress"],a:2},
      {t:"Intercostal neuralgia as a complication of chest tube insertion is caused by:",o:["Local infection at the skin insertion site","Trauma of the intercostal neurovascular bundle, presenting as persistent pain","Escape of air into subcutaneous tissues","Accidental laceration of the liver"],a:1}
    ]
  }
];

// State
let QUESTIONS = [];
let current = 0;
let answers = [];
let answered = false;
let selectedCat = 'all';

function buildQuestions() {
  if (selectedCat === 'all') {
    QUESTIONS = ALL_SECTIONS.flatMap(s => s.qs.map(q => ({...q, cat: s.name})));
  } else {
    const sec = ALL_SECTIONS.find(s => s.name === selectedCat);
    QUESTIONS = sec ? sec.qs.map(q => ({...q, cat: sec.name})) : [];
  }
  document.getElementById('totalQDisplay').textContent = QUESTIONS.length;
}

// Build category filter
function buildCategoryFilter() {
  const cf = document.getElementById('categoryFilter');
  cf.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'cat-btn active';
  allBtn.textContent = '🌐 All Topics (' + ALL_SECTIONS.reduce((n,s)=>n+s.qs.length,0) + ')';
  allBtn.onclick = () => selectCat('all', allBtn);
  cf.appendChild(allBtn);

  ALL_SECTIONS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.textContent = s.icon + ' ' + s.name + ' (' + s.qs.length + ')';
    btn.onclick = () => selectCat(s.name, btn);
    cf.appendChild(btn);
  });
}

function selectCat(name, btn) {
  selectedCat = name;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildQuestions();
}

// Theme
const themeBtn = document.getElementById('themeBtn');
let theme = localStorage.getItem('theme') || 'light';
function applyTheme(t) {
  theme = t;
  document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : '');
  themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('theme', t);
}
applyTheme(theme);
themeBtn.addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'));

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function startQuiz() {
  buildQuestions();
  // Shuffle
  for (let i = QUESTIONS.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [QUESTIONS[i], QUESTIONS[j]] = [QUESTIONS[j], QUESTIONS[i]];
  }
  current = 0;
  answers = new Array(QUESTIONS.length).fill(null);
  answered = false;
  show('quizScreen');
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = QUESTIONS[current];
  const tot = QUESTIONS.length;
  document.getElementById('qNum').textContent = `QUESTION ${current + 1}`;
  document.getElementById('qCatBadge').textContent = q.cat;
  document.getElementById('qText').textContent = q.t;
  document.getElementById('progressLabel').textContent = `${current+1} / ${tot}`;
  document.getElementById('progressFill').style.width = `${((current+1)/tot)*100}%`;
  document.getElementById('btnNext').disabled = true;
  const fb = document.getElementById('feedbackBox');
  fb.className = 'feedback-box';
  const letters = ['A','B','C','D'];
  const list = document.getElementById('optsList');
  list.innerHTML = '';
  q.o.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span>${opt}`;
    btn.onclick = () => selectAnswer(i, btn);
    list.appendChild(btn);
  });
  const card = document.getElementById('qCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'slideIn .35s ease';
}

function selectAnswer(chosen, clickedBtn) {
  if (answered) return;
  answered = true;
  answers[current] = chosen;
  const q = QUESTIONS[current];
  const opts = document.querySelectorAll('.opt-btn');
  opts.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.a) btn.classList.add('correct');
    if (i === chosen && chosen !== q.a) btn.classList.add('wrong');
  });
  const fb = document.getElementById('feedbackBox');
  if (chosen === q.a) {
    fb.className = 'feedback-box correct-fb show';
    document.getElementById('feedbackIcon').textContent = '✅';
    document.getElementById('feedbackText').textContent = 'Correct answer! 🎉';
  } else {
    fb.className = 'feedback-box wrong-fb show';
    document.getElementById('feedbackIcon').textContent = '❌';
    document.getElementById('feedbackText').textContent = `Correct answer: ${q.o[q.a]}`;
  }
  document.getElementById('btnNext').disabled = false;
}

function skipQuestion() {
  if (answered) return;
  answers[current] = null;
  nextQuestion();
}

function nextQuestion() {
  current++;
  if (current >= QUESTIONS.length) showResult();
  else { answered = false; renderQuestion(); }
}

function showResult() {
  let correct = 0, wrong = 0, skip = 0;
  answers.forEach((a, i) => {
    if (a === null) skip++;
    else if (a === QUESTIONS[i].a) correct++;
    else wrong++;
  });
  const pct = Math.round((correct / QUESTIONS.length) * 100);
  document.getElementById('rCorrect').textContent = correct;
  document.getElementById('rWrong').textContent = wrong;
  document.getElementById('rSkip').textContent = skip;
  document.getElementById('pctNum').textContent = pct;
  let emoji, title, sub;
  if (pct >= 90) { emoji='🏆'; title='Excellent! Outstanding!'; sub='Amazing result — keep it up!'; }
  else if (pct >= 75) { emoji='🎉'; title='Very Good!'; sub='Strong performance, keep reviewing to reach the top!'; }
  else if (pct >= 60) { emoji='💪'; title='Good, but room to improve!'; sub='Review your wrong answers and try again'; }
  else if (pct >= 40) { emoji='📚'; title='Needs more revision'; sub='Go back to your notes and retake the quiz'; }
  else { emoji='😅'; title="Don't worry, keep studying!"; sub='Revision is the key — try again!'; }
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultSub').textContent = sub;
  const circ = 2 * Math.PI * 62;
  const offset = circ - (pct / 100) * circ;
  const arc = document.getElementById('circleArc');
  arc.style.strokeDashoffset = '389.6';
  arc.style.stroke = pct >= 60 ? 'var(--green)' : pct >= 40 ? 'var(--c)' : 'var(--red)';
  setTimeout(() => { arc.style.strokeDashoffset = offset; }, 200);
  show('resultScreen');
}

function showReview() {
  const list = document.getElementById('reviewList');
  list.innerHTML = '';
  const letters = ['A','B','C','D'];
  QUESTIONS.forEach((q, qi) => {
    const userAns = answers[qi];
    let statusClass, statusText;
    if (userAns === null) { statusClass='status-skip'; statusText='⏭ Skipped'; }
    else if (userAns === q.a) { statusClass='status-correct'; statusText='✅ Correct'; }
    else { statusClass='status-wrong'; statusText='❌ Wrong'; }
    const card = document.createElement('div');
    card.className = 'review-card';
    card.innerHTML = `
      <div class="review-card-top">
        <div class="review-q-label">QUESTION ${qi+1} · ${q.cat}</div>
        <div class="review-q-text">${q.t}</div>
        <div class="review-status ${statusClass}">${statusText}</div>
      </div>
      <div class="review-opts">
        ${q.o.map((opt, oi) => {
          let cls = 'review-opt';
          if (oi === q.a) cls += ' is-correct';
          if (oi === userAns && userAns !== q.a) cls += ' is-wrong';
          return `<div class="${cls}"><div class="review-dot"></div>${letters[oi]}. ${opt}</div>`;
        }).join('')}
      </div>`;
    list.appendChild(card);
  });
  show('reviewScreen');
}

function retryQuiz() {
  current = 0;
  answers = new Array(QUESTIONS.length).fill(null);
  answered = false;
  // Reshuffle
  for (let i = QUESTIONS.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [QUESTIONS[i], QUESTIONS[j]] = [QUESTIONS[j], QUESTIONS[i]];
  }
  show('quizScreen');
  renderQuestion();
}

// Init
buildCategoryFilter();
buildQuestions();
</script>
