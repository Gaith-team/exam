<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHAITH TEAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent:       #2563eb;
  --accent-light: #3b82f6;
  --accent-dark:  #1d4ed8;
  --accent-glow:  rgba(37,99,235,0.2);
  --bg:      #f8fafc;
  --bg2:     #eef2f7;
  --card:    #ffffff;
  --text:    #1a2332;
  --text2:   #4a5568;
  --text3:   #718096;
  --bc:      rgba(0,0,0,0.07);
  --success: #16a34a;
  --danger:  #dc2626;
  --warn:    #1d4ed8;
  --r:       16px;
  --tr:      all 0.3s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg:   #0d1117; --bg2: #161b22; --card: #1c2333;
  --text: #e6edf3; --text2: #b1bac4; --text3: #7d8590;
  --bc:   rgba(255,255,255,0.08);
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
  transition: background .4s, color .4s;
}

/* PROGRESS TOP */
#prog-bar {
  position: fixed; top: 0; left: 0; height: 3px; z-index: 999;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  transition: width .2s;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 64px;
  background: rgba(248,250,252,.93); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--bc); transition: var(--tr);
}
[data-theme="dark"] nav { background: rgba(13,17,23,.95); }

.nav-back {
  display: flex; align-items: center; gap: 7px;
  color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 700;
  padding: 7px 13px; border-radius: 8px; border: 1px solid var(--bc);
  background: var(--card); transition: var(--tr);
}
.nav-back:hover { color: var(--accent); border-color: var(--accent-glow); transform: translateX(3px); }
.nav-brand { display: flex; align-items: center; gap: 9px; font-size: 15px; font-weight: 900; color: var(--text); }
.nav-logo-icon {
  width: 34px; height: 34px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 900;
}
.nav-right { display: flex; align-items: center; gap: 8px; }
.theme-btn {
  width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--bc);
  background: var(--card); cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center; transition: var(--tr);
}
.theme-btn:hover { border-color: var(--accent); transform: rotate(20deg); }

/* HERO BAND */
.hero-band {
  margin-top: 64px;
  background: linear-gradient(135deg, var(--accent-dark), var(--accent), var(--accent-light));
  padding: 40px 24px 36px; text-align: center;
  position: relative; overflow: hidden;
}
.hero-band::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 600px 200px at 50% 100%, rgba(255,255,255,.12) 0%, transparent 70%);
}
.hero-band-icon {
  width: 68px; height: 68px; border-radius: 20px;
  background: rgba(255,255,255,.2); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; margin: 0 auto 14px; border: 1.5px solid rgba(255,255,255,.35);
}
.hero-band h1 { font-size: clamp(20px,4vw,30px); font-weight: 900; color: #fff; margin-bottom: 6px; }
.hero-band p { font-size: 13px; color: rgba(255,255,255,.8); }
.hero-band-meta {
  display: flex; justify-content: center; gap: 24px; margin-top: 20px;
  flex-wrap: wrap;
}
.meta-pill {
  background: rgba(255,255,255,.18); backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,.3); border-radius: 50px;
  padding: 6px 16px; font-size: 12px; font-weight: 700; color: #fff;
  display: flex; align-items: center; gap: 6px;
}

/* EXAM SHELL */
.shell { max-width: 560px; margin: 0 auto; padding: 24px 20px 80px; }

/* STATS ROW */
.stats-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px;
}
.stat-box {
  background: var(--card); border: 1px solid var(--bc); border-radius: var(--r);
  padding: 12px 10px; text-align: center;
}
.stat-box .val { font-size: 20px; font-weight: 900; }
.stat-box .lbl { font-size: 11px; color: var(--text3); margin-top: 2px; }
.stat-correct { color: var(--success); }
.stat-wrong   { color: var(--danger); }
.stat-remain  { color: var(--accent); }

/* PROGRESS STRIP */
.prog-strip {
  background: var(--card); border: 1px solid var(--bc); border-radius: var(--r);
  padding: 14px 16px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 14px;
}
.prog-label { font-size: 13px; font-weight: 700; color: var(--text2); white-space: nowrap; }
.prog-track { flex: 1; height: 8px; background: var(--bg2); border-radius: 8px; overflow: hidden; }
.prog-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  border-radius: 8px; transition: width .4s;
}
.timer-badge {
  min-width: 64px; height: 36px; border-radius: 18px;
  background: var(--bg2); border: 1px solid var(--bc);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 900; color: var(--text);
  gap: 5px; padding: 0 12px; flex-shrink: 0;
}
.timer-badge.warn { color: var(--warn); border-color: rgba(217,119,6,.3); background: rgba(217,119,6,.08); }
.timer-badge.danger { color: var(--danger); border-color: rgba(220,38,38,.3); background: rgba(220,38,38,.08); animation: pulse .8s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

/* QUESTION CARD */
.q-card {
  background: var(--card); border: 1px solid var(--bc);
  border-radius: 20px; overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,.06);
  transition: box-shadow .3s;
}
.q-header {
  background: linear-gradient(135deg, var(--accent-dark), var(--accent));
  padding: 4px 18px 4px;
  display: flex; align-items: center; gap: 8px;
}
.q-num {
  background: rgba(255,255,255,.2); border-radius: 8px;
  padding: 3px 10px; font-size: 11px; font-weight: 700; color: #fff;
}
.q-text {
  padding: 22px 18px 14px; font-size: 15px; font-weight: 700; color: var(--text);
  line-height: 1.65; border-bottom: 1px solid var(--bc);
  text-align: left; direction: ltr;
}
.options { padding: 14px 18px 18px; display: flex; flex-direction: column; gap: 10px; }

/* OPTION */
.opt {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; border-radius: 12px;
  border: 1.5px solid var(--bc); background: var(--bg);
  cursor: pointer; font-size: 14px; font-weight: 600; color: var(--text);
  transition: var(--tr); user-select: none;
  direction: ltr; text-align: left;
}
.opt:hover:not(.disabled) {
  border-color: var(--accent); background: var(--accent-glow);
  transform: translateX(3px);
}
.opt-letter {
  width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
  background: var(--bg2); border: 1px solid var(--bc);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 900; color: var(--text3);
  transition: var(--tr);
}
.opt.correct {
  border-color: var(--success); background: rgba(22,163,74,.08);
}
.opt.correct .opt-letter {
  background: var(--success); color: #fff; border-color: var(--success);
}
.opt.wrong {
  border-color: var(--danger); background: rgba(220,38,38,.07);
}
.opt.wrong .opt-letter {
  background: var(--danger); color: #fff; border-color: var(--danger);
}
.opt.disabled { pointer-events: none; }

/* FEEDBACK */
.feedback-bar {
  margin: 14px 18px; padding: 12px 16px; border-radius: 12px;
  display: flex; align-items: center; gap: 10px;
  font-size: 14px; font-weight: 700;
  animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
.feedback-bar.ok { background: rgba(22,163,74,.1); color: var(--success); border: 1px solid rgba(22,163,74,.25); }
.feedback-bar.no { background: rgba(220,38,38,.08); color: var(--danger); border: 1px solid rgba(220,38,38,.2); }
.feedback-icon { font-size: 20px; }

/* EXPLANATION */
.explanation {
  margin: 0 18px 14px; padding: 12px 14px;
  background: rgba(var(--accent-rgb),.06);
  border-radius: 10px; border-right: 3px solid var(--accent);
  font-size: 13px; color: var(--text2); line-height: 1.6;
  display: none;
}

/* NAV BTNS */
.nav-btns { padding: 4px 18px 18px; display: flex; gap: 10px; }
.btn {
  flex: 1; padding: 13px; border: none; border-radius: 12px;
  font-size: 14px; font-weight: 900; cursor: pointer;
  font-family: 'Outfit', sans-serif; transition: var(--tr);
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.btn-next {
  background: linear-gradient(135deg, var(--accent-dark), var(--accent));
  color: #fff; box-shadow: 0 4px 14px var(--accent-glow);
}
.btn-next:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
.btn-skip {
  background: var(--bg2); color: var(--text2); border: 1px solid var(--bc); flex: 0 0 auto; padding: 13px 18px;
}
.btn-skip:hover { border-color: var(--warn); color: var(--warn); }

/* ===== RESULTS ===== */
.result-hero {
  text-align: center; padding: 36px 20px 28px;
  background: var(--card); border-radius: 20px;
  border: 1px solid var(--bc); margin-bottom: 20px;
  box-shadow: 0 4px 20px rgba(0,0,0,.06);
}
.score-ring {
  width: 110px; height: 110px; border-radius: 50%; margin: 0 auto 18px;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; border: 5px solid var(--bg2);
  position: relative;
}
.score-ring svg { position: absolute; inset: -5px; width: calc(100% + 10px); height: calc(100% + 10px); transform: rotate(-90deg); }
.score-ring circle { fill: none; stroke-width: 5; stroke-linecap: round; }
.ring-bg { stroke: var(--bg2); }
.ring-fill { stroke: var(--accent); transition: stroke-dashoffset 1s ease; }
.score-num { font-size: 28px; font-weight: 900; color: var(--text); }
.score-pct { font-size: 12px; color: var(--text3); }
.result-grade { font-size: 22px; font-weight: 900; margin-bottom: 6px; }
.result-sub { font-size: 14px; color: var(--text2); }
.result-stats {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 20px;
}
.rs { background: var(--bg2); border-radius: 10px; padding: 12px 8px; text-align: center; }
.rs .n { font-size: 20px; font-weight: 900; }
.rs .l { font-size: 11px; color: var(--text3); }

/* REPORT ITEMS */
.report-item {
  background: var(--card); border: 1px solid var(--bc); border-radius: 14px;
  padding: 16px; margin-bottom: 10px; border-right: 4px solid var(--bc);
}
.report-item.ok { border-right-color: var(--success); }
.report-item.no { border-right-color: var(--danger); }
.report-item .ri-q { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
.report-item .ri-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; margin-top: 5px; color: var(--text2);
}
.ri-badge {
  padding: 2px 8px; border-radius: 6px; font-weight: 700; font-size: 11px; flex-shrink: 0;
}
.ri-yours { background: rgba(220,38,38,.1); color: var(--danger); }
.ri-right { background: rgba(22,163,74,.1); color: var(--success); }

.result-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
.btn-retry { background: linear-gradient(135deg, var(--accent-dark), var(--accent)); color: #fff; }
.btn-retry:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
.btn-home { background: var(--bg2); color: var(--text); border: 1px solid var(--bc); }
.btn-home:hover { border-color: var(--accent); color: var(--accent); }

/* FOOTER */
footer {
  background: var(--bg2); border-top: 1px solid var(--bc);
  padding: 22px 24px; display: flex; align-items: center;
  justify-content: space-between; flex-wrap: wrap; gap: 10px;
}
.footer-brand { font-size: 14px; font-weight: 700; }
.footer-brand span { color: var(--accent); }
.footer-tg { display: flex; align-items: center; gap: 5px; text-decoration: none; color: #229ED9; font-size: 12px; font-weight: 600; }

@media (max-width: 480px) {
  nav { padding: 0 14px; }
  .shell { padding: 16px 14px 60px; }
  .nav-brand span { display: none; }
  .hero-band { padding: 30px 16px 28px; }
}
</style>
</head>

<nav>

<script>
const QUESTIONS = [
{t:"What does the acronym COPD stand for?", o:["Chronic Obstructive Pulmonary Disease","Common Obstructive Post-Disease","Chronic Open Pulmonary Disorder","Congenital Obstructive Pulmonary Disease"], a:0},
            {t:"Which of the following is considered a preventable and treatable slowly progressive respiratory disease?", o:["Asthma","Pneumonia","COPD","Lung Cancer"], a:2},
            {t:"Which condition is characterized by destruction of the alveoli and enlargement of distal airspaces?", o:["Chronic Bronchitis","Emphysema","Asthma","Cystic Fibrosis"], a:1},
            {t:"Chronic bronchitis is defined as a productive cough lasting at least:", o:["1 month for 1 year","3 months a year for 2 consecutive years","6 months for 5 years","2 weeks for 2 years"], a:1},
            {t:"The most important risk factor for COPD is:", o:["Air pollution","Cigarette smoking","Genetic abnormalities","Dust exposure"], a:1},
            {t:"Exposure to tobacco smoke accounts for what percentage of COPD cases?", o:["20-30%","50-60%","80-90%","100%"], a:2},
            {t:"What is the primary symptom of COPD?", o:["Productive cough","Chest pain","Fever","High blood pressure"], a:0},
            {t:"A 'Barrel chest' configuration in COPD results from:", o:["Fixation of ribs in inspiratory position due to hyperinflation","Obesity","Excessive muscle growth","Poor posture"], a:0},
            {t:"Which term is often used to describe patients with chronic bronchitis and cyanosis?", o:["Pink puffer","Blue bloater","Grey ghost","Yellow jacket"], a:1},
            {t:"Clubbing of the fingers in COPD is a sign of:", o:["High oxygen levels","Chronic hypoxemia","Infection","Excessive exercise"], a:1},
            {t:"Diffuse rhonchi and crackles heard on auscultation are common in:", o:["Healthy lungs","COPD","Anemia","Arthritis"], a:1},
            {t:"Which of the following is a life-threatening complication of COPD?", o:["Weight gain","Respiratory insufficiency and failure","Increased appetite","Better sleep"], a:1},
            {t:"What is 'Cor pulmonale'?", o:["Right-sided heart failure due to lung disease","Left-sided heart failure","A type of lung cancer","A skin rash"], a:0},
            {t:"Spirometry is used to evaluate airflow obstruction by measuring the ratio of:", o:["FEV1 to FVC","RR to ABG","WBC to RBC","Height to Weight"], a:0},
            {t:"Obstructive lung disease is defined as a FEV1/FVC ratio of less than:", o:["90%","80%","70%","50%"], a:2},
            {t:"Alpha1-antitrypsin deficiency screening is performed for COPD patients under age:", o:["65","55","45","30"], a:2},
            {t:"Which medication class relieves bronchospasm and reduces airway obstruction?", o:["Antibiotics","Bronchodilators","Corticosteroids","Mucolytics"], a:1},
            {t:"Albuterol and Ventolin are examples of:", o:["Corticosteroids","Bronchodilators","Antibiotics","Anticoagulants"], a:1},
            {t:"How often should COPD patients receive the influenza vaccine?", o:["Every 5 years","Yearly","Once in a lifetime","Every month"], a:1},
            {t:"Pneumococcal vaccine should be given to COPD patients every:", o:["Year","5 to 7 years","10 years","2 years"], a:1},
            {t:"A common nursing diagnosis for COPD is 'Ineffective airway clearance' related to:", o:["Low fluid intake","Increased mucus production and bronchoconstriction","Too much exercise","High oxygen"], a:1},
            {t:"'Activity intolerance' in COPD is primarily due to:", o:["Laziness","Fatigue and hypoxemia","Strong muscles","Good sleep"], a:1},
            {t:"What is the recommended fluid intake for COPD patients to help clear secretions?", o:["Low fluid intake","High fluid intake","No fluids","Only coffee"], a:1},
            {t:"Which breathing technique is taught to COPD patients to improve breathing patterns?", o:["Rapid breathing","Pursed-lip and diaphragmatic breathing","Holding breath","Mouth breathing only"], a:1},
            {t:"Regarding nutrition, COPD patients should be encouraged to eat:", o:["3 large meals","6 small meals","Once a day","Only liquid food"], a:1},
            {t:"To avoid stomach distension and breathing difficulty, COPD patients should take fluids:", o:["During meals","Between meals","Only at night","Never"], a:1},
            {t:"What should a COPD patient do 30 minutes before eating to conserve energy?", o:["Exercise","Rest","Smoke","Sleep for 5 hours"], a:1},
            {t:"Which of the following should be avoided 1 hour before meals by COPD patients?", o:["Resting","Exercise","Drinking water","Reading"], a:1},
            {t:"The volume of air that a patient can forcibly exhale in 1 second is:", o:["FVC","FEV1","RR","ABG"], a:1},
            {t:"'Prolonged expiration' is a common finding in:", o:["Healthy people","COPD patients","Athletes","Infants"], a:1},
            {t:"Neck vein engorgement in COPD may indicate:", o:["High intelligence","Cor pulmonale/Right heart failure","Dehydration","Good circulation"], a:1},
            {t:"Which enzyme inhibitor deficiency is a genetic risk factor for COPD?", o:["Amylase","Alpha1-antitrypsin","Lipase","Pepsin"], a:1},
            {t:"Hypertrophy and hypersecretion of mucus are hallmarks of:", o:["Emphysema","Chronic bronchitis","Lung cancer","Pneumonia"], a:1},
            {t:"In emphysema, impaired gas exchange results from destruction of:", o:["Bronchial walls","Alveolar walls","The heart","The ribs"], a:1},
            {t:"Secondary smoke is also known as:", o:["Active smoking","Passive smoking","Electronic smoking","No smoking"], a:1},
            {t:"Airflow obstruction in COPD involves:", o:["Only the heart","Airways, pulmonary parenchyma, or both","Only the nose","Only the throat"], a:1},
            {t:"Which disease was previously classified as COPD but is now considered separate?", o:["Emphysema","Chronic Bronchitis","Asthma","Cystic Fibrosis"], a:2},
            {t:"'Cyanosis' is a clinical manifestation of COPD characterized by:", o:["Red skin","Bluish discoloration","Pale skin","Yellow skin"], a:1},
            {t:"Weight loss in COPD is often due to:", o:["Increased appetite","Increased work of breathing and fatigue","Eating too much","Good metabolism"], a:1},
            {t:"'Atelectasis' as a complication of COPD means:", o:["Lung collapse/Airless state of lung","Fluid in the heart","High fever","Strong bones"], a:0},
            {t:"Pneumothorax is a complication of COPD involving:", o:["Fluid in the lungs","Air in the pleural space causing lung collapse","Blood in the heart","Stomach ache"], a:1},
            {t:"Which test assesses baseline oxygenation and gas exchange?", o:["CBC","ABGs (Arterial Blood Gases)","Urine test","Eye exam"], a:1},
            {t:"Smoking cessation is a part of:", o:["Medical management/Risk reduction","Diagnostic testing","Physical therapy only","Surgery"], a:0},
            {t:"Prednisone and SoluMedrol are examples of:", o:["Bronchodilators","Corticosteroids","Antibiotics","Diuretics"], a:1},
            {t:"A patient using accessory muscles of the shoulders and neck to breathe is showing:", o:["Relaxation","Increased respiratory effort/Distress","Good posture","Strength"], a:1},
            {t:"'Blue bloater' is associated with which condition?", o:["Emphysema","Chronic Bronchitis","Asthma","Pneumonia"], a:1},
            {t:"Hyperinflation of the lungs in emphysema leads to:", o:["Small chest","Barrel chest","Flat chest","No chest"], a:1},
            {t:"Which of the following is an occupational risk factor for COPD?", o:["Office work","Exposure to dust and chemicals","Reading books","Walking in a park"], a:1},
            {t:"Mucolytics are used to:", o:["Increase mucus","Thin and help clear mucus","Stop breathing","Increase fever"], a:1},
            {t:"Postural drainage is used to:", o:["Help clear secretions from the lungs","Measure blood pressure","Test vision","Exercise legs"], a:0},
            {t:"'Hypoxemia' means:", o:["High blood sugar","Low oxygen in the blood","High blood pressure","Low heart rate"], a:1},
            {t:"What is the goal of 'pursed-lip breathing'?", o:["To breathe faster","To prolong exhalation and prevent airway collapse","To hold breath longer","To look better"], a:1},
            {t:"COPD is characterized by which three primary symptoms?", o:["Cough, sputum, and dyspnea","Fever, rash, and pain","Dizziness, nausea, and vomiting","Hunger, thirst, and sleepiness"], a:0},
            {t:"In chronic bronchitis, the bronchial wall becomes scarred, leading to:", o:["Dilation","Stenosis and obstruction","Healing","Expansion"], a:1},
            {t:"Which of the following is a hazardous airborne substance risk for COPD?", o:["Oxygen","Asbestos/Chemical fumes","Water vapor","Nitrogen"], a:1},
            {t:"'Dyspnea on exertion' means:", o:["Difficulty breathing while resting","Difficulty breathing during physical activity","Easy breathing","No breathing"], a:1},
            {t:"A FEV1/FVC ratio of 60% indicates:", o:["Normal lung function","Obstructive lung disease","Restrictive lung disease","Excellent health"], a:1},
            {t:"Which of the following is a preventive measure for COPD complications?", o:["Smoking more","Vaccination (Flu/Pneumonia)","Avoiding water","Staying in bed forever"], a:1},
            {t:"Peripheral edema in a COPD patient suggests:", o:["Brain damage","Right-sided heart failure (Cor pulmonale)","Good hydration","Muscle growth"], a:1},
            {t:"The primary goal of COPD management is to:", o:["Cure the disease","Achieve maximal self-management and prevent complications","Increase smoking","Avoid all doctors"], a:1},
            {t:"COPD is a completely reversible respiratory disease.", o:["True","False"], a:1},
            {t:"Cigarette smoking is the most important risk factor for COPD.", o:["True","False"], a:0},
            {t:"Asthma is currently classified as a type of COPD.", o:["True","False"], a:1},
            {t:"Emphysema involves the destruction of alveolar walls.", o:["True","False"], a:0},
            {t:"Chronic bronchitis requires a cough for 3 months in 2 consecutive years.", o:["True","False"], a:0},
            {t:"'Pink puffer' is a term used for chronic bronchitis patients.", o:["True","False"], a:1},
            {t:"A 'Barrel chest' is a common finding in advanced emphysema.", o:["True","False"], a:0},
            {t:"COPD patients should avoid high fluid intake.", o:["True","False"], a:1},
            {t:"Pursed-lip breathing helps COPD patients manage dyspnea.", o:["True","False"], a:0},
            {t:"Cor pulmonale is a complication involving the heart.", o:["True","False"], a:0},
            {t:"Spirometry is not useful for diagnosing COPD.", o:["True","False"], a:1},
            {t:"COPD patients should eat 3 large, heavy meals a day.", o:["True","False"], a:1},
            {t:"Alpha1-antitrypsin deficiency is a genetic cause of COPD.", o:["True","False"], a:0},
            {t:"Oxygen therapy can be part of medical management for COPD.", o:["True","False"], a:0},
            {t:"Clubbing of the fingers is a sign of acute infection only.", o:["True","False"], a:1},
            {t:"Scenario: A 65-year-old male with a 40-year smoking history presents with a chronic productive cough and shortness of breath. His FEV1/FVC ratio is 65%. What is the most likely diagnosis?", o:["Acute Asthma","Pneumonia","COPD","Lung Cancer"], a:2},
            {t:" A COPD patient is struggling to breathe and is using their neck muscles to help. The nurse should instruct the patient to perform which breathing technique?", o:["Rapid shallow breathing","Pursed-lip breathing","Holding their breath","Coughing as hard as possible"], a:1},
            {t:" A patient with emphysema has a 'barrel chest' and is very thin. They complain of being too tired to eat. What nutritional advice should the nurse provide?", o:["Eat 3 large meals to save time","Eat 6 small, frequent meals and rest before eating","Only drink water","Exercise for 1 hour before every meal"], a:1},
            {t:"A nurse is assessing a patient with chronic bronchitis and notices bluish lips and swelling in the ankles. What does the ankle swelling most likely indicate?", o:["A sprained ankle","Cor pulmonale (Right-sided heart failure)","Too much salt intake","Normal aging"], a:1},
            {t:" A COPD patient asks why they need a flu shot every year. What is the best nursing response?", o:["It is a hospital rule","To prevent respiratory infections that can lead to life-threatening complications","To cure your COPD","The flu shot helps you grow more cilia"], a:1}
];

/* ============ ENGINE ============ */
let questions, i, correct, wrong, answers, wrongSet, answered;
let totalTime = 35*60, timeLeft, timerInterval;
const LETTERS = ['A','B','C','D','E','F'];

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function init(pool) {
  questions = shuffle([...pool]);
  i = 0; correct = 0; wrong = 0;
  answers = new Array(questions.length).fill(null);
  wrongSet = []; answered = 0;
  timeLeft = totalTime;
  document.getElementById('totalBadge').textContent = questions.length + ' سؤال';
  startTimer();
  render();
}

/* TIMER */
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
    document.getElementById('timerTxt').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
    const badge = document.getElementById('timerBadge');
    if (timeLeft <= 120) { badge.className = 'timer-badge danger'; }
    else if (timeLeft <= 300) { badge.className = 'timer-badge warn'; }
    if (timeLeft <= 0) { clearInterval(timerInterval); finish(); }
  }, 1000);
}

/* TOP UI */
function updateTop() {
  const total = questions.length;
  document.getElementById('sCorrect').textContent = correct;
  document.getElementById('sWrong').textContent = wrong;
  document.getElementById('sRemain').textContent = Math.round(((total - answered) / total) * 100) + '%';
  document.getElementById('progLabel').textContent = 'سؤال ' + (i + 1) + ' / ' + total;
  document.getElementById('progFill').style.width = ((i + 1) / total * 100) + '%';
  document.getElementById('prog-bar').style.width = ((i + 1) / total * 100) + '%';
}

/* RENDER QUESTION */
function render() {
  updateTop();
  const q = questions[i];
  document.getElementById('app').innerHTML = `
    <div class="q-card">
      <div class="q-header">
        <div class="q-num">سؤال ${i + 1} / ${questions.length}</div>
      </div>
      <div class="q-text">${q.t}</div>
      <div class="options">
        ${q.o.map((o, idx) => `
          <div class="opt" id="opt${idx}" onclick="choose(${idx})">
            <div class="opt-letter">${LETTERS[idx] || idx + 1}</div>
            ${o}
          </div>
        `).join('')}
      </div>
      <div class="nav-btns">
        <button class="btn btn-skip" onclick="skip()"><i class="fa-solid fa-forward"></i> تخطي</button>
      </div>
    </div>`;
}

/* CHOOSE */
function choose(v) {
  if (answers[i] !== null) return;
  answers[i] = v;
  answered++;
  const q = questions[i];
  const ok = v === q.a;
  ok ? correct++ : wrong++;
  updateTop();

  q.o.forEach((_, idx) => {
    const el = document.getElementById('opt' + idx);
    el.classList.add('disabled');
    if (idx === q.a) el.classList.add('correct');
    else if (idx === v) el.classList.add('wrong');
  });

  const fb = document.createElement('div');
  fb.className = 'feedback-bar ' + (ok ? 'ok' : 'no');
  fb.innerHTML = ok
    ? `<span class="feedback-icon">🎉</span> <span>ممتاز ، اللهم بارك </span>`
    : `<span class="feedback-icon">😔</span> <span>ركز يا سكر</b></span>`;

  const card = document.querySelector('.q-card');
  card.querySelector('.options').after(fb);
  if (q.exp) {
    const exp = document.createElement('div');
    exp.className = 'explanation';
    exp.style.display = 'block';
    exp.innerHTML = '<b>💬 شرح:</b> ' + q.exp;
    fb.after(exp);
  }

  const navBtns = card.querySelector('.nav-btns');
  navBtns.innerHTML = `<button class="btn btn-next" onclick="next()">
    ${i < questions.length - 1 ? '<i class="fa-solid fa-arrow-left"></i> السؤال التالي' : '<i class="fa-solid fa-flag-checkered"></i> إنهاء الامتحان'}
  </button>`;
}

/* SKIP */
function skip() {
  if (answers[i] === null) { answers[i] = -1; answered++; wrongSet.push(questions[i]); wrong++; updateTop(); }
  next();
}

/* NEXT */
function next() {
  if (i < questions.length - 1) { i++; render(); window.scrollTo({top: 0, behavior: 'smooth'}); }
  else finish();
}

/* FINISH */
function finish() {
  clearInterval(timerInterval);
  const total = questions.length;
  const score = Math.round((correct / total) * 100);

  questions.forEach((q, idx) => {
    if (answers[idx] !== q.a) wrongSet.push({...q, myAns: answers[idx]});
  });
  wrongSet = [...new Map(wrongSet.map(q => [q.t, q])).values()];

  let grade, gradeColor;
  if (score >= 90) { grade = '🥇 ممتاز'; gradeColor = 'var(--success)'; }
  else if (score >= 75) { grade = '🥈 جيد جداً'; gradeColor = 'var(--accent)'; }
  else if (score >= 60) { grade = '🥉 جيد'; gradeColor = 'var(--warn)'; }
  else { grade = '📚 راجع تاني'; gradeColor = 'var(--danger)'; }

  const circ = 2 * Math.PI * 45;
  const offset = circ - (score / 100) * circ;

  const reportHTML = questions.map((q, idx) => {
    const ok = answers[idx] === q.a;
    return `<div class="report-item ${ok ? 'ok' : 'no'}">
      <div class="ri-q">${ok ? '✅' : '❌'} ${q.t}</div>
      ${!ok ? `
        <div class="ri-row"><span class="ri-badge ri-yours">إجابتك</span> ${answers[idx] >= 0 ? q.o[answers[idx]] : 'تم التخطي'}</div>
        <div class="ri-row"><span class="ri-badge ri-right">الصحيح</span> ${q.o[q.a]}</div>
      ` : ''}
    </div>`;
  }).join('');

  document.getElementById('prog-bar').style.width = '100%';
  document.getElementById('app').innerHTML = `
    <div class="result-hero">
      <div class="score-ring">
        <svg viewBox="0 0 110 110">
          <circle class="ring-bg" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="0"/>
          <circle class="ring-fill" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            style="stroke:${gradeColor}" id="ringFill"/>
        </svg>
        <div class="score-num">${score}</div>
        <div class="score-pct">%</div>
      </div>
      <div class="result-grade" style="color:${gradeColor}">${grade}</div>
      <div class="result-sub">أجبت على ${answered} من ${total} سؤال</div>
      <div class="result-stats">
        <div class="rs"><div class="n" style="color:var(--success)">${correct}</div><div class="l">صحيح</div></div>
        <div class="rs"><div class="n" style="color:var(--danger)">${wrong}</div><div class="l">خطأ</div></div>
        <div class="rs"><div class="n" style="color:var(--accent)">${total - answered < 0 ? 0 : total - answered}</div><div class="l">تخطي</div></div>
      </div>
    </div>

    <div class="result-actions">
      ${wrongSet.length ? `<button class="btn btn-retry" onclick="retryWrong()"><i class="fa-solid fa-rotate-right"></i> إعادة الخطأ (${wrongSet.length})</button>` : ''}
      <button class="btn btn-home" onclick="init(QUESTIONS)"><i class="fa-solid fa-shuffle"></i> امتحان جديد عشوائي</button>
      <a href="https://gaith-team.github.io/exam/medical1/index.html" class="btn btn-home" style="text-decoration:none;"><i class="fa-solid fa-house"></i> رجوع للمادة</a>
    </div>

    <div style="margin-top:28px">
      <div style="font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text2)">📋 تقرير مفصّل</div>
      ${reportHTML}
    </div>`;

  setTimeout(() => { document.getElementById('ringFill').style.strokeDashoffset = offset; }, 100);
  window.scrollTo({top: 0, behavior: 'smooth'});
}

/* RETRY WRONG */
function retryWrong() {
  const pool = [...wrongSet];
  questions = shuffle(pool); i = 0; correct = 0; wrong = 0;
  answers = new Array(questions.length).fill(null);
  wrongSet = []; answered = 0; timeLeft = totalTime;
  startTimer(); render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

/* THEME */
const themeBtn = document.getElementById('themeBtn');
let theme = localStorage.getItem('theme') || 'light';
function applyTheme(t) {
  theme = t;
  document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : '');
  themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('theme', t);
}
applyTheme(theme);
themeBtn.addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'));

/* START */
init(QUESTIONS);
</script>
</body>
</html>
