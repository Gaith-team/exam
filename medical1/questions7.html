<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghaith Team | Exam</title>

<style>
:root{
  --primary:#0284c7;
  --secondary:#0ea5e9;
  --bg:#f8fbff;
  --card:#ffffff;
  --soft:#e6f0ff;
  --question:#eef7ff;
  --option:#f9fcff;
  --success:#16a34a;
  --danger:#dc2626;
  --text:#0f172a;

  /* Brand dynamic */
  --brand1:#ffffff;
  --brand2:#e0f2fe;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Segoe UI",Tahoma,Arial,sans-serif;
  background:linear-gradient(180deg,var(--bg),#eef6ff);
  color:var(--text);
}

/* ================= HEADER ================= */
header{
  background:linear-gradient(90deg,var(--primary),var(--secondary));
  color:#fff;
  padding:18px;
  text-align:center;
  overflow:hidden;
}

/* ===== Brand ===== */
.logo{
  position:relative;
  font-size:28px;
  font-weight:900;
  display:inline-flex;
  align-items:center;
  gap:6px;
}

.brand-text{
  background:linear-gradient(90deg,var(--brand1),var(--brand2),var(--brand1));
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 4s linear infinite;
}
@keyframes shine{
  0%{background-position:0%}
  100%{background-position:200%}
}

.heart{
  display:inline-block;
  animation:heartbeat 1.6s infinite ease-in-out;
}
@keyframes heartbeat{
  0%{transform:scale(1)}
  50%{transform:scale(1.25)}
  100%{transform:scale(1)}
}

/* Sparkles */
.sparkle{
  position:absolute;
  font-size:14px;
  animation:twinkle 3s infinite ease-in-out;
}
@keyframes twinkle{
  0%{opacity:0;transform:scale(.6)}
  50%{opacity:1;transform:scale(1.2)}
  100%{opacity:0;transform:scale(.6)}
}

/* Reduced motion أثناء الامتحان */
.exam .sparkle{animation-duration:5s;opacity:.4}
.exam .heart{animation-duration:2.5s}

/* After exam */
.after .sparkle{animation-duration:2s}
.after .heart{animation-duration:1.1s}

/* ================= LAYOUT ================= */
.container{max-width:520px;margin:auto;padding:16px}

/* ===== Top Bar ===== */
.top-bar{
  display:flex;
  gap:12px;
  margin-bottom:16px;
}
.progress-box{
  flex:1;
  background:var(--card);
  padding:14px;
  border-radius:18px;
  box-shadow:0 10px 22px rgba(2,132,199,.12);
}
.progress-text{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:6px;
  font-weight:800;
  font-size:14px;
}
.progress{
  height:8px;
  background:var(--soft);
  border-radius:10px;
  overflow:hidden;
}
.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--primary),var(--secondary));
}

/* Timer */
.timer{
  width:64px;height:64px;border-radius:50%;
  background:conic-gradient(var(--primary) 0deg,var(--soft) 0deg);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:14px;
  background-color:var(--card);
}

/* ================= CARD ================= */
.card{
  background:var(--card);
  padding:22px;
  border-radius:24px;
  box-shadow:0 18px 36px rgba(2,132,199,.18);
}
.question-title{
  background:var(--question);
  padding:16px;
  border-radius:16px;
  font-weight:900;
  margin-bottom:16px;
}
.option{
  background:var(--option);
  border:2px solid var(--soft);
  border-radius:18px;
  padding:15px;
  margin:12px 0;
  font-weight:700;
  cursor:pointer;
}
.option.correct{background:#eafaf1;border-color:var(--success)}
.option.wrong{background:#fff1f1;border-color:var(--danger)}
.option.disabled{pointer-events:none;opacity:.9}

button{
  margin-top:18px;
  width:100%;
  padding:15px;
  border:none;
  border-radius:20px;
  background:linear-gradient(90deg,var(--primary),var(--secondary));
  color:#fff;
  font-weight:900;
}

/* Feedback */
.feedback{
  text-align:center;
  font-size:22px;
  margin-bottom:10px;
  animation:pop .5s;
}
@keyframes pop{
  0%{transform:scale(.6);opacity:0}
  100%{transform:scale(1);opacity:1}
}

/* Report */
.report{
  background:var(--card);
  padding:14px;
  border-radius:14px;
  margin:10px 0;
  border-left:6px solid var(--soft);
}
.report.correct{border-color:var(--success)}
.report.wrong{border-color:var(--danger)}
</style>
</head>

<body class="exam">

<header>
  <div class="logo">
    <span class="brand-text">Ghaith Team</span>
    <span class="heart">💖</span>
    <span class="sparkle" style="top:-8px;left:0">✨</span>
    <span class="sparkle" style="top:6px;right:-8px">✨</span>
    <span class="sparkle" style="bottom:-8px;left:50%">✨</span>
  </div>
  <div style="margin-top:6px;font-weight:800">  👏🏻 الإمتحان في جيبك </div>
</header>

<div class="container">

  <div class="top-bar">
    <div class="progress-box">
      <div class="progress-text">
        <span id="progressText"></span>
        <span>
          ✔️ <span id="correctCount">0</span> |
          ❌ <span id="wrongCount">0</span> |
          ⏳ <span id="remainPercent">100%</span>
        </span>
      </div>
      <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>
    <div class="timer" id="timer">40:00</div>
  </div>

  <div id="app"></div>
</div>

<script>
/* ===== Questions ===== */
let questions = [
    {t:"Which term refers to the millimeters of mercury used in blood pressure measurement?", o:["mm Hg","mL/min","ESR","GFR"], a:0},
            {t:"A bluish discoloration of the skin most easily observed in earlobes and lips is called:", o:["Pallor","Cyanosis","Jaundice","Erythema"], a:1},
            {t:"Clubbing of the fingers is commonly associated with:", o:["Anemia","Congenital heart defects","Hypertension","Diabetes"], a:1},
            {t:"Which diagnostic test records the electrical activity of the heart?", o:["Echocardiogram","CT scan","ECG/EKG","Stress testing"], a:2},
            {t:"Hypertension is often called the 'silent killer' because:", o:["It causes loud heart murmurs","It is often symptom-free","It only affects the elderly","It is always fatal immediately"], a:1},
            {t:"According to JNC 7, 'Normal' blood pressure for adults is defined as:", o:["120/80 mmHg","<120 and <80 mmHg","130/85 mmHg","140/90 mmHg"], a:1},
            {t:"Stage 1 Hypertension is defined as a systolic BP of:", o:["120-139 mmHg","140-159 mmHg","≥160 mmHg","<120 mmHg"], a:1},
            {t:"Primary (essential) hypertension accounts for approximately what percentage of all cases?", o:["10%","50%","more than 90%","100%"], a:2},
            {t:"Which of the following is a cause of secondary hypertension?", o:["Obesity","Renal artery stenosis","High salt intake","Stress"], a:1},
            {t:"Isolated Systolic Hypertension (ISH) occurs when systolic BP is ≥140 mmHg but diastolic BP is:", o:["≥90 mmHg","<90 mmHg","≥100 mmHg","<80 mmHg"], a:1},
            {t:"Malignant hypertension is an emergency characterized by a diastolic BP above:", o:["90 mmHg","100 mmHg","120 mmHg","140 mmHg"], a:2},
            {t:"Which nutrient is a major cause of hypertension when consumed in high amounts?", o:["Potassium","Sodium","Calcium","Magnesium"], a:1},
            {t:"Nicotine in smoking affects blood pressure by:", o:["Dilating blood vessels","Constricting blood vessels","Lowering heart rate","Increasing insulin sensitivity"], a:1},
            {t:"Left ventricular hypertrophy is a result of the heart working harder to pump against:", o:["Low pressure","Elevated pressure","Normal pressure","High oxygen levels"], a:1},
            {t:"The initial diagnosis of hypertension requires how many elevated readings?", o:["One","Two or more on separate occasions","Five","Ten"], a:1},
            {t:"Which diet is specifically recommended to stop hypertension?", o:["Keto diet","DASH diet","Paleo diet","Low protein diet"], a:1},
            {t:"Which class of drugs is often used as first-line therapy for hypertension?", o:["Antibiotics","Diuretics and beta-blockers","Anticoagulants","Steroids"], a:1},
            {t:"A common side effect of Thiazide diuretics is:", o:["Increased energy","Dry mouth and thirst","Weight gain","High potassium"], a:1},
            {t:"When taking Thiazide diuretics, the nurse should encourage the intake of foods rich in:", o:["Sodium","Potassium","Fat","Sugar"], a:1},
            {t:"Lasix (Furosemide) is an example of which type of diuretic?", o:["Thiazide","Loop diuretic","Potassium-sparing","Osmotic"], a:1},
            {t:"Beta-blockers like Propranolol (Inderal) are contraindicated in patients with:", o:["Tachycardia","Bronchial asthma","Hypertension","Angina"], a:1},
            {t:"Before administering a beta-blocker, the nurse must check the patient's:", o:["Temperature","Heart rate","Weight","Height"], a:1},
            {t:"Rheumatic fever is an autoimmune reaction to an infection caused by:", o:["Staphylococcus","Group A beta-hemolytic Streptococcus","E. coli","Influenza virus"], a:1},
            {t:"Rheumatic heart disease (RHD) primarily damages the heart's:", o:["Pericardium","Valves and muscle","Electrical system","Coronary arteries"], a:1},
            {t:"Jerky, uncontrollable body movements associated with rheumatic fever are called:", o:["Arthritis","Chorea","Nodules","Erythema"], a:1},
            {t:"Which test is most useful for diagnosing heart valve problems in RHD?", o:["ECG","Echocardiogram","Chest X-ray","Blood culture"], a:1},
            {t:"Subcutaneous nodules in rheumatic fever are:", o:["Painful red bumps","Small, painless bumps beneath the skin","Large itchy rashes","Fluid-filled blisters"], a:1},
            {t:"A major diagnostic criterion for rheumatic fever is:", o:["Fever","Carditis","Increased ESR","Prolonged PR interval"], a:1},
            {t:"Secondary prevention of RHD involves:", o:["Improving housing","Continuous antibiotic prophylaxis","Surgery","Weight loss"], a:1},
            {t:"Antibiotic prophylaxis is recommended before which procedure for high-risk RHD patients?", o:["Eye exam","Dental procedures involving gingival tissue","X-ray","Walking"], a:1},
            {t:"The most common antibiotic used for prophylaxis before dental procedures is:", o:["Aspirin","Amoxicillin","Lasix","Inderal"], a:1},
            {t:"Narrowing of a heart valve is called:", o:["Regurgitation","Stenosis","Hypertrophy","Distention"], a:1},
            {t:"Backward flow of blood across a heart valve is called:", o:["Stenosis","Regurgitation","Cyanosis","Pallor"], a:1},
            {t:"A 'rub' heard during a heart exam in RHD is caused by:", o:["Leaking valves","Inflamed heart tissues rubbing together","Fast heart rate","Low blood pressure"], a:1},
            {t:"Which amino acid may irritate blood vessels and lead to atherosclerosis?", o:["Lysine","Homocysteine","Alanine","Glycine"], a:1},
            {t:"Cyanosis is most easily observed in which area?", o:["Abdomen","Lips and nail beds","Forehead","Back"], a:1},
            {t:"Daily weights are required for cardiovascular patients to monitor:", o:["Muscle growth","Fluid retention/edema","Bone density","Fat loss"], a:1},
            {t:"'Prehypertension' is defined as a systolic BP of:", o:["<120","120-139 mmHg","140-159","≥160"], a:1},
            {t:"Hypertensive encephalopathy may manifest as:", o:["Increased hunger","Restlessness and changes in consciousness","Better vision","Deep sleep"], a:1},
            {t:"A side effect of Loop diuretics is rapid:", o:["Weight gain","Volume depletion and diuresis","Hair growth","Muscle building"], a:1},
            {t:"Which of the following is a minor diagnostic criterion for rheumatic fever?", o:["Chorea","Fever","Subcutaneous nodules","Carditis"], a:1},
            {t:"The 'DASH' diet is high in:", o:["Red meat","Fruits, vegetables, and low-fat dairy","Salt and sugar","Butter"], a:1},
            {t:"Which medication can reduce the risk of stroke in RHD patients with atrial fibrillation?", o:["Antibiotics","Anticoagulants (blood thinners)","Diuretics","Steroids"], a:1},
            {t:"Erythema marginatum is a rash described as:", o:["Itchy and red","Painless with a ragged edge","Painful and blistering","Dry and scaly"], a:1},
            {t:"Primordial prevention of RHD focuses on:", o:["Giving antibiotics","Addressing poverty and overcrowding","Heart surgery","Taking aspirin"], a:1},
            {t:"Which organ damage can be revealed by urinalysis in hypertensive patients?", o:["Liver","Kidney (proteinuria)","Lungs","Brain"], a:1},
            {t:"The goal BP for a patient with diabetes and hypertension is:", o:["<140/90","<130/80 mmHg","<150/95","<120/80"], a:1},
            {t:"Morning occipital headache and blurred vision are signs of:", o:["Early hypertension","Advancing hypertension","Normal health","Low blood sugar"], a:1},
            {t:"A 'murmur' is caused by:", o:["Normal blood flow","Blood leaking around damaged valves","Healthy heart muscle","Quiet breathing"], a:1},
            {t:"'Carditis' means inflammation of the:", o:["Joints","Heart","Brain","Skin"], a:1},
            {t:"What is the significance of a 'Prolonged PR interval' in RF?", o:["Major criterion","Minor criterion","Not a criterion","Sign of recovery"], a:1},
            {t:"Which position should BP be measured in for an initial diagnosis?", o:["Standing only","Supine and sitting","Walking","Lying on the side"], a:1},
            {t:"Atrial fibrillation (AFib) is a common complication of:", o:["Mild hypertension","Rheumatic heart disease valve damage","Broken bones","Skin rash"], a:1},
            {t:"Prognosis of RHD is permanent and requires:", o:["One-time treatment","Long-term care and checkups","No treatment","Only exercise"], a:1},
            {t:"Which factor increases the risk of hypertension in women after menopause?", o:["Increased exercise","Hormonal changes/Age","Low salt intake","Better sleep"], a:1},
            {t:"What does GFR stand for?", o:["Gastric Fluid Rate","Glomerular Filtration Rate","General Fever Range","Glucose Flow Ratio"], a:1},
            {t:"A 24-hour urine protein test is used to assess:", o:["Heart failure","Renal (kidney) damage","Brain tumors","Lung capacity"], a:1},
            {t:"'Epistaxis' is another term for:", o:["Headache","Nosebleed","Dizziness","Fever"], a:1},
            {t:"Which enzyme is a marker for heart muscle damage?", o:["Amylase","CK-MB","Pepsin","Lipase"], a:1},
            {t:"Hypertension contributes to the accumulation of:", o:["Vitamin C","Atherosclerotic plaque","Water in lungs","Muscle mass"], a:1},
            {t:"Hypertension is defined as a persistent BP above 140/90 mmHg.", o:["True","False"], a:0},
            {t:"Secondary hypertension has no identifiable cause.", o:["True","False"], a:1},
            {t:"Smoking constricts blood vessels due to nicotine.", o:["True","False"], a:0},
            {t:"The DASH diet encourages high sodium intake.", o:["True","False"], a:1},
            {t:"Beta-blockers can be safely given to patients with bronchial asthma.", o:["True","False"], a:1},
            {t:"Rheumatic fever follows a Group A Streptococcus infection.", o:["True","False"], a:0},
            {t:"Chorea is a major diagnostic criterion for rheumatic fever.", o:["True","False"], a:0},
            {t:"Echocardiogram is the most useful test for diagnosing heart valve problems.", o:["True","False"], a:0},
            {t:"Malignant hypertension is characterized by a diastolic BP above 120 mmHg.", o:["True","False"], a:0},
            {t:"Thiazide diuretics cause the body to retain potassium.", o:["True","False"], a:1},
            {t:"Carditis is a minor diagnostic criterion for rheumatic fever.", o:["True","False"], a:1},
            {t:"Isolated Systolic Hypertension is common in people older than 50.", o:["True","False"], a:0},
            {t:"Antibiotic prophylaxis is required for all RHD patients before every meal.", o:["True","False"], a:1},
            {t:"Left ventricular hypertrophy is a complication of uncontrolled hypertension.", o:["True","False"], a:0},
            {t:"RHD is a temporary condition that cures itself in 2 weeks.", o:["True","False"], a:1},
            {t:"A 60-year-old male has a BP of 150/95 mmHg on two separate visits. He smokes and has a sedentary lifestyle. What is his classification and the first recommendation?", o:["Normal; no action","Stage 1 Hypertension; lifestyle modifications and possible medication","Prehypertension; eat more salt","Stage 2 Hypertension; immediate surgery"], a:1},
            {t:" A patient is prescribed a Thiazide diuretic. They report feeling weak and having muscle cramps. What should the nurse suspect?", o:["Too much energy","Electrolyte imbalance (low potassium)","High blood pressure","Normal recovery"], a:1},
            {t:"A child presents with jerky movements of the hands and a recent history of a sore throat. The nurse recognizes this as a major criterion for which disease?", o:["Hypertension","Rheumatic Fever (Chorea)","Diabetes","Asthma"], a:1},
            {t:"A patient with RHD is scheduled for a tooth extraction. What is the nurse's priority action regarding infection prevention?", o:["Give the patient a glass of water","Ensure the patient takes prescribed prophylactic antibiotics (e.g., Amoxicillin) 1 hour before","Tell the patient to skip the appointment","Give the patient a sedative"], a:1},
            {t:" A nurse is about to administer Propranolol to a hypertensive patient. The patient's heart rate is 52 bpm. What should the nurse do?", o:["Give the medication anyway","Withhold the medication and notify the provider because the HR is below 60 bpm","Give a double dose","Tell the patient to run in place"], a:1}
];



// ===== shuffle questions only =====
function shuffleQuestions(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

// خلط الأسئلة فقط
shuffleQuestions(questions);

// تعريف المتغيرات الناقصة
let i = 0;
let correct = 0;
let wrong = 0;
let answers = [];
let wrongSet = [];

/* ===== Timer ===== */
let totalTime=40*60, timeLeft=totalTime;
const timerInt=setInterval(()=>{
  timeLeft--;
  let m=Math.floor(timeLeft/60), s=timeLeft%60;
  timer.innerText=`${m}:${s<10?"0":""}${s}`;
  let deg=(timeLeft/totalTime)*360;
  timer.style.background=`conic-gradient(var(--primary) ${deg}deg,var(--soft) ${deg}deg)`;
  if(timeLeft<=0){clearInterval(timerInt);finishExam();}
},1000);

/* ===== UI ===== */
function updateTop(){
  let total=questions.length;
  let answered=correct+wrong;
  progressText.innerText=`سؤال ${i+1} من ${total}`;
  progressBar.style.width=((i+1)/total*100)+"%";
  correctCount.innerText=correct;
  wrongCount.innerText=wrong;
  remainPercent.innerText=Math.round(((total-answered)/total)*100)+"%";
}

/* ===== Render ===== */
function show(){
  updateTop();
  let q = questions[i];

  app.innerHTML = `
    <div class="card">
      <div class="question-title">${q.t}</div>
      ${q.o.map((o,idx)=>`
        <div class="option" onclick="choose(${idx})">${o}</div>
      `).join("")}
    </div>
  `;
}
/* ===== Choose ===== */
function choose(v){
  if(answers[i]!=null) return;
  answers[i]=v;
  let ok=v===questions[i].a;
  ok?correct++:wrong++;
  app.innerHTML=`
    <div class="feedback">${ok?"🎉 شاطر جدًا كمل":"😅 ركّز يا سُكر"}</div>
    <div class="card">
      <div class="question-title">${questions[i].t}</div>
      ${questions[i].o.map((o,j)=>`
        <div class="option ${j===questions[i].a?"correct":j===v?"wrong":""} disabled">${o}</div>
      `).join("")}
      <button onclick="next()">التالي</button>
    </div>`;
}

/* ===== Next ===== */
function next(){
  if(i<questions.length-1){i++;show();}
  else finishExam();
}

/* ===== Finish ===== */
function finishExam(){
  document.body.classList.remove("exam");
  document.body.classList.add("after");

  let score=Math.round((correct/questions.length)*100);

  if(score>=80){
    document.documentElement.style.setProperty("--brand1","#22c55e");
    document.documentElement.style.setProperty("--brand2","#fde047");
  }else if(score>=50){
    document.documentElement.style.setProperty("--brand1","#38bdf8");
    document.documentElement.style.setProperty("--brand2","#e0f2fe");
  }else{
    document.documentElement.style.setProperty("--brand1","#fb923c");
    document.documentElement.style.setProperty("--brand2","#fed7aa");
  }

  wrongSet=[];
  let report="";
  questions.forEach((q,idx)=>{
    let ok=answers[idx]===q.a;
    if(!ok) wrongSet.push(q);
    report+=`
      <div class="report ${ok?"correct":"wrong"}">
        <b>${q.t}</b><br>
إجابتك: ${answers[idx]!=null ? q.o[answers[idx]] : "لم يتم الحل"}<br>
الصح: ${q.o[q.a]}
      </div>`;
  });

  app.innerHTML=`
    <div class="card">
      <h3>?? تقريرك</h3>
      ${report}
      ${wrongSet.length?`<button onclick="retry()">إعادة حل الغلط فقط</button>`:"<p>أنت ممتاز 👑</p>"}
    </div>`;
}

/* ===== Retry Wrong ===== */
function retry(){
  // نبدأ امتحان جديد بالأسئلة الغلط فقط
  questions = [...wrongSet];

  answers = [];
  wrongSet = [];
  i = 0;
  correct = 0;
  wrong = 0;

  // رجوع لشكل الامتحان
  document.body.classList.remove("after");
  document.body.classList.add("exam");

  show();
}

show();
</script>

</body>
</html>
