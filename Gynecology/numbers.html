
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHAITH TEAM – أرقام المنهج</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#db2777;--accent-light:#ec4899;--accent-dark:#be185d;
  --accent-glow:rgba(219,39,119,.2);
  --bg:#f8fafc;--bg2:#eef2f7;--card:#fff;
  --text:#1a2332;--text2:#4a5568;--text3:#718096;
  --bc:rgba(0,0,0,.07);
  --success:#16a34a;--danger:#dc2626;--warn:#be185d;
  --r:16px;--tr:all .3s cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"]{
  --bg:#0d1117;--bg2:#161b22;--card:#1c2333;
  --text:#e6edf3;--text2:#b1bac4;--text3:#7d8590;
  --bc:rgba(255,255,255,.08);
}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .4s,color .4s}

/* TOP PROGRESS */
#prog-bar{position:fixed;top:0;left:0;height:3px;z-index:999;background:linear-gradient(90deg,var(--accent),var(--accent-light));transition:width .2s}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:64px;background:rgba(248,250,252,.93);backdrop-filter:blur(16px);border-bottom:1px solid var(--bc);transition:var(--tr)}
[data-theme="dark"] nav{background:rgba(13,17,23,.95)}
.nav-back{display:flex;align-items:center;gap:7px;color:var(--text2);text-decoration:none;font-size:13px;font-weight:700;padding:7px 13px;border-radius:8px;border:1px solid var(--bc);background:var(--card);transition:var(--tr)}
.nav-back:hover{color:var(--accent);border-color:var(--accent-glow);transform:translateX(3px)}
.nav-brand{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:900;color:var(--text)}
.nav-logo-icon{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent-light));display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:900}
.nav-right{display:flex;align-items:center;gap:8px}
.theme-btn{width:38px;height:38px;border-radius:50%;border:1px solid var(--bc);background:var(--card);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.theme-btn:hover{border-color:var(--accent);transform:rotate(20deg)}

/* HERO */
.hero-band{margin-top:64px;background:linear-gradient(135deg,var(--accent-dark),var(--accent),var(--accent-light));padding:36px 24px 30px;text-align:center;position:relative;overflow:hidden}
.hero-band::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 600px 200px at 50% 100%,rgba(255,255,255,.12) 0%,transparent 70%)}
.hero-band-icon{width:64px;height:64px;border-radius:18px;background:rgba(255,255,255,.2);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;border:1.5px solid rgba(255,255,255,.35)}
.hero-band h1{font-size:clamp(18px,4vw,28px);font-weight:900;color:#fff;margin-bottom:5px}
.hero-band p{font-size:13px;color:rgba(255,255,255,.8)}
.hero-meta{display:flex;justify-content:center;gap:20px;margin-top:18px;flex-wrap:wrap}
.meta-pill{background:rgba(255,255,255,.18);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.3);border-radius:50px;padding:6px 16px;font-size:12px;font-weight:700;color:#fff;display:flex;align-items:center;gap:6px}

/* TOPIC SELECTOR */
#topic-screen{max-width:620px;margin:0 auto;padding:24px 20px 80px}
.topic-title{font-size:17px;font-weight:900;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-bottom:24px}
.topic-card{background:var(--card);border:2px solid var(--bc);border-radius:14px;padding:14px 16px;cursor:pointer;transition:var(--tr);display:flex;align-items:center;gap:12px;user-select:none}
.topic-card:hover{border-color:var(--accent);background:var(--accent-glow);transform:translateY(-2px)}
.topic-card.selected{border-color:var(--accent);background:var(--accent-glow);box-shadow:0 0 0 3px var(--accent-glow)}
.topic-card.all-card{background:linear-gradient(135deg,var(--accent-dark),var(--accent));border-color:var(--accent);grid-column:1/-1}
.topic-card.all-card .tc-icon,.topic-card.all-card .tc-name,.topic-card.all-card .tc-count{color:#fff!important}
.topic-card.all-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px var(--accent-glow)}
.tc-icon{font-size:22px;flex-shrink:0}
.tc-body{flex:1}
.tc-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
.tc-count{font-size:11px;color:var(--text3)}
.tc-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--bc);background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:var(--tr)}
.topic-card.selected .tc-check{background:var(--accent);border-color:var(--accent);color:#fff}
.start-btn{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--accent-dark),var(--accent));color:#fff;font-size:16px;font-weight:900;font-family:'Outfit',sans-serif;cursor:pointer;transition:var(--tr);display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 14px var(--accent-glow)}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px var(--accent-glow)}
.start-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* QUIZ SHELL */
.shell{max-width:560px;margin:0 auto;padding:24px 20px 80px}

/* STATS */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.stat-box{background:var(--card);border:1px solid var(--bc);border-radius:var(--r);padding:12px 10px;text-align:center}
.stat-box .val{font-size:20px;font-weight:900}
.stat-box .lbl{font-size:11px;color:var(--text3);margin-top:2px}
.stat-correct{color:var(--success)}.stat-wrong{color:var(--danger)}.stat-remain{color:var(--accent)}

/* PROGRESS STRIP */
.prog-strip{background:var(--card);border:1px solid var(--bc);border-radius:var(--r);padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:14px}
.prog-label{font-size:13px;font-weight:700;color:var(--text2);white-space:nowrap}
.prog-track{flex:1;height:8px;background:var(--bg2);border-radius:8px;overflow:hidden}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent-light));border-radius:8px;transition:width .4s}
.timer-badge{min-width:64px;height:36px;border-radius:18px;background:var(--bg2);border:1px solid var(--bc);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:var(--text);gap:5px;padding:0 12px;flex-shrink:0}
.timer-badge.warn{color:var(--warn);border-color:rgba(217,119,6,.3);background:rgba(217,119,6,.08)}
.timer-badge.danger{color:var(--danger);border-color:rgba(220,38,38,.3);background:rgba(220,38,38,.08);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* TOPIC BADGE in quiz */
.topic-badge-strip{background:var(--card);border:1px solid var(--bc);border-radius:10px;padding:8px 14px;margin-bottom:12px;font-size:12px;font-weight:700;color:var(--accent);display:flex;align-items:center;gap:6px}

/* QUESTION CARD */
.q-card{background:var(--card);border:1px solid var(--bc);border-radius:20px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.06);transition:box-shadow .3s}
.q-header{background:linear-gradient(135deg,var(--accent-dark),var(--accent));padding:4px 18px;display:flex;align-items:center;gap:8px}
.q-num{background:rgba(255,255,255,.2);border-radius:8px;padding:3px 10px;font-size:11px;font-weight:700;color:#fff}
.q-text{padding:22px 18px 14px;font-size:15px;font-weight:700;color:var(--text);line-height:1.65;border-bottom:1px solid var(--bc);text-align:left;direction:ltr}
.options{padding:14px 18px 18px;display:flex;flex-direction:column;gap:10px}

/* OPTIONS */
.opt{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;border:1.5px solid var(--bc);background:var(--bg);cursor:pointer;font-size:14px;font-weight:600;color:var(--text);transition:var(--tr);user-select:none;direction:ltr;text-align:left}
.opt:hover:not(.disabled){border-color:var(--accent);background:var(--accent-glow);transform:translateX(3px)}
.opt-letter{width:28px;height:28px;border-radius:8px;flex-shrink:0;background:var(--bg2);border:1px solid var(--bc);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:var(--text3);transition:var(--tr)}
.opt.correct{border-color:var(--success);background:rgba(22,163,74,.08)}
.opt.correct .opt-letter{background:var(--success);color:#fff;border-color:var(--success)}
.opt.wrong{border-color:var(--danger);background:rgba(220,38,38,.07)}
.opt.wrong .opt-letter{background:var(--danger);color:#fff;border-color:var(--danger)}
.opt.disabled{pointer-events:none}

/* FEEDBACK */
.feedback-bar{margin:14px 18px;padding:12px 16px;border-radius:12px;display:flex;align-items:center;gap:10px;font-size:14px;font-weight:700;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.feedback-bar.ok{background:rgba(22,163,74,.1);color:var(--success);border:1px solid rgba(22,163,74,.25)}
.feedback-bar.no{background:rgba(220,38,38,.08);color:var(--danger);border:1px solid rgba(220,38,38,.2)}
.feedback-icon{font-size:20px}

/* NAV BTNS */
.nav-btns{padding:4px 18px 18px;display:flex;gap:10px}
.btn{flex:1;padding:13px;border:none;border-radius:12px;font-size:14px;font-weight:900;cursor:pointer;font-family:'Outfit',sans-serif;transition:var(--tr);display:flex;align-items:center;justify-content:center;gap:7px}
.btn-next{background:linear-gradient(135deg,var(--accent-dark),var(--accent));color:#fff;box-shadow:0 4px 14px var(--accent-glow)}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 6px 20px var(--accent-glow)}
.btn-skip{background:var(--bg2);color:var(--text2);border:1px solid var(--bc);flex:0 0 auto;padding:13px 18px}
.btn-skip:hover{border-color:var(--warn);color:var(--warn)}

/* RESULTS */
.result-hero{text-align:center;padding:36px 20px 28px;background:var(--card);border-radius:20px;border:1px solid var(--bc);margin-bottom:20px;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.score-ring{width:110px;height:110px;border-radius:50%;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;flex-direction:column;border:5px solid var(--bg2);position:relative}
.score-ring svg{position:absolute;inset:-5px;width:calc(100% + 10px);height:calc(100% + 10px);transform:rotate(-90deg)}
.score-ring circle{fill:none;stroke-width:5;stroke-linecap:round}
.ring-bg{stroke:var(--bg2)}.ring-fill{stroke:var(--accent);transition:stroke-dashoffset 1s ease}
.score-num{font-size:28px;font-weight:900;color:var(--text)}.score-pct{font-size:12px;color:var(--text3)}
.result-grade{font-size:22px;font-weight:900;margin-bottom:6px}.result-sub{font-size:14px;color:var(--text2)}
.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:20px}
.rs{background:var(--bg2);border-radius:10px;padding:12px 8px;text-align:center}
.rs .n{font-size:20px;font-weight:900}.rs .l{font-size:11px;color:var(--text3)}
.report-item{background:var(--card);border:1px solid var(--bc);border-radius:14px;padding:16px;margin-bottom:10px;border-right:4px solid var(--bc)}
.report-item.ok{border-right-color:var(--success)}.report-item.no{border-right-color:var(--danger)}
.report-item .ri-q{font-size:13px;font-weight:700;margin-bottom:8px}
.report-item .ri-row{display:flex;align-items:center;gap:8px;font-size:12px;margin-top:5px;color:var(--text2)}
.ri-badge{padding:2px 8px;border-radius:6px;font-weight:700;font-size:11px;flex-shrink:0}
.ri-yours{background:rgba(220,38,38,.1);color:var(--danger)}.ri-right{background:rgba(22,163,74,.1);color:var(--success)}
.result-actions{display:flex;flex-direction:column;gap:10px;margin-top:20px}
.btn-retry{background:linear-gradient(135deg,var(--accent-dark),var(--accent));color:#fff}
.btn-retry:hover{transform:translateY(-2px);box-shadow:0 6px 20px var(--accent-glow)}
.btn-home{background:var(--bg2);color:var(--text);border:1px solid var(--bc)}
.btn-home:hover{border-color:var(--accent);color:var(--accent)}

/* FOOTER */
footer{background:var(--bg2);border-top:1px solid var(--bc);padding:22px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.footer-brand{font-size:14px;font-weight:700}.footer-brand span{color:var(--accent)}
.footer-tg{display:flex;align-items:center;gap:5px;text-decoration:none;color:#229ED9;font-size:12px;font-weight:600}

@media(max-width:480px){nav{padding:0 14px}.shell,#topic-screen{padding:16px 14px 60px}.nav-brand span{display:none}.hero-band{padding:28px 16px 24px}.topic-grid{grid-template-columns:1fr}}
</style>
</head>

// ALL = combined
const ALL_TOPIC = {id:"all", name:"كله", icon:"⭐"};

// ===================== STATE =====================
let selectedTopics = new Set();
let questions, qi, correct, wrong, answers, wrongSet, answered;
let totalTime, timeLeft, timerInterval;
let activeTopicName = '';
const LETTERS = ['A','B','C','D'];

// ===================== THEME =====================
const themeBtn = document.getElementById('themeBtn');
let theme = localStorage.getItem('theme') || 'light';
function applyTheme(t) {
  theme = t;
  document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : '');
  themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('theme', t);
}
applyTheme(theme);
themeBtn.addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'));

// ===================== BUILD TOPIC GRID =====================
function buildTopicGrid() {
  const grid = document.getElementById('topicGrid');
  // ALL card
  const allCount = TOPICS.reduce((s,t)=>s+t.questions.length,0);
  grid.innerHTML = `
    <div class="topic-card all-card" id="tc_all" onclick="toggleTopic('all',${allCount})">
      <div class="tc-icon">${ALL_TOPIC.icon}</div>
      <div class="tc-body">
        <div class="tc-name">${ALL_TOPIC.name}</div>
        <div class="tc-count">${allCount} سؤال</div>
      </div>
      <div class="tc-check" id="ck_all">★</div>
    </div>
  ` + TOPICS.map(t => `
    <div class="topic-card" id="tc_${t.id}" onclick="toggleTopic('${t.id}',${t.questions.length})">
      <div class="tc-icon">${t.icon}</div>
      <div class="tc-body">
        <div class="tc-name">${t.name}</div>
        <div class="tc-count">${t.questions.length} سؤال</div>
      </div>
      <div class="tc-check" id="ck_${t.id}">✓</div>
    </div>
  `).join('');

  document.getElementById('totalBadge').textContent = allCount + ' سؤال';
}

function toggleTopic(id, count) {
  if (id === 'all') {
    // Select all or deselect all
    const allSelected = selectedTopics.has('all');
    selectedTopics.clear();
    if (!allSelected) {
      selectedTopics.add('all');
      TOPICS.forEach(t => selectedTopics.add(t.id));
    }
  } else {
    // Remove 'all' if individual selected
    selectedTopics.delete('all');
    if (selectedTopics.has(id)) selectedTopics.delete(id);
    else selectedTopics.add(id);
    // If all individual are selected, also mark 'all'
    if (TOPICS.every(t => selectedTopics.has(t.id))) selectedTopics.add('all');
  }
  updateTopicUI();
}

function updateTopicUI() {
  // Update cards
  ['all', ...TOPICS.map(t=>t.id)].forEach(id => {
    const card = document.getElementById('tc_'+id);
    const ck = document.getElementById('ck_'+id);
    if (selectedTopics.has(id)) {
      card.classList.add('selected');
      ck.innerHTML = '✓';
    } else {
      card.classList.remove('selected');
      ck.innerHTML = id === 'all' ? '★' : '✓';
    }
  });

  // Count selected questions
  const pool = buildPool();
  const totalQ = pool.length;
  const startBtn = document.getElementById('startBtn');
  startBtn.disabled = totalQ === 0;
  startBtn.innerHTML = totalQ > 0
    ? `<i class="fa-solid fa-play"></i> ابدأ – ${totalQ} سؤال`
    : `<i class="fa-solid fa-play"></i> ابدأ الامتحان`;
}

function buildPool() {
  const selectedIds = TOPICS.filter(t => selectedTopics.has(t.id)).map(t=>t.id);
  let pool = [];
  TOPICS.forEach(t => {
    if (selectedTopics.has(t.id)) pool.push(...t.questions.map(q=>({...q,_topic:t.name,_icon:t.icon})));
  });
  return pool;
}

// ===================== SHUFFLE =====================
function shuffle(arr) {
  for (let i = arr.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function shuffleOptions(q) {
  // Create indexed options, shuffle, track new answer index
  const opts = q.o.map((o,i)=>({text:o, correct: i===q.a}));
  shuffle(opts);
  return {
    t: q.t,
    o: opts.map(o=>o.text),
    a: opts.findIndex(o=>o.correct),
    _topic: q._topic,
    _icon: q._icon
  };
}

// ===================== START =====================
function startQuiz() {
  const rawPool = buildPool();
  if (!rawPool.length) return;

  // Calculate time: ~1 min per 2 questions, min 5 min
  const mins = Math.max(5, Math.ceil(rawPool.length / 2));
  totalTime = mins * 60;

  // Shuffle questions AND options
  questions = shuffle(rawPool.map(q => shuffleOptions(q)));
  qi = 0; correct = 0; wrong = 0;
  answers = new Array(questions.length).fill(null);
  wrongSet = []; answered = 0; timeLeft = totalTime;

  // Update hero
  const topicLabel = selectedTopics.has('all') ? 'كل التوبيكس'
    : TOPICS.filter(t=>selectedTopics.has(t.id)).map(t=>t.name).join(' + ');
  document.getElementById('totalBadge').textContent = questions.length + ' سؤال';
  document.getElementById('timeBadge').textContent = mins + ' Min';

  // Show quiz
  document.getElementById('topic-screen').style.display = 'none';
  document.getElementById('quiz-shell').style.display = 'block';
  startTimer();
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ===================== TIMER =====================
function startTimer() {
  clearInterval(timerInterval);
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) { clearInterval(timerInterval); finish(); }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timeLeft/60), s = timeLeft%60;
  document.getElementById('timerTxt').textContent = `${m}:${s<10?'0':''}${s}`;
  const badge = document.getElementById('timerBadge');
  if (timeLeft <= 60) badge.className = 'timer-badge danger';
  else if (timeLeft <= 180) badge.className = 'timer-badge warn';
  else badge.className = 'timer-badge';
}

// ===================== TOP UI =====================
function updateTop() {
  const total = questions.length;
  document.getElementById('sCorrect').textContent = correct;
  document.getElementById('sWrong').textContent = wrong;
  document.getElementById('sRemain').textContent = Math.round(((total-answered)/total)*100)+'%';
  document.getElementById('progLabel').textContent = 'سؤال '+(qi+1)+' / '+total;
  document.getElementById('progFill').style.width = ((qi+1)/total*100)+'%';
  document.getElementById('prog-bar').style.width = ((qi+1)/total*100)+'%';
}

// ===================== RENDER =====================
function render() {
  updateTop();
  const q = questions[qi];
  document.getElementById('app').innerHTML = `
    <div class="topic-badge-strip">${q._icon} ${q._topic}</div>
    <div class="q-card">
      <div class="q-header">
        <div class="q-num">سؤال ${qi+1} / ${questions.length}</div>
      </div>
      <div class="q-text">${q.t}</div>
      <div class="options">
        ${q.o.map((o,idx)=>`
          <div class="opt" id="opt${idx}" onclick="choose(${idx})">
            <div class="opt-letter">${LETTERS[idx]||idx+1}</div>
            ${o}
          </div>
        `).join('')}
      </div>
      <div class="nav-btns">
        <button class="btn btn-skip" onclick="skip()"><i class="fa-solid fa-forward"></i> تخطي</button>
      </div>
    </div>`;
}

// ===================== CHOOSE =====================
function choose(v) {
  if (answers[qi] !== null) return;
  answers[qi] = v;
  answered++;
  const q = questions[qi];
  const ok = v === q.a;
  ok ? correct++ : wrong++;
  updateTop();

  q.o.forEach((_,idx)=>{
    const el = document.getElementById('opt'+idx);
    el.classList.add('disabled');
    if (idx===q.a) el.classList.add('correct');
    else if (idx===v) el.classList.add('wrong');
  });

  const fb = document.createElement('div');
  fb.className = 'feedback-bar '+(ok?'ok':'no');
  fb.innerHTML = ok
    ? `<span class="feedback-icon">🎉</span><span>شطور جدا ، اللهم بارك</span>`
    : `<span class="feedback-icon">😔</span><span>ركز يا سكر</span>`;

  const card = document.querySelector('.q-card');
  card.querySelector('.options').after(fb);

  const navBtns = card.querySelector('.nav-btns');
  navBtns.innerHTML = `<button class="btn btn-next" onclick="next()">
    ${qi<questions.length-1
      ? '<i class="fa-solid fa-arrow-left"></i> السؤال التالي'
      : '<i class="fa-solid fa-flag-checkered"></i> إنهاء الامتحان'}
  </button>`;
}

// ===================== SKIP / NEXT =====================
function skip() {
  if (answers[qi]===null){answers[qi]=-1;answered++;wrong++;updateTop();}
  next();
}
function next() {
  if (qi<questions.length-1){qi++;render();window.scrollTo({top:0,behavior:'smooth'});}
  else finish();
}

// ===================== FINISH =====================
function finish() {
  clearInterval(timerInterval);
  const total = questions.length;
  const score = Math.round((correct/total)*100);
  wrongSet = questions.filter((q,idx)=>answers[idx]!==q.a).map((q,idx)=>({...q,myAns:answers[questions.indexOf(q)]}));

  let grade,gradeColor;
  if (score>=90){grade='🥇 ممتاز';gradeColor='var(--success)'}
  else if (score>=75){grade='🥈 جيد جداً';gradeColor='var(--accent)'}
  else if (score>=60){grade='🥉 جيد';gradeColor='var(--warn)'}
  else{grade='📚 راجع تاني';gradeColor='var(--danger)'}

  const circ = 2*Math.PI*45;
  const offset = circ-(score/100)*circ;

  const reportHTML = questions.map((q,idx)=>{
    const ok = answers[idx]===q.a;
    return `<div class="report-item ${ok?'ok':'no'}">
      <div style="font-size:11px;color:var(--accent);margin-bottom:4px">${q._icon} ${q._topic}</div>
      <div class="ri-q">${ok?'✅':'❌'} ${q.t}</div>
      ${!ok?`
        <div class="ri-row"><span class="ri-badge ri-yours">إجابتك</span>${answers[idx]>=0?q.o[answers[idx]]:'تم التخطي'}</div>
        <div class="ri-row"><span class="ri-badge ri-right">الصحيح</span>${q.o[q.a]}</div>
      `:''}
    </div>`;
  }).join('');

  document.getElementById('prog-bar').style.width='100%';
  document.getElementById('app').innerHTML = `
    <div class="result-hero">
      <div class="score-ring">
        <svg viewBox="0 0 110 110">
          <circle class="ring-bg" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="0"/>
          <circle class="ring-fill" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            style="stroke:${gradeColor}" id="ringFill"/>
        </svg>
        <div class="score-num">${score}</div>
        <div class="score-pct">%</div>
      </div>
      <div class="result-grade" style="color:${gradeColor}">${grade}</div>
      <div class="result-sub">أجبت على ${answered} من ${total} سؤال</div>
      <div class="result-stats">
        <div class="rs"><div class="n" style="color:var(--success)">${correct}</div><div class="l">صحيح</div></div>
        <div class="rs"><div class="n" style="color:var(--danger)">${wrong}</div><div class="l">خطأ</div></div>
        <div class="rs"><div class="n" style="color:var(--accent)">${total-answered<0?0:total-answered}</div><div class="l">تخطي</div></div>
      </div>
    </div>
    <div class="result-actions">
      ${wrongSet.length?`<button class="btn btn-retry" onclick="retryWrong()"><i class="fa-solid fa-rotate-right"></i> إعادة الخطأ (${wrongSet.length})</button>`:''}
      <button class="btn btn-home" onclick="backToTopics()"><i class="fa-solid fa-layer-group"></i> اختار توبيك تاني</button>
    </div>
    <div style="margin-top:28px">
      <div style="font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text2)">📋 تقرير مفصّل</div>
      ${reportHTML}
    </div>`;
  setTimeout(()=>{document.getElementById('ringFill').style.strokeDashoffset=offset;},100);
  window.scrollTo({top:0,behavior:'smooth'});
}

// ===================== RETRY WRONG =====================
function retryWrong() {
  const pool = wrongSet.map(q=>shuffleOptions(q));
  questions = shuffle(pool);
  qi=0;correct=0;wrong=0;
  answers=new Array(questions.length).fill(null);
  wrongSet=[];answered=0;
  totalTime=Math.max(5*60,Math.ceil(questions.length/2)*60);
  timeLeft=totalTime;
  startTimer();render();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ===================== BACK TO TOPICS =====================
function backToTopics() {
  clearInterval(timerInterval);
  document.getElementById('quiz-shell').style.display='none';
  document.getElementById('topic-screen').style.display='block';
  document.getElementById('prog-bar').style.width='0%';
  window.scrollTo({top:0,behavior:'smooth'});
}

// ===================== INIT =====================
buildTopicGrid();
</script>
</body>
</html>
