<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHAITH TEAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#7c3aed;--accent-light:#8b5cf6;--accent-dark:#6d28d9;
  --accent-glow:rgba(124,58,237,0.2);
  --bg:#f8fafc;--bg2:#eef2f7;--card:#ffffff;
  --text:#1a2332;--text2:#4a5568;--text3:#718096;
  --bc:rgba(0,0,0,0.07);--success:#16a34a;--danger:#dc2626;--warn:#d97706;--r:16px;
  --tr:all 0.3s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"]{
  --bg:#0d1117;--bg2:#161b22;--card:#1c2333;
  --text:#e6edf3;--text2:#b1bac4;--text3:#7d8590;--bc:rgba(255,255,255,0.08);
}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .4s,color .4s}
#prog-bar{position:fixed;top:0;left:0;height:3px;z-index:999;background:linear-gradient(90deg,var(--accent),var(--accent-light));transition:width .2s}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:64px;background:rgba(248,250,252,.93);backdrop-filter:blur(16px);border-bottom:1px solid var(--bc);transition:var(--tr)}
[data-theme="dark"] nav{background:rgba(13,17,23,.95)}
.nav-brand{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:900;color:var(--text)}
.nav-logo-icon{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent-light));display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:900}
.nav-right{display:flex;align-items:center;gap:8px}
.theme-btn{width:38px;height:38px;border-radius:50%;border:1px solid var(--bc);background:var(--card);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.theme-btn:hover{border-color:var(--accent);transform:rotate(20deg)}
.hero-band{margin-top:64px;background:linear-gradient(135deg,var(--accent-dark),var(--accent),var(--accent-light));padding:32px 24px 28px;text-align:center;position:relative;overflow:hidden}
.hero-band::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 600px 200px at 50% 100%,rgba(255,255,255,.12) 0%,transparent 70%)}
.hero-band-icon{width:60px;height:60px;border-radius:18px;background:rgba(255,255,255,.2);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 12px;border:1.5px solid rgba(255,255,255,.35)}
.hero-band h1{font-size:clamp(18px,4vw,28px);font-weight:900;color:#fff;margin-bottom:4px}
.hero-band p{font-size:13px;color:rgba(255,255,255,.8)}
.hero-band-meta{display:flex;justify-content:center;gap:16px;margin-top:16px;flex-wrap:wrap}
.meta-pill{background:rgba(255,255,255,.18);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.3);border-radius:50px;padding:5px 14px;font-size:12px;font-weight:700;color:#fff;display:flex;align-items:center;gap:6px}
.control-bar{background:var(--card);border-bottom:1px solid var(--bc);padding:14px 20px;position:sticky;top:64px;z-index:50}
.mode-row{display:flex;gap:8px;justify-content:center;margin-bottom:12px}
.mode-btn{flex:1;max-width:200px;padding:9px 0;border-radius:10px;border:1.5px solid var(--bc);background:var(--bg2);color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;transition:var(--tr);font-family:'Outfit',sans-serif}
.mode-btn.active{background:linear-gradient(135deg,var(--accent-dark),var(--accent));color:#fff;border-color:transparent;box-shadow:0 4px 12px var(--accent-glow)}
.topic-scroll{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.topic-scroll::-webkit-scrollbar{display:none}
.topic-chip{white-space:nowrap;padding:6px 14px;border-radius:20px;border:1.5px solid var(--bc);background:var(--bg2);color:var(--text3);font-size:12px;font-weight:700;cursor:pointer;transition:var(--tr);font-family:'Outfit',sans-serif;flex-shrink:0}
.topic-chip:hover{border-color:var(--accent);color:var(--accent)}
.topic-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.shell{max-width:600px;margin:0 auto;padding:20px 18px 80px}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.stat-box{background:var(--card);border:1px solid var(--bc);border-radius:var(--r);padding:12px 10px;text-align:center}
.stat-box .val{font-size:20px;font-weight:900}
.stat-box .lbl{font-size:11px;color:var(--text3);margin-top:2px}
.stat-correct{color:var(--success)}.stat-wrong{color:var(--danger)}.stat-remain{color:var(--accent)}
.prog-strip{background:var(--card);border:1px solid var(--bc);border-radius:var(--r);padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.prog-label{font-size:13px;font-weight:700;color:var(--text2);white-space:nowrap}
.prog-track{flex:1;height:8px;background:var(--bg2);border-radius:8px;overflow:hidden}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent-light));border-radius:8px;transition:width .4s}
.q-card{background:var(--card);border:1px solid var(--bc);border-radius:20px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.q-header{background:linear-gradient(135deg,var(--accent-dark),var(--accent));padding:12px 18px;display:flex;align-items:center;justify-content:space-between}
.q-num{background:rgba(255,255,255,.2);border-radius:8px;padding:3px 10px;font-size:11px;font-weight:700;color:#fff}
.q-topic-badge{background:rgba(255,255,255,.15);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;color:#fff;border:1px solid rgba(255,255,255,.3)}
.q-text{padding:20px 18px 14px;font-size:15px;font-weight:700;color:var(--text);line-height:1.65;border-bottom:1px solid var(--bc);text-align:left;direction:ltr}
.options{padding:14px 18px 18px;display:flex;flex-direction:column;gap:10px}
.opt{display:flex;align-items:center;gap:12px;padding:13px 15px;border-radius:12px;border:1.5px solid var(--bc);background:var(--bg);cursor:pointer;font-size:14px;font-weight:600;color:var(--text);transition:var(--tr);user-select:none;direction:ltr;text-align:left}
.opt:hover:not(.disabled){border-color:var(--accent);background:var(--accent-glow);transform:translateX(3px)}
.opt-letter{width:28px;height:28px;border-radius:8px;flex-shrink:0;background:var(--bg2);border:1px solid var(--bc);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:var(--text3);transition:var(--tr)}
.opt.correct{border-color:var(--success);background:rgba(22,163,74,.08)}
.opt.correct .opt-letter{background:var(--success);color:#fff;border-color:var(--success)}
.opt.wrong{border-color:var(--danger);background:rgba(220,38,38,.07)}
.opt.wrong .opt-letter{background:var(--danger);color:#fff;border-color:var(--danger)}
.opt.disabled{pointer-events:none}
.feedback-bar{margin:14px 18px;padding:12px 16px;border-radius:12px;display:flex;align-items:center;gap:10px;font-size:14px;font-weight:700;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.feedback-bar.ok{background:rgba(22,163,74,.1);color:var(--success);border:1px solid rgba(22,163,74,.25)}
.feedback-bar.no{background:rgba(220,38,38,.08);color:var(--danger);border:1px solid rgba(220,38,38,.2)}
.feedback-icon{font-size:20px}
.nav-btns{padding:4px 18px 18px;display:flex;gap:10px}
.btn{flex:1;padding:13px;border:none;border-radius:12px;font-size:14px;font-weight:900;cursor:pointer;font-family:'Outfit',sans-serif;transition:var(--tr);display:flex;align-items:center;justify-content:center;gap:7px}
.btn-next{background:linear-gradient(135deg,var(--accent-dark),var(--accent));color:#fff;box-shadow:0 4px 14px var(--accent-glow)}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 6px 20px var(--accent-glow)}
.btn-skip{background:var(--bg2);color:var(--text2);border:1px solid var(--bc);flex:0 0 auto;padding:13px 18px}
.btn-skip:hover{border-color:var(--warn);color:var(--warn)}
.result-hero{text-align:center;padding:36px 20px 28px;background:var(--card);border-radius:20px;border:1px solid var(--bc);margin-bottom:20px;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.score-ring{width:110px;height:110px;border-radius:50%;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;flex-direction:column;border:5px solid var(--bg2);position:relative}
.score-ring svg{position:absolute;inset:-5px;width:calc(100% + 10px);height:calc(100% + 10px);transform:rotate(-90deg)}
.score-ring circle{fill:none;stroke-width:5;stroke-linecap:round}
.ring-bg{stroke:var(--bg2)}.ring-fill{stroke:var(--accent);transition:stroke-dashoffset 1s ease}
.score-num{font-size:28px;font-weight:900;color:var(--text)}.score-pct{font-size:12px;color:var(--text3)}
.result-grade{font-size:22px;font-weight:900;margin-bottom:6px}.result-sub{font-size:14px;color:var(--text2)}
.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:20px}
.rs{background:var(--bg2);border-radius:10px;padding:12px 8px;text-align:center}
.rs .n{font-size:20px;font-weight:900}.rs .l{font-size:11px;color:var(--text3)}
.report-item{background:var(--card);border:1px solid var(--bc);border-radius:14px;padding:16px;margin-bottom:10px;border-right:4px solid var(--bc)}
.report-item.ok{border-right-color:var(--success)}.report-item.no{border-right-color:var(--danger)}
.report-item .ri-q{font-size:13px;font-weight:700;margin-bottom:8px}
.report-item .ri-row{display:flex;align-items:center;gap:8px;font-size:12px;margin-top:5px;color:var(--text2)}
.ri-badge{padding:2px 8px;border-radius:6px;font-weight:700;font-size:11px;flex-shrink:0}
.ri-yours{background:rgba(220,38,38,.1);color:var(--danger)}.ri-right{background:rgba(22,163,74,.1);color:var(--success)}
.result-actions{display:flex;flex-direction:column;gap:10px;margin-top:20px}
.btn-retry{background:linear-gradient(135deg,var(--accent-dark),var(--accent));color:#fff}
.btn-retry:hover{transform:translateY(-2px);box-shadow:0 6px 20px var(--accent-glow)}
.btn-home{background:var(--bg2);color:var(--text);border:1px solid var(--bc)}
.btn-home:hover{border-color:var(--accent);color:var(--accent)}
footer{background:var(--bg2);border-top:1px solid var(--bc);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.footer-brand{font-size:14px;font-weight:700}.footer-brand span{color:var(--accent)}
.footer-tg{display:flex;align-items:center;gap:5px;text-decoration:none;color:#229ED9;font-size:12px;font-weight:600}
@media(max-width:480px){nav{padding:0 14px}.shell{padding:14px 12px 60px}.control-bar{padding:10px 14px}}
</style>
</head>

const TOPIC_KEYS = ['All', 'Question Bank', 'Activity 1', 'Activity 2'];
const LETTERS = ['A','B','C','D','E','F'];
let mode = 'practice';
let selectedTopic = 'All';
let questions = [], i = 0, correct = 0, wrong = 0;
let answers = [], wrongSet = [], answered = 0;

function getPool() {
  if (selectedTopic === 'All') return [...ALL_QUESTIONS];
  return ALL_QUESTIONS.filter(q => q.topic === selectedTopic);
}

function shuffle(arr) {
  const a = [...arr];
  for (let j = a.length-1; j>0; j--) {
    const k = Math.floor(Math.random()*(j+1));
    [a[j],a[k]] = [a[k],a[j]];
  }
  return a;
}

function buildTopics() {
  const sc = document.getElementById('topicScroll');
  sc.innerHTML = '';
  TOPIC_KEYS.forEach(t => {
    const count = t==='All' ? ALL_QUESTIONS.length : ALL_QUESTIONS.filter(q=>q.topic===t).length;
    const btn = document.createElement('button');
    btn.className = 'topic-chip' + (t===selectedTopic?' active':'');
    btn.textContent = t + ' (' + count + ')';
    btn.onclick = () => { selectedTopic = t; buildTopics(); startQuiz(); };
    sc.appendChild(btn);
  });
}

function startQuiz() {
  questions = shuffle(getPool());
  i = 0; correct = 0; wrong = 0;
  answers = new Array(questions.length).fill(null);
  wrongSet = []; answered = 0;
  document.getElementById('totalBadge').textContent = questions.length + ' Questions';
  document.getElementById('prog-bar').style.width = '0%';
  updateTop(); render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateTop() {
  const total = questions.length;
  document.getElementById('sCorrect').textContent = correct;
  document.getElementById('sWrong').textContent = wrong;
  const rem = total - answered;
  document.getElementById('sRemain').textContent = Math.round((rem/total)*100) + '%';
  document.getElementById('progLabel').textContent = 'Q ' + (i+1) + ' / ' + total;
  document.getElementById('progFill').style.width = ((i+1)/total*100) + '%';
  document.getElementById('prog-bar').style.width = ((i+1)/total*100) + '%';
}

function render() {
  updateTop();
  const q = questions[i];
  const alreadyAnswered = answers[i] !== null;

  let optionsHTML = q.o.map((o, idx) => {
    let cls = '';
    if (alreadyAnswered) {
      if (idx === q.a) cls = 'correct';
      else if (idx === answers[i]) cls = 'wrong';
    }
    return `<div class="opt ${cls} ${alreadyAnswered?'disabled':''}" onclick="choose(${idx})">
      <div class="opt-letter">${LETTERS[idx]||idx+1}</div>${o}
    </div>`;
  }).join('');

  let extraHTML = '';
  if (alreadyAnswered) {
    const ok = answers[i] === q.a;
    extraHTML = `<div class="feedback-bar ${ok?'ok':'no'}">
      <span class="feedback-icon">${ok?'🎉':'😔'}</span>
      <span>${ok ? 'Correct! Well done 🌟' : 'Wrong — check the answer above'}</span>
    </div>`;
  }

  const isLast = i === questions.length - 1;
  let navHTML = '';
  if (!alreadyAnswered) {
    navHTML = `<div class="nav-btns"><button class="btn btn-skip" onclick="skip()"><i class="fa-solid fa-forward"></i> Skip</button></div>`;
  } else {
    navHTML = `<div class="nav-btns"><button class="btn btn-next" onclick="next()">
      ${isLast ? '<i class="fa-solid fa-flag-checkered"></i> Finish' : 'Next <i class="fa-solid fa-arrow-right"></i>'}
    </button></div>`;
  }

  document.getElementById('app').innerHTML = `
    <div class="q-card">
      <div class="q-header">
        <div class="q-num">Q ${i+1} / ${questions.length}</div>
        <div class="q-topic-badge">${q.topic}</div>
      </div>
      <div class="q-text">${q.t}</div>
      <div class="options">${optionsHTML}</div>
      ${extraHTML}${navHTML}
    </div>`;
}

function choose(v) {
  if (answers[i] !== null) return;
  answers[i] = v; answered++;
  const ok = v === questions[i].a;
  ok ? correct++ : wrong++;
  updateTop();
  render();
}

function skip() {
  if (answers[i] === null) { answers[i] = -1; answered++; wrong++; updateTop(); }
  next();
}

function next() {
  if (i < questions.length - 1) { i++; render(); window.scrollTo({top:0,behavior:'smooth'}); }
  else finish();
}

function finish() {
  const total = questions.length;
  const score = Math.round((correct/total)*100);
  let wSet = [];
  questions.forEach((q,idx) => { if (answers[idx] !== q.a) wSet.push({...q, myAns:answers[idx]}); });
  wSet = [...new Map(wSet.map(q=>[q.t,q])).values()];
  wrongSet = wSet;

  let grade, gradeColor;
  if (score>=90){grade='🥇 Excellent';gradeColor='var(--success)'}
  else if(score>=75){grade='🥈 Very Good';gradeColor='var(--accent)'}
  else if(score>=60){grade='🥉 Good';gradeColor='var(--warn)'}
  else{grade='📚 Keep Studying';gradeColor='var(--danger)'}

  const circ = 2*Math.PI*45, offset = circ-(score/100)*circ;
  const report = questions.map((q,idx)=>{
    const ok = answers[idx]===q.a;
    return `<div class="report-item ${ok?'ok':'no'}">
      <div class="ri-q">${ok?'✅':'❌'} ${q.t}</div>
      ${!ok?`
        <div class="ri-row"><span class="ri-badge ri-yours">Your Answer</span>${answers[idx]>=0?q.o[answers[idx]]:'Skipped'}</div>
        <div class="ri-row"><span class="ri-badge ri-right">Correct</span>${q.o[q.a]}</div>`:''}
    </div>`;
  }).join('');

  document.getElementById('prog-bar').style.width = '100%';
  document.getElementById('app').innerHTML = `
    <div class="result-hero">
      <div class="score-ring">
        <svg viewBox="0 0 110 110">
          <circle class="ring-bg" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="0"/>
          <circle class="ring-fill" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="${circ}" style="stroke:${gradeColor}" id="ringFill"/>
        </svg>
        <div class="score-num">${score}</div><div class="score-pct">%</div>
      </div>
      <div class="result-grade" style="color:${gradeColor}">${grade}</div>
      <div class="result-sub">Answered ${answered} of ${total} questions</div>
      <div class="result-stats">
        <div class="rs"><div class="n" style="color:var(--success)">${correct}</div><div class="l">Correct</div></div>
        <div class="rs"><div class="n" style="color:var(--danger)">${wrong}</div><div class="l">Wrong</div></div>
        <div class="rs"><div class="n" style="color:var(--accent)">${total-answered<0?0:total-answered}</div><div class="l">Skipped</div></div>
      </div>
    </div>
    <div class="result-actions">
      ${wrongSet.length?`<button class="btn btn-retry" onclick="retryWrong()"><i class="fa-solid fa-rotate-right"></i> Retry Wrong (${wrongSet.length})</button>`:''}
      <button class="btn btn-home" onclick="startQuiz()"><i class="fa-solid fa-shuffle"></i> New Random Quiz</button>
    </div>
    <div style="margin-top:28px"><div style="font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text2)">📋 Detailed Report</div>${report}</div>`;
  setTimeout(()=>{document.getElementById('ringFill').style.strokeDashoffset=offset},100);
  window.scrollTo({top:0,behavior:'smooth'});
}

function retryWrong() {
  questions = shuffle([...wrongSet]); i=0; correct=0; wrong=0;
  answers = new Array(questions.length).fill(null);
  wrongSet=[]; answered=0;
  document.getElementById('totalBadge').textContent = questions.length + ' Questions';
  updateTop(); render();
  window.scrollTo({top:0,behavior:'smooth'});
}

const themeBtn = document.getElementById('themeBtn');
let theme = localStorage.getItem('theme')||'light';
function applyTheme(t){theme=t;document.documentElement.setAttribute('data-theme',t==='dark'?'dark':'');themeBtn.textContent=t==='dark'?'☀️':'🌙';localStorage.setItem('theme',t)}
applyTheme(theme);
themeBtn.addEventListener('click',()=>applyTheme(theme==='dark'?'light':'dark'));

buildTopics();
startQuiz();
</script>
