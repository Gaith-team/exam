<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> GAITH TEAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent:       #16a34a;
  --accent-light: #22c55e;
  --accent-dark:  #15803d;
  --accent-glow:  rgba(22,163,74,0.18);
  --bg:      #f8fafc;
  --bg2:     #eef2f7;
  --card:    #ffffff;
  --text:    #1a2332;
  --text2:   #4a5568;
  --text3:   #718096;
  --bc:      rgba(0,0,0,0.07);
  --success: #16a34a;
  --danger:  #dc2626;
  --warn:    #d97706;
  --r:       16px;
  --tr:      all 0.3s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg:   #0d1117; --bg2: #161b22; --card: #1c2333;
  --text: #e6edf3; --text2: #b1bac4; --text3: #7d8590;
  --bc:   rgba(255,255,255,0.08);
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
  transition: background .4s, color .4s;
}

/* PROGRESS TOP */
#prog-bar {
  position: fixed; top: 0; left: 0; height: 3px; z-index: 999;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  transition: width .2s;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 64px;
  background: rgba(248,250,252,.93); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--bc); transition: var(--tr);
}
[data-theme="dark"] nav { background: rgba(13,17,23,.95); }

.nav-back {
  display: flex; align-items: center; gap: 7px;
  color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 700;
  padding: 7px 13px; border-radius: 8px; border: 1px solid var(--bc);
  background: var(--card); transition: var(--tr);
}
.nav-back:hover { color: var(--accent); border-color: var(--accent-glow); transform: translateX(3px); }
.nav-brand { display: flex; align-items: center; gap: 9px; font-size: 15px; font-weight: 900; color: var(--text); }
.nav-logo-icon {
  width: 34px; height: 34px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 900;
}
.nav-right { display: flex; align-items: center; gap: 8px; }
.theme-btn {
  width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--bc);
  background: var(--card); cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center; transition: var(--tr);
}
.theme-btn:hover { border-color: var(--accent); transform: rotate(20deg); }

/* HERO BAND */
.hero-band {
  margin-top: 64px;
  background: linear-gradient(135deg, var(--accent-dark), var(--accent), var(--accent-light));
  padding: 40px 24px 36px; text-align: center;
  position: relative; overflow: hidden;
}
.hero-band::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 600px 200px at 50% 100%, rgba(255,255,255,.12) 0%, transparent 70%);
}
.hero-band-icon {
  width: 68px; height: 68px; border-radius: 20px;
  background: rgba(255,255,255,.2); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; margin: 0 auto 14px; border: 1.5px solid rgba(255,255,255,.35);
}
.hero-band h1 { font-size: clamp(20px,4vw,30px); font-weight: 900; color: #fff; margin-bottom: 6px; }
.hero-band p { font-size: 13px; color: rgba(255,255,255,.8); }
.hero-band-meta {
  display: flex; justify-content: center; gap: 24px; margin-top: 20px;
  flex-wrap: wrap;
}
.meta-pill {
  background: rgba(255,255,255,.18); backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,.3); border-radius: 50px;
  padding: 6px 16px; font-size: 12px; font-weight: 700; color: #fff;
  display: flex; align-items: center; gap: 6px;
}

/* EXAM SHELL */
.shell { max-width: 560px; margin: 0 auto; padding: 24px 20px 80px; }

/* STATS ROW */
.stats-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px;
}
.stat-box {
  background: var(--card); border: 1px solid var(--bc); border-radius: var(--r);
  padding: 12px 10px; text-align: center;
}
.stat-box .val { font-size: 20px; font-weight: 900; }
.stat-box .lbl { font-size: 11px; color: var(--text3); margin-top: 2px; }
.stat-correct { color: var(--success); }
.stat-wrong   { color: var(--danger); }
.stat-remain  { color: var(--accent); }

/* PROGRESS STRIP */
.prog-strip {
  background: var(--card); border: 1px solid var(--bc); border-radius: var(--r);
  padding: 14px 16px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 14px;
}
.prog-label { font-size: 13px; font-weight: 700; color: var(--text2); white-space: nowrap; }
.prog-track { flex: 1; height: 8px; background: var(--bg2); border-radius: 8px; overflow: hidden; }
.prog-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  border-radius: 8px; transition: width .4s;
}
.timer-badge {
  min-width: 64px; height: 36px; border-radius: 18px;
  background: var(--bg2); border: 1px solid var(--bc);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 900; color: var(--text);
  gap: 5px; padding: 0 12px; flex-shrink: 0;
}
.timer-badge.warn { color: var(--warn); border-color: rgba(217,119,6,.3); background: rgba(217,119,6,.08); }
.timer-badge.danger { color: var(--danger); border-color: rgba(220,38,38,.3); background: rgba(220,38,38,.08); animation: pulse .8s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

/* QUESTION CARD */
.q-card {
  background: var(--card); border: 1px solid var(--bc);
  border-radius: 20px; overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,.06);
  transition: box-shadow .3s;
}
.q-header {
  background: linear-gradient(135deg, var(--accent-dark), var(--accent));
  padding: 4px 18px 4px;
  display: flex; align-items: center; gap: 8px;
}
.q-num {
  background: rgba(255,255,255,.2); border-radius: 8px;
  padding: 3px 10px; font-size: 11px; font-weight: 700; color: #fff;
}
.q-text {
  padding: 22px 18px 14px; font-size: 15px; font-weight: 700; color: var(--text);
  line-height: 1.65; border-bottom: 1px solid var(--bc);
  text-align: left; direction: ltr;
}
.options { padding: 14px 18px 18px; display: flex; flex-direction: column; gap: 10px; }

/* OPTION */
.opt {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; border-radius: 12px;
  border: 1.5px solid var(--bc); background: var(--bg);
  cursor: pointer; font-size: 14px; font-weight: 600; color: var(--text);
  transition: var(--tr); user-select: none;
  direction: ltr; text-align: left;
}
.opt:hover:not(.disabled) {
  border-color: var(--accent); background: var(--accent-glow);
  transform: translateX(3px);
}
.opt-letter {
  width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
  background: var(--bg2); border: 1px solid var(--bc);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 900; color: var(--text3);
  transition: var(--tr);
}
.opt.correct {
  border-color: var(--success); background: rgba(22,163,74,.08);
}
.opt.correct .opt-letter {
  background: var(--success); color: #fff; border-color: var(--success);
}
.opt.wrong {
  border-color: var(--danger); background: rgba(220,38,38,.07);
}
.opt.wrong .opt-letter {
  background: var(--danger); color: #fff; border-color: var(--danger);
}
.opt.disabled { pointer-events: none; }

/* FEEDBACK */
.feedback-bar {
  margin: 14px 18px; padding: 12px 16px; border-radius: 12px;
  display: flex; align-items: center; gap: 10px;
  font-size: 14px; font-weight: 700;
  animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
.feedback-bar.ok { background: rgba(22,163,74,.1); color: var(--success); border: 1px solid rgba(22,163,74,.25); }
.feedback-bar.no { background: rgba(220,38,38,.08); color: var(--danger); border: 1px solid rgba(220,38,38,.2); }
.feedback-icon { font-size: 20px; }

/* EXPLANATION */
.explanation {
  margin: 0 18px 14px; padding: 12px 14px;
  background: rgba(22,163,74,.05);
  border-radius: 10px; border-left: 3px solid var(--accent);
  font-size: 13px; color: var(--text2); line-height: 1.6;
}

/* NAV BTNS */
.nav-btns { padding: 4px 18px 18px; display: flex; gap: 10px; }
.btn {
  flex: 1; padding: 13px; border: none; border-radius: 12px;
  font-size: 14px; font-weight: 900; cursor: pointer;
  font-family: 'Outfit', sans-serif; transition: var(--tr);
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.btn-next {
  background: linear-gradient(135deg, var(--accent-dark), var(--accent));
  color: #fff; box-shadow: 0 4px 14px var(--accent-glow);
}
.btn-next:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
.btn-skip {
  background: var(--bg2); color: var(--text2); border: 1px solid var(--bc); flex: 0 0 auto; padding: 13px 18px;
}
.btn-skip:hover { border-color: var(--warn); color: var(--warn); }

/* ===== RESULTS ===== */
.result-hero {
  text-align: center; padding: 36px 20px 28px;
  background: var(--card); border-radius: 20px;
  border: 1px solid var(--bc); margin-bottom: 20px;
  box-shadow: 0 4px 20px rgba(0,0,0,.06);
}
.score-ring {
  width: 110px; height: 110px; border-radius: 50%; margin: 0 auto 18px;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; border: 5px solid var(--bg2);
  position: relative;
}
.score-ring svg { position: absolute; inset: -5px; width: calc(100% + 10px); height: calc(100% + 10px); transform: rotate(-90deg); }
.score-ring circle { fill: none; stroke-width: 5; stroke-linecap: round; }
.ring-bg { stroke: var(--bg2); }
.ring-fill { stroke: var(--accent); transition: stroke-dashoffset 1s ease; }
.score-num { font-size: 28px; font-weight: 900; color: var(--text); }
.score-pct { font-size: 12px; color: var(--text3); }
.result-grade { font-size: 22px; font-weight: 900; margin-bottom: 6px; }
.result-sub { font-size: 14px; color: var(--text2); }
.result-stats {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 20px;
}
.rs { background: var(--bg2); border-radius: 10px; padding: 12px 8px; text-align: center; }
.rs .n { font-size: 20px; font-weight: 900; }
.rs .l { font-size: 11px; color: var(--text3); }

/* REPORT ITEMS */
.report-item {
  background: var(--card); border: 1px solid var(--bc); border-radius: 14px;
  padding: 16px; margin-bottom: 10px; border-right: 4px solid var(--bc);
}
.report-item.ok { border-right-color: var(--success); }
.report-item.no { border-right-color: var(--danger); }
.report-item .ri-q { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
.report-item .ri-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; margin-top: 5px; color: var(--text2);
}
.ri-badge {
  padding: 2px 8px; border-radius: 6px; font-weight: 700; font-size: 11px; flex-shrink: 0;
}
.ri-yours { background: rgba(220,38,38,.1); color: var(--danger); }
.ri-right { background: rgba(22,163,74,.1); color: var(--success); }

.result-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
.btn-retry { background: linear-gradient(135deg, var(--accent-dark), var(--accent)); color: #fff; }
.btn-retry:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
.btn-home { background: var(--bg2); color: var(--text); border: 1px solid var(--bc); }
.btn-home:hover { border-color: var(--accent); color: var(--accent); }

/* FOOTER */
footer {
  background: var(--bg2); border-top: 1px solid var(--bc);
  padding: 22px 24px; display: flex; align-items: center;
  justify-content: space-between; flex-wrap: wrap; gap: 10px;
}
.footer-brand { font-size: 14px; font-weight: 700; }
.footer-brand span { color: var(--accent); }
.footer-tg { display: flex; align-items: center; gap: 5px; text-decoration: none; color: #229ED9; font-size: 12px; font-weight: 600; }

@media (max-width: 480px) {
  nav { padding: 0 14px; }
  .shell { padding: 16px 14px 60px; }
  .nav-brand span { display: none; }
  .hero-band { padding: 30px 16px 28px; }
}
</style>
</head>
<body>

<div id="prog-bar" style="width:0%"></div>

<nav>
  <a href="https://gaith-team.github.io/exam/level1/health-education/index.html" class="nav-back"><i class="fa-solid fa-arrow-right"></i> Back</a>
  <div class="nav-brand">
    <div class="nav-logo-icon">GT</div>
    <span>GAITH TEAM</span>
  </div>
  <div class="nav-right">
    <button class="theme-btn" id="themeBtn">🌙</button>
  </div>
</nav>

<div class="hero-band">
  <div class="hero-band-icon">📢</div>
  <h1>التثقيف والتوعية الصحية</h1>
  <p> Principles of Health Education</p>
  <div class="hero-band-meta">
    <div class="meta-pill"><i class="fa-solid fa-list-ol"></i> <span id="totalBadge">-- Questions</span></div>
    <div class="meta-pill"><i class="fa-solid fa-clock"></i> 35 Min</div>
    <div class="meta-pill"><i class="fa-solid fa-shuffle"></i> Shuffled</div>
  </div>
</div>

<div class="shell">
  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="val stat-correct" id="sCorrect">0</div>
      <div class="lbl">✔ Correct</div>
    </div>
    <div class="stat-box">
      <div class="val stat-wrong" id="sWrong">0</div>
      <div class="lbl">✖ Wrong</div>
    </div>
    <div class="stat-box">
      <div class="val stat-remain" id="sRemain">--%</div>
      <div class="lbl">⏳ Remaining</div>
    </div>
  </div>

  <!-- PROGRESS STRIP -->
  <div class="prog-strip">
    <div class="prog-label" id="progLabel">Q 1</div>
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <div class="timer-badge" id="timerBadge"><i class="fa-regular fa-clock"></i> <span id="timerTxt">35:00</span></div>
  </div>

  <!-- APP -->
  <div id="app"></div>
</div>

<footer>
  <div class="footer-brand">GHAITH <span>TEAM</span></div>
  <a href="https://t.me/nursing2bu" target="_blank" class="footer-tg">
    <i class="fa-brands fa-telegram"></i> @nursing2bu
  </a>
</footer>

<script>
const QUESTIONS = [
  // ── EASY MCQ ──────────────────────────────────────────────
  {t:"Health education is best described as:",
   o:["A one-time activity for sick patients","A continuous process from childhood throughout life","Only for adults with chronic diseases","A process limited to hospital settings"],
   a:1, exp:"Health education starts from childhood and continues throughout life — it is never a one-time event."},

  {t:"The PRIMARY aim of health education is to:",
   o:["Treat existing diseases","Train medical professionals","Prevent disease and promote healthy living","Manage hospital resources"],
   a:2, exp:"The main aim focuses on disease prevention and healthy living rather than treatment alone."},

  {t:"Which of the following is an example of health education being a continuous process?",
   o:["Giving a single lecture on nutrition","Teaching hygiene in school and reinforcing it in adulthood","Treating a patient once and discharging them","Distributing medicines at a clinic"],
   a:1, exp:"Repeating and reinforcing health messages at different life stages demonstrates the continuity principle."},

  {t:"Teaching a balanced diet to prevent malnutrition is an example of which general principle?",
   o:["Interdisciplinary cooperation","Continuous process","Prevention and health promotion","Use of scientific knowledge"],
   a:2, exp:"This example directly illustrates focusing on prevention and health promotion rather than treatment."},

  {t:"According to the basic principles, people learn better when:",
   o:["They are lectured to without interruption","The topic is relevant to their health problem or daily life","Complex medical terminology is used","Education is provided only in hospitals"],
   a:1, exp:"The principle of Interest states that teaching should focus on the learner's own health needs, not unrelated topics."},

  {t:"Which basic principle states that important messages should be repeated using different methods?",
   o:["Motivation","Repetition","Feedback","Trust"],
   a:1, exp:"Repetition ensures information is retained; using different methods (talking, pictures, leaflets) reinforces it further."},

  {t:"Using simple language instead of medical jargon during health education relates to the principle of:",
   o:["Trust","Repetition","Understanding","Feedback"],
   a:2, exp:"Understanding requires simple, age-appropriate, culturally sensitive language rather than technical medical terms."},

  {t:"The principle of 'Learning by Doing' involves:",
   o:["Watching videos only","Demonstration followed by return demonstration","Reading pamphlets","Attending group lectures"],
   a:1, exp:"Show the skill (demonstration) then let the learner practise it themselves (return demonstration)."},

  {t:"Teaching wound care by letting the patient perform it under supervision is an example of:",
   o:["Motivation","Feedback","Learning by Doing","Repetition"],
   a:2, exp:"Supervised hands-on practice is the essence of the 'Learning by Doing' principle."},

  {t:"Which principle emphasises that nurses must be honest and that information should come from scientific sources?",
   o:["Interest","Motivation","Trust","Participation"],
   a:2, exp:"Trust requires scientifically accurate, honest information — patients who trust the nurse are more willing to listen and follow advice."},

  {t:"Encouraging a patient to stop smoking targets which general principle?",
   o:["Focuses on prevention","Encourages behavior change","Continuous process","Uses scientific knowledge"],
   a:1, exp:"Behaviour change — moving from unhealthy to healthy practices — is the core of this general principle."},

  {t:"Family and community participation in health education is highlighted in the principle of:",
   o:["Interdisciplinary cooperation","Using available resources","Involves individuals, families, and communities","Continuous process"],
   a:2, exp:"Health education benefits improve significantly when families and communities participate together."},

  {t:"Using local health centres for education sessions reflects the principle of:",
   o:["Involving communities","Using available resources wisely","Interdisciplinary cooperation","Evidence-based knowledge"],
   a:1, exp:"Efficient use of existing human and material resources is the hallmark of this principle."},

  {t:"Which of the following best describes 'interdisciplinary cooperation' in health education?",
   o:["A nurse teaching patients alone","Teamwork among nurses, doctors, and health educators","Using only printed materials","Limiting education to one session"],
   a:1, exp:"Effective health education requires collaborative teamwork across different health professions, as shown in school health programmes."},

  {t:"Asking a patient to explain how to take their medication at discharge is an example of:",
   o:["Motivation","Trust","Learning by Doing","Feedback and Evaluation"],
   a:3, exp:"Assessing understanding through questions is the essence of the Feedback and Evaluation principle."},

  // ── MEDIUM MCQ ───────────────────────────────────────────
  {t:"Which statement best differentiates the GENERAL principles from the BASIC principles of health education?",
   o:["General principles focus on the nurse's skills; basic principles focus on policy","General principles provide a broad planning framework; basic principles guide the teaching–learning process","General principles are for hospitals only; basic principles are for communities","They are identical in meaning and application"],
   a:1, exp:"General principles = broad framework for planning and evaluation; Basic principles = guide the nurse-learner teaching process specifically."},

  {t:"A nurse says 'high blood pressure' instead of 'hypertension' when educating a patient. Which principle is being applied?",
   o:["Repetition","Motivation","Understanding","Trust"],
   a:2, exp:"Using lay language rather than medical jargon ensures the patient truly understands the message — a core element of the Understanding principle."},

  {t:"Which of the following is NOT a characteristic of the principle of 'Trust' in health education?",
   o:["Information from scientific sources","Nurse being honest and confident","Using fear to make patients comply","Maintaining correct information"],
   a:2, exp:"Trust is built through honesty and accuracy. Using fear to coerce compliance violates this principle — reducing fear is part of Motivation instead."},

  {t:"A diabetic patient is taught specifically about diet management rather than general health. This BEST illustrates:",
   o:["Repetition","Interest","Motivation","Cultural acceptability"],
   a:1, exp:"Targeting the patient's specific condition keeps the topic relevant and meaningful, which maintains Interest and improves learning."},

  {t:"Letting a mother practise breastfeeding rather than only explaining it relates to:",
   o:["Feedback","Motivation","Participation (Active Learning)","Understanding"],
   a:2, exp:"Participation means learners do, not just listen — discussions, demonstrations, and hands-on practice are all part of active learning."},

  {t:"Explaining how handwashing prevents infection to encourage patients to practise it is an application of:",
   o:["Understanding","Trust","Motivation","Repetition"],
   a:2, exp:"Motivation involves explaining the benefits of healthy behaviour, giving learners a personal reason to change."},

  {t:"Which element is NOT part of the basic principle of 'Understanding'?",
   o:["Use simple language","Consider age and culture","Use pictures and charts","Repeat the message several times"],
   a:3, exp:"Repetition is a separate basic principle. Understanding focuses on clear, simple language, visual aids, and considering the learner's background."},

  {t:"A nurse uses talking, pictures, and leaflets to deliver the same health message. Which principle is being followed?",
   o:["Participation","Repetition","Feedback","Motivation"],
   a:1, exp:"Repetition recommends reinforcing key messages through various formats to prevent forgetting."},

  {t:"According to evidence-based knowledge principles, health education information should be:",
   o:["Based on traditional beliefs","Up to date and scientifically approved","Simplified and never explained in full","Shared only by doctors"],
   a:1, exp:"Scientific, current, and research-backed information is mandatory. False or outdated beliefs must be avoided."},

  {t:"Respecting cultural food habits when giving nutritional advice applies which basic principle?",
   o:["Understanding","Trust","Culturally Acceptable and Respectful","Suitable to age and educational level"],
   a:2, exp:"Cultural acceptability demands that teaching respects beliefs, values, and cultural practices of the learner to be effective."},

  {t:"Which of the following BEST describes the principle of 'Good Human Relations' in health education?",
   o:["Giving as much information as possible quickly","Being kind, respectful, patient, and empathetic","Ensuring strict compliance with instructions","Limiting interaction to professional topics only"],
   a:1, exp:"A positive nurse-patient relationship built on kindness, respect, and empathy creates an environment where learning flourishes."},

  {t:"When teaching children compared to adults, the nurse should PRIMARILY:",
   o:["Use the same language for consistency","Use detailed explanations for children only","Use stories and pictures for children; detailed explanations for adults","Avoid any visual aids regardless of age"],
   a:2, exp:"The principle 'Suitable to age and educational level' requires different methods: stories/pictures for children, detailed explanations for adults."},

  {t:"Teaching immunisation schedules based on WHO-approved data illustrates:",
   o:["Community involvement","Evidence-based and scientific knowledge","Interdisciplinary cooperation","Cultural acceptability"],
   a:1, exp:"Using WHO-approved, scientifically validated information exemplifies the evidence-based knowledge general principle."},

  {t:"Knowledge alone is NOT enough in health education because:",
   o:["Patients cannot retain knowledge","Attitude and practice must also change for behaviour to improve","Nurses have limited knowledge","Communities resist education"],
   a:1, exp:"The 'Encourages Behaviour Change' principle states that knowledge must translate into changes in attitude and practice to be meaningful."},

  {t:"A school health programme involving nurses, doctors, and educators is an example of:",
   o:["Community participation","Interdisciplinary cooperation","Continuous process","Using resources wisely"],
   a:1, exp:"School health programmes demonstrate collaboration across disciplines — the defining feature of interdisciplinary cooperation."},

  {t:"During feedback and evaluation, the nurse should correct patient mistakes:",
   o:["Harshly to emphasise the importance","Gently and constructively","Only in writing","By repeating the lecture"],
   a:1, exp:"Gentle, constructive correction preserves the nurse-patient relationship and maintains the learner's motivation to improve."},

  {t:"Repeating medication instructions before a patient's discharge PRIMARILY applies which principle?",
   o:["Feedback and evaluation","Learning by doing","Repetition","Motivation"],
   a:2, exp:"Repeating critical information before discharge ensures retention of important medication guidance, preventing errors at home."},

  {t:"Which of the following correctly pairs a principle with its example?",
   o:["Motivation – using pictures and charts","Repetition – letting a patient practise wound care","Trust – giving correct vaccination information","Understanding – asking a patient questions after teaching"],
   a:2, exp:"Providing accurate vaccination information builds Trust. The other pairings mix up principles and their correct examples."},

  // ── HARD MCQ ──────────────────────────────────────────────
  {t:"A nurse teaches an elderly illiterate farmer about hypertension using pictures and simple words. Which TWO principles are MOST prominently applied?",
   o:["Trust and Repetition","Understanding and Suitable to age/educational level","Motivation and Feedback","Interest and Interdisciplinary cooperation"],
   a:1, exp:"Adapting language and using visuals = Understanding; adjusting the approach for the learner's age and literacy = Suitable to age and educational level."},

  {t:"Which of the following scenarios VIOLATES a basic principle of health education?",
   o:["Using translated leaflets for a non-Arabic-speaking patient","Correcting patient errors only in front of the whole group without sensitivity","Asking a patient to demonstrate insulin injection after teaching","Assessing a patient's cultural beliefs before teaching diet"],
   a:1, exp:"Publicly and insensitively correcting mistakes violates both Good Human Relations (respect/empathy) and undermines Trust."},

  {t:"A nurse notices a patient passively listens and never asks questions. The MOST appropriate response based on basic principles is:",
   o:["Continue the lecture — listening is sufficient","Provide only written materials","Encourage questions, discussions, and return demonstrations","Reduce the session length"],
   a:2, exp:"Passive listening contradicts the Participation (Active Learning) principle, which requires engagement through questions, discussions, and practice."},

  {t:"A community nurse has a limited budget and staff. According to general principles, the BEST approach is to:",
   o:["Cancel education sessions until more funds are available","Invite international experts exclusively","Use existing local health centres and available staff efficiently","Wait for government funding"],
   a:2, exp:"'Uses Available Resources Wisely' promotes efficient use of existing time, money, and facilities rather than inaction."},

  {t:"Which combination of basic principles is MOST critical for teaching insulin self-injection to a newly diagnosed diabetic?",
   o:["Trust, Repetition, and Understanding","Motivation, Learning by Doing, and Feedback & Evaluation","Cultural acceptability, Interest, and Continuous process","Interdisciplinary cooperation, Resources, and Behaviour change"],
   a:1, exp:"Motivation (reason to learn), hands-on practice (Learning by Doing), and checking competence (Feedback) are essential for teaching psychomotor skills."},

  {t:"General principles of health education are PRIMARILY used by nurses to:",
   o:["Evaluate individual patient knowledge only","Plan, implement, and evaluate health education activities systematically","Design pharmaceutical treatments","Manage ward schedules"],
   a:1, exp:"General principles provide the broad framework for systematic planning, implementation, and evaluation of health education activities."},

  {t:"A nurse teaches a patient about low-fat diet but the patient's culture strongly associates fatty foods with celebration. The MOST effective response is to:",
   o:["Insist the patient must change regardless of culture","Ignore the cultural issue and repeat the same message","Respect cultural beliefs and adapt advice using culturally acceptable alternatives","Stop providing education to avoid conflict"],
   a:2, exp:"Cultural Acceptability requires adapting teaching to cultural values while still promoting health — not overriding or ignoring them."},

  {t:"According to the general principles, which of the following actions would be LEAST appropriate in health education?",
   o:["Tailoring content to community needs","Presenting outdated information because it is widely believed","Using scientific and evidence-based data","Involving families in chronic disease education"],
   a:1, exp:"Evidence-based knowledge explicitly requires up-to-date, scientifically approved information. Using outdated or false beliefs is a direct violation."},

  {t:"During evaluation, a nurse observes a patient still practising incorrect hand hygiene after previous teaching. The BEST next step is:",
   o:["Document the failure and move on","Discharge the patient — re-teaching is not a nurse's role","Repeat teaching using different methods and allow the patient to practise again","Refer the patient to a doctor for behaviour modification"],
   a:2, exp:"Repetition (varied methods) + Feedback/Evaluation + Learning by Doing should all be applied when the first teaching attempt is insufficient."},

  {t:"Which statement MOST accurately describes the relationship between 'Motivation' and 'Behaviour Change'?",
   o:["Motivation and behaviour change are unrelated","Behaviour change can occur without motivation as long as knowledge is given","Motivation provides the reason to change, making actual behaviour change more likely","Behaviour change is a prerequisite for motivation"],
   a:2, exp:"Motivation (explaining benefits, reducing fear) is the internal driver that bridges knowledge and actual behavioural change."},

  {t:"A health educator delivers a 45-minute lecture using only verbal instructions, no visuals or practice. Which MULTIPLE basic principles are being neglected?",
   o:["Only Repetition","Understanding, Participation, and Learning by Doing","Trust and Motivation only","Feedback and Cultural acceptability only"],
   a:1, exp:"Omitting visual aids neglects Understanding; no learner involvement neglects Participation; no hands-on practice neglects Learning by Doing."},

  {t:"The statement 'basic principles improve knowledge, skills, and healthy behaviours' suggests they address which THREE domains of learning?",
   o:["Spiritual, emotional, and physical","Cognitive, affective, and psychomotor","Administrative, clinical, and social","Personal, community, and national"],
   a:1, exp:"Cognitive (knowledge), affective (attitudes/behaviours), and psychomotor (skills/practice) are the three classic learning domains addressed."},

  // ── TRUE / FALSE ──────────────────────────────────────────
  {t:" Health education is a one-time activity that should be delivered only when a patient is ill.",
   o:["True","False"],
   a:1, exp:"Health education is a CONTINUOUS process starting from childhood and reinforced throughout life — never a single event."},

  {t:"The main focus of health education is on prevention and health promotion, not just treatment.",
   o:["True","False"],
   a:0, exp:"Correct — emphasis is placed on healthy habits and disease prevention rather than treatment alone."},

  {t:"Knowledge alone is sufficient to produce behaviour change in health education.",
   o:["True","False"],
   a:1, exp:"Attitude and practice must also change alongside knowledge for actual behaviour change to occur."},

  {t:"[True/False] Family and community participation is important in improving the success of health education.",
   o:["True","False"],
   a:0, exp:"Involving families and communities is a key general principle that significantly improves health education outcomes."},

  {t:" The principle of 'Trust' requires the nurse to use fear tactics to ensure patient compliance.",
   o:["True","False"],
   a:1, exp:"Trust is built through honesty and accuracy — not fear. Reducing fear and anxiety belongs to the Motivation principle."},

  {t:"The basic principles of health education focus on the teaching–learning process between the nurse and the learner.",
   o:["True","False"],
   a:0, exp:"This is the defining distinction — basic principles specifically guide the nurse-learner interaction and teaching process."},

  {t:" Using complex medical terminology is recommended when educating patients with low literacy to appear professional.",
   o:["True","False"],
   a:1, exp:"The Understanding principle requires simple language. Complex terminology should be avoided especially for low-literacy learners."},

  {t:"Cultural beliefs have no significant impact on health practices and should be ignored during health education.",
   o:["True","False"],
   a:1, exp:"Cultural beliefs directly affect health practices. Cultural acceptability is a core basic principle — it must always be respected."},

  {t:" Repetition in health education means delivering the same lecture in exactly the same way multiple times.",
   o:["True","False"],
   a:1, exp:"Repetition should use DIFFERENT methods (talking, pictures, leaflets) to reinforce key messages, not repeat the exact same format."},

  {t:"Observing patient behaviour is a valid method of feedback and evaluation in health education.",
   o:["True","False"],
   a:0, exp:"Feedback and Evaluation includes both asking questions AND observing patient behaviour to assess whether learning was successful."},

  {t:" Children, adults, and elderly people learn in the same way, so a single teaching approach is sufficient.",
   o:["True","False"],
   a:1, exp:"'Suitable to age and educational level' states that different age groups require different methods — stories/pictures for children, detailed explanations for adults."},

  {t:" General principles provide a broad framework, while basic principles focus on the teaching–learning process.",
   o:["True","False"],
   a:0, exp:"This is the correct and precise distinction between the two sets of principles as defined in the lecture content."},

  {t:"A nurse who respects a patient's cultural food habits while giving nutritional advice is violating evidence-based practice.",
   o:["True","False"],
   a:1, exp:"Respecting cultural habits while providing healthy alternatives follows BOTH cultural acceptability AND evidence-based knowledge simultaneously."},

  {t:"The principle of participation (active learning) can be fully achieved through a one-way lecture with no learner involvement.",
   o:["True","False"],
   a:1, exp:"Participation explicitly requires questions, discussions, demonstrations, and practice — passive one-way lecturing is the opposite of this principle."},

  {t:"Correcting a patient's mistakes harshly in front of others can negatively affect both learning and the nurse-patient relationship.",
   o:["True","False"],
   a:0, exp:"Both Good Human Relations and Feedback/Evaluation emphasise gentle, respectful correction to protect the learning environment and maintain trust."}
];

/* ============ ENGINE ============ */
let questions, i, correct, wrong, answers, wrongSet, answered;
let totalTime = 35*60, timeLeft, timerInterval;
const LETTERS = ['A','B','C','D','E','F'];

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function init(pool) {
  questions = shuffle([...pool]);
  i = 0; correct = 0; wrong = 0;
  answers = new Array(questions.length).fill(null);
  wrongSet = []; answered = 0;
  timeLeft = totalTime;
  document.getElementById('totalBadge').textContent = questions.length + ' questions';
  startTimer();
  render();
}

/* TIMER */
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
    document.getElementById('timerTxt').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
    const badge = document.getElementById('timerBadge');
    if (timeLeft <= 120) { badge.className = 'timer-badge danger'; }
    else if (timeLeft <= 300) { badge.className = 'timer-badge warn'; }
    if (timeLeft <= 0) { clearInterval(timerInterval); finish(); }
  }, 1000);
}

/* TOP UI */
function updateTop() {
  const total = questions.length;
  document.getElementById('sCorrect').textContent = correct;
  document.getElementById('sWrong').textContent = wrong;
  document.getElementById('sRemain').textContent = Math.round(((total - answered) / total) * 100) + '%';
  document.getElementById('progLabel').textContent = 'Q ' + (i + 1) + ' / ' + total;
  document.getElementById('progFill').style.width = ((i + 1) / total * 100) + '%';
  document.getElementById('prog-bar').style.width = ((i + 1) / total * 100) + '%';
}

/* RENDER QUESTION */
function render() {
  updateTop();
  const q = questions[i];
  document.getElementById('app').innerHTML = `
    <div class="q-card">
      <div class="q-header">
        <div class="q-num">Question ${i + 1} / ${questions.length}</div>
      </div>
      <div class="q-text">${q.t}</div>
      <div class="options">
        ${q.o.map((o, idx) => `
          <div class="opt" id="opt${idx}" onclick="choose(${idx})">
            <div class="opt-letter">${LETTERS[idx] || idx + 1}</div>
            ${o}
          </div>
        `).join('')}
      </div>
      <div class="nav-btns">
        <button class="btn btn-skip" onclick="skip()"><i class="fa-solid fa-forward"></i> Skip</button>
      </div>
    </div>`;
}

/* CHOOSE */
function choose(v) {
  if (answers[i] !== null) return;
  answers[i] = v;
  answered++;
  const q = questions[i];
  const ok = v === q.a;
  ok ? correct++ : wrong++;
  updateTop();

  q.o.forEach((_, idx) => {
    const el = document.getElementById('opt' + idx);
    el.classList.add('disabled');
    if (idx === q.a) el.classList.add('correct');
    else if (idx === v) el.classList.add('wrong');
  });

  const fb = document.createElement('div');
  fb.className = 'feedback-bar ' + (ok ? 'ok' : 'no');
  fb.innerHTML = ok
    ? `<span class="feedback-icon">🎉</span> <span>شطور  جدا ، اللهم بارك .</span>`
    : `<span class="feedback-icon">😔</span> <span>ركز يا سكر</span>`;

  const card = document.querySelector('.q-card');
  card.querySelector('.options').after(fb);

  if (q.exp) {
    const exp = document.createElement('div');
    exp.className = 'explanation';
    exp.innerHTML = '<b>💬 Explanation:</b> ' + q.exp;
    fb.after(exp);
  }

  const navBtns = card.querySelector('.nav-btns');
  navBtns.innerHTML = `<button class="btn btn-next" onclick="next()">
    ${i < questions.length - 1 ? '<i class="fa-solid fa-arrow-right"></i> Next Question' : '<i class="fa-solid fa-flag-checkered"></i> Finish Exam'}
  </button>`;
}

/* SKIP */
function skip() {
  if (answers[i] === null) { answers[i] = -1; answered++; wrongSet.push(questions[i]); wrong++; updateTop(); }
  next();
}

/* NEXT */
function next() {
  if (i < questions.length - 1) { i++; render(); window.scrollTo({top: 0, behavior: 'smooth'}); }
  else finish();
}

/* FINISH */
function finish() {
  clearInterval(timerInterval);
  const total = questions.length;
  const score = Math.round((correct / total) * 100);

  questions.forEach((q, idx) => {
    if (answers[idx] !== q.a) wrongSet.push({...q, myAns: answers[idx]});
  });
  wrongSet = [...new Map(wrongSet.map(q => [q.t, q])).values()];

  let grade, gradeColor;
  if (score >= 90) { grade = '🥇 Excellent'; gradeColor = 'var(--success)'; }
  else if (score >= 75) { grade = '🥈 Very Good'; gradeColor = 'var(--accent)'; }
  else if (score >= 60) { grade = '🥉 Good'; gradeColor = 'var(--warn)'; }
  else { grade = '📚 Needs Review'; gradeColor = 'var(--danger)'; }

  const circ = 2 * Math.PI * 45;
  const offset = circ - (score / 100) * circ;

  const reportHTML = questions.map((q, idx) => {
    const ok = answers[idx] === q.a;
    return `<div class="report-item ${ok ? 'ok' : 'no'}">
      <div class="ri-q">${ok ? '✅' : '❌'} ${q.t}</div>
      ${!ok ? `
        <div class="ri-row"><span class="ri-badge ri-yours">Your Answer</span> ${answers[idx] >= 0 ? q.o[answers[idx]] : 'Skipped'}</div>
        <div class="ri-row"><span class="ri-badge ri-right">Correct</span> ${q.o[q.a]}</div>
        ${q.exp ? `<div class="ri-row" style="margin-top:6px;color:var(--text3);font-size:11px;display:block;padding:8px 10px;background:var(--bg2);border-radius:8px;line-height:1.5"><b>💬</b> ${q.exp}</div>` : ''}
      ` : ''}
    </div>`;
  }).join('');

  document.getElementById('prog-bar').style.width = '100%';
  document.getElementById('app').innerHTML = `
    <div class="result-hero">
      <div class="score-ring">
        <svg viewBox="0 0 110 110">
          <circle class="ring-bg" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="0"/>
          <circle class="ring-fill" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            style="stroke:${gradeColor}" id="ringFill"/>
        </svg>
        <div class="score-num">${score}</div>
        <div class="score-pct">%</div>
      </div>
      <div class="result-grade" style="color:${gradeColor}">${grade}</div>
      <div class="result-sub">Answered ${answered} of ${total} questions</div>
      <div class="result-stats">
        <div class="rs"><div class="n" style="color:var(--success)">${correct}</div><div class="l">Correct</div></div>
        <div class="rs"><div class="n" style="color:var(--danger)">${wrong}</div><div class="l">Wrong</div></div>
        <div class="rs"><div class="n" style="color:var(--accent)">${total - answered < 0 ? 0 : total - answered}</div><div class="l">Skipped</div></div>
      </div>
    </div>

    <div class="result-actions">
      ${wrongSet.length ? `<button class="btn btn-retry" onclick="retryWrong()"><i class="fa-solid fa-rotate-right"></i> Retry Wrong (${wrongSet.length})</button>` : ''}
      <button class="btn btn-home" onclick="init(QUESTIONS)"><i class="fa-solid fa-shuffle"></i> New Random Exam</button>
      <a href="https://gaith-team.github.io/exam/level1/health-education/index.html" class="btn btn-home" style="text-decoration:none;"><i class="fa-solid fa-house"></i> Back to Subject</a>
    </div>

    <div style="margin-top:28px">
      <div style="font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text2)">📋 Detailed Report</div>
      ${reportHTML}
    </div>`;

  setTimeout(() => { document.getElementById('ringFill').style.strokeDashoffset = offset; }, 100);
  window.scrollTo({top: 0, behavior: 'smooth'});
}

/* RETRY WRONG */
function retryWrong() {
  const pool = [...wrongSet];
  questions = shuffle(pool); i = 0; correct = 0; wrong = 0;
  answers = new Array(questions.length).fill(null);
  wrongSet = []; answered = 0; timeLeft = totalTime;
  startTimer(); render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

/* THEME */
const themeBtn = document.getElementById('themeBtn');
let theme = localStorage.getItem('theme') || 'light';
function applyTheme(t) {
  theme = t;
  document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : '');
  themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('theme', t);
}
applyTheme(theme);
themeBtn.addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'));

/* START */
init(QUESTIONS);
</script>
