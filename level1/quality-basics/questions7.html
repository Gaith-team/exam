<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHAITH TEAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent:       #7c3aed;
  --accent-light: #8b5cf6;
  --accent-dark:  #6d28d9;
  --accent-glow:  rgba(124,58,237,0.18);
  --bg:      #f8fafc;
  --bg2:     #eef2f7;
  --card:    #ffffff;
  --text:    #1a2332;
  --text2:   #4a5568;
  --text3:   #718096;
  --bc:      rgba(0,0,0,0.07);
  --success: #16a34a;
  --danger:  #dc2626;
  --warn:    #d97706;
  --r:       16px;
  --tr:      all 0.3s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg:   #0d1117; --bg2: #161b22; --card: #1c2333;
  --text: #e6edf3; --text2: #b1bac4; --text3: #7d8590;
  --bc:   rgba(255,255,255,0.08);
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
  transition: background .4s, color .4s;
}

/* PROGRESS TOP */
#prog-bar {
  position: fixed; top: 0; left: 0; height: 3px; z-index: 999;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  transition: width .2s;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 64px;
  background: rgba(248,250,252,.93); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--bc); transition: var(--tr);
}
[data-theme="dark"] nav { background: rgba(13,17,23,.95); }

.nav-back {
  display: flex; align-items: center; gap: 7px;
  color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 700;
  padding: 7px 13px; border-radius: 8px; border: 1px solid var(--bc);
  background: var(--card); transition: var(--tr);
}
.nav-back:hover { color: var(--accent); border-color: var(--accent-glow); transform: translateX(3px); }
.nav-brand { display: flex; align-items: center; gap: 9px; font-size: 15px; font-weight: 900; color: var(--text); }
.nav-logo-icon {
  width: 34px; height: 34px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 900;
}
.nav-right { display: flex; align-items: center; gap: 8px; }
.theme-btn {
  width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--bc);
  background: var(--card); cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center; transition: var(--tr);
}
.theme-btn:hover { border-color: var(--accent); transform: rotate(20deg); }

/* HERO BAND */
.hero-band {
  margin-top: 64px;
  background: linear-gradient(135deg, var(--accent-dark), var(--accent), var(--accent-light));
  padding: 40px 24px 36px; text-align: center;
  position: relative; overflow: hidden;
}
.hero-band::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 600px 200px at 50% 100%, rgba(255,255,255,.12) 0%, transparent 70%);
}
.hero-band-icon {
  width: 68px; height: 68px; border-radius: 20px;
  background: rgba(255,255,255,.2); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; margin: 0 auto 14px; border: 1.5px solid rgba(255,255,255,.35);
}
.hero-band h1 { font-size: clamp(20px,4vw,30px); font-weight: 900; color: #fff; margin-bottom: 6px; }
.hero-band p { font-size: 13px; color: rgba(255,255,255,.8); }
.hero-band-meta {
  display: flex; justify-content: center; gap: 24px; margin-top: 20px;
  flex-wrap: wrap;
}
.meta-pill {
  background: rgba(255,255,255,.18); backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,.3); border-radius: 50px;
  padding: 6px 16px; font-size: 12px; font-weight: 700; color: #fff;
  display: flex; align-items: center; gap: 6px;
}

/* EXAM SHELL */
.shell { max-width: 560px; margin: 0 auto; padding: 24px 20px 80px; }

/* STATS ROW */
.stats-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px;
}
.stat-box {
  background: var(--card); border: 1px solid var(--bc); border-radius: var(--r);
  padding: 12px 10px; text-align: center;
}
.stat-box .val { font-size: 20px; font-weight: 900; }
.stat-box .lbl { font-size: 11px; color: var(--text3); margin-top: 2px; }
.stat-correct { color: var(--success); }
.stat-wrong   { color: var(--danger); }
.stat-remain  { color: var(--accent); }

/* PROGRESS STRIP */
.prog-strip {
  background: var(--card); border: 1px solid var(--bc); border-radius: var(--r);
  padding: 14px 16px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 14px;
}
.prog-label { font-size: 13px; font-weight: 700; color: var(--text2); white-space: nowrap; }
.prog-track { flex: 1; height: 8px; background: var(--bg2); border-radius: 8px; overflow: hidden; }
.prog-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  border-radius: 8px; transition: width .4s;
}
.timer-badge {
  min-width: 64px; height: 36px; border-radius: 18px;
  background: var(--bg2); border: 1px solid var(--bc);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 900; color: var(--text);
  gap: 5px; padding: 0 12px; flex-shrink: 0;
}
.timer-badge.warn { color: var(--warn); border-color: rgba(217,119,6,.3); background: rgba(217,119,6,.08); }
.timer-badge.danger { color: var(--danger); border-color: rgba(220,38,38,.3); background: rgba(220,38,38,.08); animation: pulse .8s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

/* QUESTION CARD */
.q-card {
  background: var(--card); border: 1px solid var(--bc);
  border-radius: 20px; overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,.06);
  transition: box-shadow .3s;
}
.q-header {
  background: linear-gradient(135deg, var(--accent-dark), var(--accent));
  padding: 4px 18px 4px;
  display: flex; align-items: center; gap: 8px;
}
.q-num {
  background: rgba(255,255,255,.2); border-radius: 8px;
  padding: 3px 10px; font-size: 11px; font-weight: 700; color: #fff;
}
.q-text {
  padding: 22px 18px 14px; font-size: 15px; font-weight: 700; color: var(--text);
  line-height: 1.65; border-bottom: 1px solid var(--bc);
  text-align: left; direction: ltr;
}
.options { padding: 14px 18px 18px; display: flex; flex-direction: column; gap: 10px; }

/* OPTION */
.opt {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; border-radius: 12px;
  border: 1.5px solid var(--bc); background: var(--bg);
  cursor: pointer; font-size: 14px; font-weight: 600; color: var(--text);
  transition: var(--tr); user-select: none;
  direction: ltr; text-align: left;
}
.opt:hover:not(.disabled) {
  border-color: var(--accent); background: var(--accent-glow);
  transform: translateX(3px);
}
.opt-letter {
  width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
  background: var(--bg2); border: 1px solid var(--bc);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 900; color: var(--text3);
  transition: var(--tr);
}
.opt.correct {
  border-color: var(--success); background: rgba(22,163,74,.08);
}
.opt.correct .opt-letter {
  background: var(--success); color: #fff; border-color: var(--success);
}
.opt.wrong {
  border-color: var(--danger); background: rgba(220,38,38,.07);
}
.opt.wrong .opt-letter {
  background: var(--danger); color: #fff; border-color: var(--danger);
}
.opt.disabled { pointer-events: none; }

/* FEEDBACK */
.feedback-bar {
  margin: 14px 18px; padding: 12px 16px; border-radius: 12px;
  display: flex; align-items: center; gap: 10px;
  font-size: 14px; font-weight: 700;
  animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
.feedback-bar.ok { background: rgba(22,163,74,.1); color: var(--success); border: 1px solid rgba(22,163,74,.25); }
.feedback-bar.no { background: rgba(220,38,38,.08); color: var(--danger); border: 1px solid rgba(220,38,38,.2); }
.feedback-icon { font-size: 20px; }

/* EXPLANATION */
.explanation {
  margin: 0 18px 14px; padding: 12px 14px;
  background: rgba(var(--accent-rgb),.06);
  border-radius: 10px; border-right: 3px solid var(--accent);
  font-size: 13px; color: var(--text2); line-height: 1.6;
  display: none;
}

/* NAV BTNS */
.nav-btns { padding: 4px 18px 18px; display: flex; gap: 10px; }
.btn {
  flex: 1; padding: 13px; border: none; border-radius: 12px;
  font-size: 14px; font-weight: 900; cursor: pointer;
  font-family: 'Outfit', sans-serif; transition: var(--tr);
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.btn-next {
  background: linear-gradient(135deg, var(--accent-dark), var(--accent));
  color: #fff; box-shadow: 0 4px 14px var(--accent-glow);
}
.btn-next:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
.btn-skip {
  background: var(--bg2); color: var(--text2); border: 1px solid var(--bc); flex: 0 0 auto; padding: 13px 18px;
}
.btn-skip:hover { border-color: var(--warn); color: var(--warn); }

/* ===== RESULTS ===== */
.result-hero {
  text-align: center; padding: 36px 20px 28px;
  background: var(--card); border-radius: 20px;
  border: 1px solid var(--bc); margin-bottom: 20px;
  box-shadow: 0 4px 20px rgba(0,0,0,.06);
}
.score-ring {
  width: 110px; height: 110px; border-radius: 50%; margin: 0 auto 18px;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; border: 5px solid var(--bg2);
  position: relative;
}
.score-ring svg { position: absolute; inset: -5px; width: calc(100% + 10px); height: calc(100% + 10px); transform: rotate(-90deg); }
.score-ring circle { fill: none; stroke-width: 5; stroke-linecap: round; }
.ring-bg { stroke: var(--bg2); }
.ring-fill { stroke: var(--accent); transition: stroke-dashoffset 1s ease; }
.score-num { font-size: 28px; font-weight: 900; color: var(--text); }
.score-pct { font-size: 12px; color: var(--text3); }
.result-grade { font-size: 22px; font-weight: 900; margin-bottom: 6px; }
.result-sub { font-size: 14px; color: var(--text2); }
.result-stats {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 20px;
}
.rs { background: var(--bg2); border-radius: 10px; padding: 12px 8px; text-align: center; }
.rs .n { font-size: 20px; font-weight: 900; }
.rs .l { font-size: 11px; color: var(--text3); }

/* REPORT ITEMS */
.report-item {
  background: var(--card); border: 1px solid var(--bc); border-radius: 14px;
  padding: 16px; margin-bottom: 10px; border-right: 4px solid var(--bc);
}
.report-item.ok { border-right-color: var(--success); }
.report-item.no { border-right-color: var(--danger); }
.report-item .ri-q { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
.report-item .ri-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; margin-top: 5px; color: var(--text2);
}
.ri-badge {
  padding: 2px 8px; border-radius: 6px; font-weight: 700; font-size: 11px; flex-shrink: 0;
}
.ri-yours { background: rgba(220,38,38,.1); color: var(--danger); }
.ri-right { background: rgba(22,163,74,.1); color: var(--success); }

.result-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
.btn-retry { background: linear-gradient(135deg, var(--accent-dark), var(--accent)); color: #fff; }
.btn-retry:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
.btn-home { background: var(--bg2); color: var(--text); border: 1px solid var(--bc); }
.btn-home:hover { border-color: var(--accent); color: var(--accent); }

/* FOOTER */
footer {
  background: var(--bg2); border-top: 1px solid var(--bc);
  padding: 22px 24px; display: flex; align-items: center;
  justify-content: space-between; flex-wrap: wrap; gap: 10px;
}
.footer-brand { font-size: 14px; font-weight: 700; }
.footer-brand span { color: var(--accent); }
.footer-tg { display: flex; align-items: center; gap: 5px; text-decoration: none; color: #229ED9; font-size: 12px; font-weight: 600; }

@media (max-width: 480px) {
  nav { padding: 0 14px; }
  .shell { padding: 16px 14px 60px; }
  .nav-brand span { display: none; }
  .hero-band { padding: 30px 16px 28px; }
}
</style>
</head>
<body>

<div id="prog-bar" style="width:0%"></div>

<nav>

<script>
const QUESTIONS = [
            {t:"When did the concept of patient safety gain significant attention, triggered by the Institute of Medicine's report?", o:["1970s", "1980s", "1990s", "2000s"], a:2},
            {t:"According to the Institute of Medicine study, approximately how many patients die each year in the USA due to medical errors?", o:["10,000 to 20,000", "25,000 to 35,000", "44,000 to 98,000", "100,000 to 150,000"], a:2},
            {t:"What is often cited as the primary reason for medical errors, rather than willful negligence?", o:["Lack of staff training", "Systemic flaws and inadequate communication", "Patient non-compliance", "Outdated medical equipment"], a:1},
            {t:"Which of the following best defines an 'Adverse health care event'?", o:["An event that causes no harm to the patient", "An event or omission during clinical care causing physical or psychological injury", "A situation where an error is caught before it causes harm", "An unexpected drug reaction that is beneficial"], a:1},
            {t:"What is defined as a 'failure to complete a planned action as intended, or the use of an incorrect plan of action'?", o:["Adverse drug reaction", "Near miss", "Error", "Sentinel event"], a:2},
            {t:"A situation where an event or omission fails to develop further, preventing injury, is known as a/an:", o:["Adverse event", "Sentinel error", "Health care near miss", "Medical error"], a:2},
            {t:"Which type of error is defined as any preventable event that may cause or lead to inappropriate medication use or patient harm?", o:["Adverse drug reaction", "Medication error", "Sentinel error", "Adverse health care event"], a:1},
            {t:"Which of the following is considered a 'Sentinel error'?", o:["Minor allergic reaction to a drug", "Surgery on the wrong body part", "Patient complaining of discomfort", "Delayed discharge from hospital"], a:1},
            {t:"Patient safety is primarily defined as the avoidance and prevention of patient injuries or adverse events resulting from:", o:["Patient's own actions", "Natural progression of illness", "Processes of healthcare delivery", "External environmental factors"], a:2},
            {t:"What is considered the shortest description of patient safety?", o:["Provide excellent care", "Do no harm to the patients", "Ensure patient satisfaction", "Reduce healthcare costs"], a:1},
            {t:"The International Patient Safety Goals (IPSGs) were first introduced by which organization?", o:["World Health Organization (WHO)", "Institute of Medicine (IOM)", "Joint Commission International (JCI)", "Centers for Disease Control and Prevention (CDC)"], a:2},
            {t:"In what year were the International Patient Safety Goals (IPSGs) first introduced by JCI?", o:["1999", "2000", "2002", "2005"], a:2},
            {t:"Which of the following is NOT one of the International Patient Safety Goals?", o:["Identifying patients correctly", "Improving effective communication", "Reducing healthcare costs", "Reducing the risk of healthcare associated infections"], a:2},
            {t:"The 3rd International Patient Safety Goal focuses on improving the safety of:", o:["Patient identification", "High alert medications", "Surgical procedures", "Fall prevention"], a:1},
            {t:"Which of the following is NOT a recommended patient identifier?", o:["Full patient's name", "Hospital medical number", "Patient's room number", "Patient identification wristbands"], a:2},
            {t:"Before which of the following procedures should patient identification (e.g., wristbands) be done?", o:["Administering medications", "Taking blood samples", "Transferring patients", "All of the above"], a:3},
            {t:"What is the first step a nurse should take after a verbal or telephone order is given?", o:["Administer the medication immediately", "Write down the order", "Confirm the order with another nurse", "Document the order in 24 hours"], a:1},
            {t:"After a verbal or telephone order is written down, what is the next crucial step?", o:["The nurse signs off on the order", "The order is read back by the nurse", "The order is immediately entered into the electronic health record", "The physician reviews the order at a later time"], a:1},
            {t:"In which situation would a verbal order be considered acceptable?", o:["For chemotherapy administration", "For blood transfusion", "In urgent or emergency situations", "For narcotic drugs"], a:2},
            {t:"Which of the following is NOT an acceptable situation for verbal orders?", o:["Urgent situations", "Emergency situations", "Chemotherapy or radiotherapy", "When a prescriber cannot interrupt client care"], a:2},
            {t:"The SBAR communication technique is designed to convey information in an organized and ______ manner.", o:["Detailed", "Lengthy", "Brief", "Informal"], a:2},
            {t:"What does the 'S' in SBAR stand for?", o:["Situation", "Safety", "System", "Standard"], a:0},
            {t:"Hospitals should determine all of the following regarding critical diagnostic test results EXCEPT:", o:["What are considered critical values", "Who is authorized to report and receive results", "The patient's financial status", "Required documentation in the medical record"], a:2},
            {t:"Handover communication is crucial for critical information exchange between healthcare providers, such as during:", o:["Patient's family visits", "Shift changes", "Hospital administrative meetings", "Staff lunch breaks"], a:1},
            {t:"High-alert medications are defined as drugs that cause significant patient harm when used in:", o:["Correct doses", "Error", "Specific conditions", "Combination with other drugs"], a:1},
            {t:"Which of the following is an example of a high-alert medication characteristic?", o:["Low risk for adverse outcomes", "Rarely involved in errors", "Look-alike/sound-alike medications", "Easy to administer"], a:2},
            {t:"High-alert medications are generally NOT stored on patient care units EXCEPT in specific areas like:", o:["Waiting rooms", "Cafeterias", "Emergency department", "Administrative offices"], a:2},
            {t:"What color label is typically used for high-alert medications in separated, restricted access areas?", o:["Blue", "Green", "Yellow", "Red"], a:3},
            {t:"Which of the following is NOT one of the 'Ten Rights' in safe medication administration?", o:["Right drug", "Right patient", "Right cost", "Right dose"], a:2},
            {t:"The 'Right patient' in medication administration involves checking the patient's identification bracelet and:", o:["Asking their age", "Asking them to state their name", "Checking their insurance information", "Confirming their address"], a:1},
            {t:"If there is doubt in the amount of a medication dose or a complicated calculation is required, what should be done?", o:["Administer the lowest possible dose", "Consult a pharmacist only", "Double-check with another health professional", "Guess the amount based on experience"], a:2},
            {t:"Which abbreviation is NOT allowed to be used because it can be misread as '44' instead of '4 units'?", o:["mg", "IU", "u", "ml"], a:2},
            {t:"To avoid misreading '0.4 mg' as '4 mg', how should the dose be written?", o:["4.0 mg", "0.40 mg", "zero then point then number", "mg 0.4"], a:2},
            {t:"When should nurses document a medication that is given?", o:["Before giving the actual dose", "Immediately after giving the actual dose", "At the end of the shift", "Only if there are adverse reactions"], a:1},
            {t:"Patients and families have a right to know all of the following regarding medication EXCEPT:", o:["Indication", "Side effects", "Reaction that might happen", "The cost of the medication"], a:3},
            {t:"If a patient refuses to take medication, what must nurses legally do?", o:["Force the patient to take it", "Discard the medication", "Document a refusal of medication", "Inform the family only"], a:2},
            {t:"Before giving any medication that can cause changes in vital signs or laboratory tests, what should be done?", o:["Assess the patient", "Administer a lower dose", "Inform the physician after administration", "Document the potential changes"], a:0},
            {t:"Nurses should conduct appropriate follow-up for drug allergies and interactions between different medications as part of the:", o:["Right to document", "Right to educate", "Right to evaluate", "Right to refuse"], a:2},
            {t:"What is a key measurable element to ensure correct surgical site, procedure, and patient?", o:["Using a generic mark for surgical site", "Involving only the surgeon in marking", "Using an instantly recognizable mark for surgical-site identification", "Skipping the preoperative checklist"], a:2},
            {t:"Who should mark the surgical site?", o:["The nurse assisting in surgery", "The patient's family member", "The physician performing the procedure", "The hospital administrator"], a:2},
            {t:"The hospital preoperative checklist should include all of the following EXCEPT:", o:["Correctly completed informed consent", "Imaging results", "Patient's preferred meal plan", "Test results"], a:2},
            {t:"During the 'time out' procedure, the surgical team agrees on all of the following EXCEPT:", o:["Correct patient identification", "Correct procedure to be done", "Correct surgical site", "The surgeon's favorite music for the operating room"], a:3},
            {t:"Healthcare-associated infections (HAIs) are acquired by patients during:", o:["Community activities", "Hospital stay", "Home care", "Outpatient clinic visits"], a:1},
            {t:"Preventing HAIs primarily requires adherence to:", o:["Strict visitor policies", "Infection control protocols", "Advanced antibiotic treatments", "Daily room cleaning by patients"], a:1},
            {t:"An effective hand hygiene program is a measurable element for reducing the risk of:", o:["Medication errors", "Patient falls", "Healthcare-associated infections", "Communication breakdowns"], a:2},
            {t:"The Institute of Medicine's report 'To Err Is Human' was released in the 1980s.", o:["True", "False"], a:1},
            {t:"Medical errors kill fewer people each year than AIDS or airplane crashes.", o:["True", "False"], a:1},
            {t:"Repeated error is considered a crime.", o:["True", "False"], a:0},
            {t:"An 'Adverse drug reaction' is always predictable.", o:["True", "False"], a:1},
            {t:"Patient safety is defined as freedom from injury or illness resulting from the processes of care.", o:["True", "False"], a:0},
            {t:"The shortest description of patient safety is 'to do no harm to the patients'.", o:["True", "False"], a:0},
            {t:"The Joint Commission International (JCI) introduced the International Patient Safety Goals (IPSGs) in 2002.", o:["True", "False"], a:0},
            {t:"Patient identification should be done using only one route, such as the patient's name.", o:["True", "False"], a:1},
            {t:"Verbal orders for chemotherapy are generally considered acceptable in emergency situations.", o:["True", "False"], a:1},
            {t:"The SBAR tool is a structured communication technique designed to convey information in a lengthy and informal manner.", o:["True", "False"], a:1},
            {t:"High-alert medications are those with a low risk for adverse outcomes.", o:["True", "False"], a:1},
            {t:"The 'Right cost' is one of the 'Ten Rights' in safe medication administration.", o:["True", "False"], a:1},
            {t:"Nurses should document a medication before giving the actual dose.", o:["True", "False"], a:1},
            {t:"Healthcare-associated infections (HAIs) are acquired by patients before hospital admission.", o:["True", "False"], a:1},
            {t:"All in-patients should be assessed for the risk of fall upon admission.", o:["True", "False"], a:0}
];

/* ============ ENGINE ============ */
let questions, i, correct, wrong, answers, wrongSet, answered;
let totalTime = 35*60, timeLeft, timerInterval;
const LETTERS = ['A','B','C','D','E','F'];

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function init(pool) {
  questions = shuffle([...pool]);
  i = 0; correct = 0; wrong = 0;
  answers = new Array(questions.length).fill(null);
  wrongSet = []; answered = 0;
  timeLeft = totalTime;
  document.getElementById('totalBadge').textContent = questions.length + ' questions';
  startTimer();
  render();
}

/* TIMER */
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
    document.getElementById('timerTxt').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
    const badge = document.getElementById('timerBadge');
    if (timeLeft <= 120) { badge.className = 'timer-badge danger'; }
    else if (timeLeft <= 300) { badge.className = 'timer-badge warn'; }
    if (timeLeft <= 0) { clearInterval(timerInterval); finish(); }
  }, 1000);
}

/* TOP UI */
function updateTop() {
  const total = questions.length;
  document.getElementById('sCorrect').textContent = correct;
  document.getElementById('sWrong').textContent = wrong;
  document.getElementById('sRemain').textContent = Math.round(((total - answered) / total) * 100) + '%';
  document.getElementById('progLabel').textContent = 'Q ' + (i + 1) + ' / ' + total;
  document.getElementById('progFill').style.width = ((i + 1) / total * 100) + '%';
  document.getElementById('prog-bar').style.width = ((i + 1) / total * 100) + '%';
}

/* RENDER QUESTION */
function render() {
  updateTop();
  const q = questions[i];
  document.getElementById('app').innerHTML = `
    <div class="q-card">
      <div class="q-header">
        <div class="q-num">Question ${i + 1} / ${questions.length}</div>
      </div>
      <div class="q-text">${q.t}</div>
      <div class="options">
        ${q.o.map((o, idx) => `
          <div class="opt" id="opt${idx}" onclick="choose(${idx})">
            <div class="opt-letter">${LETTERS[idx] || idx + 1}</div>
            ${o}
          </div>
        `).join('')}
      </div>
      <div class="nav-btns">
        <button class="btn btn-skip" onclick="skip()"><i class="fa-solid fa-forward"></i> Skip</button>
      </div>
    </div>`;
}

/* CHOOSE */
function choose(v) {
  if (answers[i] !== null) return;
  answers[i] = v;
  answered++;
  const q = questions[i];
  const ok = v === q.a;
  ok ? correct++ : wrong++;
  updateTop();

  q.o.forEach((_, idx) => {
    const el = document.getElementById('opt' + idx);
    el.classList.add('disabled');
    if (idx === q.a) el.classList.add('correct');
    else if (idx === v) el.classList.add('wrong');
  });

  const fb = document.createElement('div');
  fb.className = 'feedback-bar ' + (ok ? 'ok' : 'no');
  fb.innerHTML = ok
    ? `<span class="feedback-icon">🎉</span> <span>  ِشطور جدا ، اللهم بارك </span>`
    : `<span class="feedback-icon">😔</span> <span>ركز يا سكر </b></span>`;

  const card = document.querySelector('.q-card');
  card.querySelector('.options').after(fb);
  if (q.exp) {
    const exp = document.createElement('div');
    exp.className = 'explanation';
    exp.style.display = 'block';
    exp.innerHTML = '<b>💬 Explanation:</b> ' + q.exp;
    fb.after(exp);
  }

  const navBtns = card.querySelector('.nav-btns');
  navBtns.innerHTML = `<button class="btn btn-next" onclick="next()">
    ${i < questions.length - 1 ? '<i class="fa-solid fa-arrow-right"></i> Next Question' : '<i class="fa-solid fa-flag-checkered"></i> Finish Exam'}
  </button>`;
}

/* SKIP */
function skip() {
  if (answers[i] === null) { answers[i] = -1; answered++; wrongSet.push(questions[i]); wrong++; updateTop(); }
  next();
}

/* NEXT */
function next() {
  if (i < questions.length - 1) { i++; render(); window.scrollTo({top: 0, behavior: 'smooth'}); }
  else finish();
}

/* FINISH */
function finish() {
  clearInterval(timerInterval);
  const total = questions.length;
  const score = Math.round((correct / total) * 100);

  questions.forEach((q, idx) => {
    if (answers[idx] !== q.a) wrongSet.push({...q, myAns: answers[idx]});
  });
  wrongSet = [...new Map(wrongSet.map(q => [q.t, q])).values()];

  let grade, gradeColor;
  if (score >= 90) { grade = '🥇 Excellent'; gradeColor = 'var(--success)'; }
  else if (score >= 75) { grade = '🥈 Very Good'; gradeColor = 'var(--accent)'; }
  else if (score >= 60) { grade = '🥉 Good'; gradeColor = 'var(--warn)'; }
  else { grade = '📚 Needs Review'; gradeColor = 'var(--danger)'; }

  const circ = 2 * Math.PI * 45;
  const offset = circ - (score / 100) * circ;

  const reportHTML = questions.map((q, idx) => {
    const ok = answers[idx] === q.a;
    return `<div class="report-item ${ok ? 'ok' : 'no'}">
      <div class="ri-q">${ok ? '✅' : '❌'} ${q.t}</div>
      ${!ok ? `
        <div class="ri-row"><span class="ri-badge ri-yours">Your Answer</span> ${answers[idx] >= 0 ? q.o[answers[idx]] : 'Skipped'}</div>
        <div class="ri-row"><span class="ri-badge ri-right">Correct</span> ${q.o[q.a]}</div>
      ` : ''}
    </div>`;
  }).join('');

  document.getElementById('prog-bar').style.width = '100%';
  document.getElementById('app').innerHTML = `
    <div class="result-hero">
      <div class="score-ring">
        <svg viewBox="0 0 110 110">
          <circle class="ring-bg" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="0"/>
          <circle class="ring-fill" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            style="stroke:${gradeColor}" id="ringFill"/>
        </svg>
        <div class="score-num">${score}</div>
        <div class="score-pct">%</div>
      </div>
      <div class="result-grade" style="color:${gradeColor}">${grade}</div>
      <div class="result-sub">Answered ${answered} of ${total} questions</div>
      <div class="result-stats">
        <div class="rs"><div class="n" style="color:var(--success)">${correct}</div><div class="l">Correct</div></div>
        <div class="rs"><div class="n" style="color:var(--danger)">${wrong}</div><div class="l">Wrong</div></div>
        <div class="rs"><div class="n" style="color:var(--accent)">${total - answered < 0 ? 0 : total - answered}</div><div class="l">Skipped</div></div>
      </div>
    </div>

    <div class="result-actions">
      ${wrongSet.length ? `<button class="btn btn-retry" onclick="retryWrong()"><i class="fa-solid fa-rotate-right"></i> Retry Wrong (${wrongSet.length})</button>` : ''}
      <button class="btn btn-home" onclick="init(QUESTIONS)"><i class="fa-solid fa-shuffle"></i> New Random Exam</button>
      <a href="https://gaith-team.github.io/exam/level1/quality-basics/index.html" class="btn btn-home" style="text-decoration:none;"><i class="fa-solid fa-house"></i> Back to Subject</a>
    </div>

    <div style="margin-top:28px">
      <div style="font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text2)">📋 Detailed Report</div>
      ${reportHTML}
    </div>`;

  setTimeout(() => { document.getElementById('ringFill').style.strokeDashoffset = offset; }, 100);
  window.scrollTo({top: 0, behavior: 'smooth'});
}

/* RETRY WRONG */
function retryWrong() {
  const pool = [...wrongSet];
  questions = shuffle(pool); i = 0; correct = 0; wrong = 0;
  answers = new Array(questions.length).fill(null);
  wrongSet = []; answered = 0; timeLeft = totalTime;
  startTimer(); render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

/* THEME */
const themeBtn = document.getElementById('themeBtn');
let theme = localStorage.getItem('theme') || 'light';
function applyTheme(t) {
  theme = t;
  document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : '');
  themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('theme', t);
}
applyTheme(theme);
themeBtn.addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'));

/* START */
init(QUESTIONS);
</script>
</body>
