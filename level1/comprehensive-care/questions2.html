<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghaith Team | Exam</title>

<style>
:root{
  --primary:#0284c7;
  --secondary:#0ea5e9;
  --bg:#f8fbff;
  --card:#ffffff;
  --soft:#e6f0ff;
  --question:#eef7ff;
  --option:#f9fcff;
  --success:#16a34a;
  --danger:#dc2626;
  --text:#0f172a;

  /* Brand dynamic */
  --brand1:#ffffff;
  --brand2:#e0f2fe;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Segoe UI",Tahoma,Arial,sans-serif;
  background:linear-gradient(180deg,var(--bg),#eef6ff);
  color:var(--text);
}

/* ================= HEADER ================= */
header{
  background:linear-gradient(90deg,var(--primary),var(--secondary));
  color:#fff;
  padding:18px;
  text-align:center;
  overflow:hidden;
}

/* ===== Brand ===== */
.logo{
  position:relative;
  font-size:28px;
  font-weight:900;
  display:inline-flex;
  align-items:center;
  gap:6px;
}

.brand-text{
  background:linear-gradient(90deg,var(--brand1),var(--brand2),var(--brand1));
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 4s linear infinite;
}
@keyframes shine{
  0%{background-position:0%}
  100%{background-position:200%}
}

.heart{
  display:inline-block;
  animation:heartbeat 1.6s infinite ease-in-out;
}
@keyframes heartbeat{
  0%{transform:scale(1)}
  50%{transform:scale(1.25)}
  100%{transform:scale(1)}
}

/* Sparkles */
.sparkle{
  position:absolute;
  font-size:14px;
  animation:twinkle 3s infinite ease-in-out;
}
@keyframes twinkle{
  0%{opacity:0;transform:scale(.6)}
  50%{opacity:1;transform:scale(1.2)}
  100%{opacity:0;transform:scale(.6)}
}

/* Reduced motion أثناء الامتحان */
.exam .sparkle{animation-duration:5s;opacity:.4}
.exam .heart{animation-duration:2.5s}

/* After exam */
.after .sparkle{animation-duration:2s}
.after .heart{animation-duration:1.1s}

/* ================= LAYOUT ================= */
.container{max-width:520px;margin:auto;padding:16px}

/* ===== Top Bar ===== */
.top-bar{
  display:flex;
  gap:12px;
  margin-bottom:16px;
}
.progress-box{
  flex:1;
  background:var(--card);
  padding:14px;
  border-radius:18px;
  box-shadow:0 10px 22px rgba(2,132,199,.12);
}
.progress-text{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:6px;
  font-weight:800;
  font-size:14px;
}
.progress{
  height:8px;
  background:var(--soft);
  border-radius:10px;
  overflow:hidden;
}
.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--primary),var(--secondary));
}

/* Timer */
.timer{
  width:64px;height:64px;border-radius:50%;
  background:conic-gradient(var(--primary) 0deg,var(--soft) 0deg);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:14px;
  background-color:var(--card);
}

/* ================= CARD ================= */
.card{
  background:var(--card);
  padding:22px;
  border-radius:24px;
  box-shadow:0 18px 36px rgba(2,132,199,.18);
}
.question-title{
  background:var(--question);
  padding:16px;
  border-radius:16px;
  font-weight:900;
  margin-bottom:16px;
}
.option{
  background:var(--option);
  border:2px solid var(--soft);
  border-radius:18px;
  padding:15px;
  margin:12px 0;
  font-weight:700;
  cursor:pointer;
}
.option.correct{background:#eafaf1;border-color:var(--success)}
.option.wrong{background:#fff1f1;border-color:var(--danger)}
.option.disabled{pointer-events:none;opacity:.9}

button{
  margin-top:18px;
  width:100%;
  padding:15px;
  border:none;
  border-radius:20px;
  background:linear-gradient(90deg,var(--primary),var(--secondary));
  color:#fff;
  font-weight:900;
}

/* Feedback */
.feedback{
  text-align:center;
  font-size:22px;
  margin-bottom:10px;
  animation:pop .5s;
}
@keyframes pop{
  0%{transform:scale(.6);opacity:0}
  100%{transform:scale(1);opacity:1}
}

/* Report */
.report{
  background:var(--card);
  padding:14px;
  border-radius:14px;
  margin:10px 0;
  border-left:6px solid var(--soft);
}
.report.correct{border-color:var(--success)}
.report.wrong{border-color:var(--danger)}
</style>
</head>

<body class="exam">

<header>
  <div class="logo">
    <span class="brand-text">Ghaith Team</span>
    <span class="heart">💖</span>
    <span class="sparkle" style="top:-8px;left:0">✨</span>
    <span class="sparkle" style="top:6px;right:-8px">✨</span>
    <span class="sparkle" style="bottom:-8px;left:50%">✨</span>
  </div>
  <div style="margin-top:6px;font-weight:800">  👏🏻 الإمتحان في جيبك </div>
</header>

<div class="container">

  <div class="top-bar">
    <div class="progress-box">
      <div class="progress-text">
        <span id="progressText"></span>
        <span>
          ✔️ <span id="correctCount">0</span> |
          ❌ <span id="wrongCount">0</span> |
          ⏳ <span id="remainPercent">100%</span>
        </span>
      </div>
      <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>
    <div class="timer" id="timer">35:00</div>
  </div>

  <div id="app"></div>
</div>

<script>
/* ===== Questions ===== */
let questions = [
 {t: "Which aspect of holistic assessment involves reviewing potential stressors that might exacerbate an ailment?", o: ["Physiological", "Psychological", "Sociological", "Developmental"], a: 1},
          {t: "In a holistic assessment, discussing family networks and who can help at home falls under which category?", o: ["Spiritual", "Cultural", "Sociological", "Psychological"], a: 2},
          {t: "Which technique involves striking the body surface to elicit sounds or vibrations?", o: ["Inspection", "Palpation", "Percussion", "Auscultation"], a: 2},
          {t: "What is the primary purpose of a physical assessment?", o: ["To prescribe medication", "To obtain baseline data about functional abilities", "To replace the patient interview", "To perform surgery"], a: 1},
          {t: "When preparing a client for a physical assessment, the nurse should instruct them to:", o: ["Keep their clothes on", "Drink plenty of water", "Empty their bladder", "Avoid talking during the procedure"], a: 2},
          {t: "Which method of physical examination uses the sense of sight?", o: ["Inspection", "Palpation", "Percussion", "Auscultation"], a: 0},
          {t: "The pads of the fingers are used for palpation primarily because of their:", o: ["Size", "Strength", "Concentration of nerve endings", "Temperature"], a: 2},
          {t: "Which type of palpation is performed to assess for masses and internal organs?", o: ["Light palpation", "Deep palpation", "Direct palpation", "Indirect palpation"], a: 1},
          {t: "Listening to respiratory wheezing without the aid of a stethoscope is an example of:", o: ["Indirect auscultation", "Direct auscultation", "Percussion", "Inspection"], a: 1},
          {t: "What is the correct sequence for assessing the abdomen?", o: ["Palpation, Inspection, Auscultation", "Inspection, Auscultation, Palpation", "Auscultation, Palpation, Inspection", "Inspection, Palpation, Auscultation"], a: 1},
          {t: "When inspecting the eyes, what does the nurse look for in the sclera?", o: ["Movement", "Color (clear, yellow, red)", "Blinking", "Reaction to light"], a: 1},
          {t: "Assessing the hypoglossal nerve involves asking the patient to:", o: ["Shrug their shoulders", "Move their tongue from left to right", "Close their eyes tightly", "Swallow water"], a: 1},
          {t: "Which area is NOT typically auscultated during a cardiovascular assessment of the chest?", o: ["Aortic", "Erb's point", "Tricuspid", "Radial artery"], a: 3},
          {t: "What is the purpose of 'draping' during a physical examination?", o: ["To make the patient look professional", "To provide privacy and warmth", "To hide the equipment", "To prevent the nurse from getting dirty"], a: 1},
          {t: "A holistic health assessment differs from a standard assessment by emphasizing:", o: ["Problem-focused care", "Person-centered care", "Rapid diagnosis", "Standardized treatment plans"], a: 1},
          {t: "Which of the following is an example of subjective data?", o: ["Blood pressure reading", "Patient's report of pain level", "Heart rate", "Skin temperature"], a: 1},
          {t: "When assessing the neck, the nurse palpates which of the following?", o: ["The lungs", "Lymph nodes", "The liver", "The spleen"], a: 1},
          {t: "The 'General Overview' phase of a head-to-toe assessment includes:", o: ["Palpating the abdomen", "Collecting vital signs", "Checking for lice", "Testing range of motion"], a: 1},
          {t: "Capillary refill is assessed to evaluate:", o: ["Muscle strength", "Nerve sensation", "Peripheral circulation", "Skin texture"], a: 2},
          {t: "During a respiratory assessment, the nurse observes chest expansion and listens to:", o: ["Bowel sounds", "Heart sounds", "Lung sounds front and back", "Carotid bruits"], a: 2},
          {t: "Which technique is used to determine if a tissue is fluid-filled, air-filled, or solid?", o: ["Inspection", "Palpation", "Percussion", "Auscultation"], a: 2},
          {t: "In a holistic assessment, 'Developmental' factors consider:", o: ["Family income", "Religious practices", "Psychosocial and cognitive development", "Physical strength"], a: 2},
          {t: "When assessing the ears, the nurse inspects the auricle for:", o: ["Wax", "Asymmetry", "Hearing loss", "Inner ear infections"], a: 1},
          {t: "What does a nurse check when assessing the 'Trachea' during a neck exam?", o: ["Color", "Placement (midline)", "Sound", "Moisture"], a: 1},
          {t: "Which of the following is a benefit of holistic health assessments?", o: ["Decreased communication", "Improved patient outcomes", "Slower recovery times", "Standardized care for all"], a: 1},
          {t: "A nurse asks a patient about their religious and spiritual practices. This is part of which assessment?", o: ["Cultural", "Spiritual", "Sociological", "Psychological"], a: 1},
          {t: "Which of the following is checked during the assessment of 'Extremities'?", o: ["Gag reflex", "Gait", "Tonsils", "Uvula"], a: 1},
          {t: "What is the purpose of assessing the 'Gag reflex'?", o: ["To check hearing", "To assess the ability to swallow and protect the airway", "To check for taste", "To assess tongue movement"], a: 1},
          {t: "During an abdominal assessment, how many quadrants should the nurse auscultate?", o: ["One", "Two", "Three", "Four"], a: 3},
          {t: "Which finding on the scalp should be noted during a 'Hair/Skin/Nails' assessment?", o: ["Pupil size", "Bumps, nits, or lesions", "Bowel sounds", "Heart rate"], a: 1},
          {t: "A 'Cultural' assessment includes discussing:", o: ["Family networks", "Special diet and values", "Cognitive development", "Fall risks"], a: 1},
          {t: "What is the first step in a physical assessment?", o: ["Palpation", "Inspection", "Percussion", "Auscultation"], a: 1},
          {t: "When assessing the nose, 'Septal deviation' refers to:", o: ["The color of the nose", "The displacement of the wall between nostrils", "The presence of discharge", "The ability to smell"], a: 1},
          {t: "Which of the following is a psychological stressor a nurse might assess?", o: ["Blood pressure", "Fear of death", "Height", "BMI"], a: 1},
          {t: "The 'Sniffing' test is used to assess which organ?", o: ["Ear", "Eye", "Nose", "Mouth"], a: 2},
          {t: "Which position is most suitable for a physical examination?", o: ["The one most comfortable for the nurse", "The most suitable for the specific area being examined", "Always lying flat", "Always standing"], a: 1},
          {t: "What should the nurse do before touching a patient for an assessment?", o: ["Nothing", "Ask for permission", "Call a doctor", "Wait for the patient to speak first"], a: 1},
          {t: "Which of the following is part of the 'Back area' assessment?", o: ["Checking the radial pulse", "Inspecting the coccyx/buttocks", "Testing the gag reflex", "Checking pupil reaction"], a: 1},
          {t: "Auscultating the 'Apical pulse' is part of which assessment?", o: ["Respiratory", "Abdominal", "Cardiovascular", "Neurological"], a: 2},
          {t: "When assessing the mouth, the nurse looks at the 'Uvula' and:", o: ["Ears", "Tonsils", "Sclera", "Scalp"], a: 1},
          {t: "What does 'BMI' stand for in a general health overview?", o: ["Body Muscle Index", "Body Mass Index", "Basic Metabolic Indicator", "Blood Mass Inventory"], a: 1},
          {t: "Which technique is best for assessing skin temperature?", o: ["Inspection", "Palpation with the back of the hand", "Percussion", "Auscultation"], a: 1},
          {t: "During a musculoskeletal assessment of the neck, the nurse checks:", o: ["Bowel sounds", "Range of motion", "Capillary refill", "Pupil symmetry"], a: 1},
          {t: "The 'Pads of the fingers' are best for:", o: ["Striking the body", "Fine tactile discrimination", "Listening to sounds", "Visualizing lesions"], a: 1},
          {t: "Which of the following is a component of 'Person-centered care'?", o: ["Prescribing medications without input", "Mutual goal-setting between nurse and patient", "Focusing only on the chief complaint", "Ignoring cultural beliefs"], a: 1},
          {t: "A holistic health assessment focuses only on the patient's physical symptoms.", o: ["True", "False"], a: 1},
          {t: "Inspection is the visual examination of the body using the sense of sight.", o: ["True", "False"], a: 0},
          {t: "Light palpation is used to assess for deep internal organs.", o: ["True", "False"], a: 1},
          {t: "Percussion involves striking the body surface to elicit sounds.", o: ["True", "False"], a: 0},
          {t: "Indirect auscultation requires the use of a stethoscope.", o: ["True", "False"], a: 0},
          {t: "A nurse should explain the procedure to the client before starting a physical assessment.", o: ["True", "False"], a: 0},
          {t: "The environment for a physical assessment should be poorly lit to ensure privacy.", o: ["True", "False"], a: 1},
          {t: "Draping is used to keep the patient warm and provide privacy during an exam.", o: ["True", "False"], a: 0},
          {t: "Vital signs should be collected during the general overview phase of the assessment.", o: ["True", "False"], a: 0},
          {t: "The hypoglossal nerve is assessed by checking the patient's hearing.", o: ["True", "False"], a: 1},
          {t: "Holistic assessments ignore the patient's spiritual and cultural beliefs.", o: ["True", "False"], a: 1},
          {t: "Edema is a condition that can be identified during the skin assessment.", o: ["True", "False"], a: 0},
          {t: "Auscultating bowel sounds should be done in all four quadrants of the abdomen.", o: ["True", "False"], a: 0},
          {t: "Psychological assessment includes evaluating a patient's ability to cope with stressors.", o: ["True", "False"], a: 0},
          {t: "Nurses should encourage patients to empty their bladder after the physical assessment is complete.", o: ["True", "False"], a: 1}
];

// ===== shuffle questions only =====
function shuffleQuestions(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

// خلط الأسئلة فقط
shuffleQuestions(questions);

// تعريف المتغيرات الناقصة
let i = 0;
let correct = 0;
let wrong = 0;
let answers = [];
let wrongSet = [];

/* ===== Timer ===== */
let totalTime=35*60, timeLeft=totalTime;
const timerInt=setInterval(()=>{
  timeLeft--;
  let m=Math.floor(timeLeft/60), s=timeLeft%60;
  timer.innerText=`${m}:${s<10?"0":""}${s}`;
  let deg=(timeLeft/totalTime)*360;
  timer.style.background=`conic-gradient(var(--primary) ${deg}deg,var(--soft) ${deg}deg)`;
  if(timeLeft<=0){clearInterval(timerInt);finishExam();}
},1000);

/* ===== UI ===== */
function updateTop(){
  let total=questions.length;
  let answered=correct+wrong;
  progressText.innerText=`سؤال ${i+1} من ${total}`;
  progressBar.style.width=((i+1)/total*100)+"%";
  correctCount.innerText=correct;
  wrongCount.innerText=wrong;
  remainPercent.innerText=Math.round(((total-answered)/total)*100)+"%";
}

/* ===== Render ===== */
function show(){
  updateTop();
  let q = questions[i];

  app.innerHTML = `
    <div class="card">
      <div class="question-title">${q.t}</div>
      ${q.o.map((o,idx)=>`
        <div class="option" onclick="choose(${idx})">${o}</div>
      `).join("")}
    </div>
  `;
}
/* ===== Choose ===== */
function choose(v){
  if(answers[i]!=null) return;
  answers[i]=v;
  let ok=v===questions[i].a;
  ok?correct++:wrong++;
  app.innerHTML=`
    <div class="feedback">${ok?"🎉 شاطر جدًا كمل":"😅 ركّز يا سُكر"}</div>
    <div class="card">
      <div class="question-title">${questions[i].t}</div>
      ${questions[i].o.map((o,j)=>`
        <div class="option ${j===questions[i].a?"correct":j===v?"wrong":""} disabled">${o}</div>
      `).join("")}
      <button onclick="next()">التالي</button>
    </div>`;
}

/* ===== Next ===== */
function next(){
  if(i<questions.length-1){i++;show();}
  else finishExam();
}

/* ===== Finish ===== */
function finishExam(){
  document.body.classList.remove("exam");
  document.body.classList.add("after");

  let score=Math.round((correct/questions.length)*100);

  if(score>=80){
    document.documentElement.style.setProperty("--brand1","#22c55e");
    document.documentElement.style.setProperty("--brand2","#fde047");
  }else if(score>=50){
    document.documentElement.style.setProperty("--brand1","#38bdf8");
    document.documentElement.style.setProperty("--brand2","#e0f2fe");
  }else{
    document.documentElement.style.setProperty("--brand1","#fb923c");
    document.documentElement.style.setProperty("--brand2","#fed7aa");
  }

  wrongSet=[];
  let report="";
  questions.forEach((q,idx)=>{
    let ok=answers[idx]===q.a;
    if(!ok) wrongSet.push(q);
    report+=`
      <div class="report ${ok?"correct":"wrong"}">
        <b>${q.t}</b><br>
إجابتك: ${answers[idx]!=null ? q.o[answers[idx]] : "لم يتم الحل"}<br>
الصح: ${q.o[q.a]}
      </div>`;
  });

  app.innerHTML=`
    <div class="card">
      <h3>?? تقريرك</h3>
      ${report}
      ${wrongSet.length?`<button onclick="retry()">إعادة حل الغلط فقط</button>`:"<p>أنت ممتاز 👑</p>"}
    </div>`;
}

/* ===== Retry Wrong ===== */
function retry(){
  // نبدأ امتحان جديد بالأسئلة الغلط فقط
  questions = [...wrongSet];

  answers = [];
  wrongSet = [];
  i = 0;
  correct = 0;
  wrong = 0;

  // رجوع لشكل الامتحان
  document.body.classList.remove("after");
  document.body.classList.add("exam");

  show();
}

show();
</script>

</body>
</html>
