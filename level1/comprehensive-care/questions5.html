<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghaith Team | Exam</title>

<style>
:root{
  --primary:#0284c7;
  --secondary:#0ea5e9;
  --bg:#f8fbff;
  --card:#ffffff;
  --soft:#e6f0ff;
  --question:#eef7ff;
  --option:#f9fcff;
  --success:#16a34a;
  --danger:#dc2626;
  --text:#0f172a;

  /* Brand dynamic */
  --brand1:#ffffff;
  --brand2:#e0f2fe;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Segoe UI",Tahoma,Arial,sans-serif;
  background:linear-gradient(180deg,var(--bg),#eef6ff);
  color:var(--text);
}

/* ================= HEADER ================= */
header{
  background:linear-gradient(90deg,var(--primary),var(--secondary));
  color:#fff;
  padding:18px;
  text-align:center;
  overflow:hidden;
}

/* ===== Brand ===== */
.logo{
  position:relative;
  font-size:28px;
  font-weight:900;
  display:inline-flex;
  align-items:center;
  gap:6px;
}

.brand-text{
  background:linear-gradient(90deg,var(--brand1),var(--brand2),var(--brand1));
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 4s linear infinite;
}
@keyframes shine{
  0%{background-position:0%}
  100%{background-position:200%}
}

.heart{
  display:inline-block;
  animation:heartbeat 1.6s infinite ease-in-out;
}
@keyframes heartbeat{
  0%{transform:scale(1)}
  50%{transform:scale(1.25)}
  100%{transform:scale(1)}
}

/* Sparkles */
.sparkle{
  position:absolute;
  font-size:14px;
  animation:twinkle 3s infinite ease-in-out;
}
@keyframes twinkle{
  0%{opacity:0;transform:scale(.6)}
  50%{opacity:1;transform:scale(1.2)}
  100%{opacity:0;transform:scale(.6)}
}

/* Reduced motion أثناء الامتحان */
.exam .sparkle{animation-duration:5s;opacity:.4}
.exam .heart{animation-duration:2.5s}

/* After exam */
.after .sparkle{animation-duration:2s}
.after .heart{animation-duration:1.1s}

/* ================= LAYOUT ================= */
.container{max-width:520px;margin:auto;padding:16px}

/* ===== Top Bar ===== */
.top-bar{
  display:flex;
  gap:12px;
  margin-bottom:16px;
}
.progress-box{
  flex:1;
  background:var(--card);
  padding:14px;
  border-radius:18px;
  box-shadow:0 10px 22px rgba(2,132,199,.12);
}
.progress-text{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:6px;
  font-weight:800;
  font-size:14px;
}
.progress{
  height:8px;
  background:var(--soft);
  border-radius:10px;
  overflow:hidden;
}
.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--primary),var(--secondary));
}

/* Timer */
.timer{
  width:64px;height:64px;border-radius:50%;
  background:conic-gradient(var(--primary) 0deg,var(--soft) 0deg);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:14px;
  background-color:var(--card);
}

/* ================= CARD ================= */
.card{
  background:var(--card);
  padding:22px;
  border-radius:24px;
  box-shadow:0 18px 36px rgba(2,132,199,.18);
}
.question-title{
  background:var(--question);
  padding:16px;
  border-radius:16px;
  font-weight:900;
  margin-bottom:16px;
}
.option{
  background:var(--option);
  border:2px solid var(--soft);
  border-radius:18px;
  padding:15px;
  margin:12px 0;
  font-weight:700;
  cursor:pointer;
}
.option.correct{background:#eafaf1;border-color:var(--success)}
.option.wrong{background:#fff1f1;border-color:var(--danger)}
.option.disabled{pointer-events:none;opacity:.9}

button{
  margin-top:18px;
  width:100%;
  padding:15px;
  border:none;
  border-radius:20px;
  background:linear-gradient(90deg,var(--primary),var(--secondary));
  color:#fff;
  font-weight:900;
}

/* Feedback */
.feedback{
  text-align:center;
  font-size:22px;
  margin-bottom:10px;
  animation:pop .5s;
}
@keyframes pop{
  0%{transform:scale(.6);opacity:0}
  100%{transform:scale(1);opacity:1}
}

/* Report */
.report{
  background:var(--card);
  padding:14px;
  border-radius:14px;
  margin:10px 0;
  border-left:6px solid var(--soft);
}
.report.correct{border-color:var(--success)}
.report.wrong{border-color:var(--danger)}
</style>
</head>

<body class="exam">

<header>
  <div class="logo">
    <span class="brand-text">Ghaith Team</span>
    <span class="heart">💖</span>
    <span class="sparkle" style="top:-8px;left:0">✨</span>
    <span class="sparkle" style="top:6px;right:-8px">✨</span>
    <span class="sparkle" style="bottom:-8px;left:50%">✨</span>
  </div>
  <div style="margin-top:6px;font-weight:800">  👏🏻 الإمتحان في جيبك </div>
</header>

<div class="container">

  <div class="top-bar">
    <div class="progress-box">
      <div class="progress-text">
        <span id="progressText"></span>
        <span>
          ✔️ <span id="correctCount">0</span> |
          ❌ <span id="wrongCount">0</span> |
          ⏳ <span id="remainPercent">100%</span>
        </span>
      </div>
      <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>
    <div class="timer" id="timer">35:00</div>
  </div>

  <div id="app"></div>
</div>

<script>
/* ===== Questions ===== */
let questions = [
{t: "Which of the following defines complementary therapies?", o: ["Mainstream medical treatments used alone", "Non-mainstream health approaches used alongside conventional medicine", "Alternative treatments that replace traditional medicine", "Surgical interventions for chronic illness"], a: 1},
          {t: "How does 'Alternative therapy' differ from 'Complementary therapy'?", o: ["It is used alongside standard treatments", "It focuses only on surgery", "It may replace traditional medical interventions altogether", "It is only available through the NHS"], a: 2},
          {t: "In Allopathic medicine, healing is often viewed as depending on:", o: ["Internal energy", "Outside agents to cure the disease", "The body's natural ability to heal itself", "Spiritual growth"], a: 1},
          {t: "Which of the following is a goal of Complementary and Alternative Medicine (CAM)?", o: ["Replacing all vaccines", "Pain relief and health promotion", "Limiting patient involvement in healing", "Focusing solely on external causative agents"], a: 1},
          {t: "Which category of CAM includes plants, vitamins, and probiotics?", o: ["Body-Mind Interventions", "Natural Products", "Energy Therapies", "Movement Therapies"], a: 1},
          {t: "Which of the following is considered a Body-Mind Intervention?", o: ["Dietary supplements", "Acupuncture", "Herbal medicines", "Vitamins"], a: 1},
          {t: "The field of science studying the relationship between cognitive, affective, and physical aspects of humans is:", o: ["Neurology", "Psychoneuroimmunology (PNI)", "Cardiology", "Homeopathy"], a: 1},
          {t: "In holistic nursing, the nurse's role is often described as a:", o: ["Curing agent", "Healing facilitator", "Sole decision maker", "Surgical assistant"], a: 1},
          {t: "Which self-regulatory technique allows an individual to consciously control functions like heart rate?", o: ["Biofeedback", "Herbalism", "Chiropractic", "Aromatherapy"], a: 0},
          {t: "What are the basic elements of the relaxation response?", o: ["Loud music and standing position", "Quiet environment and focused attention", "Fast breathing and active attitude", "Social interaction and exercise"], a: 1},
          {t: "Which technique involves 'thinking without words' using the senses to evoke imagination?", o: ["Meditation", "Imagery", "Hypnosis", "Yoga"], a: 1},
          {t: "For which type of clients is Imagery NOT recommended?", o: ["Clients with fractures", "Clients who are emotionally unstable", "Children", "Elderly patients"], a: 1},
          {t: "Therapeutic hypnosis induces an altered state of consciousness known as a:", o: ["Coma", "Trance", "Seizure", "Deep sleep"], a: 1},
          {t: "Which CAM therapy originated in India and focuses on breathing, movement, and posture?", o: ["Shiatsu", "Yoga", "Reflexology", "Acupuncture"], a: 1},
          {t: "What is the primary goal of therapeutic exercise?", o: ["Spiritual growth", "Fitness (strength, flexibility, endurance)", "Altering the energy field", "Inducing a trance"], a: 1},
          {t: "Energetic-touch therapies work with the body's:", o: ["Skeletal system", "Energy field", "Digestive tract", "Respiratory rate"], a: 1},
          {t: "Which sense is the earliest to develop in humans and is basic for interaction?", o: ["Sight", "Touch", "Hearing", "Smell"], a: 1},
          {t: "When should a nurse withhold touch therapy?", o: ["When the patient is sleeping", "When the patient is distrustful or angry", "During a routine check-up", "When the patient asks for it"], a: 1},
          {t: "Therapeutic massage involves which of the following actions?", o: ["Inserting needles", "Kneading, rubbing, and friction", "Using magnetic applications", "Guided visualization"], a: 1},
          {t: "Massage should be used with caution for patients with:", o: ["Broken bones", "Heart disease or diabetes", "Lice", "Mild stress"], a: 1},
          {t: "Therapeutic Touch (TT) is based on assessing alterations in a person's:", o: ["Blood pressure", "Energy field", "Weight", "Reflexes"], a: 1},
          {t: "Who developed 'Healing Touch' (HT) in the 1980s?", o: ["Florence Nightingale", "Janet Mentgen", "Eunice Ingham", "The NHS"], a: 1},
          {t: "The word 'Shiatsu' literally means:", o: ["Needle pressure", "Finger pressure", "Energy flow", "Natural healing"], a: 1},
          {t: "Acupuncture involves inserting needles at specific points to correct the flow of:", o: ["Blood", "Chi (energy)", "Lymph", "Oxygen"], a: 1},
          {t: "Acupuncture is specifically contraindicated for which condition?", o: ["Back pain", "Pregnancy", "Arthritis", "Stress"], a: 1},
          {t: "Reflexology is based on the discovery that pressure on certain parts of the hands or feet can:", o: ["Cure cancer", "Relieve pain in other body parts", "Increase height", "Replace surgery"], a: 1},
          {t: "Which of the following is a 'Natural Product'?", o: ["Yoga", "Probiotics", "Massage", "Hypnosis"], a: 1},
          {t: "The 'flight-or-fight' response involves the release of:", o: ["Insulin", "Epinephrine", "Melatonin", "Estrogen"], a: 1},
          {t: "In meditation, 'breath coaching' helps the client to:", o: ["Hold their breath for long periods", "Become aware of and slow their breathing", "Breathe as fast as possible", "Stop breathing temporarily"], a: 1},
          {t: "Which nursing pioneer wrote about helping the ill alter thoughts through images of nature?", o: ["Clara Barton", "Florence Nightingale", "Dorothea Dix", "Mary Mahoney"], a: 1},
          {t: "Advanced training is necessary for nurses wishing to use which modality?", o: ["Basic touch", "Hypnosis", "Deep breathing", "Hand washing"], a: 1},
          {t: "Which of the following is a 'Body-Movement' therapy?", o: ["Herbs", "Chiropractic", "Vitamins", "Prayer"], a: 1},
          {t: "Acupressure differs from acupuncture because it:", o: ["Uses needles", "Does not use needles", "Is only for the feet", "Is a modern Western invention"], a: 1},
          {t: "The relaxation response can often be seen in TT treatment within:", o: ["2 to 5 minutes", "1 hour", "24 hours", "Immediately"], a: 0},
          {t: "Massage is NOT recommended in areas with:", o: ["Dry skin", "Varicose veins or phlebitis", "Muscle tension", "Tattoos"], a: 1},
          {t: "The three main elements of Yoga are:", o: ["Diet, sleep, work", "Breathing, movement, posture", "Reading, writing, arithmetic", "Running, jumping, swimming"], a: 1},
          {t: "Which therapy uses 'animal intervention' (pet therapy)?", o: ["Natural Products", "Body-Mind Interventions", "Energy Therapies", "Movement Therapies"], a: 1},
          {t: "Psychoneuroimmunology (PNI) studies the link between the mind and the:", o: ["Skeletal system", "Immune system", "Digestive system", "Urinary system"], a: 1},
          {t: "In the holistic model, who has the most important role in healing?", o: ["The doctor", "The client", "The pharmacist", "The insurance company"], a: 1},
          {t: "Which of the following is an 'Energetic-Touch' therapy?", o: ["Aromatherapy", "Therapeutic Touch", "Herbal medicine", "Pet therapy"], a: 1},
          {t: "Antioxidants are categorized under which CAM intervention?", o: ["Mind-Body", "Nutritional", "Energetic-Touch", "Spiritual"], a: 1},
          {t: "Which technique uses a 'word or short phrase' to evoke relaxation?", o: ["Imagery", "Meditation", "Massage", "Exercise"], a: 1},
          {t: "Biofeedback helps individuals control which system?", o: ["Central Nervous System", "Sympathetic Nervous System", "Skeletal System", "Integumentary System"], a: 1},
          {t: "Healing touch (HT) became a certification program of which association?", o: ["American Medical Association", "American Holistic Nurses Association (AHNA)", "Red Cross", "World Health Organization"], a: 1},
          {t: "The use of 'Heat and Cold application' is categorized as:", o: ["Spiritual", "Other Medicinal", "Mind-Body", "Natural Product"], a: 1},
          {t: "Complementary therapies are used as a total replacement for conventional medicine.", o: ["True", "False"], a: 1},
          {t: "Allopathic medicine generally views disease as resulting from external causative agents.", o: ["True", "False"], a: 0},
          {t: "In alternative medicine, the body is believed to have a natural ability to heal itself.", o: ["True", "False"], a: 0},
          {t: "The traditional medical model views the mind, body, and spirit as one inseparable entity.", o: ["True", "False"], a: 1},
          {t: "Healing and curing are considered the same thing in holistic nursing.", o: ["True", "False"], a: 1},
          {t: "Relaxation techniques can help reduce the effects of the flight-or-fight response.", o: ["True", "False"], a: 0},
          {t: "Imagery is a type of thinking that primarily uses words to create mental pictures.", o: ["True", "False"], a: 1},
          {t: "Nurses need advanced training to practice therapeutic hypnosis.", o: ["True", "False"], a: 0},
          {t: "Yoga is a form of meditative exercise that originated in India.", o: ["True", "False"], a: 0},
          {t: "Touch is the last sense to develop in humans.", o: ["True", "False"], a: 1},
          {t: "Massage is always safe for people with heart disease and kidney disease.", o: ["True", "False"], a: 1},
          {t: "Therapeutic Touch (TT) involves the use of needles to redirect energy.", o: ["True", "False"], a: 1},
          {t: "Acupuncture is one of the oldest medical procedures in the world.", o: ["True", "False"], a: 0},
          {t: "Reflexology points on the feet are believed to be responsive to pressure for pain relief.", o: ["True", "False"], a: 0},
          {t: "Acupuncture is highly recommended for women during pregnancy.", o: ["True", "False"], a: 1}
];



// ===== shuffle questions only =====
function shuffleQuestions(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

// خلط الأسئلة فقط
shuffleQuestions(questions);

// تعريف المتغيرات الناقصة
let i = 0;
let correct = 0;
let wrong = 0;
let answers = [];
let wrongSet = [];

/* ===== Timer ===== */
let totalTime=35*60, timeLeft=totalTime;
const timerInt=setInterval(()=>{
  timeLeft--;
  let m=Math.floor(timeLeft/60), s=timeLeft%60;
  timer.innerText=`${m}:${s<10?"0":""}${s}`;
  let deg=(timeLeft/totalTime)*360;
  timer.style.background=`conic-gradient(var(--primary) ${deg}deg,var(--soft) ${deg}deg)`;
  if(timeLeft<=0){clearInterval(timerInt);finishExam();}
},1000);

/* ===== UI ===== */
function updateTop(){
  let total=questions.length;
  let answered=correct+wrong;
  progressText.innerText=`سؤال ${i+1} من ${total}`;
  progressBar.style.width=((i+1)/total*100)+"%";
  correctCount.innerText=correct;
  wrongCount.innerText=wrong;
  remainPercent.innerText=Math.round(((total-answered)/total)*100)+"%";
}

/* ===== Render ===== */
function show(){
  updateTop();
  let q = questions[i];

  app.innerHTML = `
    <div class="card">
      <div class="question-title">${q.t}</div>
      ${q.o.map((o,idx)=>`
        <div class="option" onclick="choose(${idx})">${o}</div>
      `).join("")}
    </div>
  `;
}
/* ===== Choose ===== */
function choose(v){
  if(answers[i]!=null) return;
  answers[i]=v;
  let ok=v===questions[i].a;
  ok?correct++:wrong++;
  app.innerHTML=`
    <div class="feedback">${ok?"🎉 شاطر جدًا كمل":"😅 ركّز يا سُكر"}</div>
    <div class="card">
      <div class="question-title">${questions[i].t}</div>
      ${questions[i].o.map((o,j)=>`
        <div class="option ${j===questions[i].a?"correct":j===v?"wrong":""} disabled">${o}</div>
      `).join("")}
      <button onclick="next()">التالي</button>
    </div>`;
}

/* ===== Next ===== */
function next(){
  if(i<questions.length-1){i++;show();}
  else finishExam();
}

/* ===== Finish ===== */
function finishExam(){
  document.body.classList.remove("exam");
  document.body.classList.add("after");

  let score=Math.round((correct/questions.length)*100);

  if(score>=80){
    document.documentElement.style.setProperty("--brand1","#22c55e");
    document.documentElement.style.setProperty("--brand2","#fde047");
  }else if(score>=50){
    document.documentElement.style.setProperty("--brand1","#38bdf8");
    document.documentElement.style.setProperty("--brand2","#e0f2fe");
  }else{
    document.documentElement.style.setProperty("--brand1","#fb923c");
    document.documentElement.style.setProperty("--brand2","#fed7aa");
  }

  wrongSet=[];
  let report="";
  questions.forEach((q,idx)=>{
    let ok=answers[idx]===q.a;
    if(!ok) wrongSet.push(q);
    report+=`
      <div class="report ${ok?"correct":"wrong"}">
        <b>${q.t}</b><br>
إجابتك: ${answers[idx]!=null ? q.o[answers[idx]] : "لم يتم الحل"}<br>
الصح: ${q.o[q.a]}
      </div>`;
  });

  app.innerHTML=`
    <div class="card">
      <h3>?? تقريرك</h3>
      ${report}
      ${wrongSet.length?`<button onclick="retry()">إعادة حل الغلط فقط</button>`:"<p>أنت ممتاز 👑</p>"}
    </div>`;
}

/* ===== Retry Wrong ===== */
function retry(){
  // نبدأ امتحان جديد بالأسئلة الغلط فقط
  questions = [...wrongSet];

  answers = [];
  wrongSet = [];
  i = 0;
  correct = 0;
  wrong = 0;

  // رجوع لشكل الامتحان
  document.body.classList.remove("after");
  document.body.classList.add("exam");

  show();
}

show();
</script>

</body>
</html>
