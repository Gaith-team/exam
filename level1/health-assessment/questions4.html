<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual Health Assessment — Exam | GAITH TEAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent:             #0891b2;
  --accent-light:       #06b6d4;
  --accent-dark:        #0e7490;
  --accent-glow:        rgba(8,145,178,0.14);
  --accent-glow-strong: rgba(8,145,178,0.28);
  --bg:      #f8fafc;
  --bg2:     #eef2f7;
  --card:    #ffffff;
  --text:    #1a2332;
  --text2:   #4a5568;
  --text3:   #718096;
  --border:       rgba(8,145,178,0.18);
  --border-card:  rgba(0,0,0,0.07);
  --shadow:       0 4px 20px rgba(0,0,0,0.07);
  --shadow-hover: 0 8px 32px rgba(8,145,178,0.22);
  --success: #16a34a;
  --danger:  #dc2626;
  --warn:    #d97706;
  --radius: 16px;
  --tr: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg:   #0d1117; --bg2: #161b22; --card: #1c2333;
  --text: #e6edf3; --text2: #b1bac4; --text3: #7d8590;
  --border:      rgba(6,182,212,0.22);
  --border-card: rgba(6,182,212,0.10);
  --shadow:       0 4px 20px rgba(0,0,0,0.4);
  --shadow-hover: 0 8px 36px rgba(8,145,178,0.28);
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
  transition: background .4s, color .4s;
  direction: ltr;
}

#prog-bar {
  position: fixed; top: 0; left: 0; height: 3px; z-index: 999;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  width: 0%; transition: width .15s;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 64px;
  background: rgba(248,250,252,.93); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-card); transition: var(--tr);
}
[data-theme="dark"] nav { background: rgba(13,17,23,.95); }

.nav-back {
  display: flex; align-items: center; gap: 7px;
  color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 600;
  padding: 7px 13px; border-radius: 8px;
  border: 1px solid var(--border-card); background: var(--card);
  transition: var(--tr);
}
.nav-back:hover { color: var(--accent); border-color: var(--border); }
.nav-brand { display: flex; align-items: center; gap: 9px; font-size: 15px; font-weight: 900; color: var(--text); }
.nav-logo-icon {
  width: 34px; height: 34px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 900;
}
.nav-right { display: flex; align-items: center; gap: 8px; }
.theme-btn {
  width: 38px; height: 38px; border-radius: 50%;
  border: 1px solid var(--border-card); background: var(--card);
  cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center; transition: var(--tr);
}
.theme-btn:hover { border-color: var(--accent); transform: rotate(20deg); }

/* HERO BAND */
.hero-band {
  margin-top: 64px;
  background: linear-gradient(135deg, var(--accent-dark), var(--accent), var(--accent-light));
  padding: 36px 24px 32px; text-align: center;
  position: relative; overflow: hidden;
}
.hero-band::before {
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse 600px 200px at 50% 100%, rgba(255,255,255,.12) 0%, transparent 70%);
}
.hero-band-icon {
  width: 64px; height: 64px; border-radius: 18px;
  background: rgba(255,255,255,.2); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; margin: 0 auto 12px;
  border: 1.5px solid rgba(255,255,255,.35);
}
.hero-band h1 { font-size: clamp(18px,3.5vw,26px); font-weight: 900; color:#fff; margin-bottom:4px; }
.hero-band p { font-size:13px; color:rgba(255,255,255,.8); }
.hero-meta {
  display:flex; justify-content:center; gap:16px; margin-top:16px; flex-wrap:wrap;
}
.meta-pill {
  background: rgba(255,255,255,.18); backdrop-filter:blur(6px);
  border: 1px solid rgba(255,255,255,.3); border-radius:50px;
  padding:5px 14px; font-size:12px; font-weight:700; color:#fff;
  display:flex; align-items:center; gap:5px;
}

/* SHELL */
.shell { max-width:560px; margin:0 auto; padding:20px 18px 80px; }

/* STATS */
.stats-row {
  display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:14px;
}
.stat-box {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:var(--radius); padding:12px 8px; text-align:center;
}
.stat-box .val { font-size:20px; font-weight:900; }
.stat-box .lbl { font-size:11px; color:var(--text3); margin-top:2px; }
.c-green { color:var(--success); }
.c-red   { color:var(--danger); }
.c-blue  { color:var(--accent); }

/* PROGRESS STRIP */
.prog-strip {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:var(--radius); padding:13px 16px; margin-bottom:16px;
  display:flex; align-items:center; gap:12px;
}
.prog-label { font-size:13px; font-weight:700; color:var(--text2); white-space:nowrap; }
.prog-track { flex:1; height:7px; background:var(--bg2); border-radius:7px; overflow:hidden; }
.prog-fill {
  height:100%; width:0%;
  background:linear-gradient(90deg, var(--accent), var(--accent-light));
  border-radius:7px; transition:width .4s;
}
.timer-badge {
  min-width:60px; height:34px; border-radius:17px;
  background:var(--bg2); border:1px solid var(--border-card);
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:900; color:var(--text);
  gap:4px; padding:0 10px; flex-shrink:0;
}
.timer-badge.warn   { color:var(--warn);    border-color:rgba(217,119,6,.3);  background:rgba(217,119,6,.08); }
.timer-badge.danger { color:var(--danger);  border-color:rgba(220,38,38,.3);  background:rgba(220,38,38,.08); animation:blink .8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.5} }

/* QUESTION CARD */
.q-card {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:20px; overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,.05);
}
.q-header {
  background:linear-gradient(135deg, var(--accent-dark), var(--accent));
  padding:10px 18px;
  display:flex; align-items:center; gap:8px;
}
.q-num {
  background:rgba(255,255,255,.22); border-radius:7px;
  padding:3px 10px; font-size:11px; font-weight:700; color:#fff;
}
.q-text {
  padding:20px 18px 14px; font-size:15px; font-weight:700; color:var(--text);
  line-height:1.65; border-bottom:1px solid var(--border-card);
  direction:ltr; text-align:left;
}
.options { padding:14px 18px 18px; display:flex; flex-direction:column; gap:10px; }

.opt {
  display:flex; align-items:center; gap:12px;
  padding:13px 15px; border-radius:12px;
  border:1.5px solid var(--border-card); background:var(--bg);
  cursor:pointer; font-size:14px; font-weight:600; color:var(--text);
  transition:var(--tr); user-select:none;
  direction:ltr; text-align:left;
}
.opt:hover:not(.disabled) {
  border-color:var(--accent); background:var(--accent-glow);
  transform:translateX(3px);
}
.opt-letter {
  width:28px; height:28px; border-radius:8px; flex-shrink:0;
  background:var(--bg2); border:1px solid var(--border-card);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:900; color:var(--text3);
  transition:var(--tr);
}
.opt.correct { border-color:var(--success); background:rgba(22,163,74,.08); }
.opt.correct .opt-letter { background:var(--success); color:#fff; border-color:var(--success); }
.opt.wrong   { border-color:var(--danger);  background:rgba(220,38,38,.07); }
.opt.wrong   .opt-letter { background:var(--danger);  color:#fff; border-color:var(--danger); }
.opt.disabled { pointer-events:none; }

/* FEEDBACK */
.feedback-bar {
  margin:12px 18px; padding:12px 15px; border-radius:12px;
  display:flex; align-items:center; gap:10px;
  font-size:14px; font-weight:700;
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
.feedback-bar.ok { background:rgba(22,163,74,.1); color:var(--success); border:1px solid rgba(22,163,74,.25); }
.feedback-bar.no { background:rgba(220,38,38,.08); color:var(--danger); border:1px solid rgba(220,38,38,.2); }
.feedback-icon { font-size:18px; }

.explanation {
  margin:0 18px 12px; padding:11px 14px;
  background:rgba(8,145,178,.06); border-radius:10px;
  border-left:3px solid var(--accent);
  font-size:13px; color:var(--text2); line-height:1.6;
  direction:ltr; text-align:left;
}

/* BUTTONS */
.nav-btns { padding:4px 18px 18px; display:flex; gap:10px; }
.btn {
  flex:1; padding:13px; border:none; border-radius:12px;
  font-size:14px; font-weight:900; cursor:pointer;
  font-family:'Outfit',sans-serif; transition:var(--tr);
  display:flex; align-items:center; justify-content:center; gap:7px;
}
.btn-next {
  background:linear-gradient(135deg, var(--accent-dark), var(--accent));
  color:#fff; box-shadow:0 4px 14px var(--accent-glow);
}
.btn-next:hover { transform:translateY(-2px); box-shadow:0 6px 20px var(--accent-glow); }
.btn-skip {
  background:var(--bg2); color:var(--text2);
  border:1px solid var(--border-card); flex:0 0 auto; padding:13px 16px;
}
.btn-skip:hover { border-color:var(--warn); color:var(--warn); }

/* RESULTS */
.result-hero {
  text-align:center; padding:32px 20px 24px;
  background:var(--card); border-radius:20px;
  border:1px solid var(--border-card); margin-bottom:18px;
}
.score-ring {
  width:110px; height:110px; border-radius:50%; margin:0 auto 16px;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; position:relative;
}
.score-ring svg { position:absolute; inset:-5px; width:calc(100% + 10px); height:calc(100% + 10px); transform:rotate(-90deg); }
.score-ring circle { fill:none; stroke-width:5; stroke-linecap:round; }
.ring-bg   { stroke:var(--bg2); }
.ring-fill { stroke:var(--accent); transition:stroke-dashoffset 1s ease; }
.score-num { font-size:28px; font-weight:900; color:var(--text); }
.score-pct { font-size:12px; color:var(--text3); }
.result-grade { font-size:20px; font-weight:900; margin-bottom:5px; }
.result-sub   { font-size:14px; color:var(--text2); }
.result-stats {
  display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:18px;
}
.rs { background:var(--bg2); border-radius:10px; padding:11px 8px; text-align:center; }
.rs .n { font-size:20px; font-weight:900; }
.rs .l { font-size:11px; color:var(--text3); }

/* REPORT */
.report-item {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:13px; padding:15px; margin-bottom:9px;
  border-left:4px solid var(--border-card);
  direction:ltr; text-align:left;
}
.report-item.ok { border-left-color:var(--success); }
.report-item.no { border-left-color:var(--danger); }
.report-item .ri-q  { font-size:13px; font-weight:700; margin-bottom:7px; }
.report-item .ri-row { display:flex; align-items:center; gap:8px; font-size:12px; margin-top:4px; color:var(--text2); }
.ri-badge { padding:2px 8px; border-radius:6px; font-weight:700; font-size:11px; flex-shrink:0; }
.ri-yours { background:rgba(220,38,38,.1); color:var(--danger); }
.ri-right { background:rgba(22,163,74,.1);  color:var(--success); }

.result-actions { display:flex; flex-direction:column; gap:10px; margin-top:18px; }
.btn-retry { background:linear-gradient(135deg,var(--accent-dark),var(--accent)); color:#fff; }
.btn-retry:hover { transform:translateY(-2px); box-shadow:0 6px 20px var(--accent-glow); }
.btn-home  { background:var(--bg2); color:var(--text); border:1px solid var(--border-card); }
.btn-home:hover { border-color:var(--accent); color:var(--accent); }

/* FOOTER */
footer {
  background:var(--bg2); border-top:1px solid var(--border-card);
  padding:22px 24px;
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:10px;
}
.footer-brand { font-size:14px; font-weight:700; }
.footer-brand span { color:var(--accent); }
.footer-tg {
  display:flex; align-items:center; gap:5px;
  text-decoration:none; color:#229ED9; font-size:12px; font-weight:600;
}

@media (max-width:480px) {
  nav { padding:0 14px; }
  .shell { padding:14px 12px 60px; }
  .nav-brand span { display:none; }
}
</style>
</head>
<body>

<div id="prog-bar"></div>

<nav>
  <a href="index.html" class="nav-back"><i class="fa-solid fa-arrow-left"></i> Back</a>
  <div class="nav-brand">
    <div class="nav-logo-icon">GT</div>
    <span>GAITH TEAM</span>
  </div>
  <div class="nav-right">
    <button class="theme-btn" id="themeBtn">🌙</button>
  </div>
</nav>

<div class="hero-band">
  <div class="hero-band-icon">👁️</div>
  <h1>Visual Health Assessment</h1>
  <p>Health Assessment</p>
  <div class="hero-meta">
    <div class="meta-pill"><i class="fa-solid fa-list-ol"></i> <span id="totalBadge">-- Questions</span></div>
    <div class="meta-pill"><i class="fa-solid fa-clock"></i> 50 Min</div>
    <div class="meta-pill"><i class="fa-solid fa-shuffle"></i> Shuffled</div>
  </div>
</div>

<div class="shell">
  <div class="stats-row">
    <div class="stat-box"><div class="val c-green" id="sCorrect">0</div><div class="lbl">✔ Correct</div></div>
    <div class="stat-box"><div class="val c-red"   id="sWrong">0</div><div class="lbl">✖ Wrong</div></div>
    <div class="stat-box"><div class="val c-blue"  id="sRemain">100%</div><div class="lbl">⏳ Remaining</div></div>
  </div>

  <div class="prog-strip">
    <div class="prog-label" id="progLabel">Q 1</div>
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <div class="timer-badge" id="timerBadge"><i class="fa-regular fa-clock"></i><span id="timerTxt">50:00</span></div>
  </div>

  <div id="app"></div>
</div>

<footer>
  <div class="footer-brand">GAITH <span>TEAM</span></div>
  <a href="https://t.me/nursing2bu" target="_blank" class="footer-tg">
    <i class="fa-brands fa-telegram"></i> @nursing2bu
  </a>
</footer>

<script>
const QUESTIONS = [
  // EASY LEVEL
      {t:"What is a physical exam?", o:["A surgical procedure performed by a specialist","An evaluation of your overall health performed by a primary care provider","A psychological assessment of mental health only","A laboratory test to check blood levels"], a:1},
      {t:"Which of the following is another term for a physical exam?", o:["Surgical consultation","Wellness check","Emergency triage","Diagnostic imaging"], a:1},
      {t:"Which of the following is NOT listed as an alternative term for a physical exam?", o:["Well-check","Annual physical exam","Routine physical exam","Therapeutic intervention"], a:3},
      {t:"A physical exam focuses primarily on:", o:["Emergency care management","Surgical planning","Preventive care to achieve or maintain good health","Diagnosing only chronic diseases"], a:2},
      {t:"Which of the following body systems is included in a physical exam checklist?", o:["Reproductive system only","Only the cardiovascular system","Skin, eyes, ears, nose, mouth, heart, lungs, abdomen, feet, nervous system, and mental health","Only the respiratory and digestive systems"], a:2},
      {t:"How many primary preparations are used in physical assessment?", o:["Three","Seven","Five","Two"], a:2},
      {t:"Which of the following is one of the five primary preparations for physical assessment?", o:["Surgical consent","Radiological imaging","Preparing the patient","Medication administration"], a:2},
      {t:"Why should patients empty their bladder before a physical exam?", o:["To allow for better visualization of the abdomen on X-ray","To prepare for urinalysis collection","To help them feel more relaxed during the exam","To prevent urinary tract infection"], a:2},
      {t:"Drapes used during physical examination serve which of the following purposes?", o:["To keep the nurse warm","To provide privacy and warmth for the client","To prevent infection","To secure monitoring equipment"], a:1},
      {t:"Which of the following materials can be used for draping during a physical exam?", o:["Only sterile surgical drapes","Paper, cloth, or bed linen","Plastic wrapping only","Metal foil sheets"], a:1},
      {t:"All equipment required for physical assessment should be:", o:["Expensive and high-technology","Clean, in good working order, and readily accessible","Stored in a locked cabinet away from the examination room","Disposable after every use regardless of type"], a:2},
      {t:"Which of the following is a requirement for preparing the examination environment?", o:["The room should be kept very cold to prevent infection","The room should be well lighted and warm enough for client comfort","The room should be shared with other patients for efficiency","The equipment should be stored in a separate room"], a:1},
      {t:"Providing privacy during a physical exam is important because:", o:["It is only a legal requirement","Exposure of the body is frequently embarrassing to clients","It speeds up the assessment process","It prevents the spread of infection"], a:1},
      {t:"Which of the following is a purpose of the physical examination?", o:["To prescribe all medications without further testing","To check general health and identify underlying conditions","To replace all laboratory and imaging investigations","To perform surgical procedures"], a:1},
      {t:"Before the primary care provider sees the patient, a care team member will:", o:["Perform a complete surgical history","Measure height and weight and check vital signs","Administer anesthesia","Conduct diagnostic imaging studies"], a:1},

      // MODERATE LEVEL
      {t:"The head-to-toe approach to physical examination is used primarily to:", o:["Focus only on the patient's chief complaint","Ensure a consistent, systematic approach that avoids missing vital assessment areas","Speed up the assessment process by limiting areas examined","Replace the need for health history"], a:1},
      {t:"Which of the following considerations is important when positioning a patient during a physical exam?", o:["The client should always remain in one position throughout the exam","Positioning should only be based on the nurse's convenience","The client's physical condition, energy level, and age should be considered","Uncomfortable positions should be maintained as long as possible"], a:2},
      {t:"Why is the assessment organized so that several body areas can be assessed in one position?", o:["To reduce the cost of the examination","To minimize the number of position changes needed","To avoid the need for draping","To speed up documentation"], a:1},
      {t:"Which of the following is TRUE about draping during physical examination?", o:["The entire body should be exposed throughout the exam","Draping should expose only the area to be assessed while covering other body areas","Draping is only used for female patients","Draping is only required for surgical procedures"], a:1},
      {t:"When preparing a client for physical examination, the nurse should be aware of cultural differences primarily in order to:", o:["Avoid taking a full health history","Adapt the assessment approach and arrange for an interpreter if needed","Skip certain assessment areas for cultural sensitivity","Limit the physical exam to less invasive procedures only"], a:1},
      {t:"Adapting assessment techniques for a client with sensory impairment means the nurse should:", o:["Avoid assessing the affected sensory system","Ensure eyeglasses or hearing aids are nearby before assessment","Skip the health history for these clients","Perform the assessment without addressing sensory needs"], a:1},
      {t:"When a healthcare provider asks 'Can you assign the pain a number between 1 and 10?' they are assessing:", o:["The location of pain","The quality of pain","The duration of pain","The severity of pain"], a:3},
      {t:"Which of the following questions is MOST appropriate for assessing the quality of a patient's pain?", o:["Where is the pain located?","How long does the pain last?","What does the pain feel like — is it dull, achy, pressured, or sharp?","What relieves the discomfort?"], a:2},
      {t:"A care team member reviews the patient's do-not-resuscitate (DNR) status and living will during which phase of the physical exam preparation?", o:["Draping","Instrumentation","Before the primary care provider meets the patient","During the positioning phase"], a:2},
      {t:"Which of the following BEST describes the timing of a physical examination in relation to the client?", o:["The exam should always be scheduled in the morning regardless of patient preference","The timing should be convenient for both the client and the caregiver","The timing is determined only by the caregiver's schedule","The exam should always be performed immediately upon the patient's arrival"], a:1},
      {t:"Why should clients receive an explanation of the physical exam before it begins?", o:["To ensure they sign insurance forms","Because clients are often anxious about what the caregiver will find","To confirm their biographical data","To obtain consent for surgical procedures"], a:1},
      {t:"Which of the following is assessed during the social environment review before a physical exam?", o:["The patient's financial status and insurance coverage","Factors such as smoking and substance use that affect health","The patient's educational background and employment history","The patient's daily caloric intake only"], a:1},
      {t:"A nurse ensures that all assessment equipment is organized and in good working order before a physical exam. This relates to which preparation category?", o:["Preparing the patient","Preparing the environment","Positioning","Instrumentation"], a:3},
      {t:"Which of the following BEST reflects the purpose of positioning during a physical examination?", o:["To make the nurse more comfortable during assessment","To allow multiple body areas to be assessed efficiently while considering client comfort","To reduce the time spent on documentation","To ensure draping covers the entire body"], a:1},
      {t:"A patient does not need to be ill to receive a physical exam. This statement BEST reflects which purpose of physical examination?", o:["Emergency management","Surgical planning","Preventive care","Chronic disease treatment"], a:2},

      // MODERATE-HIGH LEVEL
      {t:"A nurse is preparing a patient for a physical exam and notices the patient appears anxious. The MOST appropriate nursing action is to:", o:["Proceed with the exam without addressing the patient's anxiety","Ask another nurse to perform the exam","Provide an explanation of what the physical exam involves to reduce anxiety","Skip parts of the exam to minimize discomfort"], a:2},
      {t:"Which of the following BEST explains why only areas of the body being examined should be exposed during physical assessment?", o:["To speed up the examination process","To prevent contamination of the examination equipment","To minimize embarrassment and maintain client dignity and privacy","To allow better lighting in the examination room"], a:2},
      {t:"A healthcare provider suspects a health concern based on the patient's symptoms during a physical exam. The MOST appropriate next step is to:", o:["Immediately perform surgery","Dismiss the concern if the patient appears otherwise healthy","Refer the patient to a specialist or order tests to learn more","Wait until the next annual exam to follow up"], a:2},
      {t:"When asking 'Do you notice that anything causes discomfort — for example after eating, after exercise, or at night?', the healthcare provider is assessing which aspect of the patient's pain?", o:["Location of pain","Severity of pain","Quality of pain","Precipitating or aggravating factors of pain"], a:3},
      {t:"Which combination of physical exam preparation elements BEST ensures client comfort and dignity?", o:["Instrumentation and positioning only","Preparing the patient, preparing the environment, positioning, and draping","Draping and instrumentation only","Preparing the environment and instrumentation only"], a:1},
      {t:"A nurse performs a physical exam in a room that is cold and poorly lit. Which preparation principle has been violated?", o:["Instrumentation","Positioning","Preparing the environment","Draping"], a:2},
      {t:"A primary care provider recommends vaccinations during a physical exam. This reflects which purpose of the physical examination?", o:["Checking vital signs and weight","Assessing the nervous system","Obtaining immunizations or vaccines","Reviewing surgical history"], a:2},
      {t:"During a physical exam, an older adult patient has difficulty assuming certain positions due to joint stiffness. The nurse MOST appropriately should:", o:["Skip those assessment areas entirely","Force the patient into the required position for accuracy","Consider the patient's physical condition and age when planning positioning","Document the findings without performing those assessments"], a:2},
      {t:"Why is it important to avoid maintaining uncomfortable positions for long periods during a physical exam?", o:["To reduce the time needed for documentation","To prevent client discomfort and potential injury","To allow more body areas to be assessed simultaneously","To minimize the need for draping"], a:1},
      {t:"A nurse caring for a patient who speaks a different language arranges for an interpreter before the physical exam. This reflects which preparation principle?", o:["Instrumentation","Draping","Preparing the environment","Preparing the patient"], a:3},

      // HIGH LEVEL / APPLIED
      {t:"A nurse is performing a head-to-toe physical assessment. Which statement BEST justifies using this systematic approach?", o:["It focuses only on the patient's chief complaint for efficiency","It ensures consistency and prevents missing vital assessment areas","It is the fastest method of assessment","It eliminates the need for health history"], a:1},
      {t:"A patient states their pain is 8/10, sharp, located in the lower right abdomen, and worsens after eating. Which combination of pain assessment dimensions has the nurse collected?", o:["Severity, quality, location, and aggravating factors","Duration, frequency, radiation, and relieving factors","Onset, duration, timing, and associated symptoms","Location, quality, radiation, and relieving factors"], a:0},
      {t:"Which of the following scenarios BEST illustrates the principle of organizing assessment to minimize position changes?", o:["Assessing the heart in one position, then repositioning to assess the lungs separately","Assessing all abdominal, thoracic, and cardiovascular findings in appropriate sequential positions","Performing assessments in random order based on patient preference","Assessing only the areas the patient complains about"], a:1},
      {t:"A nurse is preparing the physical exam environment. Which combination BEST reflects proper environmental preparation?", o:["Cold room, dim lighting, equipment stored separately","Well-lit, warm room with organized and accessible equipment, private setting","Well-lit room with equipment stored away for cleanliness","Shared exam room with adequate lighting only"], a:1},
      {t:"Which of the following BEST demonstrates appropriate use of draping during a physical examination?", o:["Removing all draping to allow full-body assessment throughout the exam","Using draping to cover the entire body at all times, even the area being examined","Exposing only the body area being assessed while keeping all other areas covered","Draping only areas that the patient requests to be covered"], a:2},
      {t:"A pre-employment physical exam is being performed. Which purpose of physical examination BEST applies to this situation?", o:["Obtaining immunizations required by law","Verifying that the individual is in good health to perform the required job","Reviewing family medical history for genetic disorders","Addressing chronic pain management strategies"], a:1},
      {t:"During preparation for a physical exam, a care team member identifies that the patient is a current smoker who lives alone. This information is MOST relevant to which pre-exam assessment area?", o:["Reviewing current medications","Discussing DNR status","Assessing social environment and its effect on health","Measuring height and weight"], a:2},
      {t:"A nurse notes that a patient with hearing impairment has arrived for a physical exam without their hearing aid. The MOST appropriate action is to:", o:["Proceed with the exam using hand gestures only","Postpone the exam until the next available appointment","Ensure the hearing aid is nearby and adapt assessment communication techniques accordingly","Document the finding and continue without accommodation"], a:2},
      {t:"Which of the following BEST explains why the physical exam is considered a preventive care tool?", o:["It is performed only when a patient is symptomatic","It focuses on identifying, preventing, and managing health concerns before they become serious, even in healthy individuals","It replaces all other diagnostic procedures","It is only used for patients over 65 years of age"], a:1},
      {t:"A nurse is assessing an elderly patient and notes stiffness in multiple joints. Which preparation principle should guide the nurse's approach to the physical exam?", o:["Proceed with standard positioning without modification","Skip joint-related assessments to avoid discomfort","Consider the patient's age and physical limitations when planning positioning and assessment techniques","Ask the patient to perform all required positions regardless of discomfort"], a:2},
      {t:"A patient asks the nurse why they need to provide information about their current medications and supplements before the physical exam. The BEST response by the nurse is:", o:["'It is required for billing and insurance purposes only.'","'It helps the healthcare team understand potential interactions and plan your care appropriately.'","'It is only needed if you have a chronic illness.'","'It is a routine form that does not influence your physical exam.'"], a:1},
      {t:"Which of the following scenarios BEST illustrates the integration of all five physical exam preparation principles?", o:["A nurse performs the exam in a shared room without draping, using equipment stored in another room","A nurse explains the exam to the patient, ensures a warm well-lit private room, considers positioning needs, uses appropriate draping, and checks all equipment before starting","A nurse starts the exam immediately without explanation, using cold instruments in a poorly lit room","A nurse exposes the entire body throughout the exam to save time and skips the environmental check"], a:1},
      {t:"A patient experiencing pain that worsens at night and is relieved by rest reports their pain as a 6/10. The nurse is MOST likely assessing which combination of pain characteristics?", o:["Location, quality, and onset","Severity, aggravating factors, and relieving factors","Radiation, duration, and associated symptoms","Frequency, onset, and quality"], a:1},
      {t:"Which of the following BEST describes the relationship between physical examination and health history?", o:["Physical examination replaces the need for health history","Health history and physical examination are unrelated processes","Physical examination builds on health history by providing objective data to complement the subjective data collected","Physical examination is only performed after all diagnostic tests are completed"], a:2},
      {t:"A nurse is conducting a physical exam on a patient from a different cultural background who is uncomfortable with exposure of the body. Which preparation principle is MOST relevant, and what is the appropriate action?", o:["Instrumentation — ensure equipment is sterile","Positioning — modify positions to avoid discomfort","Preparing the patient — be aware of cultural differences and minimize exposure through appropriate draping and explanation","Preparing the environment — ensure the room is well lit and private only"], a:2},
      {t:"A physical exam can only be performed on patients who are ill.", o:["True","False"], a:1},
      {t:"The head-to-toe approach ensures a consistent, systematic assessment that avoids missing vital areas.", o:["True","False"], a:0},
      {t:"A pre-employment physical exam is one of the recognized purposes of a physical examination.", o:["True","False"], a:0},
      {t:"There are five primary preparations used in physical assessment.", o:["True","False"], a:0},
      {t:"Clients should empty their bladder before a physical exam to help them feel more relaxed.", o:["True","False"], a:0},
      {t:"Drapes should expose the entire body to allow comprehensive assessment throughout the exam.", o:["True","False"], a:1},
      {t:"Drapes can be made of paper, cloth, or bed linen.", o:["True","False"], a:0},
      {t:"The examination room should be cold to reduce infection risk during physical assessment.", o:["True","False"], a:1},
      {t:"All equipment required for physical assessment should be clean, in good working order, and readily accessible.", o:["True","False"], a:0},
      {t:"Uncomfortable positions should be maintained for as long as necessary regardless of client discomfort.", o:["True","False"], a:1},
      {t:"The timing of the physical examination should be convenient for both the client and the caregiver.", o:["True","False"], a:0},
      {t:"An interpreter should be arranged if the client's language differs from that of the nurse.", o:["True","False"], a:0},
      {t:"The assessment should be organized so that several body areas can be assessed in one position to minimize position changes.", o:["True","False"], a:0},
      {t:"Before the primary care provider sees the patient, a care team member measures height and weight and checks vital signs.", o:["True","False"], a:0},
      {t:"Providing privacy during a physical exam is unimportant since examinations are routine procedures.", o:["True","False"], a:1},
      {t:"Clients should be explained about the physical exam before it begins because they may be anxious.", o:["True","False"], a:0},
      {t:"Social environment factors such as smoking and substance use are assessed before the primary care provider meets the patient.", o:["True","False"], a:0},
      {t:"The physical exam checklist includes assessment of the nervous system and mental health.", o:["True","False"], a:0},
      {t:"A patient's cultural background has no relevance to physical examination preparation.", o:["True","False"], a:1},
      {t:"A physical exam can be used to verify that a person is in good health to participate in a sport.", o:["True","False"], a:0}

];

/* ============ ENGINE ============ */
const LETTERS = ['A','B','C','D','E','F'];
let questions, i, correct, wrong, answers, wrongSet, answered;
let totalTime = 50*60, timeLeft, timerInterval;

function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function init(pool) {
  questions = shuffle([...pool]);
  i=0; correct=0; wrong=0; answered=0;
  answers = new Array(questions.length).fill(null);
  wrongSet = [];
  timeLeft = totalTime;
  document.getElementById('totalBadge').textContent = questions.length + ' Questions';
  startTimer(); render();
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    const m = Math.floor(timeLeft/60), s = timeLeft%60;
    document.getElementById('timerTxt').textContent = `${m}:${s<10?'0':''}${s}`;
    const b = document.getElementById('timerBadge');
    if (timeLeft<=120)      b.className='timer-badge danger';
    else if (timeLeft<=300) b.className='timer-badge warn';
    if (timeLeft<=0) { clearInterval(timerInterval); finish(); }
  }, 1000);
}

function updateTop() {
  const total = questions.length;
  document.getElementById('sCorrect').textContent = correct;
  document.getElementById('sWrong').textContent   = wrong;
  document.getElementById('sRemain').textContent  = Math.round(((total-answered)/total)*100)+'%';
  document.getElementById('progLabel').textContent = 'Q '+(i+1)+' / '+total;
  document.getElementById('progFill').style.width  = ((i+1)/total*100)+'%';
  document.getElementById('prog-bar').style.width  = ((i+1)/total*100)+'%';
}

function render() {
  updateTop();
  const q = questions[i];
  document.getElementById('app').innerHTML = `
    <div class="q-card">
      <div class="q-header"><div class="q-num">Question ${i+1} / ${questions.length}</div></div>
      <div class="q-text">${q.t}</div>
      <div class="options">
        ${q.o.map((o,idx)=>`
          <div class="opt" id="opt${idx}" onclick="choose(${idx})">
            <div class="opt-letter">${LETTERS[idx]}</div>
            ${o}
          </div>`).join('')}
      </div>
      <div class="nav-btns">
        <button class="btn btn-skip" onclick="skip()"><i class="fa-solid fa-forward"></i> Skip</button>
      </div>
    </div>`;
}

function choose(v) {
  if (answers[i]!==null) return;
  answers[i]=v; answered++;
  const q=questions[i], ok=v===q.a;
  ok?correct++:wrong++;
  updateTop();
  q.o.forEach((_,idx)=>{
    const el=document.getElementById('opt'+idx);
    el.classList.add('disabled');
    if (idx===q.a) el.classList.add('correct');
    else if (idx===v) el.classList.add('wrong');
  });
  const fb=document.createElement('div');
  fb.className='feedback-bar '+(ok?'ok':'no');
  fb.innerHTML=ok
    ?`<span class="feedback-icon">🎉</span><span>Correct! Well done.</span>`
    :`<span class="feedback-icon">💡</span><span>Correct answer: <b>${q.o[q.a]}</b></span>`;
  const card=document.querySelector('.q-card');
  card.querySelector('.options').after(fb);
  if (q.exp) {
    const exp=document.createElement('div');
    exp.className='explanation';
    exp.innerHTML='<b>💬 Explanation:</b> '+q.exp;
    fb.after(exp);
  }
  card.querySelector('.nav-btns').innerHTML=`
    <button class="btn btn-next" onclick="next()">
      ${i<questions.length-1
        ?'<i class="fa-solid fa-arrow-right"></i> Next Question'
        :'<i class="fa-solid fa-flag-checkered"></i> Finish Exam'}
    </button>`;
}

function skip() {
  if (answers[i]===null) { answers[i]=-1; answered++; wrong++; wrongSet.push(questions[i]); updateTop(); }
  next();
}

function next() {
  if (i<questions.length-1) { i++; render(); window.scrollTo({top:0,behavior:'smooth'}); }
  else finish();
}

function finish() {
  clearInterval(timerInterval);
  const total=questions.length;
  const score=Math.round((correct/total)*100);
  questions.forEach((q,idx)=>{ if(answers[idx]!==q.a) wrongSet.push({...q,myAns:answers[idx]}); });
  wrongSet=[...new Map(wrongSet.map(q=>[q.t,q])).values()];
  let grade,gc;
  if(score>=90)      { grade='🥇 Excellent';      gc='var(--success)'; }
  else if(score>=75) { grade='🥈 Very Good';       gc='var(--accent)'; }
  else if(score>=60) { grade='🥉 Good';            gc='var(--warn)'; }
  else               { grade='📚 Needs Review';    gc='var(--danger)'; }
  const circ=2*Math.PI*45, offset=circ-(score/100)*circ;
  const report=questions.map((q,idx)=>{
    const ok=answers[idx]===q.a;
    return `<div class="report-item ${ok?'ok':'no'}">
      <div class="ri-q">${ok?'✅':'❌'} ${q.t}</div>
      ${!ok?`
        <div class="ri-row"><span class="ri-badge ri-yours">Your Answer</span>${answers[idx]>=0?q.o[answers[idx]]:'Skipped'}</div>
        <div class="ri-row"><span class="ri-badge ri-right">Correct</span>${q.o[q.a]}</div>
      `:''}
    </div>`;
  }).join('');
  document.getElementById('prog-bar').style.width='100%';
  document.getElementById('app').innerHTML=`
    <div class="result-hero">
      <div class="score-ring">
        <svg viewBox="0 0 110 110">
          <circle class="ring-bg"   cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="0"/>
          <circle class="ring-fill" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            style="stroke:${gc}" id="ringFill"/>
        </svg>
        <div class="score-num">${score}</div>
        <div class="score-pct">%</div>
      </div>
      <div class="result-grade" style="color:${gc}">${grade}</div>
      <div class="result-sub">Answered ${answered} of ${total} questions</div>
      <div class="result-stats">
        <div class="rs"><div class="n" style="color:var(--success)">${correct}</div><div class="l">Correct</div></div>
        <div class="rs"><div class="n" style="color:var(--danger)">${wrong}</div><div class="l">Wrong</div></div>
        <div class="rs"><div class="n" style="color:var(--accent)">${total-answered<0?0:total-answered}</div><div class="l">Skipped</div></div>
      </div>
    </div>
    <div class="result-actions">
      ${wrongSet.length?`<button class="btn btn-retry" onclick="retryWrong()"><i class="fa-solid fa-rotate-right"></i> Retry Wrong (${wrongSet.length})</button>`:''}
      <button class="btn btn-home" onclick="init(QUESTIONS)"><i class="fa-solid fa-shuffle"></i> New Random Exam</button>
      <a href="index.html" class="btn btn-home" style="text-decoration:none;"><i class="fa-solid fa-house"></i> Back to Subject</a>
    </div>
    <div style="margin-top:24px">
      <div style="font-size:14px;font-weight:700;margin-bottom:10px;color:var(--text2);">📋 Detailed Report</div>
      ${report}
    </div>`;
  setTimeout(()=>{document.getElementById('ringFill').style.strokeDashoffset=offset;},100);
  window.scrollTo({top:0,behavior:'smooth'});
}

function retryWrong() {
  const pool=[...wrongSet];
  questions=shuffle(pool); i=0; correct=0; wrong=0;
  answers=new Array(questions.length).fill(null);
  wrongSet=[]; answered=0; timeLeft=totalTime;
  startTimer(); render();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* THEME */
const themeBtn=document.getElementById('themeBtn');
let theme=localStorage.getItem('theme')||'light';
function applyTheme(t) {
  theme=t;
  document.documentElement.setAttribute('data-theme',t==='dark'?'dark':'');
  themeBtn.textContent=t==='dark'?'☀️':'🌙';
  localStorage.setItem('theme',t);
}
applyTheme(theme);
themeBtn.addEventListener('click',()=>applyTheme(theme==='dark'?'light':'dark'));

init(QUESTIONS);
</script>
</body>
