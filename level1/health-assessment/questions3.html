<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health History — Exam | GAITH TEAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent:             #0891b2;
  --accent-light:       #06b6d4;
  --accent-dark:        #0e7490;
  --accent-glow:        rgba(8,145,178,0.14);
  --accent-glow-strong: rgba(8,145,178,0.28);
  --bg:      #f8fafc;
  --bg2:     #eef2f7;
  --card:    #ffffff;
  --text:    #1a2332;
  --text2:   #4a5568;
  --text3:   #718096;
  --border:       rgba(8,145,178,0.18);
  --border-card:  rgba(0,0,0,0.07);
  --shadow:       0 4px 20px rgba(0,0,0,0.07);
  --shadow-hover: 0 8px 32px rgba(8,145,178,0.22);
  --success: #16a34a;
  --danger:  #dc2626;
  --warn:    #d97706;
  --radius: 16px;
  --tr: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg:   #0d1117; --bg2: #161b22; --card: #1c2333;
  --text: #e6edf3; --text2: #b1bac4; --text3: #7d8590;
  --border:      rgba(6,182,212,0.22);
  --border-card: rgba(6,182,212,0.10);
  --shadow:       0 4px 20px rgba(0,0,0,0.4);
  --shadow-hover: 0 8px 36px rgba(8,145,178,0.28);
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
  transition: background .4s, color .4s;
  direction: ltr;
}

#prog-bar {
  position: fixed; top: 0; left: 0; height: 3px; z-index: 999;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  width: 0%; transition: width .15s;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 64px;
  background: rgba(248,250,252,.93); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-card); transition: var(--tr);
}
[data-theme="dark"] nav { background: rgba(13,17,23,.95); }

.nav-back {
  display: flex; align-items: center; gap: 7px;
  color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 600;
  padding: 7px 13px; border-radius: 8px;
  border: 1px solid var(--border-card); background: var(--card);
  transition: var(--tr);
}
.nav-back:hover { color: var(--accent); border-color: var(--border); }
.nav-brand { display: flex; align-items: center; gap: 9px; font-size: 15px; font-weight: 900; color: var(--text); }
.nav-logo-icon {
  width: 34px; height: 34px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 900;
}
.nav-right { display: flex; align-items: center; gap: 8px; }
.theme-btn {
  width: 38px; height: 38px; border-radius: 50%;
  border: 1px solid var(--border-card); background: var(--card);
  cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center; transition: var(--tr);
}
.theme-btn:hover { border-color: var(--accent); transform: rotate(20deg); }

/* HERO BAND */
.hero-band {
  margin-top: 64px;
  background: linear-gradient(135deg, var(--accent-dark), var(--accent), var(--accent-light));
  padding: 36px 24px 32px; text-align: center;
  position: relative; overflow: hidden;
}
.hero-band::before {
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse 600px 200px at 50% 100%, rgba(255,255,255,.12) 0%, transparent 70%);
}
.hero-band-icon {
  width: 64px; height: 64px; border-radius: 18px;
  background: rgba(255,255,255,.2); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; margin: 0 auto 12px;
  border: 1.5px solid rgba(255,255,255,.35);
}
.hero-band h1 { font-size: clamp(18px,3.5vw,26px); font-weight: 900; color:#fff; margin-bottom:4px; }
.hero-band p { font-size:13px; color:rgba(255,255,255,.8); }
.hero-meta {
  display:flex; justify-content:center; gap:16px; margin-top:16px; flex-wrap:wrap;
}
.meta-pill {
  background: rgba(255,255,255,.18); backdrop-filter:blur(6px);
  border: 1px solid rgba(255,255,255,.3); border-radius:50px;
  padding:5px 14px; font-size:12px; font-weight:700; color:#fff;
  display:flex; align-items:center; gap:5px;
}

/* SHELL */
.shell { max-width:560px; margin:0 auto; padding:20px 18px 80px; }

/* STATS */
.stats-row {
  display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:14px;
}
.stat-box {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:var(--radius); padding:12px 8px; text-align:center;
}
.stat-box .val { font-size:20px; font-weight:900; }
.stat-box .lbl { font-size:11px; color:var(--text3); margin-top:2px; }
.c-green { color:var(--success); }
.c-red   { color:var(--danger); }
.c-blue  { color:var(--accent); }

/* PROGRESS STRIP */
.prog-strip {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:var(--radius); padding:13px 16px; margin-bottom:16px;
  display:flex; align-items:center; gap:12px;
}
.prog-label { font-size:13px; font-weight:700; color:var(--text2); white-space:nowrap; }
.prog-track { flex:1; height:7px; background:var(--bg2); border-radius:7px; overflow:hidden; }
.prog-fill {
  height:100%; width:0%;
  background:linear-gradient(90deg, var(--accent), var(--accent-light));
  border-radius:7px; transition:width .4s;
}
.timer-badge {
  min-width:60px; height:34px; border-radius:17px;
  background:var(--bg2); border:1px solid var(--border-card);
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:900; color:var(--text);
  gap:4px; padding:0 10px; flex-shrink:0;
}
.timer-badge.warn   { color:var(--warn);    border-color:rgba(217,119,6,.3);  background:rgba(217,119,6,.08); }
.timer-badge.danger { color:var(--danger);  border-color:rgba(220,38,38,.3);  background:rgba(220,38,38,.08); animation:blink .8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.5} }

/* QUESTION CARD */
.q-card {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:20px; overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,.05);
}
.q-header {
  background:linear-gradient(135deg, var(--accent-dark), var(--accent));
  padding:10px 18px;
  display:flex; align-items:center; gap:8px;
}
.q-num {
  background:rgba(255,255,255,.22); border-radius:7px;
  padding:3px 10px; font-size:11px; font-weight:700; color:#fff;
}
.q-text {
  padding:20px 18px 14px; font-size:15px; font-weight:700; color:var(--text);
  line-height:1.65; border-bottom:1px solid var(--border-card);
  direction:ltr; text-align:left;
}
.options { padding:14px 18px 18px; display:flex; flex-direction:column; gap:10px; }

.opt {
  display:flex; align-items:center; gap:12px;
  padding:13px 15px; border-radius:12px;
  border:1.5px solid var(--border-card); background:var(--bg);
  cursor:pointer; font-size:14px; font-weight:600; color:var(--text);
  transition:var(--tr); user-select:none;
  direction:ltr; text-align:left;
}
.opt:hover:not(.disabled) {
  border-color:var(--accent); background:var(--accent-glow);
  transform:translateX(3px);
}
.opt-letter {
  width:28px; height:28px; border-radius:8px; flex-shrink:0;
  background:var(--bg2); border:1px solid var(--border-card);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:900; color:var(--text3);
  transition:var(--tr);
}
.opt.correct { border-color:var(--success); background:rgba(22,163,74,.08); }
.opt.correct .opt-letter { background:var(--success); color:#fff; border-color:var(--success); }
.opt.wrong   { border-color:var(--danger);  background:rgba(220,38,38,.07); }
.opt.wrong   .opt-letter { background:var(--danger);  color:#fff; border-color:var(--danger); }
.opt.disabled { pointer-events:none; }

/* FEEDBACK */
.feedback-bar {
  margin:12px 18px; padding:12px 15px; border-radius:12px;
  display:flex; align-items:center; gap:10px;
  font-size:14px; font-weight:700;
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
.feedback-bar.ok { background:rgba(22,163,74,.1); color:var(--success); border:1px solid rgba(22,163,74,.25); }
.feedback-bar.no { background:rgba(220,38,38,.08); color:var(--danger); border:1px solid rgba(220,38,38,.2); }
.feedback-icon { font-size:18px; }

.explanation {
  margin:0 18px 12px; padding:11px 14px;
  background:rgba(8,145,178,.06); border-radius:10px;
  border-left:3px solid var(--accent);
  font-size:13px; color:var(--text2); line-height:1.6;
  direction:ltr; text-align:left;
}

/* BUTTONS */
.nav-btns { padding:4px 18px 18px; display:flex; gap:10px; }
.btn {
  flex:1; padding:13px; border:none; border-radius:12px;
  font-size:14px; font-weight:900; cursor:pointer;
  font-family:'Outfit',sans-serif; transition:var(--tr);
  display:flex; align-items:center; justify-content:center; gap:7px;
}
.btn-next {
  background:linear-gradient(135deg, var(--accent-dark), var(--accent));
  color:#fff; box-shadow:0 4px 14px var(--accent-glow);
}
.btn-next:hover { transform:translateY(-2px); box-shadow:0 6px 20px var(--accent-glow); }
.btn-skip {
  background:var(--bg2); color:var(--text2);
  border:1px solid var(--border-card); flex:0 0 auto; padding:13px 16px;
}
.btn-skip:hover { border-color:var(--warn); color:var(--warn); }

/* RESULTS */
.result-hero {
  text-align:center; padding:32px 20px 24px;
  background:var(--card); border-radius:20px;
  border:1px solid var(--border-card); margin-bottom:18px;
}
.score-ring {
  width:110px; height:110px; border-radius:50%; margin:0 auto 16px;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; position:relative;
}
.score-ring svg { position:absolute; inset:-5px; width:calc(100% + 10px); height:calc(100% + 10px); transform:rotate(-90deg); }
.score-ring circle { fill:none; stroke-width:5; stroke-linecap:round; }
.ring-bg   { stroke:var(--bg2); }
.ring-fill { stroke:var(--accent); transition:stroke-dashoffset 1s ease; }
.score-num { font-size:28px; font-weight:900; color:var(--text); }
.score-pct { font-size:12px; color:var(--text3); }
.result-grade { font-size:20px; font-weight:900; margin-bottom:5px; }
.result-sub   { font-size:14px; color:var(--text2); }
.result-stats {
  display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:18px;
}
.rs { background:var(--bg2); border-radius:10px; padding:11px 8px; text-align:center; }
.rs .n { font-size:20px; font-weight:900; }
.rs .l { font-size:11px; color:var(--text3); }

/* REPORT */
.report-item {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:13px; padding:15px; margin-bottom:9px;
  border-left:4px solid var(--border-card);
  direction:ltr; text-align:left;
}
.report-item.ok { border-left-color:var(--success); }
.report-item.no { border-left-color:var(--danger); }
.report-item .ri-q  { font-size:13px; font-weight:700; margin-bottom:7px; }
.report-item .ri-row { display:flex; align-items:center; gap:8px; font-size:12px; margin-top:4px; color:var(--text2); }
.ri-badge { padding:2px 8px; border-radius:6px; font-weight:700; font-size:11px; flex-shrink:0; }
.ri-yours { background:rgba(220,38,38,.1); color:var(--danger); }
.ri-right { background:rgba(22,163,74,.1);  color:var(--success); }

.result-actions { display:flex; flex-direction:column; gap:10px; margin-top:18px; }
.btn-retry { background:linear-gradient(135deg,var(--accent-dark),var(--accent)); color:#fff; }
.btn-retry:hover { transform:translateY(-2px); box-shadow:0 6px 20px var(--accent-glow); }
.btn-home  { background:var(--bg2); color:var(--text); border:1px solid var(--border-card); }
.btn-home:hover { border-color:var(--accent); color:var(--accent); }

/* FOOTER */
footer {
  background:var(--bg2); border-top:1px solid var(--border-card);
  padding:22px 24px;
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:10px;
}
.footer-brand { font-size:14px; font-weight:700; }
.footer-brand span { color:var(--accent); }
.footer-tg {
  display:flex; align-items:center; gap:5px;
  text-decoration:none; color:#229ED9; font-size:12px; font-weight:600;
}

@media (max-width:480px) {
  nav { padding:0 14px; }
  .shell { padding:14px 12px 60px; }
  .nav-brand span { display:none; }
}
</style>
</head>

<div id="prog-bar"></div>

<nav>
  <a href="index.html" class="nav-back"><i class="fa-solid fa-arrow-left"></i> Back</a>
  <div class="nav-brand">
    <div class="nav-logo-icon">GT</div>

  </div>

  </div>
</nav>

<div class="hero-band">
  <div class="hero-band-icon">📋</div>
  <h1>Health History</h1>
  <p>Health Assessment</p>
  <div class="hero-meta">
    <div class="meta-pill"><i class="fa-solid fa-list-ol"></i> <span id="totalBadge">-- Questions</span></div>
    <div class="meta-pill"><i class="fa-solid fa-clock"></i> 50 Min</div>
    <div class="meta-pill"><i class="fa-solid fa-shuffle"></i> Shuffled</div>
  </div>
</div>

<div class="shell">
  <div class="stats-row">
    <div class="stat-box"><div class="val c-green" id="sCorrect">0</div><div class="lbl">✔ Correct</div></div>
    <div class="stat-box"><div class="val c-red"   id="sWrong">0</div><div class="lbl">✖ Wrong</div></div>
    <div class="stat-box"><div class="val c-blue"  id="sRemain">100%</div><div class="lbl">⏳ Remaining</div></div>
  </div>

  <div class="prog-strip">
    <div class="prog-label" id="progLabel">Q 1</div>
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <div class="timer-badge" id="timerBadge"><i class="fa-regular fa-clock"></i><span id="timerTxt">50:00</span></div>
  </div>

  <div id="app"></div>
</div>

<footer>
  <div class="footer-brand">GAITH <span>TEAM</span></div>

    <i class="fa-brands fa-telegram"></i> @nursing2bu

</footer>

<script>
const QUESTIONS = [
 // EASY LEVEL
      {t:"What is a health history?", o:["A collection of objective data only","A current assembly of organized data sole to an individual","A summary of laboratory results only","A record of medications prescribed by physicians"], a:1},
      {t:"Health history includes which of the following types of data?", o:["Only biological and physical data","Demographic, biological, mental, emotional, sociocultural, sexual, and spiritual data","Only demographic and financial data","Only mental and emotional data"], a:1},
      {t:"Health history is described as a systematic collection of:", o:["Only objective data observed by the nurse","Only subjective data reported by the client","Subjective data reported by the client and objective data observed by the nurse","Financial and insurance data"], a:2},
      {t:"Which of the following is the FIRST component of biographical data collected in a health history?", o:["Marital status","Occupation","Source of history and name","Religious affiliation"], a:2},
      {t:"What is the 'chief complaint' in a health history?", o:["A list of all previous illnesses","The reason for hospitalization or seeking care","The patient's nutritional preferences","A summary of family history"], a:1},
      {t:"Which of the following is an example of a chief complaint?", o:["Family history of diabetes","Chest pain","Daily exercise routine","Current medication list"], a:1},
      {t:"How many phases are involved in taking a health history?", o:["One","Three","Four","Two"], a:3},
      {t:"What are the two phases of taking a health history?", o:["Assessment and evaluation","Planning and implementation","Interview phase and recording phase","Diagnosis and treatment"], a:2},
      {t:"Which type of health history is taken on initial visits to a health care facility?", o:["Problem-focused health history","Interval health history","Complete health history","Emergency health history"], a:2},
      {t:"Which type of health history collects data about a specific problem?", o:["Complete health history","Interval health history","Problem-focused health history","Family health history"], a:2},
      {t:"Interval health history is used to:", o:["Collect data on initial visits","Document surgical procedures","Collect information during follow-up visits","Replace complete health history"], a:2},
      {t:"The family history component of health history includes information on which of the following diseases?", o:["Only infectious diseases","Heart disease, lung disease, cancer, hypertension, diabetes, and tuberculosis","Only genetic disorders","Only neurological diseases"], a:1},
      {t:"Which component of health history includes information about exercise patterns, sleep patterns, and life patterns?", o:["Family history","Biographical data","Psychosocial history","Current health information"], a:3},
      {t:"Allergies documented in the past health history should include:", o:["Only food allergies","Only drug allergies","The allergic reaction experienced","Only environmental allergies"], a:2},
      {t:"Which section of the health history addresses the client's coping with illness and psychological or social problems?", o:["Biographical data","Family history","Nutritional health history","Psychosocial history"], a:3},

      // MODERATE LEVEL
      {t:"Biographical data in a health history includes all of the following EXCEPT:", o:["Full name and address","Date and place of birth","Marital status and occupation","Chief complaint and onset of illness"], a:3},
      {t:"What does OLDCARTS stand for in symptom examination?", o:["Onset, Location, Duration, Character, Alleviating factors, Relieving factors, Timing, Severity","Onset, Laboratory, Diagnosis, Care, Assessment, Reporting, Treatment, Surgery","Only Limited Data Can Accurately Record Treatment Success","Observation, Location, Diagnosis, Culture, Allergies, Risk, Tests, Signs"], a:0},
      {t:"Which of the following best describes the purpose of obtaining a health history?", o:["To prescribe medication for the patient","To provide the nurse with a description of patient's symptoms and how they developed","To replace physical examination","To obtain insurance information"], a:1},
      {t:"Which component of the health history includes information on environmental, ingestion, and drug allergies as well as habits such as alcohol, tobacco, and caffeine use?", o:["Family history","Biographical data","Current health information","Developmental tasks"], a:2},
      {t:"Which of the following is included in the functional assessment component of health history?", o:["Cultural beliefs and language preferences","Full name, address, and date of birth","Activity, exercise, sleep, nutrition, and coping strategies","Family history of communicable diseases"], a:2},
      {t:"Cultural assessment in health history includes all of the following EXCEPT:", o:["Cultural and health-related beliefs and practices","Religious affiliation and spiritual beliefs","Language and communication preferences","Surgical history and vaccination records"], a:3},
      {t:"Which guideline is recommended when taking a nursing health history?", o:["Use only yes or no questions for efficiency","Complete documentation several days after the interview","Listen more than talk and observe nonverbal communication","Avoid clarifying the client's use of terms and descriptors"], a:2},
      {t:"When should nursing health history be recorded?", o:["Only after discharge","A week after the interview","Soon after the interview","During the planning phase only"], a:2},
      {t:"Which of the following is part of the environmental history component?", o:["Family genetic factors","Current medications and exercise patterns","Physical, psychological, and social environment, including hazards and safety measures","Resuscitation status and emergency contacts"], a:2},
      {t:"The component of the health history that addresses 'how and why' surgical procedures were performed is found under:", o:["Family history","Biographical data","Component of present illness","Nutritional health history"], a:2},
      {t:"Which of the following best illustrates the importance of health history?", o:["It replaces all diagnostic tests and physical examination","It aids in diagnosis, treatment decisions, and establishing trust between patient and medical professionals","It is only used for chronic disease management","It is used exclusively for medication administration"], a:1},
      {t:"The introductory information gathered during the interview phase of health history includes all of the following EXCEPT:", o:["Name and contact information","Birthdate and age","Emergency contact information","Current laboratory results"], a:3},
      {t:"When a nurse asks a patient 'What languages do you speak and which do you prefer for communication?', this relates to which component of health history?", o:["Biographical data – occupation","Cultural assessment – language and communication","Psychosocial history – coping","Family history – social structure"], a:1},
      {t:"Resuscitation status is discussed during health history to:", o:["Determine insurance eligibility","Clarify medical interventions to be used or not used in case of emergency","Record the patient's past surgical history","Assess nutritional needs"], a:1},
      {t:"Which of the following statements is TRUE about the health history interview?", o:["The nurse should talk more than the patient to gather data quickly","The environment should be private, comfortable, and quiet","Yes or no questions should always be used","The interview should be conducted in a public space"], a:1},

      // MODERATE-HIGH LEVEL
      {t:"A patient presents with swollen ankles for several weeks. Under which component of the health history would this be documented?", o:["Biographical data","Family history","Chief complaint","Nutritional health history"], a:2},
      {t:"When assessing interpersonal factors in health history, the nurse should evaluate all of the following EXCEPT:", o:["Self-concept and desired changes","Stress response and coping patterns","Ethnic and cultural origin and values","Vaccination records and allergy history"], a:3},
      {t:"Which of the following best reflects the role of nutritional health history?", o:["It focuses only on weight management","It plays an important role in health, disease prevention, and recovery from illness","It is only relevant for patients with eating disorders","It replaces laboratory testing for nutritional deficiencies"], a:1},
      {t:"The symptom examination in the component of present illness includes which of the following?", o:["Onset, date, duration, frequency, location, quality, and mitigating or aggravating factors","Name, address, occupation, and marital status","Cultural beliefs, language, and religious practices","Coping patterns, support systems, and stress perception"], a:0},
      {t:"Which component of health history would include information about a strong family history of diabetes and hypertension?", o:["Biographical data","Current health information","Family history","Functional assessment"], a:2},
      {t:"The guideline 'equilibrium between allowing a client to talk in an unstructured way and the need to structure demanded data' refers to which skill during health history?", o:["Cultural assessment","Therapeutic interviewing technique","Documentation practice","Physical examination skill"], a:1},
      {t:"Which component of health history is most directly related to establishing a baseline for the patient?", o:["Family history","Chief complaint","Complete health history including past health history","Developmental tasks"], a:2},
      {t:"A nurse asks a patient, 'What aggravates your symptoms and what alleviates them?' This question relates to which section of the health history?", o:["Biographical data","Family history","History of present health concern","Cultural assessment"], a:2},
      {t:"When recording a nursing health history, notes should be:", o:["Minimal and only include positive findings","Adequate and recorded soon after the interview","Delayed until the end of the shift","Written only in medical terminology without explanation"], a:1},

      // HIGH LEVEL / APPLIED
      {t:"A nurse is performing an initial visit assessment of a newly admitted patient. Which type of health history is MOST appropriate?", o:["Problem-focused health history","Interval health history","Emergency health history","Complete health history"], a:3},
      {t:"A patient returns to the clinic for a follow-up visit after treatment for hypertension. Which type of health history should the nurse collect?", o:["Complete health history","Interval health history","Emergency health history","Cultural assessment only"], a:1},
      {t:"A nurse is assessing a patient admitted with chest pain. Under which component of the health history would information about previous similar episodes, duration, and aggravating factors be documented?", o:["Family history","Biographical data","Component of present illness","Developmental tasks"], a:2},

      {t:"A nurse notices that a patient is avoiding eye contact and speaking in a very low voice during the history interview. According to health history guidelines, the nurse should:", o:["Ignore nonverbal cues and continue questioning","Observe and consider nonverbal communication such as body language and voice tone","Conclude the interview and rely on medical records","Use only yes or no questions to speed up the process"], a:1},
      {t:"Which of the following components of health history would BEST help identify potential drug-nutrient interactions in a patient with a chronic illness?", o:["Biographical data","Developmental tasks","Nutritional health history combined with current health information","Environmental history"], a:2},

      {t:"A nurse asks a patient, 'How has this health concern affected your life and daily activities?' This question primarily assesses:", o:["Family history","Biographical data","The impact of the present illness on the patient's functioning","Environmental hazards"], a:2},
      {t:"Which of the following BEST explains why health history is described as a basis for an individualized plan of care?", o:["It contains only standardized data applicable to all patients","It supplies organized, comprehensive data unique to the individual that guides diagnosis, treatment, and health promotion","It replaces the need for physical examination","It focuses exclusively on past medical events"], a:1},
      {t:"A nurse is collecting health history from a patient who speaks a different language. According to the health history guidelines, what should the nurse do?", o:["Proceed with the interview using simple words","Avoid documenting language preferences","Inquire about and document the need for an interpreter","Ask a family member to interpret without documentation"], a:2},
      {t:"During the interview phase, the nurse should communicate and negotiate priorities with the client primarily to:", o:["Speed up the documentation process","Ensure the nurse's agenda is followed","Ensure the client's concerns are addressed and relevant data is collected collaboratively","Avoid collecting unnecessary biographical data"], a:2},
      {t:"A health history reveals that a patient's father died of a myocardial infarction at age 50 and his mother had hypertension and type 2 diabetes. This information would MOST appropriately be documented under:", o:["Current health information","Psychosocial history","Family history","Environmental history"], a:2},
      {t:"When a nurse asks 'What caused this health concern to occur?' and 'What medications or treatments have you used?', these questions relate to which component of the health history?", o:["Biographical data","Family history","History of present health concern","Developmental tasks"], a:2},
      {t:"The statement 'Health history involves subjective information from the patient so that health care professionals and the patient can create a strategy to promote health' BEST reflects which purpose of health history?", o:["To serve only as a legal document","To collect data for billing and insurance purposes","To guide collaborative health promotion and management of acute and chronic health problems","To replace the physical examination process"], a:2},
      {t:"Health history is a current assembly of organized data specific to an individual.", o:["True","False"], a:0},
      {t:"Health history includes only biological and physical data.", o:["True","False"], a:1},
      {t:"The two phases of taking a health history are the interview phase and the recording phase.", o:["True","False"], a:0},
      {t:"A complete health history is typically taken on follow-up visits rather than initial visits.", o:["True","False"], a:1},
      {t:"An interval health history is collected during follow-up visits to a healthcare facility.", o:["True","False"], a:0},
      {t:"The chief complaint refers to the reason for seeking care or hospitalization.", o:["True","False"], a:0},
      {t:"Biographical data includes the patient's chief complaint and onset of illness.", o:["True","False"], a:1},
      {t:"According to health history guidelines, the nurse should listen more than talk during the interview.", o:["True","False"], a:0},
      {t:"Yes or no questions should be used when complete data is needed during a health history interview.", o:["True","False"], a:1},

      {t:"Observing nonverbal communication such as body language and voice tone is recommended during the health history interview.", o:["True","False"], a:0},

/* ============ ENGINE ============ */
const LETTERS = ['A','B','C','D','E','F'];
let questions, i, correct, wrong, answers, wrongSet, answered;
let totalTime = 50*60, timeLeft, timerInterval;

function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function init(pool) {
  questions = shuffle([...pool]);
  i=0; correct=0; wrong=0; answered=0;
  answers = new Array(questions.length).fill(null);
  wrongSet = [];
  timeLeft = totalTime;
  document.getElementById('totalBadge').textContent = questions.length + ' Questions';
  startTimer(); render();
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    const m = Math.floor(timeLeft/60), s = timeLeft%60;
    document.getElementById('timerTxt').textContent = `${m}:${s<10?'0':''}${s}`;
    const b = document.getElementById('timerBadge');
    if (timeLeft<=120)      b.className='timer-badge danger';
    else if (timeLeft<=300) b.className='timer-badge warn';
    if (timeLeft<=0) { clearInterval(timerInterval); finish(); }
  }, 1000);
}

function updateTop() {
  const total = questions.length;
  document.getElementById('sCorrect').textContent = correct;
  document.getElementById('sWrong').textContent   = wrong;
  document.getElementById('sRemain').textContent  = Math.round(((total-answered)/total)*100)+'%';
  document.getElementById('progLabel').textContent = 'Q '+(i+1)+' / '+total;
  document.getElementById('progFill').style.width  = ((i+1)/total*100)+'%';
  document.getElementById('prog-bar').style.width  = ((i+1)/total*100)+'%';
}

function render() {
  updateTop();
  const q = questions[i];
  document.getElementById('app').innerHTML = `
    <div class="q-card">
      <div class="q-header"><div class="q-num">Question ${i+1} / ${questions.length}</div></div>
      <div class="q-text">${q.t}</div>
      <div class="options">
        ${q.o.map((o,idx)=>`
          <div class="opt" id="opt${idx}" onclick="choose(${idx})">
            <div class="opt-letter">${LETTERS[idx]}</div>
            ${o}
          </div>`).join('')}
      </div>
      <div class="nav-btns">
        <button class="btn btn-skip" onclick="skip()"><i class="fa-solid fa-forward"></i> Skip</button>
      </div>
    </div>`;
}

function choose(v) {
  if (answers[i]!==null) return;
  answers[i]=v; answered++;
  const q=questions[i], ok=v===q.a;
  ok?correct++:wrong++;
  updateTop();
  q.o.forEach((_,idx)=>{
    const el=document.getElementById('opt'+idx);
    el.classList.add('disabled');
    if (idx===q.a) el.classList.add('correct');
    else if (idx===v) el.classList.add('wrong');
  });
  const fb=document.createElement('div');
  fb.className='feedback-bar '+(ok?'ok':'no');
  fb.innerHTML=ok
    ?`<span class="feedback-icon">🎉</span><span>Correct! Well done.</span>`
    :`<span class="feedback-icon">💡</span><span>Correct answer: <b>${q.o[q.a]}</b></span>`;
  const card=document.querySelector('.q-card');
  card.querySelector('.options').after(fb);
  if (q.exp) {
    const exp=document.createElement('div');
    exp.className='explanation';
    exp.innerHTML='<b>💬 Explanation:</b> '+q.exp;
    fb.after(exp);
  }
  card.querySelector('.nav-btns').innerHTML=`
    <button class="btn btn-next" onclick="next()">
      ${i<questions.length-1
        ?'<i class="fa-solid fa-arrow-right"></i> Next Question'
        :'<i class="fa-solid fa-flag-checkered"></i> Finish Exam'}
    </button>`;
}

function skip() {
  if (answers[i]===null) { answers[i]=-1; answered++; wrong++; wrongSet.push(questions[i]); updateTop(); }
  next();
}

function next() {
  if (i<questions.length-1) { i++; render(); window.scrollTo({top:0,behavior:'smooth'}); }
  else finish();
}

function finish() {
  clearInterval(timerInterval);
  const total=questions.length;
  const score=Math.round((correct/total)*100);
  questions.forEach((q,idx)=>{ if(answers[idx]!==q.a) wrongSet.push({...q,myAns:answers[idx]}); });
  wrongSet=[...new Map(wrongSet.map(q=>[q.t,q])).values()];
  let grade,gc;
  if(score>=90)      { grade='🥇 Excellent';      gc='var(--success)'; }
  else if(score>=75) { grade='🥈 Very Good';       gc='var(--accent)'; }
  else if(score>=60) { grade='🥉 Good';            gc='var(--warn)'; }
  else               { grade='📚 Needs Review';    gc='var(--danger)'; }
  const circ=2*Math.PI*45, offset=circ-(score/100)*circ;
  const report=questions.map((q,idx)=>{
    const ok=answers[idx]===q.a;
    return `<div class="report-item ${ok?'ok':'no'}">
      <div class="ri-q">${ok?'✅':'❌'} ${q.t}</div>
      ${!ok?`
        <div class="ri-row"><span class="ri-badge ri-yours">Your Answer</span>${answers[idx]>=0?q.o[answers[idx]]:'Skipped'}</div>
        <div class="ri-row"><span class="ri-badge ri-right">Correct</span>${q.o[q.a]}</div>
      `:''}
    </div>`;
  }).join('');
  document.getElementById('prog-bar').style.width='100%';
  document.getElementById('app').innerHTML=`
    <div class="result-hero">
      <div class="score-ring">
        <svg viewBox="0 0 110 110">
          <circle class="ring-bg"   cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="0"/>
          <circle class="ring-fill" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            style="stroke:${gc}" id="ringFill"/>
        </svg>
        <div class="score-num">${score}</div>
        <div class="score-pct">%</div>
      </div>
      <div class="result-grade" style="color:${gc}">${grade}</div>
      <div class="result-sub">Answered ${answered} of ${total} questions</div>
      <div class="result-stats">
        <div class="rs"><div class="n" style="color:var(--success)">${correct}</div><div class="l">Correct</div></div>
        <div class="rs"><div class="n" style="color:var(--danger)">${wrong}</div><div class="l">Wrong</div></div>
        <div class="rs"><div class="n" style="color:var(--accent)">${total-answered<0?0:total-answered}</div><div class="l">Skipped</div></div>
      </div>
    </div>
    <div class="result-actions">
      ${wrongSet.length?`<button class="btn btn-retry" onclick="retryWrong()"><i class="fa-solid fa-rotate-right"></i> Retry Wrong (${wrongSet.length})</button>`:''}
      <button class="btn btn-home" onclick="init(QUESTIONS)"><i class="fa-solid fa-shuffle"></i> New Random Exam</button>
      <a href="index.html" class="btn btn-home" style="text-decoration:none;"><i class="fa-solid fa-house"></i> Back to Subject</a>
    </div>
    <div style="margin-top:24px">
      <div style="font-size:14px;font-weight:700;margin-bottom:10px;color:var(--text2);">📋 Detailed Report</div>
      ${report}
    </div>`;
  setTimeout(()=>{document.getElementById('ringFill').style.strokeDashoffset=offset;},100);
  window.scrollTo({top:0,behavior:'smooth'});
}

function retryWrong() {
  const pool=[...wrongSet];
  questions=shuffle(pool); i=0; correct=0; wrong=0;
  answers=new Array(questions.length).fill(null);
  wrongSet=[]; answered=0; timeLeft=totalTime;
  startTimer(); render();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* THEME */
const themeBtn=document.getElementById('themeBtn');
let theme=localStorage.getItem('theme')||'light';
function applyTheme(t) {
  theme=t;
  document.documentElement.setAttribute('data-theme',t==='dark'?'dark':'');
  themeBtn.textContent=t==='dark'?'☀️':'🌙';
  localStorage.setItem('theme',t);
}
applyTheme(theme);
themeBtn.addEventListener('click',()=>applyTheme(theme==='dark'?'light':'dark'));

init(QUESTIONS);
</script>
