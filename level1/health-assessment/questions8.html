<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mental & Emotional Health — Exam | GAITH TEAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent:             #0891b2;
  --accent-light:       #06b6d4;
  --accent-dark:        #0e7490;
  --accent-glow:        rgba(8,145,178,0.14);
  --accent-glow-strong: rgba(8,145,178,0.28);
  --bg:      #f8fafc;
  --bg2:     #eef2f7;
  --card:    #ffffff;
  --text:    #1a2332;
  --text2:   #4a5568;
  --text3:   #718096;
  --border:       rgba(8,145,178,0.18);
  --border-card:  rgba(0,0,0,0.07);
  --shadow:       0 4px 20px rgba(0,0,0,0.07);
  --shadow-hover: 0 8px 32px rgba(8,145,178,0.22);
  --success: #16a34a;
  --danger:  #dc2626;
  --warn:    #d97706;
  --radius: 16px;
  --tr: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg:   #0d1117; --bg2: #161b22; --card: #1c2333;
  --text: #e6edf3; --text2: #b1bac4; --text3: #7d8590;
  --border:      rgba(6,182,212,0.22);
  --border-card: rgba(6,182,212,0.10);
  --shadow:       0 4px 20px rgba(0,0,0,0.4);
  --shadow-hover: 0 8px 36px rgba(8,145,178,0.28);
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
  transition: background .4s, color .4s;
  direction: ltr;
}

#prog-bar {
  position: fixed; top: 0; left: 0; height: 3px; z-index: 999;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  width: 0%; transition: width .15s;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 64px;
  background: rgba(248,250,252,.93); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-card); transition: var(--tr);
}
[data-theme="dark"] nav { background: rgba(13,17,23,.95); }

.nav-back {
  display: flex; align-items: center; gap: 7px;
  color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 600;
  padding: 7px 13px; border-radius: 8px;
  border: 1px solid var(--border-card); background: var(--card);
  transition: var(--tr);
}
.nav-back:hover { color: var(--accent); border-color: var(--border); }
.nav-brand { display: flex; align-items: center; gap: 9px; font-size: 15px; font-weight: 900; color: var(--text); }
.nav-logo-icon {
  width: 34px; height: 34px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 900;
}
.nav-right { display: flex; align-items: center; gap: 8px; }
.theme-btn {
  width: 38px; height: 38px; border-radius: 50%;
  border: 1px solid var(--border-card); background: var(--card);
  cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center; transition: var(--tr);
}
.theme-btn:hover { border-color: var(--accent); transform: rotate(20deg); }

/* HERO BAND */
.hero-band {
  margin-top: 64px;
  background: linear-gradient(135deg, var(--accent-dark), var(--accent), var(--accent-light));
  padding: 36px 24px 32px; text-align: center;
  position: relative; overflow: hidden;
}
.hero-band::before {
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse 600px 200px at 50% 100%, rgba(255,255,255,.12) 0%, transparent 70%);
}
.hero-band-icon {
  width: 64px; height: 64px; border-radius: 18px;
  background: rgba(255,255,255,.2); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; margin: 0 auto 12px;
  border: 1.5px solid rgba(255,255,255,.35);
}
.hero-band h1 { font-size: clamp(18px,3.5vw,26px); font-weight: 900; color:#fff; margin-bottom:4px; }
.hero-band p { font-size:13px; color:rgba(255,255,255,.8); }
.hero-meta {
  display:flex; justify-content:center; gap:16px; margin-top:16px; flex-wrap:wrap;
}
.meta-pill {
  background: rgba(255,255,255,.18); backdrop-filter:blur(6px);
  border: 1px solid rgba(255,255,255,.3); border-radius:50px;
  padding:5px 14px; font-size:12px; font-weight:700; color:#fff;
  display:flex; align-items:center; gap:5px;
}

/* SHELL */
.shell { max-width:560px; margin:0 auto; padding:20px 18px 80px; }

/* STATS */
.stats-row {
  display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:14px;
}
.stat-box {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:var(--radius); padding:12px 8px; text-align:center;
}
.stat-box .val { font-size:20px; font-weight:900; }
.stat-box .lbl { font-size:11px; color:var(--text3); margin-top:2px; }
.c-green { color:var(--success); }
.c-red   { color:var(--danger); }
.c-blue  { color:var(--accent); }

/* PROGRESS STRIP */
.prog-strip {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:var(--radius); padding:13px 16px; margin-bottom:16px;
  display:flex; align-items:center; gap:12px;
}
.prog-label { font-size:13px; font-weight:700; color:var(--text2); white-space:nowrap; }
.prog-track { flex:1; height:7px; background:var(--bg2); border-radius:7px; overflow:hidden; }
.prog-fill {
  height:100%; width:0%;
  background:linear-gradient(90deg, var(--accent), var(--accent-light));
  border-radius:7px; transition:width .4s;
}
.timer-badge {
  min-width:60px; height:34px; border-radius:17px;
  background:var(--bg2); border:1px solid var(--border-card);
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:900; color:var(--text);
  gap:4px; padding:0 10px; flex-shrink:0;
}
.timer-badge.warn   { color:var(--warn);    border-color:rgba(217,119,6,.3);  background:rgba(217,119,6,.08); }
.timer-badge.danger { color:var(--danger);  border-color:rgba(220,38,38,.3);  background:rgba(220,38,38,.08); animation:blink .8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.5} }

/* QUESTION CARD */
.q-card {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:20px; overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,.05);
}
.q-header {
  background:linear-gradient(135deg, var(--accent-dark), var(--accent));
  padding:10px 18px;
  display:flex; align-items:center; gap:8px;
}
.q-num {
  background:rgba(255,255,255,.22); border-radius:7px;
  padding:3px 10px; font-size:11px; font-weight:700; color:#fff;
}
.q-text {
  padding:20px 18px 14px; font-size:15px; font-weight:700; color:var(--text);
  line-height:1.65; border-bottom:1px solid var(--border-card);
  direction:ltr; text-align:left;
}
.options { padding:14px 18px 18px; display:flex; flex-direction:column; gap:10px; }

.opt {
  display:flex; align-items:center; gap:12px;
  padding:13px 15px; border-radius:12px;
  border:1.5px solid var(--border-card); background:var(--bg);
  cursor:pointer; font-size:14px; font-weight:600; color:var(--text);
  transition:var(--tr); user-select:none;
  direction:ltr; text-align:left;
}
.opt:hover:not(.disabled) {
  border-color:var(--accent); background:var(--accent-glow);
  transform:translateX(3px);
}
.opt-letter {
  width:28px; height:28px; border-radius:8px; flex-shrink:0;
  background:var(--bg2); border:1px solid var(--border-card);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:900; color:var(--text3);
  transition:var(--tr);
}
.opt.correct { border-color:var(--success); background:rgba(22,163,74,.08); }
.opt.correct .opt-letter { background:var(--success); color:#fff; border-color:var(--success); }
.opt.wrong   { border-color:var(--danger);  background:rgba(220,38,38,.07); }
.opt.wrong   .opt-letter { background:var(--danger);  color:#fff; border-color:var(--danger); }
.opt.disabled { pointer-events:none; }

/* FEEDBACK */
.feedback-bar {
  margin:12px 18px; padding:12px 15px; border-radius:12px;
  display:flex; align-items:center; gap:10px;
  font-size:14px; font-weight:700;
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
.feedback-bar.ok { background:rgba(22,163,74,.1); color:var(--success); border:1px solid rgba(22,163,74,.25); }
.feedback-bar.no { background:rgba(220,38,38,.08); color:var(--danger); border:1px solid rgba(220,38,38,.2); }
.feedback-icon { font-size:18px; }

.explanation {
  margin:0 18px 12px; padding:11px 14px;
  background:rgba(8,145,178,.06); border-radius:10px;
  border-left:3px solid var(--accent);
  font-size:13px; color:var(--text2); line-height:1.6;
  direction:ltr; text-align:left;
}

/* BUTTONS */
.nav-btns { padding:4px 18px 18px; display:flex; gap:10px; }
.btn {
  flex:1; padding:13px; border:none; border-radius:12px;
  font-size:14px; font-weight:900; cursor:pointer;
  font-family:'Outfit',sans-serif; transition:var(--tr);
  display:flex; align-items:center; justify-content:center; gap:7px;
}
.btn-next {
  background:linear-gradient(135deg, var(--accent-dark), var(--accent));
  color:#fff; box-shadow:0 4px 14px var(--accent-glow);
}
.btn-next:hover { transform:translateY(-2px); box-shadow:0 6px 20px var(--accent-glow); }
.btn-skip {
  background:var(--bg2); color:var(--text2);
  border:1px solid var(--border-card); flex:0 0 auto; padding:13px 16px;
}
.btn-skip:hover { border-color:var(--warn); color:var(--warn); }

/* RESULTS */
.result-hero {
  text-align:center; padding:32px 20px 24px;
  background:var(--card); border-radius:20px;
  border:1px solid var(--border-card); margin-bottom:18px;
}
.score-ring {
  width:110px; height:110px; border-radius:50%; margin:0 auto 16px;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; position:relative;
}
.score-ring svg { position:absolute; inset:-5px; width:calc(100% + 10px); height:calc(100% + 10px); transform:rotate(-90deg); }
.score-ring circle { fill:none; stroke-width:5; stroke-linecap:round; }
.ring-bg   { stroke:var(--bg2); }
.ring-fill { stroke:var(--accent); transition:stroke-dashoffset 1s ease; }
.score-num { font-size:28px; font-weight:900; color:var(--text); }
.score-pct { font-size:12px; color:var(--text3); }
.result-grade { font-size:20px; font-weight:900; margin-bottom:5px; }
.result-sub   { font-size:14px; color:var(--text2); }
.result-stats {
  display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:18px;
}
.rs { background:var(--bg2); border-radius:10px; padding:11px 8px; text-align:center; }
.rs .n { font-size:20px; font-weight:900; }
.rs .l { font-size:11px; color:var(--text3); }

/* REPORT */
.report-item {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:13px; padding:15px; margin-bottom:9px;
  border-left:4px solid var(--border-card);
  direction:ltr; text-align:left;
}
.report-item.ok { border-left-color:var(--success); }
.report-item.no { border-left-color:var(--danger); }
.report-item .ri-q  { font-size:13px; font-weight:700; margin-bottom:7px; }
.report-item .ri-row { display:flex; align-items:center; gap:8px; font-size:12px; margin-top:4px; color:var(--text2); }
.ri-badge { padding:2px 8px; border-radius:6px; font-weight:700; font-size:11px; flex-shrink:0; }
.ri-yours { background:rgba(220,38,38,.1); color:var(--danger); }
.ri-right { background:rgba(22,163,74,.1);  color:var(--success); }

.result-actions { display:flex; flex-direction:column; gap:10px; margin-top:18px; }
.btn-retry { background:linear-gradient(135deg,var(--accent-dark),var(--accent)); color:#fff; }
.btn-retry:hover { transform:translateY(-2px); box-shadow:0 6px 20px var(--accent-glow); }
.btn-home  { background:var(--bg2); color:var(--text); border:1px solid var(--border-card); }
.btn-home:hover { border-color:var(--accent); color:var(--accent); }

/* FOOTER */
footer {
  background:var(--bg2); border-top:1px solid var(--border-card);
  padding:22px 24px;
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:10px;
}
.footer-brand { font-size:14px; font-weight:700; }
.footer-brand span { color:var(--accent); }
.footer-tg {
  display:flex; align-items:center; gap:5px;
  text-decoration:none; color:#229ED9; font-size:12px; font-weight:600;
}

@media (max-width:480px) {
  nav { padding:0 14px; }
  .shell { padding:14px 12px 60px; }
  .nav-brand span { display:none; }
}
</style>
</head>

<nav>
  <a href="index.html" class="nav-back"><i class="fa-solid fa-arrow-left"></i> Back</a>
  <div class="nav-brand">
    <div class="nav-logo-icon">GT</div>

  </div>
  <div class="nav-right">
    <button class="theme-btn" id="themeBtn">🌙</button>
  </div>
</nav>

<div class="hero-band">
  <div class="hero-band-icon">🧠</div>
  <h1>Mental & Emotional Health</h1>
  <p>Health Assessment</p>
  <div class="hero-meta">
    <div class="meta-pill"><i class="fa-solid fa-list-ol"></i> <span id="totalBadge">-- Questions</span></div>
    <div class="meta-pill"><i class="fa-solid fa-clock"></i> 50 Min</div>
    <div class="meta-pill"><i class="fa-solid fa-shuffle"></i> Shuffled</div>
  </div>
</div>

<div class="shell">
  <div class="stats-row">
    <div class="stat-box"><div class="val c-green" id="sCorrect">0</div><div class="lbl">✔ Correct</div></div>
    <div class="stat-box"><div class="val c-red"   id="sWrong">0</div><div class="lbl">✖ Wrong</div></div>
    <div class="stat-box"><div class="val c-blue"  id="sRemain">100%</div><div class="lbl">⏳ Remaining</div></div>
  </div>

  <div class="prog-strip">
    <div class="prog-label" id="progLabel">Q 1</div>
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <div class="timer-badge" id="timerBadge"><i class="fa-regular fa-clock"></i><span id="timerTxt">50:00</span></div>
  </div>

  <div id="app"></div>
</div>

<footer>
  <div class="footer-brand">GAITH <span>TEAM</span></div>

<script>
const QUESTIONS = [
    // EASY LEVEL
      {t:"Mental health is described in the text as being analogous to which of the following?", o:["The 'software' of internal life","The 'hardware' of how you process information and reason","The emotional expression of feelings","The social connections that support well-being"], a:1},
      {t:"Emotional health is described as being analogous to which of the following?", o:["The 'hardware' of cognitive processing","The biological basis of brain function","The 'software' of how you manage and express feelings","The physical well-being dimension of health"], a:2},
      {t:"Which of the following BEST describes mental health according to the text?", o:["The ability to manage and express emotions effectively","The recognition of feelings such as joy, anger, and sadness","Cognitive processes, psychological well-being, and how the brain processes information","The spiritual connection to something greater than oneself"], a:2},
      {t:"Emotional health focuses primarily on:", o:["Cognitive functioning and reasoning","Recognizing, managing, and expressing feelings","Physical health and exercise patterns","Social connections and community involvement"], a:1},
      {t:"How many components of well-being are described in the text?", o:["Four","Five","Six","Seven"], a:3},
      {t:"Which component of well-being includes nutrition, exercise, sleep, and preventive care?", o:["Emotional well-being","Social well-being","Intellectual well-being","Physical well-being"], a:3},
      {t:"Which component of well-being involves understanding, managing, and expressing emotions effectively?", o:["Physical well-being","Social well-being","Emotional well-being","Occupational well-being"], a:2},
      {t:"Social well-being emphasizes the importance of:", o:["Managing financial resources effectively","Engaging in creative and stimulating activities","Social connections and community involvement","Pursuing career development and job satisfaction"], a:2},
      {t:"Intellectual well-being focuses on which of the following?", o:["Managing emotions and building resilience","Maintaining physical health through exercise","Engaging in creative and stimulating activities that promote mental growth","Finding meaning and satisfaction in one's work"], a:2},
      {t:"Spiritual well-being encompasses which of the following?", o:["Managing financial resources and budgeting","A sense of purpose and connection to something greater than oneself","Career development and work-life balance","Social connections and community engagement only"], a:1},
      {t:"Occupational well-being relates to:", o:["Managing debt and building savings","The satisfaction and fulfillment derived from one's work","Social connections and community involvement","Physical health and exercise patterns"], a:1},
      {t:"Financial well-being involves managing financial resources effectively to achieve:", o:["Social connections and community belonging","Physical health and wellness goals","Stability and security","Creative and intellectual growth"], a:2},
      {t:"Which of the following is listed as a strategy for improving mental and emotional health?", o:["Avoiding all social interactions to reduce stress","Relying solely on medication for emotional regulation","Regular physical activity that releases endorphins and boosts mood","Ignoring negative thoughts to maintain positivity"], a:2},
      {t:"The PHQ-9 is a standardized screening tool used to screen for:", o:["Anxiety levels","Substance use issues","The severity of depressive symptoms","General mental well-being"], a:2},
      {t:"The GAD-7 is a screening tool used to assess:", o:["Depressive symptoms","Substance use patterns","General well-being index","Levels of anxiety"], a:3},

      // MODERATE LEVEL
      {t:"Which of the following BEST illustrates the relationship between mental and emotional health?", o:["They are completely independent of each other with no overlap","Poor emotional health such as constant stress can lead to poor mental health such as depression","Mental health affects physical health only, while emotional health affects social well-being","Strong mental health always guarantees strong emotional health"], a:1},
      {t:"Which of the following is a key aspect of emotional well-being?", o:["Lifelong learning and critical thinking","Budgeting and financial literacy","Resilience — the ability to cope with stress and bounce back from adversity","Career development and job satisfaction"], a:2},
      {t:"Self-awareness as a component of emotional well-being refers to:", o:["Understanding financial concepts and making informed decisions","Recognizing one's emotions and their impact on thoughts and behaviors","Participating in community activities and volunteering","Analyzing information and making informed decisions"], a:1},
      {t:"Which of the following is a component of social well-being?", o:["Mindfulness and meditation practices","Effective communication and healthy relationships","Budgeting and debt management","Creativity and curiosity"], a:1},
      {t:"Which component of well-being includes lifelong learning, critical thinking, creativity, and curiosity?", o:["Spiritual well-being","Financial well-being","Social well-being","Intellectual well-being"], a:3},
      {t:"Which standardized screening tool is specifically described as a 5-question tool focusing on general mental well-being?", o:["PHQ-9","GAD-7","CAGE Questionnaire","WHO-5 Wellbeing Index"], a:3},
      {t:"The CAGE Questionnaire is a 4-question screening tool used for:", o:["Screening for depressive symptoms","Assessing anxiety levels","Screening for potential substance use issues","Measuring emotional well-being and stress"], a:2},
      {t:"Which of the following is described as the 'gold standard' for mental health diagnosis?", o:["Self-assessment and self-monitoring","Standardized screening tools such as the PHQ-9","Professional clinical evaluation by a GP, psychiatrist, or psychologist","Online questionnaires and journaling"], a:2},
      {t:"The Mental Status Examination (MSE) involves professional observation of which of the following?", o:["Laboratory results and blood work only","Appearance, behavior, speech, thought processes, and cognitive functioning","Financial history and occupational background","Social relationships and community engagement"], a:1},
      {t:"Why might a doctor order blood work such as thyroid function tests during a mental health evaluation?", o:["To assess financial well-being","To screen for substance use disorders","To rule out physical conditions that may mimic mental illness","To determine the patient's intellectual well-being"], a:2},
      {t:"Emotional awareness as a self-reflection marker of emotional health refers to:", o:["The ability to bounce back quickly after a setback","Managing finances and budgeting effectively","The ability to name exactly what you are feeling as it happens","Pursuing lifelong learning and intellectual growth"], a:2},
      {t:"Which of the following BEST describes emotional resilience?", o:["The ability to completely avoid negative emotions","Feeling pain but eventually returning to a steady emotional baseline after a setback","Suppressing uncomfortable emotions to maintain stability","Avoiding all stressful situations to protect emotional health"], a:1},
      {t:"Which of the following emotional 'red flags' describes feeling flat or disconnected from both joy and pain?", o:["Catastrophizing","Avoidance","Disproportionate reactions","Emotional numbness"], a:3},
      {t:"Catastrophizing as a behavioral red flag in emotional health refers to:", o:["Suppressing or running away from uncomfortable feelings","Feeling disconnected from emotions","Automatically assuming the worst possible outcome for every emotional trigger","Experiencing intense anger over minor inconveniences"], a:2},
      {t:"Which of the following standardized tools measures how unpredictable or overwhelming a person finds their life to be?", o:["PHQ-9","GAD-7","Perceived Stress Scale (PSS)","Emotional Quotient Inventory (EQ-i 2.0)"], a:2},

      // MODERATE-HIGH LEVEL
      {t:"The Emotional Quotient Inventory (EQ-i 2.0) is described as a professional-grade tool used to assess:", o:["Depressive symptoms and anxiety levels","15 competencies including self-perception and stress management","General mental well-being using five questions","Substance use patterns and addiction severity"], a:1},
      {t:"The Self-Assessment Manikin (SAM) is described as a tool that:", o:["Uses clinical interviews to assess cognitive functioning","Screens for depressive symptoms using nine questions","Is a non-verbal pictorial tool that helps rate pleasure and arousal levels in response to situations","Measures the severity of generalized anxiety disorder"], a:2},
      {t:"During a professional emotional health evaluation, a therapist may use 360-degree assessments. This is done primarily to:", o:["Screen for substance use disorders","Rule out physical conditions that mimic mental illness","Gather feedback from others to see if emotional self-perception matches actual impact on people","Replace the clinical interview process"], a:2},
      {t:"Which of the following BEST distinguishes emotional health assessment from mental health assessment?", o:["Emotional health assessment focuses on cognitive functioning and presence of mental disorders","Mental health assessment focuses only on feelings and emotional expression","Emotional health assessment focuses on the relationship with feelings — how they are identified, expressed, and managed — rather than cognitive functioning alone","Mental health assessment uses only self-assessment tools without professional evaluation"], a:2},
      {t:"The DASS-21 screening tool is specifically designed to measure:", o:["Substance use severity and addiction risk","Cognitive functioning and memory capacity","Distinct emotional states such as chronic tension and irritability","Financial stress and occupational burnout"], a:2},

      {t:"Which of the following warning signs indicates that professional help should be sought?", o:["Occasional mood changes related to daily stressors","Mild fatigue after a busy workday","Persistent feelings of hopelessness, significant changes in sleep and appetite, and withdrawal from enjoyable activities","Brief periods of sadness that resolve within a day or two"], a:2},
      {t:"'Holding opposites' as a marker of emotional maturity refers to:", o:["The ability to avoid emotional responses in conflict situations","Suppressing conflicting emotions to maintain stability","The ability to hold two conflicting truths simultaneously, such as being angry at someone while still loving them","The ability to regulate emotions completely without external support"], a:2},
      {t:"Which component of well-being is MOST directly related to work-life balance and job satisfaction?", o:["Intellectual well-being","Social well-being","Occupational well-being","Spiritual well-being"], a:2},
      {t:"Which of the following strategies for improving emotional health involves expressing thoughts through writing and practicing gratitude?", o:["Physical activity and exercise","Mindfulness and relaxation techniques","Self-care and journaling","Social support and connection"], a:2},

      {t:"A patient reports feeling persistently sad for three weeks, losing interest in hobbies they previously enjoyed, and struggling to concentrate at work. According to the text, which screening tool would MOST appropriately be used first?", o:["CAGE Questionnaire","GAD-7","WHO-5 Wellbeing Index","PHQ-9"], a:3},

      {t:"A patient describes experiencing intense anger during minor inconveniences, such as a traffic delay, that disrupts their entire day. This BEST represents which emotional health red flag?", o:["Emotional numbness","Avoidance","Catastrophizing","Disproportionate reactions"], a:3},
      {t:"A healthcare professional conducting a clinical interview observes the patient's affect, listens to how they describe internal emotional states, and collects feedback from family members about the patient's behavior. This BEST describes:", o:["A self-assessment using standardized screening tools","A mental health self-monitoring process","A professional emotional health evaluation including 360-degree assessment","A physical examination to rule out medical conditions"], a:2},
      {t:"A patient consistently avoids discussing feelings that cause discomfort and changes the subject whenever emotional topics arise. According to the text, this BEST represents which emotional red flag?", o:["Emotional numbness","Catastrophizing","Disproportionate reactions","Avoidance"], a:3},
      {t:"A nurse is conducting a well-being assessment for a community health program. The patient reports strong social connections, regular exercise, quality sleep, job satisfaction, a sense of spiritual purpose, and active learning pursuits. According to the well-being framework, which dimension is LEAST addressed?", o:["Physical well-being","Social well-being","Occupational well-being","Financial well-being"], a:3},
      {t:"A patient reports that after a setback at work, they were upset for a few days but gradually returned to their usual mood and resumed activities they enjoy. According to the text, this BEST demonstrates:", o:["Emotional numbness","Catastrophizing","Avoidance","Resilience"], a:3},
      {t:"During a mental health assessment, a nurse notes that a patient has been experiencing 'brain fog,' difficulty making simple decisions, and constant worrying for the past three weeks. According to the text, under which self-assessment category do these symptoms fall?", o:["Mood and emotions","Physical changes","Behavioral shifts","Cognitive patterns"], a:3},
      {t:"A patient is being evaluated for mental health concerns. The provider orders thyroid function tests and vitamin level blood work. According to the text, the PRIMARY reason for this is:", o:["To confirm the diagnosis of major depressive disorder","To assess the patient's nutritional well-being","To rule out physical conditions that can mimic mental illness","To evaluate the patient's financial well-being and lifestyle"], a:2},
      {t:"A therapist observes a patient's appearance, behavior, and speech patterns, evaluates thought processes, and assesses cognitive functioning during a formal evaluation session. This BEST describes which component of professional clinical evaluation?", o:["Clinical interview focusing on life stressors","Physical examination and laboratory testing","Standardized screening tool administration","Mental Status Examination (MSE)"], a:3},
      {t:"Which of the following combinations of strategies BEST addresses both mental and emotional health improvement according to the text?", o:["Budgeting, financial literacy, and debt management","Regular physical activity, quality sleep, mindfulness, social support, and professional help when needed","Only journaling and self-reflection without professional input","Avoiding all stressors and withdrawing from social activities"], a:1},

      {t:"A community health nurse is planning a health promotion program to improve overall well-being. According to the text, which combination of dimensions should be included for a TRULY holistic approach?", o:["Physical and nutritional well-being only","Physical, emotional, and social well-being only","Physical, emotional, social, intellectual, spiritual, occupational, and financial well-being","Mental health screening and clinical evaluation only"], a:2},
      {t:"A patient states: 'I always know something terrible is going to happen whenever I feel stressed. I can't stop thinking about worst-case scenarios.' This BEST represents which emotional red flag?", o:["Avoidance","Emotional numbness","Disproportionate reactions","Catastrophizing"], a:3},
      {t:"Which of the following BEST explains why symptoms persisting for more than two weeks are used as a threshold for seeking professional mental health assessment?", o:["Two weeks is the standard recovery time for all physical illnesses","Symptoms lasting more than two weeks are more likely to represent transient normal stress responses","Persistent symptoms beyond two weeks are more likely to interfere with work, relationships, and daily tasks, indicating a potential clinical concern","Two weeks is the minimum time required before any treatment can begin"], a:2},
      {t:"Mental health refers to how you manage and express feelings, while emotional health refers to how you process information and reason.", o:["True","False"], a:1},
      {t:"Poor emotional health, such as constant stress, can contribute to the development of poor mental health conditions such as depression.", o:["True","False"], a:0},

      {t:"Social well-being emphasizes managing financial resources effectively to achieve stability and security.", o:["True","False"], a:1},
      {t:"Intellectual well-being includes lifelong learning, critical thinking, creativity, and curiosity.", o:["True","False"], a:0},
      {t:"Spiritual well-being encompasses a sense of purpose and connection to something greater than oneself.", o:["True","False"], a:0},
      {t:"Occupational well-being relates to managing debt and achieving financial freedom.", o:["True","False"], a:1},
      {t:"The PHQ-9 is a standardized screening tool used to screen for the severity of depressive symptoms.", o:["True","False"], a:0},
      {t:"Standardized screening tools such as the PHQ-9 and GAD-7 provide a definitive clinical diagnosis.", o:["True","False"], a:1},
      {t:"A professional clinical evaluation by a GP, psychiatrist, or psychologist is considered the gold standard for mental health diagnosis.", o:["True","False"], a:0},

      {t:"The Perceived Stress Scale (PSS) measures how unpredictable or overwhelming a person finds their life.", o:["True","False"], a:0},
      {t:"The Self-Assessment Manikin (SAM) is a verbal questionnaire that asks patients to describe their emotions in detail.", o:["True","False"], a:1},
      {t:"Symptoms that persist for more than two weeks and interfere with work, relationships, or daily tasks are key indicators of a mental health concern.", o:["True","False"], a:0},
      {t:"Withdrawal from friends and activities once enjoyed is listed as a warning sign that professional mental health help should be sought.", o:["True","False"], a:0},

      {t:"The CAGE Questionnaire is used to assess general anxiety levels in clinical settings.", o:["True","False"], a:1},

/* ============ ENGINE ============ */
const LETTERS = ['A','B','C','D','E','F'];
let questions, i, correct, wrong, answers, wrongSet, answered;
let totalTime = 50*60, timeLeft, timerInterval;

function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function init(pool) {
  questions = shuffle([...pool]);
  i=0; correct=0; wrong=0; answered=0;
  answers = new Array(questions.length).fill(null);
  wrongSet = [];
  timeLeft = totalTime;
  document.getElementById('totalBadge').textContent = questions.length + ' Questions';
  startTimer(); render();
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    const m = Math.floor(timeLeft/60), s = timeLeft%60;
    document.getElementById('timerTxt').textContent = `${m}:${s<10?'0':''}${s}`;
    const b = document.getElementById('timerBadge');
    if (timeLeft<=120)      b.className='timer-badge danger';
    else if (timeLeft<=300) b.className='timer-badge warn';
    if (timeLeft<=0) { clearInterval(timerInterval); finish(); }
  }, 1000);
}

function updateTop() {
  const total = questions.length;
  document.getElementById('sCorrect').textContent = correct;
  document.getElementById('sWrong').textContent   = wrong;
  document.getElementById('sRemain').textContent  = Math.round(((total-answered)/total)*100)+'%';
  document.getElementById('progLabel').textContent = 'Q '+(i+1)+' / '+total;
  document.getElementById('progFill').style.width  = ((i+1)/total*100)+'%';
  document.getElementById('prog-bar').style.width  = ((i+1)/total*100)+'%';
}

function render() {
  updateTop();
  const q = questions[i];
  document.getElementById('app').innerHTML = `
    <div class="q-card">
      <div class="q-header"><div class="q-num">Question ${i+1} / ${questions.length}</div></div>
      <div class="q-text">${q.t}</div>
      <div class="options">
        ${q.o.map((o,idx)=>`
          <div class="opt" id="opt${idx}" onclick="choose(${idx})">
            <div class="opt-letter">${LETTERS[idx]}</div>
            ${o}
          </div>`).join('')}
      </div>
      <div class="nav-btns">
        <button class="btn btn-skip" onclick="skip()"><i class="fa-solid fa-forward"></i> Skip</button>
      </div>
    </div>`;
}

function choose(v) {
  if (answers[i]!==null) return;
  answers[i]=v; answered++;
  const q=questions[i], ok=v===q.a;
  ok?correct++:wrong++;
  updateTop();
  q.o.forEach((_,idx)=>{
    const el=document.getElementById('opt'+idx);
    el.classList.add('disabled');
    if (idx===q.a) el.classList.add('correct');
    else if (idx===v) el.classList.add('wrong');
  });
  const fb=document.createElement('div');
  fb.className='feedback-bar '+(ok?'ok':'no');
  fb.innerHTML=ok
    ?`<span class="feedback-icon">🎉</span><span>Correct! Well done.</span>`
    :`<span class="feedback-icon">💡</span><span>Correct answer: <b>${q.o[q.a]}</b></span>`;
  const card=document.querySelector('.q-card');
  card.querySelector('.options').after(fb);
  if (q.exp) {
    const exp=document.createElement('div');
    exp.className='explanation';
    exp.innerHTML='<b>💬 Explanation:</b> '+q.exp;
    fb.after(exp);
  }
  card.querySelector('.nav-btns').innerHTML=`
    <button class="btn btn-next" onclick="next()">
      ${i<questions.length-1
        ?'<i class="fa-solid fa-arrow-right"></i> Next Question'
        :'<i class="fa-solid fa-flag-checkered"></i> Finish Exam'}
    </button>`;
}

function skip() {
  if (answers[i]===null) { answers[i]=-1; answered++; wrong++; wrongSet.push(questions[i]); updateTop(); }
  next();
}

function next() {
  if (i<questions.length-1) { i++; render(); window.scrollTo({top:0,behavior:'smooth'}); }
  else finish();
}

function finish() {
  clearInterval(timerInterval);
  const total=questions.length;
  const score=Math.round((correct/total)*100);
  questions.forEach((q,idx)=>{ if(answers[idx]!==q.a) wrongSet.push({...q,myAns:answers[idx]}); });
  wrongSet=[...new Map(wrongSet.map(q=>[q.t,q])).values()];
  let grade,gc;
  if(score>=90)      { grade='🥇 Excellent';      gc='var(--success)'; }
  else if(score>=75) { grade='🥈 Very Good';       gc='var(--accent)'; }
  else if(score>=60) { grade='🥉 Good';            gc='var(--warn)'; }
  else               { grade='📚 Needs Review';    gc='var(--danger)'; }
  const circ=2*Math.PI*45, offset=circ-(score/100)*circ;
  const report=questions.map((q,idx)=>{
    const ok=answers[idx]===q.a;
    return `<div class="report-item ${ok?'ok':'no'}">
      <div class="ri-q">${ok?'✅':'❌'} ${q.t}</div>
      ${!ok?`
        <div class="ri-row"><span class="ri-badge ri-yours">Your Answer</span>${answers[idx]>=0?q.o[answers[idx]]:'Skipped'}</div>
        <div class="ri-row"><span class="ri-badge ri-right">Correct</span>${q.o[q.a]}</div>
      `:''}
    </div>`;
  }).join('');
  document.getElementById('prog-bar').style.width='100%';
  document.getElementById('app').innerHTML=`
    <div class="result-hero">
      <div class="score-ring">
        <svg viewBox="0 0 110 110">
          <circle class="ring-bg"   cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="0"/>
          <circle class="ring-fill" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            style="stroke:${gc}" id="ringFill"/>
        </svg>
        <div class="score-num">${score}</div>
        <div class="score-pct">%</div>
      </div>
      <div class="result-grade" style="color:${gc}">${grade}</div>
      <div class="result-sub">Answered ${answered} of ${total} questions</div>
      <div class="result-stats">
        <div class="rs"><div class="n" style="color:var(--success)">${correct}</div><div class="l">Correct</div></div>
        <div class="rs"><div class="n" style="color:var(--danger)">${wrong}</div><div class="l">Wrong</div></div>
        <div class="rs"><div class="n" style="color:var(--accent)">${total-answered<0?0:total-answered}</div><div class="l">Skipped</div></div>
      </div>
    </div>
    <div class="result-actions">
      ${wrongSet.length?`<button class="btn btn-retry" onclick="retryWrong()"><i class="fa-solid fa-rotate-right"></i> Retry Wrong (${wrongSet.length})</button>`:''}
      <button class="btn btn-home" onclick="init(QUESTIONS)"><i class="fa-solid fa-shuffle"></i> New Random Exam</button>
      <a href="index.html" class="btn btn-home" style="text-decoration:none;"><i class="fa-solid fa-house"></i> Back to Subject</a>
    </div>
    <div style="margin-top:24px">
      <div style="font-size:14px;font-weight:700;margin-bottom:10px;color:var(--text2);">📋 Detailed Report</div>
      ${report}
    </div>`;
  setTimeout(()=>{document.getElementById('ringFill').style.strokeDashoffset=offset;},100);
  window.scrollTo({top:0,behavior:'smooth'});
}

function retryWrong() {
  const pool=[...wrongSet];
  questions=shuffle(pool); i=0; correct=0; wrong=0;
  answers=new Array(questions.length).fill(null);
  wrongSet=[]; answered=0; timeLeft=totalTime;
  startTimer(); render();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* THEME */
const themeBtn=document.getElementById('themeBtn');
let theme=localStorage.getItem('theme')||'light';
function applyTheme(t) {
  theme=t;
  document.documentElement.setAttribute('data-theme',t==='dark'?'dark':'');
  themeBtn.textContent=t==='dark'?'☀️':'🌙';
  localStorage.setItem('theme',t);
}
applyTheme(theme);
themeBtn.addEventListener('click',()=>applyTheme(theme==='dark'?'light':'dark'));

init(QUESTIONS);
</script>
</body>
