<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validity Assessment — Exam | GAITH TEAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent:             #0891b2;
  --accent-light:       #06b6d4;
  --accent-dark:        #0e7490;
  --accent-glow:        rgba(8,145,178,0.14);
  --accent-glow-strong: rgba(8,145,178,0.28);
  --bg:      #f8fafc;
  --bg2:     #eef2f7;
  --card:    #ffffff;
  --text:    #1a2332;
  --text2:   #4a5568;
  --text3:   #718096;
  --border:       rgba(8,145,178,0.18);
  --border-card:  rgba(0,0,0,0.07);
  --shadow:       0 4px 20px rgba(0,0,0,0.07);
  --shadow-hover: 0 8px 32px rgba(8,145,178,0.22);
  --success: #16a34a;
  --danger:  #dc2626;
  --warn:    #d97706;
  --radius: 16px;
  --tr: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg:   #0d1117; --bg2: #161b22; --card: #1c2333;
  --text: #e6edf3; --text2: #b1bac4; --text3: #7d8590;
  --border:      rgba(6,182,212,0.22);
  --border-card: rgba(6,182,212,0.10);
  --shadow:       0 4px 20px rgba(0,0,0,0.4);
  --shadow-hover: 0 8px 36px rgba(8,145,178,0.28);
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
  transition: background .4s, color .4s;
  direction: ltr;
}

#prog-bar {
  position: fixed; top: 0; left: 0; height: 3px; z-index: 999;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  width: 0%; transition: width .15s;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 64px;
  background: rgba(248,250,252,.93); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-card); transition: var(--tr);
}
[data-theme="dark"] nav { background: rgba(13,17,23,.95); }

.nav-back {
  display: flex; align-items: center; gap: 7px;
  color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 600;
  padding: 7px 13px; border-radius: 8px;
  border: 1px solid var(--border-card); background: var(--card);
  transition: var(--tr);
}
.nav-back:hover { color: var(--accent); border-color: var(--border); }
.nav-brand { display: flex; align-items: center; gap: 9px; font-size: 15px; font-weight: 900; color: var(--text); }
.nav-logo-icon {
  width: 34px; height: 34px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 900;
}
.nav-right { display: flex; align-items: center; gap: 8px; }
.theme-btn {
  width: 38px; height: 38px; border-radius: 50%;
  border: 1px solid var(--border-card); background: var(--card);
  cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center; transition: var(--tr);
}
.theme-btn:hover { border-color: var(--accent); transform: rotate(20deg); }

/* HERO BAND */
.hero-band {
  margin-top: 64px;
  background: linear-gradient(135deg, var(--accent-dark), var(--accent), var(--accent-light));
  padding: 36px 24px 32px; text-align: center;
  position: relative; overflow: hidden;
}
.hero-band::before {
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse 600px 200px at 50% 100%, rgba(255,255,255,.12) 0%, transparent 70%);
}
.hero-band-icon {
  width: 64px; height: 64px; border-radius: 18px;
  background: rgba(255,255,255,.2); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; margin: 0 auto 12px;
  border: 1.5px solid rgba(255,255,255,.35);
}
.hero-band h1 { font-size: clamp(18px,3.5vw,26px); font-weight: 900; color:#fff; margin-bottom:4px; }
.hero-band p { font-size:13px; color:rgba(255,255,255,.8); }
.hero-meta {
  display:flex; justify-content:center; gap:16px; margin-top:16px; flex-wrap:wrap;
}
.meta-pill {
  background: rgba(255,255,255,.18); backdrop-filter:blur(6px);
  border: 1px solid rgba(255,255,255,.3); border-radius:50px;
  padding:5px 14px; font-size:12px; font-weight:700; color:#fff;
  display:flex; align-items:center; gap:5px;
}

/* SHELL */
.shell { max-width:560px; margin:0 auto; padding:20px 18px 80px; }

/* STATS */
.stats-row {
  display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:14px;
}
.stat-box {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:var(--radius); padding:12px 8px; text-align:center;
}
.stat-box .val { font-size:20px; font-weight:900; }
.stat-box .lbl { font-size:11px; color:var(--text3); margin-top:2px; }
.c-green { color:var(--success); }
.c-red   { color:var(--danger); }
.c-blue  { color:var(--accent); }

/* PROGRESS STRIP */
.prog-strip {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:var(--radius); padding:13px 16px; margin-bottom:16px;
  display:flex; align-items:center; gap:12px;
}
.prog-label { font-size:13px; font-weight:700; color:var(--text2); white-space:nowrap; }
.prog-track { flex:1; height:7px; background:var(--bg2); border-radius:7px; overflow:hidden; }
.prog-fill {
  height:100%; width:0%;
  background:linear-gradient(90deg, var(--accent), var(--accent-light));
  border-radius:7px; transition:width .4s;
}
.timer-badge {
  min-width:60px; height:34px; border-radius:17px;
  background:var(--bg2); border:1px solid var(--border-card);
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:900; color:var(--text);
  gap:4px; padding:0 10px; flex-shrink:0;
}
.timer-badge.warn   { color:var(--warn);    border-color:rgba(217,119,6,.3);  background:rgba(217,119,6,.08); }
.timer-badge.danger { color:var(--danger);  border-color:rgba(220,38,38,.3);  background:rgba(220,38,38,.08); animation:blink .8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.5} }

/* QUESTION CARD */
.q-card {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:20px; overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,.05);
}
.q-header {
  background:linear-gradient(135deg, var(--accent-dark), var(--accent));
  padding:10px 18px;
  display:flex; align-items:center; gap:8px;
}
.q-num {
  background:rgba(255,255,255,.22); border-radius:7px;
  padding:3px 10px; font-size:11px; font-weight:700; color:#fff;
}
.q-text {
  padding:20px 18px 14px; font-size:15px; font-weight:700; color:var(--text);
  line-height:1.65; border-bottom:1px solid var(--border-card);
  direction:ltr; text-align:left;
}
.options { padding:14px 18px 18px; display:flex; flex-direction:column; gap:10px; }

.opt {
  display:flex; align-items:center; gap:12px;
  padding:13px 15px; border-radius:12px;
  border:1.5px solid var(--border-card); background:var(--bg);
  cursor:pointer; font-size:14px; font-weight:600; color:var(--text);
  transition:var(--tr); user-select:none;
  direction:ltr; text-align:left;
}
.opt:hover:not(.disabled) {
  border-color:var(--accent); background:var(--accent-glow);
  transform:translateX(3px);
}
.opt-letter {
  width:28px; height:28px; border-radius:8px; flex-shrink:0;
  background:var(--bg2); border:1px solid var(--border-card);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:900; color:var(--text3);
  transition:var(--tr);
}
.opt.correct { border-color:var(--success); background:rgba(22,163,74,.08); }
.opt.correct .opt-letter { background:var(--success); color:#fff; border-color:var(--success); }
.opt.wrong   { border-color:var(--danger);  background:rgba(220,38,38,.07); }
.opt.wrong   .opt-letter { background:var(--danger);  color:#fff; border-color:var(--danger); }
.opt.disabled { pointer-events:none; }

/* FEEDBACK */
.feedback-bar {
  margin:12px 18px; padding:12px 15px; border-radius:12px;
  display:flex; align-items:center; gap:10px;
  font-size:14px; font-weight:700;
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
.feedback-bar.ok { background:rgba(22,163,74,.1); color:var(--success); border:1px solid rgba(22,163,74,.25); }
.feedback-bar.no { background:rgba(220,38,38,.08); color:var(--danger); border:1px solid rgba(220,38,38,.2); }
.feedback-icon { font-size:18px; }

.explanation {
  margin:0 18px 12px; padding:11px 14px;
  background:rgba(8,145,178,.06); border-radius:10px;
  border-left:3px solid var(--accent);
  font-size:13px; color:var(--text2); line-height:1.6;
  direction:ltr; text-align:left;
}

/* BUTTONS */
.nav-btns { padding:4px 18px 18px; display:flex; gap:10px; }
.btn {
  flex:1; padding:13px; border:none; border-radius:12px;
  font-size:14px; font-weight:900; cursor:pointer;
  font-family:'Outfit',sans-serif; transition:var(--tr);
  display:flex; align-items:center; justify-content:center; gap:7px;
}
.btn-next {
  background:linear-gradient(135deg, var(--accent-dark), var(--accent));
  color:#fff; box-shadow:0 4px 14px var(--accent-glow);
}
.btn-next:hover { transform:translateY(-2px); box-shadow:0 6px 20px var(--accent-glow); }
.btn-skip {
  background:var(--bg2); color:var(--text2);
  border:1px solid var(--border-card); flex:0 0 auto; padding:13px 16px;
}
.btn-skip:hover { border-color:var(--warn); color:var(--warn); }

/* RESULTS */
.result-hero {
  text-align:center; padding:32px 20px 24px;
  background:var(--card); border-radius:20px;
  border:1px solid var(--border-card); margin-bottom:18px;
}
.score-ring {
  width:110px; height:110px; border-radius:50%; margin:0 auto 16px;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; position:relative;
}
.score-ring svg { position:absolute; inset:-5px; width:calc(100% + 10px); height:calc(100% + 10px); transform:rotate(-90deg); }
.score-ring circle { fill:none; stroke-width:5; stroke-linecap:round; }
.ring-bg   { stroke:var(--bg2); }
.ring-fill { stroke:var(--accent); transition:stroke-dashoffset 1s ease; }
.score-num { font-size:28px; font-weight:900; color:var(--text); }
.score-pct { font-size:12px; color:var(--text3); }
.result-grade { font-size:20px; font-weight:900; margin-bottom:5px; }
.result-sub   { font-size:14px; color:var(--text2); }
.result-stats {
  display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:18px;
}
.rs { background:var(--bg2); border-radius:10px; padding:11px 8px; text-align:center; }
.rs .n { font-size:20px; font-weight:900; }
.rs .l { font-size:11px; color:var(--text3); }

/* REPORT */
.report-item {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:13px; padding:15px; margin-bottom:9px;
  border-left:4px solid var(--border-card);
  direction:ltr; text-align:left;
}
.report-item.ok { border-left-color:var(--success); }
.report-item.no { border-left-color:var(--danger); }
.report-item .ri-q  { font-size:13px; font-weight:700; margin-bottom:7px; }
.report-item .ri-row { display:flex; align-items:center; gap:8px; font-size:12px; margin-top:4px; color:var(--text2); }
.ri-badge { padding:2px 8px; border-radius:6px; font-weight:700; font-size:11px; flex-shrink:0; }
.ri-yours { background:rgba(220,38,38,.1); color:var(--danger); }
.ri-right { background:rgba(22,163,74,.1);  color:var(--success); }

.result-actions { display:flex; flex-direction:column; gap:10px; margin-top:18px; }
.btn-retry { background:linear-gradient(135deg,var(--accent-dark),var(--accent)); color:#fff; }
.btn-retry:hover { transform:translateY(-2px); box-shadow:0 6px 20px var(--accent-glow); }
.btn-home  { background:var(--bg2); color:var(--text); border:1px solid var(--border-card); }
.btn-home:hover { border-color:var(--accent); color:var(--accent); }

/* FOOTER */
footer {
  background:var(--bg2); border-top:1px solid var(--border-card);
  padding:22px 24px;
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:10px;
}
.footer-brand { font-size:14px; font-weight:700; }
.footer-brand span { color:var(--accent); }
.footer-tg {
  display:flex; align-items:center; gap:5px;
  text-decoration:none; color:#229ED9; font-size:12px; font-weight:600;
}

@media (max-width:480px) {
  nav { padding:0 14px; }
  .shell { padding:14px 12px 60px; }
  .nav-brand span { display:none; }
}
</style>
</head>
<body>

<div id="prog-bar"></div>

<nav>
  <a href="index.html" class="nav-back"><i class="fa-solid fa-arrow-left"></i> Back</a>
  <div class="nav-brand">
    <div class="nav-logo-icon">GT</div>
    <span>GAITH TEAM</span>
  </div>
  <div class="nav-right">
    <button class="theme-btn" id="themeBtn">🌙</button>
  </div>
</nav>

<div class="hero-band">
  <div class="hero-band-icon">✅</div>
  <h1>Validity Assessment</h1>
  <p>Health Assessment /p>
  <div class="hero-meta">
    <div class="meta-pill"><i class="fa-solid fa-list-ol"></i> <span id="totalBadge">-- Questions</span></div>
    <div class="meta-pill"><i class="fa-solid fa-clock"></i> 50 Min</div>
    <div class="meta-pill"><i class="fa-solid fa-shuffle"></i> Shuffled</div>
  </div>
</div>

<div class="shell">
  <div class="stats-row">
    <div class="stat-box"><div class="val c-green" id="sCorrect">0</div><div class="lbl">✔ Correct</div></div>
    <div class="stat-box"><div class="val c-red"   id="sWrong">0</div><div class="lbl">✖ Wrong</div></div>
    <div class="stat-box"><div class="val c-blue"  id="sRemain">100%</div><div class="lbl">⏳ Remaining</div></div>
  </div>

  <div class="prog-strip">
    <div class="prog-label" id="progLabel">Q 1</div>
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <div class="timer-badge" id="timerBadge"><i class="fa-regular fa-clock"></i><span id="timerTxt">50:00</span></div>
  </div>

  <div id="app"></div>
</div>

<footer>
  <div class="footer-brand">GAITH <span>TEAM</span></div>
  <a href="https://t.me/nursing2bu" target="_blank" class="footer-tg">
    <i class="fa-brands fa-telegram"></i> @nursing2bu
  </a>
</footer>

<script>
const QUESTIONS = [
   // EASY LEVEL
      {t:"What is data validation?", o:["Storing data in a database","Checking the accuracy and quality of source data before using or processing it","Deleting irrelevant data from records","Sharing data with other healthcare professionals"], a:1},
      {t:"Data validation is considered a form of:", o:["Data creation","Data sharing","Data cleansing","Data encryption"], a:2},
      {t:"Validation is best described as:", o:["Creating new data entries","Double-checking data to confirm it is accurate and factual","Transferring data between systems","Permanently deleting outdated records"], a:1},
      {t:"Which phase of nursing provides information on which nursing diagnoses and interventions are based?", o:["Planning phase","Evaluation phase","Assessment phase","Implementation phase"], a:2},
      {t:"Valid data must be:", o:["Within permitted limits or ranges","Only numeric in nature","Collected only by physicians","Always obtained from secondary sources"], a:0},
      {t:"One of the purposes of data validation is to:", o:["Speed up discharge planning","Make sure data collection is complete","Replace the physical examination","Eliminate the need for documentation"], a:1},
      {t:"Which of the following is a purpose of data validation?", o:["To assign diagnoses without checking data","To avoid jumping to conclusions","To share data with non-clinical staff","To skip collecting subjective data"], a:1},
      {t:"A data type check validates that:", o:["Data falls within a specified numerical range","Entered data matches the required data type for a specific field","Patient age matches their date of birth","Phone numbers follow a consistent format"], a:2},
      {t:"Which type of check ensures input data adheres to a specified numerical range?", o:["Format check","Code check","Range check","Consistency check"], a:2},
      {t:"A consistency check verifies that data is:", o:["Within an acceptable numeric range","Formatted correctly","Logically coherent and correctly entered","Matching a standardized code or ISBN"], a:3},
      // MODERATE LEVEL
      {t:"A code check rule ensures that the input for a field:", o:["Falls within a numeric range such as temperature limits","Aligns with a specific set of acceptable values or follows established formatting criteria","Matches data type such as text only","Is logically coherent with related fields"], a:1},
      {t:"An example of a range check in healthcare would be:", o:["Ensuring a phone number is written as (XXX) XXX-XXXX","Verifying that a patient's temperature reading falls within an acceptable physiological range","Confirming a patient's date of birth matches their age","Checking that an ISBN number is valid"], a:1},
      {t:"A format check ensures that inputs:", o:["Are logically coherent with other data fields","Conform to a predefined structure specific to certain data types","Fall within an acceptable numeric range","Match a required data type such as text or number"], a:1},
      {t:"If a patient states she 'never gets any time in the sun' yet has dark, suntanned skin, the nurse should:", o:["Accept the patient's statement without question","Document the contradiction and ignore it","Validate the patient's perception by seeking further clarification","Immediately report the discrepancy to the physician"], a:2},
      {t:"Which method of validation involves repeating a measurement using another instrument?", o:["Comparing objective with subjective findings","Clarifying data with the patient by asking additional questions","Reviewing your own data through repeated evaluation","Checking findings with another healthcare professional"], a:2},
      {t:"A nurse suspects abnormal heart sounds. Which method of validation should she use?", o:["Re-read the medical chart alone","Ask the patient to describe any chest sensations","Compare with laboratory results only","Check the finding with a more experienced nurse"], a:3},
      {t:"To avoid jumping to conclusions during assessment, the nurse should:", o:["Document data before verifying accuracy","Distinguish between clues and conclusions","Rely on a single source of data","Proceed directly to planning without verification"], a:1},
      {t:"Which of the following is NOT a listed purpose of data validation?", o:["Ensure data collection is complete","Receive additional data that may have been overlooked","Replace subjective data with objective data only","Make sure objective and subjective data match"], a:2},
      {t:"The nurse's responsibility to obtain client consent is required:", o:["Only during emergency assessment","After completing the documentation","Prior to performing health assessment","Only when the patient is confused"], a:2},
      {t:"Which nurse responsibility involves drawing inferences from collected data?", o:["Maintaining confidentiality","Making appropriate and sound clinical judgements","Obtaining client consent","Performing focused assessments only"], a:1},
      // MODERATE-HIGH LEVEL
      {t:"If a patient is holding his abdomen and the nurse assumes abdominal pain without further inquiry, this represents a failure to:", o:["Document properly","Maintain confidentiality","Clarify data with the patient","Perform a code check"], a:2},
      {t:"Comparing objective findings with subjective findings to uncover discrepancies is an example of which validation method?", o:["Code check","Reviewing data with another instrument","Clarifying data with the patient","Comparing objective findings with subjective findings"], a:3},
      {t:"Which of the following statements about data collected during the Assessment Phase is TRUE?", o:["It can be incomplete as long as it is objective","It should be complete, objective, and accurate","It only needs to be subjective","It is not used for nursing diagnoses"], a:1},
      {t:"A nurse in an advanced practice role has the additional responsibility to:", o:["Perform only routine focused assessments","Avoid specialized health assessment skills","Prepare to perform advanced and focused health assessment","Delegate all assessment to junior nurses"], a:2},
      {t:"Continuous advancement of competence in health assessment by the nurse should occur:", o:["Only during the first year of nursing practice","Until a nurse reaches mid-career","Only after attending formal training courses","Throughout one's entire nursing career"], a:3},
      {t:"The nurse must acquire specialized skills and competence in health assessment in order to:", o:["Avoid working with the healthcare team","Make sound clinical decisions","Reduce the need for patient consent","Replace laboratory tests"], a:1},
      {t:"Documentation of health assessment results by the nurse should include:", o:["Only positive abnormal findings","Analysis of data, evaluation of client response, and feedback to the client","The nurse's personal opinions about the client","Only subjective data provided by the patient"], a:1},
      {t:"Which type of data validation would flag an entry of '40°C' when the acceptable temperature range is -10°C to 35°C?", o:["Data type check","Code check","Consistency check","Range check"], a:3},
      {t:"Which data validation check would reject a numeric value entered in a field that only accepts text?", o:["Range check","Data type check","Consistency check","Format check"], a:1},
      {t:"Verifying that a patient's recorded age matches their date of birth is an example of a:", o:["Range check","Code check","Consistency check","Format check"], a:2},
      // HIGH LEVEL / APPLIED
      {t:"A nurse collects data from a patient and notices that the patient's reported pain level of 2/10 does not match the observed grimacing and guarding behavior. What should the nurse do?", o:["Document the patient's self-report only since it is subjective","Ignore behavioral cues and rely on the numeric pain rating","Compare objective findings with subjective findings and seek clarification","Proceed directly to the nursing diagnosis without validation"], a:2},
      {t:"Which combination of nurse responsibilities best reflects a comprehensive approach to health assessment?", o:["Obtaining consent, performing assessment, maintaining confidentiality, and documenting results","Skipping consent, focusing on medication, and sharing data publicly","Assessing only when symptoms are obvious and avoiding documentation","Relying solely on patient self-report without further verification"], a:0},
      {t:"A nurse notices that a database rejects phone entries without the format (XXX) XXX-XXXX. This is best described as a:", o:["Range check","Code check","Format check","Consistency check"], a:2},
      {t:"Ensuring that an ISBN number is valid before storing it in a database is an example of:", o:["Range check","Code check","Format check","Data type check"], a:1},
      {t:"Which scenario BEST illustrates data validation in nursing practice?", o:["A nurse documents lab results without reviewing them","A nurse re-takes a patient's temperature with another thermometer after an abnormal reading","A nurse skips physical examination when the patient reports feeling fine","A nurse shares assessment findings with unauthorized personnel"], a:1},
      {t:"Which of the following statements about a nurse's responsibility in health assessment confidentiality is correct?", o:["The nurse can share all data freely with anyone","Confidentiality is only required during emergencies","The nurse has a responsibility to keep client data confidential","Confidentiality applies only to objective data"], a:2},
      {t:"In the context of data validation, 'valid data' adheres to all of the following EXCEPT:", o:["Falling within permitted limits or ranges","Conforming to specified data formats","Being free of inaccuracies","Being collected only from primary sources"], a:3},
      {t:"If a nurse regularly performs focused assessments in response to client needs, this reflects which nursing responsibility?", o:["Advanced practice preparation","Routine health assessment based on client needs","Sharing information with the healthcare team","Documentation and feedback"], a:1},
      {t:"Which statement best reflects the relationship between data validation and nursing diagnoses?", o:["Nursing diagnoses can be made without validating data","Validated and accurate data form the foundation for nursing diagnoses","Nursing diagnoses are independent of assessment data","Data validation is only relevant for laboratory results"], a:1},
      {t:"A nurse reviews a patient's records and notices that two entries about the patient's medication dosage are inconsistent. The best next step is:", o:["Proceed with the higher dosage entry","Ignore the discrepancy and continue","Perform a consistency check by clarifying with the physician or original source","Document only the lower dosage"], a:2},
      {t:"Which of the following best describes a nurse's responsibility when demonstrating a caring attitude during health assessment?", o:["The nurse avoids emotional connection to remain objective","The nurse demonstrates respect and concern for each client during assessment","The nurse limits communication to factual questions only","The nurse delegates all emotional interactions to social workers"], a:1},
      {t:"Which type of data validation would be most relevant when checking that a patient's blood pressure reading was entered in millimeters of mercury (mmHg) rather than as a text string?", o:["Consistency check","Range check","Format check","Data type check"], a:3},
      {t:"A nurse who constantly updates her clinical skills in assessment throughout her career is fulfilling which nursing responsibility?", o:["Advanced practice assessment preparation","Focused assessment based on client needs","Continuous advancement of competence in health assessment","Obtaining informed consent before assessment"], a:2},
      {t:"Which of the following is the MOST comprehensive list of techniques a nurse may use when obtaining client information during health assessment?", o:["History taking only","Physical examination and lab review only","History taking, physical examination, reviewing records, and reviewing diagnostic test results","Reviewing only secondary sources such as family and other providers"], a:2},
      {t:"A patient's data entry shows a date of birth of January 1, 1990, but their recorded age is listed as 20 years old (current year 2024). Which type of validation would identify this error?", o:["Range check","Format check","Data type check","Consistency check"], a:3},
      {t:"Which of the following MOST accurately describes the scope of a nurse's responsibility in health assessment documentation?", o:["Documenting results, analyzing data, evaluating client response to interventions, and providing feedback","Recording only vital signs and medication information","Completing a checklist and filing it without analysis","Documenting only abnormal findings"], a:0},
      {t:"Which validation method involves asking the patient additional questions to confirm the accuracy of observed or reported data?", o:["Repeated evaluation with another instrument","Clarifying data with the patient","Comparing findings with another clinician","Comparing objective with subjective data"], a:1},
      {t:"A nurse assumes a patient is anxious based on facial expression without exploring further. This is an error related to:", o:["Proper use of objective data","Jumping to conclusions without data validation","Correct use of a consistency check","Appropriate documentation practice"], a:1},
      {t:"Which of the following best summarizes the primary goal of data validation in nursing health assessment?", o:["To speed up the assessment process and reduce workload","To ensure collected data is accurate, complete, and forms a sound basis for clinical decisions","To eliminate the use of secondary data sources","To replace subjective data with objective measurements only"], a:1},
      {t:"Data validation is a form of data cleansing.", o:["True","False"], a:0},
      {t:"Validation means checking data to confirm that it is accurate and factual.", o:["True","False"], a:0},
      {t:"Information collected during the assessment phase must be complete, objective, and accurate.", o:["True","False"], a:0},
      {t:"A consistency check ensures that data adheres to a specified numeric range.", o:["True","False"], a:1},
      {t:"A range check validates that the entered data matches the required data type for a specific field.", o:["True","False"], a:1},
      {t:"A format check ensures that inputs conform to a predefined structure specific to certain data types.", o:["True","False"], a:0},
      {t:"One purpose of data validation is to make sure objective and subjective data match.", o:["True","False"], a:0},
      {t:"Jumping to conclusions is encouraged during the data validation process.", o:["True","False"], a:1},
      {t:"The nurse must obtain client consent prior to performing health assessment.", o:["True","False"], a:0},
      {t:"Maintaining client confidentiality is one of the nurse's responsibilities during health assessment.", o:["True","False"], a:0},
      {t:"A nurse in advanced practice has no additional responsibilities in health assessment beyond routine care.", o:["True","False"], a:1},
      {t:"Nurses should continuously advance their competence in health assessment throughout their entire nursing career.", o:["True","False"], a:0},
      {t:"Comparing objective findings with subjective findings is a valid method of data validation.", o:["True","False"], a:0},
      {t:"Re-taking a patient's temperature with another thermometer is an example of reviewing data through repeated evaluation.", o:["True","False"], a:0},
      {t:"Valid data must be free of inaccuracies and adhere to an organization's validation criteria.", o:["True","False"], a:0},
      {t:"The nurse should document assessment results but is not required to analyze the data collected.", o:["True","False"], a:1},
      {t:"A code check ensures that inputs conform to a predefined structure such as a phone number format.", o:["True","False"], a:1},
      {t:"One purpose of data validation is to receive additional data that may have been overlooked.", o:["True","False"], a:0},
      {t:"The nurse's responsibility is limited to performing health assessments and does not include providing feedback to the client.", o:["True","False"], a:1},
      {t:"A consistency check would detect an error if a patient's recorded age does not match their date of birth.", o:["True","False"], a:0}

];

/* ============ ENGINE ============ */
const LETTERS = ['A','B','C','D','E','F'];
let questions, i, correct, wrong, answers, wrongSet, answered;
let totalTime = 50*60, timeLeft, timerInterval;

function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function init(pool) {
  questions = shuffle([...pool]);
  i=0; correct=0; wrong=0; answered=0;
  answers = new Array(questions.length).fill(null);
  wrongSet = [];
  timeLeft = totalTime;
  document.getElementById('totalBadge').textContent = questions.length + ' Questions';
  startTimer(); render();
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    const m = Math.floor(timeLeft/60), s = timeLeft%60;
    document.getElementById('timerTxt').textContent = `${m}:${s<10?'0':''}${s}`;
    const b = document.getElementById('timerBadge');
    if (timeLeft<=120)      b.className='timer-badge danger';
    else if (timeLeft<=300) b.className='timer-badge warn';
    if (timeLeft<=0) { clearInterval(timerInterval); finish(); }
  }, 1000);
}

function updateTop() {
  const total = questions.length;
  document.getElementById('sCorrect').textContent = correct;
  document.getElementById('sWrong').textContent   = wrong;
  document.getElementById('sRemain').textContent  = Math.round(((total-answered)/total)*100)+'%';
  document.getElementById('progLabel').textContent = 'Q '+(i+1)+' / '+total;
  document.getElementById('progFill').style.width  = ((i+1)/total*100)+'%';
  document.getElementById('prog-bar').style.width  = ((i+1)/total*100)+'%';
}

function render() {
  updateTop();
  const q = questions[i];
  document.getElementById('app').innerHTML = `
    <div class="q-card">
      <div class="q-header"><div class="q-num">Question ${i+1} / ${questions.length}</div></div>
      <div class="q-text">${q.t}</div>
      <div class="options">
        ${q.o.map((o,idx)=>`
          <div class="opt" id="opt${idx}" onclick="choose(${idx})">
            <div class="opt-letter">${LETTERS[idx]}</div>
            ${o}
          </div>`).join('')}
      </div>
      <div class="nav-btns">
        <button class="btn btn-skip" onclick="skip()"><i class="fa-solid fa-forward"></i> Skip</button>
      </div>
    </div>`;
}

function choose(v) {
  if (answers[i]!==null) return;
  answers[i]=v; answered++;
  const q=questions[i], ok=v===q.a;
  ok?correct++:wrong++;
  updateTop();
  q.o.forEach((_,idx)=>{
    const el=document.getElementById('opt'+idx);
    el.classList.add('disabled');
    if (idx===q.a) el.classList.add('correct');
    else if (idx===v) el.classList.add('wrong');
  });
  const fb=document.createElement('div');
  fb.className='feedback-bar '+(ok?'ok':'no');
  fb.innerHTML=ok
    ?`<span class="feedback-icon">🎉</span><span>Correct! Well done.</span>`
    :`<span class="feedback-icon">💡</span><span>Correct answer: <b>${q.o[q.a]}</b></span>`;
  const card=document.querySelector('.q-card');
  card.querySelector('.options').after(fb);
  if (q.exp) {
    const exp=document.createElement('div');
    exp.className='explanation';
    exp.innerHTML='<b>💬 Explanation:</b> '+q.exp;
    fb.after(exp);
  }
  card.querySelector('.nav-btns').innerHTML=`
    <button class="btn btn-next" onclick="next()">
      ${i<questions.length-1
        ?'<i class="fa-solid fa-arrow-right"></i> Next Question'
        :'<i class="fa-solid fa-flag-checkered"></i> Finish Exam'}
    </button>`;
}

function skip() {
  if (answers[i]===null) { answers[i]=-1; answered++; wrong++; wrongSet.push(questions[i]); updateTop(); }
  next();
}

function next() {
  if (i<questions.length-1) { i++; render(); window.scrollTo({top:0,behavior:'smooth'}); }
  else finish();
}

function finish() {
  clearInterval(timerInterval);
  const total=questions.length;
  const score=Math.round((correct/total)*100);
  questions.forEach((q,idx)=>{ if(answers[idx]!==q.a) wrongSet.push({...q,myAns:answers[idx]}); });
  wrongSet=[...new Map(wrongSet.map(q=>[q.t,q])).values()];
  let grade,gc;
  if(score>=90)      { grade='🥇 Excellent';      gc='var(--success)'; }
  else if(score>=75) { grade='🥈 Very Good';       gc='var(--accent)'; }
  else if(score>=60) { grade='🥉 Good';            gc='var(--warn)'; }
  else               { grade='📚 Needs Review';    gc='var(--danger)'; }
  const circ=2*Math.PI*45, offset=circ-(score/100)*circ;
  const report=questions.map((q,idx)=>{
    const ok=answers[idx]===q.a;
    return `<div class="report-item ${ok?'ok':'no'}">
      <div class="ri-q">${ok?'✅':'❌'} ${q.t}</div>
      ${!ok?`
        <div class="ri-row"><span class="ri-badge ri-yours">Your Answer</span>${answers[idx]>=0?q.o[answers[idx]]:'Skipped'}</div>
        <div class="ri-row"><span class="ri-badge ri-right">Correct</span>${q.o[q.a]}</div>
      `:''}
    </div>`;
  }).join('');
  document.getElementById('prog-bar').style.width='100%';
  document.getElementById('app').innerHTML=`
    <div class="result-hero">
      <div class="score-ring">
        <svg viewBox="0 0 110 110">
          <circle class="ring-bg"   cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="0"/>
          <circle class="ring-fill" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            style="stroke:${gc}" id="ringFill"/>
        </svg>
        <div class="score-num">${score}</div>
        <div class="score-pct">%</div>
      </div>
      <div class="result-grade" style="color:${gc}">${grade}</div>
      <div class="result-sub">Answered ${answered} of ${total} questions</div>
      <div class="result-stats">
        <div class="rs"><div class="n" style="color:var(--success)">${correct}</div><div class="l">Correct</div></div>
        <div class="rs"><div class="n" style="color:var(--danger)">${wrong}</div><div class="l">Wrong</div></div>
        <div class="rs"><div class="n" style="color:var(--accent)">${total-answered<0?0:total-answered}</div><div class="l">Skipped</div></div>
      </div>
    </div>
    <div class="result-actions">
      ${wrongSet.length?`<button class="btn btn-retry" onclick="retryWrong()"><i class="fa-solid fa-rotate-right"></i> Retry Wrong (${wrongSet.length})</button>`:''}
      <button class="btn btn-home" onclick="init(QUESTIONS)"><i class="fa-solid fa-shuffle"></i> New Random Exam</button>
      <a href="index.html" class="btn btn-home" style="text-decoration:none;"><i class="fa-solid fa-house"></i> Back to Subject</a>
    </div>
    <div style="margin-top:24px">
      <div style="font-size:14px;font-weight:700;margin-bottom:10px;color:var(--text2);">📋 Detailed Report</div>
      ${report}
    </div>`;
  setTimeout(()=>{document.getElementById('ringFill').style.strokeDashoffset=offset;},100);
  window.scrollTo({top:0,behavior:'smooth'});
}

function retryWrong() {
  const pool=[...wrongSet];
  questions=shuffle(pool); i=0; correct=0; wrong=0;
  answers=new Array(questions.length).fill(null);
  wrongSet=[]; answered=0; timeLeft=totalTime;
  startTimer(); render();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* THEME */
const themeBtn=document.getElementById('themeBtn');
let theme=localStorage.getItem('theme')||'light';
function applyTheme(t) {
  theme=t;
  document.documentElement.setAttribute('data-theme',t==='dark'?'dark':'');
  themeBtn.textContent=t==='dark'?'☀️':'🌙';
  localStorage.setItem('theme',t);
}
applyTheme(theme);
themeBtn.addEventListener('click',()=>applyTheme(theme==='dark'?'light':'dark'));

init(QUESTIONS);
</script>
