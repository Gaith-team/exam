<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>General Survey — Exam | GAITH TEAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent:             #0891b2;
  --accent-light:       #06b6d4;
  --accent-dark:        #0e7490;
  --accent-glow:        rgba(8,145,178,0.14);
  --accent-glow-strong: rgba(8,145,178,0.28);
  --bg:      #f8fafc;
  --bg2:     #eef2f7;
  --card:    #ffffff;
  --text:    #1a2332;
  --text2:   #4a5568;
  --text3:   #718096;
  --border:       rgba(8,145,178,0.18);
  --border-card:  rgba(0,0,0,0.07);
  --shadow:       0 4px 20px rgba(0,0,0,0.07);
  --shadow-hover: 0 8px 32px rgba(8,145,178,0.22);
  --success: #16a34a;
  --danger:  #dc2626;
  --warn:    #d97706;
  --radius: 16px;
  --tr: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg:   #0d1117; --bg2: #161b22; --card: #1c2333;
  --text: #e6edf3; --text2: #b1bac4; --text3: #7d8590;
  --border:      rgba(6,182,212,0.22);
  --border-card: rgba(6,182,212,0.10);
  --shadow:       0 4px 20px rgba(0,0,0,0.4);
  --shadow-hover: 0 8px 36px rgba(8,145,178,0.28);
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
  transition: background .4s, color .4s;
  direction: ltr;
}

#prog-bar {
  position: fixed; top: 0; left: 0; height: 3px; z-index: 999;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  width: 0%; transition: width .15s;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 64px;
  background: rgba(248,250,252,.93); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-card); transition: var(--tr);
}
[data-theme="dark"] nav { background: rgba(13,17,23,.95); }

.nav-back {
  display: flex; align-items: center; gap: 7px;
  color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 600;
  padding: 7px 13px; border-radius: 8px;
  border: 1px solid var(--border-card); background: var(--card);
  transition: var(--tr);
}
.nav-back:hover { color: var(--accent); border-color: var(--border); }
.nav-brand { display: flex; align-items: center; gap: 9px; font-size: 15px; font-weight: 900; color: var(--text); }
.nav-logo-icon {
  width: 34px; height: 34px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 900;
}
.nav-right { display: flex; align-items: center; gap: 8px; }
.theme-btn {
  width: 38px; height: 38px; border-radius: 50%;
  border: 1px solid var(--border-card); background: var(--card);
  cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center; transition: var(--tr);
}
.theme-btn:hover { border-color: var(--accent); transform: rotate(20deg); }

/* HERO BAND */
.hero-band {
  margin-top: 64px;
  background: linear-gradient(135deg, var(--accent-dark), var(--accent), var(--accent-light));
  padding: 36px 24px 32px; text-align: center;
  position: relative; overflow: hidden;
}
.hero-band::before {
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse 600px 200px at 50% 100%, rgba(255,255,255,.12) 0%, transparent 70%);
}
.hero-band-icon {
  width: 64px; height: 64px; border-radius: 18px;
  background: rgba(255,255,255,.2); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; margin: 0 auto 12px;
  border: 1.5px solid rgba(255,255,255,.35);
}
.hero-band h1 { font-size: clamp(18px,3.5vw,26px); font-weight: 900; color:#fff; margin-bottom:4px; }
.hero-band p { font-size:13px; color:rgba(255,255,255,.8); }
.hero-meta {
  display:flex; justify-content:center; gap:16px; margin-top:16px; flex-wrap:wrap;
}
.meta-pill {
  background: rgba(255,255,255,.18); backdrop-filter:blur(6px);
  border: 1px solid rgba(255,255,255,.3); border-radius:50px;
  padding:5px 14px; font-size:12px; font-weight:700; color:#fff;
  display:flex; align-items:center; gap:5px;
}

/* SHELL */
.shell { max-width:560px; margin:0 auto; padding:20px 18px 80px; }

/* STATS */
.stats-row {
  display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:14px;
}
.stat-box {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:var(--radius); padding:12px 8px; text-align:center;
}
.stat-box .val { font-size:20px; font-weight:900; }
.stat-box .lbl { font-size:11px; color:var(--text3); margin-top:2px; }
.c-green { color:var(--success); }
.c-red   { color:var(--danger); }
.c-blue  { color:var(--accent); }

/* PROGRESS STRIP */
.prog-strip {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:var(--radius); padding:13px 16px; margin-bottom:16px;
  display:flex; align-items:center; gap:12px;
}
.prog-label { font-size:13px; font-weight:700; color:var(--text2); white-space:nowrap; }
.prog-track { flex:1; height:7px; background:var(--bg2); border-radius:7px; overflow:hidden; }
.prog-fill {
  height:100%; width:0%;
  background:linear-gradient(90deg, var(--accent), var(--accent-light));
  border-radius:7px; transition:width .4s;
}
.timer-badge {
  min-width:60px; height:34px; border-radius:17px;
  background:var(--bg2); border:1px solid var(--border-card);
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:900; color:var(--text);
  gap:4px; padding:0 10px; flex-shrink:0;
}
.timer-badge.warn   { color:var(--warn);    border-color:rgba(217,119,6,.3);  background:rgba(217,119,6,.08); }
.timer-badge.danger { color:var(--danger);  border-color:rgba(220,38,38,.3);  background:rgba(220,38,38,.08); animation:blink .8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.5} }

/* QUESTION CARD */
.q-card {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:20px; overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,.05);
}
.q-header {
  background:linear-gradient(135deg, var(--accent-dark), var(--accent));
  padding:10px 18px;
  display:flex; align-items:center; gap:8px;
}
.q-num {
  background:rgba(255,255,255,.22); border-radius:7px;
  padding:3px 10px; font-size:11px; font-weight:700; color:#fff;
}
.q-text {
  padding:20px 18px 14px; font-size:15px; font-weight:700; color:var(--text);
  line-height:1.65; border-bottom:1px solid var(--border-card);
  direction:ltr; text-align:left;
}
.options { padding:14px 18px 18px; display:flex; flex-direction:column; gap:10px; }

.opt {
  display:flex; align-items:center; gap:12px;
  padding:13px 15px; border-radius:12px;
  border:1.5px solid var(--border-card); background:var(--bg);
  cursor:pointer; font-size:14px; font-weight:600; color:var(--text);
  transition:var(--tr); user-select:none;
  direction:ltr; text-align:left;
}
.opt:hover:not(.disabled) {
  border-color:var(--accent); background:var(--accent-glow);
  transform:translateX(3px);
}
.opt-letter {
  width:28px; height:28px; border-radius:8px; flex-shrink:0;
  background:var(--bg2); border:1px solid var(--border-card);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:900; color:var(--text3);
  transition:var(--tr);
}
.opt.correct { border-color:var(--success); background:rgba(22,163,74,.08); }
.opt.correct .opt-letter { background:var(--success); color:#fff; border-color:var(--success); }
.opt.wrong   { border-color:var(--danger);  background:rgba(220,38,38,.07); }
.opt.wrong   .opt-letter { background:var(--danger);  color:#fff; border-color:var(--danger); }
.opt.disabled { pointer-events:none; }

/* FEEDBACK */
.feedback-bar {
  margin:12px 18px; padding:12px 15px; border-radius:12px;
  display:flex; align-items:center; gap:10px;
  font-size:14px; font-weight:700;
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
.feedback-bar.ok { background:rgba(22,163,74,.1); color:var(--success); border:1px solid rgba(22,163,74,.25); }
.feedback-bar.no { background:rgba(220,38,38,.08); color:var(--danger); border:1px solid rgba(220,38,38,.2); }
.feedback-icon { font-size:18px; }

.explanation {
  margin:0 18px 12px; padding:11px 14px;
  background:rgba(8,145,178,.06); border-radius:10px;
  border-left:3px solid var(--accent);
  font-size:13px; color:var(--text2); line-height:1.6;
  direction:ltr; text-align:left;
}

/* BUTTONS */
.nav-btns { padding:4px 18px 18px; display:flex; gap:10px; }
.btn {
  flex:1; padding:13px; border:none; border-radius:12px;
  font-size:14px; font-weight:900; cursor:pointer;
  font-family:'Outfit',sans-serif; transition:var(--tr);
  display:flex; align-items:center; justify-content:center; gap:7px;
}
.btn-next {
  background:linear-gradient(135deg, var(--accent-dark), var(--accent));
  color:#fff; box-shadow:0 4px 14px var(--accent-glow);
}
.btn-next:hover { transform:translateY(-2px); box-shadow:0 6px 20px var(--accent-glow); }
.btn-skip {
  background:var(--bg2); color:var(--text2);
  border:1px solid var(--border-card); flex:0 0 auto; padding:13px 16px;
}
.btn-skip:hover { border-color:var(--warn); color:var(--warn); }

/* RESULTS */
.result-hero {
  text-align:center; padding:32px 20px 24px;
  background:var(--card); border-radius:20px;
  border:1px solid var(--border-card); margin-bottom:18px;
}
.score-ring {
  width:110px; height:110px; border-radius:50%; margin:0 auto 16px;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; position:relative;
}
.score-ring svg { position:absolute; inset:-5px; width:calc(100% + 10px); height:calc(100% + 10px); transform:rotate(-90deg); }
.score-ring circle { fill:none; stroke-width:5; stroke-linecap:round; }
.ring-bg   { stroke:var(--bg2); }
.ring-fill { stroke:var(--accent); transition:stroke-dashoffset 1s ease; }
.score-num { font-size:28px; font-weight:900; color:var(--text); }
.score-pct { font-size:12px; color:var(--text3); }
.result-grade { font-size:20px; font-weight:900; margin-bottom:5px; }
.result-sub   { font-size:14px; color:var(--text2); }
.result-stats {
  display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:18px;
}
.rs { background:var(--bg2); border-radius:10px; padding:11px 8px; text-align:center; }
.rs .n { font-size:20px; font-weight:900; }
.rs .l { font-size:11px; color:var(--text3); }

/* REPORT */
.report-item {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:13px; padding:15px; margin-bottom:9px;
  border-left:4px solid var(--border-card);
  direction:ltr; text-align:left;
}
.report-item.ok { border-left-color:var(--success); }
.report-item.no { border-left-color:var(--danger); }
.report-item .ri-q  { font-size:13px; font-weight:700; margin-bottom:7px; }
.report-item .ri-row { display:flex; align-items:center; gap:8px; font-size:12px; margin-top:4px; color:var(--text2); }
.ri-badge { padding:2px 8px; border-radius:6px; font-weight:700; font-size:11px; flex-shrink:0; }
.ri-yours { background:rgba(220,38,38,.1); color:var(--danger); }
.ri-right { background:rgba(22,163,74,.1);  color:var(--success); }

.result-actions { display:flex; flex-direction:column; gap:10px; margin-top:18px; }
.btn-retry { background:linear-gradient(135deg,var(--accent-dark),var(--accent)); color:#fff; }
.btn-retry:hover { transform:translateY(-2px); box-shadow:0 6px 20px var(--accent-glow); }
.btn-home  { background:var(--bg2); color:var(--text); border:1px solid var(--border-card); }
.btn-home:hover { border-color:var(--accent); color:var(--accent); }

/* FOOTER */
footer {
  background:var(--bg2); border-top:1px solid var(--border-card);
  padding:22px 24px;
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:10px;
}
.footer-brand { font-size:14px; font-weight:700; }
.footer-brand span { color:var(--accent); }
.footer-tg {
  display:flex; align-items:center; gap:5px;
  text-decoration:none; color:#229ED9; font-size:12px; font-weight:600;
}

@media (max-width:480px) {
  nav { padding:0 14px; }
  .shell { padding:14px 12px 60px; }
  .nav-brand span { display:none; }
}
</style>
</head>
<body>

<div id="prog-bar"></div>

<nav>
  <a href="index.html" class="nav-back"><i class="fa-solid fa-arrow-left"></i> Back</a>
  <div class="nav-brand">
    <div class="nav-logo-icon">GT</div>
    <span>GAITH TEAM</span>
  </div>
  <div class="nav-right">
    <button class="theme-btn" id="themeBtn">🌙</button>
  </div>
</nav>

<div class="hero-band">
  <div class="hero-band-icon">🔍</div>
  <h1>General Survey</h1>
  <p>Health Assessment </p>
  <div class="hero-meta">
    <div class="meta-pill"><i class="fa-solid fa-list-ol"></i> <span id="totalBadge">-- Questions</span></div>
    <div class="meta-pill"><i class="fa-solid fa-clock"></i> 50 Min</div>
    <div class="meta-pill"><i class="fa-solid fa-shuffle"></i> Shuffled</div>
  </div>
</div>

<div class="shell">
  <div class="stats-row">
    <div class="stat-box"><div class="val c-green" id="sCorrect">0</div><div class="lbl">✔ Correct</div></div>
    <div class="stat-box"><div class="val c-red"   id="sWrong">0</div><div class="lbl">✖ Wrong</div></div>
    <div class="stat-box"><div class="val c-blue"  id="sRemain">100%</div><div class="lbl">⏳ Remaining</div></div>
  </div>

  <div class="prog-strip">
    <div class="prog-label" id="progLabel">Q 1</div>
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <div class="timer-badge" id="timerBadge"><i class="fa-regular fa-clock"></i><span id="timerTxt">50:00</span></div>
  </div>

  <div id="app"></div>
</div>

<footer>
  <div class="footer-brand">GHAITH <span>TEAM</span></div>
  <a href="https://t.me/nursing2bu" target="_blank" class="footer-tg">
    <i class="fa-brands fa-telegram"></i> @nursing2bu
  </a>
</footer>

<script>
const QUESTIONS = [
// EASY LEVEL
      {t:"What is a general survey in nursing assessment?", o:["A deep analysis of a specific body system","The first broad observation of the entire patient as a whole","A focused assessment of a patient's chief complaint only","A review of laboratory and diagnostic test results only"], a:1},
      {t:"When does a general survey assessment begin?", o:["After laboratory results are reviewed","During the physical examination only","From the moment the nurse meets the patient","Only after the patient's medical history is obtained"], a:2},
      {t:"Which of the following does a nurse observe during a general survey?", o:["Only the patient's vital signs","Appearance, posture, gait, verbal and nonverbal communication, and behaviors","Only the patient's chief complaint","Laboratory values and diagnostic imaging results"], a:1},
      {t:"How many components are included in the nursing process?", o:["Three","Four","Five","Six"], a:3},
      {t:"Which of the following is the FIRST component of the nursing process?", o:["Planning","Diagnosis","Assessment","Implementation"], a:2},
      {t:"Patient data is classified as:", o:["Primary and secondary only","Subjective and objective","Quantitative and qualitative only","Formal and informal"], a:1},
      {t:"Subjective data is BEST described as:", o:["Information that can be measured and reproduced by anyone","Data obtained from laboratory and diagnostic tests","Information obtained from the patient and/or family members from their perspectives","Objective findings obtained during physical examination"], a:2},
      {t:"Which of the following is an example of subjective data?", o:["The patient's radial pulse is 58 and regular","The patient's blood pressure is 120/80 mmHg","The patient reports pain severity of 2 on a 0-10 scale","The patient's skin feels warm and dry"], a:2},
      {t:"Objective data is BEST described as:", o:["Information reported by the patient about their feelings","Data inferred by the nurse based on observation","Anything observed through the senses of hearing, sight, smell, and touch","Information obtained from family members only"], a:2},
      {t:"Which of the following is an example of objective data?", o:["The patient reports feeling anxious","The patient states she has chest tightness","The patient appears sad","The patient's radial pulse is 58 and regular, and skin feels warm and dry"], a:3},
      {t:"Which of the following is a key characteristic of a general survey?", o:["Narrow scope focused on a single body system","Experimental in nature with manipulation of variables","Broad scope covering general questions without highly specific details","Uses only closed-ended questionnaires"], a:2},
      {t:"Which organization establishes the standards for professional nursing practice?", o:["World Health Organization (WHO)","American Medical Association (AMA)","American Nurses Association (ANA)","National Institute of Health (NIH)"], a:2},
      {t:"Assessment data can be collected in which of the following ways?", o:["Only through physical examination","Only during focused interviews","During a focused interview, physical examination, or reviewing laboratory and diagnostic test results","Only through reviewing the patient's electronic medical record"], a:2},
      {t:"Primary subjective data is BEST described as information:", o:["Obtained from the patient's family members","Obtained from the patient's medical chart","Provided directly by the patient","Collected from secondary sources such as reports"], a:2},
      {t:"Secondary subjective data includes information obtained from:", o:["The patient directly","Physical examination findings","Family members, charts, or other sources","Laboratory and diagnostic test results"], a:2},

      // MODERATE LEVEL
      {t:"Which of the following BEST illustrates the purpose of a general survey?", o:["To perform a deep analysis of one specific body system","To gain a broad understanding of the overall picture and identify areas needing deeper study","To collect only laboratory and diagnostic data","To replace the need for a focused assessment"], a:1},
      {t:"According to the ANA, nursing assessment includes collecting pertinent data related to all of the following EXCEPT:", o:["Demographics and social determinants of health","Physical and psychosocial assessments","Financial investment portfolios","Cognitive and cultural assessments"], a:2},
      {t:"When documenting subjective data, the nurse should:", o:["Write it in the nurse's own words without quotation marks","Use quotation marks and phrases such as 'The patient reports...'","Document it the same way as objective data","Avoid documenting inferences as subjective data"], a:1},
      {t:"Which of the following statements about documenting an inference is TRUE?", o:["An inference is considered objective data because it is based on observation","Inferences should never be documented in the patient's record","An inference such as 'The patient appears anxious' is considered subjective data","Inferences are only documented when confirmed by laboratory results"], a:2},
      {t:"Objective data is described as reproducible, which means:", o:["Only the primary nurse can collect the same data","Another person can easily obtain the same data","The data changes with each assessment","The data is based on the patient's personal opinion"], a:1},
      {t:"Which of the following is a method used in a general survey?", o:["Surgical procedures and biopsies","Questionnaires, interviews, observation, and secondary data","Blood transfusion and medication administration","Advanced imaging techniques only"], a:1},
      {t:"The nursing process is BEST described as:", o:["A one-time linear process used only during admission","A continuous, cyclic process constantly adapting to the patient's current health status","A process used exclusively by physicians","A process limited to assessment and diagnosis only"], a:1},
      {t:"Which type of interview questions are used when clarification is needed during data collection?", o:["Closed-ended questionnaires only","Secondary data reviews","Face-to-face or online interviews","Only written questionnaires"], a:2},
      {t:"Why should the nurse review the patient's chart BEFORE conducting an interview?", o:["To eliminate the need for interviewing the patient entirely","To avoid discussing sensitive topics with the patient","To eliminate redundancy and focus on significant areas of concern or clarification","To replace the physical examination with chart data"], a:2},
      {t:"Which of the following nursing actions BEST demonstrates active listening during a patient interview?", o:["Completing documentation while the patient speaks","Asking for clarification when something is unclear and using critical thinking to identify important cues","Only listening to direct responses without observing nonverbal cues","Relying solely on information from family members"], a:1},
      {t:"Physical examination uses which four systematic techniques?", o:["Questioning, observation, documentation, and interpretation","Inspection, auscultation, palpation, and percussion","Interviewing, reviewing, interpreting, and reporting","Inspection, interviewing, observation, and documentation"], a:1},
      {t:"Which physical examination technique involves listening to sounds created by organs using a stethoscope?", o:["Inspection","Palpation","Percussion","Auscultation"], a:3},
      {t:"Which physical examination technique uses touch to evaluate organs for size, location, or tenderness?", o:["Inspection","Auscultation","Palpation","Percussion"], a:2},
      {t:"Which physical examination technique involves tapping body parts with fingers to determine their size or detect fluid?", o:["Auscultation","Percussion","Palpation","Inspection"], a:1},
      {t:"Assessment data collected during physical examination is documented in the:", o:["Nurse's personal notebook","Patient's electronic medical record (EMR)","Hospital billing system only","Family member's consent form"], a:1},

      // MODERATE-HIGH LEVEL
      {t:"A nurse notes that a patient avoids eye contact during an interview and infers the patient is depressed. Upon further questioning, the nurse discovers the patient's culture views direct eye contact as disrespectful. This scenario BEST illustrates the importance of:", o:["Skipping cultural assessment to save time","Validating cues before making inferences to avoid inappropriate conclusions","Relying on nonverbal cues alone for clinical decision-making","Documenting the inference as objective data"], a:1},
      {t:"Collection of physical examination data can be delegated to which of the following?", o:["Only unlicensed assistive personnel (UAP)","Licensed Practical Nurses/Licensed Vocational Nurses (LPNs/LVNs) or UAP when appropriate","Only the attending physician","Any healthcare worker regardless of licensure"], a:1},
      {t:"Even when physical examination data collection is delegated to an LPN/LVN or UAP, who remains responsible for analyzing the findings?", o:["The delegating nurse who assigned the task is not responsible","The LPN/LVN who collected the data","The physician who ordered the examination","The Registered Nurse (RN)"], a:3},
      {t:"Which of the following BEST explains why reviewing laboratory and diagnostic test results is important during the assessment phase?", o:["It replaces the need for physical examination","It provides relevant information related to the patient's needs and affects the nursing care plan","It is only useful for diagnosing conditions, not planning care","It is only reviewed after the nursing care plan is implemented"], a:1},
      {t:"Which of the following scenarios BEST demonstrates the use of all five senses during a general survey?", o:["A nurse reads the patient's chart and reviews vital signs only","A nurse interviews the patient using only verbal questions","A nurse observes the patient's appearance, listens to their speech, notices an unusual odor, observes skin condition, and notes posture and gait","A nurse reviews laboratory results and documents findings without direct patient contact"], a:2},
      {t:"When a patient does not answer a question during an interview, the nurse should:", o:["Document that the patient refused to cooperate","Proceed to the next question without further inquiry","Be alert to nonverbal communication and body language as potential cues requiring further investigation","Conclude the interview immediately"], a:2},
      {t:"A nurse documents: 'The patient's wife states he has not eaten in two days.' This is an example of:", o:["Primary subjective data","Objective data","Secondary subjective data","Documented inference"], a:2},
      {t:"A nurse documents: 'Blood pressure 145/90 mmHg, heart rate 98 bpm, respiratory rate 20/min.' This is an example of:", o:["Primary subjective data","Secondary subjective data","An inference based on observation","Objective data"], a:3},
      {t:"A nursing student feels uncomfortable asking a patient about substance use. According to the text, what should the student do?", o:["Avoid asking about substance use to maintain patient comfort","Document that the information was unavailable","Ask about substance use as it is important for safe patient care, as most patients appreciate being asked","Delegate the question to the attending physician"], a:2},
      {t:"Which of the following BEST distinguishes primary from secondary subjective data?", o:["Primary data comes from physical examination; secondary data comes from interviews","Primary data is provided directly by the patient; secondary data comes from family members, charts, or other sources","Primary data is objective; secondary data is subjective","Primary data is more reliable than secondary data in all clinical situations"], a:1},

      // HIGH LEVEL / APPLIED
      {t:"A nurse meets a patient for the first time and observes that the patient is hunched over, walking slowly with a limp, avoiding eye contact, and has a disheveled appearance. This initial observation is BEST described as:", o:["A focused physical assessment","A general survey assessment","An auscultation finding","A laboratory data review"], a:1},
      {t:"Which of the following BEST explains why the nursing process is described as cyclic and continuous?", o:["It is repeated at fixed intervals regardless of patient condition","It constantly adapts to the patient's current health status throughout the care relationship","It is only repeated when the patient's condition deteriorates","It stops after the evaluation phase is completed"], a:1},
      {t:"A nurse documents: 'The patient appears anxious.' According to the text, how should this documentation be classified?", o:["Objective data, because it is based on direct observation","Primary subjective data, because it comes from the patient","Secondary subjective data, because it is inferred from family members","Subjective data, because it is an inference made by the nurse"], a:3},
      {t:"A nurse reviews a patient's chart before the interview and finds incomplete information about medication allergies. What is the MOST appropriate nursing action?", o:["Proceed with care using the available information","Document the allergy field as 'unknown' and continue","Use the interview process to verify and clarify the allergy information with the patient","Request another nurse to complete the chart review"], a:2},
      {t:"Which combination of assessment data sources provides the MOST comprehensive picture of a patient's health status?", o:["Focused interview only","Physical examination findings only","Focused interview, physical examination, and review of laboratory and diagnostic test results","Review of secondary data sources only"], a:2},
      {t:"A nurse auscultates abnormal bowel sounds, notes the patient's skin is pale and diaphoretic, and the patient reports abdominal pain rated 7/10. Which statement BEST classifies these findings?", o:["All findings are objective data","Abnormal bowel sounds and skin findings are objective; reported pain is subjective","All findings are subjective data","Skin findings are subjective; bowel sounds and pain report are objective"], a:1},
      {t:"Which of the following BEST demonstrates the use of critical thinking during a patient interview?", o:["Accepting all patient responses without further questioning","Relying solely on the medical chart for patient information","Identifying important cues from verbal and nonverbal communication and discovering valuable information that the patient may not volunteer","Documenting only what the patient directly states without analysis"], a:2},
      {t:"A general survey is described as descriptive in nature. This means it:", o:["Manipulates variables to test hypotheses","Describes the current situation, focusing on facts, opinions, or conditions without manipulating variables","Uses experimental methods to collect data","Focuses exclusively on quantitative data analysis"], a:1},
      {t:"A nurse is beginning a patient interview and starts with questions related to the patient's medical diagnoses. According to the text, what is the PRIMARY reason for this approach?", o:["To complete the interview more quickly","To gather information about how medical diagnoses have affected the patient's functioning, relationships, and lifestyle","To avoid discussing sensitive personal topics","To replace the need for reviewing laboratory results"], a:1},
      {t:"A patient with an infant is unable to provide a verbal history. The nurse collects information from the infant's mother about feeding habits, sleep patterns, and recent illness. This is BEST classified as:", o:["Primary objective data","Objective data from physical examination","Secondary subjective data","Primary subjective data from the patient"], a:2},
      {t:"Which of the following BEST summarizes the role of a general survey in the nursing assessment process?", o:["It replaces the need for focused assessments and physical examination","It provides an initial broad overview that guides additional focused assessments in areas of concern","It is used only to collect demographic data for administrative purposes","It is the final step in the nursing assessment process"], a:1},
      {t:"A nurse observes that a patient is grimacing, guarding their abdomen, and rating their pain as 3/10. The nurse suspects the pain may be more severe than reported. Which nursing action BEST reflects appropriate assessment practice?", o:["Accept the patient's self-report as the only valid pain measure","Document only the objective findings and disregard the pain rating","Validate the cues by further questioning and continued assessment, recognizing the discrepancy between objective and subjective data","Administer maximum pain medication based on objective findings alone"], a:2},
      {t:"Understanding how normal and abnormal laboratory results affect patient care is MOST important for which nursing activity?", o:["Completing the general survey assessment","Delegating physical examination to UAP","Implementing the nursing care plan and administering prescriptions","Documenting biographical data in the EMR"], a:2},
      {t:"Which of the following BEST describes how cues obtained during a general survey are used?", o:["They replace the need for a complete health history","They serve as the final diagnosis for the patient's condition","They guide additional focused assessments in areas of concern","They are documented only after physical examination is completed"], a:2},
      {t:"A nurse establishes rapport with a patient before collecting subjective data. According to the text, why is this important?", o:["It speeds up the documentation process","It ensures objective data is collected accurately","It helps obtain accurate, valuable subjective data, particularly regarding mental, emotional, and spiritual aspects","It eliminates the need for secondary data sources"], a:2},
      {t:"A general survey begins from the moment the nurse meets the patient.", o:["True","False"], a:0},
      {t:"Subjective data is reproducible, meaning another person can easily obtain the same data.", o:["True","False"], a:1},
      {t:"Objective data includes vital signs, physical examination findings, and laboratory results.", o:["True","False"], a:0},
      {t:"Primary subjective data is information provided directly by the patient.", o:["True","False"], a:0},
      {t:"Secondary subjective data can be obtained from family members, charts, or other sources.", o:["True","False"], a:0},
      {t:"The nursing process is a linear, one-time process that ends after evaluation.", o:["True","False"], a:1},
      {t:"The six components of the nursing process are Assessment, Diagnosis, Outcomes Identification, Planning, Implementation, and Evaluation.", o:["True","False"], a:0},
      {t:"Documenting 'The patient appears anxious' is an example of objective data.", o:["True","False"], a:1},
      {t:"Reviewing the chart before interviewing the patient helps eliminate redundancy in the interview process.", o:["True","False"], a:0},
      {t:"The Registered Nurse (RN) remains responsible for analyzing physical examination findings even when data collection is delegated.", o:["True","False"], a:0},
      {t:"A general survey is descriptive in nature and does not manipulate variables.", o:["True","False"], a:0},
      {t:"Percussion is a basic physical examination technique that requires no specialized skill.", o:["True","False"], a:1},
      {t:"Auscultation involves listening to sounds such as heart, lung, and bowel sounds using a stethoscope.", o:["True","False"], a:0},
      {t:"Assessment data is documented in the patient's electronic medical record (EMR).", o:["True","False"], a:0},
      {t:"Nonverbal communication and body language should be ignored during a patient interview.", o:["True","False"], a:1},
      {t:"The nurse should validate cues before making inferences to avoid inappropriate conclusions.", o:["True","False"], a:0},
      {t:"A general survey uses all five senses to gather cues about the patient.", o:["True","False"], a:0},
      {t:"Reviewing laboratory and diagnostic test results is not considered part of the assessment phase of the nursing process.", o:["True","False"], a:1},
      {t:"When documenting subjective data, the nurse should use quotation marks and phrases such as 'The patient reports...'", o:["True","False"], a:0},
      {t:"Patients are the best source of primary information about their own bodies and feelings.", o:["True","False"], a:0}
];

/* ============ ENGINE ============ */
const LETTERS = ['A','B','C','D','E','F'];
let questions, i, correct, wrong, answers, wrongSet, answered;
let totalTime = 35*60, timeLeft, timerInterval;

function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function init(pool) {
  questions = shuffle([...pool]);
  i=0; correct=0; wrong=0; answered=0;
  answers = new Array(questions.length).fill(null);
  wrongSet = [];
  timeLeft = totalTime;
  document.getElementById('totalBadge').textContent = questions.length + ' Questions';
  startTimer(); render();
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    const m = Math.floor(timeLeft/60), s = timeLeft%60;
    document.getElementById('timerTxt').textContent = `${m}:${s<10?'0':''}${s}`;
    const b = document.getElementById('timerBadge');
    if (timeLeft<=120)      b.className='timer-badge danger';
    else if (timeLeft<=300) b.className='timer-badge warn';
    if (timeLeft<=0) { clearInterval(timerInterval); finish(); }
  }, 1000);
}

function updateTop() {
  const total = questions.length;
  document.getElementById('sCorrect').textContent = correct;
  document.getElementById('sWrong').textContent   = wrong;
  document.getElementById('sRemain').textContent  = Math.round(((total-answered)/total)*100)+'%';
  document.getElementById('progLabel').textContent = 'Q '+(i+1)+' / '+total;
  document.getElementById('progFill').style.width  = ((i+1)/total*100)+'%';
  document.getElementById('prog-bar').style.width  = ((i+1)/total*100)+'%';
}

function render() {
  updateTop();
  const q = questions[i];
  document.getElementById('app').innerHTML = `
    <div class="q-card">
      <div class="q-header"><div class="q-num">Question ${i+1} / ${questions.length}</div></div>
      <div class="q-text">${q.t}</div>
      <div class="options">
        ${q.o.map((o,idx)=>`
          <div class="opt" id="opt${idx}" onclick="choose(${idx})">
            <div class="opt-letter">${LETTERS[idx]}</div>
            ${o}
          </div>`).join('')}
      </div>
      <div class="nav-btns">
        <button class="btn btn-skip" onclick="skip()"><i class="fa-solid fa-forward"></i> Skip</button>
      </div>
    </div>`;
}

function choose(v) {
  if (answers[i]!==null) return;
  answers[i]=v; answered++;
  const q=questions[i], ok=v===q.a;
  ok?correct++:wrong++;
  updateTop();
  q.o.forEach((_,idx)=>{
    const el=document.getElementById('opt'+idx);
    el.classList.add('disabled');
    if (idx===q.a) el.classList.add('correct');
    else if (idx===v) el.classList.add('wrong');
  });
  const fb=document.createElement('div');
  fb.className='feedback-bar '+(ok?'ok':'no');
  fb.innerHTML=ok
    ?`<span class="feedback-icon">🎉</span><span>Correct! Well done.</span>`
    :`<span class="feedback-icon">💡</span><span>Correct answer: <b>${q.o[q.a]}</b></span>`;
  const card=document.querySelector('.q-card');
  card.querySelector('.options').after(fb);
  if (q.exp) {
    const exp=document.createElement('div');
    exp.className='explanation';
    exp.innerHTML='<b>💬 Explanation:</b> '+q.exp;
    fb.after(exp);
  }
  card.querySelector('.nav-btns').innerHTML=`
    <button class="btn btn-next" onclick="next()">
      ${i<questions.length-1
        ?'<i class="fa-solid fa-arrow-right"></i> Next Question'
        :'<i class="fa-solid fa-flag-checkered"></i> Finish Exam'}
    </button>`;
}

function skip() {
  if (answers[i]===null) { answers[i]=-1; answered++; wrong++; wrongSet.push(questions[i]); updateTop(); }
  next();
}

function next() {
  if (i<questions.length-1) { i++; render(); window.scrollTo({top:0,behavior:'smooth'}); }
  else finish();
}

function finish() {
  clearInterval(timerInterval);
  const total=questions.length;
  const score=Math.round((correct/total)*100);
  questions.forEach((q,idx)=>{ if(answers[idx]!==q.a) wrongSet.push({...q,myAns:answers[idx]}); });
  wrongSet=[...new Map(wrongSet.map(q=>[q.t,q])).values()];
  let grade,gc;
  if(score>=90)      { grade='🥇 Excellent';      gc='var(--success)'; }
  else if(score>=75) { grade='🥈 Very Good';       gc='var(--accent)'; }
  else if(score>=60) { grade='🥉 Good';            gc='var(--warn)'; }
  else               { grade='📚 Needs Review';    gc='var(--danger)'; }
  const circ=2*Math.PI*45, offset=circ-(score/100)*circ;
  const report=questions.map((q,idx)=>{
    const ok=answers[idx]===q.a;
    return `<div class="report-item ${ok?'ok':'no'}">
      <div class="ri-q">${ok?'✅':'❌'} ${q.t}</div>
      ${!ok?`
        <div class="ri-row"><span class="ri-badge ri-yours">Your Answer</span>${answers[idx]>=0?q.o[answers[idx]]:'Skipped'}</div>
        <div class="ri-row"><span class="ri-badge ri-right">Correct</span>${q.o[q.a]}</div>
      `:''}
    </div>`;
  }).join('');
  document.getElementById('prog-bar').style.width='100%';
  document.getElementById('app').innerHTML=`
    <div class="result-hero">
      <div class="score-ring">
        <svg viewBox="0 0 110 110">
          <circle class="ring-bg"   cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="0"/>
          <circle class="ring-fill" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            style="stroke:${gc}" id="ringFill"/>
        </svg>
        <div class="score-num">${score}</div>
        <div class="score-pct">%</div>
      </div>
      <div class="result-grade" style="color:${gc}">${grade}</div>
      <div class="result-sub">Answered ${answered} of ${total} questions</div>
      <div class="result-stats">
        <div class="rs"><div class="n" style="color:var(--success)">${correct}</div><div class="l">Correct</div></div>
        <div class="rs"><div class="n" style="color:var(--danger)">${wrong}</div><div class="l">Wrong</div></div>
        <div class="rs"><div class="n" style="color:var(--accent)">${total-answered<0?0:total-answered}</div><div class="l">Skipped</div></div>
      </div>
    </div>
    <div class="result-actions">
      ${wrongSet.length?`<button class="btn btn-retry" onclick="retryWrong()"><i class="fa-solid fa-rotate-right"></i> Retry Wrong (${wrongSet.length})</button>`:''}
      <button class="btn btn-home" onclick="init(QUESTIONS)"><i class="fa-solid fa-shuffle"></i> New Random Exam</button>
      <a href="index.html" class="btn btn-home" style="text-decoration:none;"><i class="fa-solid fa-house"></i> Back to Subject</a>
    </div>
    <div style="margin-top:24px">
      <div style="font-size:14px;font-weight:700;margin-bottom:10px;color:var(--text2);">📋 Detailed Report</div>
      ${report}
    </div>`;
  setTimeout(()=>{document.getElementById('ringFill').style.strokeDashoffset=offset;},100);
  window.scrollTo({top:0,behavior:'smooth'});
}

function retryWrong() {
  const pool=[...wrongSet];
  questions=shuffle(pool); i=0; correct=0; wrong=0;
  answers=new Array(questions.length).fill(null);
  wrongSet=[]; answered=0; timeLeft=totalTime;
  startTimer(); render();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* THEME */
const themeBtn=document.getElementById('themeBtn');
let theme=localStorage.getItem('theme')||'light';
function applyTheme(t) {
  theme=t;
  document.documentElement.setAttribute('data-theme',t==='dark'?'dark':'');
  themeBtn.textContent=t==='dark'?'☀️':'🌙';
  localStorage.setItem('theme',t);
}
applyTheme(theme);
themeBtn.addEventListener('click',()=>applyTheme(theme==='dark'?'light':'dark'));

init(QUESTIONS);
</script>
