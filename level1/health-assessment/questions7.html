<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Body System Assessment — Exam | GAITH TEAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent:             #0891b2;
  --accent-light:       #06b6d4;
  --accent-dark:        #0e7490;
  --accent-glow:        rgba(8,145,178,0.14);
  --accent-glow-strong: rgba(8,145,178,0.28);
  --bg:      #f8fafc;
  --bg2:     #eef2f7;
  --card:    #ffffff;
  --text:    #1a2332;
  --text2:   #4a5568;
  --text3:   #718096;
  --border:       rgba(8,145,178,0.18);
  --border-card:  rgba(0,0,0,0.07);
  --shadow:       0 4px 20px rgba(0,0,0,0.07);
  --shadow-hover: 0 8px 32px rgba(8,145,178,0.22);
  --success: #16a34a;
  --danger:  #dc2626;
  --warn:    #d97706;
  --radius: 16px;
  --tr: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg:   #0d1117; --bg2: #161b22; --card: #1c2333;
  --text: #e6edf3; --text2: #b1bac4; --text3: #7d8590;
  --border:      rgba(6,182,212,0.22);
  --border-card: rgba(6,182,212,0.10);
  --shadow:       0 4px 20px rgba(0,0,0,0.4);
  --shadow-hover: 0 8px 36px rgba(8,145,178,0.28);
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
  transition: background .4s, color .4s;
  direction: ltr;
}

#prog-bar {
  position: fixed; top: 0; left: 0; height: 3px; z-index: 999;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  width: 0%; transition: width .15s;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 64px;
  background: rgba(248,250,252,.93); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-card); transition: var(--tr);
}
[data-theme="dark"] nav { background: rgba(13,17,23,.95); }

.nav-back {
  display: flex; align-items: center; gap: 7px;
  color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 600;
  padding: 7px 13px; border-radius: 8px;
  border: 1px solid var(--border-card); background: var(--card);
  transition: var(--tr);
}
.nav-back:hover { color: var(--accent); border-color: var(--border); }
.nav-brand { display: flex; align-items: center; gap: 9px; font-size: 15px; font-weight: 900; color: var(--text); }
.nav-logo-icon {
  width: 34px; height: 34px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 900;
}
.nav-right { display: flex; align-items: center; gap: 8px; }
.theme-btn {
  width: 38px; height: 38px; border-radius: 50%;
  border: 1px solid var(--border-card); background: var(--card);
  cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center; transition: var(--tr);
}
.theme-btn:hover { border-color: var(--accent); transform: rotate(20deg); }

/* HERO BAND */
.hero-band {
  margin-top: 64px;
  background: linear-gradient(135deg, var(--accent-dark), var(--accent), var(--accent-light));
  padding: 36px 24px 32px; text-align: center;
  position: relative; overflow: hidden;
}
.hero-band::before {
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse 600px 200px at 50% 100%, rgba(255,255,255,.12) 0%, transparent 70%);
}
.hero-band-icon {
  width: 64px; height: 64px; border-radius: 18px;
  background: rgba(255,255,255,.2); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; margin: 0 auto 12px;
  border: 1.5px solid rgba(255,255,255,.35);
}
.hero-band h1 { font-size: clamp(18px,3.5vw,26px); font-weight: 900; color:#fff; margin-bottom:4px; }
.hero-band p { font-size:13px; color:rgba(255,255,255,.8); }
.hero-meta {
  display:flex; justify-content:center; gap:16px; margin-top:16px; flex-wrap:wrap;
}
.meta-pill {
  background: rgba(255,255,255,.18); backdrop-filter:blur(6px);
  border: 1px solid rgba(255,255,255,.3); border-radius:50px;
  padding:5px 14px; font-size:12px; font-weight:700; color:#fff;
  display:flex; align-items:center; gap:5px;
}

/* SHELL */
.shell { max-width:560px; margin:0 auto; padding:20px 18px 80px; }

/* STATS */
.stats-row {
  display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:14px;
}
.stat-box {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:var(--radius); padding:12px 8px; text-align:center;
}
.stat-box .val { font-size:20px; font-weight:900; }
.stat-box .lbl { font-size:11px; color:var(--text3); margin-top:2px; }
.c-green { color:var(--success); }
.c-red   { color:var(--danger); }
.c-blue  { color:var(--accent); }

/* PROGRESS STRIP */
.prog-strip {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:var(--radius); padding:13px 16px; margin-bottom:16px;
  display:flex; align-items:center; gap:12px;
}
.prog-label { font-size:13px; font-weight:700; color:var(--text2); white-space:nowrap; }
.prog-track { flex:1; height:7px; background:var(--bg2); border-radius:7px; overflow:hidden; }
.prog-fill {
  height:100%; width:0%;
  background:linear-gradient(90deg, var(--accent), var(--accent-light));
  border-radius:7px; transition:width .4s;
}
.timer-badge {
  min-width:60px; height:34px; border-radius:17px;
  background:var(--bg2); border:1px solid var(--border-card);
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:900; color:var(--text);
  gap:4px; padding:0 10px; flex-shrink:0;
}
.timer-badge.warn   { color:var(--warn);    border-color:rgba(217,119,6,.3);  background:rgba(217,119,6,.08); }
.timer-badge.danger { color:var(--danger);  border-color:rgba(220,38,38,.3);  background:rgba(220,38,38,.08); animation:blink .8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.5} }

/* QUESTION CARD */
.q-card {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:20px; overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,.05);
}
.q-header {
  background:linear-gradient(135deg, var(--accent-dark), var(--accent));
  padding:10px 18px;
  display:flex; align-items:center; gap:8px;
}
.q-num {
  background:rgba(255,255,255,.22); border-radius:7px;
  padding:3px 10px; font-size:11px; font-weight:700; color:#fff;
}
.q-text {
  padding:20px 18px 14px; font-size:15px; font-weight:700; color:var(--text);
  line-height:1.65; border-bottom:1px solid var(--border-card);
  direction:ltr; text-align:left;
}
.options { padding:14px 18px 18px; display:flex; flex-direction:column; gap:10px; }

.opt {
  display:flex; align-items:center; gap:12px;
  padding:13px 15px; border-radius:12px;
  border:1.5px solid var(--border-card); background:var(--bg);
  cursor:pointer; font-size:14px; font-weight:600; color:var(--text);
  transition:var(--tr); user-select:none;
  direction:ltr; text-align:left;
}
.opt:hover:not(.disabled) {
  border-color:var(--accent); background:var(--accent-glow);
  transform:translateX(3px);
}
.opt-letter {
  width:28px; height:28px; border-radius:8px; flex-shrink:0;
  background:var(--bg2); border:1px solid var(--border-card);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:900; color:var(--text3);
  transition:var(--tr);
}
.opt.correct { border-color:var(--success); background:rgba(22,163,74,.08); }
.opt.correct .opt-letter { background:var(--success); color:#fff; border-color:var(--success); }
.opt.wrong   { border-color:var(--danger);  background:rgba(220,38,38,.07); }
.opt.wrong   .opt-letter { background:var(--danger);  color:#fff; border-color:var(--danger); }
.opt.disabled { pointer-events:none; }

/* FEEDBACK */
.feedback-bar {
  margin:12px 18px; padding:12px 15px; border-radius:12px;
  display:flex; align-items:center; gap:10px;
  font-size:14px; font-weight:700;
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
.feedback-bar.ok { background:rgba(22,163,74,.1); color:var(--success); border:1px solid rgba(22,163,74,.25); }
.feedback-bar.no { background:rgba(220,38,38,.08); color:var(--danger); border:1px solid rgba(220,38,38,.2); }
.feedback-icon { font-size:18px; }

.explanation {
  margin:0 18px 12px; padding:11px 14px;
  background:rgba(8,145,178,.06); border-radius:10px;
  border-left:3px solid var(--accent);
  font-size:13px; color:var(--text2); line-height:1.6;
  direction:ltr; text-align:left;
}

/* BUTTONS */
.nav-btns { padding:4px 18px 18px; display:flex; gap:10px; }
.btn {
  flex:1; padding:13px; border:none; border-radius:12px;
  font-size:14px; font-weight:900; cursor:pointer;
  font-family:'Outfit',sans-serif; transition:var(--tr);
  display:flex; align-items:center; justify-content:center; gap:7px;
}
.btn-next {
  background:linear-gradient(135deg, var(--accent-dark), var(--accent));
  color:#fff; box-shadow:0 4px 14px var(--accent-glow);
}
.btn-next:hover { transform:translateY(-2px); box-shadow:0 6px 20px var(--accent-glow); }
.btn-skip {
  background:var(--bg2); color:var(--text2);
  border:1px solid var(--border-card); flex:0 0 auto; padding:13px 16px;
}
.btn-skip:hover { border-color:var(--warn); color:var(--warn); }

/* RESULTS */
.result-hero {
  text-align:center; padding:32px 20px 24px;
  background:var(--card); border-radius:20px;
  border:1px solid var(--border-card); margin-bottom:18px;
}
.score-ring {
  width:110px; height:110px; border-radius:50%; margin:0 auto 16px;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; position:relative;
}
.score-ring svg { position:absolute; inset:-5px; width:calc(100% + 10px); height:calc(100% + 10px); transform:rotate(-90deg); }
.score-ring circle { fill:none; stroke-width:5; stroke-linecap:round; }
.ring-bg   { stroke:var(--bg2); }
.ring-fill { stroke:var(--accent); transition:stroke-dashoffset 1s ease; }
.score-num { font-size:28px; font-weight:900; color:var(--text); }
.score-pct { font-size:12px; color:var(--text3); }
.result-grade { font-size:20px; font-weight:900; margin-bottom:5px; }
.result-sub   { font-size:14px; color:var(--text2); }
.result-stats {
  display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:18px;
}
.rs { background:var(--bg2); border-radius:10px; padding:11px 8px; text-align:center; }
.rs .n { font-size:20px; font-weight:900; }
.rs .l { font-size:11px; color:var(--text3); }

/* REPORT */
.report-item {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:13px; padding:15px; margin-bottom:9px;
  border-left:4px solid var(--border-card);
  direction:ltr; text-align:left;
}
.report-item.ok { border-left-color:var(--success); }
.report-item.no { border-left-color:var(--danger); }
.report-item .ri-q  { font-size:13px; font-weight:700; margin-bottom:7px; }
.report-item .ri-row { display:flex; align-items:center; gap:8px; font-size:12px; margin-top:4px; color:var(--text2); }
.ri-badge { padding:2px 8px; border-radius:6px; font-weight:700; font-size:11px; flex-shrink:0; }
.ri-yours { background:rgba(220,38,38,.1); color:var(--danger); }
.ri-right { background:rgba(22,163,74,.1);  color:var(--success); }

.result-actions { display:flex; flex-direction:column; gap:10px; margin-top:18px; }
.btn-retry { background:linear-gradient(135deg,var(--accent-dark),var(--accent)); color:#fff; }
.btn-retry:hover { transform:translateY(-2px); box-shadow:0 6px 20px var(--accent-glow); }
.btn-home  { background:var(--bg2); color:var(--text); border:1px solid var(--border-card); }
.btn-home:hover { border-color:var(--accent); color:var(--accent); }

/* FOOTER */
footer {
  background:var(--bg2); border-top:1px solid var(--border-card);
  padding:22px 24px;
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:10px;
}
.footer-brand { font-size:14px; font-weight:700; }
.footer-brand span { color:var(--accent); }
.footer-tg {
  display:flex; align-items:center; gap:5px;
  text-decoration:none; color:#229ED9; font-size:12px; font-weight:600;
}

@media (max-width:480px) {
  nav { padding:0 14px; }
  .shell { padding:14px 12px 60px; }
  .nav-brand span { display:none; }
}
</style>
</head>
<body>

<div id="prog-bar"></div>

<nav>
  <a href="index.html" class="nav-back"><i class="fa-solid fa-arrow-left"></i> Back</a>
  <div class="nav-brand">
    <div class="nav-logo-icon">GT</div>
    <span>GAITH TEAM</span>
  </div>
  <div class="nav-right">
    <button class="theme-btn" id="themeBtn">🌙</button>
  </div>
</nav>

<div class="hero-band">
  <div class="hero-band-icon">🫀</div>
  <h1>Body System Assessment</h1>
  <p>Health Assessment</p>
  <div class="hero-meta">
    <div class="meta-pill"><i class="fa-solid fa-list-ol"></i> <span id="totalBadge">-- Questions</span></div>
    <div class="meta-pill"><i class="fa-solid fa-clock"></i> 50 Min</div>
    <div class="meta-pill"><i class="fa-solid fa-shuffle"></i> Shuffled</div>
  </div>
</div>

<div class="shell">
  <div class="stats-row">
    <div class="stat-box"><div class="val c-green" id="sCorrect">0</div><div class="lbl">✔ Correct</div></div>
    <div class="stat-box"><div class="val c-red"   id="sWrong">0</div><div class="lbl">✖ Wrong</div></div>
    <div class="stat-box"><div class="val c-blue"  id="sRemain">100%</div><div class="lbl">⏳ Remaining</div></div>
  </div>

  <div class="prog-strip">
    <div class="prog-label" id="progLabel">Q 1</div>
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <div class="timer-badge" id="timerBadge"><i class="fa-regular fa-clock"></i><span id="timerTxt">50:00</span></div>
  </div>

  <div id="app"></div>
</div>

<footer>
  <div class="footer-brand">GAITH <span>TEAM</span></div>
  <a href="https://t.me/nursing2bu" target="_blank" class="footer-tg">
    <i class="fa-brands fa-telegram"></i> @nursing2bu
  </a>
</footer>

<script>
const QUESTIONS = [
// EASY LEVEL
      {t:"Which of the following is the correct order of assessment techniques for the gastrointestinal system?", o:["Inspection, Palpation, Percussion, Auscultation","Inspection, Auscultation, Percussion, Palpation","Palpation, Percussion, Auscultation, Inspection","Auscultation, Inspection, Palpation, Percussion"], a:1},
      {t:"Why is auscultation performed before percussion and palpation during a gastrointestinal assessment?", o:["Auscultation requires the patient to be in a different position","Percussion and palpation can alter intestinal activity and bowel sounds","Auscultation is the least important technique for abdominal assessment","Percussion must always follow palpation in all body systems"], a:1},
      {t:"Normal bowel sounds are heard approximately every:", o:["1 to 2 seconds","30 to 60 seconds","5 to 15 seconds","2 to 3 minutes"], a:2},
      {t:"Bowel sounds occurring once every minute or longer are considered:", o:["Hyperactive","Normal","Hypoactive","Absent"], a:2},
      {t:"Which of the following percussion sounds indicates the presence of air in the abdomen?", o:["Dullness","Flatness","Resonance","Tympany"], a:3},
      {t:"Which percussion sound over the abdomen indicates a solid organ or free fluid?", o:["Tympany","Resonance","Dullness","Hyperresonance"], a:2},
      {t:"A psychosocial assessment is an evaluation of a person's:", o:["Respiratory and cardiovascular function only","Mental health, social status, and functional capacity within the community","Physical examination findings only","Nutritional status and dietary habits"], a:1},
      {t:"Which of the following is assessed during a nervous system assessment of the head, face, and neck?", o:["Bowel sounds and abdominal contour","Urinary elimination patterns","Size, contour, movement, expression, symmetry, color, lesions, edema, masses, and scars","Capillary filling and nail bed color"], a:2},
      {t:"Which of the following best describes orientation assessment during neurological evaluation?", o:["Assessment of motor power and gait","Assessment of reflexes and posturing","Assessment of orientation to person, place, and time","Assessment of memory and communication only"], a:2},
      {t:"Which of the following is a skin color finding assessed during integumentary system assessment?", o:["Tympany and resonance","Crepitus and stiffness","Pink, pale, red, jaundice, mottled, cyanotic","Oliguria and hematuria"], a:2},
      {t:"Which of the following describes a normal breathing pattern finding during respiratory assessment?", o:["Use of accessory muscles at rest","Irregular and labored breathing","Retractions and cyanosis","Regular rate, rhythm, and depth without use of accessory muscles"], a:3},
      {t:"Clubbing of the fingers during respiratory assessment indicates:", o:["Adequate tissue oxygenation","Poor nutritional status","Chronic tissue hypoxia or oxygenation problems","Normal cardiovascular function"], a:2},
      {t:"Which of the following is assessed in the cardiovascular system?", o:["Bowel motility and peristalsis","Apical and radial pulse rate, rhythm, and intensity","Urinary frequency and urgency","Skin turgor and hair distribution only"], a:1},
      {t:"Which of the following describes a peripheral pulse finding during cardiovascular assessment?", o:["Absent, weak, moderate, or strong pulse with capillary filling","Presence of crackles and wheezing","Tympanic and resonant sounds over the chest","Bowel sounds every 5 to 15 seconds"], a:0},
      {t:"Which of the following is included in the assessment of the renal system?", o:["Bowel motility and peristalsis","Skin turgor and hair distribution","Urinary elimination patterns including frequency, urgency, and color","Heart sounds and blood pressure"], a:2},

      // MODERATE LEVEL
      {t:"During respiratory assessment, which finding would indicate a problem with tissue oxygenation?", o:["Clear bilateral air entry with vesicular sounds","Regular respiratory rate of 14/min","Cyanosis, clubbing, and decreased mental alertness","Symmetrical chest expansion without retractions"], a:2},
      {t:"Which of the following lung sounds is considered abnormal during auscultation?", o:["Bronchial sounds","Bronchovesicular sounds","Vesicular sounds","Crackles and wheezing"], a:3},
      {t:"In a patient with abdominal pain, what is the correct sequence for performing assessment techniques?", o:["Palpate the painful area first, then inspect and auscultate","Percuss first, then palpate the painful area, then auscultate","Inspect first, auscultate second, then percuss and palpate the painful area last","Palpate and percuss together, then auscultate"], a:2},
      {t:"Which of the following cardiovascular findings suggests poor peripheral circulation?", o:["Regular apical pulse of 72/min","Strong bilateral peripheral pulses with warm extremities","Absent or weak peripheral pulses with pallor and cool extremities","Blood pressure 120/80 mmHg bilaterally"], a:2},
      {t:"Which of the following is an abnormal finding during musculoskeletal assessment of the back?", o:["Symmetrical muscle tone bilaterally","Full active range of motion without pain","Kyphosis, scoliosis, and sacral edema","Smooth coordinated movement without spasms"], a:2},
      {t:"During a neurological assessment, which level of consciousness finding indicates the MOST severe impairment?", o:["Lethargic","Restless","Stuporous","Comatose"], a:3},
      {t:"Which of the following is assessed during the musculoskeletal assessment of joints?", o:["Bowel sounds and intestinal motility","Heart sounds and peripheral pulses","Symmetry, mobility, deformities, stiffness, swelling, and pain","Urinary frequency and character"], a:2},
      {t:"Babinski's sign is assessed as part of which system examination?", o:["Gastrointestinal system","Cardiovascular system","Respiratory system","Nervous system — reflex assessment"], a:3},
      {t:"Which of the following is included in the assessment of the integumentary system?", o:["Bowel sounds and abdominal contour","Heart rhythm and peripheral pulses","Urinary frequency and nocturia","Skin color, temperature, texture, turgor, lesions, and hair and nails"], a:3},
      {t:"Which of the following oral findings during a gastrointestinal assessment is considered abnormal?", o:["Moist pink tongue without ulcers","Teeth without cavities in good condition","Gums with normal color and no bleeding","Lips and tongue with ulcers, swelling, and bleeding gums"], a:3},
      {t:"Which of the following urinary findings would raise concern during renal system assessment?", o:["Clear yellow urine with normal frequency","Normal urinary stream without urgency","Hematuria, frothy urine, oliguria, and burning on urination","Adequate fluid intake with balanced intake and output"], a:2},
      {t:"Which of the following is assessed during the psychosocial dimension assessment under 'General Impression'?", o:["Bowel sounds and abdominal distension","Lung sounds and respiratory rate","Mood, affect, eye contact, attention span, self-esteem, and body image","Peripheral pulses and capillary refill"], a:2},
      {t:"When assessing coping and stress tolerance in the psychosocial dimension, the nurse evaluates:", o:["Respiratory rate and oxygen saturation","Apical pulse and blood pressure","Decision-making ability, response to life changes, and methods of coping with stress","Urinary elimination patterns and fluid balance"], a:2},
      {t:"Which of the following muscle findings is considered abnormal during musculoskeletal assessment?", o:["Symmetrical muscle size and shape bilaterally","Normal muscle tone without spasms","Asymmetrical muscles with spasms, cramps, and weakness","Full range of motion without pain or weakness"], a:2},
      {t:"During an integumentary assessment, edema is assessed for which of the following characteristics?", o:["Color, clarity, and odor only","Location and severity","Texture, temperature, and turgor only","Presence of lesions and scars only"], a:1},

      // MODERATE-HIGH LEVEL
      {t:"A nurse auscultates the abdomen and hears no bowel sounds after listening for 2 minutes in each quadrant. This finding is MOST consistent with:", o:["Normal bowel activity","Hyperactive bowel sounds","Paralytic ileus","Diarrhea"], a:2},
      {t:"A patient's chest shape is described as 'barrel-shaped' during respiratory assessment. This finding is MOST commonly associated with:", o:["Normal chest development","Kyphosis and spinal deformity","Emphysema and chronic obstructive pulmonary disease","Pectus excavatum or funnel chest"], a:2},
      {t:"During cardiovascular assessment, a pulse deficit is identified. This means:", o:["The apical and radial pulse rates are equal","The radial pulse is faster than the apical pulse","The apical pulse rate exceeds the radial pulse rate","Both pulses are absent simultaneously"], a:2},
      {t:"A nurse assesses a patient and documents: 'Positive Babinski's sign in an adult patient.' This finding MOST likely indicates:", o:["Normal deep tendon reflex activity","A normal finding in all adults","Possible neurological dysfunction in an adult patient","Normal response to plantar stimulation in adults"], a:3},
      {t:"During a respiratory assessment, a nurse hears crackles bilaterally at the lung bases. This finding MOST likely indicates:", o:["Normal vesicular breath sounds","Fluid accumulation or consolidation in the lung bases","Normal bronchial breath sounds","Clear bilateral air entry"], a:1},

      {t:"A nurse assesses a patient recovering from abdominal surgery and notes hypoactive bowel sounds. Which nursing action is MOST appropriate?", o:["Administer an enema immediately","Document findings and encourage ambulation and oral fluids as appropriate to stimulate peristalsis","Perform deep palpation of the abdomen to stimulate bowel sounds","Administer a laxative without a prescription"], a:1},

      {t:"During a musculoskeletal assessment, the nurse notes asymmetrical hand grip strength with weakness on the left side. This finding should prompt further assessment of which system?", o:["Renal system for fluid imbalance","Gastrointestinal system for nutritional deficiency","Nervous system for potential neurological deficit","Integumentary system for skin integrity"], a:2},
      {t:"A psychosocial assessment reveals that a patient expresses hopelessness, loss of control, and difficulty making decisions. Which nursing diagnosis is MOST likely applicable?", o:["Impaired physical mobility","Ineffective coping related to perceived loss of control","Deficient fluid volume","Impaired skin integrity"], a:1},
      {t:"A nurse performs a respiratory assessment and notes that the patient uses accessory muscles during normal breathing at rest. This finding MOST likely indicates:", o:["Normal breathing pattern in an active patient","Mild respiratory distress requiring further evaluation","A normal finding in elderly patients","Optimal lung function with increased respiratory demand"], a:1},
      {t:"During assessment of the gastrointestinal system, a nurse palpates the abdomen and identifies involuntary guarding and rigidity. This finding MOST likely indicates:", o:["Normal abdominal muscle tone","Voluntary tensing due to patient anxiety","Peritoneal irritation or inflammation requiring urgent evaluation","A normal response to light palpation in obese patients"], a:2},
      {t:"Which of the following combinations of findings during an integumentary assessment would MOST concern the nurse?", o:["Warm, pink, intact skin with normal turgor","Pale, cool skin with decreased turgor and non-healing ulcers","Mild dryness of skin in an elderly patient","Small healed scar from a previous surgical procedure"], a:1},
      {t:"A nurse assessing a patient's mental status documents: 'Patient oriented to person only; lethargic; unable to state date or location.' This finding MOST likely indicates:", o:["Normal orientation in a sleeping patient","Mild confusion that requires no intervention","Significant neurological impairment requiring immediate further assessment","Normal variation in orientation for elderly patients"], a:2},
      {t:"A nurse is completing a psychosocial assessment and notes that the patient refuses to participate in decision-making about their care, stating 'Nothing I decide matters anyway.' This MOST likely reflects:", o:["Effective coping with chronic illness","Cultural preference for physician-led decision-making","Hopelessness and loss of control requiring psychosocial intervention","Normal patient behavior in a hospital setting"], a:2},
      {t:"During cardiovascular assessment, a nurse notes that blood pressure in the left arm is significantly lower than in the right arm. This finding MOST appropriately requires:", o:["Documentation as a normal bilateral variation","Immediate notification and further diagnostic evaluation","Reassessment only at the next routine visit","No further action as it is a common finding"], a:1},
      {t:"A nurse auscultates a patient's abdomen in all four quadrants and notes hyperactive bowel sounds with the patient reporting cramping and diarrhea. This presentation is MOST consistent with:", o:["Paralytic ileus","Normal bowel function","Increased intestinal motility associated with diarrhea or gastroenteritis","Absent bowel sounds due to bowel obstruction"], a:2},
      {t:"A patient's respiratory assessment reveals productive cough with green-yellow sputum, use of accessory muscles, and oxygen saturation of 88%. Which is the nurse's PRIORITY action?", o:["Document findings and continue the assessment","Administer oral fluids to thin secretions","Notify the physician immediately and prepare for potential oxygen therapy intervention","Encourage deep breathing exercises without further intervention"], a:2},
      {t:"During integumentary assessment, a nurse notes a stage 3 pressure injury over the sacrum with necrotic tissue. Which additional system assessment is MOST directly relevant to this finding?", o:["Cardiovascular assessment for heart rate and rhythm","Renal assessment for urinary output","Musculoskeletal assessment for joint mobility","Nutritional assessment as part of GI assessment for healing capacity"], a:3},
      {t:"A nurse is assessing a patient and notes strabismus during eye assessment. This finding refers to:", o:["Drooping of one or both eyelids","Involuntary rhythmic eye movements","Misalignment of the eyes where they do not look in the same direction","Protrusion of the eyeball beyond the orbit"], a:2},
      {t:"The correct order of assessment for the gastrointestinal system is Inspection, Auscultation, Percussion, Palpation (IAPP).", o:["True","False"], a:0},
      {t:"Auscultation is performed after palpation and percussion during abdominal assessment to avoid altering bowel sounds.", o:["True","False"], a:1},
      {t:"Normal bowel sounds are smooth clicks and gurgles heard every 5 to 15 seconds.", o:["True","False"], a:0},
      {t:"Bowel sounds occurring once per minute or longer are considered hyperactive.", o:["True","False"], a:1},
      {t:"Tympany on abdominal percussion indicates the presence of air in the abdomen.", o:["True","False"], a:0},
      {t:"Dullness on abdominal percussion indicates a solid organ or free fluid.", o:["True","False"], a:0},
      {t:"Clubbing of the fingers is a normal cardiovascular finding.", o:["True","False"], a:1},
      {t:"Crackles and wheezing are normal lung sounds heard during respiratory auscultation.", o:["True","False"], a:1},
      {t:"A barrel-shaped chest is a normal chest shape finding during respiratory assessment.", o:["True","False"], a:1},
      {t:"Nystagmus refers to involuntary rhythmic eye movements observed during neurological eye assessment.", o:["True","False"], a:0},
      {t:"A positive Babinski's sign in an adult is considered a normal neurological finding.", o:["True","False"], a:1},
      {t:"During cardiovascular assessment, a pulse deficit means the apical pulse rate is higher than the radial pulse rate.", o:["True","False"], a:0},
      {t:"Kyphosis is described as a lateral curvature of the spine.", o:["True","False"], a:1},
      {t:"A psychosocial assessment evaluates a person's mental health, social status, and functional capacity within the community.", o:["True","False"], a:0},
      {t:"Jaundice observed during integumentary assessment is most commonly associated with liver dysfunction.", o:["True","False"], a:0},
      {t:"Nasogastric suction should remain running during abdominal auscultation to maintain accuracy.", o:["True","False"], a:1},
      {t:"During a gastrointestinal assessment in a patient with pain, the painful area should be palpated first.", o:["True","False"], a:1},
      {t:"Hematuria, frothy urine, and oliguria are abnormal findings assessed during renal system evaluation.", o:["True","False"], a:0},
      {t:"Coping-stress tolerance assessment includes evaluating decision-making ability and willingness to comply with health regulations.", o:["True","False"], a:0},
      {t:"Strabismus refers to protrusion of the eyeball beyond the orbit during eye assessment.", o:["True","False"], a:1}

/* ============ ENGINE ============ */
const LETTERS = ['A','B','C','D','E','F'];
let questions, i, correct, wrong, answers, wrongSet, answered;
let totalTime = 50*60, timeLeft, timerInterval;

function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function init(pool) {
  questions = shuffle([...pool]);
  i=0; correct=0; wrong=0; answered=0;
  answers = new Array(questions.length).fill(null);
  wrongSet = [];
  timeLeft = totalTime;
  document.getElementById('totalBadge').textContent = questions.length + ' Questions';
  startTimer(); render();
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    const m = Math.floor(timeLeft/60), s = timeLeft%60;
    document.getElementById('timerTxt').textContent = `${m}:${s<10?'0':''}${s}`;
    const b = document.getElementById('timerBadge');
    if (timeLeft<=120)      b.className='timer-badge danger';
    else if (timeLeft<=300) b.className='timer-badge warn';
    if (timeLeft<=0) { clearInterval(timerInterval); finish(); }
  }, 1000);
}

function updateTop() {
  const total = questions.length;
  document.getElementById('sCorrect').textContent = correct;
  document.getElementById('sWrong').textContent   = wrong;
  document.getElementById('sRemain').textContent  = Math.round(((total-answered)/total)*100)+'%';
  document.getElementById('progLabel').textContent = 'Q '+(i+1)+' / '+total;
  document.getElementById('progFill').style.width  = ((i+1)/total*100)+'%';
  document.getElementById('prog-bar').style.width  = ((i+1)/total*100)+'%';
}

function render() {
  updateTop();
  const q = questions[i];
  document.getElementById('app').innerHTML = `
    <div class="q-card">
      <div class="q-header"><div class="q-num">Question ${i+1} / ${questions.length}</div></div>
      <div class="q-text">${q.t}</div>
      <div class="options">
        ${q.o.map((o,idx)=>`
          <div class="opt" id="opt${idx}" onclick="choose(${idx})">
            <div class="opt-letter">${LETTERS[idx]}</div>
            ${o}
          </div>`).join('')}
      </div>
      <div class="nav-btns">
        <button class="btn btn-skip" onclick="skip()"><i class="fa-solid fa-forward"></i> Skip</button>
      </div>
    </div>`;
}

function choose(v) {
  if (answers[i]!==null) return;
  answers[i]=v; answered++;
  const q=questions[i], ok=v===q.a;
  ok?correct++:wrong++;
  updateTop();
  q.o.forEach((_,idx)=>{
    const el=document.getElementById('opt'+idx);
    el.classList.add('disabled');
    if (idx===q.a) el.classList.add('correct');
    else if (idx===v) el.classList.add('wrong');
  });
  const fb=document.createElement('div');
  fb.className='feedback-bar '+(ok?'ok':'no');
  fb.innerHTML=ok
    ?`<span class="feedback-icon">🎉</span><span>Correct! Well done.</span>`
    :`<span class="feedback-icon">💡</span><span>Correct answer: <b>${q.o[q.a]}</b></span>`;
  const card=document.querySelector('.q-card');
  card.querySelector('.options').after(fb);
  if (q.exp) {
    const exp=document.createElement('div');
    exp.className='explanation';
    exp.innerHTML='<b>💬 Explanation:</b> '+q.exp;
    fb.after(exp);
  }
  card.querySelector('.nav-btns').innerHTML=`
    <button class="btn btn-next" onclick="next()">
      ${i<questions.length-1
        ?'<i class="fa-solid fa-arrow-right"></i> Next Question'
        :'<i class="fa-solid fa-flag-checkered"></i> Finish Exam'}
    </button>`;
}

function skip() {
  if (answers[i]===null) { answers[i]=-1; answered++; wrong++; wrongSet.push(questions[i]); updateTop(); }
  next();
}

function next() {
  if (i<questions.length-1) { i++; render(); window.scrollTo({top:0,behavior:'smooth'}); }
  else finish();
}

function finish() {
  clearInterval(timerInterval);
  const total=questions.length;
  const score=Math.round((correct/total)*100);
  questions.forEach((q,idx)=>{ if(answers[idx]!==q.a) wrongSet.push({...q,myAns:answers[idx]}); });
  wrongSet=[...new Map(wrongSet.map(q=>[q.t,q])).values()];
  let grade,gc;
  if(score>=90)      { grade='🥇 Excellent';      gc='var(--success)'; }
  else if(score>=75) { grade='🥈 Very Good';       gc='var(--accent)'; }
  else if(score>=60) { grade='🥉 Good';            gc='var(--warn)'; }
  else               { grade='📚 Needs Review';    gc='var(--danger)'; }
  const circ=2*Math.PI*45, offset=circ-(score/100)*circ;
  const report=questions.map((q,idx)=>{
    const ok=answers[idx]===q.a;
    return `<div class="report-item ${ok?'ok':'no'}">
      <div class="ri-q">${ok?'✅':'❌'} ${q.t}</div>
      ${!ok?`
        <div class="ri-row"><span class="ri-badge ri-yours">Your Answer</span>${answers[idx]>=0?q.o[answers[idx]]:'Skipped'}</div>
        <div class="ri-row"><span class="ri-badge ri-right">Correct</span>${q.o[q.a]}</div>
      `:''}
    </div>`;
  }).join('');
  document.getElementById('prog-bar').style.width='100%';
  document.getElementById('app').innerHTML=`
    <div class="result-hero">
      <div class="score-ring">
        <svg viewBox="0 0 110 110">
          <circle class="ring-bg"   cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="0"/>
          <circle class="ring-fill" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            style="stroke:${gc}" id="ringFill"/>
        </svg>
        <div class="score-num">${score}</div>
        <div class="score-pct">%</div>
      </div>
      <div class="result-grade" style="color:${gc}">${grade}</div>
      <div class="result-sub">Answered ${answered} of ${total} questions</div>
      <div class="result-stats">
        <div class="rs"><div class="n" style="color:var(--success)">${correct}</div><div class="l">Correct</div></div>
        <div class="rs"><div class="n" style="color:var(--danger)">${wrong}</div><div class="l">Wrong</div></div>
        <div class="rs"><div class="n" style="color:var(--accent)">${total-answered<0?0:total-answered}</div><div class="l">Skipped</div></div>
      </div>
    </div>
    <div class="result-actions">
      ${wrongSet.length?`<button class="btn btn-retry" onclick="retryWrong()"><i class="fa-solid fa-rotate-right"></i> Retry Wrong (${wrongSet.length})</button>`:''}
      <button class="btn btn-home" onclick="init(QUESTIONS)"><i class="fa-solid fa-shuffle"></i> New Random Exam</button>
      <a href="index.html" class="btn btn-home" style="text-decoration:none;"><i class="fa-solid fa-house"></i> Back to Subject</a>
    </div>
    <div style="margin-top:24px">
      <div style="font-size:14px;font-weight:700;margin-bottom:10px;color:var(--text2);">📋 Detailed Report</div>
      ${report}
    </div>`;
  setTimeout(()=>{document.getElementById('ringFill').style.strokeDashoffset=offset;},100);
  window.scrollTo({top:0,behavior:'smooth'});
}

function retryWrong() {
  const pool=[...wrongSet];
  questions=shuffle(pool); i=0; correct=0; wrong=0;
  answers=new Array(questions.length).fill(null);
  wrongSet=[]; answered=0; timeLeft=totalTime;
  startTimer(); render();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* THEME */
const themeBtn=document.getElementById('themeBtn');
let theme=localStorage.getItem('theme')||'light';
function applyTheme(t) {
  theme=t;
  document.documentElement.setAttribute('data-theme',t==='dark'?'dark':'');
  themeBtn.textContent=t==='dark'?'☀️':'🌙';
  localStorage.setItem('theme',t);
}
applyTheme(theme);
themeBtn.addEventListener('click',()=>applyTheme(theme==='dark'?'light':'dark'));

init(QUESTIONS);
</script>
</body>
