<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Assessment — Exam | GAITH TEAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent:             #0891b2;
  --accent-light:       #06b6d4;
  --accent-dark:        #0e7490;
  --accent-glow:        rgba(8,145,178,0.14);
  --accent-glow-strong: rgba(8,145,178,0.28);
  --bg:      #f8fafc;
  --bg2:     #eef2f7;
  --card:    #ffffff;
  --text:    #1a2332;
  --text2:   #4a5568;
  --text3:   #718096;
  --border:       rgba(8,145,178,0.18);
  --border-card:  rgba(0,0,0,0.07);
  --shadow:       0 4px 20px rgba(0,0,0,0.07);
  --shadow-hover: 0 8px 32px rgba(8,145,178,0.22);
  --success: #16a34a;
  --danger:  #dc2626;
  --warn:    #d97706;
  --radius: 16px;
  --tr: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg:   #0d1117; --bg2: #161b22; --card: #1c2333;
  --text: #e6edf3; --text2: #b1bac4; --text3: #7d8590;
  --border:      rgba(6,182,212,0.22);
  --border-card: rgba(6,182,212,0.10);
  --shadow:       0 4px 20px rgba(0,0,0,0.4);
  --shadow-hover: 0 8px 36px rgba(8,145,178,0.28);
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
  transition: background .4s, color .4s;
  direction: ltr;
}

#prog-bar {
  position: fixed; top: 0; left: 0; height: 3px; z-index: 999;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  width: 0%; transition: width .15s;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 64px;
  background: rgba(248,250,252,.93); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-card); transition: var(--tr);
}
[data-theme="dark"] nav { background: rgba(13,17,23,.95); }

.nav-back {
  display: flex; align-items: center; gap: 7px;
  color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 600;
  padding: 7px 13px; border-radius: 8px;
  border: 1px solid var(--border-card); background: var(--card);
  transition: var(--tr);
}
.nav-back:hover { color: var(--accent); border-color: var(--border); }
.nav-brand { display: flex; align-items: center; gap: 9px; font-size: 15px; font-weight: 900; color: var(--text); }
.nav-logo-icon {
  width: 34px; height: 34px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 900;
}
.nav-right { display: flex; align-items: center; gap: 8px; }
.theme-btn {
  width: 38px; height: 38px; border-radius: 50%;
  border: 1px solid var(--border-card); background: var(--card);
  cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center; transition: var(--tr);
}
.theme-btn:hover { border-color: var(--accent); transform: rotate(20deg); }

/* HERO BAND */
.hero-band {
  margin-top: 64px;
  background: linear-gradient(135deg, var(--accent-dark), var(--accent), var(--accent-light));
  padding: 36px 24px 32px; text-align: center;
  position: relative; overflow: hidden;
}
.hero-band::before {
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse 600px 200px at 50% 100%, rgba(255,255,255,.12) 0%, transparent 70%);
}
.hero-band-icon {
  width: 64px; height: 64px; border-radius: 18px;
  background: rgba(255,255,255,.2); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; margin: 0 auto 12px;
  border: 1.5px solid rgba(255,255,255,.35);
}
.hero-band h1 { font-size: clamp(18px,3.5vw,26px); font-weight: 900; color:#fff; margin-bottom:4px; }
.hero-band p { font-size:13px; color:rgba(255,255,255,.8); }
.hero-meta {
  display:flex; justify-content:center; gap:16px; margin-top:16px; flex-wrap:wrap;
}
.meta-pill {
  background: rgba(255,255,255,.18); backdrop-filter:blur(6px);
  border: 1px solid rgba(255,255,255,.3); border-radius:50px;
  padding:5px 14px; font-size:12px; font-weight:700; color:#fff;
  display:flex; align-items:center; gap:5px;
}

/* SHELL */
.shell { max-width:560px; margin:0 auto; padding:20px 18px 80px; }

/* STATS */
.stats-row {
  display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:14px;
}
.stat-box {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:var(--radius); padding:12px 8px; text-align:center;
}
.stat-box .val { font-size:20px; font-weight:900; }
.stat-box .lbl { font-size:11px; color:var(--text3); margin-top:2px; }
.c-green { color:var(--success); }
.c-red   { color:var(--danger); }
.c-blue  { color:var(--accent); }

/* PROGRESS STRIP */
.prog-strip {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:var(--radius); padding:13px 16px; margin-bottom:16px;
  display:flex; align-items:center; gap:12px;
}
.prog-label { font-size:13px; font-weight:700; color:var(--text2); white-space:nowrap; }
.prog-track { flex:1; height:7px; background:var(--bg2); border-radius:7px; overflow:hidden; }
.prog-fill {
  height:100%; width:0%;
  background:linear-gradient(90deg, var(--accent), var(--accent-light));
  border-radius:7px; transition:width .4s;
}
.timer-badge {
  min-width:60px; height:34px; border-radius:17px;
  background:var(--bg2); border:1px solid var(--border-card);
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:900; color:var(--text);
  gap:4px; padding:0 10px; flex-shrink:0;
}
.timer-badge.warn   { color:var(--warn);    border-color:rgba(217,119,6,.3);  background:rgba(217,119,6,.08); }
.timer-badge.danger { color:var(--danger);  border-color:rgba(220,38,38,.3);  background:rgba(220,38,38,.08); animation:blink .8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.5} }

/* QUESTION CARD */
.q-card {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:20px; overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,.05);
}
.q-header {
  background:linear-gradient(135deg, var(--accent-dark), var(--accent));
  padding:10px 18px;
  display:flex; align-items:center; gap:8px;
}
.q-num {
  background:rgba(255,255,255,.22); border-radius:7px;
  padding:3px 10px; font-size:11px; font-weight:700; color:#fff;
}
.q-text {
  padding:20px 18px 14px; font-size:15px; font-weight:700; color:var(--text);
  line-height:1.65; border-bottom:1px solid var(--border-card);
  direction:ltr; text-align:left;
}
.options { padding:14px 18px 18px; display:flex; flex-direction:column; gap:10px; }

.opt {
  display:flex; align-items:center; gap:12px;
  padding:13px 15px; border-radius:12px;
  border:1.5px solid var(--border-card); background:var(--bg);
  cursor:pointer; font-size:14px; font-weight:600; color:var(--text);
  transition:var(--tr); user-select:none;
  direction:ltr; text-align:left;
}
.opt:hover:not(.disabled) {
  border-color:var(--accent); background:var(--accent-glow);
  transform:translateX(3px);
}
.opt-letter {
  width:28px; height:28px; border-radius:8px; flex-shrink:0;
  background:var(--bg2); border:1px solid var(--border-card);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:900; color:var(--text3);
  transition:var(--tr);
}
.opt.correct { border-color:var(--success); background:rgba(22,163,74,.08); }
.opt.correct .opt-letter { background:var(--success); color:#fff; border-color:var(--success); }
.opt.wrong   { border-color:var(--danger);  background:rgba(220,38,38,.07); }
.opt.wrong   .opt-letter { background:var(--danger);  color:#fff; border-color:var(--danger); }
.opt.disabled { pointer-events:none; }

/* FEEDBACK */
.feedback-bar {
  margin:12px 18px; padding:12px 15px; border-radius:12px;
  display:flex; align-items:center; gap:10px;
  font-size:14px; font-weight:700;
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
.feedback-bar.ok { background:rgba(22,163,74,.1); color:var(--success); border:1px solid rgba(22,163,74,.25); }
.feedback-bar.no { background:rgba(220,38,38,.08); color:var(--danger); border:1px solid rgba(220,38,38,.2); }
.feedback-icon { font-size:18px; }

.explanation {
  margin:0 18px 12px; padding:11px 14px;
  background:rgba(8,145,178,.06); border-radius:10px;
  border-left:3px solid var(--accent);
  font-size:13px; color:var(--text2); line-height:1.6;
  direction:ltr; text-align:left;
}

/* BUTTONS */
.nav-btns { padding:4px 18px 18px; display:flex; gap:10px; }
.btn {
  flex:1; padding:13px; border:none; border-radius:12px;
  font-size:14px; font-weight:900; cursor:pointer;
  font-family:'Outfit',sans-serif; transition:var(--tr);
  display:flex; align-items:center; justify-content:center; gap:7px;
}
.btn-next {
  background:linear-gradient(135deg, var(--accent-dark), var(--accent));
  color:#fff; box-shadow:0 4px 14px var(--accent-glow);
}
.btn-next:hover { transform:translateY(-2px); box-shadow:0 6px 20px var(--accent-glow); }
.btn-skip {
  background:var(--bg2); color:var(--text2);
  border:1px solid var(--border-card); flex:0 0 auto; padding:13px 16px;
}
.btn-skip:hover { border-color:var(--warn); color:var(--warn); }

/* RESULTS */
.result-hero {
  text-align:center; padding:32px 20px 24px;
  background:var(--card); border-radius:20px;
  border:1px solid var(--border-card); margin-bottom:18px;
}
.score-ring {
  width:110px; height:110px; border-radius:50%; margin:0 auto 16px;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; position:relative;
}
.score-ring svg { position:absolute; inset:-5px; width:calc(100% + 10px); height:calc(100% + 10px); transform:rotate(-90deg); }
.score-ring circle { fill:none; stroke-width:5; stroke-linecap:round; }
.ring-bg   { stroke:var(--bg2); }
.ring-fill { stroke:var(--accent); transition:stroke-dashoffset 1s ease; }
.score-num { font-size:28px; font-weight:900; color:var(--text); }
.score-pct { font-size:12px; color:var(--text3); }
.result-grade { font-size:20px; font-weight:900; margin-bottom:5px; }
.result-sub   { font-size:14px; color:var(--text2); }
.result-stats {
  display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:18px;
}
.rs { background:var(--bg2); border-radius:10px; padding:11px 8px; text-align:center; }
.rs .n { font-size:20px; font-weight:900; }
.rs .l { font-size:11px; color:var(--text3); }

/* REPORT */
.report-item {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:13px; padding:15px; margin-bottom:9px;
  border-left:4px solid var(--border-card);
  direction:ltr; text-align:left;
}
.report-item.ok { border-left-color:var(--success); }
.report-item.no { border-left-color:var(--danger); }
.report-item .ri-q  { font-size:13px; font-weight:700; margin-bottom:7px; }
.report-item .ri-row { display:flex; align-items:center; gap:8px; font-size:12px; margin-top:4px; color:var(--text2); }
.ri-badge { padding:2px 8px; border-radius:6px; font-weight:700; font-size:11px; flex-shrink:0; }
.ri-yours { background:rgba(220,38,38,.1); color:var(--danger); }
.ri-right { background:rgba(22,163,74,.1);  color:var(--success); }

.result-actions { display:flex; flex-direction:column; gap:10px; margin-top:18px; }
.btn-retry { background:linear-gradient(135deg,var(--accent-dark),var(--accent)); color:#fff; }
.btn-retry:hover { transform:translateY(-2px); box-shadow:0 6px 20px var(--accent-glow); }
.btn-home  { background:var(--bg2); color:var(--text); border:1px solid var(--border-card); }
.btn-home:hover { border-color:var(--accent); color:var(--accent); }

/* FOOTER */
footer {
  background:var(--bg2); border-top:1px solid var(--border-card);
  padding:22px 24px;
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:10px;
}
.footer-brand { font-size:14px; font-weight:700; }
.footer-brand span { color:var(--accent); }
.footer-tg {
  display:flex; align-items:center; gap:5px;
  text-decoration:none; color:#229ED9; font-size:12px; font-weight:600;
}

@media (max-width:480px) {
  nav { padding:0 14px; }
  .shell { padding:14px 12px 60px; }
  .nav-brand span { display:none; }
}
</style>
</head>

<script>
const QUESTIONS = [
 {t:"Health assessment is considered which step in the nursing process?", o:["Planning","Assessment","Implementation","Evaluation"], a:1},
      {t:"Which statement best defines health assessment?", o:["A one-time review of lab results","A physician-only diagnostic procedure","A dynamic and continuous process of collecting, verifying, and organizing data about a client","A treatment plan developed after discharge"], a:2},
      {t:"The two basic components of health assessment are:", o:["Taking history and physical examination","Medication administration and counseling","Diagnosis and surgery","Planning and evaluation"], a:0},
      {t:"Which of the following is NOT one of the six aspects of holistic assessment listed in the text?", o:["Physical","Psychological","Spiritual","Financial"], a:3},
      {t:"The primary source of health assessment data is usually the:", o:["Client's family","Patient","Medical record","Laboratory report"], a:1},
      {t:"If a patient is unconscious or severely ill, the nurse should mainly obtain additional data from:", o:["Only laboratory values","The internet","Secondary sources such as family and records","Other patients in the ward"], a:2},
      {t:"Which of the following is an example of subjective data?", o:["I feel dizzy.","Blood pressure 90/60 mmHg","Pulse 110/min","Redness around a wound"], a:0},
      {t:"Which of the following is objective data?", o:["I am too fat.","My bladder never seems empty.","I feel short of breath.","Voids 100-150 mL every 1-2 hours"], a:3},
      {t:"One major importance of health assessment is to:", o:["Guarantee cure of disease","Replace all medical tests","Provide a baseline for planning care","Eliminate the need for documentation"], a:2},
      {t:"An initial comprehensive assessment is also known as an:", o:["Admission assessment","Emergency assessment","Problem-focused assessment","Discharge assessment"], a:0},
      {t:"A problem-focused assessment is performed primarily to:", o:["Collect data on all body systems in detail","Assess a previously identified problem","Replace the initial assessment","Assess only spiritual needs"], a:1},
      {t:"In an emergency assessment, the nurse's highest priority is:", o:["Completing the full history form","Teaching the family","Documenting cultural preferences first","Preservation of life"], a:3},
      {t:"Emergency assessment commonly focuses first on:", o:["Nutrition, elimination, sleep","Pain, anxiety, mobility","Airway, breathing, and circulation","Culture, values, and beliefs"], a:2},
      {t:"Time-lapsed or ongoing assessment is usually done:", o:["After the initial assessment to detect changes in health status","Only at the time of admission","Only in community clinics","Before any nursing diagnosis is considered"], a:0},
      {t:"Which of the following is listed as a place of health assessment?", o:["Operating theatre only","Hospital","Pharmacy store","Radiology unit only"], a:1},
      {t:"Who is primarily responsible for the patient's nursing assessment?", o:["The receptionist","The laboratory technician","The primary nurse","The hospital manager"], a:2},
      {t:"Holistic health assessment differs from a purely physical assessment because it also addresses:", o:["Only laboratory findings","Only environmental sanitation","Only medication adherence","Mental and spiritual health, among other dimensions"], a:3},
      {t:"Assessments of healthy persons to maintain health and prevent disease are part of:", o:["Primary prevention","Secondary prevention","Tertiary prevention","Rehabilitation only"], a:0},
      {t:"Health assessment in acute illness aimed at early diagnosis and treatment is associated with:", o:["Primary prevention","Secondary prevention","Tertiary prevention","Palliative care only"], a:1},
      {t:"Health assessment in chronic illness that aims to prevent complications is part of:", o:["Health screening only","Primary prevention","Tertiary prevention","No level of prevention"], a:2},
      {t:"According to the text, individuals under 35 years of age should generally have a health evaluation every:", o:["1 year","2-3 years","Monthly","4-5 years"], a:3},
      {t:"Individuals aged 35-45 years should usually be evaluated every:", o:["2-3 years","4-5 years","Yearly","Monthly"], a:0},
      {t:"Individuals 45-55 years of age should generally undergo a thorough medical check-up:", o:["Every 4-5 years","Each year","Every 2-3 years","Only when symptomatic"], a:1},
      {t:"People over 55 years old may need a check-up:", o:["Only every 5 years","Every 2-3 years","Monthly","Only after hospitalization"], a:2},
      {t:"Which documentation quality is NOT consistent with health assessment principles?", o:["Objective","Specific","Up-to-date","Vague"], a:3},
      {t:"According to health assessment principles, collected information should be:", o:["Shared with other healthcare professionals as needed","Kept only in the nurse's memory","Given only to the patient's neighbors","Used only after discharge"], a:0},
      {t:"A basic principle of health assessment is that client confidentiality must be:", o:["Ignored during teaching rounds","Maintained","Shared publicly for learning","Left to family decision only"], a:1},
      {t:"Which of the following is NOT a constituent of nursing assessment?", o:["Nursing history","Physical examination","Prescribing surgery","Analysis of collected data"], a:2},
      {t:"In a comprehensive assessment, subjective data are most commonly obtained from the:", o:["X-ray report","ECG tracing","Medication chart","Health history and body system review"], a:3},
      {t:"A mentally healthy individual is described in the text as being:", o:["Well-oriented to person, place, and time","Disoriented but cooperative","Unable to maintain eye contact","Frequently unconscious"], a:0},
      {t:"Which speech finding is consistent with a healthy individual?", o:["Slurred and hesitant speech","Clear and appropriate speech","Inability to select words","Aphasia"], a:1},
      {t:"Which finding suggests a healthy heart according to the text?", o:["Apical pulse 50/min and irregular","Presence of extra heart sounds","Apical pulse 72-76/min and regular","Visible abnormal pulsations"], a:2},
      {t:"Which abdominal finding is considered normal in the text?", o:["Rigid and tender abdomen","Silent bowel sounds","Distended hard abdomen","Round, soft abdomen with normal audible bowel sounds"], a:3},
      {t:"A normal neck finding in a healthy individual is:", o:["Symmetrical with smooth controlled movement","Fixed with painful movement","Markedly swollen on one side","Bent posture with rigidity"], a:0},
      {t:"Which oral finding best indicates health?", o:["Bleeding inflamed gums","28-32 shiny white teeth without dental caries","Dry cracked lips and ulcers","Discolored buccal mucosa"], a:1},
      {t:"Healthy lower extremities are described as:", o:["Cold with severe muscle wasting","Asymmetrical with tenderness","Symmetrical without edema or inflammation","Edematous after minimal activity"], a:2},
      {t:"Which is a social characteristic of a healthy individual?", o:["Avoids all community involvement","Rejects social change","Lives in total isolation","Maintains good relations and is socially active"], a:3},
      {t:"A spiritually and culturally healthy individual should:", o:["Respect other people's religions and beliefs","Accept only personal beliefs as valid","Avoid any cultural interaction","Separate spirituality from health entirely"], a:0},
      {t:"Previous knowledge from multiple data sources helps the nurse do all EXCEPT:", o:["Prioritize data","Ignore the need for clarification","Differentiate relevant from irrelevant data","Organize data systematically"], a:1},
      {t:"Which of the following is one component of health assessment?", o:["Financial audit","Diet prescription","Review of lab and diagnostic test results","Surgical consent only"], a:2},
      {t:"Records and reports are considered:", o:["A barrier to assessment","A replacement for physical examination","Unrelated to nursing care","A component of health assessment"], a:3},
      {t:"Using a methodical strategy, consistent practice, and feedback on completed evaluations leads to:", o:["Expertise in patient assessment","Less need for nursing education","Automatic medical diagnosis","Elimination of documentation"], a:0},
      {t:"Health assessment is essential for planning, implementation, evaluation, and:", o:["Replacing all treatments","Taking related decisions about health and community services","Avoiding communication with the team","Limiting patient participation"], a:1},
      {t:"The first step in the nursing care cycle is:", o:["Intervention","Evaluation","Health assessment","Discharge planning"], a:2},
      {t:"Most physical characteristics of health can be measured by:", o:["A spiritual interview only","Social role analysis only","Laboratory testing only","Head-to-toe assessment"], a:3},
      {t:"A patient states, 'My bladder never seems empty.' Which finding best supports this complaint?", o:["Voids 100-150 mL per void every 1-2 hours","Normal urine output every 6 hours","Blood pressure 120/80 mmHg","Dry intact skin"], a:0},
      {t:"Correlating subjective and objective data means the nurse should:", o:["Document only what the patient says","Confirm patient-reported symptoms with measurable findings","Ignore inconsistent information","Use secondary sources only"], a:1},
      {t:"When the patient cannot provide allergy and medication information, an appropriate secondary source is the:", o:["Hospital cleaner","Another patient","Family or significant others","Pharmacy advertisement"], a:2},
      {t:"One benefit of collecting data from different sources is that it helps the nurse:", o:["Avoid documentation","Make assumptions without evidence","Reduce communication with the team","Identify data that need confirmation or clarification"], a:3},
      {t:"Which statement best reflects holistic health assessment?", o:["It considers physical, psychological, social, developmental, spiritual, and cultural dimensions","It focuses only on physical signs and symptoms","It is limited to laboratory and diagnostic tests","It excludes mental and spiritual health"], a:0},
      {t:"Health assessment is the first step in the nursing process.", o:["True","False"], a:0},
      {t:"Holistic assessment focuses only on physical well-being.", o:["True","False"], a:1},
      {t:"The patient is usually the primary source of assessment data.", o:["True","False"], a:0},
      {t:"Subjective data are always directly measurable and verifiable.", o:["True","False"], a:1},
      {t:"Emergency assessment prioritizes airway, breathing, and circulation.", o:["True","False"], a:0},
      {t:"A problem-focused assessment is broader than an initial comprehensive assessment.", o:["True","False"], a:1},
      {t:"Client confidentiality should be maintained during health assessment.", o:["True","False"], a:0},
      {t:"Individuals under 35 years should have a thorough health evaluation every year according to the text.", o:["True","False"], a:1},
      {t:"Review of lab and diagnostic test results is part of health assessment.", o:["True","False"], a:0},
      {t:"An initial assessment is commonly performed when the client enters the health care agency.", o:["True","False"], a:0},
      {t:"Ongoing assessment is performed only before the initial assessment.", o:["True","False"], a:1},
      {t:"Edema in the lower extremities is described as a normal healthy finding in the text.", o:["True","False"], a:1},
      {t:"Health assessment of healthy people supports primary prevention.", o:["True","False"], a:0},
      {t:"Assessment of acute illness helps with secondary prevention.", o:["True","False"], a:0},
      {t:"Assessment of chronic illness is linked to tertiary prevention.", o:["True","False"], a:0},
      {t:"Objective data include statements such as 'I feel dizzy.'", o:["True","False"], a:1},
      {t:"Family members can serve as secondary sources of assessment data.", o:["True","False"], a:0},
      {t:"Good documentation should be vague and nonspecific.", o:["True","False"], a:1},
      {t:"Information collected during assessment should never be shared with other healthcare professionals.", o:["True","False"], a:1},
];

/* ============ ENGINE ============ */
const LETTERS = ['A','B','C','D','E','F'];
let questions, i, correct, wrong, answers, wrongSet, answered;
let totalTime = 50*60, timeLeft, timerInterval;

function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function init(pool) {
  questions = shuffle([...pool]);
  i=0; correct=0; wrong=0; answered=0;
  answers = new Array(questions.length).fill(null);
  wrongSet = [];
  timeLeft = totalTime;
  document.getElementById('totalBadge').textContent = questions.length + ' Questions';
  startTimer(); render();
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    const m = Math.floor(timeLeft/60), s = timeLeft%60;
    document.getElementById('timerTxt').textContent = `${m}:${s<10?'0':''}${s}`;
    const b = document.getElementById('timerBadge');
    if (timeLeft<=120)      b.className='timer-badge danger';
    else if (timeLeft<=300) b.className='timer-badge warn';
    if (timeLeft<=0) { clearInterval(timerInterval); finish(); }
  }, 1000);
}

function updateTop() {
  const total = questions.length;
  document.getElementById('sCorrect').textContent = correct;
  document.getElementById('sWrong').textContent   = wrong;
  document.getElementById('sRemain').textContent  = Math.round(((total-answered)/total)*100)+'%';
  document.getElementById('progLabel').textContent = 'Q '+(i+1)+' / '+total;
  document.getElementById('progFill').style.width  = ((i+1)/total*100)+'%';
  document.getElementById('prog-bar').style.width  = ((i+1)/total*100)+'%';
}

function render() {
  updateTop();
  const q = questions[i];
  document.getElementById('app').innerHTML = `
    <div class="q-card">
      <div class="q-header"><div class="q-num">Question ${i+1} / ${questions.length}</div></div>
      <div class="q-text">${q.t}</div>
      <div class="options">
        ${q.o.map((o,idx)=>`
          <div class="opt" id="opt${idx}" onclick="choose(${idx})">
            <div class="opt-letter">${LETTERS[idx]}</div>
            ${o}
          </div>`).join('')}
      </div>
      <div class="nav-btns">
        <button class="btn btn-skip" onclick="skip()"><i class="fa-solid fa-forward"></i> Skip</button>
      </div>
    </div>`;
}

function choose(v) {
  if (answers[i]!==null) return;
  answers[i]=v; answered++;
  const q=questions[i], ok=v===q.a;
  ok?correct++:wrong++;
  updateTop();
  q.o.forEach((_,idx)=>{
    const el=document.getElementById('opt'+idx);
    el.classList.add('disabled');
    if (idx===q.a) el.classList.add('correct');
    else if (idx===v) el.classList.add('wrong');
  });
  const fb=document.createElement('div');
  fb.className='feedback-bar '+(ok?'ok':'no');
  fb.innerHTML=ok
    ?`<span class="feedback-icon">🎉</span><span>Correct! Well done.</span>`
    :`<span class="feedback-icon">💡</span><span>Correct answer: <b>${q.o[q.a]}</b></span>`;
  const card=document.querySelector('.q-card');
  card.querySelector('.options').after(fb);
  if (q.exp) {
    const exp=document.createElement('div');
    exp.className='explanation';
    exp.innerHTML='<b>💬 Explanation:</b> '+q.exp;
    fb.after(exp);
  }
  card.querySelector('.nav-btns').innerHTML=`
    <button class="btn btn-next" onclick="next()">
      ${i<questions.length-1
        ?'<i class="fa-solid fa-arrow-right"></i> Next Question'
        :'<i class="fa-solid fa-flag-checkered"></i> Finish Exam'}
    </button>`;
}

function skip() {
  if (answers[i]===null) { answers[i]=-1; answered++; wrong++; wrongSet.push(questions[i]); updateTop(); }
  next();
}

function next() {
  if (i<questions.length-1) { i++; render(); window.scrollTo({top:0,behavior:'smooth'}); }
  else finish();
}

function finish() {
  clearInterval(timerInterval);
  const total=questions.length;
  const score=Math.round((correct/total)*100);
  questions.forEach((q,idx)=>{ if(answers[idx]!==q.a) wrongSet.push({...q,myAns:answers[idx]}); });
  wrongSet=[...new Map(wrongSet.map(q=>[q.t,q])).values()];
  let grade,gc;
  if(score>=90)      { grade='🥇 Excellent';      gc='var(--success)'; }
  else if(score>=75) { grade='🥈 Very Good';       gc='var(--accent)'; }
  else if(score>=60) { grade='🥉 Good';            gc='var(--warn)'; }
  else               { grade='📚 Needs Review';    gc='var(--danger)'; }
  const circ=2*Math.PI*45, offset=circ-(score/100)*circ;
  const report=questions.map((q,idx)=>{
    const ok=answers[idx]===q.a;
    return `<div class="report-item ${ok?'ok':'no'}">
      <div class="ri-q">${ok?'✅':'❌'} ${q.t}</div>
      ${!ok?`
        <div class="ri-row"><span class="ri-badge ri-yours">Your Answer</span>${answers[idx]>=0?q.o[answers[idx]]:'Skipped'}</div>
        <div class="ri-row"><span class="ri-badge ri-right">Correct</span>${q.o[q.a]}</div>
      `:''}
    </div>`;
  }).join('');
  document.getElementById('prog-bar').style.width='100%';
  document.getElementById('app').innerHTML=`
    <div class="result-hero">
      <div class="score-ring">
        <svg viewBox="0 0 110 110">
          <circle class="ring-bg"   cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="0"/>
          <circle class="ring-fill" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            style="stroke:${gc}" id="ringFill"/>
        </svg>
        <div class="score-num">${score}</div>
        <div class="score-pct">%</div>
      </div>
      <div class="result-grade" style="color:${gc}">${grade}</div>
      <div class="result-sub">Answered ${answered} of ${total} questions</div>
      <div class="result-stats">
        <div class="rs"><div class="n" style="color:var(--success)">${correct}</div><div class="l">Correct</div></div>
        <div class="rs"><div class="n" style="color:var(--danger)">${wrong}</div><div class="l">Wrong</div></div>
        <div class="rs"><div class="n" style="color:var(--accent)">${total-answered<0?0:total-answered}</div><div class="l">Skipped</div></div>
      </div>
    </div>
    <div class="result-actions">
      ${wrongSet.length?`<button class="btn btn-retry" onclick="retryWrong()"><i class="fa-solid fa-rotate-right"></i> Retry Wrong (${wrongSet.length})</button>`:''}
      <button class="btn btn-home" onclick="init(QUESTIONS)"><i class="fa-solid fa-shuffle"></i> New Random Exam</button>
      <a href="index.html" class="btn btn-home" style="text-decoration:none;"><i class="fa-solid fa-house"></i> Back to Subject</a>
    </div>
    <div style="margin-top:24px">
      <div style="font-size:14px;font-weight:700;margin-bottom:10px;color:var(--text2);">📋 Detailed Report</div>
      ${report}
    </div>`;
  setTimeout(()=>{document.getElementById('ringFill').style.strokeDashoffset=offset;},100);
  window.scrollTo({top:0,behavior:'smooth'});
}

function retryWrong() {
  const pool=[...wrongSet];
  questions=shuffle(pool); i=0; correct=0; wrong=0;
  answers=new Array(questions.length).fill(null);
  wrongSet=[]; answered=0; timeLeft=totalTime;
  startTimer(); render();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* THEME */
const themeBtn=document.getElementById('themeBtn');
let theme=localStorage.getItem('theme')||'light';
function applyTheme(t) {
  theme=t;
  document.documentElement.setAttribute('data-theme',t==='dark'?'dark':'');
  themeBtn.textContent=t==='dark'?'☀️':'🌙';
  localStorage.setItem('theme',t);
}
applyTheme(theme);
themeBtn.addEventListener('click',()=>applyTheme(theme==='dark'?'light':'dark'));

init(QUESTIONS);
</script>
