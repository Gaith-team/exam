<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHAITH TEAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent:             #10b981;
  --accent-light:       #34d399;
  --accent-dark:        #059669;
  --accent-glow:        rgba(16,185,129,0.14);
  --accent-glow-strong: rgba(16,185,129,0.28);
  --bg:      #f8fafc;
  --bg2:     #eef2f7;
  --card:    #ffffff;
  --text:    #1a2332;
  --text2:   #4a5568;
  --text3:   #718096;
  --border:       rgba(16,185,129,0.18);
  --border-card:  rgba(0,0,0,0.07);
  --shadow:       0 4px 20px rgba(0,0,0,0.07);
  --shadow-hover: 0 8px 32px rgba(16,185,129,0.22);
  --success: #16a34a;
  --danger:  #dc2626;
  --warn:    #d97706;
  --radius: 16px;
  --tr: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg:   #0d1117; --bg2: #161b22; --card: #1c2333;
  --text: #e6edf3; --text2: #b1bac4; --text3: #7d8590;
  --border:      rgba(52,211,153,0.22);
  --border-card: rgba(52,211,153,0.10);
  --shadow:       0 4px 20px rgba(0,0,0,0.4);
  --shadow-hover: 0 8px 36px rgba(16,185,129,0.28);
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
  transition: background .4s, color .4s;
  direction: ltr;
}

#prog-bar {
  position: fixed; top: 0; left: 0; height: 3px; z-index: 999;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  width: 0%; transition: width .15s;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 64px;
  background: rgba(248,250,252,.93); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-card); transition: var(--tr);
}
[data-theme="dark"] nav { background: rgba(13,17,23,.95); }

.nav-back {
  display: flex; align-items: center; gap: 7px;
  color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 600;
  padding: 7px 13px; border-radius: 8px;
  border: 1px solid var(--border-card); background: var(--card);
  transition: var(--tr);
}
.nav-back:hover { color: var(--accent); border-color: var(--border); }
.nav-brand { display: flex; align-items: center; gap: 9px; font-size: 15px; font-weight: 900; color: var(--text); }
.nav-logo-icon {
  width: 34px; height: 34px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 900;
}
.nav-right { display: flex; align-items: center; gap: 8px; }
.theme-btn {
  width: 38px; height: 38px; border-radius: 50%;
  border: 1px solid var(--border-card); background: var(--card);
  cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center; transition: var(--tr);
}
.theme-btn:hover { border-color: var(--accent); transform: rotate(20deg); }

/* HERO BAND */
.hero-band {
  margin-top: 64px;
  background: linear-gradient(135deg, var(--accent-dark), var(--accent), var(--accent-light));
  padding: 36px 24px 32px; text-align: center;
  position: relative; overflow: hidden;
}
.hero-band::before {
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse 600px 200px at 50% 100%, rgba(255,255,255,.12) 0%, transparent 70%);
}
.hero-band-icon {
  width: 64px; height: 64px; border-radius: 18px;
  background: rgba(255,255,255,.2); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; margin: 0 auto 12px;
  border: 1.5px solid rgba(255,255,255,.35);
}
.hero-band h1 { font-size: clamp(18px,3.5vw,26px); font-weight: 900; color:#fff; margin-bottom:4px; }
.hero-band p { font-size:13px; color:rgba(255,255,255,.8); }
.hero-meta {
  display:flex; justify-content:center; gap:16px; margin-top:16px; flex-wrap:wrap;
}
.meta-pill {
  background: rgba(255,255,255,.18); backdrop-filter:blur(6px);
  border: 1px solid rgba(255,255,255,.3); border-radius:50px;
  padding:5px 14px; font-size:12px; font-weight:700; color:#fff;
  display:flex; align-items:center; gap:5px;
}

/* SHELL */
.shell { max-width:560px; margin:0 auto; padding:20px 18px 80px; }

/* STATS */
.stats-row {
  display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:14px;
}
.stat-box {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:var(--radius); padding:12px 8px; text-align:center;
}
.stat-box .val { font-size:20px; font-weight:900; }
.stat-box .lbl { font-size:11px; color:var(--text3); margin-top:2px; }
.c-green { color:var(--success); }
.c-red   { color:var(--danger); }
.c-blue  { color:var(--accent); }

/* PROGRESS STRIP */
.prog-strip {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:var(--radius); padding:13px 16px; margin-bottom:16px;
  display:flex; align-items:center; gap:12px;
}
.prog-label { font-size:13px; font-weight:700; color:var(--text2); white-space:nowrap; }
.prog-track { flex:1; height:7px; background:var(--bg2); border-radius:7px; overflow:hidden; }
.prog-fill {
  height:100%; width:0%;
  background:linear-gradient(90deg, var(--accent), var(--accent-light));
  border-radius:7px; transition:width .4s;
}
.timer-badge {
  min-width:60px; height:34px; border-radius:17px;
  background:var(--bg2); border:1px solid var(--border-card);
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:900; color:var(--text);
  gap:4px; padding:0 10px; flex-shrink:0;
}
.timer-badge.warn   { color:var(--warn);    border-color:rgba(217,119,6,.3);  background:rgba(217,119,6,.08); }
.timer-badge.danger { color:var(--danger);  border-color:rgba(220,38,38,.3);  background:rgba(220,38,38,.08); animation:blink .8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.5} }

/* QUESTION CARD */
.q-card {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:20px; overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,.05);
}
.q-header {
  background:linear-gradient(135deg, var(--accent-dark), var(--accent));
  padding:10px 18px;
  display:flex; align-items:center; gap:8px;
}
.q-num {
  background:rgba(255,255,255,.22); border-radius:7px;
  padding:3px 10px; font-size:11px; font-weight:700; color:#fff;
}
.q-text {
  padding:20px 18px 14px; font-size:15px; font-weight:700; color:var(--text);
  line-height:1.65; border-bottom:1px solid var(--border-card);
  direction:ltr; text-align:left;
}
.options { padding:14px 18px 18px; display:flex; flex-direction:column; gap:10px; }

.opt {
  display:flex; align-items:center; gap:12px;
  padding:13px 15px; border-radius:12px;
  border:1.5px solid var(--border-card); background:var(--bg);
  cursor:pointer; font-size:14px; font-weight:600; color:var(--text);
  transition:var(--tr); user-select:none;
  direction:ltr; text-align:left;
}
.opt:hover:not(.disabled) {
  border-color:var(--accent); background:var(--accent-glow);
  transform:translateX(3px);
}
.opt-letter {
  width:28px; height:28px; border-radius:8px; flex-shrink:0;
  background:var(--bg2); border:1px solid var(--border-card);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:900; color:var(--text3);
  transition:var(--tr);
}
.opt.correct { border-color:var(--success); background:rgba(22,163,74,.08); }
.opt.correct .opt-letter { background:var(--success); color:#fff; border-color:var(--success); }
.opt.wrong   { border-color:var(--danger);  background:rgba(220,38,38,.07); }
.opt.wrong   .opt-letter { background:var(--danger);  color:#fff; border-color:var(--danger); }
.opt.disabled { pointer-events:none; }

/* FEEDBACK */
.feedback-bar {
  margin:12px 18px; padding:12px 15px; border-radius:12px;
  display:flex; align-items:center; gap:10px;
  font-size:14px; font-weight:700;
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
.feedback-bar.ok { background:rgba(22,163,74,.1); color:var(--success); border:1px solid rgba(22,163,74,.25); }
.feedback-bar.no { background:rgba(220,38,38,.08); color:var(--danger); border:1px solid rgba(220,38,38,.2); }
.feedback-icon { font-size:18px; }

.explanation {
  margin:0 18px 12px; padding:11px 14px;
  background:rgba(16,185,129,.06); border-radius:10px;
  border-left:3px solid var(--accent);
  font-size:13px; color:var(--text2); line-height:1.6;
  direction:ltr; text-align:left;
}

/* BUTTONS */
.nav-btns { padding:4px 18px 18px; display:flex; gap:10px; }
.btn {
  flex:1; padding:13px; border:none; border-radius:12px;
  font-size:14px; font-weight:900; cursor:pointer;
  font-family:'Outfit',sans-serif; transition:var(--tr);
  display:flex; align-items:center; justify-content:center; gap:7px;
}
.btn-next {
  background:linear-gradient(135deg, var(--accent-dark), var(--accent));
  color:#fff; box-shadow:0 4px 14px var(--accent-glow);
}
.btn-next:hover { transform:translateY(-2px); box-shadow:0 6px 20px var(--accent-glow); }
.btn-skip {
  background:var(--bg2); color:var(--text2);
  border:1px solid var(--border-card); flex:0 0 auto; padding:13px 16px;
}
.btn-skip:hover { border-color:var(--warn); color:var(--warn); }

/* RESULTS */
.result-hero {
  text-align:center; padding:32px 20px 24px;
  background:var(--card); border-radius:20px;
  border:1px solid var(--border-card); margin-bottom:18px;
}
.score-ring {
  width:110px; height:110px; border-radius:50%; margin:0 auto 16px;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; position:relative;
}
.score-ring svg { position:absolute; inset:-5px; width:calc(100% + 10px); height:calc(100% + 10px); transform:rotate(-90deg); }
.score-ring circle { fill:none; stroke-width:5; stroke-linecap:round; }
.ring-bg   { stroke:var(--bg2); }
.ring-fill { stroke:var(--accent); transition:stroke-dashoffset 1s ease; }
.score-num { font-size:28px; font-weight:900; color:var(--text); }
.score-pct { font-size:12px; color:var(--text3); }
.result-grade { font-size:20px; font-weight:900; margin-bottom:5px; }
.result-sub   { font-size:14px; color:var(--text2); }
.result-stats {
  display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:18px;
}
.rs { background:var(--bg2); border-radius:10px; padding:11px 8px; text-align:center; }
.rs .n { font-size:20px; font-weight:900; }
.rs .l { font-size:11px; color:var(--text3); }

/* REPORT */
.report-item {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:13px; padding:15px; margin-bottom:9px;
  border-left:4px solid var(--border-card);
  direction:ltr; text-align:left;
}
.report-item.ok { border-left-color:var(--success); }
.report-item.no { border-left-color:var(--danger); }
.report-item .ri-q  { font-size:13px; font-weight:700; margin-bottom:7px; }
.report-item .ri-row { display:flex; align-items:center; gap:8px; font-size:12px; margin-top:4px; color:var(--text2); }
.ri-badge { padding:2px 8px; border-radius:6px; font-weight:700; font-size:11px; flex-shrink:0; }
.ri-yours { background:rgba(220,38,38,.1); color:var(--danger); }
.ri-right { background:rgba(22,163,74,.1);  color:var(--success); }

.result-actions { display:flex; flex-direction:column; gap:10px; margin-top:18px; }
.btn-retry { background:linear-gradient(135deg,var(--accent-dark),var(--accent)); color:#fff; }
.btn-retry:hover { transform:translateY(-2px); box-shadow:0 6px 20px var(--accent-glow); }
.btn-home  { background:var(--bg2); color:var(--text); border:1px solid var(--border-card); }
.btn-home:hover { border-color:var(--accent); color:var(--accent); }

/* FOOTER */
footer {
  background:var(--bg2); border-top:1px solid var(--border-card);
  padding:22px 24px;
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:10px;
}
.footer-brand { font-size:14px; font-weight:700; }
.footer-brand span { color:var(--accent); }
.footer-tg {
  display:flex; align-items:center; gap:5px;
  text-decoration:none; color:#229ED9; font-size:12px; font-weight:600;
}

@media (max-width:480px) {
  nav { padding:0 14px; }
  .shell { padding:14px 12px 60px; }
  .nav-brand span { display:none; }
}
</style>
</head>

</nav>

<div class="hero-band">
  <div class="hero-band-icon">🕊️</div>
  <h1>مراجعة شاملة عالمنهج</h1>
  <p>Palliative Care</p>
  <div class="hero-meta">
    <div class="meta-pill"><i class="fa-solid fa-list-ol"></i> <span id="totalBadge">-- Questions</span></div>
    <div class="meta-pill"><i class="fa-solid fa-clock"></i> 60 Min</div>
    <div class="meta-pill"><i class="fa-solid fa-shuffle"></i> Shuffled</div>
  </div>
</div>

<div class="shell">
  <div class="stats-row">
    <div class="stat-box"><div class="val c-green" id="sCorrect">0</div><div class="lbl">✔ Correct</div></div>
    <div class="stat-box"><div class="val c-red"   id="sWrong">0</div><div class="lbl">✖ Wrong</div></div>
    <div class="stat-box"><div class="val c-blue"  id="sRemain">100%</div><div class="lbl">⏳ Remaining</div></div>
  </div>

  <div class="prog-strip">
    <div class="prog-label" id="progLabel">Q 1</div>
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <div class="timer-badge" id="timerBadge"><i class="fa-regular fa-clock"></i><span id="timerTxt">60:00</span></div>

<script>
const QUESTIONS = [
   {ch:1,type:"mcq",t:"What is the PRIMARY goal of palliative care?",o:["To cure the underlying disease","To enhance quality of life for patients and their families","To replace curative treatment","To prepare patients for surgery"],a:1},
  {ch:1,type:"mcq",t:"Palliative care is BEST described as:",o:["Care limited to the last 48 hours of life","A specialized approach to alleviating symptoms regardless of diagnosis stage","An alternative to hospice care only","Treatment focused exclusively on cancer patients"],a:1},
  {ch:1,type:"mcq",t:"Which of the following statements about palliative care is TRUE?",o:["It can only begin after curative treatment fails","It is only for adults with terminal illnesses","It can be provided alongside curative treatments","It requires the patient to have a prognosis of 6 months or less"],a:2},
  {ch:1,type:"mcq",t:"Which condition is NOT typically listed as a condition for which palliative care is appropriate?",o:["Alzheimer's disease","HIV and AIDS","Uncomplicated appendicitis","Kidney disease"],a:2},
  {ch:1,type:"mcq",t:"Palliative care can be delivered in which of the following settings?",o:["Clinic only","Hospital only","Clinic, hospital, home, and assisted living facilities","Emergency department only"],a:2},
  {ch:1,type:"mcq",t:"The palliative care team typically includes all of the following EXCEPT:",o:["Nurses","Spiritual advisors (chaplains)","Pharmacists","Social workers"],a:2},
  {ch:1,type:"mcq",t:"Which of the following is an example of symptom relief provided by a palliative care team?",o:["Prescribing chemotherapy","Breathing exercises and relaxation techniques","Performing surgery","Ordering dialysis sessions"],a:1},
  {ch:1,type:"mcq",t:"Education and advocacy in palliative care primarily helps patients to:",o:["Cure their illness faster","Better understand their condition and make informed care decisions","Reduce hospital costs","Eliminate the need for caregivers"],a:1},
  {ch:1,type:"mcq",t:"Spiritual support in palliative care may include:",o:["Prescribing antidepressants","Regular visits with a chaplain or religious leader","Surgical procedures","High-dose opioid therapy only"],a:1},
  {ch:1,type:"mcq",t:"According to the Five Principles of Palliative Care, which principle ensures the patient's preferences for where they receive healthcare are respected?",o:["Principle 2 – Holistic needs","Principle 3 – Family support","Principle 1 – Respects patient's goals and choices","Principle 5 – High standards of end-of-life care"],a:2},
  {ch:1,type:"mcq",t:"The FIVE stages of palliative care in the correct order are:",o:["Assessment → Family Support → Early Care → End-of-Life → Bereavement","Initial Assessment → Emotional Preparation → Early-Stage Care → Late-Stage Care → Bereavement Support","Diagnosis → Treatment → Recovery → Discharge → Follow-up","Intake → Planning → Monitoring → Comfort → Death"],a:1},
  {ch:1,type:"mcq",t:"Stage 4 of palliative care is characterized by:",o:["Initial assessment and care planning","Early symptom management","Advanced care planning and end-of-life care","Bereavement support for families"],a:2},
  {ch:1,type:"mcq",t:"How many domains of palliative care are described in the textbook?",o:["5","6","8","10"],a:2},
  {ch:1,type:"mcq",t:"Which domain of palliative care focuses on managing physical symptoms and providing comfort?",o:["Structure and Processes of Care","Physical Aspects of Care","Ethical and Legal Aspects of Care","Social Aspects of Care"],a:1},
  {ch:1,type:"mcq",t:"Which of the following is a DISADVANTAGE of palliative care?",o:["It improves quality of life","It provides emotional support","Many people confuse it with hospice care, leading to reluctance","It supports family caregivers"],a:2},
  {ch:1,type:"mcq",t:"Palliative care for cancer patients varies depending on all of the following EXCEPT:",o:["The type of cancer","The patient's insurance company","Symptoms","Prognosis"],a:1},
  {ch:1,type:"mcq",t:"In palliative care for COPD, education for the patient may include:",o:["Starting dialysis","Quitting smoking and lifestyle changes","Chemotherapy options","Cardiac rehabilitation"],a:1},
  {ch:1,type:"mcq",t:"Palliative care for dementia may include:",o:["Aggressive curative treatment","Helping family members make difficult decisions about feeding and care","Surgical interventions only","Withholding all medications"],a:1},
  {ch:1,type:"mcq",t:"Which benefit of palliative care is described as 'early palliative care is associated with a lower risk of depression in newly diagnosed advanced cancer patients'?",o:["Symptom management support","Improved quality of life","Reduced risk of depression","Longer survival"],a:2},
  {ch:1,type:"mcq",t:"The care plan in Stage 1 (Initial Assessment) of palliative care is created with input from:",o:["The physician alone","The patient, family, and the broader palliative care team","Only the nursing staff","The insurance company and hospital administration"],a:1},
  {ch:1,type:"mcq",t:"Palliative care principle 2 addresses patients' medical, emotional, social, and spiritual needs. Which action is included under this principle?",o:["Advocating policies and laws","Making sure the patient is not alone","Enlisting the services of doctors and nurses only","Helping care providers learn about dying"],a:1},
  {ch:1,type:"mcq",t:"Which of the following is TRUE about the length of palliative care?",o:["There is a strict 6-month limit","It lasts only during hospitalization","There are no limits to the number of visits","It ends when curative treatment ends"],a:2},
  {ch:1,type:"mcq",t:"Palliative care for cardiovascular disease may include ALL of the following EXCEPT:",o:["Symptom relief","Mental health support","Curative cardiac surgery as the primary focus","End-of-life planning"],a:2},
  {ch:1,type:"mcq",t:"The 'Cultural Aspects of Care' domain in palliative care aims to:",o:["Force cultural assimilation for better care outcomes","Eliminate cultural practices that conflict with medical care","Respect and incorporate the patient's cultural background and practices","Focus only on religious practices"],a:2},
  {ch:1,type:"mcq",t:"Which statement best describes the role of social support in palliative care?",o:["It only addresses financial concerns","It connects patients with support groups and helps families communicate","It is limited to social work documentation","It replaces medical treatment for symptoms"],a:1},
  {ch:2,type:"mcq",t:"Chronic illnesses are defined as lasting:",o:["A few days","A few weeks","Often a year or more","Less than three months"],a:2},
  {ch:2,type:"mcq",t:"Activities of daily living (ADLs) include which of the following?",o:["Chemotherapy administration","Using the toilet and getting dressed","Writing a care plan","Scheduling physician appointments"],a:1},
  {ch:2,type:"mcq",t:"Which factor affecting coping with chronic illness involves increased susceptibility to infections?",o:["Emotional distress","Compromised immune system","Social isolation","Financial strain"],a:1},
  {ch:2,type:"mcq",t:"Social isolation in chronic illness can lead to:",o:["Improved self-management","Reduced hospital visits","Loneliness and disconnection from others","Faster recovery"],a:2},
  {ch:2,type:"mcq",t:"Which of the following is a stress SYMPTOM (not a source of stress) in chronic illness?",o:["Financial difficulties","Unpredictability of the disease","Disturbed sleep","Disability"],a:2},
  {ch:2,type:"mcq",t:"Which healthy habit is recommended for patients with chronic illness?",o:["Using alcohol to cope with pain","Avoiding physical activity to preserve energy","Exploring stress-relief activities like meditation","Isolating from family and friends"],a:2},
  {ch:2,type:"mcq",t:"Support groups for patients with chronic illness primarily provide:",o:["Medical prescriptions","A shared environment to learn coping strategies from others","Surgical interventions","Financial aid only"],a:1},
  {ch:2,type:"mcq",t:"Individual counseling for chronic illness is best for patients who:",o:["Need group dynamics for support","Have only physical symptoms","Need to express sensitive or private feelings in a one-on-one setting","Are in the terminal stage of illness"],a:2},
  {ch:2,type:"mcq",t:"The financial impact of chronic illness includes:",o:["Reduced need for healthcare","Employment issues and high healthcare costs","Improved insurance coverage","No effect on daily activities"],a:1},
  {ch:2,type:"mcq",t:"Emotional and psychological impact of chronic illness includes feelings of:",o:["Empowerment and independence","Frustration, anxiety, depression, and helplessness","Increased social engagement","Reduced dependence on healthcare providers"],a:1},
  {ch:3,type:"mcq",t:"Hospice care is BEST defined as:",o:["Specialized care aimed at curing terminal illness","Care focused on comfort, dignity, and support for people nearing end of life","A type of rehabilitation service","Care provided only in inpatient hospital settings"],a:1},
  {ch:3,type:"mcq",t:"To qualify for hospice care under Medicare guidelines, a patient's life expectancy must be:",o:["Less than 12 months","Less than 3 months","6 months or less if the illness runs its natural course","Less than 2 weeks"],a:2},
  {ch:3,type:"mcq",t:"The FOUR levels of hospice care include all of the following EXCEPT:",o:["Routine home care","General inpatient (GIP) care","Acute surgical care","Respite care"],a:2},

  {ch:3,type:"mcq",t:"Home health aides in hospice care assist with:",o:["Prescribing medications","Performing surgical procedures","Daily tasks such as bathing, personal care, and light housekeeping","Ordering diagnostic tests"],a:2},

  {ch:3,type:"mcq",t:"Which statement about hospice care is CORRECT?",o:["Receiving hospice care means giving up on life","Hospice care requires stopping all medications","Hospice care advocates for living as fully and comfortably as possible despite declining health","Hospice care always includes chemotherapy"],a:2},
  {ch:3,type:"mcq",t:"A key DIFFERENCE between palliative care and hospice care regarding eligibility is:",o:["Palliative care is only for cancer; hospice is for all diseases","Palliative care is available to anyone with a serious illness regardless of prognosis; hospice requires a terminal illness with ≤6 months life expectancy","Both require the patient to stop curative treatments","Both are only available at end of life"],a:1},
  {ch:3,type:"mcq",t:"In hospice care, which service helps families cope with financial costs such as loss of income?",o:["Doctors","Nurses","Social workers","Home health aides"],a:2},
  {ch:3,type:"mcq",t:"Can a patient still receive curative or life-prolonging treatments while receiving hospice care?",o:["Yes, palliative care allows this; hospice does not","Yes, both palliative and hospice allow curative treatments","No, neither type allows it","No, only palliative care has this restriction"],a:0},
  {ch:3,type:"mcq",t:"Which of the following is common to BOTH palliative care and hospice care?",o:["Curative treatment focus","Available at diagnosis for any serious illness","Improve quality of life and increase overall comfort","Requires stopping life-prolonging treatments"],a:2},
  {ch:3,type:"mcq",t:"Continuous home care in hospice is appropriate for patients who:",o:["Are stable and managing well at home","Need more intensive short-term support to manage a symptom crisis","Have improved and no longer need hospice","Want to be discharged from hospice"],a:1},

  {ch:4,type:"mcq",t:"Which human right in palliative care ensures patients receive comprehensive care addressing physical, emotional, social, and spiritual needs?",o:["Right to Non-Discrimination","Right to Autonomy","Right to Health","Right to Information"],a:2},
  {ch:4,type:"mcq",t:"The ethical principle of 'Beneficence and Non-Maleficence' in palliative care refers to:",o:["Providing equal access to care","Balancing the duty to do good with the duty to do no harm","Respecting the patient's cultural background","Ensuring informed consent"],a:1},
  {ch:4,type:"mcq",t:"Informed Consent in palliative care requires:",o:["Only the physician to understand the care plan","Patients and families to fully understand benefits, risks, and alternatives of proposed treatments","The nurse to make all care decisions","The family to decide without the patient's input"],a:1},
  {ch:4,type:"mcq",t:"The 'Right to Autonomy' in palliative care means:",o:["The healthcare team makes all treatment decisions","The patient's cultural background is respected","Patients' choices and preferences regarding care and treatment are respected","Only pain management is prioritized"],a:2},
  {ch:4,type:"mcq",t:"Which children's right in palliative care states that children must not receive inferior pain treatment compared to adults?",o:["Right to Development","Non-Discrimination","Right to Education","Right to Play"],a:1},
  {ch:4,type:"mcq",t:"The 'Best Interest' principle in children's palliative care means:",o:["The parents' wishes always override the child's needs","The best interest of the child must be a primary consideration in the provision of palliative care","Only medical staff decide what is best for the child","Financial considerations determine the child's care"],a:1},
  {ch:4,type:"mcq",t:"Women's right to 'Legal Rights' in palliative care includes:",o:["Access to surgery only","Pain management tailored to women's needs","Protection including succession planning, powers of attorney, and guardianship of children","Only spiritual support"],a:2},
  {ch:4,type:"mcq",t:"The ethical issue of 'Quality of Life' in palliative care may involve:",o:["Always pursuing aggressive life-prolonging treatments","Forgoing aggressive treatments that could prolong life but reduce its quality","Increasing medication doses regardless of side effects","Prioritizing family wishes over patient's expressed preferences"],a:1},
  {ch:4,type:"mcq",t:"The Right to Non-Discrimination in palliative care ensures:",o:["Only wealthy patients receive pain relief","Care is accessible regardless of age, gender, socioeconomic status, or other characteristics","Only adults receive full palliative care services","Cultural preferences are ignored in care planning"],a:1},
  {ch:4,type:"mcq",t:"For special-needs groups, palliative care rights include access to essential medicines like:",o:["Antibiotics only","Chemotherapy agents","Morphine for pain management","Antipsychotic medications only"],a:2},
  {ch:5,type:"mcq",t:"Nurses' professional responsibilities in palliative care are supported by:",o:["The hospital's billing department","The American Nursing Association's code of ethics","Personal preferences of individual nurses","State legislation alone"],a:1},
  {ch:5,type:"mcq",t:"Which nursing practice domain involves advocating for patients' needs and ensuring their voices are heard in care decisions?",o:["Clinical Practice","Symptom Management","Patient Advocacy","Research"],a:2},
  {ch:5,type:"mcq",t:"How many key domains of nursing practice in palliative care are described in Chapter 5?",o:["5","8","11","15"],a:2},
  {ch:5,type:"mcq",t:"A BARRIER to optimizing nursing's contribution to palliative care is:",o:["Education and training","Supportive policies","Emotional and psychological stress leading to burnout","Interdisciplinary collaboration"],a:2},
  {ch:5,type:"mcq",t:"An ENABLER to optimizing nursing's contribution to palliative care is:",o:["Lack of training","Workload and staffing issues","Communication barriers","Adequate staffing with sufficient nurse-to-patient ratios"],a:3},
  {ch:5,type:"mcq",t:"Nursing assessment in palliative/hospice care includes subjective data such as:",o:["Changes in skin color or mottling","Vital signs indicating impending death","Patient reports experiencing increased pain or discomfort","Decreased responsiveness"],a:2},
  {ch:5,type:"mcq",t:"Which nursing diagnosis is defined as 'related to emotional response to terminal illness, evidenced by withdrawal from family interactions and difficulty expressing feelings'?",o:["Acute Pain","Hopelessness","Ineffective Coping","Impaired Comfort"],a:2},
  {ch:5,type:"mcq",t:"The nursing diagnosis 'Hopelessness' related to terminal illness is evidenced by:",o:["Verbal complaints of discomfort","Grimacing and restlessness","Expressions of feeling trapped and lack of interest in self-care","Statements of feeling cold and anxious"],a:2},
  {ch:5,type:"mcq",t:"During end-of-life nursing care, care planning revolves around:",o:["Diagnosis and curative treatment","Controlling pain, managing complications, maintaining quality of life, and meeting last wishes","Administrative documentation only","Discharge planning to home"],a:1},
  {ch:5,type:"mcq",t:"Which nursing skill in palliative care involves the ability to understand and share the feelings of patients and families?",o:["Clinical Expertise","Problem-Solving","Communication","Empathy"],a:3},
  {ch:5,type:"mcq",t:"Nursing intervention of 'Symptom Control' in palliative care addresses:",o:["Administering curative medications","Other symptoms such as nausea, breathlessness, fatigue, and anxiety","Performing invasive surgical procedures","Ordering laboratory tests"],a:1},
  {ch:5,type:"mcq",t:"Advance Care Planning as a nursing intervention involves:",o:["Scheduling surgery dates","Facilitating discussions about the patient's preferences for future care and documenting advance directives","Billing insurance companies","Performing physical assessments only"],a:1},
  {ch:5,type:"mcq",t:"Cultural and Societal Attitudes as a BARRIER in palliative care nursing refers to:",o:["Inadequate nurse staffing","Cultural beliefs towards death and dying influencing acceptance of palliative care","Insufficient palliative care training","Poor communication with families"],a:1},
  {ch:5,type:"mcq",t:"Nursing problem priorities for hospice patients include all of the following EXCEPT:",o:["Provide symptom management and comfort measures","Coordinate interdisciplinary care","Prescribe curative chemotherapy regimens","Offer emotional and spiritual support"],a:2},
  {ch:5,type:"mcq",t:"The domain of 'Leadership and Management' in nursing palliative care involves:",o:["Educating patients about disease prevention","Leading and managing healthcare teams to ensure efficient and effective delivery of care","Conducting and applying research","Advocating for patients' preferences"],a:1},
  {ch:1,type:"tf",t:"Palliative care is the same as hospice care.",o:["True","False"],a:1},
  {ch:1,type:"tf",t:"Palliative care can be provided alongside curative treatment.",o:["True","False"],a:0},
  {ch:1,type:"tf",t:"Palliative care is only appropriate for patients with terminal illnesses.",o:["True","False"],a:1},
  {ch:1,type:"tf",t:"Palliative care is appropriate at any age.",o:["True","False"],a:0},
  {ch:1,type:"tf",t:"There is a set time when someone must start palliative care after diagnosis.",o:["True","False"],a:1},
  {ch:1,type:"tf",t:"Early palliative care may increase the likelihood that patients with cardiovascular disease will experience their desired end-of-life outcomes.",o:["True","False"],a:0},
  {ch:1,type:"tf",t:"Palliative care for COPD may include treatments for discomfort, anxiety, and insomnia associated with difficulty breathing.",o:["True","False"],a:0},
  {ch:1,type:"tf",t:"The five principles of palliative care state that it promotes high standards for care only for patients aged over 65.",o:["True","False"],a:1},
  {ch:1,type:"tf",t:"Palliative care teams include medical providers and other specialists who can help patients manage symptoms.",o:["True","False"],a:0},
  {ch:1,type:"tf",t:"One disadvantage of palliative care is the risk of overmedication to manage symptoms, which can lead to additional side effects.",o:["True","False"],a:0},
  {ch:2,type:"tf",t:"Chronic illnesses last less than three months by definition.",o:["True","False"],a:1},
  {ch:2,type:"tf",t:"Social isolation is a factor that can make coping with chronic illness more difficult.",o:["True","False"],a:0},
  {ch:2,type:"tf",t:"Family and couples counseling is recommended when chronic illness affects the family unit.",o:["True","False"],a:0},
  {ch:2,type:"tf",t:"Avoiding physical activity is a healthy habit recommended for patients with chronic illness.",o:["True","False"],a:1},
  {ch:2,type:"tf",t:"Cognitive challenges in chronic illness include issues with memory, concentration, and decision-making.",o:["True","False"],a:0},
  {ch:3,type:"tf",t:"Hospice care is focused on curing the patient's terminal illness.",o:["True","False"],a:1},
  {ch:3,type:"tf",t:"Receiving hospice care means the patient is giving up on life.",o:["True","False"],a:1},
  {ch:3,type:"tf",t:"Hospice care typically provides around-the-clock in-home nursing care.",o:["True","False"],a:1},
  {ch:3,type:"tf",t:"Medicare uses a 6-month life expectancy as the standard timeline for hospice eligibility.",o:["True","False"],a:0},
  {ch:3,type:"tf",t:"Both palliative care and hospice care aim to improve quality of life and increase overall comfort.",o:["True","False"],a:0},
  {ch:3,type:"tf",t:"A patient receiving palliative care can continue curative or life-prolonging treatments.",o:["True","False"],a:0},
  {ch:3,type:"tf",t:"To enter hospice, a patient must stop all treatments aimed at curing their illness or prolonging life.",o:["True","False"],a:0},
  {ch:4,type:"tf",t:"Palliative care must be accessible to all individuals regardless of age, gender, or socioeconomic status.",o:["True","False"],a:0},
  {ch:4,type:"tf",t:"The ethical principle of autonomy means that the medical team always makes the final care decisions for the patient.",o:["True","False"],a:1},
  {ch:4,type:"tf",t:"Children in palliative care have the right to receive accurate information about their illness and symptoms.",o:["True","False"],a:0},
  {ch:4,type:"tf",t:"The 'Right to Pain Relief' is not considered a fundamental aspect of palliative care.",o:["True","False"],a:1},
  {ch:5,type:"tf",t:"Research has shown that both palliative and hospice care may be more effective when started early.",o:["True","False"],a:0},
  {ch:5,type:"tf",t:"Cultural and societal attitudes towards death and dying can influence the acceptance and implementation of palliative care.",o:["True","False"],a:0},
  {ch:5,type:"tf",t:"Insufficient training in palliative care does NOT affect nurses' ability to provide high-quality care.",o:["True","False"],a:1},

/* ============ ENGINE ============ */
const LETTERS = ['A','B','C','D','E','F'];
let questions, i, correct, wrong, answers, wrongSet, answered;
let totalTime = 60*60, timeLeft, timerInterval;

function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

/* shuffle options inside a question, keeping track of the correct answer */
function shuffleOptions(q) {
  const opts = q.o.map((o, idx) => ({ o, isCorrect: idx === q.a }));
  shuffle(opts);
  return {
    ...q,
    o: opts.map(x => x.o),
    a: opts.findIndex(x => x.isCorrect)
  };
}

function init(pool) {
  questions = shuffle([...pool]).map(shuffleOptions);
  i=0; correct=0; wrong=0; answered=0;
  answers = new Array(questions.length).fill(null);
  wrongSet = [];
  timeLeft = totalTime;
  document.getElementById('totalBadge').textContent = questions.length + ' Questions';
  startTimer(); render();
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    const m = Math.floor(timeLeft/60), s = timeLeft%60;
    document.getElementById('timerTxt').textContent = `${m}:${s<10?'0':''}${s}`;
    const b = document.getElementById('timerBadge');
    if (timeLeft<=120)      b.className='timer-badge danger';
    else if (timeLeft<=300) b.className='timer-badge warn';
    if (timeLeft<=0) { clearInterval(timerInterval); finish(); }
  }, 1000);
}

function updateTop() {
  const total = questions.length;
  document.getElementById('sCorrect').textContent = correct;
  document.getElementById('sWrong').textContent   = wrong;
  document.getElementById('sRemain').textContent  = Math.round(((total-answered)/total)*100)+'%';
  document.getElementById('progLabel').textContent = 'Q '+(i+1)+' / '+total;
  document.getElementById('progFill').style.width  = ((i+1)/total*100)+'%';
  document.getElementById('prog-bar').style.width  = ((i+1)/total*100)+'%';
}

function render() {
  updateTop();
  const q = questions[i];
  document.getElementById('app').innerHTML = `
    <div class="q-card">
      <div class="q-header"><div class="q-num">Question ${i+1} / ${questions.length}</div></div>
      <div class="q-text">${q.t}</div>
      <div class="options">
        ${q.o.map((o,idx)=>`
          <div class="opt" id="opt${idx}" onclick="choose(${idx})">
            <div class="opt-letter">${LETTERS[idx]}</div>
            ${o}
          </div>`).join('')}
      </div>
      <div class="nav-btns">
        <button class="btn btn-skip" onclick="skip()"><i class="fa-solid fa-forward"></i> Skip</button>
      </div>
    </div>`;
}

function choose(v) {
  if (answers[i]!==null) return;
  answers[i]=v; answered++;
  const q=questions[i], ok=v===q.a;
  ok?correct++:wrong++;
  updateTop();
  q.o.forEach((_,idx)=>{
    const el=document.getElementById('opt'+idx);
    el.classList.add('disabled');
    if (idx===q.a) el.classList.add('correct');
    else if (idx===v) el.classList.add('wrong');
  });
  const fb=document.createElement('div');
  fb.className='feedback-bar '+(ok?'ok':'no');
  fb.innerHTML=ok
    ?`<span class="feedback-icon">🎉</span><span>ما شاء الله عليك</span>`
    :`<span class="feedback-icon">😔</span><span>ركز يا سكرspan>`;
  const card=document.querySelector('.q-card');
  card.querySelector('.options').after(fb);
  if (q.exp) {
    const exp=document.createElement('div');
    exp.className='explanation';
    exp.innerHTML='<b>💬 Explanation:</b> '+q.exp;
    fb.after(exp);
  }
  card.querySelector('.nav-btns').innerHTML=`
    <button class="btn btn-next" onclick="next()">
      ${i<questions.length-1
        ?'<i class="fa-solid fa-arrow-right"></i> Next Question'
        :'<i class="fa-solid fa-flag-checkered"></i> Finish Exam'}
    </button>`;
}

function skip() {
  if (answers[i]===null) { answers[i]=-1; answered++; wrong++; wrongSet.push(questions[i]); updateTop(); }
  next();
}

function next() {
  if (i<questions.length-1) { i++; render(); window.scrollTo({top:0,behavior:'smooth'}); }
  else finish();
}

function finish() {
  clearInterval(timerInterval);
  const total=questions.length;
  const score=Math.round((correct/total)*100);
  questions.forEach((q,idx)=>{ if(answers[idx]!==q.a) wrongSet.push({...q,myAns:answers[idx]}); });
  wrongSet=[...new Map(wrongSet.map(q=>[q.t,q])).values()];
  let grade,gc;
  if(score>=90)      { grade='🥇 Excellent';      gc='var(--success)'; }
  else if(score>=75) { grade='🥈 Very Good';       gc='var(--accent)'; }
  else if(score>=60) { grade='🥉 Good';            gc='var(--warn)'; }
  else               { grade='📚 Needs Review';    gc='var(--danger)'; }
  const circ=2*Math.PI*45, offset=circ-(score/100)*circ;
  const report=questions.map((q,idx)=>{
    const ok=answers[idx]===q.a;
    return `<div class="report-item ${ok?'ok':'no'}">
      <div class="ri-q">${ok?'✅':'❌'} ${q.t}</div>
      ${!ok?`
        <div class="ri-row"><span class="ri-badge ri-yours">Your Answer</span>${answers[idx]>=0?q.o[answers[idx]]:'Skipped'}</div>
        <div class="ri-row"><span class="ri-badge ri-right">Correct</span>${q.o[q.a]}</div>
      `:''}
    </div>`;
  }).join('');
  document.getElementById('prog-bar').style.width='100%';
  document.getElementById('app').innerHTML=`
    <div class="result-hero">
      <div class="score-ring">
        <svg viewBox="0 0 110 110">
          <circle class="ring-bg"   cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="0"/>
          <circle class="ring-fill" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            style="stroke:${gc}" id="ringFill"/>
        </svg>
        <div class="score-num">${score}</div>
        <div class="score-pct">%</div>
      </div>
      <div class="result-grade" style="color:${gc}">${grade}</div>
      <div class="result-sub">Answered ${answered} of ${total} questions</div>
      <div class="result-stats">
        <div class="rs"><div class="n" style="color:var(--success)">${correct}</div><div class="l">Correct</div></div>
        <div class="rs"><div class="n" style="color:var(--danger)">${wrong}</div><div class="l">Wrong</div></div>
        <div class="rs"><div class="n" style="color:var(--accent)">${total-answered<0?0:total-answered}</div><div class="l">Skipped</div></div>
      </div>
    </div>
    <div class="result-actions">
      ${wrongSet.length?`<button class="btn btn-retry" onclick="retryWrong()"><i class="fa-solid fa-rotate-right"></i> Retry Wrong (${wrongSet.length})</button>`:''}
      <button class="btn btn-home" onclick="init(QUESTIONS)"><i class="fa-solid fa-shuffle"></i> New Random Exam</button>
      <a href="https://gaith-team.github.io/exam/level1/palliative-care/index.html" class="btn btn-home" style="text-decoration:none;"><i class="fa-solid fa-house"></i> Back to Subject</a>
    </div>
    <div style="margin-top:24px">
      <div style="font-size:14px;font-weight:700;margin-bottom:10px;color:var(--text2);">📋 Detailed Report</div>
      ${report}
    </div>`;
  setTimeout(()=>{document.getElementById('ringFill').style.strokeDashoffset=offset;},100);
  window.scrollTo({top:0,behavior:'smooth'});
}

function retryWrong() {
  const pool=[...wrongSet];
  questions=shuffle(pool).map(shuffleOptions); i=0; correct=0; wrong=0;
  answers=new Array(questions.length).fill(null);
  wrongSet=[]; answered=0; timeLeft=totalTime;
  startTimer(); render();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* THEME */
const themeBtn=document.getElementById('themeBtn');
let theme=localStorage.getItem('theme')||'light';
function applyTheme(t) {
  theme=t;
  document.documentElement.setAttribute('data-theme',t==='dark'?'dark':'');
  themeBtn.textContent=t==='dark'?'☀️':'🌙';
  localStorage.setItem('theme',t);
}
applyTheme(theme);
themeBtn.addEventListener('click',()=>applyTheme(theme==='dark'?'light':'dark'));

init(QUESTIONS);
</script>
