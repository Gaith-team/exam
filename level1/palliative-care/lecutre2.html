<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHAITH TEAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent:             #10b981;
  --accent-light:       #34d399;
  --accent-dark:        #059669;
  --accent-glow:        rgba(16,185,129,0.14);
  --accent-glow-strong: rgba(16,185,129,0.28);
  --bg:      #f8fafc;
  --bg2:     #eef2f7;
  --card:    #ffffff;
  --text:    #1a2332;
  --text2:   #4a5568;
  --text3:   #718096;
  --border:       rgba(16,185,129,0.18);
  --border-card:  rgba(0,0,0,0.07);
  --shadow:       0 4px 20px rgba(0,0,0,0.07);
  --shadow-hover: 0 8px 32px rgba(16,185,129,0.22);
  --success: #16a34a;
  --danger:  #dc2626;
  --warn:    #d97706;
  --radius: 16px;
  --tr: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg:   #0d1117; --bg2: #161b22; --card: #1c2333;
  --text: #e6edf3; --text2: #b1bac4; --text3: #7d8590;
  --border:      rgba(52,211,153,0.22);
  --border-card: rgba(52,211,153,0.10);
  --shadow:       0 4px 20px rgba(0,0,0,0.4);
  --shadow-hover: 0 8px 36px rgba(16,185,129,0.28);
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
  transition: background .4s, color .4s;
  direction: ltr;
}

#prog-bar {
  position: fixed; top: 0; left: 0; height: 3px; z-index: 999;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  width: 0%; transition: width .15s;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 64px;
  background: rgba(248,250,252,.93); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-card); transition: var(--tr);
}
[data-theme="dark"] nav { background: rgba(13,17,23,.95); }

.nav-back {
  display: flex; align-items: center; gap: 7px;
  color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 600;
  padding: 7px 13px; border-radius: 8px;
  border: 1px solid var(--border-card); background: var(--card);
  transition: var(--tr);
}
.nav-back:hover { color: var(--accent); border-color: var(--border); }
.nav-brand { display: flex; align-items: center; gap: 9px; font-size: 15px; font-weight: 900; color: var(--text); }
.nav-logo-icon {
  width: 34px; height: 34px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 900;
}
.nav-right { display: flex; align-items: center; gap: 8px; }
.theme-btn {
  width: 38px; height: 38px; border-radius: 50%;
  border: 1px solid var(--border-card); background: var(--card);
  cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center; transition: var(--tr);
}
.theme-btn:hover { border-color: var(--accent); transform: rotate(20deg); }

/* HERO BAND */
.hero-band {
  margin-top: 64px;
  background: linear-gradient(135deg, var(--accent-dark), var(--accent), var(--accent-light));
  padding: 36px 24px 32px; text-align: center;
  position: relative; overflow: hidden;
}
.hero-band::before {
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse 600px 200px at 50% 100%, rgba(255,255,255,.12) 0%, transparent 70%);
}
.hero-band-icon {
  width: 64px; height: 64px; border-radius: 18px;
  background: rgba(255,255,255,.2); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; margin: 0 auto 12px;
  border: 1.5px solid rgba(255,255,255,.35);
}
.hero-band h1 { font-size: clamp(18px,3.5vw,26px); font-weight: 900; color:#fff; margin-bottom:4px; }
.hero-band p { font-size:13px; color:rgba(255,255,255,.8); }
.hero-meta {
  display:flex; justify-content:center; gap:16px; margin-top:16px; flex-wrap:wrap;
}
.meta-pill {
  background: rgba(255,255,255,.18); backdrop-filter:blur(6px);
  border: 1px solid rgba(255,255,255,.3); border-radius:50px;
  padding:5px 14px; font-size:12px; font-weight:700; color:#fff;
  display:flex; align-items:center; gap:5px;
}

/* SHELL */
.shell { max-width:560px; margin:0 auto; padding:20px 18px 80px; }

/* STATS */
.stats-row {
  display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:14px;
}
.stat-box {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:var(--radius); padding:12px 8px; text-align:center;
}
.stat-box .val { font-size:20px; font-weight:900; }
.stat-box .lbl { font-size:11px; color:var(--text3); margin-top:2px; }
.c-green { color:var(--success); }
.c-red   { color:var(--danger); }
.c-blue  { color:var(--accent); }

/* PROGRESS STRIP */
.prog-strip {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:var(--radius); padding:13px 16px; margin-bottom:16px;
  display:flex; align-items:center; gap:12px;
}
.prog-label { font-size:13px; font-weight:700; color:var(--text2); white-space:nowrap; }
.prog-track { flex:1; height:7px; background:var(--bg2); border-radius:7px; overflow:hidden; }
.prog-fill {
  height:100%; width:0%;
  background:linear-gradient(90deg, var(--accent), var(--accent-light));
  border-radius:7px; transition:width .4s;
}
.timer-badge {
  min-width:60px; height:34px; border-radius:17px;
  background:var(--bg2); border:1px solid var(--border-card);
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:900; color:var(--text);
  gap:4px; padding:0 10px; flex-shrink:0;
}
.timer-badge.warn   { color:var(--warn);    border-color:rgba(217,119,6,.3);  background:rgba(217,119,6,.08); }
.timer-badge.danger { color:var(--danger);  border-color:rgba(220,38,38,.3);  background:rgba(220,38,38,.08); animation:blink .8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.5} }

/* QUESTION CARD */
.q-card {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:20px; overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,.05);
}
.q-header {
  background:linear-gradient(135deg, var(--accent-dark), var(--accent));
  padding:10px 18px;
  display:flex; align-items:center; gap:8px;
}
.q-num {
  background:rgba(255,255,255,.22); border-radius:7px;
  padding:3px 10px; font-size:11px; font-weight:700; color:#fff;
}
.q-text {
  padding:20px 18px 14px; font-size:15px; font-weight:700; color:var(--text);
  line-height:1.65; border-bottom:1px solid var(--border-card);
  direction:ltr; text-align:left;
}
.options { padding:14px 18px 18px; display:flex; flex-direction:column; gap:10px; }

.opt {
  display:flex; align-items:center; gap:12px;
  padding:13px 15px; border-radius:12px;
  border:1.5px solid var(--border-card); background:var(--bg);
  cursor:pointer; font-size:14px; font-weight:600; color:var(--text);
  transition:var(--tr); user-select:none;
  direction:ltr; text-align:left;
}
.opt:hover:not(.disabled) {
  border-color:var(--accent); background:var(--accent-glow);
  transform:translateX(3px);
}
.opt-letter {
  width:28px; height:28px; border-radius:8px; flex-shrink:0;
  background:var(--bg2); border:1px solid var(--border-card);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:900; color:var(--text3);
  transition:var(--tr);
}
.opt.correct { border-color:var(--success); background:rgba(22,163,74,.08); }
.opt.correct .opt-letter { background:var(--success); color:#fff; border-color:var(--success); }
.opt.wrong   { border-color:var(--danger);  background:rgba(220,38,38,.07); }
.opt.wrong   .opt-letter { background:var(--danger);  color:#fff; border-color:var(--danger); }
.opt.disabled { pointer-events:none; }

/* FEEDBACK */
.feedback-bar {
  margin:12px 18px; padding:12px 15px; border-radius:12px;
  display:flex; align-items:center; gap:10px;
  font-size:14px; font-weight:700;
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
.feedback-bar.ok { background:rgba(22,163,74,.1); color:var(--success); border:1px solid rgba(22,163,74,.25); }
.feedback-bar.no { background:rgba(220,38,38,.08); color:var(--danger); border:1px solid rgba(220,38,38,.2); }
.feedback-icon { font-size:18px; }

.explanation {
  margin:0 18px 12px; padding:11px 14px;
  background:rgba(16,185,129,.06); border-radius:10px;
  border-left:3px solid var(--accent);
  font-size:13px; color:var(--text2); line-height:1.6;
  direction:ltr; text-align:left;
}

/* BUTTONS */
.nav-btns { padding:4px 18px 18px; display:flex; gap:10px; }
.btn {
  flex:1; padding:13px; border:none; border-radius:12px;
  font-size:14px; font-weight:900; cursor:pointer;
  font-family:'Outfit',sans-serif; transition:var(--tr);
  display:flex; align-items:center; justify-content:center; gap:7px;
}
.btn-next {
  background:linear-gradient(135deg, var(--accent-dark), var(--accent));
  color:#fff; box-shadow:0 4px 14px var(--accent-glow);
}
.btn-next:hover { transform:translateY(-2px); box-shadow:0 6px 20px var(--accent-glow); }
.btn-skip {
  background:var(--bg2); color:var(--text2);
  border:1px solid var(--border-card); flex:0 0 auto; padding:13px 16px;
}
.btn-skip:hover { border-color:var(--warn); color:var(--warn); }

/* RESULTS */
.result-hero {
  text-align:center; padding:32px 20px 24px;
  background:var(--card); border-radius:20px;
  border:1px solid var(--border-card); margin-bottom:18px;
}
.score-ring {
  width:110px; height:110px; border-radius:50%; margin:0 auto 16px;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; position:relative;
}
.score-ring svg { position:absolute; inset:-5px; width:calc(100% + 10px); height:calc(100% + 10px); transform:rotate(-90deg); }
.score-ring circle { fill:none; stroke-width:5; stroke-linecap:round; }
.ring-bg   { stroke:var(--bg2); }
.ring-fill { stroke:var(--accent); transition:stroke-dashoffset 1s ease; }
.score-num { font-size:28px; font-weight:900; color:var(--text); }
.score-pct { font-size:12px; color:var(--text3); }
.result-grade { font-size:20px; font-weight:900; margin-bottom:5px; }
.result-sub   { font-size:14px; color:var(--text2); }
.result-stats {
  display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:18px;
}
.rs { background:var(--bg2); border-radius:10px; padding:11px 8px; text-align:center; }
.rs .n { font-size:20px; font-weight:900; }
.rs .l { font-size:11px; color:var(--text3); }

/* REPORT */
.report-item {
  background:var(--card); border:1px solid var(--border-card);
  border-radius:13px; padding:15px; margin-bottom:9px;
  border-left:4px solid var(--border-card);
  direction:ltr; text-align:left;
}
.report-item.ok { border-left-color:var(--success); }
.report-item.no { border-left-color:var(--danger); }
.report-item .ri-q  { font-size:13px; font-weight:700; margin-bottom:7px; }
.report-item .ri-row { display:flex; align-items:center; gap:8px; font-size:12px; margin-top:4px; color:var(--text2); }
.ri-badge { padding:2px 8px; border-radius:6px; font-weight:700; font-size:11px; flex-shrink:0; }
.ri-yours { background:rgba(220,38,38,.1); color:var(--danger); }
.ri-right { background:rgba(22,163,74,.1);  color:var(--success); }

.result-actions { display:flex; flex-direction:column; gap:10px; margin-top:18px; }
.btn-retry { background:linear-gradient(135deg,var(--accent-dark),var(--accent)); color:#fff; }
.btn-retry:hover { transform:translateY(-2px); box-shadow:0 6px 20px var(--accent-glow); }
.btn-home  { background:var(--bg2); color:var(--text); border:1px solid var(--border-card); }
.btn-home:hover { border-color:var(--accent); color:var(--accent); }

/* FOOTER */
footer {
  background:var(--bg2); border-top:1px solid var(--border-card);
  padding:22px 24px;
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:10px;
}
.footer-brand { font-size:14px; font-weight:700; }
.footer-brand span { color:var(--accent); }
.footer-tg {
  display:flex; align-items:center; gap:5px;
  text-decoration:none; color:#229ED9; font-size:12px; font-weight:600;
}

@media (max-width:480px) {
  nav { padding:0 14px; }
  .shell { padding:14px 12px 60px; }
  .nav-brand span { display:none; }
}
</style>
</head>

<script>
const QUESTIONS = [
         {t:"How long does a chronic illness typically last?", o:["A few days","A few weeks","A year or more","Exactly six months"], a:2, d:"easy"},
            {t:"Which of the following is an example of a chronic disease?", o:["Common cold","Influenza","Diabetes","Food poisoning"], a:2, d:"easy"},
            {t:"What does COPD stand for?", o:["Chronic Obstructive Pulmonary Disease","Central Organ Pulmonary Disorder","Chronic Ongoing Physical Disability","Cardiovascular Obstructive Pressure Disease"], a:0, d:"easy"},
            {t:"Activities of daily living (ADLs) include:", o:["Running a marathon","Using the toilet and getting dressed","Performing surgery","Driving a truck"], a:1, d:"easy"},
            {t:"Which of the following is a common emotional response to chronic illness?", o:["Euphoria","Frustration and anxiety","Increased confidence","Indifference"], a:1, d:"easy"},
            {t:"Social isolation in chronic illness patients may result from:", o:["Having too many friends","Inability to participate in activities they once enjoyed","Excessive social invitations","Improved mobility"], a:1, d:"easy"},
            {t:"Which of the following is a source of stress for chronically ill patients?", o:["Financial difficulties","Winning a prize","Going on vacation","Getting promoted"], a:0, d:"easy"},
            {t:"What is a common stress symptom experienced by people with chronic illness?", o:["Increased energy","Disturbed sleep","Improved appetite","Enhanced concentration"], a:1, d:"easy"},
            {t:"Which is recommended as a healthy coping strategy for chronic illness?", o:["Alcohol consumption","Substance abuse","Eating a healthy diet","Social withdrawal"], a:2, d:"easy"},
            {t:"What type of counseling involves working with a trained provider in a one-on-one setting?", o:["Group therapy","Individual counseling","Family counseling","Peer mentoring"], a:1, d:"easy"},
            {t:"Support groups help patients with chronic illness by:", o:["Prescribing medication","Performing surgery","Providing a sharing experience and new coping strategies","Replacing medical treatment entirely"], a:2, d:"easy"},
            {t:"Chronic illness can affect which of the following?", o:["Only physical health","Only mental health","Only financial status","Physical health, mental health, social life, and finances"], a:3, d:"easy"},
            {t:"Which professional should a patient seek help from when feeling less able to cope?", o:["Librarian","Mental health care provider","Real estate agent","Personal trainer"], a:1, d:"easy"},
            {t:"Persistent pain and fatigue are categorized under which effect of chronic illness?", o:["Financial impact","Social life","Physical health","Lifestyle"], a:2, d:"easy"},
            {t:"Who can be affected by a patient's chronic illness besides the patient?", o:["Only strangers","Only colleagues","Family members","No one else"], a:2, d:"easy"},
            {t:"Which of the following factors makes coping with chronic illness challenging due to difficulty planning for the future?", o:["Physical symptoms","Financial strain","Uncertainty","Lifestyle changes"], a:2, d:"medium"},
            {t:"The unpredictable nature of some chronic illnesses primarily contributes to:", o:["Improved relationships","A sense of certainty","Difficulty setting goals and planning","Better financial management"], a:2, d:"medium"},
            {t:"According to the content, what is the most important step when coping with chronic illness?", o:["Ignoring the symptoms","Seeking help as soon as you feel less able to cope","Waiting until the illness resolves on its own","Avoiding all medical professionals"], a:1, d:"medium"},
            {t:"A healthcare provider may prescribe medications for a chronically ill patient suffering from depression in order to:", o:["Cure the chronic illness","Help regulate mood","Eliminate all physical symptoms","Replace counseling"], a:1, d:"medium"},
            {t:"Which of the following is NOT listed as a self-help tip for coping with chronic illness?", o:["Getting physical activity","Exploring stress-relief activities like meditation","Increasing alcohol consumption to relax","Letting go of unnecessary obligations"], a:2, d:"medium"},
            {t:"Chronic illness can strain relationships with family, friends, and colleagues due to all of the following EXCEPT:", o:["Caregiving responsibilities","Misunderstandings","Changes in dynamics","Increased financial wealth"], a:3, d:"medium"},
            {t:"Under which category does 'loss of independence' fall when considering the effects of chronic illness?", o:["Physical health","Financial impact","Emotional well-being","Coping mechanisms"], a:2, d:"medium"},
            {t:"What is the role of a mental health care provider in the context of chronic illness management?", o:["Perform surgery","Design a treatment plan to meet the patient's specific needs","Prescribe antibiotics","Conduct lab tests"], a:1, d:"medium"},
            {t:"Which of the following best describes the relationship between chronic illness and employment?", o:["Chronic illness always leads to immediate job loss","Chronic illness may cause difficulties in maintaining a job, leading to financial strain","Chronic illness improves work performance","Employment is unaffected by chronic illness"], a:1, d:"medium"},
            {t:"'Compromised immune system' as an effect of chronic illness means:", o:["The immune system becomes stronger","Increased susceptibility to infections and other health issues","Complete immunity to all diseases","The body no longer needs vaccinations"], a:1, d:"medium"},
            {t:"Family and couples counseling is recommended when chronic illness:", o:["Only affects the patient individually","Affects the family unit","Has no impact on relationships","Is completely cured"], a:1, d:"medium"},
            {t:"Which of the following is a cognitive symptom of stress related to chronic illness?", o:["Body aches and pains","Irritability","Cognitive issues","Fatigue"], a:2, d:"medium"},
            {t:"The text suggests that support groups can be found by:", o:["Searching random websites","Contacting a nonprofit organization dedicated to the specific disease","Asking a pharmacist to create one","Posting on social media only"], a:1, d:"medium"},
            {t:"Which coping mechanism involves developing new skills and strategies to manage illness?", o:["Denial","Avoidance","Adaptation","Isolation"], a:2, d:"medium"},
            {t:"Staying in touch with family and friends is recommended because it helps:", o:["Increase financial burden","Worsen symptoms","Counter social isolation and provide emotional support","Create more stress"], a:2, d:"medium"},
            {t:"A patient with a chronic illness experiences persistent pain, social withdrawal, disturbed sleep, and financial difficulties. This scenario best illustrates:", o:["That chronic illness only affects physical health","The interconnected and multifactorial nature of challenges in chronic illness","That medication alone can resolve all issues","That only one domain of life is affected at a time"], a:1, d:"hard"},
            {t:"Which combination of counseling types would be MOST comprehensive for a chronically ill patient whose illness is affecting both personal mental health and marital relationship?", o:["Only support groups","Individual counseling combined with couples counseling","Only family counseling","Only medication management"], a:1, d:"hard"},
            {t:"A patient avoids seeking mental health support because they believe their chronic illness is purely physical. This attitude is problematic because:", o:["Physical illness never requires mental health support","Chronic illness has documented emotional and psychological impacts that can worsen overall health outcomes","Mental health providers cannot help with chronic illness","Depression is unrelated to chronic illness"], a:1, d:"hard"},
            {t:"The text emphasizes seeking help early when coping becomes difficult. The rationale behind early intervention is that:", o:["It guarantees a complete cure of the chronic illness","It helps understand and deal with many effects before they compound and worsen","Early intervention is cheaper but less effective","There is no benefit to early intervention"], a:1, d:"hard"},
            {t:"Which of the following scenarios represents a negative coping mechanism that the text explicitly warns against?", o:["Practicing meditation regularly","Using alcohol to manage stress from chronic illness","Joining a disease-specific support group","Maintaining a healthy diet"], a:1, d:"hard"},
            {t:"A chronically ill patient reports irritability, loss of interest in hobbies, disturbed sleep, and body aches. According to the content, these are classified as:", o:["Sources of stress","Stress symptoms","Activities of daily living","Coping mechanisms"], a:1, d:"hard"},
            {t:"The distinction between individual counseling and support groups for chronic illness management is that:", o:["Support groups provide medication while individual counseling does not","Individual counseling allows expression of sensitive and private feelings, while support groups enable shared learning from others' coping strategies","There is no meaningful difference","Individual counseling is always inferior to support groups"], a:1, d:"hard"},
            {t:"Which of the following best represents the holistic impact of chronic illness as described in the content?", o:["It only causes physical symptoms","It affects physical health, mental health, social life, finances, lifestyle, emotional well-being, and requires specific coping mechanisms","It primarily causes financial problems only","It has minimal impact on quality of life"], a:1, d:"hard"},
            {t:"A patient with chronic illness feels dependent on others for care and experiences reduced quality of life. These effects primarily fall under:", o:["Financial impact and social life","Emotional well-being, specifically loss of independence and reduced quality of life","Coping mechanisms and lifestyle","Physical health and mental health only"], a:1, d:"hard"},
            {t:"According to the material, the treatment plan designed by a mental health care provider aims to:", o:["Replace all physical medical treatment","Help the patient regain a sense of control and improve quality of life","Only address financial difficulties","Eliminate the need for medication entirely"], a:1, d:"hard"},
            {t:"When the text mentions 'letting go of obligations that you don't really need to do or want to do,' this strategy primarily addresses:", o:["Financial strain","Physical symptoms","Stress reduction by decreasing unnecessary burdens","Social isolation"], a:2, d:"hard"},
            {t:"A patient's chronic illness has led to job loss, inability to afford medications, and added stress. This cascade of effects best demonstrates:", o:["That financial impact is isolated from other effects","How financial strain interconnects with physical health management and emotional stress","That employment issues are unrelated to chronic illness","That stress has no financial component"], a:1, d:"hard"},
            {t:"The text states that chronic illness 'requires resilience and support from various sources.' The term 'various sources' most comprehensively refers to:", o:["Only healthcare providers","Only family members","Healthcare professionals, mental health counselors, support groups, and loved ones","Only medication"], a:2, d:"hard"},
            {t:"A patient who was once socially active now avoids all gatherings due to their chronic illness. According to the content, this behavior would contribute to:", o:["Improved physical health","Enhanced financial stability","Loneliness, a sense of disconnection, and potential worsening of emotional distress","Better disease management"], a:2, d:"hard"},
            {t:"Which of the following best explains why the text recommends BOTH professional help AND self-help strategies for chronic illness management?", o:["Because self-help strategies alone are always sufficient","Because professional treatment alone addresses every aspect of living with chronic illness","Because a comprehensive approach combining professional guidance with daily self-care strategies provides the most effective management of the complex, multifaceted challenges of chronic illness","Because the two approaches are completely unrelated"], a:2, d:"hard"},
            {t:"Chronic illnesses typically last less than a month.", o:["True","False"], a:1, d:"easy"},
            {t:"Diabetes is an example of a chronic disease.", o:["True","False"], a:0, d:"easy"},
            {t:"Activities of daily living include tasks such as using the toilet and getting dressed.", o:["True","False"], a:0, d:"easy"},
            {t:"Chronic illness only affects the patient and has no impact on their family.", o:["True","False"], a:1, d:"easy"},
            {t:"Financial strain is one of the factors that makes coping with chronic illness challenging.", o:["True","False"], a:0, d:"medium"},
            {t:"Alcohol use is recommended as a positive coping mechanism for chronic illness.", o:["True","False"], a:1, d:"medium"},
            {t:"Support groups provide an environment where patients can learn new coping strategies from others.", o:["True","False"], a:0, d:"medium"},

/* ============ ENGINE ============ */
const LETTERS = ['A','B','C','D','E','F'];
let questions, i, correct, wrong, answers, wrongSet, answered;
let totalTime = 40*60, timeLeft, timerInterval;

function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

/* shuffle options inside a question, keeping track of the correct answer */
function shuffleOptions(q) {
  const opts = q.o.map((o, idx) => ({ o, isCorrect: idx === q.a }));
  shuffle(opts);
  return {
    ...q,
    o: opts.map(x => x.o),
    a: opts.findIndex(x => x.isCorrect)
  };
}

function init(pool) {
  questions = shuffle([...pool]).map(shuffleOptions);
  i=0; correct=0; wrong=0; answered=0;
  answers = new Array(questions.length).fill(null);
  wrongSet = [];
  timeLeft = totalTime;
  document.getElementById('totalBadge').textContent = questions.length + ' Questions';
  startTimer(); render();
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    const m = Math.floor(timeLeft/60), s = timeLeft%60;
    document.getElementById('timerTxt').textContent = `${m}:${s<10?'0':''}${s}`;
    const b = document.getElementById('timerBadge');
    if (timeLeft<=120)      b.className='timer-badge danger';
    else if (timeLeft<=300) b.className='timer-badge warn';
    if (timeLeft<=0) { clearInterval(timerInterval); finish(); }
  }, 1000);
}

function updateTop() {
  const total = questions.length;
  document.getElementById('sCorrect').textContent = correct;
  document.getElementById('sWrong').textContent   = wrong;
  document.getElementById('sRemain').textContent  = Math.round(((total-answered)/total)*100)+'%';
  document.getElementById('progLabel').textContent = 'Q '+(i+1)+' / '+total;
  document.getElementById('progFill').style.width  = ((i+1)/total*100)+'%';
  document.getElementById('prog-bar').style.width  = ((i+1)/total*100)+'%';
}

function render() {
  updateTop();
  const q = questions[i];
  document.getElementById('app').innerHTML = `
    <div class="q-card">
      <div class="q-header"><div class="q-num">Question ${i+1} / ${questions.length}</div></div>
      <div class="q-text">${q.t}</div>
      <div class="options">
        ${q.o.map((o,idx)=>`
          <div class="opt" id="opt${idx}" onclick="choose(${idx})">
            <div class="opt-letter">${LETTERS[idx]}</div>
            ${o}
          </div>`).join('')}
      </div>
      <div class="nav-btns">
        <button class="btn btn-skip" onclick="skip()"><i class="fa-solid fa-forward"></i> Skip</button>
      </div>
    </div>`;
}

function choose(v) {
  if (answers[i]!==null) return;
  answers[i]=v; answered++;
  const q=questions[i], ok=v===q.a;
  ok?correct++:wrong++;
  updateTop();
  q.o.forEach((_,idx)=>{
    const el=document.getElementById('opt'+idx);
    el.classList.add('disabled');
    if (idx===q.a) el.classList.add('correct');
    else if (idx===v) el.classList.add('wrong');
  });
  const fb=document.createElement('div');
  fb.className='feedback-bar '+(ok?'ok':'no');
  fb.innerHTML=ok
    ?`<span class="feedback-icon">🎉</span><span>ما شاء الله عليك</span>`
    :`<span class="feedback-icon">😔</span><span>ركز يا سكر</span>`;
  const card=document.querySelector('.q-card');
  card.querySelector('.options').after(fb);
  if (q.exp) {
    const exp=document.createElement('div');
    exp.className='explanation';
    exp.innerHTML='<b>💬 Explanation:</b> '+q.exp;
    fb.after(exp);
  }
  card.querySelector('.nav-btns').innerHTML=`
    <button class="btn btn-next" onclick="next()">
      ${i<questions.length-1
        ?'<i class="fa-solid fa-arrow-right"></i> Next Question'
        :'<i class="fa-solid fa-flag-checkered"></i> Finish Exam'}
    </button>`;
}

function skip() {
  if (answers[i]===null) { answers[i]=-1; answered++; wrong++; wrongSet.push(questions[i]); updateTop(); }
  next();
}

function next() {
  if (i<questions.length-1) { i++; render(); window.scrollTo({top:0,behavior:'smooth'}); }
  else finish();
}

function finish() {
  clearInterval(timerInterval);
  const total=questions.length;
  const score=Math.round((correct/total)*100);
  questions.forEach((q,idx)=>{ if(answers[idx]!==q.a) wrongSet.push({...q,myAns:answers[idx]}); });
  wrongSet=[...new Map(wrongSet.map(q=>[q.t,q])).values()];
  let grade,gc;
  if(score>=90)      { grade='🥇 Excellent';      gc='var(--success)'; }
  else if(score>=75) { grade='🥈 Very Good';       gc='var(--accent)'; }
  else if(score>=60) { grade='🥉 Good';            gc='var(--warn)'; }
  else               { grade='📚 Needs Review';    gc='var(--danger)'; }
  const circ=2*Math.PI*45, offset=circ-(score/100)*circ;
  const report=questions.map((q,idx)=>{
    const ok=answers[idx]===q.a;
    return `<div class="report-item ${ok?'ok':'no'}">
      <div class="ri-q">${ok?'✅':'❌'} ${q.t}</div>
      ${!ok?`
        <div class="ri-row"><span class="ri-badge ri-yours">Your Answer</span>${answers[idx]>=0?q.o[answers[idx]]:'Skipped'}</div>
        <div class="ri-row"><span class="ri-badge ri-right">Correct</span>${q.o[q.a]}</div>
      `:''}
    </div>`;
  }).join('');
  document.getElementById('prog-bar').style.width='100%';
  document.getElementById('app').innerHTML=`
    <div class="result-hero">
      <div class="score-ring">
        <svg viewBox="0 0 110 110">
          <circle class="ring-bg"   cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="0"/>
          <circle class="ring-fill" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            style="stroke:${gc}" id="ringFill"/>
        </svg>
        <div class="score-num">${score}</div>
        <div class="score-pct">%</div>
      </div>
      <div class="result-grade" style="color:${gc}">${grade}</div>
      <div class="result-sub">Answered ${answered} of ${total} questions</div>
      <div class="result-stats">
        <div class="rs"><div class="n" style="color:var(--success)">${correct}</div><div class="l">Correct</div></div>
        <div class="rs"><div class="n" style="color:var(--danger)">${wrong}</div><div class="l">Wrong</div></div>
        <div class="rs"><div class="n" style="color:var(--accent)">${total-answered<0?0:total-answered}</div><div class="l">Skipped</div></div>
      </div>
    </div>
    <div class="result-actions">
      ${wrongSet.length?`<button class="btn btn-retry" onclick="retryWrong()"><i class="fa-solid fa-rotate-right"></i> Retry Wrong (${wrongSet.length})</button>`:''}
      <button class="btn btn-home" onclick="init(QUESTIONS)"><i class="fa-solid fa-shuffle"></i> New Random Exam</button>
      <a href="https://gaith-team.github.io/exam/level1/palliative-care/index.html" class="btn btn-home" style="text-decoration:none;"><i class="fa-solid fa-house"></i> Back to Subject</a>
    </div>
    <div style="margin-top:24px">
      <div style="font-size:14px;font-weight:700;margin-bottom:10px;color:var(--text2);">📋 Detailed Report</div>
      ${report}
    </div>`;
  setTimeout(()=>{document.getElementById('ringFill').style.strokeDashoffset=offset;},100);
  window.scrollTo({top:0,behavior:'smooth'});
}

function retryWrong() {
  const pool=[...wrongSet];
  questions=shuffle(pool).map(shuffleOptions); i=0; correct=0; wrong=0;
  answers=new Array(questions.length).fill(null);
  wrongSet=[]; answered=0; timeLeft=totalTime;
  startTimer(); render();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* THEME */
const themeBtn=document.getElementById('themeBtn');
let theme=localStorage.getItem('theme')||'light';
function applyTheme(t) {
  theme=t;
  document.documentElement.setAttribute('data-theme',t==='dark'?'dark':'');
  themeBtn.textContent=t==='dark'?'☀️':'🌙';
  localStorage.setItem('theme',t);
}
applyTheme(theme);
themeBtn.addEventListener('click',()=>applyTheme(theme==='dark'?'light':'dark'));

init(QUESTIONS);
</script>
