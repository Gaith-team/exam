<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> GHAITH TEAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent:       #0284c7;
  --accent-light: #0ea5e9;
  --accent-dark:  #0369a1;
  --accent-glow:  rgba(2,132,199,0.2);
  --bg:      #f8fafc;
  --bg2:     #eef2f7;
  --card:    #ffffff;
  --text:    #1a2332;
  --text2:   #4a5568;
  --text3:   #718096;
  --bc:      rgba(0,0,0,0.07);
  --success: #16a34a;
  --danger:  #dc2626;
  --warn:    #0369a1;
  --r:       16px;
  --tr:      all 0.3s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg:   #0d1117; --bg2: #161b22; --card: #1c2333;
  --text: #e6edf3; --text2: #b1bac4; --text3: #7d8590;
  --bc:   rgba(255,255,255,0.08);
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
  transition: background .4s, color .4s;
}

/* PROGRESS TOP */
#prog-bar {
  position: fixed; top: 0; left: 0; height: 3px; z-index: 999;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  transition: width .2s;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 64px;
  background: rgba(248,250,252,.93); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--bc); transition: var(--tr);
}
[data-theme="dark"] nav { background: rgba(13,17,23,.95); }

.nav-back {
  display: flex; align-items: center; gap: 7px;
  color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 700;
  padding: 7px 13px; border-radius: 8px; border: 1px solid var(--bc);
  background: var(--card); transition: var(--tr);
}
.nav-back:hover { color: var(--accent); border-color: var(--accent-glow); transform: translateX(3px); }
.nav-brand { display: flex; align-items: center; gap: 9px; font-size: 15px; font-weight: 900; color: var(--text); }
.nav-logo-icon {
  width: 34px; height: 34px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 900;
}
.nav-right { display: flex; align-items: center; gap: 8px; }
.theme-btn {
  width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--bc);
  background: var(--card); cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center; transition: var(--tr);
}
.theme-btn:hover { border-color: var(--accent); transform: rotate(20deg); }

/* HERO BAND */
.hero-band {
  margin-top: 64px;
  background: linear-gradient(135deg, var(--accent-dark), var(--accent), var(--accent-light));
  padding: 40px 24px 36px; text-align: center;
  position: relative; overflow: hidden;
}
.hero-band::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 600px 200px at 50% 100%, rgba(255,255,255,.12) 0%, transparent 70%);
}
.hero-band-icon {
  width: 68px; height: 68px; border-radius: 20px;
  background: rgba(255,255,255,.2); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; margin: 0 auto 14px; border: 1.5px solid rgba(255,255,255,.35);
}
.hero-band h1 { font-size: clamp(20px,4vw,30px); font-weight: 900; color: #fff; margin-bottom: 6px; }
.hero-band p { font-size: 13px; color: rgba(255,255,255,.8); }
.hero-band-meta {
  display: flex; justify-content: center; gap: 24px; margin-top: 20px;
  flex-wrap: wrap;
}
.meta-pill {
  background: rgba(255,255,255,.18); backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,.3); border-radius: 50px;
  padding: 6px 16px; font-size: 12px; font-weight: 700; color: #fff;
  display: flex; align-items: center; gap: 6px;
}

/* EXAM SHELL */
.shell { max-width: 560px; margin: 0 auto; padding: 24px 20px 80px; }

/* STATS ROW */
.stats-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px;
}
.stat-box {
  background: var(--card); border: 1px solid var(--bc); border-radius: var(--r);
  padding: 12px 10px; text-align: center;
}
.stat-box .val { font-size: 20px; font-weight: 900; }
.stat-box .lbl { font-size: 11px; color: var(--text3); margin-top: 2px; }
.stat-correct { color: var(--success); }
.stat-wrong   { color: var(--danger); }
.stat-remain  { color: var(--accent); }

/* PROGRESS STRIP */
.prog-strip {
  background: var(--card); border: 1px solid var(--bc); border-radius: var(--r);
  padding: 14px 16px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 14px;
}
.prog-label { font-size: 13px; font-weight: 700; color: var(--text2); white-space: nowrap; }
.prog-track { flex: 1; height: 8px; background: var(--bg2); border-radius: 8px; overflow: hidden; }
.prog-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  border-radius: 8px; transition: width .4s;
}
.timer-badge {
  min-width: 64px; height: 36px; border-radius: 18px;
  background: var(--bg2); border: 1px solid var(--bc);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 900; color: var(--text);
  gap: 5px; padding: 0 12px; flex-shrink: 0;
}
.timer-badge.warn { color: var(--warn); border-color: rgba(217,119,6,.3); background: rgba(217,119,6,.08); }
.timer-badge.danger { color: var(--danger); border-color: rgba(220,38,38,.3); background: rgba(220,38,38,.08); animation: pulse .8s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

/* QUESTION CARD */
.q-card {
  background: var(--card); border: 1px solid var(--bc);
  border-radius: 20px; overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,.06);
  transition: box-shadow .3s;
}
.q-header {
  background: linear-gradient(135deg, var(--accent-dark), var(--accent));
  padding: 4px 18px 4px;
  display: flex; align-items: center; gap: 8px;
}
.q-num {
  background: rgba(255,255,255,.2); border-radius: 8px;
  padding: 3px 10px; font-size: 11px; font-weight: 700; color: #fff;
}
.q-text {
  padding: 22px 18px 14px; font-size: 15px; font-weight: 700; color: var(--text);
  line-height: 1.65; border-bottom: 1px solid var(--bc);
  text-align: left; direction: ltr;
}
.options { padding: 14px 18px 18px; display: flex; flex-direction: column; gap: 10px; }

/* OPTION */
.opt {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; border-radius: 12px;
  border: 1.5px solid var(--bc); background: var(--bg);
  cursor: pointer; font-size: 14px; font-weight: 600; color: var(--text);
  transition: var(--tr); user-select: none;
  direction: ltr; text-align: left;
}
.opt:hover:not(.disabled) {
  border-color: var(--accent); background: var(--accent-glow);
  transform: translateX(3px);
}
.opt-letter {
  width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
  background: var(--bg2); border: 1px solid var(--bc);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 900; color: var(--text3);
  transition: var(--tr);
}
.opt.correct {
  border-color: var(--success); background: rgba(22,163,74,.08);
}
.opt.correct .opt-letter {
  background: var(--success); color: #fff; border-color: var(--success);
}
.opt.wrong {
  border-color: var(--danger); background: rgba(220,38,38,.07);
}
.opt.wrong .opt-letter {
  background: var(--danger); color: #fff; border-color: var(--danger);
}
.opt.disabled { pointer-events: none; }

/* FEEDBACK */
.feedback-bar {
  margin: 14px 18px; padding: 12px 16px; border-radius: 12px;
  display: flex; align-items: center; gap: 10px;
  font-size: 14px; font-weight: 700;
  animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
.feedback-bar.ok { background: rgba(22,163,74,.1); color: var(--success); border: 1px solid rgba(22,163,74,.25); }
.feedback-bar.no { background: rgba(220,38,38,.08); color: var(--danger); border: 1px solid rgba(220,38,38,.2); }
.feedback-icon { font-size: 20px; }

/* EXPLANATION */
.explanation {
  margin: 0 18px 14px; padding: 12px 14px;
  background: rgba(var(--accent-rgb),.06);
  border-radius: 10px; border-right: 3px solid var(--accent);
  font-size: 13px; color: var(--text2); line-height: 1.6;
  display: none;
}

/* NAV BTNS */
.nav-btns { padding: 4px 18px 18px; display: flex; gap: 10px; }
.btn {
  flex: 1; padding: 13px; border: none; border-radius: 12px;
  font-size: 14px; font-weight: 900; cursor: pointer;
  font-family: 'Outfit', sans-serif; transition: var(--tr);
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.btn-next {
  background: linear-gradient(135deg, var(--accent-dark), var(--accent));
  color: #fff; box-shadow: 0 4px 14px var(--accent-glow);
}
.btn-next:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
.btn-skip {
  background: var(--bg2); color: var(--text2); border: 1px solid var(--bc); flex: 0 0 auto; padding: 13px 18px;
}
.btn-skip:hover { border-color: var(--warn); color: var(--warn); }

/* ===== RESULTS ===== */
.result-hero {
  text-align: center; padding: 36px 20px 28px;
  background: var(--card); border-radius: 20px;
  border: 1px solid var(--bc); margin-bottom: 20px;
  box-shadow: 0 4px 20px rgba(0,0,0,.06);
}
.score-ring {
  width: 110px; height: 110px; border-radius: 50%; margin: 0 auto 18px;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; border: 5px solid var(--bg2);
  position: relative;
}
.score-ring svg { position: absolute; inset: -5px; width: calc(100% + 10px); height: calc(100% + 10px); transform: rotate(-90deg); }
.score-ring circle { fill: none; stroke-width: 5; stroke-linecap: round; }
.ring-bg { stroke: var(--bg2); }
.ring-fill { stroke: var(--accent); transition: stroke-dashoffset 1s ease; }
.score-num { font-size: 28px; font-weight: 900; color: var(--text); }
.score-pct { font-size: 12px; color: var(--text3); }
.result-grade { font-size: 22px; font-weight: 900; margin-bottom: 6px; }
.result-sub { font-size: 14px; color: var(--text2); }
.result-stats {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 20px;
}
.rs { background: var(--bg2); border-radius: 10px; padding: 12px 8px; text-align: center; }
.rs .n { font-size: 20px; font-weight: 900; }
.rs .l { font-size: 11px; color: var(--text3); }

/* REPORT ITEMS */
.report-item {
  background: var(--card); border: 1px solid var(--bc); border-radius: 14px;
  padding: 16px; margin-bottom: 10px; border-right: 4px solid var(--bc);
}
.report-item.ok { border-right-color: var(--success); }
.report-item.no { border-right-color: var(--danger); }
.report-item .ri-q { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
.report-item .ri-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; margin-top: 5px; color: var(--text2);
}
.ri-badge {
  padding: 2px 8px; border-radius: 6px; font-weight: 700; font-size: 11px; flex-shrink: 0;
}
.ri-yours { background: rgba(220,38,38,.1); color: var(--danger); }
.ri-right { background: rgba(22,163,74,.1); color: var(--success); }

.result-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
.btn-retry { background: linear-gradient(135deg, var(--accent-dark), var(--accent)); color: #fff; }
.btn-retry:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
.btn-home { background: var(--bg2); color: var(--text); border: 1px solid var(--bc); }
.btn-home:hover { border-color: var(--accent); color: var(--accent); }

/* FOOTER */
footer {
  background: var(--bg2); border-top: 1px solid var(--bc);
  padding: 22px 24px; display: flex; align-items: center;
  justify-content: space-between; flex-wrap: wrap; gap: 10px;
}
.footer-brand { font-size: 14px; font-weight: 700; }
.footer-brand span { color: var(--accent); }
.footer-tg { display: flex; align-items: center; gap: 5px; text-decoration: none; color: #229ED9; font-size: 12px; font-weight: 600; }

@media (max-width: 480px) {
  nav { padding: 0 14px; }
  .shell { padding: 16px 14px 60px; }
  .nav-brand span { display: none; }
  .hero-band { padding: 30px 16px 28px; }
}
</style>
</head>

<script>
const QUESTIONS = [
{t:"What is an intravenous cannula?",o:["A long rigid tube placed into an artery","A short flexible tube placed into a vein","A needle used for intramuscular injections","A tube placed into the subcutaneous tissue"],a:1,d:"easy",type:"mcq",exp:"An IV cannula is defined as a short flexible tube placed into a vein to administer medication."},
{t:"Which part of the IV cannula allows the nurse to confirm venous placement by seeing blood flow back?",o:["Luer Lock Plug","Valve","Flashback Chamber","Bushing"],a:2,d:"easy",type:"mcq",exp:"The Flashback Chamber shows blood returning when the vein is punctured, confirming correct placement."},
{t:"Which cannula gauge is color-coded ORANGE and used for large volume replacement?",o:["16G","18G","14G","20G"],a:2,d:"easy",type:"mcq",exp:"Orange = 14G, used for large volume replacement."},
{t:"A GREY cannula (16G) is commonly used for:",o:["Pediatric patients","IV maintenance","Rapid transfusion of whole blood or blood components","IV analgesia"],a:2,d:"easy",type:"mcq",exp:"Grey 16G is used for rapid transfusion of whole blood or blood components."},
{t:"Which gauge cannula is recommended for pediatric and neonatal patients only (Violet)?",o:["22G","24G","26G","20G"],a:2,d:"medium",type:"mcq",exp:"Violet 26G is for specific use on pediatric and neonatal patients."},
{t:"Regarding cannula size: which statement is CORRECT?",o:["The larger the number, the larger the cannula","The smaller the number, the larger the cannula","Gauge has no relation to cannula size","All gauges are the same size"],a:1,d:"easy",type:"mcq",exp:"The smaller the gauge number, the larger the cannula size."},
{t:"For long-term IV therapy (several days to weeks), which site is preferred?",o:["Back of the hand","Wrist superficial veins","Subclavian or internal jugular vein","Lower arm"],a:2,d:"medium",type:"mcq",exp:"Long-term therapy requires a long catheter inserted into the subclavian or internal jugular vein."},
{t:"Which of the following is NOT an indication for peripheral venous cannulation?",o:["Administration of IV fluids","Administration of blood products","Routine oral medication","Drug administration"],a:2,d:"easy",type:"mcq",exp:"Oral medication does not require IV cannulation. Indications include fluids, blood products, and IV drugs."},
{t:"A GOOD vein for cannulation is described as:",o:["Tortuous and hard","Soft, bouncy and refills when depressed","Scarred and near a fistula","Non-palpable and non-visible"],a:1,d:"easy",type:"mcq",exp:"Good veins are soft, bouncy, refill when depressed, have a large lumen, and are straight."},
{t:"Which site is CONTRAINDICATED for venipuncture?",o:["Back of the hand","Lower arm","Arm on the side of mastectomy","Non-dominant arm"],a:2,d:"medium",type:"mcq",exp:"The arm on the side of mastectomy is contraindicated for venipuncture."},
{t:"How long should a tourniquet remain applied?",o:["No more than 5 minutes","No more than 2 minutes","No more than 10 minutes","As long as needed"],a:1,d:"easy",type:"mcq",exp:"The tourniquet should not be left on for longer than 2 minutes."},
{t:"Which method improves vein prominence by encouraging venodilatation?",o:["Applying ice pack","Elevating the arm above heart level","Applying a warm pack","Tightening the tourniquet longer"],a:2,d:"medium",type:"mcq",exp:"Heat in the form of a warm pack encourages venodilatation and venous filling."},
{t:"Extravasation occurs when:",o:["Air enters the IV line","A cannula dislodges from the vein causing backflow into surrounding tissue","Blood leaks into tissue from a puncture site","The vein becomes inflamed"],a:1,d:"medium",type:"mcq",exp:"Extravasation is the infiltration of a drug from an IV line into surrounding tissue when the cannula pulls out of the vein."},
{t:"The correct nursing intervention for early extravasation is:",o:["Apply warm compress","Apply ice pack","Remove and replace cannula only","Apply pressure bandage"],a:1,d:"medium",type:"mcq",exp:"For early extravasation: remove cannula, elevate arm, and apply ice pack (warm compress for late)."},
{t:"Phlebitis is defined as:",o:["Formation of a thrombus in the vein","Inflammation of the vein","Blood leaking into surrounding tissue","Cessation of fluid infusion"],a:1,d:"easy",type:"mcq",exp:"Phlebitis is inflammation of the vein, often when the cannula is too large for the vein."},
{t:"Which complication is described as slowing or cessation of fluid infusion due to fibrin formation?",o:["Hematoma","Phlebitis","Occlusion","Extravasation"],a:2,d:"medium",type:"mcq",exp:"Occlusion is the slowing or cessation of infusion due to fibrin formation or mechanical kinking."},
{t:"Thrombophlebitis usually occurs after:",o:["Extravasation","Hematoma","Phlebitis","Occlusion"],a:2,d:"medium",type:"mcq",exp:"Thrombophlebitis is the formation of a thrombus and inflammation, usually occurring after phlebitis."},
{t:"How frequently should an IV cannula be changed to prevent thrombophlebitis?",o:["Every 12-24 hours","Every 48-72 hours","Every week","Only when infected"],a:1,d:"medium",type:"mcq",exp:"Cannula should be changed every 48-72 hours to prevent thrombophlebitis."},
{t:"A hematoma occurs when:",o:["Drug infiltrates surrounding tissue","Blood leaks into tissues during or after vein puncture","Air enters the circulatory system","The vein becomes infected"],a:1,d:"easy",type:"mcq",exp:"A hematoma is caused by blood leaking into the tissues during or after vein puncture."},
{t:"Which cannula color code is used for IV maintenance in general adult patients?",o:["Orange","Grey","Green","Pink"],a:2,d:"easy",type:"mcq",exp:"Green 18G is used for IV maintenance."},
{t:"Symptoms of infection at an IV site include all EXCEPT:",o:["Pain and warmth","Edema and induration","Fever and elevated WBC (systemic)","Bradycardia"],a:3,d:"medium",type:"mcq",exp:"Infection symptoms are local (pain, warmth, edema, induration, malodorous drainage) and systemic (fever, chills, malaise, elevated WBC). Bradycardia is not listed."},
{t:"Air embolism from an IV catheter can be FATAL and presents with:",o:["Bradycardia, high BP, euphoria","Hypotension, tachycardia, difficulty breathing, cyanosis","Only local swelling at IV site","Increased urine output"],a:1,d:"medium",type:"mcq",exp:"Air embolism symptoms: hypotension, tachycardia, difficulty breathing, cyanosis. It can be fatal."},
{t:"The equipment needed for IV cannulation includes all EXCEPT:",o:["Alcohol wipe and tourniquet","Saline solution and syringe","Sharps bin","Arterial pressure monitor"],a:3,d:"easy",type:"mcq",exp:"Equipment: gloves, alcohol wipe, tourniquet, IV cannula, plaster, syringe, saline, sharps bin. Arterial pressure monitor is not in the standard list."},
{t:"Which vein site is preferred for SHORT-TERM IV therapy?",o:["Subclavian vein","Internal jugular vein","Veins at the back of the hand","Femoral vein"],a:2,d:"easy",type:"mcq",exp:"Short-term therapy uses veins at the back of the hand, superficial wrist, and lower arm."},
{t:"A BLUE cannula (22G) is suitable for:",o:["Large volume replacement","Rapid blood transfusion","Pediatrics, elderly, chemotherapy patients","IV maintenance in adults"],a:2,d:"easy",type:"mcq",exp:"Blue 22G is used for pediatrics, elderly patients, and chemotherapy patients."},
{t:"'Milking the vein upward' is a technique used to:",o:["Prevent infection","Improve venous access and vein prominence","Secure the cannula in place","Remove air from the IV line"],a:1,d:"medium",type:"mcq",exp:"Milking the vein upward is one of several methods to improve venous access."},
{t:"Which of the following is a contraindicated site for IV cannulation?",o:["Arm with a healthy radial vein","Non-dominant hand","Edematous areas","Lower arm of a healthy adult"],a:2,d:"easy",type:"mcq",exp:"Edematous areas are contraindicated for IV cannulation along with other listed sites."},
{t:"The Pink cannula (20G) is typically used for:",o:["IV maintenance","IV analgesia","Neonates","Large volume replacement"],a:1,d:"easy",type:"mcq",exp:"Pink 20G is used for IV analgesia."},
{t:"A YELLOW cannula (24G) is used for:",o:["Adult emergencies","Rapid blood transfusion","Pediatrics and neonates","Chemotherapy in adults"],a:2,d:"easy",type:"mcq",exp:"Yellow 24G is used for pediatrics and neonates."},
{t:"Symptoms of phlebitis at an IV site include:",o:["Erythema, edema, warmth, pain and a red streak along the vein","Only slight discomfort","Systemic fever only","Severe bleeding at site"],a:0,d:"medium",type:"mcq",exp:"Phlebitis symptoms: erythema, edema, warmth, pain; the vein may be indurated with a red streak along the superficial vein."},
 
// IV INFUSION THERAPY (31-55)
{t:"An intravenous infusion is defined as:",o:["Oral administration of prescribed fluids","Introduction of prescribed sterile fluid into blood circulation","Subcutaneous injection of medications","Topical application of therapeutic agents"],a:1,d:"easy",type:"mcq",exp:"IV infusion is the introduction of prescribed sterile fluid into the blood circulation."},
{t:"Which IV solution is classified as ISOTONIC?",o:["0.45% sodium chloride","3% sodium chloride","0.9% sodium chloride","10% dextrose in water"],a:2,d:"easy",type:"mcq",exp:"0.9% sodium chloride (normal saline) is an isotonic solution with ~310 mEq/L electrolyte content."},
{t:"A hypotonic solution has a total electrolyte content of:",o:["Approximately 310 mEq/L","Less than 250 mEq/L","375 mEq/L or greater","500 mEq/L"],a:1,d:"medium",type:"mcq",exp:"Hypotonic solutions have a total electrolyte content less than 250 mEq/L."},
{t:"Which solution is HYPERTONIC?",o:["0.9% NaCl","Lactated Ringer's","5% dextrose in water","5% dextrose in lactated Ringer's"],a:3,d:"medium",type:"mcq",exp:"Hypertonic solutions include 3-5% NaCl, 5% dextrose in lactated Ringer's, and 10% dextrose in water (≥375 mEq/L)."},
{t:"Using the formula: Total volume × drop factor ÷ total time (minutes) — a 500 ml bag with drop factor 15 over 4 hours gives approximately:",o:["15 drops/min","20 drops/min","31 drops/min","45 drops/min"],a:2,d:"hard",type:"mcq",exp:"500×15÷240 = 31.2 ≈ 31 drops/min."},
{t:"Speed shock in IV therapy is described as:",o:["Formation of blood clot in the IV line","The body's reaction to a substance injected too rapidly","Air entering the circulatory system","Occlusion of the catheter tip"],a:1,d:"medium",type:"mcq",exp:"Speed shock is the body's reaction to a substance injected into the circulatory system too rapidly."},
{t:"Catheter embolism in IV therapy refers to:",o:["Entry of air into circulation","Entry of broken catheter pieces into the circulatory system","Infiltration of fluid into surrounding tissue","Infection at the catheter site"],a:1,d:"medium",type:"mcq",exp:"Catheter embolism is the entry of pieces of broken catheter into the circulatory system."},
{t:"The nurse's responsibility in IV therapy includes all EXCEPT:",o:["Verify amount and type of solution","Observe if IV line remains patent","Prescribe the IV fluid","Adjust the rate of flow"],a:2,d:"easy",type:"mcq",exp:"Prescribing IV fluid is the physician's role. The nurse verifies, administers, monitors and documents."},
{t:"Air embolism in IV therapy can be prevented by:",o:["Applying warm compress to the site","Changing the cannula frequently","Proper priming to remove air bubbles from the solution","Elevating the arm"],a:2,d:"medium",type:"mcq",exp:"Air embolism is prevented by proper priming to remove air bubbles from the IV solution."},
{t:"Which nursing diagnosis is appropriate for a patient receiving IV infusion?",o:["Impaired skin integrity only","Risk for deficient fluid volume and risk for infection","Only risk for bleeding","Risk for constipation"],a:1,d:"medium",type:"mcq",exp:"Nursing diagnoses include: Risk for Deficient Fluid Volume, Risk for Shock, Risk for Infection."},
{t:"Hematoma during IV infusion therapy is usually caused by:",o:["Too slow infusion rate","Excessive probing with needle or needle only partially in vein","Hypertonic solution use","Too large a bag of fluid"],a:1,d:"medium",type:"mcq",exp:"Hematoma usually occurs due to excessive probing with the needle or the needle being only partially in the vein."},
{t:"Infiltration in IV therapy is normally due to:",o:["Hypertonic solution used","IV catheter inadequately secured","Wrong gauge cannula","Running IV too fast"],a:1,d:"medium",type:"mcq",exp:"Infiltration is normally due to the IV catheter being inadequately secured, allowing fluid to enter surrounding tissue."},
{t:"5% dextrose in water is classified as which type of solution?",o:["Hypertonic","Hypotonic","Isotonic","Colloid"],a:2,d:"medium",type:"mcq",exp:"5% dextrose in water is an isotonic solution, as listed with 0.9% NaCl and lactated Ringer's."},
{t:"0.45% sodium chloride is classified as:",o:["Isotonic","Hypertonic","Hypotonic","Colloid"],a:2,d:"easy",type:"mcq",exp:"0.45% NaCl is a hypotonic solution with electrolyte content less than 250 mEq/L."},
{t:"The expected outcome when initiating peripheral IV infusion is:",o:["Multiple insertion attempts are acceptable","The access device is inserted using sterile technique on the first attempt","Mild trauma to vein is expected","IV may or may not infuse well"],a:1,d:"easy",type:"mcq",exp:"Expected outcomes: device inserted with sterile technique on first attempt, minimal patient trauma, IV solution infuses without difficulty."},
{t:"Which assessment should be done BEFORE starting IV therapy?",o:["Only check the patient's name","Review vital signs, intake/output, and lab values","Only verify IV fluid type","Check patient's appetite only"],a:1,d:"easy",type:"mcq",exp:"Before IV therapy, review baseline data: vital signs, intake/output, laboratory values, and determine the best accessible vein."},
{t:"The antecubital vein should:",o:["Always be used first for IV therapy","Only be used if no other vein is available","Be used for all long-term therapy","Never be assessed"],a:1,d:"medium",type:"mcq",exp:"Do not use the antecubital vein if another vein is available."},
{t:"The drop factor in IV flow rate calculation refers to:",o:["The volume of the bag","The number of drops per milliliter of the IV tubing set","The patient's weight","The rate of heart contractions"],a:1,d:"medium",type:"mcq",exp:"Drop factor is the number of drops per mL of the IV infusion tubing set (e.g., 15 drops/mL)."},
{t:"Lactated Ringer's solution is classified as:",o:["Hypotonic","Hypertonic","Isotonic","Colloid"],a:2,d:"easy",type:"mcq",exp:"Lactated Ringer's solution is isotonic with ~310 mEq/L electrolyte content."},
{t:"3% sodium chloride solution is classified as:",o:["Isotonic","Hypotonic","Hypertonic","Neutral"],a:2,d:"medium",type:"mcq",exp:"3-5% NaCl is hypertonic with ≥375 mEq/L electrolyte content."},
{t:"Which site for IV in an adult should be avoided unless other sites are inaccessible?",o:["Back of hand","Lower arm","Vein in the leg","Wrist"],a:2,d:"medium",type:"mcq",exp:"Do not use a vein in the leg of an adult unless other sites are inaccessible."},
{t:"An IV infusion is indicated for all of the following EXCEPT:",o:["Severe dehydration","Replacement of severe fluid loss from burns","Prevention of seasonal allergies","Parenteral nutrition"],a:2,d:"easy",type:"mcq",exp:"IV infusions are indicated for fluid replacement, medications, nutrition, blood products, etc. — not for preventing seasonal allergies."},
{t:"Which PPE is required when starting IV therapy?",o:["Sterile gown and mask always required","Clean gloves at minimum","Only apron needed","No PPE needed for IV insertion"],a:1,d:"easy",type:"mcq",exp:"Clean gloves are part of the equipment list for IV cannulation."},
{t:"What action should the nurse take if the IV infusion rate is too slow?",o:["Ignore it if patient looks well","Check for kinks, raise IV higher, or flush the cannula","Give the patient more oral fluids","Increase the drop factor"],a:1,d:"medium",type:"mcq",exp:"For occlusion/slow infusion: check for kinks, raise IV higher, flush the cannula, or remove and replace cannula."},
{t:"Documentation of IV therapy should include:",o:["Patient name only","Appropriate records including site, solution, rate, and patient response","Only the time started","Only complications if they occur"],a:1,d:"easy",type:"mcq",exp:"The nurse must document appropriate records as part of IV therapy responsibility."},
 
// BLOOD TRANSFUSION (56-80)
{t:"Blood transfusion is defined as:",o:["Administration of oral iron supplements","Infusion of whole blood or blood components into venous circulation","Injection of platelets into muscles","Subcutaneous injection of plasma"],a:1,d:"easy",type:"mcq",exp:"Blood transfusion is the infusion of whole blood or blood components such as plasma, red blood cells, platelets into the patient's venous circulation."},
{t:"Which blood type is the UNIVERSAL DONOR?",o:["Type A","Type B","Type AB","Type O"],a:3,d:"easy",type:"mcq",exp:"Type O is the universal donor; it can donate to all blood types."},
{t:"Which blood type is the UNIVERSAL RECIPIENT?",o:["Type A","Type B","Type AB","Type O"],a:2,d:"easy",type:"mcq",exp:"Type AB is the universal recipient; it can receive A, B, AB, and O blood."},
{t:"Type A blood can receive:",o:["A and B blood only","A and O blood only","All blood types","B and O only"],a:1,d:"easy",type:"mcq",exp:"Type A can receive A and O blood."},
{t:"Type B blood can receive:",o:["A and B only","B and O blood only","All types","O only"],a:1,d:"easy",type:"mcq",exp:"Type B can receive B and O blood."},
{t:"In an emergency with no time to determine blood type, which blood is used?",o:["O positive","AB negative","O negative","A positive"],a:2,d:"medium",type:"mcq",exp:"Type O negative blood is used for emergencies when there is no time to test blood type."},
{t:"A person with Rh-NEGATIVE blood should receive:",o:["Only Rh-negative blood","Either Rh-positive or Rh-negative","Only Rh-positive blood","Type O positive only"],a:0,d:"medium",type:"mcq",exp:"Rh-negative persons should only receive Rh-negative blood."},
{t:"Red blood cells are transfused in cases of:",o:["Hemophilia","Severe anemia","Severe burns","Liver failure"],a:1,d:"easy",type:"mcq",exp:"Red blood cells are transfused in case of severe anemia."},
{t:"Plasma is transfused in cases of:",o:["Severe anemia","Hemophilia only","Severe burns, liver failure, or severe infection","Low platelet count only"],a:2,d:"medium",type:"mcq",exp:"Plasma is transfused for severe burns, liver failure, or severe infection."},
{t:"Platelets and clotting factors are transfused for:",o:["Severe anemia","Hemophilia — inherited bleeding disorder","Severe infection","Organ transplants"],a:1,d:"easy",type:"mcq",exp:"Platelets and clotting factors are transfused for hemophilia, an inherited bleeding disorder where blood doesn't clot normally."},
{t:"The minimum cannula size recommended for blood transfusion is:",o:["24G","22G","20G","18G or larger"],a:3,d:"medium",type:"mcq",exp:"Blood transfusion requires a venous access device of 18G or larger IV."},
{t:"Which solution is used to flush the IV line during blood transfusion?",o:["5% dextrose in water","Lactated Ringer's","0.9% NaCl (Normal Saline)","Sterile water"],a:2,d:"medium",type:"mcq",exp:"0.9% NaCl (Normal Saline) is used with blood transfusions."},
{t:"Blood warmer devices are used during transfusion to prevent:",o:["Infection","Hemorrhage","Complications caused by hypothermia","Air embolism"],a:2,d:"medium",type:"mcq",exp:"Blood warmer devices prevent the complications caused by hypothermia during transfusion."},
{t:"Before a blood transfusion, the nurse should assess:",o:["Only the patient's blood type","Vital signs, heart and lung sounds, urinary output, and IV site","Patient weight only","Skin color only"],a:1,d:"easy",type:"mcq",exp:"Assessment before blood transfusion: measure vital signs, heart and lung sounds, urinary output, review labs, ask about prior reactions, and inspect IV site."},
{t:"A nursing diagnosis during blood transfusion includes:",o:["Risk for injury and excess fluid volume","Constipation only","Altered nutrition only","Impaired mobility only"],a:0,d:"medium",type:"mcq",exp:"Nursing diagnoses for blood transfusion: Risk for Injury, Excess Fluid Volume, Ineffective Peripheral Tissue Perfusion, blood transfusion reaction due to incompatible blood type."},
{t:"Y-tubing with an in-line filter is used during blood transfusion to:",o:["Speed up the transfusion","Filter the blood and allow saline flushing","Prevent air embolism only","Measure blood pressure"],a:1,d:"medium",type:"mcq",exp:"Y tubing with an in-line filter (or blood/platelet administration set and IV set) is used during transfusion."},
{t:"Which is an indication for blood transfusion?",o:["Minor headache","Major surgery and organ transplants","Mild dehydration","Routine IV maintenance"],a:1,d:"easy",type:"mcq",exp:"Indications include: treatment of anemia, severe blood loss, major surgery, organ transplants, cancer therapy, blood disorders, trauma resuscitation, care of premature infants."},
{t:"Mismatched blood transfusions can cause:",o:["Mild itching only","Severe reactions","No significant reaction","Only mild fever"],a:1,d:"easy",type:"mcq",exp:"Mismatched blood transfusions can cause severe reactions."},
{t:"Which piece of equipment is needed at bedside during blood transfusion?",o:["Incentive spirometer","Sphygmomanometer and thermometer","Nebulizer","Postural drainage board"],a:1,d:"easy",type:"mcq",exp:"Equipment for blood transfusion includes sphygmomanometer, thermometer, observation recording sheet, fluid balance chart, and blood component prescription forms."},
{t:"People with Rh-POSITIVE blood can receive:",o:["Only Rh-positive blood","Only Rh-negative blood","Either Rh-positive or Rh-negative blood","Neither type"],a:2,d:"medium",type:"mcq",exp:"Rh-positive individuals can receive either Rh-positive or Rh-negative blood."},
{t:"A fluid balance chart is used during blood transfusion to:",o:["Record patient vital signs","Monitor intake and output","Document cannula site changes","Record drug allergies"],a:1,d:"easy",type:"mcq",exp:"A fluid balance chart is part of the blood transfusion monitoring equipment to track intake and output."},
{t:"The blood component prescription form is used to:",o:["Record nursing diagnosis","Document prescribed blood components to be transfused","Record oxygen flow rate","Monitor respiratory rate"],a:1,d:"easy",type:"mcq",exp:"The blood component transfusion prescription form/IV fluid prescription sheet documents the prescribed blood components."},
{t:"Which of the following is used during blood transfusion to PREVENT hypothermia complications?",o:["Ice packs","Warm blankets only","Blood warmer devices","Electric heating pads"],a:2,d:"medium",type:"mcq",exp:"Blood warmer devices are used to prevent complications caused by hypothermia during blood transfusion."},
{t:"Cancer therapy is listed as an indication for blood transfusion because:",o:["Cancer itself destroys red blood cells","Cancer therapy can reduce blood cell counts requiring transfusion support","Cancer patients always have high blood pressure","Blood transfusion cures cancer"],a:1,d:"medium",type:"mcq",exp:"Cancer therapy is an indication — blood transfusion supports patients undergoing cancer treatment which may reduce blood cell counts."},
{t:"Before transfusion, the nurse should ask the patient about:",o:["Their food preferences","Any previous transfusions and any adverse reactions","Their exercise habits","Daily fluid intake"],a:1,d:"easy",type:"mcq",exp:"Ask the patient about any previous transfusions and if there were any adverse reactions."},
 
// WOUND DRESSING (81-110)
{t:"A wound is defined as:",o:["A surgical scar only","A cut or break in continuity of an organ or tissue caused by an external agent","An infection of the skin","A bruise without skin break"],a:1,d:"easy",type:"mcq",exp:"A wound is a cut or break in continuity of an organ or tissue caused by an external agent such as injury or surgery."},
{t:"The EPIDERMIS is:",o:["The deepest layer of skin","The second layer of skin containing blood vessels","The superficial outer layer of skin with no blood vessels or nerves","The subcutaneous fat layer"],a:2,d:"easy",type:"mcq",exp:"The epidermis is the superficial outer layer of skin; it does not contain blood vessels or nerves."},
{t:"The DERMIS:",o:["Has no blood vessels","Is the subcutaneous fat layer","Contains structures affecting cooling, sensation, and circulation of nutrients","Is the outermost layer"],a:2,d:"easy",type:"mcq",exp:"The dermis is the second layer of skin containing structures that affect cooling, sensation, and circulation of nutrients."},
{t:"A BLACK wound indicates:",o:["It is in the inflammatory phase","It contains necrotic tissue and is not ready to heal","It is infected","It is in the maturation phase"],a:1,d:"medium",type:"mcq",exp:"Black wounds contain necrotic tissue and are not ready to heal."},
{t:"A YELLOW wound indicates:",o:["Healthy granulating tissue","Inflammatory phase","Infected wound — not ready to heal","Maturation phase"],a:2,d:"medium",type:"mcq",exp:"Yellow wounds are infected wounds not ready to heal."},
{t:"A RED wound is in which phase?",o:["Pre-inflammatory phase","Inflammatory, proliferative, or maturation phase of wound healing","Infection phase only","Necrotic phase"],a:1,d:"medium",type:"mcq",exp:"Red wounds are in the inflammatory, proliferative, or maturation phase of wound healing."},
{t:"A CONTUSION is:",o:["Full-thickness skin loss","A break in skin of varying depth","A painful bruise from blunt trauma causing blood vessel damage","Scraping of superficial skin layers"],a:2,d:"medium",type:"mcq",exp:"Contusions are common sports injuries from direct blunt trauma, presenting as a painful bruise with reddish-to-bluish discoloration."},
{t:"An ABRASION is:",o:["Full thickness skin loss","Scraping away of superficial skin layers due to friction with rough surface","A break in skin of varying depth","Caused by foreign object entering the body"],a:1,d:"easy",type:"mcq",exp:"Abrasions are the scraping away of superficial skin layers due to friction with a hard rough surface."},
{t:"AVULSION refers to:",o:["Scraping away of superficial skin","Full thickness skin loss","A bite wound","A puncture wound"],a:1,d:"medium",type:"mcq",exp:"Avulsion is full-thickness skin loss."},
{t:"A LACERATION is:",o:["Caused by a foreign object entering the body","Scraping away of superficial skin","A break in skin of varying depth","Full thickness skin loss"],a:2,d:"easy",type:"mcq",exp:"Lacerations are breaks in the skin of varying depth."},
{t:"All bite wounds are considered:",o:["Clean","Contaminated","Sterile","Only contaminated if deep"],a:1,d:"easy",type:"mcq",exp:"All bite wounds (animal or human) are considered contaminated."},
{t:"Which factor MOST impairs wound healing?",o:["Drinking water","Low serum albumin which decreases O₂ levels and reduces bacteria-killing ability","Mild exercise","Sleeping 8 hours"],a:1,d:"medium",type:"mcq",exp:"Low serum albumin decreases O₂ level and reduces cells' ability to kill bacteria, leading to impaired healing."},
{t:"Smoking affects wound healing by:",o:["Improving blood circulation","Impeding healing","Increasing white blood cell production","Having no effect"],a:1,d:"medium",type:"mcq",exp:"Smoking is listed as a factor affecting wound healing negatively."},
{t:"Which systemic condition impairs wound healing by decreasing cells' ability?",o:["Hypertension alone","Diabetes, anemia, jaundice, cancer","Mild arthritis","Normal aging only"],a:1,d:"medium",type:"mcq",exp:"Immunosuppressed conditions including diabetes, anemia, jaundice, and cancer decrease cells' ability and lead to poor healing."},
{t:"A TRANSPARENT dressing's chief advantage is:",o:["High absorbency","Self-adhesive property","Facilitating wound assessment without removing the dressing","Can be left for one month"],a:2,d:"easy",type:"mcq",exp:"Transparent dressings facilitate wound assessment without removing the dressing."},
{t:"A HYDROCOLLOID dressing can be left in place for:",o:["24 hours","48 hours","Up to one week","One month"],a:2,d:"medium",type:"mcq",exp:"Hydrocolloid dressings are self-adhesive, air and water occlusive, and can be left in place up to one week."},
{t:"Which type of dressing permits air to reach the wound?",o:["Wet gauze dressing","Transparent dressing","Dry gauze dressing","Hydrocolloid dressing"],a:2,d:"easy",type:"mcq",exp:"Dry gauze dressing permits air to reach the wound."},
{t:"A WET gauze dressing:",o:["Permits air to reach the wound","Retains moisture while removing drainage from the wound","Is non-absorbent","Can be left for one week"],a:1,d:"easy",type:"mcq",exp:"Wet gauze dressing retains moisture while it removes drainage from the wound."},
{t:"Functions of a wound dressing include all EXCEPT:",o:["Remove excess exudates","Maintain humidity at wound-dressing interface","Allow gaseous exchange","Stimulate scar formation"],a:3,d:"medium",type:"mcq",exp:"Functions include removing exudates, maintaining humidity, gas exchange, thermal insulation, being impermeable to bacteria, free from toxic components, allowing removal without trauma, and minimizing pain. 'Stimulate scar formation' is not a function."},
{t:"A PENROSE drain is described as:",o:["A bulb-shaped suction device","A small plastic bottle for low suction","A soft, flexible drain that promotes drainage passively to absorptive dressing","An electric suction device"],a:2,d:"medium",type:"mcq",exp:"The Penrose drain is soft and flexible, promotes drainage passively from higher to lower pressure, and empties to absorptive dressing material."},
{t:"The HEMOVAC drain is commonly used for:",o:["Chest surgery only","Breast, hip, or perineal surgery","Abdominal surgery only","Thoracic surgery only"],a:1,d:"medium",type:"mcq",exp:"Hemovac drain is commonly used in breast, hip, or perineal surgery."},
{t:"The JACKSON-PRATT (JP) drain works by:",o:["Passive gravity drainage","Creating negative pressure suction as the bulb is squeezed flat","High-pressure suction","Electric pump suction"],a:1,d:"medium",type:"mcq",exp:"The JP drain creates suction by squeezing the bulb flat; it expands as it fills with fluid (negative pressure)."},
{t:"Common uses of the Jackson-Pratt drain include:",o:["Only head surgery","Only orthopedic surgery","Mastectomy, abdominal, and thoracic surgery","Only perineal surgery"],a:2,d:"medium",type:"mcq",exp:"JP drain common uses: breast surgery (mastectomy), abdominal surgery, thoracic surgery."},
{t:"Systemic indicators of wound infection include:",o:["Localized pain and redness only","Increased temperature, general malaise, elevated leucocytes count, lymphangitis","Wound discoloration only","Delayed healing only"],a:1,d:"medium",type:"mcq",exp:"Systemic infection indicators: increased temperature, general malaise, elevated leucocyte count, lymphangitis."},
{t:"Local indicators of wound infection include all EXCEPT:",o:["Redness and heat around the wound","Increased exudate and malodor","Lymphangitis (systemic sign)","Localized pain"],a:2,d:"hard",type:"mcq",exp:"Lymphangitis is a systemic indicator of infection, not a local indicator. Local indicators: erythema/cellulitis, increased exudate, change in exudate color, malodor, localized pain and heat, delayed healing."},
{t:"The subcutaneous layer of skin:",o:["Is the outermost layer","Contains no fat","Insulates, adds shape, stores energy, and varies in thickness by location","Contains only nerve endings"],a:2,d:"easy",type:"mcq",exp:"The subcutaneous (third) layer insulates and adds shape to the body, stores energy, and varies in thickness by location."},
{t:"The integumentary system (skin) serves to:",o:["Produce hormones for digestion","Shield the body from external environment, protect from bacterial invasion, control temperature and retain fluids","Only provide sensation","Only regulate blood pressure"],a:1,d:"easy",type:"mcq",exp:"The skin (integumentary system) shields the body from the external environment, protects from bacterial invasion, controls temperature, and retains or releases fluids."},
{t:"The upper shelf of a dressing cart typically contains:",o:["Soapy water and empty containers","Dressing solutions, sterile dressing packages, sterile handling forceps, adhesive tapes, bandages, scissors","Soap dish and macintosh","Personal protective equipment only"],a:1,d:"medium",type:"mcq",exp:"Upper shelf: dressing solutions, sterile dressing package, adhesive tapes, sterile handling forceps in container, bandages, scissors."},
{t:"In wound assessment, 'drainage color, consistency, volume, and odor' refers to which assessment variable?",o:["Stage of healing","General assessment","Drainage assessment","Infection indicators"],a:2,d:"medium",type:"mcq",exp:"Drainage assessment includes: color, consistency, nature/type, volume over time, and odor."},
{t:"A crush injury is caused by:",o:["Friction against rough surface","A foreign object entering the body","An external high-pressure force squeezing the body between two surfaces","Animal or human bite"],a:2,d:"easy",type:"mcq",exp:"Crush injuries are caused by an external high-pressure force that squeezes part of the body between two surfaces."},
{t:"Which wound classification is based on depth?",o:["Clean, contaminated, infected","Red, yellow, black","Superficial, partial thickness, full thickness","Open, closed, mixed"],a:2,d:"medium",type:"mcq",exp:"Wounds classified by depth: superficial, partial thickness, full thickness."},
 
// CHEST PHYSIOTHERAPY (111-130)
{t:"Chest physiotherapy (CPT) is defined as:",o:["Surgical techniques to open the chest","A group of physical techniques to mobilize secretions, improve lung function and help breathing","Only percussion of the chest","IV drug administration for lung disease"],a:1,d:"easy",type:"mcq",exp:"CPT is a group of physical techniques to mobilize/loosen secretions, improve lung function, and help patients breathe better."},
{t:"Chest percussion is indicated for patients with all EXCEPT:",o:["Cystic fibrosis","Bronchiectasis","Stable hypertension without lung disease","COPD"],a:2,d:"medium",type:"mcq",exp:"CPT is indicated for cystic fibrosis, bronchiectasis, atelectasis, neuromuscular diseases, pneumonia, COPD — not stable hypertension alone."},
{t:"CPT is CONTRAINDICATED in:",o:["Pneumonia","COPD","Unstable head or neck injury","Atelectasis"],a:2,d:"medium",type:"mcq",exp:"Contraindications include unstable head or neck injury, increased intracranial pressure, active hemorrhage, recent spinal injury/surgery, empyema, etc."},
{t:"Deep breathing exercises help by:",o:["Increasing CO₂ retention","Hyperventilating alveoli, preventing collapse, improving lung expansion, expelling anesthetic gases, and facilitating oxygenation","Only reducing pain","Decreasing mucus production"],a:1,d:"medium",type:"mcq",exp:"Deep breathing hyperventilates alveoli, prevents collapse, improves lung expansion and volume, expels anesthetic gases and mucus, facilitates tissue oxygenation."},
{t:"Incentive spirometry is used to:",o:["Measure blood pressure","Improve lung function by inhaling strongly using a special device, especially after surgery","Administer nebulized drugs","Provide chest percussion"],a:1,d:"easy",type:"mcq",exp:"Incentive spirometry helps improve lung function by inhaling strongly using a special device; used after surgery to re-expand lungs and prevent pneumonia."},
{t:"Postural drainage uses positioning to:",o:["Reduce fever","Drain secretions from bronchial tubes and lungs into the trachea using gravity","Strengthen breathing muscles","Administer medications"],a:1,d:"easy",type:"mcq",exp:"Postural drainage uses positioning and gravity to drain secretions from bronchial tubes and lungs into the trachea where they can be coughed up or suctioned."},
{t:"Postural drainage exercises are performed how many times per day?",o:["Once daily","Two to three times a day, before meals and bedtime","Every hour","Only when symptoms worsen"],a:1,d:"medium",type:"mcq",exp:"Exercises are performed 2-3 times a day, before meals and bedtime. Each position is held for 3-15 minutes."},
{t:"Chest percussion is NEVER performed on:",o:["The anterior chest over lung fields","Bare skin, surgical incisions, below the ribs, over the spine or breasts","Only over the back","Only during exhalation"],a:1,d:"medium",type:"mcq",exp:"Chest percussion is never done on bare skin, not over surgical incisions, not below the ribs, not over the spine or breasts."},
{t:"Percussion (CPT) involves:",o:["Gentle tapping with fingertips only","Clapping on the chest, sides and back with CUPPED hands to loosen pulmonary secretions","Electrical vibration of chest","Rapid breathing exercises"],a:1,d:"easy",type:"mcq",exp:"Percussion is clapping on the chest, sides, and back with cupped hands to loosen pulmonary secretions."},
{t:"Vibration in CPT is performed:",o:["As the patient inhales","As the patient exhales","Only during sleep","Between meals only"],a:1,d:"medium",type:"mcq",exp:"Vibration is performed as the patient exhales; the nurse places hands on the chest and creates vibrations by contracting and relaxing arm and shoulder muscles."},
{t:"The postural drainage procedure should be DISCONTINUED if the patient develops:",o:["Mild coughing","Tachycardia, palpitations, dyspnea, hypoxemia, hemoptysis, or chest pain","Only if patient refuses","Temporary shortness of breath"],a:1,d:"medium",type:"mcq",exp:"Discontinue if tachycardia, palpitations, dyspnea, hypoxemia, hemoptysis, or chest pain occurs."},
{t:"Before postural drainage, bronchodilators may be nebulized to:",o:["Increase mucus production","Reduce bronchospasm, decrease mucus thickness, and combat bronchial wall edema","Increase blood pressure","Reduce chest percussion pain"],a:1,d:"hard",type:"mcq",exp:"Bronchodilators, mucolytic agents, water, or saline may be nebulized before CPT to reduce bronchospasm, decrease mucus thickness, combat bronchial wall edema, and enhance secretion removal."},

/* ============ ENGINE ============ */
let questions, i, correct, wrong, answers, wrongSet, answered;
let totalTime = 50*60, timeLeft, timerInterval;
const LETTERS = ['A','B','C','D','E','F'];

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function init(pool) {
  questions = shuffle([...pool]);
  i = 0; correct = 0; wrong = 0;
  answers = new Array(questions.length).fill(null);
  wrongSet = []; answered = 0;
  timeLeft = totalTime;
  document.getElementById('totalBadge').textContent = questions.length + ' سؤال';
  startTimer();
  render();
}

/* TIMER */
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
    document.getElementById('timerTxt').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
    const badge = document.getElementById('timerBadge');
    if (timeLeft <= 120) { badge.className = 'timer-badge danger'; }
    else if (timeLeft <= 300) { badge.className = 'timer-badge warn'; }
    if (timeLeft <= 0) { clearInterval(timerInterval); finish(); }
  }, 1000);
}

/* TOP UI */
function updateTop() {
  const total = questions.length;
  document.getElementById('sCorrect').textContent = correct;
  document.getElementById('sWrong').textContent = wrong;
  document.getElementById('sRemain').textContent = Math.round(((total - answered) / total) * 100) + '%';
  document.getElementById('progLabel').textContent = 'سؤال ' + (i + 1) + ' / ' + total;
  document.getElementById('progFill').style.width = ((i + 1) / total * 100) + '%';
  document.getElementById('prog-bar').style.width = ((i + 1) / total * 100) + '%';
}

/* RENDER QUESTION */
function render() {
  updateTop();
  const q = questions[i];
  document.getElementById('app').innerHTML = `
    <div class="q-card">
      <div class="q-header">
        <div class="q-num">سؤال ${i + 1} / ${questions.length}</div>
      </div>
      <div class="q-text">${q.t}</div>
      <div class="options">
        ${q.o.map((o, idx) => `
          <div class="opt" id="opt${idx}" onclick="choose(${idx})">
            <div class="opt-letter">${LETTERS[idx] || idx + 1}</div>
            ${o}
          </div>
        `).join('')}
      </div>
      <div class="nav-btns">
        <button class="btn btn-skip" onclick="skip()"><i class="fa-solid fa-forward"></i> تخطي</button>
      </div>
    </div>`;
}

/* CHOOSE */
function choose(v) {
  if (answers[i] !== null) return;
  answers[i] = v;
  answered++;
  const q = questions[i];
  const ok = v === q.a;
  ok ? correct++ : wrong++;
  updateTop();

  q.o.forEach((_, idx) => {
    const el = document.getElementById('opt' + idx);
    el.classList.add('disabled');
    if (idx === q.a) el.classList.add('correct');
    else if (idx === v) el.classList.add('wrong');
  });

  const fb = document.createElement('div');
  fb.className = 'feedback-bar ' + (ok ? 'ok' : 'no');
  fb.innerHTML = ok
    ? `<span class="feedback-icon">🎉</span> <span>شطور جدا ، اللهم بارك</span>`
    : `<span class="feedback-icon">😔</span> <span>ركز يا سكر </b></span>`;

  const card = document.querySelector('.q-card');
  card.querySelector('.options').after(fb);
  if (q.exp) {
    const exp = document.createElement('div');
    exp.className = 'explanation';
    exp.style.display = 'block';
    exp.innerHTML = '<b>💬 شرح:</b> ' + q.exp;
    fb.after(exp);
  }

  const navBtns = card.querySelector('.nav-btns');
  navBtns.innerHTML = `<button class="btn btn-next" onclick="next()">
    ${i < questions.length - 1 ? '<i class="fa-solid fa-arrow-left"></i> السؤال التالي' : '<i class="fa-solid fa-flag-checkered"></i> إنهاء الامتحان'}
  </button>`;
}

/* SKIP */
function skip() {
  if (answers[i] === null) { answers[i] = -1; answered++; wrongSet.push(questions[i]); wrong++; updateTop(); }
  next();
}

/* NEXT */
function next() {
  if (i < questions.length - 1) { i++; render(); window.scrollTo({top: 0, behavior: 'smooth'}); }
  else finish();
}

/* FINISH */
function finish() {
  clearInterval(timerInterval);
  const total = questions.length;
  const score = Math.round((correct / total) * 100);

  questions.forEach((q, idx) => {
    if (answers[idx] !== q.a) wrongSet.push({...q, myAns: answers[idx]});
  });
  wrongSet = [...new Map(wrongSet.map(q => [q.t, q])).values()];

  let grade, gradeColor;
  if (score >= 90) { grade = '🥇 ممتاز'; gradeColor = 'var(--success)'; }
  else if (score >= 75) { grade = '🥈 جيد جداً'; gradeColor = 'var(--accent)'; }
  else if (score >= 60) { grade = '🥉 جيد'; gradeColor = 'var(--warn)'; }
  else { grade = '📚 راجع تاني'; gradeColor = 'var(--danger)'; }

  const circ = 2 * Math.PI * 45;
  const offset = circ - (score / 100) * circ;

  const reportHTML = questions.map((q, idx) => {
    const ok = answers[idx] === q.a;
    return `<div class="report-item ${ok ? 'ok' : 'no'}">
      <div class="ri-q">${ok ? '✅' : '❌'} ${q.t}</div>
      ${!ok ? `
        <div class="ri-row"><span class="ri-badge ri-yours">إجابتك</span> ${answers[idx] >= 0 ? q.o[answers[idx]] : 'تم التخطي'}</div>
        <div class="ri-row"><span class="ri-badge ri-right">الصحيح</span> ${q.o[q.a]}</div>
      ` : ''}
    </div>`;
  }).join('');

  document.getElementById('prog-bar').style.width = '100%';
  document.getElementById('app').innerHTML = `
    <div class="result-hero">
      <div class="score-ring">
        <svg viewBox="0 0 110 110">
          <circle class="ring-bg" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="0"/>
          <circle class="ring-fill" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            style="stroke:${gradeColor}" id="ringFill"/>
        </svg>
        <div class="score-num">${score}</div>
        <div class="score-pct">%</div>
      </div>
      <div class="result-grade" style="color:${gradeColor}">${grade}</div>
      <div class="result-sub">أجبت على ${answered} من ${total} سؤال</div>
      <div class="result-stats">
        <div class="rs"><div class="n" style="color:var(--success)">${correct}</div><div class="l">صحيح</div></div>
        <div class="rs"><div class="n" style="color:var(--danger)">${wrong}</div><div class="l">خطأ</div></div>
        <div class="rs"><div class="n" style="color:var(--accent)">${total - answered < 0 ? 0 : total - answered}</div><div class="l">تخطي</div></div>
      </div>
    </div>

    <div class="result-actions">
      ${wrongSet.length ? `<button class="btn btn-retry" onclick="retryWrong()"><i class="fa-solid fa-rotate-right"></i> إعادة الخطأ (${wrongSet.length})</button>` : ''}
      <button class="btn btn-home" onclick="init(QUESTIONS)"><i class="fa-solid fa-shuffle"></i> امتحان جديد عشوائي</button>
      <a href="https://gaith-team.github.io/exam/practicalmedical/index.html" class="btn btn-home" style="text-decoration:none;"><i class="fa-solid fa-house"></i> رجوع للمادة</a>
    </div>

    <div style="margin-top:28px">
      <div style="font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text2)">📋 تقرير مفصّل</div>
      ${reportHTML}
    </div>`;

  setTimeout(() => { document.getElementById('ringFill').style.strokeDashoffset = offset; }, 100);
  window.scrollTo({top: 0, behavior: 'smooth'});
}

/* RETRY WRONG */
function retryWrong() {
  const pool = [...wrongSet];
  questions = shuffle(pool); i = 0; correct = 0; wrong = 0;
  answers = new Array(questions.length).fill(null);
  wrongSet = []; answered = 0; timeLeft = totalTime;
  startTimer(); render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

/* THEME */
const themeBtn = document.getElementById('themeBtn');
let theme = localStorage.getItem('theme') || 'light';
function applyTheme(t) {
  theme = t;
  document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : '');
  themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('theme', t);
}
applyTheme(theme);
themeBtn.addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'));

/* START */
init(QUESTIONS);
</script>
</body>
</html>
