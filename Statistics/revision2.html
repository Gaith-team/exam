<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAITH TEAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent:       #059669;
  --accent-light: #34d399;
  --accent-dark:  #047857;
  --accent-glow:  rgba(5,150,105,0.18);
  --bg:      #f0fdf4;
  --bg2:     #dcfce7;
  --card:    #ffffff;
  --text:    #0f2417;
  --text2:   #374151;
  --text3:   #6b7280;
  --bc:      rgba(5,150,105,0.12);
  --success: #16a34a;
  --danger:  #dc2626;
  --warn:    #d97706;
  --r:       16px;
  --tr:      all 0.3s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg:   #022c22; --bg2: #064e3b; --card: #065f46;
  --text: #ecfdf5; --text2: #a7f3d0; --text3: #6ee7b7;
  --bc:   rgba(52,211,153,0.15);
  --accent-glow: rgba(52,211,153,0.2);
}

body {
  font-family:  Cairo , sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
  transition: background .4s, color .4s;
}

/* PROGRESS TOP */
#prog-bar {
  position: fixed; top: 0; left: 0; height: 3px; z-index: 999;
  background: linear-gradient(90deg, var(--accent-dark), var(--accent-light));
  transition: width .2s;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 64px;
  background: rgba(240,253,244,.95); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--bc); transition: var(--tr);
}
[data-theme="dark"] nav { background: rgba(2,44,34,.97); }

.nav-back {
  display: flex; align-items: center; gap: 7px;
  color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 700;
  padding: 7px 13px; border-radius: 8px; border: 1px solid var(--bc);
  background: var(--card); transition: var(--tr);
}
.nav-back:hover { color: var(--accent); border-color: var(--accent); transform: translateX(-3px); }
.nav-brand { display: flex; align-items: center; gap: 9px; font-size: 15px; font-weight: 900; color: var(--text); }
.nav-logo-icon {
  width: 34px; height: 34px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent-dark), var(--accent-light));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 900;
}
.nav-right { display: flex; align-items: center; gap: 8px; }
.theme-btn {
  width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--bc);
  background: var(--card); cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center; transition: var(--tr);
}
.theme-btn:hover { border-color: var(--accent); transform: rotate(20deg); }

/* HERO BAND */
.hero-band {
  margin-top: 64px;
  background: linear-gradient(135deg, #065f46, #059669, #34d399);
  padding: 40px 24px 36px; text-align: center;
  position: relative; overflow: hidden;
}
.hero-band::before {
  content:   ; position: absolute; inset: 0;
  background: radial-gradient(ellipse 600px 200px at 50% 100%, rgba(255,255,255,.12) 0%, transparent 70%);
}
.hero-band::after {
  content:   ; position: absolute; top: -40px; right: -40px;
  width: 180px; height: 180px; border-radius: 50%;
  background: rgba(255,255,255,.07);
}
.hero-band-icon {
  width: 68px; height: 68px; border-radius: 20px;
  background: rgba(255,255,255,.2); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; margin: 0 auto 14px; border: 1.5px solid rgba(255,255,255,.35);
  position: relative; z-index: 1;
}
.hero-band h1 { font-size: clamp(20px,4vw,30px); font-weight: 900; color: #fff; margin-bottom: 6px; position: relative; z-index: 1; }
.hero-band p { font-size: 13px; color: rgba(255,255,255,.85); position: relative; z-index: 1; }
.hero-band-meta {
  display: flex; justify-content: center; gap: 24px; margin-top: 20px;
  flex-wrap: wrap; position: relative; z-index: 1;
}
.meta-pill {
  background: rgba(255,255,255,.2); backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,.35); border-radius: 50px;
  padding: 6px 16px; font-size: 12px; font-weight: 700; color: #fff;
  display: flex; align-items: center; gap: 6px;
}

/* EXAM SHELL */
.shell { max-width: 560px; margin: 0 auto; padding: 24px 20px 80px; }

/* STATS ROW */
.stats-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px;
}
.stat-box {
  background: var(--card); border: 1px solid var(--bc); border-radius: var(--r);
  padding: 12px 10px; text-align: center;
  box-shadow: 0 2px 8px rgba(5,150,105,.06);
}
.stat-box .val { font-size: 20px; font-weight: 900; }
.stat-box .lbl { font-size: 11px; color: var(--text3); margin-top: 2px; }
.stat-correct { color: var(--success); }
.stat-wrong   { color: var(--danger); }
.stat-remain  { color: var(--accent); }

/* PROGRESS STRIP */
.prog-strip {
  background: var(--card); border: 1px solid var(--bc); border-radius: var(--r);
  padding: 14px 16px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 14px;
  box-shadow: 0 2px 8px rgba(5,150,105,.06);
}
.prog-label { font-size: 13px; font-weight: 700; color: var(--text2); white-space: nowrap; }
.prog-track { flex: 1; height: 8px; background: var(--bg2); border-radius: 8px; overflow: hidden; }
.prog-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--accent-dark), var(--accent-light));
  border-radius: 8px; transition: width .4s;
}
.timer-badge {
  min-width: 64px; height: 36px; border-radius: 18px;
  background: var(--bg2); border: 1px solid var(--bc);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 900; color: var(--text);
  gap: 5px; padding: 0 12px; flex-shrink: 0;
}
.timer-badge.warn { color: var(--warn); border-color: rgba(217,119,6,.3); background: rgba(217,119,6,.08); }
.timer-badge.danger { color: var(--danger); border-color: rgba(220,38,38,.3); background: rgba(220,38,38,.08); animation: pulse .8s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

/* QUESTION CARD */
.q-card {
  background: var(--card); border: 1px solid var(--bc);
  border-radius: 20px; overflow: hidden;
  box-shadow: 0 4px 24px rgba(5,150,105,.1);
  transition: box-shadow .3s;
}
.q-header {
  background: linear-gradient(135deg, #065f46, #059669);
  padding: 4px 18px 4px;
  display: flex; align-items: center; gap: 8px;
}
.q-num {
  background: rgba(255,255,255,.2); border-radius: 8px;
  padding: 3px 10px; font-size: 11px; font-weight: 700; color: #fff;
}
.q-text {
  padding: 22px 18px 14px; font-size: 15px; font-weight: 700; color: var(--text);
  line-height: 1.65; border-bottom: 1px solid var(--bc);
}
.options { padding: 14px 18px 18px; display: flex; flex-direction: column; gap: 10px; }

/* OPTION */
.opt {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; border-radius: 12px;
  border: 1.5px solid var(--bc); background: var(--bg);
  cursor: pointer; font-size: 14px; font-weight: 600; color: var(--text);
  transition: var(--tr); user-select: none;
}
.opt:hover:not(.disabled) {
  border-color: var(--accent); background: var(--accent-glow);
  transform: translateX(3px);
}
.opt-letter {
  width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
  background: var(--bg2); border: 1px solid var(--bc);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 900; color: var(--text3);
  transition: var(--tr);
}
.opt.correct { border-color: var(--success); background: rgba(22,163,74,.08); }
.opt.correct .opt-letter { background: var(--success); color: #fff; border-color: var(--success); }
.opt.wrong { border-color: var(--danger); background: rgba(220,38,38,.07); }
.opt.wrong .opt-letter { background: var(--danger); color: #fff; border-color: var(--danger); }
.opt.disabled { pointer-events: none; }

/* FEEDBACK */
.feedback-bar {
  margin: 14px 18px; padding: 12px 16px; border-radius: 12px;
  display: flex; align-items: center; gap: 10px;
  font-size: 14px; font-weight: 700;
  animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
.feedback-bar.ok { background: rgba(22,163,74,.1); color: var(--success); border: 1px solid rgba(22,163,74,.25); }
.feedback-bar.no { background: rgba(220,38,38,.08); color: var(--danger); border: 1px solid rgba(220,38,38,.2); }
.feedback-icon { font-size: 20px; }

/* EXPLANATION */
.explanation {
  margin: 0 18px 14px; padding: 12px 14px;
  background: rgba(5,150,105,.06);
  border-radius: 10px; border-left: 3px solid var(--accent);
  font-size: 13px; color: var(--text2); line-height: 1.6;
  display: none;
}

/* NAV BTNS */
.nav-btns { padding: 4px 18px 18px; display: flex; gap: 10px; }
.btn {
  flex: 1; padding: 13px; border: none; border-radius: 12px;
  font-size: 14px; font-weight: 900; cursor: pointer;
  font-family:  Cairo , sans-serif; transition: var(--tr);
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.btn-next {
  background: linear-gradient(135deg, #065f46, #059669);
  color: #fff; box-shadow: 0 4px 14px var(--accent-glow);
}
.btn-next:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
.btn-skip {
  background: var(--bg2); color: var(--text2); border: 1px solid var(--bc); flex: 0 0 auto; padding: 13px 18px;
}
.btn-skip:hover { border-color: var(--warn); color: var(--warn); }

/* ===== RESULTS ===== */
.result-hero {
  text-align: center; padding: 36px 20px 28px;
  background: var(--card); border-radius: 20px;
  border: 1px solid var(--bc); margin-bottom: 20px;
  box-shadow: 0 4px 24px rgba(5,150,105,.1);
}
.score-ring {
  width: 110px; height: 110px; border-radius: 50%; margin: 0 auto 18px;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; border: 5px solid var(--bg2);
  position: relative;
}
.score-ring svg { position: absolute; inset: -5px; width: calc(100% + 10px); height: calc(100% + 10px); transform: rotate(-90deg); }
.score-ring circle { fill: none; stroke-width: 5; stroke-linecap: round; }
.ring-bg { stroke: var(--bg2); }
.ring-fill { stroke: var(--accent); transition: stroke-dashoffset 1s ease; }
.score-num { font-size: 28px; font-weight: 900; color: var(--text); }
.score-pct { font-size: 12px; color: var(--text3); }
.result-grade { font-size: 22px; font-weight: 900; margin-bottom: 6px; }
.result-sub { font-size: 14px; color: var(--text2); }
.result-stats {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 20px;
}
.rs { background: var(--bg2); border-radius: 10px; padding: 12px 8px; text-align: center; }
.rs .n { font-size: 20px; font-weight: 900; }
.rs .l { font-size: 11px; color: var(--text3); }

/* REPORT ITEMS */
.report-item {
  background: var(--card); border: 1px solid var(--bc); border-radius: 14px;
  padding: 16px; margin-bottom: 10px; border-left: 4px solid var(--bc);
}
.report-item.ok { border-left-color: var(--success); }
.report-item.no { border-left-color: var(--danger); }
.report-item .ri-q { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
.report-item .ri-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; margin-top: 5px; color: var(--text2);
}
.ri-badge {
  padding: 2px 8px; border-radius: 6px; font-weight: 700; font-size: 11px; flex-shrink: 0;
}
.ri-yours { background: rgba(220,38,38,.1); color: var(--danger); }
.ri-right { background: rgba(22,163,74,.1); color: var(--success); }

.result-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
.btn-retry { background: linear-gradient(135deg, #065f46, #059669); color: #fff; }
.btn-retry:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
.btn-home { background: var(--bg2); color: var(--text); border: 1px solid var(--bc); }
.btn-home:hover { border-color: var(--accent); color: var(--accent); }

/* FOOTER */
footer {
  background: var(--bg2); border-top: 1px solid var(--bc);
  padding: 22px 24px; display: flex; align-items: center;
  justify-content: space-between; flex-wrap: wrap; gap: 10px;
}
.footer-brand { font-size: 14px; font-weight: 700; }
.footer-brand span { color: var(--accent); }
.footer-tg { display: flex; align-items: center; gap: 5px; text-decoration: none; color: #229ED9; font-size: 12px; font-weight: 600; }

@media (max-width: 480px) {
  nav { padding: 0 14px; }
  .shell { padding: 16px 14px 60px; }
  .nav-brand span { display: none; }
  .hero-band { padding: 30px 16px 28px; }
}
</style>
</head>
<body>

<div id="prog-bar" style="width:0%"></div>

<nav>
  <a href="https://gaith-team.github.io/exam/" class="nav-back"><i class="fa-solid fa-arrow-left"></i> Back</a>
  <div class="nav-brand">
    <div class="nav-logo-icon">GT</div>
    <span>GAITH TEAM</span>
  </div>
  <div class="nav-right">
    <button class="theme-btn" id="themeBtn">🌙</button>
  </div>
</nav>

<div class="hero-band">
  <div class="hero-band-icon">🤸🏼‍♂️</div>
  <h1>مراجعة شاملة علي ثاني 3 محاضرات</h1>
  <p>Statistics</p>
  <div class="hero-band-meta">
    <div class="meta-pill"><i class="fa-solid fa-list-ol"></i> <span id="totalBadge">-- Questions</span></div>
    <div class="meta-pill"><i class="fa-solid fa-clock"></i> 50 Minutes</div>
    <div class="meta-pill"><i class="fa-solid fa-shuffle"></i> Randomized</div>

</div>

<div class="shell">
  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="val stat-correct" id="sCorrect">0</div>
      <div class="lbl">✔ Correct</div>
    </div>
    <div class="stat-box">
      <div class="val stat-wrong" id="sWrong">0</div>
      <div class="lbl">✖ Wrong</div>
    </div>
    <div class="stat-box">
      <div class="val stat-remain" id="sRemain">--%</div>
      <div class="lbl">⏳ Remaining</div>

  <!-- PROGRESS STRIP -->
  <div class="prog-strip">
    <div class="prog-label" id="progLabel">Question 1</div>

  <!-- APP -->
  <div id="app"></div>
</div>

<footer>
  <div class="footer-brand">GAITH <span>TEAM</span></div>
  <a href="https://t.me/nursing2bu" target="_blank" class="footer-tg">

</footer>

<script>

const RAW_QUESTIONS = [
  {t:"What is the main purpose of inferential biostatistics?", o:["To describe the data collected from an entire population","To make judgments about a population based on data from a small sample","To calculate the mean of a data set","To organize data into tables and charts"], a:1, d:"easy"},
  {t:"What does the null hypothesis (H₀) assume?", o:["There is a significant difference between the means of two data sets","There is no real difference between the means of two or more data sets","The sample is larger than the population","The p-value is less than 0.05"], a:1, d:"easy"},
  {t:"Which of the following represents a measure of dispersion?", o:["Mean","Median","Standard deviation","Mode"], a:2, d:"easy"},
  {t:"Range is calculated as:", o:["Mean – Median","Maximum value – Minimum value","Sum of values / n","Standard deviation × Mean"], a:1, d:"easy"},
  {t:"The square root of the variance is called:", o:["Mean deviation","Quartile deviation","Standard deviation","Coefficient of range"], a:2, d:"easy"},
  {t:"For a normal distribution, approximately what percentage of data falls within ONE standard deviation of the mean?", o:["50%","68%","95%","99%"], a:1, d:"easy"},
  {t:"Which significance level is considered 'very highly significant'?", o:["P = 0.05","P = 0.10","P = 0.01","P = 0.001"], a:3, d:"easy"},
  {t:"The alternative hypothesis (H₁) assumes:", o:["No difference exists between the means","A true difference exists between the means","The sample size is adequate","The p-value is greater than 0.05"], a:1, d:"easy"},
  {t:"Skewness is a measure of:", o:["Spread of data","Central tendency","Asymmetry in a data set","Number of outliers"], a:2, d:"easy"},
  {t:"Quartile deviation is defined as:", o:["Q3 – Q1","(Q3 – Q1) / 2","(Q3 + Q1) / 2","Q3 × Q1"], a:1, d:"easy"},
  {t:"Which of the following is an absolute measure of dispersion?", o:["Coefficient of variation","Coefficient of range","Variance","All coefficient-based measures"], a:2, d:"easy"},
  {t:"A normal distribution (bell curve) has a skewness value of:", o:["1","−1","0","0.5"], a:2, d:"easy"},
  {t:"For a positively skewed distribution, which relationship is correct?", o:["Mean < Median","Mean > Median","Mean = Median","Mean = Mode"], a:1, d:"medium"},
  {t:"The p-value represents:", o:["The probability the null hypothesis is true","The probability of obtaining the observed test statistic by chance if H₀ is true","The critical value of the test statistic","The size of the sample studied"], a:1, d:"medium"},
  {t:"What is the coefficient of range formula?", o:["(Xmax + Xmin) / (Xmax − Xmin)","(Xmax − Xmin) / (Xmax + Xmin)","(Xmax × Xmin) / 2","Range / Mean"], a:1, d:"medium"},
  {t:"Which measure of dispersion is LEAST affected by extreme values (outliers)?", o:["Range","Variance","Mean deviation","Standard deviation"], a:2, d:"medium"},
  {t:"In hypothesis testing, the critical region refers to:", o:["The area where the null hypothesis is accepted","The set of all values of the test statistic unlikely to occur randomly","The mean of the population","The confidence interval"], a:1, d:"medium"},
  {t:"The formula for population variance is:", o:["σ = ∑(X−μ)/N","σ² = ∑(X−μ)²/N","σ² = ∑(X−μ)/N−1","σ = ∑(X−μ)²"], a:1, d:"medium"},
  {t:"For a negatively skewed distribution:", o:["Mean > Median","Mean = Median","Mean < Median","Median > Mode"], a:2, d:"medium"},
  {t:"Which of the following correctly describes 'P = 0.01'?", o:["Not significant","Significant","Highly significant","Very highly significant"], a:2, d:"medium"},
  {t:"Kurtosis is primarily used to:", o:["Measure the central tendency","Find the presence of outliers in data","Calculate the range of data","Determine the sample size"], a:1, d:"medium"},
  {t:"The coefficient of variation (C.D.) based on standard deviation is calculated as:", o:["S.D. × Mean","S.D. / Mean","Mean / S.D.","S.D. + Mean"], a:1, d:"medium"},
  {t:"In the steps of hypothesis testing, what comes AFTER calculating the test statistic?", o:["Define the null hypothesis","Collect data from the sample","Compare with the tabulated critical value","Interpret the results"], a:2, d:"medium"},
  {t:"For a data set, approximately what percentage of data lies within THREE standard deviations of the mean in a normal distribution?", o:["68%","90%","95%","More than 99%"], a:3, d:"medium"},
  {t:"Mean deviation can be calculated about which central point(s)?", o:["Mean only","Median only","Mode only","Mean, median, or mode"], a:3, d:"medium"},
  {t:"A larger sample size (n) affects the sample mean by:", o:["Moving it further from the true population mean","Bringing it closer to the true population mean","Having no effect on the population estimate","Increasing the variance"], a:1, d:"medium"},
  {t:"Platykurtic distribution is characterized by:", o:["A steep, light-tailed curve","A heavy-tailed, flat-peaked curve","A bell-shaped normal curve","An asymmetric curve"], a:1, d:"medium"},
  {t:"The value that separates likely values from unlikely values of the test statistic is called:", o:["The p-value","The significance level","The critical value","The confidence interval"], a:2, d:"medium"},
  {t:"Which statement about range is CORRECT?", o:["Range tells us the number of data points","Range can be used for open-ended distribution","Range is not affected by outliers","Range cannot be used to find the mean, median, or mode"], a:3, d:"medium"},
  {t:"The total area under a probability distribution curve equals:", o:["0.05","0.5","1","100"], a:2, d:"medium"},
  {t:"Given the data set: 45, 55, 63, 76, 67, 84, 75, 48, 62, 65 — what is the range?", o:["33","39","42","45"], a:1, d:"hard"},
  {t:"For the data: 1, 3, 5, 5, 6, 7, 9, 10 — what is the population variance (σ²)?", o:["5.75","7.69","2.77","61.50"], a:1, d:"hard"},
  {t:"For the data: 5, 3, 7, 8, 4, 9 — what is the mean deviation?", o:["1","1.5","2","3"], a:2, d:"hard"},
  {t:"The coefficient of quartile deviation is expressed as:", o:["(Q3 + Q1) / (Q3 − Q1)","(Q3 − Q1) / (Q3 + Q1)","(Q3 × Q1) / 2","(Q3 − Q1) / 2"], a:1, d:"hard"},
  {t:"If the calculated test statistic falls INSIDE the critical region, the correct decision is:", o:["Accept the null hypothesis","Reject the null hypothesis","Recollect data and retest","Increase the significance level"], a:1, d:"hard"},
  {t:"Leptokurtic distribution is characterized by:", o:["A flat-peaked, heavy-tailed curve","A light-tailed, steep-peaked curve","Zero skewness","A uniform distribution"], a:1, d:"hard"},
  {t:"The standard deviation for the data set: 1, 3, 5, 5, 6, 7, 9, 10 (variance = 7.69) is approximately:", o:["7.69","5.75","2.77","3.50"], a:2, d:"hard"},
  {t:"Which formula correctly computes SAMPLE variance (not population variance)?", o:["σ² = ∑(X−μ)² / N","s² = ∑(X−X̄)² / (n−1)","s = ∑(X−X̄) / n","σ = ∑(X−μ) / N"], a:1, d:"hard"},
  {t:"For the data 45, 55, 63, 76, 67, 84, 75, 48, 62, 65 , what is the coefficient of range (approximately)?", o:["0.302","0.402","0.502","0.202"], a:0, d:"hard"},
  {t:"A researcher finds P = 0.03 for a hypothesis test. Which conclusion is MOST appropriate?", o:["The result is highly significant; reject H₀","The result is significant; reject H₀","The result is not significant; accept H₀","The result is very highly significant; reject H₀"], a:1, d:"hard"},
  {t:"Inferential statistics is used to make conclusions about a sample based on data collected from a population.", o:["True","False"], a:1},
  {t:"The smaller the p-value, the stronger the evidence against the null hypothesis.", o:["True","False"], a:0},
  {t:"In a normal distribution, approximately 95% of the data falls within two standard deviations of the mean.", o:["True","False"], a:0},
  {t:"The range is not affected by extreme values (outliers).", o:["True","False"], a:1},
  {t:"Skewness informs users about the direction of outliers in a data set.", o:["True","False"], a:0},
  {t:"Mean deviation is more frequently used than standard deviation in statistical analysis.", o:["True","False"], a:1},
  {t:"Kurtosis describes the 'fatness' of the tails found in probability distributions.", o:["True","False"], a:0},
  {t:"For a positively skewed distribution, the mean is greater than the median.", o:["True","False"], a:0},
  {t:"A mesokurtic distribution has more outliers than a leptokurtic distribution.", o:["True","False"], a:1},
  {t:"The coefficient of range is calculated as (Xmax − Xmin) / (Xmax + Xmin).", o:["True","False"], a:0},
];

/* ============ SHUFFLE OPTIONS ============ */
// Returns a new question object with shuffled options and updated answer index
function shuffleOptions(q) {
  const correctText = q.o[q.a];
  // Create indexed options
  const indexed = q.o.map((text, idx) => ({ text, idx }));
  // Shuffle
  for (let i = indexed.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indexed[i], indexed[j]] = [indexed[j], indexed[i]];
  }
  const newOptions = indexed.map(item => item.text);
  const newAnswerIdx = newOptions.indexOf(correctText);
  return { t: q.t, o: newOptions, a: newAnswerIdx, exp: q.exp || null };
}

/* ============ ENGINE ============ */
let questions, i, correct, wrong, answers, wrongSet, answered;
let totalTime = 50*60, timeLeft, timerInterval;
const LETTERS = [ A , B , C , D , E , F ];

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function prepareQuestions(pool) {
  // Shuffle questions order AND shuffle each question s options
  return shuffle([...pool]).map(q => shuffleOptions(q));
}

function init(pool) {
  questions = prepareQuestions(pool);
  i = 0; correct = 0; wrong = 0;
  answers = new Array(questions.length).fill(null);
  wrongSet = []; answered = 0;
  timeLeft = totalTime;
  document.getElementById( totalBadge ).textContent = questions.length +   Questions ;
  startTimer();
  render();
}

/* TIMER */
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
    document.getElementById( timerTxt ).textContent = `${m}:${s < 10 ?  0  :   }${s}`;
    const badge = document.getElementById( timerBadge );
    if (timeLeft <= 120) { badge.className =  timer-badge danger ; }
    else if (timeLeft <= 300) { badge.className =  timer-badge warn ; }
    if (timeLeft <= 0) { clearInterval(timerInterval); finish(); }
  }, 1000);
}

/* TOP UI */
function updateTop() {
  const total = questions.length;
  document.getElementById( sCorrect ).textContent = correct;
  document.getElementById( sWrong ).textContent = wrong;
  document.getElementById( sRemain ).textContent = Math.round(((total - answered) / total) * 100) +  % ;
  document.getElementById( progLabel ).textContent =  Question   + (i + 1) +   /   + total;
  document.getElementById( progFill ).style.width = ((i + 1) / total * 100) +  % ;
  document.getElementById( prog-bar ).style.width = ((i + 1) / total * 100) +  % ;
}

/* RENDER QUESTION */
function render() {
  updateTop();
  const q = questions[i];
  document.getElementById( app ).innerHTML = `
    <div class="q-card">
      <div class="q-header">
        <div class="q-num">Question ${i + 1} / ${questions.length}</div>
      </div>
      <div class="q-text">${q.t}</div>
      <div class="options">
        ${q.o.map((o, idx) => `
          <div class="opt" id="opt${idx}" onclick="choose(${idx})">
            <div class="opt-letter">${LETTERS[idx] || idx + 1}</div>
            ${o}
          </div>
        `).join(  )}
      </div>
      <div class="nav-btns">
        <button class="btn btn-skip" onclick="skip()"><i class="fa-solid fa-forward"></i> Skip</button>
      </div>
    </div>`;
}

/* CHOOSE */
function choose(v) {
  if (answers[i] !== null) return;
  answers[i] = v;
  answered++;
  const q = questions[i];
  const ok = v === q.a;
  ok ? correct++ : wrong++;
  updateTop();

  q.o.forEach((_, idx) => {
    const el = document.getElementById( opt  + idx);
    el.classList.add( disabled );
    if (idx === q.a) el.classList.add( correct );
    else if (idx === v) el.classList.add( wrong );
  });

  const fb = document.createElement( div );
  fb.className =  feedback-bar   + (ok ?  ok  :  no );
  fb.innerHTML = ok
    ? `<span class="feedback-icon">🎉</span> <span>شطور جدا ، اللهم بارك</span>`
    : `<span class="feedback-icon">💡</span> <span> الصح ، لا غلط : <b>${q.o[q.a]}</b></span>`;

  const card = document.querySelector( .q-card );
  card.querySelector( .options ).after(fb);
  if (q.exp) {
    const exp = document.createElement( div );
    exp.className =  explanation ;
    exp.style.display =  block ;
    exp.innerHTML =  <b>💬 Explanation:</b>   + q.exp;
    fb.after(exp);
  }

  const navBtns = card.querySelector( .nav-btns );
  navBtns.innerHTML = `<button class="btn btn-next" onclick="next()">
    ${i < questions.length - 1 ?  <i class="fa-solid fa-arrow-right"></i> Next Question  :  <i class="fa-solid fa-flag-checkered"></i> Finish Exam }
  </button>`;
}

/* SKIP */
function skip() {
  if (answers[i] === null) { answers[i] = -1; answered++; wrongSet.push(questions[i]); wrong++; updateTop(); }
  next();
}

/* NEXT */
function next() {
  if (i < questions.length - 1) { i++; render(); window.scrollTo({top: 0, behavior:  smooth }); }
  else finish();
}

/* FINISH */
function finish() {
  clearInterval(timerInterval);
  const total = questions.length;
  const score = Math.round((correct / total) * 100);

  // Collect wrong answers (store original question text for dedup)
  const wrongItems = [];
  questions.forEach((q, idx) => {
    if (answers[idx] !== q.a) {
      wrongItems.push({...q, myAns: answers[idx]});
    }
  });
  // Deduplicate by question text
  wrongSet = [...new Map(wrongItems.map(q => [q.t, q])).values()];

  let grade, gradeColor;
  if (score >= 90) { grade =  🥇 Excellent ; gradeColor =  var(--success) ; }
  else if (score >= 75) { grade =  🥈 Very Good ; gradeColor =  var(--accent) ; }
  else if (score >= 60) { grade =  🥉 Good ; gradeColor =  var(--warn) ; }
  else { grade =  📚 Needs Review ; gradeColor =  var(--danger) ; }

  const circ = 2 * Math.PI * 45;
  const offset = circ - (score / 100) * circ;

  const reportHTML = questions.map((q, idx) => {
    const ok = answers[idx] === q.a;
    return `<div class="report-item ${ok ?  ok  :  no }">
      <div class="ri-q">${ok ?  ✅  :  ❌ } ${q.t}</div>
      ${!ok ? `
        <div class="ri-row"><span class="ri-badge ri-yours">Your Answer</span> ${answers[idx] >= 0 ? q.o[answers[idx]] :  Skipped }</div>
        <div class="ri-row"><span class="ri-badge ri-right">Correct</span> ${q.o[q.a]}</div>
      ` :   }
    </div>`;
  }).join(  );

  document.getElementById( prog-bar ).style.width =  100% ;
  document.getElementById( app ).innerHTML = `
    <div class="result-hero">
      <div class="score-ring">
        <svg viewBox="0 0 110 110">
          <circle class="ring-bg" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="0"/>
          <circle class="ring-fill" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            style="stroke:${gradeColor}" id="ringFill"/>
        </svg>
        <div class="score-num">${score}</div>
        <div class="score-pct">%</div>
      </div>
      <div class="result-grade" style="color:${gradeColor}">${grade}</div>
      <div class="result-sub">You answered ${answered} out of ${total} questions</div>
      <div class="result-stats">
        <div class="rs"><div class="n" style="color:var(--success)">${correct}</div><div class="l">Correct</div></div>
        <div class="rs"><div class="n" style="color:var(--danger)">${wrong}</div><div class="l">Wrong</div></div>
        <div class="rs"><div class="n" style="color:var(--accent)">${total - answered < 0 ? 0 : total - answered}</div><div class="l">Unanswered</div></div>
      </div>
    </div>

    <div class="result-actions">
      ${wrongSet.length ? `<button class="btn btn-retry" onclick="retryWrong()"><i class="fa-solid fa-rotate-right"></i> Retry Wrong Questions (${wrongSet.length})</button>` :   }
      <button class="btn btn-home" onclick="init(RAW_QUESTIONS)"><i class="fa-solid fa-shuffle"></i> New Random Exam</button>
      <a href="https://gaith-team.github.io/exam/" class="btn btn-home" style="text-decoration:none;"><i class="fa-solid fa-house"></i> Back to Subject</a>
    </div>

    <div style="margin-top:28px">
      <div style="font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text2)">📋 Detailed Report</div>
      ${reportHTML}
    </div>`;

  setTimeout(() => { document.getElementById( ringFill ).style.strokeDashoffset = offset; }, 100);
  window.scrollTo({top: 0, behavior:  smooth });
}

/* RETRY WRONG — re-shuffle options again */
function retryWrong() {
  // wrongSet holds already-shuffled questions; re-shuffle options for a fresh attempt
  const pool = wrongSet.map(q => {
    // Find original question from RAW_QUESTIONS by text to re-shuffle cleanly
    const raw = RAW_QUESTIONS.find(r => r.t === q.t);
    return raw ? raw : q;
  });
  questions = prepareQuestions(pool);
  i = 0; correct = 0; wrong = 0;
  answers = new Array(questions.length).fill(null);
  wrongSet = []; answered = 0; timeLeft = totalTime;
  startTimer(); render();
  window.scrollTo({top: 0, behavior:  smooth });
}

/* THEME */
const themeBtn = document.getElementById( themeBtn );
let theme = localStorage.getItem( theme ) ||  light ;
function applyTheme(t) {
  theme = t;
  document.documentElement.setAttribute( data-theme , t ===  dark  ?  dark  :   );
  themeBtn.textContent = t ===  dark  ?  ☀️  :  🌙 ;
  localStorage.setItem( theme , t);
}
applyTheme(theme);
themeBtn.addEventListener( click , () => applyTheme(theme ===  dark  ?  light  :  dark ));

/* START */
init(RAW_QUESTIONS);
</script>
