
<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAITH TEAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
 
<style>
:root {
  --accent: #059669;
  --accent-light: #34d399;
  --accent-dark: #047857;
  --accent-glow: rgba(5,150,105,0.18);
  --bg: #f0fdf4;
  --bg2: #dcfce7;
  --card: #ffffff;
  --text: #0f2417;
  --text2: #374151;
  --text3: #6b7280;
  --bc: rgba(5,150,105,0.12);
  --success: #16a34a;
  --danger: #dc2626;
  --warn: #d97706;
  --r: 16px;
  --tr: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
 
[data-theme="dark"] {
  --bg: #022c22;
  --bg2: #064e3b;
  --card: #065f46;
  --text: #ecfdf5;
  --text2: #a7f3d0;
  --text3: #6ee7b7;
  --bc: rgba(52,211,153,0.15);
  --accent-glow: rgba(52,211,153,0.2);
}
 
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
 
body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background .4s, color .4s;
}
 
/* PROGRESS TOP */
#prog-bar {
  position: fixed;
  top: 0; left: 0;
  height: 3px;
  width: 0%;
  z-index: 999;
  background: linear-gradient(90deg, var(--accent-dark), var(--accent-light));
  transition: width .2s;
}
 
/* NAV */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  padding: 0 28px;
  background: rgba(240,253,244,.95);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--bc);
  transition: var(--tr);
}
 
[data-theme="dark"] nav { background: rgba(2,44,34,.97); }
 
.nav-back {
  display: flex; align-items: center; gap: 7px;
  text-decoration: none;
  font-size: 13px; font-weight: 700;
  color: var(--text2);
  padding: 7px 13px;
  border-radius: 8px;
  border: 1px solid var(--bc);
  background: var(--card);
  transition: var(--tr);
}
.nav-back:hover { color: var(--accent); border-color: var(--accent); transform: translateX(-3px); }
 
.nav-brand {
  display: flex; align-items: center; gap: 9px;
  font-size: 15px; font-weight: 900;
  color: var(--text);
}
 
.nav-logo-icon {
  width: 34px; height: 34px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--accent-dark), var(--accent-light));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 900;
}
 
.nav-right { display: flex; align-items: center; gap: 8px; }
 
.theme-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  border: 1px solid var(--bc);
  background: var(--card);
  cursor: pointer;
  font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  transition: var(--tr);
}
.theme-btn:hover { border-color: var(--accent); transform: rotate(20deg); }
 
/* HERO */
.hero-band {
  margin-top: 64px;
  position: relative; overflow: hidden;
  text-align: center;
  padding: 40px 24px 36px;
  background: linear-gradient(135deg, #065f46, #059669, #34d399);
}
.hero-band::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 600px 200px at 50% 100%, rgba(255,255,255,.12) 0%, transparent 70%);
}
.hero-band::after {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 180px; height: 180px;
  border-radius: 50%;
  background: rgba(255,255,255,.07);
}
 
.hero-band-icon {
  width: 68px; height: 68px;
  margin: 0 auto 14px;
  border-radius: 20px;
  background: rgba(255,255,255,.2);
  backdrop-filter: blur(8px);
  border: 1.5px solid rgba(255,255,255,.35);
  display: flex; align-items: center; justify-content: center;
  font-size: 30px;
  position: relative; z-index: 1;
}
 
.hero-band h1 {
  font-size: clamp(20px,4vw,30px);
  font-weight: 900;
  color: #fff;
  margin-bottom: 6px;
  position: relative; z-index: 1;
}
 
.hero-band p {
  font-size: 13px;
  color: rgba(255,255,255,.85);
  position: relative; z-index: 1;
}
 
/* HERO META */
.hero-band-meta {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 14px;
  position: relative; z-index: 1;
}
 
.meta-pill {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,.18);
  border: 1px solid rgba(255,255,255,.3);
  backdrop-filter: blur(6px);
  border-radius: 20px;
  padding: 5px 13px;
  font-size: 12px;
  font-weight: 700;
  color: #fff;
}
 
/* SHELL */
.shell {
  max-width: 740px;
  margin: 0 auto;
  padding: 24px 16px 60px;
}
 
/* STATS ROW */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}
 
.stat-box {
  background: var(--card);
  border: 1px solid var(--bc);
  border-radius: var(--r);
  padding: 14px 10px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,.04);
}
 
.stat-box .val {
  font-size: 24px;
  font-weight: 900;
  line-height: 1;
  margin-bottom: 4px;
}
.stat-correct { color: var(--success); }
.stat-wrong   { color: var(--danger); }
.stat-remain  { color: var(--accent); }
 
.stat-box .lbl {
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  letter-spacing: .4px;
}
 
/* PROGRESS STRIP */
.prog-strip {
  background: var(--card);
  border: 1px solid var(--bc);
  border-radius: var(--r);
  padding: 12px 16px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,.04);
}
 
.prog-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--text2);
  white-space: nowrap;
  min-width: 110px;
}
 
.prog-track {
  flex: 1;
  height: 7px;
  background: var(--bg2);
  border-radius: 99px;
  overflow: hidden;
}
 
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-dark), var(--accent-light));
  border-radius: 99px;
  transition: width .4s ease;
  width: 0%;
}
 
.timer-badge {
  display: flex; align-items: center; gap: 5px;
  background: var(--bg2);
  border-radius: 8px;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 800;
  color: var(--accent-dark);
  white-space: nowrap;
  transition: var(--tr);
}
.timer-badge.warn  { background: #fef3c7; color: var(--warn); }
.timer-badge.danger { background: #fee2e2; color: var(--danger); }
 
/* QUESTION CARD */
.q-card {
  background: var(--card);
  border: 1px solid var(--bc);
  border-radius: var(--r);
  padding: 24px;
  box-shadow: 0 4px 20px rgba(0,0,0,.06);
  animation: fadeUp .3s ease;
}
 
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
 
.q-header { margin-bottom: 6px; }
 
.q-num {
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: .5px;
  text-transform: uppercase;
}
 
.q-text {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.6;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--bc);
}
 
/* OPTIONS */
.options { display: flex; flex-direction: column; gap: 10px; }
 
.opt {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 16px;
  border-radius: 12px;
  border: 1.5px solid var(--bc);
  background: var(--bg);
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  transition: var(--tr);
  user-select: none;
}
 
.opt:hover:not(.disabled) {
  border-color: var(--accent);
  background: var(--accent-glow);
  transform: translateX(4px);
}
 
.opt-letter {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: var(--bg2);
  border: 1px solid var(--bc);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  font-weight: 900;
  color: var(--accent-dark);
  flex-shrink: 0;
  transition: var(--tr);
}
 
.opt.disabled { pointer-events: none; cursor: default; }
 
.opt.correct {
  border-color: var(--success);
  background: #dcfce7;
  color: var(--success);
}
.opt.correct .opt-letter {
  background: var(--success);
  color: #fff;
  border-color: var(--success);
}
 
.opt.wrong {
  border-color: var(--danger);
  background: #fee2e2;
  color: var(--danger);
}
.opt.wrong .opt-letter {
  background: var(--danger);
  color: #fff;
  border-color: var(--danger);
}
 
[data-theme="dark"] .opt.correct { background: rgba(22,163,74,.2); }
[data-theme="dark"] .opt.wrong   { background: rgba(220,38,38,.2); }
 
/* FEEDBACK */
.feedback-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 14px;
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 700;
  animation: fadeUp .25s ease;
}
.feedback-bar.ok {
  background: #dcfce7;
  color: var(--success);
  border: 1px solid #bbf7d0;
}
.feedback-bar.no {
  background: #fee2e2;
  color: var(--danger);
  border: 1px solid #fecaca;
}
[data-theme="dark"] .feedback-bar.ok { background: rgba(22,163,74,.2); border-color: rgba(22,163,74,.3); }
[data-theme="dark"] .feedback-bar.no { background: rgba(220,38,38,.2); border-color: rgba(220,38,38,.3); }
 
.feedback-icon { font-size: 18px; }
 
/* EXPLANATION */
.explanation {
  margin-top: 10px;
  padding: 12px 16px;
  border-radius: 12px;
  background: var(--bg2);
  border: 1px solid var(--bc);
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  line-height: 1.6;
}
 
/* NAV BUTTONS */
.nav-btns {
  display: flex;
  justify-content: flex-end;
  margin-top: 18px;
  gap: 10px;
}
 
/* BUTTONS */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 11px 20px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  font-weight: 700;
  transition: var(--tr);
}
.btn:hover { transform: translateY(-2px); }
.btn:active { transform: translateY(0); }
 
.btn-skip {
  background: var(--bg2);
  color: var(--text2);
  border: 1px solid var(--bc);
}
.btn-skip:hover { border-color: var(--warn); color: var(--warn); }
 
.btn-next {
  background: linear-gradient(135deg, var(--accent-dark), var(--accent));
  color: #fff;
  box-shadow: 0 4px 14px var(--accent-glow);
}
.btn-next:hover { box-shadow: 0 6px 20px var(--accent-glow); }
 
.btn-retry {
  background: linear-gradient(135deg, #dc2626, #ef4444);
  color: #fff;
  box-shadow: 0 4px 14px rgba(220,38,38,.25);
}
 
.btn-home {
  background: linear-gradient(135deg, var(--accent-dark), var(--accent));
  color: #fff;
  box-shadow: 0 4px 14px var(--accent-glow);
  text-decoration: none;
}
 
/* RESULT HERO */
.result-hero {
  background: var(--card);
  border: 1px solid var(--bc);
  border-radius: var(--r);
  padding: 32px 24px;
  text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,.06);
  margin-bottom: 16px;
  animation: fadeUp .4s ease;
}
 
.score-ring {
  position: relative;
  width: 130px; height: 130px;
  margin: 0 auto 16px;
}
 
.score-ring svg {
  width: 130px; height: 130px;
  transform: rotate(-90deg);
}
 
.ring-bg {
  fill: none;
  stroke: var(--bg2);
  stroke-width: 8;
}
 
.ring-fill {
  fill: none;
  stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1);
}
 
.score-num {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 36px;
  font-weight: 900;
  color: var(--text);
  line-height: 1;
}
 
.score-pct {
  position: absolute;
  bottom: 26px;
  right: 24px;
  font-size: 14px;
  font-weight: 700;
  color: var(--text3);
}
 
.result-grade {
  font-size: 22px;
  font-weight: 900;
  margin-bottom: 6px;
}
 
.result-sub {
  font-size: 13px;
  color: var(--text3);
  margin-bottom: 20px;
}
 
.result-stats {
  display: flex;
  justify-content: center;
  gap: 28px;
  flex-wrap: wrap;
}
 
.rs { text-align: center; }
.rs .n { font-size: 26px; font-weight: 900; line-height: 1; }
.rs .l { font-size: 11px; font-weight: 700; color: var(--text3); margin-top: 3px; }
 
/* RESULT ACTIONS */
.result-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 20px;
}
 
.result-actions .btn { flex: 1; justify-content: center; min-width: 160px; }
 
/* REPORT ITEMS */
.report-item {
  background: var(--card);
  border: 1px solid var(--bc);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 8px;
  border-left: 4px solid var(--bc);
}
.report-item.ok { border-left-color: var(--success); }
.report-item.no { border-left-color: var(--danger); }
 
.ri-q {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
  line-height: 1.5;
}
 
.ri-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  margin-top: 5px;
}
 
.ri-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 700;
  white-space: nowrap;
}
.ri-yours { background: #fee2e2; color: var(--danger); }
.ri-right { background: #dcfce7; color: var(--success); }
 
/* FOOTER */
footer {
  text-align: center;
  padding: 24px 16px;
  border-top: 1px solid var(--bc);
  margin-top: 20px;
}
 
.footer-brand {
  font-size: 16px;
  font-weight: 900;
  color: var(--text3);
  margin-bottom: 8px;
  letter-spacing: 1px;
}
 
.footer-brand span { color: var(--accent); }
 
.footer-tg {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  text-decoration: none;
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  padding: 7px 14px;
  border-radius: 8px;
  border: 1px solid var(--bc);
  background: var(--card);
  transition: var(--tr);
}
.footer-tg:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
 
/* MEDIA */
@media (max-width: 480px) {
  nav { padding: 0 14px; }
  .nav-brand span { display: none; }
  .hero-band { padding: 30px 16px 28px; }
  .q-card { padding: 18px 14px; }
  .q-text { font-size: 14px; }
  .opt { font-size: 13px; padding: 11px 12px; }
  .prog-strip { flex-wrap: wrap; gap: 8px; }
  .prog-label { min-width: unset; }
}
</style>
</head>

<nav>

    <i class="fa-solid fa-arrow-left"></i> Back

<footer>

/* SHUFFLE OPTIONS */
function shuffleOptions(q) {
  const correctText = q.o[q.a];
  const indexed = q.o.map((text, idx) => ({ text, idx }));
  for (let i = indexed.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indexed[i], indexed[j]] = [indexed[j], indexed[i]];
  }
  const newOptions = indexed.map(item => item.text);
  const newAnswerIdx = newOptions.indexOf(correctText);
  return { t: q.t, o: newOptions, a: newAnswerIdx, exp: q.exp || null };
}
 
/* ENGINE */
let questions, i, correct, wrong, answers, wrongSet, answered;
let totalTime = 35*60, timeLeft, timerInterval;
const LETTERS = ['A','B','C','D','E','F'];
 
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
 
function prepareQuestions(pool) {
  return shuffle([...pool]).map(q => shuffleOptions(q));
}
 
function init(pool) {
  questions = prepareQuestions(pool);
  i = 0; correct = 0; wrong = 0;
  answers = new Array(questions.length).fill(null);
  wrongSet = []; answered = 0;
  timeLeft = totalTime;
  document.getElementById('totalBadge').textContent = questions.length + ' Questions';
  startTimer();
  render();
}
 
/* TIMER */
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
    document.getElementById('timerTxt').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
    const badge = document.getElementById('timerBadge');
    if (timeLeft <= 120)      badge.className = 'timer-badge danger';
    else if (timeLeft <= 300) badge.className = 'timer-badge warn';
    else                      badge.className = 'timer-badge';
    if (timeLeft <= 0) { clearInterval(timerInterval); finish(); }
  }, 1000);
}
 
/* TOP UI */
function updateTop() {
  const total = questions.length;
  document.getElementById('sCorrect').textContent = correct;
  document.getElementById('sWrong').textContent = wrong;
  document.getElementById('sRemain').textContent = Math.round(((total - answered) / total) * 100) + '%';
  document.getElementById('progLabel').textContent = 'Question ' + (i + 1) + ' / ' + total;
  document.getElementById('progFill').style.width = ((i + 1) / total * 100) + '%';
  document.getElementById('prog-bar').style.width = ((i + 1) / total * 100) + '%';
}
 
/* RENDER */
function render() {
  updateTop();
  const q = questions[i];
  document.getElementById('app').innerHTML = `
    <div class="q-card">
      <div class="q-header">
        <div class="q-num">Question ${i + 1} / ${questions.length}</div>
      </div>
      <div class="q-text">${q.t}</div>
      <div class="options">
        ${q.o.map((o, idx) => `
          <div class="opt" id="opt${idx}" onclick="choose(${idx})">
            <div class="opt-letter">${LETTERS[idx] || idx + 1}</div>
            ${o}
          </div>
        `).join('')}
      </div>
      <div class="nav-btns">
        <button class="btn btn-skip" onclick="skip()"><i class="fa-solid fa-forward"></i> Skip</button>
      </div>
    </div>`;
}
 
/* CHOOSE */
function choose(v) {
  if (answers[i] !== null) return;
  answers[i] = v;
  answered++;
  const q = questions[i];
  const ok = v === q.a;
  ok ? correct++ : wrong++;
  updateTop();
 
  q.o.forEach((_, idx) => {
    const el = document.getElementById('opt' + idx);
    el.classList.add('disabled');
    if (idx === q.a) el.classList.add('correct');
    else if (idx === v) el.classList.add('wrong');
  });
 
  const fb = document.createElement('div');
  fb.className = 'feedback-bar ' + (ok ? 'ok' : 'no');
  fb.innerHTML = ok
    ? `<span class="feedback-icon">🎉</span> <span>Correct answer! Well done</span>`
    : `<span class="feedback-icon">💡</span> <span>Correct answer: <b>${q.o[q.a]}</b></span>`;
 
  const card = document.querySelector('.q-card');
  card.querySelector('.options').after(fb);
 
  if (q.exp) {
    const exp = document.createElement('div');
    exp.className = 'explanation';
    exp.innerHTML = '<b>💬 Explanation:</b> ' + q.exp;
    fb.after(exp);
  }
 
  const navBtns = card.querySelector('.nav-btns');
  navBtns.innerHTML = `<button class="btn btn-next" onclick="next()">
    ${i < questions.length - 1
      ? '<i class="fa-solid fa-arrow-right"></i> Next Question'
      : '<i class="fa-solid fa-flag-checkered"></i> Finish Exam'}
  </button>`;
}
 
/* SKIP */
function skip() {
  if (answers[i] === null) {
    answers[i] = -1; answered++; wrongSet.push(questions[i]); wrong++; updateTop();
  }
  next();
}
 
/* NEXT */
function next() {
  if (i < questions.length - 1) {
    i++; render(); window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    finish();
  }
}
 
/* FINISH */
function finish() {
  clearInterval(timerInterval);
  const total = questions.length;
  const score = Math.round((correct / total) * 100);
 
  const wrongItems = [];
  questions.forEach((q, idx) => {
    if (answers[idx] !== q.a) wrongItems.push({ ...q, myAns: answers[idx] });
  });
  wrongSet = [...new Map(wrongItems.map(q => [q.t, q])).values()];
 
  let grade, gradeColor;
  if (score >= 90)      { grade = '🥇 Excellent';     gradeColor = 'var(--success)'; }
  else if (score >= 75) { grade = '🥈 Very Good';      gradeColor = 'var(--accent)'; }
  else if (score >= 60) { grade = '🥉 Good';           gradeColor = 'var(--warn)'; }
  else                  { grade = '📚 Needs Review';   gradeColor = 'var(--danger)'; }
 
  const circ = 2 * Math.PI * 45;
  const offset = circ - (score / 100) * circ;
 
  const reportHTML = questions.map((q, idx) => {
    const ok = answers[idx] === q.a;
    return `<div class="report-item ${ok ? 'ok' : 'no'}">
      <div class="ri-q">${ok ? '✅' : '❌'} ${q.t}</div>
      ${!ok ? `
        <div class="ri-row"><span class="ri-badge ri-yours">Your Answer</span> ${answers[idx] >= 0 ? q.o[answers[idx]] : 'Skipped'}</div>
        <div class="ri-row"><span class="ri-badge ri-right">Correct</span> ${q.o[q.a]}</div>
      ` : ''}
    </div>`;
  }).join('');
 
  document.getElementById('prog-bar').style.width = '100%';
  document.getElementById('app').innerHTML = `
    <div class="result-hero">
      <div class="score-ring">
        <svg viewBox="0 0 110 110">
          <circle class="ring-bg"   cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="0"/>
          <circle class="ring-fill" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            style="stroke:${gradeColor}" id="ringFill"/>
        </svg>
        <div class="score-num">${score}</div>
        <div class="score-pct">%</div>
      </div>
      <div class="result-grade" style="color:${gradeColor}">${grade}</div>
      <div class="result-sub">You answered ${answered} out of ${total} questions</div>
      <div class="result-stats">
        <div class="rs"><div class="n" style="color:var(--success)">${correct}</div><div class="l">Correct</div></div>
        <div class="rs"><div class="n" style="color:var(--danger)">${wrong}</div><div class="l">Wrong</div></div>
        <div class="rs"><div class="n" style="color:var(--accent)">${Math.max(0, total - answered)}</div><div class="l">Unanswered</div></div>
      </div>
    </div>
 
    <div class="result-actions">
      ${wrongSet.length ? `<button class="btn btn-retry" onclick="retryWrong()"><i class="fa-solid fa-rotate-right"></i> Retry Wrong (${wrongSet.length})</button>` : ''}
      <button class="btn btn-home" onclick="init(RAW_QUESTIONS)"><i class="fa-solid fa-shuffle"></i> New Random Exam</button>
      <a href="https://gaith-team.github.io/exam/" class="btn btn-home" style="text-decoration:none;"><i class="fa-solid fa-house"></i> Back to Subject</a>
    </div>
 
    <div style="margin-top:28px">
      <div style="font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text2)">📋 Detailed Report</div>
      ${reportHTML}
    </div>`;
 
  setTimeout(() => { document.getElementById('ringFill').style.strokeDashoffset = offset; }, 100);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
 
/* RETRY WRONG */
function retryWrong() {
  const pool = wrongSet.map(q => {
    const raw = RAW_QUESTIONS.find(r => r.t === q.t);
    return raw ? raw : q;
  });
  questions = prepareQuestions(pool);
  i = 0; correct = 0; wrong = 0;
  answers = new Array(questions.length).fill(null);
  wrongSet = []; answered = 0;
  timeLeft = totalTime;
  startTimer(); render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
 
/* THEME */
const themeBtn = document.getElementById('themeBtn');
let theme = localStorage.getItem('theme') || 'light';
function applyTheme(t) {
  theme = t;
  document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : '');
  themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('theme', t);
}
applyTheme(theme);
themeBtn.addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'));
 
/* START */
init(RAW_QUESTIONS);
</script>
