<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHAITH TEAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent:       #2563eb;
  --accent-light: #3b82f6;
  --accent-dark:  #1d4ed8;
  --accent-glow:  rgba(37,99,235,0.2);
  --bg:      #f8fafc;
  --bg2:     #eef2f7;
  --card:    #ffffff;
  --text:    #1a2332;
  --text2:   #4a5568;
  --text3:   #718096;
  --bc:      rgba(0,0,0,0.07);
  --success: #16a34a;
  --danger:  #dc2626;
  --warn:    #1d4ed8;
  --r:       16px;
  --tr:      all 0.3s cubic-bezier(0.4,0,0.2,1);

  --t1: #2563eb;
  --t2: #16a34a;
  --t3: #dc2626;
  --t4: #7c3aed;
  --t5: #d97706;
}
[data-theme="dark"] {
  --bg:   #0d1117; --bg2: #161b22; --card: #1c2333;
  --text: #e6edf3; --text2: #b1bac4; --text3: #7d8590;
  --bc:   rgba(255,255,255,0.08);
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
  transition: background .4s, color .4s;
}

#prog-bar {
  position: fixed; top: 0; left: 0; height: 3px; z-index: 999;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  transition: width .2s;
}

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 64px;
  background: rgba(248,250,252,.93); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--bc); transition: var(--tr);
}
[data-theme="dark"] nav { background: rgba(13,17,23,.95); }

.nav-back {
  display: flex; align-items: center; gap: 7px;
  color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 700;
  padding: 7px 13px; border-radius: 8px; border: 1px solid var(--bc);
  background: var(--card); transition: var(--tr);
}
.nav-back:hover { color: var(--accent); border-color: var(--accent-glow); transform: translateX(3px); }
.nav-brand { display: flex; align-items: center; gap: 9px; font-size: 15px; font-weight: 900; color: var(--text); }
.nav-logo-icon {
  width: 34px; height: 34px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 900;
}
.nav-right { display: flex; align-items: center; gap: 8px; }
.theme-btn {
  width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--bc);
  background: var(--card); cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center; transition: var(--tr);
}
.theme-btn:hover { border-color: var(--accent); transform: rotate(20deg); }

.hero-band {
  margin-top: 64px;
  background: linear-gradient(135deg, var(--accent-dark), var(--accent), var(--accent-light));
  padding: 40px 24px 36px; text-align: center;
  position: relative; overflow: hidden;
}
.hero-band::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 600px 200px at 50% 100%, rgba(255,255,255,.12) 0%, transparent 70%);
}
.hero-band-icon {
  width: 68px; height: 68px; border-radius: 20px;
  background: rgba(255,255,255,.2); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; margin: 0 auto 14px; border: 1.5px solid rgba(255,255,255,.35);
}
.hero-band h1 { font-size: clamp(20px,4vw,30px); font-weight: 900; color: #fff; margin-bottom: 6px; }
.hero-band p { font-size: 13px; color: rgba(255,255,255,.8); }
.hero-band-meta {
  display: flex; justify-content: center; gap: 24px; margin-top: 20px;
  flex-wrap: wrap;
}
.meta-pill {
  background: rgba(255,255,255,.18); backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,.3); border-radius: 50px;
  padding: 6px 16px; font-size: 12px; font-weight: 700; color: #fff;
  display: flex; align-items: center; gap: 6px;
}

/* TOPIC FILTER */
.topics-section {
  max-width: 600px; margin: 0 auto 16px;
  padding: 0 4px;
}
.topics-label {
  font-size: 12px; font-weight: 700; color: var(--text3);
  margin-bottom: 8px; text-transform: uppercase; letter-spacing: .5px;
}
.topics-wrap {
  display: flex; flex-wrap: wrap; gap: 8px;
}
.topic-btn {
  font-family: 'Outfit', sans-serif;
  font-size: 12px; font-weight: 700;
  padding: 6px 14px; border-radius: 20px;
  border: 1.5px solid var(--bc);
  background: var(--card); color: var(--text2);
  cursor: pointer; transition: var(--tr);
  white-space: nowrap;
}
.topic-btn:hover { border-color: var(--accent); color: var(--accent); }
.topic-btn.active { color: #fff; border-color: transparent; }
.topic-btn[data-topic="All"].active           { background: var(--accent); }
.topic-btn[data-topic="Wound Healing"].active  { background: #2563eb; }
.topic-btn[data-topic="Surgical Infections"].active { background: #16a34a; }
.topic-btn[data-topic="Shock"].active          { background: #dc2626; }
.topic-btn[data-topic="Abdominal Trauma"].active { background: #7c3aed; }
.topic-btn[data-topic="Blood Transfusion"].active { background: #d97706; }

.shell { max-width: 600px; margin: 0 auto; padding: 24px 20px 80px; }

.stats-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px;
}
.stat-box {
  background: var(--card); border: 1px solid var(--bc); border-radius: var(--r);
  padding: 12px 10px; text-align: center;
}
.stat-box .val { font-size: 20px; font-weight: 900; }
.stat-box .lbl { font-size: 11px; color: var(--text3); margin-top: 2px; }
.stat-correct { color: var(--success); }
.stat-wrong   { color: var(--danger); }
.stat-remain  { color: var(--accent); }

.prog-strip {
  background: var(--card); border: 1px solid var(--bc); border-radius: var(--r);
  padding: 14px 16px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 14px;
}
.prog-label { font-size: 13px; font-weight: 700; color: var(--text2); white-space: nowrap; }
.prog-track { flex: 1; height: 8px; background: var(--bg2); border-radius: 8px; overflow: hidden; }
.prog-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  border-radius: 8px; transition: width .4s;
}
.timer-badge {
  min-width: 64px; height: 36px; border-radius: 18px;
  background: var(--bg2); border: 1px solid var(--bc);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 900; color: var(--text);
  gap: 5px; padding: 0 12px; flex-shrink: 0;
}
.timer-badge.warn { color: var(--warn); border-color: rgba(217,119,6,.3); background: rgba(217,119,6,.08); }
.timer-badge.danger { color: var(--danger); border-color: rgba(220,38,38,.3); background: rgba(220,38,38,.08); animation: pulse .8s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

.q-card {
  background: var(--card); border: 1px solid var(--bc);
  border-radius: 20px; overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,.06);
  transition: box-shadow .3s;
}
.q-header {
  background: linear-gradient(135deg, var(--accent-dark), var(--accent));
  padding: 10px 18px;
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.q-num {
  background: rgba(255,255,255,.2); border-radius: 8px;
  padding: 3px 10px; font-size: 11px; font-weight: 700; color: #fff;
}
.q-topic-badge {
  font-size: 11px; font-weight: 700; color: #fff;
  background: rgba(255,255,255,.2); border-radius: 20px;
  padding: 3px 10px;
}
.q-text {
  padding: 22px 18px 14px; font-size: 15px; font-weight: 700; color: var(--text);
  line-height: 1.65; border-bottom: 1px solid var(--bc);
  text-align: left; direction: ltr;
}
.options { padding: 14px 18px 18px; display: flex; flex-direction: column; gap: 10px; }

.opt {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; border-radius: 12px;
  border: 1.5px solid var(--bc); background: var(--bg);
  cursor: pointer; font-size: 14px; font-weight: 600; color: var(--text);
  transition: var(--tr); user-select: none;
  direction: ltr; text-align: left;
}
.opt:hover:not(.disabled) {
  border-color: var(--accent); background: var(--accent-glow);
  transform: translateX(3px);
}
.opt-letter {
  width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
  background: var(--bg2); border: 1px solid var(--bc);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 900; color: var(--text3);
  transition: var(--tr);
}
.opt.correct { border-color: var(--success); background: rgba(22,163,74,.08); }
.opt.correct .opt-letter { background: var(--success); color: #fff; border-color: var(--success); }
.opt.wrong { border-color: var(--danger); background: rgba(220,38,38,.07); }
.opt.wrong .opt-letter { background: var(--danger); color: #fff; border-color: var(--danger); }
.opt.disabled { pointer-events: none; }

.feedback-bar {
  margin: 14px 18px; padding: 12px 16px; border-radius: 12px;
  display: flex; align-items: center; gap: 10px;
  font-size: 14px; font-weight: 700;
  animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
.feedback-bar.ok { background: rgba(22,163,74,.1); color: var(--success); border: 1px solid rgba(22,163,74,.25); }
.feedback-bar.no { background: rgba(220,38,38,.08); color: var(--danger); border: 1px solid rgba(220,38,38,.2); }
.feedback-icon { font-size: 20px; }

.explanation {
  margin: 0 18px 14px; padding: 12px 14px;
  background: rgba(37,99,235,.06);
  border-radius: 10px; border-left: 3px solid var(--accent);
  font-size: 13px; color: var(--text2); line-height: 1.6;
}

.nav-btns { padding: 4px 18px 18px; display: flex; gap: 10px; }
.btn {
  flex: 1; padding: 13px; border: none; border-radius: 12px;
  font-size: 14px; font-weight: 900; cursor: pointer;
  font-family: 'Outfit', sans-serif; transition: var(--tr);
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.btn-next {
  background: linear-gradient(135deg, var(--accent-dark), var(--accent));
  color: #fff; box-shadow: 0 4px 14px var(--accent-glow);
}
.btn-next:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
.btn-skip {
  background: var(--bg2); color: var(--text2); border: 1px solid var(--bc); flex: 0 0 auto; padding: 13px 18px;
}
.btn-skip:hover { border-color: var(--warn); color: var(--warn); }

.result-hero {
  text-align: center; padding: 36px 20px 28px;
  background: var(--card); border-radius: 20px;
  border: 1px solid var(--bc); margin-bottom: 20px;
  box-shadow: 0 4px 20px rgba(0,0,0,.06);
}
.score-ring {
  width: 110px; height: 110px; border-radius: 50%; margin: 0 auto 18px;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; border: 5px solid var(--bg2);
  position: relative;
}
.score-ring svg { position: absolute; inset: -5px; width: calc(100% + 10px); height: calc(100% + 10px); transform: rotate(-90deg); }
.score-ring circle { fill: none; stroke-width: 5; stroke-linecap: round; }
.ring-bg { stroke: var(--bg2); }
.ring-fill { stroke: var(--accent); transition: stroke-dashoffset 1s ease; }
.score-num { font-size: 28px; font-weight: 900; color: var(--text); }
.score-pct { font-size: 12px; color: var(--text3); }
.result-grade { font-size: 22px; font-weight: 900; margin-bottom: 6px; }
.result-sub { font-size: 14px; color: var(--text2); }
.result-stats {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 20px;
}
.rs { background: var(--bg2); border-radius: 10px; padding: 12px 8px; text-align: center; }
.rs .n { font-size: 20px; font-weight: 900; }
.rs .l { font-size: 11px; color: var(--text3); }

.report-item {
  background: var(--card); border: 1px solid var(--bc); border-radius: 14px;
  padding: 16px; margin-bottom: 10px; border-left: 4px solid var(--bc);
}
.report-item.ok { border-left-color: var(--success); }
.report-item.no { border-left-color: var(--danger); }
.report-item .ri-q { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
.report-item .ri-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; margin-top: 5px; color: var(--text2);
}
.ri-badge {
  padding: 2px 8px; border-radius: 6px; font-weight: 700; font-size: 11px; flex-shrink: 0;
}
.ri-yours { background: rgba(220,38,38,.1); color: var(--danger); }
.ri-right { background: rgba(22,163,74,.1); color: var(--success); }

.result-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
.btn-retry { background: linear-gradient(135deg, var(--accent-dark), var(--accent)); color: #fff; }
.btn-retry:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
.btn-home { background: var(--bg2); color: var(--text); border: 1px solid var(--bc); }
.btn-home:hover { border-color: var(--accent); color: var(--accent); }

footer {
  background: var(--bg2); border-top: 1px solid var(--bc);
  padding: 22px 24px; display: flex; align-items: center;
  justify-content: space-between; flex-wrap: wrap; gap: 10px;
}
.footer-brand { font-size: 14px; font-weight: 700; }
.footer-brand span { color: var(--accent); }
.footer-tg { display: flex; align-items: center; gap: 5px; text-decoration: none; color: #229ED9; font-size: 12px; font-weight: 600; }

@media (max-width: 480px) {
  nav { padding: 0 14px; }
  .shell { padding: 16px 14px 60px; }
  .nav-brand span { display: none; }
  .hero-band { padding: 30px 16px 28px; }
}
</style>
</head>

<script>
const ALL_QUESTIONS = [
  {t:"Which of the following morphological classifications involves the tearing away of a large flap of skin and subcutaneous tissue?",o:["Abrasion","Incision","Laceration","Degloving/Avulsion"],a:3,topic:"Wound Healing",exp:"Avulsion/Degloving injury involves tearing away of a large skin and subcutaneous tissue flap."},
  {t:"An elective, non-traumatic surgical wound where the respiratory, gastrointestinal, biliary, and genitourinary tracts are NOT entered is classified as:",o:["Clean (Class I)","Clean-Contaminated (Class II)","Contaminated (Class III)","Dirty/Infected (Class IV)"],a:0,topic:"Wound Healing",exp:"Class I (Clean) wounds are elective, non-traumatic, primarily closed, and do not enter these tracts."},
  {t:"What is the primary cellular goal during the primary immediate phase of coagulation and hemostasis?",o:["To synthesize Type I collagen fibers.","To prevent blood oozing and establish a temporary provisional matrix.","To initiate systemic epithelial differentiation.","To perform chemical debridement of devitalized tissue."],a:1,topic:"Wound Healing",exp:"Hemostasis rapidly controls blood loss and sets a provisional fibrin matrix for subsequent cell invasion."},
  {t:"During the maturation/remodeling phase, collagen shifts until a normal tissue strength ratio of Type I to Type III is achieved. What is this ratio?",o:["1:1","2:1","3:1","4:1"],a:3,topic:"Wound Healing",exp:"Type III is replaced by Type I until a normal 4:1 ratio is reached."},
  {t:"At the end of the remodeling process, the remodeled tissue eventually regains roughly what maximum percentage of its original strength?",o:["50%","60%","80%","100%"],a:2,topic:"Wound Healing",exp:"Remodeled tissue regains roughly 80% of its original pre-injury strength."},
  {t:"Wound healing by delayed primary closure is technically known as:",o:["Primary intention","Secondary intention","Tertiary intention","Quaternary intention"],a:2,topic:"Wound Healing",exp:"Delayed primary closure is defined as healing by tertiary intention."},
  {t:"When a wound is purposely left open to heal naturally via granulation tissue formation, contraction, and re-epithelialization, it heals by:",o:["Primary intention","Secondary intention","Tertiary intention","Apposition intention"],a:1,topic:"Wound Healing",exp:"Secondary intention involves leaving the wound open to heal by granulation, contraction, and epithelial mapping."},
  {t:"Genetic syndromes like Ehlers-Danlos, cutis laxa, and osteogenesis imperfecta impair healing by disrupting which component?",o:["Collagen synthesis and connective tissue","Neutrophil migration","Primary reflex vasoconstriction","Epithelial mitosis"],a:0,topic:"Wound Healing",exp:"These genetic syndromes disrupt structural connective tissue components."},
  {t:"What are the two activities specified under the 'Preparation' step in the general principles of acute wound management?",o:["Suture removal and physiotherapy","Diagnosis and triage","Prophylaxis (antibiotic, tetanus) and analgesia/anaesthesia","Wound closure and drainage"],a:2,topic:"Wound Healing",exp:"The Preparation step links Prophylaxis and Analgesia/anaesthesia."},
  {t:"Meticulous exploration, toilet, and debridement are performed primarily to accomplish which step?",o:["Surveillance for complications","Stratification of associated injuries","Removal of devitalized tissue and clearing contamination","Epithelial cell maturation"],a:2,topic:"Wound Healing",exp:"Debridement and toilet remove non-viable tissue to control contamination."},
  {t:"Which of the following is an advanced modality listed under 'Adjuncts to Wound Healing'?",o:["Systemic anti-inflammatory steroids","Negative pressure therapy and Hyperbaric oxygen","Absolute limb immobilization for 1 year","Topical chemical cauterization"],a:1,topic:"Wound Healing",exp:"Negative pressure therapy and Hyperbaric oxygen are listed under adjuncts."},
  {t:"According to the slides, what represents the absolute future for advanced wound-healing strategies?",o:["Secondary intention grafting","Routine application of silver dressings","Gene therapy delivered via biological, chemical, or physical methods","Extended administrative antibiotic protocols"],a:2,topic:"Wound Healing",exp:"Gene therapy is defined as the future for wound-healing strategies."},
  {t:"How is a surgical site infection (SSI) clinically defined based on the surgical infection guidelines?",o:["Widespread septicemia arising within 48 hours of admission.","An infection occurring at the operative site within 30 days (or up to 1 year if an implant is left).","Any local erythema that resolves without antibiotic treatment.","Superficial skin breakdown after suture removal at 2 weeks."],a:1,topic:"Surgical Infections",exp:"SSI is defined by the 30-day window (or 1 year for prosthetic implants)."},
  {t:"What is the critical threshold of bacterial contamination per gram of tissue required for a wound to develop a clinical infection?",o:["10² organisms per gram","10³ organisms per gram","10⁵ or more organisms per gram","10⁴ organisms per gram"],a:2,topic:"Surgical Infections",exp:"Clinical wound infection occurs when the microbial load exceeds 10⁵ organisms/g of tissue."},
  {t:"A surgical site infection that involves only the skin and subcutaneous tissue of the incision is classified as:",o:["Superficial incisional SSI","Deep incisional SSI","Organ/Space SSI","Systemic necrotizing SSI"],a:0,topic:"Surgical Infections",exp:"Superficial incisional SSI is limited to the skin and subcutaneous tissues."},
  {t:"An infection that occurs within 30 days of surgery and involves the deep soft tissues, such as fascial and muscle layers, is classified as:",o:["Superficial incisional SSI","Deep incisional SSI","Organ/Space SSI","Cavitary cellulitis"],a:1,topic:"Surgical Infections",exp:"Deep incisional SSIs involve deeper soft tissue layers including fascia and muscle."},
  {t:"If a patient develops an intra-abdominal abscess following an open cholecystectomy, this infection is categorized as:",o:["Superficial incisional SSI","Deep incisional SSI","Organ/Space SSI","Locoregional cellulitis"],a:2,topic:"Surgical Infections",exp:"Organ/Space SSIs involve anatomy opened or manipulated during surgery other than the incision layers."},
  {t:"To be effective as prophylaxis against surgical site infections, when should the first dose of an IV antibiotic ideally be administered?",o:["12 hours before the patient arrives at the hospital","Within 60 minutes prior to the surgical incision","Immediately after the skin is fully closed in theater","Upon the patient's arrival in the recovery room"],a:1,topic:"Surgical Infections",exp:"Administering prophylaxis within 1 hour before the incision ensures peak tissue concentrations when the skin barrier is broken."},
  {t:"What is the main clinical distinction between cellulitis and a localized subcutaneous abscess?",o:["Cellulitis is always caused by anaerobic organisms.","An abscess is a localized pus collection requiring drainage; cellulitis is diffuse tissue inflammation treated with antibiotics.","Cellulitis requires immediate emergency debridement in the operating room.","Abscesses never present with localized erythema or warmth."],a:1,topic:"Surgical Infections",exp:"Abscesses contain trapped purulent material requiring physical evacuation; cellulitis is non-fluctuant spreading inflammation."},
  {t:"What is the primary management strategy for a deep surgical site infection that has led to fascial dehiscence?",o:["Increasing oral antibiotic dosages at home","Immediate surgical exploration, debridement of non-viable tissue, and source control","Applying dry sterile dressings without opening the wound","Immediate application of topical corticosteroid creams"],a:1,topic:"Surgical Infections",exp:"Fascial breakdown and deep tissue infection require operative exploration, washout, and surgical source control."},
  {t:"Why is the presence of necrotic or devitalized tissue in a wound bed highly dangerous regarding surgical infections?",o:["It accelerates the systemic metabolic rate.","It acts as a culture medium for bacterial proliferation and lowers the required bacterial inoculum for infection.","It prevents the absorption of inhaled anesthetic gases.","It converts clean-contaminated wounds directly into clean wounds."],a:1,topic:"Surgical Infections",exp:"Dead tissue lacks a blood supply to deliver immune cells, serving as an ideal shield and medium for microbial growth."},
  {t:"Which pathogen is associated with water sources and commonly causes green-pigmented, sweet-smelling purulent drainage in chronic wounds?",o:["Streptococcus pyogenes","Bacteroides fragilis","Pseudomonas aeruginosa","Staphylococcus epidermidis"],a:2,topic:"Surgical Infections",exp:"Pseudomonas aeruginosa produces pyocyanin pigment (greenish-blue) and carries a distinct fruity odor."},
  {t:"For which class of surgical wounds is therapeutic (treatment) antibiotic design indicated rather than simple short-course prophylaxis?",o:["Class I (Clean)","Class II (Clean-contaminated)","Uncomplicated superficial abrasions","Class IV (Dirty/Infected)"],a:3,topic:"Surgical Infections",exp:"Class IV wounds have active pre-existing infection or perforation, requiring a full therapeutic course of targeted antibiotics."},
  {t:"What does the term 'Source Control' mean in the management of severe surgical infections?",o:["Finding the precise geographical hospital ward where the bacteria originated.","Physical elimination of the focus of infection, such as draining an abscess or resecting perforated bowel.","Administering a combination of three broad-spectrum antiviral agents.","Isolating the patient in a negative-pressure private room."],a:1,topic:"Surgical Infections",exp:"Source control refers to physical interventions designed to eliminate a focus of infection or contamination."},
  {t:"A patient presents 5 days post-laparotomy with fever, localized incisional pain, erythema, and fluctuance. What is the nurse's first anticipated intervention?",o:["Apply tight compression bandages over the skin.","Assist with opening the wound incision line to allow for purulent drainage.","Administer high doses of subcutaneous heparin.","Encourage immediate vigorous abdominal wall exercises."],a:1,topic:"Surgical Infections",exp:"Fluctuance indicates a localized fluid collection (pus); opening the incision relieves pressure and clears the infection source."},
  {t:"Which micro-organism is an obligate anaerobe normally found in the colon that frequently complicates intra-abdominal surgical site infections?",o:["Streptococcus pneumoniae","Bacteroides fragilis","Staphylococcus aureus","Klebsiella pneumoniae"],a:1,topic:"Surgical Infections",exp:"Bacteroides fragilis is a predominant anaerobic commensal of the GI tract involved in mixed intra-abdominal infections."},
  {t:"What nursing measure is vital in preventing the cross-contamination of surgical infections between different patients on a surgical ward?",o:["Changing the patient's dietary status from NPO to regular diet.","Ensuring the patient's room windows are kept closed at all times.","Strict adherence to hand hygiene protocols before and after every patient contact.","Administering prophylactic antibiotics to the nursing staff."],a:2,topic:"Surgical Infections",exp:"Hand hygiene remains the single most effective measure to break the chain of transmission for nosocomial pathogens."},
  {t:"Based on the primary pathophysiological definition of shock, what is the core defect?",o:["A temporary elevation in systemic arterial blood pressure.","An isolated reduction in hemoglobin oxygen-carrying capacity.","Failure of the circulatory system to provide adequate tissue perfusion, leading to cellular hypoxia.","Generalized paralysis of voluntary skeletal muscles."],a:2,topic:"Shock",exp:"Shock is fundamentally a state of systemic circulatory failure where oxygen delivery falls short of cellular metabolic demands."},
  {t:"What mechanism precipitates neurogenic shock after a high cervical spinal cord injury?",o:["Immediate massive internal hemorrhage into the thorax.","Mechanical compression of the superior vena cava.","Sudden loss of sympathetic vasomotor tone, causing widespread vasodilation.","Acute systemic bacterial toxemia."],a:2,topic:"Shock",exp:"Spinal cord injuries disrupt sympathetic pathways, triggering unregulated vasodilation and venous pooling."},
  {t:"Neurogenic shock presents with which unique clinical combination of signs that differs from hypovolemic shock?",o:["Severe tachycardia and profound hypertension","Severe tachycardia and profound hypotension","Bradycardia and hypotension","Hyperthermia and bounding peripheral pulses"],a:2,topic:"Shock",exp:"The loss of sympathetic outflow leaves parasympathetic tone unopposed, causing bradycardia alongside vasodilation."},
  {t:"What type of shock occurs when a physical barrier blocks blood flow through the central circulatory circuit, such as a tension pneumothorax or cardiac tamponade?",o:["Cardiogenic shock","Distributive shock","Obstructive shock","Hypovolemic shock"],a:2,topic:"Shock",exp:"Obstructive shock is caused by mechanical factors that physically impede central venous return or cardiac outflow."},
  {t:"The classic clinical triad known as Beck's Triad indicates cardiac tamponade. What are its three parameters?",o:["Hypotension, muffled heart sounds, and jugular venous distention (JVD).","Hypertension, bradycardia, and irregular respirations.","Hypotension, tachycardia, and widespread wheezing.","Fever, right upper quadrant pain, and jaundice."],a:0,topic:"Shock",exp:"Increased pericardial fluid muffles heart sounds, restricts cardiac filling (causing JVD), and drops stroke volume (causing hypotension)."},
  {t:"How does a tension pneumothorax cause obstructive shock?",o:["It destroys the lung parenchyma, stopping gas exchange completely.","High intrathoracic pressure shifts the mediastinum, compressing the vena cava and blocking venous return to the heart.","It causes direct laceration of the aortic arch.","It triggers an immediate anaphylactic inflammatory storm."],a:1,topic:"Shock",exp:"Progressive accumulation of trapped air in the pleural space kinks the great veins, severely reducing cardiac output."},
  {t:"Widespread endothelial damage and massive vasodilation induced by an uncontrolled systemic infection describes which condition?",o:["Neurogenic shock","Anaphylactic shock","Septic shock","Hypovolemic shock"],a:2,topic:"Shock",exp:"Septic shock is a form of distributive shock where bacterial endotoxins/exotoxins trigger systemic vasodilation."},
  {t:"When cells are deprived of oxygen during shock, they are forced to switch from aerobic metabolism to which metabolic pathway?",o:["High-yield oxidative phosphorylation","Anaerobic glycolysis, resulting in lactic acid production.","Direct protein synthesis.","Ketone body stabilization."],a:1,topic:"Shock",exp:"Hypoxia halts aerobic cycles, driving cells to utilize anaerobic glycolysis, which yields lactic acid as a byproduct."},
  {t:"Accumulation of lactic acid in the bloodstream during prolonged states of shock directly results in which acid-base imbalance?",o:["Respiratory alkalosis","Respiratory acidosis","Metabolic alkalosis","Metabolic acidosis"],a:3,topic:"Shock",exp:"Excessive lactic acid consumes bicarbonate buffers, causing systemic metabolic acidosis."},
  {t:"During the early compensatory stage of hypovolemic shock, how does the endocrine system respond to preserve blood pressure?",o:["Inhibits the release of cortisol.","Activates the Renin-Angiotensin-Aldosterone System (RAAS) to retain water and sodium.","Promotes direct renal excretion of sodium.","Shuts down the release of antidiuretic hormone (ADH)."],a:1,topic:"Shock",exp:"The RAAS pathway is activated during hypoperfusion to conserve fluid volume and stabilize blood pressure."},
  {t:"What neurological finding is considered a very early sign of compensatory shock due to initial cerebral hypoperfusion?",o:["Deep comatose state","Restlessness, anxiety, or mild confusion","Generalized flaccid paralysis","Hyperactive deep tendon reflexes"],a:1,topic:"Shock",exp:"Subtle changes in mental status like restlessness occur early as oxygen delivery to brain tissue starts to dip."},
  {t:"Why does the skin of a patient in advanced hypovolemic shock become cold, clammy, and pale?",o:["Widespread paralysis of the dermal sweat glands.","Compensatory sympathetic vasoconstriction shunts blood away from the skin to protect vital core organs.","Massive destruction of subcutaneous capillary networks.","A sudden fall in systemic core body temperature due to shivering."],a:1,topic:"Shock",exp:"Catecholamine release clamps peripheral skin and muscular beds to prioritize perfusion to the heart and brain."},
  {t:"Which type of distributive shock is mediated by an IgE-driven hypersensitivity reaction, leading to massive histamine release and airway edema?",o:["Septic shock","Neurogenic shock","Anaphylactic shock","Cardiogenic shock"],a:2,topic:"Shock",exp:"Anaphylactic shock occurs when an allergen triggers mast cell degranulation, releasing histamine and causing vasodilation."},
  {t:"What is the primary diagnostic utility of monitoring serum lactate levels in a critically ill patient in shock?",o:["It measures the exact rate of renal glomerular filtration.","It serves as an indicator of global tissue hypoperfusion and anaerobic metabolism severity.","It identifies the specific strain of bacteria causing an infection.","It measures the adequacy of pulmonary ventilation."],a:1,topic:"Shock",exp:"Serum lactate tracks the depth of cellular hypoxia, making it an excellent marker for shock severity and resuscitation response."},
  {t:"What clinical parameter describes the absolute late phase of uncompensated shock?",o:["Transient mild tachycardia","Isolated orthostatic dizziness","Profound hypotension, oliguria, and altered or absent consciousness.","Bounding peripheral pulses and hypertension."],a:2,topic:"Shock",exp:"When compensatory mechanisms fail, blood pressure drops significantly, urine output stops, and neurological function degrades."},
  {t:"In the management of hypovolemic and septic shock, what is the initial primary nursing therapeutic intervention?",o:["Administering heavy doses of intravenous sedatives.","Placing the patient in a high-Fowler's position.","Securing large-bore intravenous lines and initiating rapid volume resuscitation.","Preparing the patient for immediate continuous renal replacement therapy."],a:2,topic:"Shock",exp:"Restoring intravascular volume is the critical first-line step to re-establish tissue perfusion."},
  {t:"Which class of medications is utilized to increase systemic vascular resistance and support blood pressure when fluid resuscitation alone fails in septic shock?",o:["Beta-blockers","Vasopressors (e.g., Norepinephrine)","Calcium channel blockers","Loop diuretics"],a:1,topic:"Shock",exp:"Vasopressors induce smooth muscle contraction in blood vessels, correcting pathological vasodilation."},
  {t:"What is the classic clinical sign defined as referred pain to the left shoulder due to diaphragmatic irritation from a ruptured spleen?",o:["Cullen's sign","Grey Turner's sign","Kehr's sign","Battle's sign"],a:2,topic:"Abdominal Trauma",exp:"Kehr's sign occurs when splenic hemorrhage contacts the diaphragm, referring pain along the phrenic nerve to the left shoulder."},
  {t:"During an abdominal trauma assessment, the nurse notes bluish ecchymosis localized around the umbilicus. This finding is documented as:",o:["Grey Turner's sign","Cullen's sign","Kehr's sign","Murphy's sign"],a:1,topic:"Abdominal Trauma",exp:"Cullen's sign represents periumbilical bruising tracking from retroperitoneal or intraperitoneal bleeding."},
  {t:"Bruising or ecchymosis detected along the flanks (sides of the abdominal wall) indicates retroperitoneal hemorrhage and is known as:",o:["Grey Turner's sign","Cullen's sign","McBurney's sign","Rovsing's sign"],a:0,topic:"Abdominal Trauma",exp:"Grey Turner's sign refers to flank discoloration secondary to retroperitoneal hematomas (e.g., kidney or pancreatic injuries)."},
  {t:"What bedside ultrasound protocol is standard in emergency rooms to quickly identify free fluid (blood) in the peritoneal or pericardial cavities?",o:["Computed Tomography (CT) scan","Diagnostic Peritoneal Lavage (DPL)","Focused Assessment with Sonography for Trauma (FAST) scan","Abdominal Magnetic Resonance Imaging (MRI)"],a:2,topic:"Abdominal Trauma",exp:"FAST is a rapid, non-invasive ultrasound tool used to detect pathological free fluid collections in trauma patients."},
  {t:"Which solid intra-abdominal organ is most frequently injured in patients sustaining blunt force abdominal trauma?",o:["Liver","Spleen","Pancreas","Urinary bladder"],a:1,topic:"Abdominal Trauma",exp:"The structural fragility and anatomical position of the spleen make it the most vulnerable solid organ to blunt impacts."},
  {t:"Why are injuries to hollow viscus organs (like the stomach or small bowel) highly dangerous following trauma?",o:["They cause instantaneous skeletal paralysis.","They spill chemical or bacterial contents into the peritoneum, causing severe acute peritonitis.","They trigger immediate obstructive cardiogenic shock.","They result in rapid dilution of plasma proteins."],a:1,topic:"Abdominal Trauma",exp:"Hollow organs contain gastric juices, bile, or stool. Perforation leads to chemical contamination and bacterial peritonitis."},
  {t:"What does the term 'Lethal Triad of Trauma' encompass in a severely bleeding patient?",o:["Hypertension, bradycardia, and hyperthermia","Hypothermia, acidosis, and coagulopathy","Alkalosis, hyperkalemia, and anemia","Tachycardia, tachypnea, and hyperglycemia"],a:1,topic:"Abdominal Trauma",exp:"These three physiological derangements worsen one another, creating a highly fatal cycle in hemorrhaging patients."},
  {t:"How does excessive administration of un-warmed, clear crystalloid fluids worsen coagulopathy in active hemorrhage?",o:["It increases platelet aggregation.","It causes a dilutional coagulopathy by washing out remaining clotting factors and platelets.","It shifts the blood pH into severe respiratory alkalosis.","It directly destroys the red bone marrow."],a:1,topic:"Abdominal Trauma",exp:"Giving massive volumes of fluid without replacing clotting components dilutes the coagulation factors required for clotting."},
  {t:"What is the rationale behind 'Permissive Hypotension' in damage control resuscitation for trauma?",o:["To maximize blood flow to the skin and skeletal muscle.","To maintain blood pressure at a lower but viable baseline to prevent blowing off early, fragile clots.","To eliminate the need for surgical source control.","To completely stop renal filtration temporarily."],a:1,topic:"Abdominal Trauma",exp:"Aggressive normalization of blood pressure can dislodge newly formed fibrin clots, worsening internal bleeding."},
  {t:"What is the core physiological objective of performing 'Damage Control Surgery' in an unstable abdominal trauma patient?",o:["Completing all complex anatomical re-grafting in the initial setting.","Rapid control of active hemorrhage and containment of contamination, followed by temporary closure.","Performing cosmetic scar revisions immediately in theater.","Delayed exploration after waiting 72 hours in a standard medical ward."],a:1,topic:"Abdominal Trauma",exp:"Damage control surgery prioritizes stabilizing physiology over executing prolonged, complex anatomical reconstructions."},
  {t:"What are the three components required for a blood transfusion crossmatch procedure?",o:["Patient's urine, donor's plasma, and synthetic saline.","Patient's serum, donor's red blood cells, and an anti-human globulin reagent.","Patient's platelets, donor's white blood cells, and heparin.","Patient's whole blood, donor's bone marrow, and warm water."],a:1,topic:"Blood Transfusion",exp:"Crossmatching mixes the recipient's serum with donor red cells to ensure no pre-existing antibodies attack the transfused blood."},
  {t:"Which blood product contains high concentrations of Fibrinogen, Von Willebrand Factor, and Factor VIII, and is used to correct severe coagulopathy?",o:["Packed Red Blood Cells (PRBCs)","Liquid Albumin 25%","Cryoprecipitate","Fresh Frozen Plasma (FFP) alone"],a:2,topic:"Blood Transfusion",exp:"Cryoprecipitate is prepared from FFP and specifically concentrates fibrinogen and key clotting factors."},
  {t:"During a Massive Transfusion Protocol (MTP), blood products are ideally delivered in what ratio to mimic whole blood?",o:["5 units PRBCs : 1 unit FFP : 0 units Platelets","10 units PRBCs : 2 units FFP : 1 unit Platelets","A balanced 1:1:1 ratio of PRBCs, FFP, and Platelets.","1 unit PRBCs : 5 units FFP : 5 units Platelets"],a:2,topic:"Blood Transfusion",exp:"Modern damage control resuscitation utilizes a 1:1:1 balanced ratio to prevent dilutional coagulopathy."},
  {t:"What is the first and most critical action a nurse must take if a patient demonstrates signs of an acute hemolytic transfusion reaction?",o:["Slow down the infusion rate and re-check the vitals in 30 minutes.","Immediately stop the blood transfusion and disconnect the tubing at the hub.","Administer intramuscular low-molecular-weight heparin.","Elevate the patient's head and continue the transfusion."],a:1,topic:"Blood Transfusion",exp:"At the first sign of an adverse reaction, the transfusion must be stopped immediately to limit the volume of incompatible blood delivered."},
  {t:"A patient presenting with flank pain, hematuria, and a history of blunt trauma to the side of the abdomen is highly suspected of having an injury to which organ?",o:["Stomach","Spleen","Kidney","Transverse colon"],a:2,topic:"Abdominal Trauma",exp:"The kidneys are retroperitoneal organs located in the flanks; trauma presents with localized flank pain and blood in the urine."},
  {t:"Why must blood products be transfused through a specialized administration set containing an in-line filter?",o:["To chemically neutralize residual anesthetic gases.","To clear blood clots, aggregated platelets, and cellular debris from entering the patient.","To warm the blood to body temperature automatically.","To increase the velocity of fluid flow through the line."],a:1,topic:"Blood Transfusion",exp:"Standard blood filters (typically 170-200 microns) trap fibrin clots and cellular aggregates formed during storage."},
  {t:"What is the maximum safe time window allowed for a single unit of Packed Red Blood Cells to hang and infuse once removed from the blood bank refrigerator?",o:["1 hour","2 hours","4 hours","12 hours"],a:2,topic:"Blood Transfusion",exp:"To reduce the risk of bacterial proliferation at room temperature, a blood unit must not hang longer than 4 hours."},
  {t:"A trauma patient with severe intra-abdominal hemorrhage becomes hypothermic (<35°C). How does this hypothermia directly exacerbate bleeding?",o:["It accelerates the operational speed of the liver enzymes.","It severely inhibits the enzymatic activity of the clotting cascade and impairs platelet function.","It causes direct systemic arterial hypertension.","It converts fibrinogen into plasma proteins instantly."],a:1,topic:"Blood Transfusion",exp:"Coagulation cascade enzymes are highly temperature-dependent; hypothermia directly impairs clotting efficiency, worsening hemorrhage."},
];

const TOPIC_COLORS = {
  "Wound Healing":       "#2563eb",
  "Surgical Infections": "#16a34a",
  "Shock":               "#dc2626",
  "Abdominal Trauma":    "#7c3aed",
  "Blood Transfusion":   "#d97706",
};

const TOPICS = ["All", ...Object.keys(TOPIC_COLORS)];
const LETTERS = ['A','B','C','D','E','F'];

let activeTopic = "All";
let questions, i, correct, wrong, answers, wrongSet, answered;
let totalTime = 60*60, timeLeft, timerInterval;

function getPool() {
  return activeTopic === "All" ? ALL_QUESTIONS : ALL_QUESTIONS.filter(q => q.topic === activeTopic);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* BUILD TOPIC BUTTONS */
function buildTopics() {
  const wrap = document.getElementById('topicsWrap');
  wrap.innerHTML = '';
  TOPICS.forEach(t => {
    const count = t === "All" ? ALL_QUESTIONS.length : ALL_QUESTIONS.filter(q => q.topic === t).length;
    const btn = document.createElement('button');
    btn.className = 'topic-btn' + (t === activeTopic ? ' active' : '');
    btn.dataset.topic = t;
    btn.textContent = (t === "All" ? "✦ الكل" : t) + ` (${count})`;
    btn.onclick = () => {
      activeTopic = t;
      buildTopics();
      init(getPool());
    };
    wrap.appendChild(btn);
  });
}

/* INIT */
function init(pool) {
  questions = shuffle(pool);
  i = 0; correct = 0; wrong = 0;
  answers = new Array(questions.length).fill(null);
  wrongSet = []; answered = 0;
  timeLeft = totalTime;
  document.getElementById('totalBadge').textContent = questions.length + ' سؤال';
  startTimer();
  render();
}

/* TIMER */
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
    document.getElementById('timerTxt').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
    const badge = document.getElementById('timerBadge');
    if (timeLeft <= 120) badge.className = 'timer-badge danger';
    else if (timeLeft <= 300) badge.className = 'timer-badge warn';
    if (timeLeft <= 0) { clearInterval(timerInterval); finish(); }
  }, 1000);
}

/* TOP UI */
function updateTop() {
  const total = questions.length;
  document.getElementById('sCorrect').textContent = correct;
  document.getElementById('sWrong').textContent = wrong;
  document.getElementById('sRemain').textContent = Math.round(((total - answered) / total) * 100) + '%';
  document.getElementById('progLabel').textContent = 'سؤال ' + (i + 1) + ' / ' + total;
  document.getElementById('progFill').style.width = ((i + 1) / total * 100) + '%';
  document.getElementById('prog-bar').style.width = ((i + 1) / total * 100) + '%';
}

/* RENDER */
function render() {
  updateTop();
  const q = questions[i];
  const tc = TOPIC_COLORS[q.topic] || '#2563eb';
  document.getElementById('app').innerHTML = `
    <div class="q-card">
      <div class="q-header">
        <div class="q-num">سؤال ${i + 1} / ${questions.length}</div>
        <div class="q-topic-badge" style="background:rgba(255,255,255,.25)">${q.topic}</div>
      </div>
      <div class="q-text">${q.t}</div>
      <div class="options">
        ${q.o.map((o, idx) => `
          <div class="opt" id="opt${idx}" onclick="choose(${idx})">
            <div class="opt-letter">${LETTERS[idx] || idx+1}</div>
            ${o}
          </div>
        `).join('')}
      </div>
      <div class="nav-btns">
        <button class="btn btn-skip" onclick="skip()"><i class="fa-solid fa-forward"></i> تخطي</button>
      </div>
    </div>`;
}

/* CHOOSE */
function choose(v) {
  if (answers[i] !== null) return;
  answers[i] = v; answered++;
  const q = questions[i];
  const ok = v === q.a;
  ok ? correct++ : wrong++;
  updateTop();

  q.o.forEach((_, idx) => {
    const el = document.getElementById('opt' + idx);
    el.classList.add('disabled');
    if (idx === q.a) el.classList.add('correct');
    else if (idx === v) el.classList.add('wrong');
  });

  const fb = document.createElement('div');
  fb.className = 'feedback-bar ' + (ok ? 'ok' : 'no');
  fb.innerHTML = ok
    ? `<span class="feedback-icon">🎉</span> <span>ممتاز، اللهم بارك</span>`
    : `<span class="feedback-icon">😔</span> <span>ركز يا سكر</span>`;

  const card = document.querySelector('.q-card');
  card.querySelector('.options').after(fb);

  if (q.exp) {
    const exp = document.createElement('div');
    exp.className = 'explanation';
    exp.innerHTML = '<b>💬 Rationale:</b> ' + q.exp;
    fb.after(exp);
  }

  card.querySelector('.nav-btns').innerHTML = `
    <button class="btn btn-next" onclick="next()">
      ${i < questions.length - 1
        ? '<i class="fa-solid fa-arrow-left"></i> السؤال التالي'
        : '<i class="fa-solid fa-flag-checkered"></i> إنهاء الامتحان'}
    </button>`;
}

function skip() {
  if (answers[i] === null) { answers[i] = -1; answered++; wrong++; wrongSet.push(questions[i]); updateTop(); }
  next();
}

function next() {
  if (i < questions.length - 1) { i++; render(); window.scrollTo({top:0,behavior:'smooth'}); }
  else finish();
}

/* FINISH */
function finish() {
  clearInterval(timerInterval);
  const total = questions.length;
  const score = Math.round((correct / total) * 100);

  questions.forEach((q, idx) => {
    if (answers[idx] !== q.a) wrongSet.push({...q, myAns: answers[idx]});
  });
  wrongSet = [...new Map(wrongSet.map(q => [q.t, q])).values()];

  let grade, gradeColor;
  if (score >= 90)      { grade = '🥇 ممتاز';       gradeColor = 'var(--success)'; }
  else if (score >= 75) { grade = '🥈 جيد جداً';    gradeColor = 'var(--accent)';  }
  else if (score >= 60) { grade = '🥉 جيد';         gradeColor = 'var(--warn)';    }
  else                  { grade = '📚 راجع تاني';   gradeColor = 'var(--danger)';  }

  const circ = 2 * Math.PI * 45;
  const offset = circ - (score / 100) * circ;

  const reportHTML = questions.map((q, idx) => {
    const ok = answers[idx] === q.a;
    const tc = TOPIC_COLORS[q.topic] || '#2563eb';
    return `<div class="report-item ${ok ? 'ok' : 'no'}">
      <div class="ri-q">${ok ? '✅' : '❌'} ${q.t}</div>
      <div class="ri-row" style="margin-top:4px">
        <span style="font-size:11px;padding:2px 8px;border-radius:6px;background:${tc}22;color:${tc};font-weight:700">${q.topic}</span>
      </div>
      ${!ok ? `
        <div class="ri-row"><span class="ri-badge ri-yours">إجابتك</span> ${answers[idx] >= 0 ? q.o[answers[idx]] : 'تم التخطي'}</div>
        <div class="ri-row"><span class="ri-badge ri-right">الصحيح</span> ${q.o[q.a]}</div>
        ${q.exp ? `<div class="ri-row" style="color:var(--text3);font-size:11px;margin-top:4px">💬 ${q.exp}</div>` : ''}
      ` : ''}
    </div>`;
  }).join('');

  document.getElementById('prog-bar').style.width = '100%';
  document.getElementById('app').innerHTML = `
    <div class="result-hero">
      <div class="score-ring">
        <svg viewBox="0 0 110 110">
          <circle class="ring-bg" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="0"/>
          <circle class="ring-fill" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            style="stroke:${gradeColor}" id="ringFill"/>
        </svg>
        <div class="score-num">${score}</div>
        <div class="score-pct">%</div>
      </div>
      <div class="result-grade" style="color:${gradeColor}">${grade}</div>
      <div class="result-sub">أجبت على ${answered} من ${total} سؤال</div>
      <div class="result-stats">
        <div class="rs"><div class="n" style="color:var(--success)">${correct}</div><div class="l">صحيح</div></div>
        <div class="rs"><div class="n" style="color:var(--danger)">${wrong}</div><div class="l">خطأ</div></div>
        <div class="rs"><div class="n" style="color:var(--accent)">${total - answered < 0 ? 0 : total - answered}</div><div class="l">تخطي</div></div>
      </div>
    </div>
    <div class="result-actions">
      ${wrongSet.length ? `<button class="btn btn-retry" onclick="retryWrong()"><i class="fa-solid fa-rotate-right"></i> إعادة الخطأ (${wrongSet.length})</button>` : ''}
      <button class="btn btn-home" onclick="init(getPool())"><i class="fa-solid fa-shuffle"></i> امتحان جديد عشوائي</button>
    </div>
    <div style="margin-top:28px">
      <div style="font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text2)">📋 تقرير مفصّل</div>
      ${reportHTML}
    </div>`;

  setTimeout(() => { document.getElementById('ringFill').style.strokeDashoffset = offset; }, 100);
  window.scrollTo({top:0,behavior:'smooth'});
}

function retryWrong() {
  const pool = [...wrongSet];
  questions = shuffle(pool); i = 0; correct = 0; wrong = 0;
  answers = new Array(questions.length).fill(null);
  wrongSet = []; answered = 0; timeLeft = totalTime;
  startTimer(); render();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* THEME */
const themeBtn = document.getElementById('themeBtn');
let theme = localStorage.getItem('theme') || 'light';
function applyTheme(t) {
  theme = t;
  document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : '');
  themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('theme', t);
}
applyTheme(theme);
themeBtn.addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'));

/* START */
buildTopics();
init(getPool());
