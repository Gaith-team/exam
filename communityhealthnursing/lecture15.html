<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> GHAITH TEAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --a1: #0f766e;
  --a2: #14b8a6;
  --a3: #99f6e4;
  --a2l: #ccfbf1;
  --ag: rgba(20,184,166,0.13);
  --ags: rgba(20,184,166,0.26);
  --bg:    #f0fdfa;
  --bg2:   #ccfbf1;
  --card:  #ffffff;
  --text:  #134e4a;
  --text2: #0f766e;
  --text3: #5eead4;
  --bdc:   rgba(20,184,166,0.20);
  --bdcard:rgba(15,118,110,0.12);
  --sh:    0 4px 18px rgba(15,118,110,0.09);
  --shh:   0 8px 30px rgba(20,184,166,0.22);
  --ok:    #15803d;
  --err:   #b91c1c;
  --warn:  #b45309;
  --rad:   16px;
  --tr:    all 0.28s cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"] {
  --bg:    #022c22; --bg2:   #064e3b; --card:  #065f46;
  --text:  #d1fae5; --text2: #6ee7b7; --text3: #34d399;
  --bdc:   rgba(52,211,153,0.22);
  --bdcard:rgba(52,211,153,0.12);
  --sh:    0 4px 20px rgba(0,0,0,0.45);
  --shh:   0 8px 36px rgba(20,184,166,0.28);
  --a1: #10b981; --a2: #34d399; --a2l: #064e3b; --a3: #6ee7b7;
}

body {
  font-family:'Outfit',sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100vh; overflow-x:hidden;
  transition:background .4s,color .4s;
}

#prog-bar {
  position:fixed;top:0;left:0;height:3px;z-index:999;
  background:linear-gradient(90deg,var(--a1),var(--a2),var(--a3));
  width:0%;transition:width .15s;
}

/* NAV */
nav {
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 26px;height:62px;
  background:rgba(240,253,250,.94);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--bdcard);transition:var(--tr);
}
[data-theme="dark"] nav { background:rgba(2,44,34,.96); }

.nav-back {
  display:flex;align-items:center;gap:6px;
  color:var(--text2);text-decoration:none;font-size:13px;font-weight:700;
  padding:6px 13px;border-radius:9px;
  border:1px solid var(--bdcard);background:var(--card);
  transition:var(--tr);
}
.nav-back:hover { color:var(--a2);border-color:var(--bdc); }

.nav-brand { display:flex;align-items:center;gap:8px;font-size:15px;font-weight:900;color:var(--text); }
.nav-logo {
  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,var(--a1),var(--a2));
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:12px;font-weight:900;
}
.theme-btn {
  width:37px;height:37px;border-radius:50%;
  border:1px solid var(--bdcard);background:var(--card);
  cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;transition:var(--tr);
}
.theme-btn:hover { border-color:var(--a2);transform:rotate(22deg); }

/* HERO */
.hero {
  margin-top:62px;
  background:linear-gradient(135deg,var(--a1) 0%,var(--a2) 60%,#2dd4bf 100%);
  padding:34px 22px 30px;text-align:center;position:relative;overflow:hidden;
}
.hero::before {
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 500px 180px at 50% 110%,rgba(255,255,255,.13) 0%,transparent 70%);
}
.hero-icon {
  width:62px;height:62px;border-radius:18px;
  background:rgba(255,255,255,.2);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;margin:0 auto 11px;
  border:1.5px solid rgba(255,255,255,.35);
}
.hero h1 { font-size:clamp(17px,3.5vw,25px);font-weight:900;color:#fff;margin-bottom:4px; }
.hero p  { font-size:13px;color:rgba(255,255,255,.82); }
.hero-meta { display:flex;justify-content:center;gap:12px;margin-top:14px;flex-wrap:wrap; }
.meta-pill {
  background:rgba(255,255,255,.18);backdrop-filter:blur(5px);
  border:1px solid rgba(255,255,255,.3);border-radius:50px;
  padding:5px 13px;font-size:12px;font-weight:700;color:#fff;
  display:flex;align-items:center;gap:5px;
}

/* TOPIC FILTER */
.filter-wrap {
  padding:14px 16px 2px;
  display:flex;flex-wrap:wrap;gap:7px;
  background:var(--card);border-bottom:1px solid var(--bdcard);
}
.filter-btn {
  padding:5px 13px;border-radius:50px;
  border:1.5px solid var(--bdcard);background:var(--bg);
  font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;
  color:var(--text2);cursor:pointer;transition:var(--tr);
}
.filter-btn:hover,
.filter-btn.active {
  background:var(--a2);color:#fff;border-color:var(--a2);
  box-shadow:0 2px 10px var(--ag);
}
.filter-count {
  padding:14px 16px 14px;
  font-size:12px;color:var(--text2);font-weight:600;
  background:var(--card);border-bottom:1px solid var(--bdcard);
}

/* SHELL */
.shell { max-width:560px;margin:0 auto;padding:18px 16px 80px; }

/* STATS */
.stats-row { display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:13px; }
.stat-box {
  background:var(--card);border:1px solid var(--bdcard);
  border-radius:var(--rad);padding:11px 7px;text-align:center;
}
.stat-box .val { font-size:20px;font-weight:900; }
.stat-box .lbl { font-size:11px;color:var(--text3);margin-top:2px; }
.c-ok   { color:var(--ok); }
.c-err  { color:var(--err); }
.c-acc  { color:var(--a1); }

/* PROG STRIP */
.prog-strip {
  background:var(--card);border:1px solid var(--bdcard);
  border-radius:var(--rad);padding:12px 15px;margin-bottom:15px;
  display:flex;align-items:center;gap:11px;
}
.prog-label { font-size:13px;font-weight:700;color:var(--text2);white-space:nowrap; }
.prog-track { flex:1;height:7px;background:var(--bg2);border-radius:7px;overflow:hidden; }
.prog-fill {
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--a1),var(--a2));
  border-radius:7px;transition:width .4s;
}
.timer-badge {
  min-width:60px;height:33px;border-radius:17px;
  background:var(--bg2);border:1px solid var(--bdcard);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:900;color:var(--text);
  gap:4px;padding:0 10px;flex-shrink:0;
}
.timer-badge.warn   { color:var(--warn);  border-color:rgba(180,83,9,.3);  background:rgba(180,83,9,.08); }
.timer-badge.danger { color:var(--err);   border-color:rgba(185,28,28,.3); background:rgba(185,28,28,.08);animation:blink .8s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.45} }

/* Q CARD */
.q-card {
  background:var(--card);border:1px solid var(--bdcard);
  border-radius:20px;overflow:hidden;box-shadow:var(--sh);
}
.q-header {
  background:linear-gradient(135deg,var(--a1),var(--a2));
  padding:9px 17px;display:flex;align-items:center;gap:8px;
}
.q-num {
  background:rgba(255,255,255,.22);border-radius:7px;
  padding:3px 10px;font-size:11px;font-weight:700;color:#fff;
}
.q-topic {
  margin-left:auto;background:rgba(255,255,255,.18);border-radius:50px;
  padding:2px 10px;font-size:11px;font-weight:700;color:#fff;
  border:1px solid rgba(255,255,255,.25);
}
.q-text {
  padding:19px 17px 13px;font-size:15px;font-weight:700;color:var(--text);
  line-height:1.65;border-bottom:1px solid var(--bdcard);
}
.options { padding:13px 17px 17px;display:flex;flex-direction:column;gap:9px; }

.opt {
  display:flex;align-items:center;gap:11px;
  padding:12px 14px;border-radius:11px;
  border:1.5px solid var(--bdcard);background:var(--bg);
  cursor:pointer;font-size:14px;font-weight:600;color:var(--text);
  transition:var(--tr);user-select:none;
}
.opt:hover:not(.disabled) {
  border-color:var(--a2);background:var(--ag);
  transform:translateX(3px);
}
.opt-letter {
  width:28px;height:28px;border-radius:8px;flex-shrink:0;
  background:var(--bg2);border:1px solid var(--bdcard);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:900;color:var(--text2);
  transition:var(--tr);
}
.opt.correct { border-color:var(--ok);background:rgba(21,128,61,.08); }
.opt.correct .opt-letter { background:var(--ok);color:#fff;border-color:var(--ok); }
.opt.wrong   { border-color:var(--err);background:rgba(185,28,28,.07); }
.opt.wrong   .opt-letter { background:var(--err);color:#fff;border-color:var(--err); }
.opt.disabled { pointer-events:none; }

/* FEEDBACK */
.feedback-bar {
  margin:11px 17px;padding:11px 14px;border-radius:11px;
  display:flex;align-items:center;gap:9px;
  font-size:14px;font-weight:700;
  animation:popIn .38s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1} }
.feedback-bar.ok { background:rgba(21,128,61,.1);color:var(--ok);border:1px solid rgba(21,128,61,.25); }
.feedback-bar.no { background:rgba(185,28,28,.08);color:var(--err);border:1px solid rgba(185,28,28,.2); }

.explanation {
  margin:0 17px 11px;padding:10px 13px;
  background:rgba(20,184,166,.07);border-radius:9px;
  border-left:3px solid var(--a2);
  font-size:13px;color:var(--text2);line-height:1.6;
}

/* BUTTONS */
.nav-btns { padding:4px 17px 17px;display:flex;gap:9px; }
.btn {
  flex:1;padding:12px;border:none;border-radius:11px;
  font-size:14px;font-weight:900;cursor:pointer;
  font-family:'Outfit',sans-serif;transition:var(--tr);
  display:flex;align-items:center;justify-content:center;gap:7px;
}
.btn-next {
  background:linear-gradient(135deg,var(--a1),var(--a2));
  color:#fff;box-shadow:0 4px 14px var(--ag);
}
.btn-next:hover { transform:translateY(-2px);box-shadow:0 6px 20px var(--ags); }
.btn-skip {
  background:var(--bg2);color:var(--text2);
  border:1px solid var(--bdcard);flex:0 0 auto;padding:12px 15px;
}
.btn-skip:hover { border-color:var(--warn);color:var(--warn); }

/* RESULTS */
.result-hero {
  text-align:center;padding:30px 18px 22px;
  background:var(--card);border-radius:20px;
  border:1px solid var(--bdcard);margin-bottom:17px;
}
.score-ring {
  width:108px;height:108px;border-radius:50%;margin:0 auto 15px;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;position:relative;
}
.score-ring svg { position:absolute;inset:-5px;width:calc(100% + 10px);height:calc(100% + 10px);transform:rotate(-90deg); }
.score-ring circle { fill:none;stroke-width:5;stroke-linecap:round; }
.ring-bg   { stroke:var(--bg2); }
.ring-fill { stroke:var(--a2);transition:stroke-dashoffset 1s ease; }
.score-num { font-size:28px;font-weight:900;color:var(--text); }
.score-pct { font-size:12px;color:var(--text3); }
.result-grade { font-size:20px;font-weight:900;margin-bottom:4px; }
.result-sub   { font-size:13px;color:var(--text2); }
.result-stats { display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:17px; }
.rs { background:var(--bg2);border-radius:10px;padding:10px 7px;text-align:center; }
.rs .n { font-size:20px;font-weight:900; }
.rs .l { font-size:11px;color:var(--text3); }

/* REPORT */
.report-item {
  background:var(--card);border:1px solid var(--bdcard);
  border-radius:12px;padding:14px;margin-bottom:8px;
  border-left:4px solid var(--bdcard);
}
.report-item.ok { border-left-color:var(--ok); }
.report-item.no { border-left-color:var(--err); }
.report-item .ri-q { font-size:13px;font-weight:700;margin-bottom:6px; }
.report-item .ri-row { display:flex;align-items:center;gap:7px;font-size:12px;margin-top:4px;color:var(--text2); }
.ri-badge { padding:2px 8px;border-radius:6px;font-weight:700;font-size:11px;flex-shrink:0; }
.ri-yours { background:rgba(185,28,28,.1);color:var(--err); }
.ri-right { background:rgba(21,128,61,.1);color:var(--ok); }

.result-actions { display:flex;flex-direction:column;gap:9px;margin-top:17px; }
.btn-retry { background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff; }
.btn-retry:hover { transform:translateY(-2px);box-shadow:0 6px 20px var(--ags); }
.btn-home  { background:var(--bg2);color:var(--text);border:1px solid var(--bdcard); }
.btn-home:hover { border-color:var(--a2);color:var(--a1); }

/* FOOTER */
footer {
  background:var(--bg2);border-top:1px solid var(--bdcard);
  padding:20px 22px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:9px;
}
.footer-brand { font-size:14px;font-weight:700; }
.footer-brand span { color:var(--a1); }
.footer-tg {
  display:flex;align-items:center;gap:5px;
  text-decoration:none;color:#229ED9;font-size:12px;font-weight:600;
}

/* EMPTY STATE */
.empty-state {
  text-align:center;padding:50px 20px;
  background:var(--card);border-radius:20px;border:1px solid var(--bdcard);
}
.empty-state .ei { font-size:40px;margin-bottom:12px; }
.empty-state h3 { font-size:17px;font-weight:700;margin-bottom:7px; }
.empty-state p { font-size:13px;color:var(--text2); }

@media (max-width:480px) {
  nav { padding:0 13px; }
  .shell { padding:13px 11px 60px; }
  .nav-brand span { display:none; }
}
</style>
</head>
<body>

<div id="prog-bar"></div>

<nav>
  <a href="https://gaith-team.github.io/exam/" class="nav-back"><i class="fa-solid fa-arrow-left"></i> Back</a>
  <div class="nav-brand">
    <div class="nav-logo">GT</div>
    <span>GHAITH TEAM</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <button class="theme-btn" id="themeBtn">🌙</button>
  </div>
</nav>

<div class="hero">
  <div class="hero-icon">🌿</div>
  <h1>Homeless care</h1>
  <p>Community Health Nursing</p>
  <div class="hero-meta">
    <div class="meta-pill"><i class="fa-solid fa-list-ol"></i> <span id="totalBadge">-- Questions</span></div>
    <div class="meta-pill"><i class="fa-solid fa-clock"></i> <span id="timeBadge">60 Min</span></div>
    <div class="meta-pill"><i class="fa-solid fa-shuffle"></i> Shuffled</div>
  </div>
</div>

<!-- Topic filter bar (shown only if topics exist) -->
<div id="filterWrap" class="filter-wrap" style="display:none;"></div>
<div id="filterCount" class="filter-count" style="display:none;"></div>

<div class="shell">
  <div class="stats-row">
    <div class="stat-box"><div class="val c-ok"  id="sCorrect">0</div><div class="lbl">✔ Correct</div></div>
    <div class="stat-box"><div class="val c-err"  id="sWrong">0</div><div class="lbl">✖ Wrong</div></div>
    <div class="stat-box"><div class="val c-acc"  id="sRemain">100%</div><div class="lbl">⏳ Remaining</div></div>
  </div>

  <div class="prog-strip">
    <div class="prog-label" id="progLabel">Q 1</div>
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <div class="timer-badge" id="timerBadge"><i class="fa-regular fa-clock"></i><span id="timerTxt">60:00</span></div>
  </div>

  <div id="app"></div>
</div>

<footer>
  <div class="footer-brand">GAITH <span>TEAM</span></div>
  <a href="https://t.me/nursing2bu" target="_blank" class="footer-tg">
    <i class="fa-brands fa-telegram"></i> @nursing2bu
  </a>
</footer>

<script>
let QUESTIONS = [
/* ── EASY (1-16) ── */
{t:"Homelessness is defined as the condition of lacking:",
 o:["Family support","Stable, safe, and functional housing","A job","Education"],
 a:1,diff:"easy",
 exp:"Homelessness is the condition of lacking stable, safe, and functional housing."},

{t:"In 2024, approximately how many people worldwide were estimated to be homeless?",
 o:["50–60 million","85–95 million","140–150 million","250–300 million"],
 a:2,diff:"easy",
 exp:"In 2024, an estimated 140–150 million people worldwide were homeless."},

{t:"As many as 1.6 billion people worldwide live as:",
 o:["Homeowners","Squatters and refugees","Government employees","Hospital patients"],
 a:1,diff:"easy",
 exp:"As many as 1.6 billion people live as squatters, refugees, or in similar inadequate housing."},

{t:"Homelessness in Egypt affects approximately how many people?",
 o:["2 million","7 million","12 million","25 million"],
 a:2,diff:"easy",
 exp:"Homelessness in Egypt is a significant social issue affecting about 12 million people."},

{t:"A person is considered homeless who lacks a fixed, regular, and adequate night-time residence that is:",
 o:["With family members","In a hospital","A public or private place not ordinarily used as regular sleeping accommodation","In a paid hotel"],
 a:2,diff:"easy",
 exp:"A public or private place not ordinarily used as regular sleeping accommodation meets the definition of homelessness."},

{t:"The first category of homelessness encompasses persons living in:",
 o:["Persistent poverty","Crisis poverty","Affordable housing","Government facilities"],
 a:1,diff:"easy",
 exp:"The first category includes persons living in crisis poverty, with transient or episodic homelessness."},

{t:"The second category of homelessness (persistent poverty) typically includes:",
 o:["Young employed adults","Chronically homeless men and women with mental or physical disabilities","Refugees from war zones","Immigrants in regular housing"],
 a:1,diff:"easy",
 exp:"The second category includes chronically homeless men and women, many of whom have mental or physical disabilities."},

{t:"Which of the following is listed as a cause of homelessness?",
 o:["Excessive education","Poverty","Wealth inheritance","Affordable housing"],
 a:1,diff:"easy",
 exp:"Poverty is a significant factor in homelessness."},

{t:"Gentrification contributes to homelessness by:",
 o:["Providing affordable housing","Raising housing prices and pushing poorer residents out","Creating job opportunities","Reducing housing costs"],
 a:1,diff:"easy",
 exp:"Gentrification raises housing prices in formerly affordable neighborhoods, pushing poorer residents out."},

{t:"Homeless pregnant women are at high risk for:",
 o:["Better birth outcomes","Lower rates of sexually transmitted diseases","Higher rates of addiction and poorer pregnancy outcomes","Improved nutritional status"],
 a:2,diff:"easy",
 exp:"Homeless pregnant women have higher rates of STDs, addiction, poor nutrition, and poor birth outcomes (low birth weight, low Apgar)."},

{t:"Homeless children typically have more serious health consequences than poor children. They experience more symptoms of acute illness such as:",
 o:["Diabetes and stroke","Fever, ear infections, diarrhea, and asthma","Heart attack and hypertension","Kidney failure and cancer"],
 a:1,diff:"easy",
 exp:"Homeless children experience more symptoms of acute illness, such as fever, ear infection, diarrhea, and asthma."},

{t:"Homeless adolescents living on the streets are at high risk of contracting:",
 o:["Common cold","AIDS and hepatitis B","Seasonal allergies","Mild headaches"],
 a:1,diff:"easy",
 exp:"Homeless adolescents are at high risk of contracting AIDS and hepatitis B and using alcohol/illicit substances."},

{t:"Homeless adolescent girls who exchange sex for survival are at high risk for:",
 o:["Improved health outcomes","Unintended pregnancy","Reduced mental health risk","Lower rates of STDs"],
 a:1,diff:"easy",
 exp:"Homeless adolescent girls exchanging sex for survival are at high risk for unintended pregnancy."},

{t:"Homeless older adults are described as:",
 o:["The most resilient population","The most vulnerable of the impoverished older adult population","Least likely to suffer chronic illness","Protected from hypothermia"],
 a:1,diff:"easy",
 exp:"Homeless older adults are the most vulnerable of the impoverished older adult population."},

{t:"Homeless older adults commonly suffer from untreated chronic conditions, including:",
 o:["Allergies only","Tuberculosis, hypertension, arthritis, cardiovascular disease, and malnutrition","Common cold only","Fractures only"],
 a:1,diff:"easy",
 exp:"They suffer from TB, hypertension, arthritis, cardiovascular disease, injuries, malnutrition, poor oral health, and hypothermia."},

{t:"A community-oriented nurse's role in PRIMARY prevention of homelessness includes advocating for:",
 o:["Rehabilitation services","Affordable housing and housing subsidies","Hospice care","Disability benefits only"],
 a:1,diff:"easy",
 exp:"Primary prevention includes affordable housing, housing subsidies, job training, and birth control/safe sex education."},

/* ── MEDIUM (17-38) ── */
{t:"Major trauma frequently affecting the homeless population includes all of the following EXCEPT:",
 o:["Gunshot wounds","Stab wounds","Head trauma","Routine dental cleanings"],
 a:3,diff:"medium",
 exp:"Major trauma includes gunshot wounds, stab wounds, head trauma, suicide attempts, and fractures—not routine dental cleanings."},

{t:"Minor trauma in homeless populations includes:",
 o:["Gunshot wounds","Bruises, abrasions, eye injuries, and cellulitis","Spinal cord injuries","Fractures"],
 a:1,diff:"medium",
 exp:"Minor trauma includes bruises, abrasions, eye injuries, and cellulites."},

{t:"In addition to physical health, homelessness also affects:",
 o:["Only physical health","Psychological, social, and spiritual wellbeing","Only physical and financial status","Only physical health and employment"],
 a:1,diff:"medium",
 exp:"Homelessness affects psychological, social, and spiritual wellbeing in addition to physical health."},

{t:"Compared to housed women, homeless women are more likely to report:",
 o:["Higher levels of education","Childhood histories of abuse","Affordable housing experience","Government employment"],
 a:1,diff:"medium",
 exp:"Homeless women are more likely to report childhood histories of abuse and a history of domestic violence."},

{t:"A history of experiencing domestic violence is identified as a contributing factor to homelessness because:",
 o:["It provides housing opportunities","It often results in discrimination and the need to leave the home","It reduces poverty","It stabilizes employment"],
 a:1,diff:"medium",

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function shuffleOptions(question) {
  const correctAnswer = question.o[question.a];

  question.o = shuffle([...question.o]);

  question.a = question.o.indexOf(correctAnswer);

  return question;
}

QUESTIONS = QUESTIONS.map(q => shuffleOptions({...q}));
/* ============ CONFIG ============ */
const TOTAL_MINUTES = 60;   

/* ============ ENGINE ============ */
const LETTERS = ['A','B','C','D','E','F'];
let pool, questions, qi, correct, wrong, answered, answers, wrongSet;
let totalTime = 60 * 60, timeLeft, timerInterval;
let activeTopic = 'All';

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

/* ---- TOPIC FILTER ---- */
function buildFilters() {
  const wrap = document.getElementById('filterWrap');
  const countEl = document.getElementById('filterCount');
  const topics = [...new Set(QUESTIONS.map(q=>q.topic).filter(Boolean))];
  if (!topics.length) { wrap.style.display='none'; countEl.style.display='none'; return; }
  wrap.style.display='flex';
  countEl.style.display='block';
  const all = ['All', ...topics];
  wrap.innerHTML = all.map(t=>
    `<button class="filter-btn${t==='All'?' active':''}" onclick="setTopic('${t}')">${t}</button>`
  ).join('');
  updateFilterCount();
}

function setTopic(t) {
  activeTopic = t;
  document.querySelectorAll('.filter-btn').forEach(b=>{
    b.classList.toggle('active', b.textContent===t);
  });
  updateFilterCount();
  init(getPool());
}

function getPool() {
  return activeTopic==='All' ? QUESTIONS : QUESTIONS.filter(q=>q.topic===activeTopic);
}

function updateFilterCount() {
  const p = getPool();
  document.getElementById('filterCount').textContent =
    `Showing ${p.length} question${p.length!==1?'s':''} · Topic: ${activeTopic}`;
}

/* ---- INIT ---- */
function init(p) {
  pool = p;
  if (!pool.length) {
    document.getElementById('app').innerHTML=`
      <div class="empty-state">
        <div class="ei">📭</div>
        <h3>No Questions Yet</h3>
        <p>Add questions to the QUESTIONS array in the script section.</p>
      </div>`;
    document.getElementById('totalBadge').textContent='0 Questions';
    document.getElementById('sRemain').textContent='—';
    clearInterval(timerInterval);
    return;
  }
  questions = shuffle(pool);
  qi=0; correct=0; wrong=0; answered=0;
  answers = new Array(questions.length).fill(null);
  wrongSet = [];
  timeLeft = totalTime;
  document.getElementById('totalBadge').textContent = questions.length+' Questions';
  document.getElementById('timeBadge').textContent  = TOTAL_MINUTES+' Min';
  startTimer(); render();
}

/* ---- TIMER ---- */
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    timeLeft--;
    const m=Math.floor(timeLeft/60), s=timeLeft%60;
    document.getElementById('timerTxt').textContent=`${m}:${s<10?'0':''}${s}`;
    const b=document.getElementById('timerBadge');
    if (timeLeft<=120)      b.className='timer-badge danger';
    else if (timeLeft<=300) b.className='timer-badge warn';
    else                    b.className='timer-badge';
    if (timeLeft<=0) { clearInterval(timerInterval); finish(); }
  },1000);
}

/* ---- TOP BAR ---- */
function updateTop() {
  const total=questions.length;
  document.getElementById('sCorrect').textContent=correct;
  document.getElementById('sWrong').textContent=wrong;
  document.getElementById('sRemain').textContent=Math.round(((total-answered)/total)*100)+'%';
  document.getElementById('progLabel').textContent='Q '+(qi+1)+' / '+total;
  document.getElementById('progFill').style.width=((qi+1)/total*100)+'%';
  document.getElementById('prog-bar').style.width=((qi+1)/total*100)+'%';
}

/* ---- RENDER ---- */
function render() {
  updateTop();
  const q=questions[qi];
  const opts = q.o.map((o,idx)=>`
    <div class="opt" id="opt${idx}" onclick="choose(${idx})">
      <div class="opt-letter">${LETTERS[idx]}</div>${o}
    </div>`).join('');
  document.getElementById('app').innerHTML=`
    <div class="q-card">
      <div class="q-header">
        <div class="q-num">Question ${qi+1} / ${questions.length}</div>
        ${q.topic?`<div class="q-topic">${q.topic}</div>`:''}
      </div>
      <div class="q-text">${q.t}</div>
      <div class="options">${opts}</div>
      <div class="nav-btns">
        <button class="btn btn-skip" onclick="skip()"><i class="fa-solid fa-forward"></i> Skip</button>
      </div>
    </div>`;
}

/* ---- CHOOSE ---- */
function choose(v) {
  if (answers[qi]!==null) return;
  answers[qi]=v; answered++;
  const q=questions[qi], ok=v===q.a;
  ok?correct++:wrong++;
  updateTop();
  q.o.forEach((_,idx)=>{
    const el=document.getElementById('opt'+idx);
    el.classList.add('disabled');
    if (idx===q.a) el.classList.add('correct');
    else if (idx===v) el.classList.add('wrong');
  });
  const fb=document.createElement('div');
  fb.className='feedback-bar '+(ok?'ok':'no');
  fb.innerHTML=ok
    ?`<span style="font-size:17px">🎉</span><span>ِما شاء الله عليك</span>`
    :`<span style="font-size:17px">😔</span><span>ركز يا شطور</span>`;
  const card=document.querySelector('.q-card');
  card.querySelector('.options').after(fb);
  if (q.exp) {
    const exp=document.createElement('div');
    exp.className='explanation';
    exp.innerHTML='<b>💬 Explanation:</b> '+q.exp;
    fb.after(exp);
  }
  card.querySelector('.nav-btns').innerHTML=`
    <button class="btn btn-next" onclick="next()">
      ${qi<questions.length-1
        ?'<i class="fa-solid fa-arrow-right"></i> Next Question'
        :'<i class="fa-solid fa-flag-checkered"></i> Finish Exam'}
    </button>`;
}

/* ---- SKIP / NEXT ---- */
function skip() {
  if (answers[qi]===null) { answers[qi]=-1; answered++; wrong++; wrongSet.push(questions[qi]); updateTop(); }
  next();
}
function next() {
  if (qi<questions.length-1) { qi++; render(); window.scrollTo({top:0,behavior:'smooth'}); }
  else finish();
}

/* ---- FINISH ---- */
function finish() {
  clearInterval(timerInterval);
  const total=questions.length;
  const score=Math.round((correct/total)*100);
  questions.forEach((q,idx)=>{ if(answers[idx]!==q.a) wrongSet.push({...q,myAns:answers[idx]}); });
  wrongSet=[...new Map(wrongSet.map(q=>[q.t,q])).values()];
  let grade,gc;
  if(score>=90)      { grade='🥇 Excellent';    gc='var(--ok)'; }
  else if(score>=75) { grade='🥈 Very Good';     gc='var(--a1)'; }
  else if(score>=60) { grade='🥉 Good';          gc='var(--warn)'; }
  else               { grade='📚 Needs Review';  gc='var(--err)'; }
  const circ=2*Math.PI*45, offset=circ-(score/100)*circ;
  const report=questions.map((q,idx)=>{
    const ok=answers[idx]===q.a;
    return `<div class="report-item ${ok?'ok':'no'}">
      <div class="ri-q">${ok?'✅':'❌'} ${q.t}</div>
      ${!ok?`
        <div class="ri-row"><span class="ri-badge ri-yours">Your Answer</span>${answers[idx]>=0?q.o[answers[idx]]:'Skipped'}</div>
        <div class="ri-row"><span class="ri-badge ri-right">Correct</span>${q.o[q.a]}</div>
      `:''}
    </div>`;
  }).join('');
  document.getElementById('prog-bar').style.width='100%';
  document.getElementById('app').innerHTML=`
    <div class="result-hero">
      <div class="score-ring">
        <svg viewBox="0 0 110 110">
          <circle class="ring-bg" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="0"/>
          <circle class="ring-fill" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            style="stroke:${gc}" id="ringFill"/>
        </svg>
        <div class="score-num">${score}</div>
        <div class="score-pct">%</div>
      </div>
      <div class="result-grade" style="color:${gc}">${grade}</div>
      <div class="result-sub">Answered ${answered} of ${total} questions</div>
      <div class="result-stats">
        <div class="rs"><div class="n" style="color:var(--ok)">${correct}</div><div class="l">Correct</div></div>
        <div class="rs"><div class="n" style="color:var(--err)">${wrong}</div><div class="l">Wrong</div></div>
        <div class="rs"><div class="n" style="color:var(--a1)">${total-answered<0?0:total-answered}</div><div class="l">Skipped</div></div>
      </div>
    </div>
    <div class="result-actions">
      ${wrongSet.length?`<button class="btn btn-retry" onclick="retryWrong()"><i class="fa-solid fa-rotate-right"></i> Retry Wrong (${wrongSet.length})

</button>`:''}
      <button class="btn btn-home" onclick="init(getPool())"><i class="fa-solid fa-shuffle"></i> New Random Exam</button>
      <a href="https://gaith-team.github.io/exam/" class="btn btn-home" style="text-decoration:none"><i class="fa-solid fa-house"></i> Back to Subject</a>
    </div>
    <div style="margin-top:22px">
      <div style="font-size:14px;font-weight:700;margin-bottom:9px;color:var(--text2)">📋 Detailed Report</div>
      ${report}
    </div>`;
  setTimeout(()=>{ document.getElementById('ringFill').style.strokeDashoffset=offset; },100);
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ---- RETRY WRONG ---- */
function retryWrong() {
  const p=[...wrongSet];
  questions=shuffle(p); qi=0; correct=0; wrong=0;
  answers=new Array(questions.length).fill(null);
  wrongSet=[]; answered=0; timeLeft=totalTime;
  startTimer(); render();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ---- THEME ---- */
const themeBtn=document.getElementById('themeBtn');
let theme=localStorage.getItem('gt-theme')||'light';
function applyTheme(t) {
  theme=t;
  document.documentElement.setAttribute('data-theme',t==='dark'?'dark':'');
  themeBtn.textContent=t==='dark'?'☀️':'🌙';
  localStorage.setItem('gt-theme',t);
}
applyTheme(theme);
themeBtn.addEventListener('click',()=>applyTheme(theme==='dark'?'light':'dark'));

/* ---- START ---- */
buildFilters();
init(getPool());
</script>
</body>
</html>
