<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHAITH TEAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent:#2563eb; --accent-light:#3b82f6; --accent-dark:#1d4ed8; --accent-glow:rgba(37,99,235,0.2);
  --bg:#f8fafc; --bg2:#eef2f7; --card:#ffffff; --text:#1a2332; --text2:#4a5568; --text3:#718096;
  --bc:rgba(0,0,0,0.07); --success:#16a34a; --danger:#dc2626; --warn:#1d4ed8; --r:16px;
  --tr:all 0.3s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg:#0d1117; --bg2:#161b22; --card:#1c2333; --text:#e6edf3; --text2:#b1bac4; --text3:#7d8590; --bc:rgba(255,255,255,0.08);
}
body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; transition:background .4s,color .4s; }
#prog-bar { position:fixed; top:0; left:0; height:3px; z-index:999; background:linear-gradient(90deg,var(--accent),var(--accent-light)); transition:width .2s; }
nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:0 28px; height:64px; background:rgba(248,250,252,.93); backdrop-filter:blur(16px); border-bottom:1px solid var(--bc); transition:var(--tr); }
[data-theme="dark"] nav { background:rgba(13,17,23,.95); }
.nav-brand { display:flex; align-items:center; gap:9px; font-size:15px; font-weight:900; color:var(--text); }
.nav-logo-icon { width:34px; height:34px; border-radius:8px; background:linear-gradient(135deg,var(--accent),var(--accent-light)); display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px; font-weight:900; }
.nav-right { display:flex; align-items:center; gap:8px; }
.theme-btn { width:38px; height:38px; border-radius:50%; border:1px solid var(--bc); background:var(--card); cursor:pointer; font-size:15px; display:flex; align-items:center; justify-content:center; transition:var(--tr); }
.theme-btn:hover { border-color:var(--accent); transform:rotate(20deg); }
.hero-band { margin-top:64px; background:linear-gradient(135deg,var(--accent-dark),var(--accent),var(--accent-light)); padding:40px 24px 36px; text-align:center; position:relative; overflow:hidden; }
.hero-band::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse 600px 200px at 50% 100%,rgba(255,255,255,.12) 0%,transparent 70%); }
.hero-band-icon { width:68px; height:68px; border-radius:20px; background:rgba(255,255,255,.2); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; font-size:30px; margin:0 auto 14px; border:1.5px solid rgba(255,255,255,.35); }
.hero-band h1 { font-size:clamp(20px,4vw,30px); font-weight:900; color:#fff; margin-bottom:6px; }
.hero-band p { font-size:13px; color:rgba(255,255,255,.8); }
.hero-band-meta { display:flex; justify-content:center; gap:24px; margin-top:20px; flex-wrap:wrap; }
.meta-pill { background:rgba(255,255,255,.18); backdrop-filter:blur(6px); border:1px solid rgba(255,255,255,.3); border-radius:50px; padding:6px 16px; font-size:12px; font-weight:700; color:#fff; display:flex; align-items:center; gap:6px; }

/* TOPIC SELECTOR */
.topic-section { max-width:680px; margin:0 auto; padding:24px 20px 0; }
.topic-title { font-size:13px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:14px; }
.topic-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
.topic-card {
  background:var(--card); border:2px solid var(--bc); border-radius:14px;
  padding:14px 16px; cursor:pointer; transition:var(--tr);
  display:flex; flex-direction:column; gap:4px;
  position:relative; overflow:hidden;
}
.topic-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--tc,var(--accent)); border-radius:4px 0 0 4px; }
.topic-card:hover { border-color:var(--tc,var(--accent)); transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,.08); }
.topic-card.active { border-color:var(--tc,var(--accent)); background:color-mix(in srgb,var(--tc,var(--accent)) 8%,var(--card)); }
.topic-card-name { font-size:13px; font-weight:700; color:var(--text); line-height:1.4; }
.topic-card-count { font-size:11px; color:var(--text3); }
.topic-card-icon { font-size:20px; margin-bottom:4px; }
.topic-all { grid-column:1/-1; background:linear-gradient(135deg,var(--accent-dark),var(--accent)); border-color:var(--accent); }
.topic-all .topic-card-name, .topic-all .topic-card-count, .topic-all .topic-card-icon { color:#fff; }
.topic-all::before { display:none; }
.topic-all:hover { transform:translateY(-2px); box-shadow:0 8px 24px var(--accent-glow); }

.shell { max-width:560px; margin:0 auto; padding:24px 20px 80px; }
.stats-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:16px; }
.stat-box { background:var(--card); border:1px solid var(--bc); border-radius:var(--r); padding:12px 10px; text-align:center; }
.stat-box .val { font-size:20px; font-weight:900; }
.stat-box .lbl { font-size:11px; color:var(--text3); margin-top:2px; }
.stat-correct { color:var(--success); } .stat-wrong { color:var(--danger); } .stat-remain { color:var(--accent); }
.prog-strip { background:var(--card); border:1px solid var(--bc); border-radius:var(--r); padding:14px 16px; margin-bottom:16px; display:flex; align-items:center; gap:14px; }
.prog-label { font-size:13px; font-weight:700; color:var(--text2); white-space:nowrap; }
.prog-track { flex:1; height:8px; background:var(--bg2); border-radius:8px; overflow:hidden; }
.prog-fill { height:100%; width:0%; background:linear-gradient(90deg,var(--accent),var(--accent-light)); border-radius:8px; transition:width .4s; }
.timer-badge { min-width:64px; height:36px; border-radius:18px; background:var(--bg2); border:1px solid var(--bc); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:900; color:var(--text); gap:5px; padding:0 12px; flex-shrink:0; }
.timer-badge.warn { color:var(--warn); border-color:rgba(217,119,6,.3); background:rgba(217,119,6,.08); }
.timer-badge.danger { color:var(--danger); border-color:rgba(220,38,38,.3); background:rgba(220,38,38,.08); animation:pulse .8s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

/* topic label in quiz */
.q-topic-tag { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:10px; font-weight:700; margin-left:8px; }

.q-card { background:var(--card); border:1px solid var(--bc); border-radius:20px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,.06); transition:box-shadow .3s; }
.q-header { background:linear-gradient(135deg,var(--accent-dark),var(--accent)); padding:8px 18px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.q-num { background:rgba(255,255,255,.2); border-radius:8px; padding:3px 10px; font-size:11px; font-weight:700; color:#fff; }
.q-text { padding:22px 18px 14px; font-size:15px; font-weight:700; color:var(--text); line-height:1.65; border-bottom:1px solid var(--bc); text-align:left; direction:ltr; }
.options { padding:14px 18px 18px; display:flex; flex-direction:column; gap:10px; }
.opt { display:flex; align-items:center; gap:12px; padding:14px 16px; border-radius:12px; border:1.5px solid var(--bc); background:var(--bg); cursor:pointer; font-size:14px; font-weight:600; color:var(--text); transition:var(--tr); user-select:none; direction:ltr; text-align:left; }
.opt:hover:not(.disabled) { border-color:var(--accent); background:var(--accent-glow); transform:translateX(3px); }
.opt-letter { width:28px; height:28px; border-radius:8px; flex-shrink:0; background:var(--bg2); border:1px solid var(--bc); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:900; color:var(--text3); transition:var(--tr); }
.opt.correct { border-color:var(--success); background:rgba(22,163,74,.08); }
.opt.correct .opt-letter { background:var(--success); color:#fff; border-color:var(--success); }
.opt.wrong { border-color:var(--danger); background:rgba(220,38,38,.07); }
.opt.wrong .opt-letter { background:var(--danger); color:#fff; border-color:var(--danger); }
.opt.disabled { pointer-events:none; }
.feedback-bar { margin:14px 18px; padding:12px 16px; border-radius:12px; display:flex; align-items:center; gap:10px; font-size:14px; font-weight:700; animation:popIn .4s cubic-bezier(.34,1.56,.64,1); }
@keyframes popIn { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
.feedback-bar.ok { background:rgba(22,163,74,.1); color:var(--success); border:1px solid rgba(22,163,74,.25); }
.feedback-bar.no { background:rgba(220,38,38,.08); color:var(--danger); border:1px solid rgba(220,38,38,.2); }
.feedback-icon { font-size:20px; }
.explanation { margin:0 18px 14px; padding:12px 14px; background:rgba(37,99,235,.06); border-radius:10px; border-right:3px solid var(--accent); font-size:13px; color:var(--text2); line-height:1.6; display:none; }
.nav-btns { padding:4px 18px 18px; display:flex; gap:10px; }
.btn { flex:1; padding:13px; border:none; border-radius:12px; font-size:14px; font-weight:900; cursor:pointer; font-family:'Outfit',sans-serif; transition:var(--tr); display:flex; align-items:center; justify-content:center; gap:7px; }
.btn-next { background:linear-gradient(135deg,var(--accent-dark),var(--accent)); color:#fff; box-shadow:0 4px 14px var(--accent-glow); }
.btn-next:hover { transform:translateY(-2px); box-shadow:0 6px 20px var(--accent-glow); }
.btn-skip { background:var(--bg2); color:var(--text2); border:1px solid var(--bc); flex:0 0 auto; padding:13px 18px; }
.btn-skip:hover { border-color:var(--warn); color:var(--warn); }
.btn-back { background:var(--bg2); color:var(--text2); border:1px solid var(--bc); }
.btn-back:hover { border-color:var(--accent); color:var(--accent); }

.result-hero { text-align:center; padding:36px 20px 28px; background:var(--card); border-radius:20px; border:1px solid var(--bc); margin-bottom:20px; box-shadow:0 4px 20px rgba(0,0,0,.06); }
.score-ring { width:110px; height:110px; border-radius:50%; margin:0 auto 18px; display:flex; align-items:center; justify-content:center; flex-direction:column; border:5px solid var(--bg2); position:relative; }
.score-ring svg { position:absolute; inset:-5px; width:calc(100% + 10px); height:calc(100% + 10px); transform:rotate(-90deg); }
.score-ring circle { fill:none; stroke-width:5; stroke-linecap:round; }
.ring-bg { stroke:var(--bg2); } .ring-fill { stroke:var(--accent); transition:stroke-dashoffset 1s ease; }
.score-num { font-size:28px; font-weight:900; color:var(--text); }
.score-pct { font-size:12px; color:var(--text3); }
.result-grade { font-size:22px; font-weight:900; margin-bottom:6px; }
.result-sub { font-size:14px; color:var(--text2); }
.result-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:20px; }
.rs { background:var(--bg2); border-radius:10px; padding:12px 8px; text-align:center; }
.rs .n { font-size:20px; font-weight:900; } .rs .l { font-size:11px; color:var(--text3); }
.report-item { background:var(--card); border:1px solid var(--bc); border-radius:14px; padding:16px; margin-bottom:10px; border-right:4px solid var(--bc); }
.report-item.ok { border-right-color:var(--success); } .report-item.no { border-right-color:var(--danger); }
.report-item .ri-q { font-size:13px; font-weight:700; margin-bottom:8px; }
.report-item .ri-row { display:flex; align-items:center; gap:8px; font-size:12px; margin-top:5px; color:var(--text2); }
.ri-badge { padding:2px 8px; border-radius:6px; font-weight:700; font-size:11px; flex-shrink:0; }
.ri-yours { background:rgba(220,38,38,.1); color:var(--danger); } .ri-right { background:rgba(22,163,74,.1); color:var(--success); }
.result-actions { display:flex; flex-direction:column; gap:10px; margin-top:20px; }
.btn-retry { background:linear-gradient(135deg,var(--accent-dark),var(--accent)); color:#fff; }
.btn-retry:hover { transform:translateY(-2px); box-shadow:0 6px 20px var(--accent-glow); }
.btn-home { background:var(--bg2); color:var(--text); border:1px solid var(--bc); }
.btn-home:hover { border-color:var(--accent); color:var(--accent); }

footer { background:var(--bg2); border-top:1px solid var(--bc); padding:22px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
.footer-brand { font-size:14px; font-weight:700; }
.footer-brand span { color:var(--accent); }
.footer-tg { display:flex; align-items:center; gap:5px; text-decoration:none; color:#229ED9; font-size:12px; font-weight:600; }
@media (max-width:480px) { nav { padding:0 14px; } .shell { padding:16px 14px 60px; } .hero-band { padding:30px 16px 28px; } .topic-grid { grid-template-columns:1fr; } }

#quiz-view { display:none !important; }
#home-view { display:block; }
#quiz-view.active { display:block !important; }
#home-view.hidden { display:none !important; }
</style>
</head>

<script>
const TOPICS = [
  { id:'lec01', name:'Lec 01 : ABC of Major Trauma', icon:'🚑', color:'#dc2626' },
  { id:'lec03', name:'Lec 03 : ICU Admission & Discharge', icon:'🏥', color:'#7c3aed' },
  { id:'lec04', name:'Lec 04 : Basic Monitoring in ICU', icon:'📊', color:'#0891b2' },
  { id:'lec05', name:'Lec 05 : Airway Assessment & Management', icon:'💨', color:'#059669' },
  { id:'lec06', name:'Lec 06 : Basic Cardiac Life Support (BLS/CPR)', icon:'❤️', color:'#e11d48' },
  { id:'lec07', name:'Lec 07 : Fluid Management in ICU', icon:'💧', color:'#2563eb' },
  { id:'lec08', name:'Lec 08 : Arterial Blood Gas', icon:'🧪', color:'#d97706' },
  { id:'lec09', name:'Lec 09 : Water & Electrolytes Imbalance', icon:'⚗️', color:'#16a34a' },
  { id:'lec10', name:'Lec 10 : Common Emergency Medical Problems', icon:'⚡', color:'#9333ea' },
  { id:'lec12', name:'Lec 12 : Nutrition in the ICU', icon:'🥗', color:'#ea580c' },
  { id:'all',   name:'🔀 كل المحاضرات — All Questions', icon:'🎯', color:'#2563eb', isAll:true }
];

const QUESTIONS = [
 {t:"The nurse is triaging four clients injured in a train derailment. Which client should receive priority treatment?",o:["A 42-year-old with dyspnea and chest asymmetry","A 17-year-old with a fractured arm","A 4-year-old with facial lacerations","A 30-year-old with blunt abdominal trauma"],a:0,topic:'lec01'},
 {t:"Direct pressure to a deep laceration on the client's lower leg has failed to stop the bleeding. The nurse's next action should be able to:",o:["Place a tourniquet proximal to the laceration","Elevate the leg above the level of the heart","Cover the laceration and apply an ice compress","Apply pressure to the femoral artery"],a:1,topic:'lec01'},
 {t:"The emergency room staff is practicing for its annual disaster drill. According to disaster triage, which of the following four clients would be cared for last?",o:["A client with a pneumothorax","A client with 70% full thickness burns","A client with fractures of the tibia and fibula","A client with smoke inhalation injuries"],a:2,topic:'lec01'},
 {t:"A trauma patient presents with a GCS score of 8, hypotension, and a distended abdomen. What is the most likely cause of their condition?",o:["Traumatic brain injury","Hemorrhagic shock","Spinal cord injury","Tension pneumothorax"],a:1,topic:'lec01'},
 {t:"On primary assessment, the driver was found to be unresponsive, not breathing well, and bleeding was running. What is the first resuscitation intervention to be performed?",o:["Apply pressure to the bleeding","Carry out artificial respirations","Clear the airway","Place a cervical collar"],a:2,topic:'lec01'},
 {t:"A motor vehicle accident patient arrives and is in need of airway management. He is wearing a cervical collar (C-collar). What is the appropriate way to establish an airway?",o:["Perform jaw thrust maneuver with a C-collar on to open the airway","Head tilt-chin lift technique","Put oral airway aggressively","Remove the collar until the airway is clear"],a:0,topic:'lec01'},
 {t:"The best prognostic factor for head injury is:",o:["Glasgow coma scale","Age","Mode of injury","CT"],a:0,topic:'lec01'},
 {t:"What are the minimum and maximum possible values of GCS?",o:["Minimum = 0, Maximum = 13","Minimum = 0, Maximum = 15","Minimum = 3, Maximum = 15","Minimum = 3, Maximum = 18"],a:2,topic:'lec01'},
 {t:"Which of the following statements about head injuries is false?",o:["The majority of deaths from auto accidents are due to head injuries","Head injury alone often produces a shock","A rapid and complete neurologic examination is part of the initial evaluation of the trauma patient","Optimizing arterial oxygenation is part of the initial therapy"],a:1,topic:'lec01'},
 {t:"Which of the following is the most appropriate initial step in managing a trauma patient according to the ABCDE approach?",o:["Administer pain medication","Ensure adequate breathing and ventilation","Perform a detailed neurological examination","Apply a splint to a fractured limb"],a:1,topic:'lec01'},
 {t:"Which of the following is the most appropriate initial imaging study for a hemodynamically unstable trauma patient with blunt abdominal trauma?",o:["CT scan of the abdomen","Diagnostic peritoneal lavage","Focused Assessment with Sonography for Trauma (FAST)","X-ray of the abdomen"],a:2,topic:'lec01'},
 {t:"During the primary survey of a trauma patient, you notice paradoxical chest movement. What is the most likely diagnosis?",o:["Flail chest","Tension pneumothorax","Hemothorax","Pulmonary contusion"],a:0,topic:'lec01'},
 {t:"A patient who has been in a high-speed car accident arrives in the emergency department. He is unconscious and making a snoring sound when he breathes. What is your PRIORITY action?",o:["Insert two large-bore IV cannulas","Apply a hard cervical collar","Perform a jaw thrust maneuver","Administer high-flow oxygen via a non-rebreather mask"],a:2,topic:'lec01'},
 {t:"The role of the primary nurse in a trauma team includes all of the following EXCEPT:",o:["Administering medications as directed by the team leader","Assuming the role of team leader and making final decisions","Measuring and recording vital signs","Acting as a patient advocate by providing reassurance"],a:1,topic:'lec01'},
 {t:"A patient arrives with a decreased level of consciousness and a GCS of 7. After completing your primary survey, which team member would be primarily responsible for managing this patient's airway?",o:["The primary nurse","The circulation doctor","The airway doctor/anesthetist","The team leader"],a:2,topic:'lec01'},
 {t:"A patient requires a temporary cardiac pacemaker for arrhythmia control is classified as:",o:["Basic Cardiovascular Support","Advanced Cardiovascular Support","Basic Respiratory Support","Intermediate Care"],a:1,topic:'lec03'},
 {t:"Which member of the multidisciplinary ICU team is primarily responsible for managing and weaning a patient from a mechanical ventilator?",o:["Intensivist","ICU Nurse","Respiratory Therapist","Physiotherapist"],a:2,topic:'lec03'},
 {t:"A patient with advanced COPD is admitted to the ICU with acute respiratory failure. He is initiated on BiPAP via a face mask. Six hours later, he become fatigued and endotracheal intubation and mechanical ventilation were applied. Which of the following best describes the change in the patient's status?",o:["The patient has improved from Level 3 to Level 2 care","The patient has moved from basic to advanced respiratory support","The patient no longer requires single-organ support","The patient is now appropriate for transfer to a high-dependency unit"],a:1,topic:'lec03'},
 {t:"A patient requires temporary support for both heart and lung function due to acute respiratory failure and cardiogenic shock. Which life support equipment is most specific to this scenario?",o:["Intra-aortic Balloon Pump (IABP)","Extracorporeal Membrane Oxygenation (ECMO)","Continuous Renal Replacement Therapy (CRRT)","Patient-Controlled Analgesia (PCA) Pump"],a:1,topic:'lec03'},

/* count per topic */
const topicCount = {};
QUESTIONS.forEach(q => { topicCount[q.topic] = (topicCount[q.topic]||0)+1; });
const totalAll = QUESTIONS.length;
document.getElementById('totalBadgeHero').textContent = totalAll + ' سؤال';

/* build topic grid */
const grid = document.getElementById('topicGrid');
TOPICS.forEach(tp => {
  const count = tp.isAll ? totalAll : (topicCount[tp.id]||0);
  const card = document.createElement('div');
  card.className = 'topic-card' + (tp.isAll ? ' topic-all' : '');
  card.style.setProperty('--tc', tp.color);
  card.innerHTML = `<div class="topic-card-icon">${tp.icon}</div><div class="topic-card-name">${tp.name}</div><div class="topic-card-count">${count} سؤال</div>`;
  card.addEventListener('click', () => startQuiz(tp));
  grid.appendChild(card);
});

/* ============ ENGINE ============ */
let questions, idx, correct, wrong, answers, wrongSet, answered;
let totalTime = 200*60, timeLeft, timerInterval;
const LETTERS = ['A','B','C','D','E','F'];
let currentTopic = null;

function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

function startQuiz(tp) {
  currentTopic = tp;
  const pool = tp.isAll ? QUESTIONS : QUESTIONS.filter(q=>q.topic===tp.id);
  document.getElementById('home-view').classList.add('hidden');
  document.getElementById('quiz-view').classList.add('active');
  init(pool);
  window.scrollTo({top:0,behavior:'smooth'});
}

function goHome() {
  clearInterval(timerInterval);
  document.getElementById('quiz-view').classList.remove('active');
  document.getElementById('home-view').classList.remove('hidden');
  document.getElementById('prog-bar').style.width='0%';
  window.scrollTo({top:0,behavior:'smooth'});
}

function init(pool) {
  questions = shuffle([...pool]);
  idx=0; correct=0; wrong=0;
  answers=new Array(questions.length).fill(null);
  wrongSet=[]; answered=0;
  timeLeft=totalTime;
  startTimer(); render();
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    timeLeft--;
    const m=Math.floor(timeLeft/60), s=timeLeft%60;
    document.getElementById('timerTxt').textContent=`${m}:${s<10?'0':''}${s}`;
    const badge=document.getElementById('timerBadge');
    if(timeLeft<=120) badge.className='timer-badge danger';
    else if(timeLeft<=300) badge.className='timer-badge warn';
    if(timeLeft<=0){clearInterval(timerInterval);finish();}
  },1000);
}

function updateTop() {
  const total=questions.length;
  document.getElementById('sCorrect').textContent=correct;
  document.getElementById('sWrong').textContent=wrong;
  document.getElementById('sRemain').textContent=Math.round(((total-answered)/total)*100)+'%';
  document.getElementById('progLabel').textContent='سؤال '+(idx+1)+' / '+total;
  document.getElementById('progFill').style.width=((idx+1)/total*100)+'%';
  document.getElementById('prog-bar').style.width=((idx+1)/total*100)+'%';
}

function getTopicInfo(topicId) {
  return TOPICS.find(t=>t.id===topicId)||{color:'#2563eb',icon:'📚'};
}

function render() {
  updateTop();
  const q=questions[idx];
  const tinfo=getTopicInfo(q.topic);
  const tp=TOPICS.find(t=>t.id===q.topic);
  document.getElementById('app').innerHTML=`
    <div class="q-card">
      <div class="q-header">
        <div class="q-num">Question ${idx+1} / ${questions.length}</div>
        ${currentTopic&&currentTopic.isAll?`<span class="q-topic-tag" style="background:${tinfo.color}22;color:${tinfo.color}">${tinfo.icon} ${tp?tp.name.split('—')[0].trim():''}</span>`:''}
      </div>
      <div class="q-text">${q.t}</div>
      <div class="options">
        ${q.o.map((o,i)=>`<div class="opt" id="opt${i}" onclick="choose(${i})"><div class="opt-letter">${LETTERS[i]||i+1}</div>${o}</div>`).join('')}
      </div>
      <div class="nav-btns">
        <button class="btn btn-back" onclick="goHome()"><i class="fa-solid fa-house"></i></button>
        <button class="btn btn-skip" onclick="skip()"><i class="fa-solid fa-forward"></i> تخطي</button>
      </div>
    </div>`;
}

function choose(v) {
  if(answers[idx]!==null) return;
  answers[idx]=v; answered++;
  const q=questions[idx];
  const ok=v===q.a;
  ok?correct++:wrong++;
  updateTop();
  q.o.forEach((_,i)=>{
    const el=document.getElementById('opt'+i);
    el.classList.add('disabled');
    if(i===q.a) el.classList.add('correct');
    else if(i===v) el.classList.add('wrong');
  });
  const fb=document.createElement('div');
  fb.className='feedback-bar '+(ok?'ok':'no');
  fb.innerHTML=ok?`<span class="feedback-icon">&#127881;</span><span>&#1605;&#1605;&#1578;&#1575;&#1586;&#1548; &#1575;&#1604;&#1604;&#1607;&#1605; &#1576;&#1575;&#1585;&#1603;</span>`:`<span class="feedback-icon">&#128532;</span><span>&#1585;&#1603;&#1586; &#1610;&#1575; &#1587;&#1603;&#1585;</span>`;
  const card=document.querySelector('.q-card');
  card.querySelector('.options').after(fb);
  const navBtns=card.querySelector('.nav-btns');
  navBtns.innerHTML=`<button class="btn btn-back" onclick="goHome()"><i class="fa-solid fa-house"></i></button>
    <button class="btn btn-next" onclick="next()">
    ${idx<questions.length-1?'<i class="fa-solid fa-arrow-left"></i> \u0627\u0644\u0633\u0624\u0627\u0644 \u0627\u0644\u062a\u0627\u0644\u064a':'<i class="fa-solid fa-flag-checkered"></i> \u0625\u0646\u0647\u0627\u0621 \u0627\u0644\u0627\u0645\u062a\u062d\u0627\u0646'}
  </button>`;
}

function skip() {
  if(answers[idx]===null){answers[idx]=-1;answered++;wrongSet.push(questions[idx]);wrong++;updateTop();}
  next();
}

function next() {
  if(idx<questions.length-1){idx++;render();window.scrollTo({top:0,behavior:'smooth'});}
  else finish();
}

function finish() {
  clearInterval(timerInterval);
  const total=questions.length;
  const score=Math.round((correct/total)*100);
  questions.forEach((q,i)=>{if(answers[i]!==q.a) wrongSet.push({...q,myAns:answers[i]});});
  wrongSet=[...new Map(wrongSet.map(q=>[q.t,q])).values()];
  let grade,gradeColor;
  if(score>=90){grade='\ud83e\udd47 \u0645\u0645\u062a\u0627\u0632';gradeColor='var(--success)';}
  else if(score>=75){grade='\ud83e\udd48 \u062c\u064a\u062f \u062c\u062f\u0627\u064b';gradeColor='var(--accent)';}
  else if(score>=60){grade='\ud83e\udd49 \u062c\u064a\u062f';gradeColor='var(--warn)';}
  else{grade='\ud83d\udcda \u0631\u0627\u062c\u0639 \u062a\u0627\u0646\u064a';gradeColor='var(--danger)';}
  const circ=2*Math.PI*45;
  const offset=circ-(score/100)*circ;
  const reportHTML=questions.map((q,i)=>{
    const ok=answers[i]===q.a;
    return `<div class="report-item ${ok?'ok':'no'}">
      <div class="ri-q">${ok?'&#9989;':'&#10060;'} ${q.t}</div>
      ${!ok?`<div class="ri-row"><span class="ri-badge ri-yours">\u0625\u062c\u0627\u0628\u062a\u0643</span>${answers[i]>=0?q.o[answers[i]]:'\u062a\u0645 \u0627\u0644\u062a\u062e\u0637\u064a'}</div><div class="ri-row"><span class="ri-badge ri-right">\u0627\u0644\u0635\u062d\u064a\u062d</span>${q.o[q.a]}</div>`:''}
    </div>`;
  }).join('');
  document.getElementById('prog-bar').style.width='100%';
  document.getElementById('app').innerHTML=`
    <div class="result-hero">
      <div class="score-ring">
        <svg viewBox="0 0 110 110"><circle class="ring-bg" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="0"/><circle class="ring-fill" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="${circ}" style="stroke:${gradeColor}" id="ringFill"/></svg>
        <div class="score-num">${score}</div><div class="score-pct">%</div>
      </div>
      <div class="result-grade" style="color:${gradeColor}">${grade}</div>
      <div class="result-sub">\u0623\u062c\u0628\u062a \u0639\u0644\u0649 ${answered} \u0645\u0646 ${total} \u0633\u0624\u0627\u0644</div>
      <div class="result-stats">
        <div class="rs"><div class="n" style="color:var(--success)">${correct}</div><div class="l">\u0635\u062d\u064a\u062d</div></div>
        <div class="rs"><div class="n" style="color:var(--danger)">${wrong}</div><div class="l">\u062e\u0637\u0623</div></div>
        <div class="rs"><div class="n" style="color:var(--accent)">${total-answered<0?0:total-answered}</div><div class="l">\u062a\u062e\u0637\u064a</div></div>
      </div>
    </div>
    <div class="result-actions">
      ${wrongSet.length?`<button class="btn btn-retry" onclick="retryWrong()"><i class="fa-solid fa-rotate-right"></i> \u0625\u0639\u0627\u062f\u0629 \u0627\u0644\u062e\u0637\u0623 (${wrongSet.length})</button>`:''}
      <button class="btn btn-next" onclick="init(questions)"><i class="fa-solid fa-shuffle"></i> \u0627\u0645\u062a\u062d\u0627\u0646 \u062c\u062f\u064a\u062f \u0639\u0634\u0648\u0627\u0626\u064a</button>
      <button class="btn btn-home" onclick="goHome()"><i class="fa-solid fa-house"></i> \u0627\u0644\u0631\u0626\u064a\u0633\u064a\u0629</button>
    </div>
    <div style="margin-top:28px">
      <div style="font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text2)">\ud83d\udccb \u062a\u0642\u0631\u064a\u0631 \u0645\u0641\u0635\u0651\u0644</div>
      ${reportHTML}
    </div>`;
  setTimeout(()=>{document.getElementById('ringFill').style.strokeDashoffset=offset;},100);
  window.scrollTo({top:0,behavior:'smooth'});
}

function retryWrong() {
  const pool=[...wrongSet];
  questions=shuffle(pool);idx=0;correct=0;wrong=0;
  answers=new Array(questions.length).fill(null);
  wrongSet=[];answered=0;timeLeft=totalTime;
  startTimer();render();
  window.scrollTo({top:0,behavior:'smooth'});
}

const themeBtn=document.getElementById('themeBtn');
let theme='light';
function applyTheme(t){theme=t;document.documentElement.setAttribute('data-theme',t==='dark'?'dark':'');themeBtn.textContent=t==='dark'?'\u2600\ufe0f':'\ud83c\udf19';}
applyTheme(theme);
themeBtn.addEventListener('click',()=>applyTheme(theme==='dark'?'light':'dark'));
</script>
</body>
</html>
