<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {

  --accent-glow: rgba(13,148,136,0.2);
  --bg: #f8fafc; --bg2: #eef2f7; --card: #ffffff;
  --text: #1a2332; --text2: #4a5568; --text3: #718096;
  --bc: rgba(0,0,0,0.07);
  --success: #16a34a; --danger: #dc2626; --warn: #0f766e;
  --r: 16px; --tr: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg: #0d1117; --bg2: #161b22; --card: #1c2333;

}
body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; transition:background .4s,color .4s; }

/* PROGRESS TOP */
#prog-bar { position:fixed; top:0; left:0; height:3px; z-index:999; background:linear-gradient(90deg,var(--accent),var(--accent-light)); transition:width .2s; }

/* NAV */
nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:0 28px; height:64px; background:rgba(248,250,252,.93); backdrop-filter:blur(16px); border-bottom:1px solid var(--bc); transition:var(--tr); }
[data-theme="dark"] nav { background:rgba(13,17,23,.95); }
.nav-back { display:flex; align-items:center; gap:7px; color:var(--text2); text-decoration:none; font-size:13px; font-weight:700; padding:7px 13px; border-radius:8px; border:1px solid var(--bc); background:var(--card); transition:var(--tr); cursor:pointer; }
.nav-back:hover { color:var(--accent); border-color:var(--accent-glow); }
.nav-brand { display:flex; align-items:center; gap:9px; font-size:15px; font-weight:900; color:var(--text); }
.nav-logo-icon { width:34px; height:34px; border-radius:8px; background:linear-gradient(135deg,var(--accent),var(--accent-light)); display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px; font-weight:900; }
.nav-right { display:flex; align-items:center; gap:8px; }
.theme-btn { width:38px; height:38px; border-radius:50%; border:1px solid var(--bc); background:var(--card); cursor:pointer; font-size:15px; display:flex; align-items:center; justify-content:center; transition:var(--tr); }
.theme-btn:hover { border-color:var(--accent); transform:rotate(20deg); }

/* HERO */
.hero-band { margin-top:64px; background:linear-gradient(135deg,var(--accent-dark),var(--accent),var(--accent-light)); padding:36px 24px 32px; text-align:center; position:relative; overflow:hidden; }
.hero-band::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse 600px 200px at 50% 100%,rgba(255,255,255,.12) 0%,transparent 70%); }
.hero-band-icon { width:64px; height:64px; border-radius:18px; background:rgba(255,255,255,.2); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; font-size:28px; margin:0 auto 12px; border:1.5px solid rgba(255,255,255,.35); }
.hero-band h1 { font-size:clamp(18px,4vw,28px); font-weight:900; color:#fff; margin-bottom:4px; }
.hero-band p { font-size:13px; color:rgba(255,255,255,.8); }
.hero-band-meta { display:flex; justify-content:center; gap:16px; margin-top:16px; flex-wrap:wrap; }
.meta-pill { background:rgba(255,255,255,.18); backdrop-filter:blur(6px); border:1px solid rgba(255,255,255,.3); border-radius:50px; padding:5px 14px; font-size:12px; font-weight:700; color:#fff; display:flex; align-items:center; gap:5px; }

/* SHELL */
.shell { max-width:560px; margin:0 auto; padding:24px 20px 80px; }

/* LANDING */
.sheets-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:20px; }
.sheet-card { background:var(--card); border:2px solid var(--bc); border-radius:var(--r); padding:14px 8px; text-align:center; cursor:pointer; transition:var(--tr); }
.sheet-card:hover { border-color:var(--accent-light); transform:translateY(-2px); }
.sheet-card.active { border-color:var(--accent); background:var(--accent-glow); box-shadow:0 0 0 3px rgba(13,148,136,.12); }
.sc-icon { font-size:26px; display:block; margin-bottom:6px; }
.sc-name { font-size:12px; font-weight:900; color:var(--text); }
.sc-full { font-size:9px; color:var(--text3); margin-top:2px; line-height:1.3; }
.sc-count { font-size:11px; color:var(--accent); margin-top:6px; font-weight:700; }

.section-title { font-size:11px; font-weight:700; color:var(--text3); letter-spacing:.08em; text-transform:uppercase; margin-bottom:10px; }
.topic-pills { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
.topic-pill { padding:7px 14px; border-radius:50px; border:1.5px solid var(--bc); background:var(--card); font-size:12px; font-weight:700; color:var(--text2); cursor:pointer; transition:var(--tr); white-space:nowrap; }
.topic-pill:hover { border-color:var(--accent); color:var(--accent); }
.topic-pill.active { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 2px 8px var(--accent-glow); }

.start-bar { background:var(--card); border:1px solid var(--bc); border-radius:var(--r); padding:16px 18px; display:flex; align-items:center; justify-content:space-between; gap:16px; box-shadow:0 2px 12px rgba(0,0,0,.05); }
.start-info { font-size:13px; color:var(--text2); line-height:1.6; }
.start-info strong { color:var(--text); font-weight:900; }
.btn-start { background:linear-gradient(135deg,var(--accent-dark),var(--accent)); color:#fff; border:none; border-radius:12px; flex-shrink:0; padding:13px 20px; font-size:14px; font-weight:900; cursor:pointer; font-family:'Outfit',sans-serif; display:flex; align-items:center; gap:7px; transition:var(--tr); box-shadow:0 4px 14px var(--accent-glow); }
.btn-start:hover { transform:translateY(-2px); box-shadow:0 6px 20px var(--accent-glow); }

/* STATS */
.stats-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:16px; }
.stat-box { background:var(--card); border:1px solid var(--bc); border-radius:var(--r); padding:12px 10px; text-align:center; }
.stat-box .val { font-size:20px; font-weight:900; }
.stat-box .lbl { font-size:11px; color:var(--text3); margin-top:2px; }
.stat-correct { color:var(--success); } .stat-wrong { color:var(--danger); } .stat-remain { color:var(--accent); }

/* PROGRESS */
.prog-strip { background:var(--card); border:1px solid var(--bc); border-radius:var(--r); padding:14px 16px; margin-bottom:16px; display:flex; align-items:center; gap:14px; }
.prog-label { font-size:13px; font-weight:700; color:var(--text2); white-space:nowrap; }
.prog-track { flex:1; height:8px; background:var(--bg2); border-radius:8px; overflow:hidden; }
.prog-fill { height:100%; width:0%; background:linear-gradient(90deg,var(--accent),var(--accent-light)); border-radius:8px; transition:width .4s; }
.timer-badge { min-width:64px; height:36px; border-radius:18px; background:var(--bg2); border:1px solid var(--bc); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:900; color:var(--text); gap:5px; padding:0 12px; flex-shrink:0; }
.timer-badge.warn { color:var(--warn); border-color:rgba(217,119,6,.3); background:rgba(217,119,6,.08); }
.timer-badge.danger { color:var(--danger); border-color:rgba(220,38,38,.3); background:rgba(220,38,38,.08); animation:pulse .8s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

/* QUESTION CARD */
.q-card { background:var(--card); border:1px solid var(--bc); border-radius:20px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,.06); }
.q-header { background:linear-gradient(135deg,var(--accent-dark),var(--accent)); padding:10px 18px; display:flex; align-items:center; gap:8px; }
.q-num { background:rgba(255,255,255,.2); border-radius:8px; padding:3px 10px; font-size:11px; font-weight:700; color:#fff; }
.q-text { padding:20px 18px 14px; font-size:15px; font-weight:700; color:var(--text); line-height:1.65; border-bottom:1px solid var(--bc); text-align:left; direction:ltr; }
.options { padding:14px 18px 18px; display:flex; flex-direction:column; gap:10px; }
.opt { display:flex; align-items:center; gap:12px; padding:14px 16px; border-radius:12px; border:1.5px solid var(--bc); background:var(--bg); cursor:pointer; font-size:14px; font-weight:600; color:var(--text); transition:var(--tr); user-select:none; direction:ltr; text-align:left; }
.opt:hover:not(.disabled) { border-color:var(--accent); background:var(--accent-glow); transform:translateX(3px); }
.opt-letter { width:28px; height:28px; border-radius:8px; flex-shrink:0; background:var(--bg2); border:1px solid var(--bc); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:900; color:var(--text3); transition:var(--tr); }
.opt.correct { border-color:var(--success); background:rgba(22,163,74,.08); }
.opt.correct .opt-letter { background:var(--success); color:#fff; border-color:var(--success); }
.opt.wrong { border-color:var(--danger); background:rgba(220,38,38,.07); }
.opt.wrong .opt-letter { background:var(--danger); color:#fff; border-color:var(--danger); }
.opt.disabled { pointer-events:none; }

.feedback-bar { margin:14px 18px; padding:12px 16px; border-radius:12px; display:flex; align-items:center; gap:10px; font-size:14px; font-weight:700; animation:popIn .4s cubic-bezier(.34,1.56,.64,1); }
@keyframes popIn { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
.feedback-bar.ok { background:rgba(22,163,74,.1); color:var(--success); border:1px solid rgba(22,163,74,.25); }
.feedback-bar.no { background:rgba(220,38,38,.08); color:var(--danger); border:1px solid rgba(220,38,38,.2); }
.feedback-icon { font-size:20px; }
.explanation { margin:0 18px 14px; padding:12px 14px; background:rgba(13,148,136,.06); border-radius:10px; border-right:3px solid var(--accent); font-size:13px; color:var(--text2); line-height:1.6; display:none; }
.nav-btns { padding:4px 18px 18px; display:flex; gap:10px; }
.btn { flex:1; padding:13px; border:none; border-radius:12px; font-size:14px; font-weight:900; cursor:pointer; font-family:'Outfit',sans-serif; transition:var(--tr); display:flex; align-items:center; justify-content:center; gap:7px; }
.btn-next { background:linear-gradient(135deg,var(--accent-dark),var(--accent)); color:#fff; box-shadow:0 4px 14px var(--accent-glow); }

.btn-skip { background:var(--bg2); color:var(--text2); border:1px solid var(--bc); flex:0 0 auto; padding:13px 18px; }

.result-hero { text-align:center; padding:36px 20px 28px; background:var(--card); border-radius:20px; border:1px solid var(--bc); margin-bottom:20px; box-shadow:0 4px 20px rgba(0,0,0,.06); }
.score-ring { width:110px; height:110px; border-radius:50%; margin:0 auto 18px; display:flex; align-items:center; justify-content:center; flex-direction:column; border:5px solid var(--bg2); position:relative; }
.score-ring svg { position:absolute; inset:-5px; width:calc(100% + 10px); height:calc(100% + 10px); transform:rotate(-90deg); }

.score-num { font-size:28px; font-weight:900; color:var(--text); } .score-pct { font-size:12px; color:var(--text3); }

.rs { background:var(--bg2); border-radius:10px; padding:12px 8px; text-align:center; }
.rs .n { font-size:20px; font-weight:900; } .rs .l { font-size:11px; color:var(--text3); }
.report-item { background:var(--card); border:1px solid var(--bc); border-radius:14px; padding:16px; margin-bottom:10px; border-right:4px solid var(--bc); }
.report-item.ok { border-right-color:var(--success); } .report-item.no { border-right-color:var(--danger); }
.report-item .ri-q { font-size:13px; font-weight:700; margin-bottom:8px; }
.report-item .ri-row { display:flex; align-items:center; gap:8px; font-size:12px; margin-top:5px; color:var(--text2); }
.ri-badge { padding:2px 8px; border-radius:6px; font-weight:700; font-size:11px; flex-shrink:0; }
.ri-yours { background:rgba(220,38,38,.1); color:var(--danger); } .ri-right { background:rgba(22,163,74,.1); color:var(--success); }
.result-actions { display:flex; flex-direction:column; gap:10px; margin-top:20px; }
.btn-retry { background:linear-gradient(135deg,var(--accent-dark),var(--accent)); color:#fff; }
.btn-retry:hover { transform:translateY(-2px); box-shadow:0 6px 20px var(--accent-glow); }
.btn-home { background:var(--bg2); color:var(--text); border:1px solid var(--bc); }

footer { background:var(--bg2); border-top:1px solid var(--bc); padding:22px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }

@media (max-width:480px) {

</style>

/* ===== LANDING STATE ===== */
let selectedSheet = 0;
let selectedTopic = 'all';
let topicList = [];

function initLanding() {
  document.getElementById('landingShell').style.display = '';
  document.getElementById('quizShell').style.display = 'none';
  document.getElementById('navHome').style.display = '';
  document.getElementById('navQuizBack').style.display = 'none';
  document.getElementById('prog-bar').style.width = '0%';
  renderSheetCards();
  renderTopicPills();
  updateStartInfo();
}

function renderSheetCards() {
  document.getElementById('sheetsGrid').innerHTML = SHEETS.map((s, i) => `
    <div class="sheet-card ${i === selectedSheet ? 'active' : ''}" onclick="selectSheet(${i})">
      <span class="sc-icon">${s.icon}</span>
      <div class="sc-name">${s.name}</div>
      <div class="sc-full">${s.fullName}</div>
      <div class="sc-count">${s.questions.length} questions</div>
    </div>
  `).join('');
}

function selectSheet(idx) {
  selectedSheet = idx;
  selectedTopic = 'all';
  renderSheetCards();
  renderTopicPills();
  updateStartInfo();
}

function getTopicsForSheet() {
  const topics = {};
  SHEETS[selectedSheet].questions.forEach(q => {
    if (q.topic) topics[q.topic] = (topics[q.topic] || 0) + 1;
  });
  return topics;
}

function renderTopicPills() {
  topicList = [];
  const topics = getTopicsForSheet();
  const total = SHEETS[selectedSheet].questions.length;
  let html = `<div class="topic-pill ${selectedTopic==='all'?'active':''}" onclick="selectTopicIdx(-1)">All (${total})</div>`;
  Object.entries(topics).forEach(([topic, count], i) => {
    topicList.push(topic);
    html += `<div class="topic-pill ${selectedTopic===topic?'active':''}" onclick="selectTopicIdx(${i})">${topic} (${count})</div>`;
  });
  document.getElementById('topicPills').innerHTML = html;
}

function selectTopicIdx(idx) {
  selectedTopic = idx === -1 ? 'all' : topicList[idx];
  renderTopicPills();
  updateStartInfo();
}

function getFilteredPool() {
  const qs = SHEETS[selectedSheet].questions;
  return selectedTopic === 'all' ? qs : qs.filter(q => q.topic === selectedTopic);
}

function updateStartInfo() {
  const pool = getFilteredPool();
  const s = SHEETS[selectedSheet];
  document.getElementById('startInfo').innerHTML =
    `<strong>${pool.length} questions</strong> selected from <strong>${s.fullName}</strong>`;
}

function startQuiz() {
  const pool = getFilteredPool();
  if (!pool.length) return;
  document.getElementById('landingShell').style.display = 'none';
  document.getElementById('quizShell').style.display = '';
  document.getElementById('navHome').style.display = 'none';
  document.getElementById('navQuizBack').style.display = '';
  init(pool);
}

function backToLanding() {
  clearInterval(timerInterval);
  initLanding();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ===== QUIZ ENGINE ===== */
let questions, qi, correct, wrong, answers, wrongSet, answered, currentPool;
let timeLeft, timerInterval;
const LETTERS = ['A','B','C','D','E','F'];

function shuffleArr(arr) {
  for (let k = arr.length - 1; k > 0; k--) {
    const j = Math.floor(Math.random() * (k + 1));
    [arr[k], arr[j]] = [arr[j], arr[k]];
  }
  return arr;
}

function shuffleOptions(q) {
  const indices = q.o.map((_, i) => i);
  shuffleArr(indices);
  return { ...q, o: indices.map(i => q.o[i]), a: indices.indexOf(q.a) };
}

function init(pool) {
  currentPool = pool;
  questions = shuffleArr([...pool]).map(shuffleOptions);
  qi = 0; correct = 0; wrong = 0;
  answers = new Array(questions.length).fill(null);
  wrongSet = []; answered = 0;
  startTimer();
  render();
}

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = Math.min(questions.length * 90, 50 * 60);
  const badge = document.getElementById('timerBadge');
  badge.className = 'timer-badge';
  const tick = () => {
    const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
    document.getElementById('timerTxt').textContent = `${m}:${s<10?'0':''}${s}`;
    if (timeLeft <= 120) badge.className = 'timer-badge danger';
    else if (timeLeft <= 300) badge.className = 'timer-badge warn';
    else badge.className = 'timer-badge';
  };
  tick();
  timerInterval = setInterval(() => {
    timeLeft--;
    tick();
    if (timeLeft <= 0) { clearInterval(timerInterval); finish(); }
  }, 1000);
}

function updateTop() {
  const total = questions.length;
  document.getElementById('sCorrect').textContent = correct;
  document.getElementById('sWrong').textContent = wrong;
  document.getElementById('sRemain').textContent = Math.round(((total - answered) / total) * 100) + '%';
  document.getElementById('progLabel').textContent = 'سؤال ' + (qi+1) + ' / ' + total;
  document.getElementById('progFill').style.width = ((qi+1) / total * 100) + '%';
  document.getElementById('prog-bar').style.width = ((qi+1) / total * 100) + '%';
}

function render() {
  updateTop();
  const q = questions[qi];
  document.getElementById('app').innerHTML = `
    <div class="q-card">
      <div class="q-header"><div class="q-num">سؤال ${qi+1} / ${questions.length}</div></div>
      <div class="q-text">${q.t}</div>
      <div class="options">
        ${q.o.map((o,idx) => `
          <div class="opt" id="opt${idx}" onclick="choose(${idx})">
            <div class="opt-letter">${LETTERS[idx]||idx+1}</div>${o}
          </div>`).join('')}
      </div>
      <div class="nav-btns">
        <button class="btn btn-skip" onclick="skip()"><i class="fa-solid fa-forward"></i> تخطي</button>
      </div>
    </div>`;
}

function choose(v) {
  if (answers[qi] !== null) return;
  answers[qi] = v; answered++;
  const q = questions[qi];
  const ok = v === q.a;
  ok ? correct++ : wrong++;
  updateTop();
  q.o.forEach((_, idx) => {
    const el = document.getElementById('opt'+idx);
    el.classList.add('disabled');
    if (idx === q.a) el.classList.add('correct');
    else if (idx === v) el.classList.add('wrong');
  });
  const fb = document.createElement('div');
  fb.className = 'feedback-bar ' + (ok ? 'ok' : 'no');
  fb.innerHTML = ok
    ? `<span class="feedback-icon">🎉</span><span>شطور جدا ، اللهم بارك</span>`
    : `<span class="feedback-icon">😔</span><span>ركز يا سكر</span>`;
  const card = document.querySelector('.q-card');
  card.querySelector('.options').after(fb);
  if (q.exp) {
    const exp = document.createElement('div');
    exp.className = 'explanation'; exp.style.display = 'block';
    exp.innerHTML = '<b>💬 شرح:</b> ' + q.exp;
    fb.after(exp);
  }
  card.querySelector('.nav-btns').innerHTML = `<button class="btn btn-next" onclick="next()">
    ${qi < questions.length-1 ? '<i class="fa-solid fa-arrow-left"></i> السؤال التالي' : '<i class="fa-solid fa-flag-checkered"></i> إنهاء الامتحان'}
  </button>`;
}

function skip() {
  if (answers[qi] === null) { answers[qi] = -1; answered++; wrong++; updateTop(); }
  next();
}

function next() {
  if (qi < questions.length - 1) { qi++; render(); window.scrollTo({top:0,behavior:'smooth'}); }
  else finish();
}

function finish() {
  clearInterval(timerInterval);
  const total = questions.length;
  const score = Math.round((correct / total) * 100);
  const finalWrong = questions.filter((q, idx) => answers[idx] !== q.a);
  const skipped = answers.filter(a => a === -1).length;
  let grade, gradeColor;
  if (score >= 90) { grade = '🥇 ممتاز'; gradeColor = 'var(--success)'; }
  else if (score >= 75) { grade = '🥈 جيد جداً'; gradeColor = 'var(--accent)'; }
  else if (score >= 60) { grade = '🥉 جيد'; gradeColor = 'var(--warn)'; }
  else { grade = '📚 راجع تاني'; gradeColor = 'var(--danger)'; }
  const circ = 2 * Math.PI * 45;
  const offset = circ - (score / 100) * circ;
  const reportHTML = questions.map((q, idx) => {
    const ok = answers[idx] === q.a;
    return `<div class="report-item ${ok?'ok':'no'}">
      <div class="ri-q">${ok?'✅':'❌'} ${q.t}</div>
      ${!ok ? `
        <div class="ri-row"><span class="ri-badge ri-yours">إجابتك</span> ${answers[idx]>=0?q.o[answers[idx]]:'تم التخطي'}</div>
        <div class="ri-row"><span class="ri-badge ri-right">الصحيح</span> ${q.o[q.a]}</div>` : ''}
    </div>`;
  }).join('');
  document.getElementById('prog-bar').style.width = '100%';
  document.getElementById('app').innerHTML = `
    <div class="result-hero">
      <div class="score-ring">
        <svg viewBox="0 0 110 110">
          <circle class="ring-bg" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="0"/>
          <circle class="ring-fill" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="${circ}" style="stroke:${gradeColor}" id="ringFill"/>
        </svg>
        <div class="score-num">${score}</div><div class="score-pct">%</div>
      </div>
      <div class="result-grade" style="color:${gradeColor}">${grade}</div>
      <div class="result-sub">أجبت على ${answered} من ${total} سؤال</div>
      <div class="result-stats">
        <div class="rs"><div class="n" style="color:var(--success)">${correct}</div><div class="l">صحيح</div></div>
        <div class="rs"><div class="n" style="color:var(--danger)">${wrong}</div><div class="l">خطأ</div></div>
        <div class="rs"><div class="n" style="color:var(--accent)">${skipped}</div><div class="l">تخطي</div></div>
      </div>
    </div>
    <div class="result-actions">
      ${finalWrong.length ? `<button class="btn btn-retry" onclick="retryWrong()"><i class="fa-solid fa-rotate-right"></i> إعادة الخطأ (${finalWrong.length})</button>` : ''}
      <button class="btn btn-home" onclick="init(currentPool)"><i class="fa-solid fa-shuffle"></i> امتحان جديد عشوائي</button>
      <button class="btn btn-home" onclick="backToLanding()"><i class="fa-solid fa-house"></i> رجوع للقائمة</button>
    </div>
    <div style="margin-top:28px">
      <div style="font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text2)">📋 تقرير مفصّل</div>
      ${reportHTML}
    </div>`;
  setTimeout(() => {
    const rf = document.getElementById('ringFill');
    if (rf) rf.style.strokeDashoffset = offset;
  }, 100);
  window.scrollTo({top:0,behavior:'smooth'});
}

function retryWrong() {
  const wrongTexts = new Set(
    questions.filter((q, idx) => answers[idx] !== q.a).map(q => q.t)
  );
  const pool = currentPool.filter(q => wrongTexts.has(q.t));
  init(pool.length ? pool : currentPool);
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ===== THEME ===== */
const themeBtn = document.getElementById('themeBtn');
let theme = localStorage.getItem('theme') || 'light';
function applyTheme(t) {
  theme = t;
  document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : '');
  themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('theme', t);
}
applyTheme(theme);
themeBtn.addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'));

/* ===== START ===== */
initLanding();
</script>
</body>
</html>
