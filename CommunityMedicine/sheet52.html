];

let currentQuestions = [...ALL_QUESTIONS];
let answers = {};
let currentPage = 0;
const PER_PAGE = 5;
let mode = 'practice';
let selectedTopic = 'All';

const topics = ['All', ...new Set(ALL_QUESTIONS.map(q => q.topic))];

function init() {
  const filters = document.getElementById('topic-filters');
  filters.innerHTML = '';
  topics.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (t === selectedTopic ? ' active' : '');
    btn.textContent = t === 'All' ? `All (${ALL_QUESTIONS.length})` : `${t} (${ALL_QUESTIONS.filter(q=>q.topic===t).length})`;
    btn.onclick = () => { selectedTopic = t; filterQuestions(); };
    filters.appendChild(btn);
  });
  filterQuestions();
}

function filterQuestions() {
  answers = {};
  currentPage = 0;
  if (selectedTopic === 'All') currentQuestions = [...ALL_QUESTIONS];
  else currentQuestions = ALL_QUESTIONS.filter(q => q.topic === selectedTopic);

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.startsWith(selectedTopic === 'All' ? 'All' : selectedTopic));
  });

  updateStats();
  render();
}

function setMode(m) {
  mode = m;
  answers = {};
  document.getElementById('mode-practice').classList.toggle('active', m === 'practice');
  document.getElementById('mode-exam').classList.toggle('active', m === 'exam');
  document.getElementById('result-panel').style.display = 'none';
  updateStats();
  render();
}

function shuffleQuestions() {
  answers = {};
  currentPage = 0;
  currentQuestions = [...currentQuestions].sort(() => Math.random() - 0.5);
  render();
}

function render() {
  const container = document.getElementById('quiz-container');
  const start = currentPage * PER_PAGE;
  const end = Math.min(start + PER_PAGE, currentQuestions.length);
  const pageQs = currentQuestions.slice(start, end);
  const totalPages = Math.ceil(currentQuestions.length / PER_PAGE);

  document.getElementById('page-info').textContent = `Page ${currentPage+1} of ${totalPages} — Questions ${start+1}–${end} of ${currentQuestions.length}`;

  container.innerHTML = pageQs.map((q, i) => {
    const qi = start + i;
    const answered = answers[qi] !== undefined;
    return `<div class="question-card">
      <div class="q-header">
        <div class="q-num">${qi+1}</div>
        <span class="q-topic">${q.topic}</span>
        <div class="q-text">${q.t}</div>
      </div>
      <div class="options">
        ${q.o.map((opt, oi) => {
          let cls = '';
          if (mode === 'practice' && answered) {
            if (oi === q.a) cls = 'show-correct';
            else if (oi === answers[qi]) cls = 'wrong';
          } else if (mode === 'exam' && answered) {
            if (oi === answers[qi]) cls = answered ? (answers[qi] === q.a ? 'correct' : 'wrong') : '';
          }
          const disabled = mode === 'practice' && answered;
          return `<div class="option ${cls}" onclick="${disabled ? '' : `selectAnswer(${qi}, ${oi})`}" style="${disabled?'cursor:default':''}">
            <div class="opt-letter">${String.fromCharCode(65+oi)}</div>
            <div class="opt-text">${opt}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  updateStats();
  updateProgress();
}

function selectAnswer(qi, oi) {
  if (mode === 'practice' && answers[qi] !== undefined) return;
  if (mode === 'exam' && answers[qi] !== undefined) return;
  answers[qi] = oi;

  if (mode === 'exam' && Object.keys(answers).length === currentQuestions.length) {
    showResult();
    return;
  }

  render();
  if (mode === 'practice') {
    const card = document.querySelectorAll('.question-card')[qi - currentPage * PER_PAGE];
    if (card) card.scrollIntoView({behavior:'smooth', block:'nearest'});
  }
}

function showResult() {
  let correct = 0;
  currentQuestions.forEach((q, i) => { if (answers[i] === q.a) correct++; });
  const pct = Math.round(correct / currentQuestions.length * 100);
  document.getElementById('result-panel').style.display = 'block';
  document.getElementById('result-score').textContent = `${correct} / ${currentQuestions.length}`;
  document.getElementById('result-text').textContent = `${pct}% — ${pct>=80?'Excellent! 🎉':pct>=60?'Good effort! 👍':'Keep studying! 📚'}`;
  document.getElementById('result-panel').scrollIntoView({behavior:'smooth'});
}

function updateStats() {
  const total = currentQuestions.length;
  let correct = 0, wrong = 0;
  Object.keys(answers).forEach(i => {
    if (currentQuestions[i] && answers[i] === currentQuestions[i].a) correct++;
    else wrong++;
  });
  const remaining = total - Object.keys(answers).length;
  document.getElementById('total-stat').textContent = total;
  document.getElementById('correct-stat').textContent = correct;
  document.getElementById('wrong-stat').textContent = wrong;
  document.getElementById('remaining-stat').textContent = remaining;
}

function updateProgress() {
  const pct = Object.keys(answers).length / currentQuestions.length * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function nextPage() {
  const total = Math.ceil(currentQuestions.length / PER_PAGE);
  if (currentPage < total - 1) { currentPage++; render(); window.scrollTo(0,0); }
}

function prevPage() {
  if (currentPage > 0) { currentPage--; render(); window.scrollTo(0,0); }
}

function resetQuiz() {
  answers = {};
  currentPage = 0;
  document.getElementById('result-panel').style.display = 'none';
  render();
  window.scrollTo(0,0);
}

init();
</script>
