<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHAITH TEAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent:       #dc2626;
  --accent-light: #ef4444;
  --accent-dark:  #b91c1c;
  --accent-glow:  rgba(220,38,38,0.2);
  --bg:      #f8fafc;
  --bg2:     #eef2f7;
  --card:    #ffffff;
  --text:    #1a2332;
  --text2:   #4a5568;
  --text3:   #718096;
  --bc:      rgba(0,0,0,0.07);
  --success: #16a34a;
  --danger:  #dc2626;
  --warn:    #b91c1c;
  --r:       16px;
  --tr:      all 0.3s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg:   #0d1117; --bg2: #161b22; --card: #1c2333;
  --text: #e6edf3; --text2: #b1bac4; --text3: #7d8590;
  --bc:   rgba(255,255,255,0.08);
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
  transition: background .4s, color .4s;
}

/* PROGRESS TOP */
#prog-bar {
  position: fixed; top: 0; left: 0; height: 3px; z-index: 999;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  transition: width .2s;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 64px;
  background: rgba(248,250,252,.93); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--bc); transition: var(--tr);
}
[data-theme="dark"] nav { background: rgba(13,17,23,.95); }

.nav-back {
  display: flex; align-items: center; gap: 7px;
  color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 700;
  padding: 7px 13px; border-radius: 8px; border: 1px solid var(--bc);
  background: var(--card); transition: var(--tr);
}
.nav-back:hover { color: var(--accent); border-color: var(--accent-glow); transform: translateX(3px); }
.nav-brand { display: flex; align-items: center; gap: 9px; font-size: 15px; font-weight: 900; color: var(--text); }
.nav-logo-icon {
  width: 34px; height: 34px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 900;
}
.nav-right { display: flex; align-items: center; gap: 8px; }
.theme-btn {
  width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--bc);
  background: var(--card); cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center; transition: var(--tr);
}
.theme-btn:hover { border-color: var(--accent); transform: rotate(20deg); }

/* HERO BAND */
.hero-band {
  margin-top: 64px;
  background: linear-gradient(135deg, var(--accent-dark), var(--accent), var(--accent-light));
  padding: 40px 24px 36px; text-align: center;
  position: relative; overflow: hidden;
}
.hero-band::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 600px 200px at 50% 100%, rgba(255,255,255,.12) 0%, transparent 70%);
}
.hero-band-icon {
  width: 68px; height: 68px; border-radius: 20px;
  background: rgba(255,255,255,.2); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; margin: 0 auto 14px; border: 1.5px solid rgba(255,255,255,.35);
}
.hero-band h1 { font-size: clamp(20px,4vw,30px); font-weight: 900; color: #fff; margin-bottom: 6px; }
.hero-band p { font-size: 13px; color: rgba(255,255,255,.8); }
.hero-band-meta {
  display: flex; justify-content: center; gap: 24px; margin-top: 20px;
  flex-wrap: wrap;
}
.meta-pill {
  background: rgba(255,255,255,.18); backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,.3); border-radius: 50px;
  padding: 6px 16px; font-size: 12px; font-weight: 700; color: #fff;
  display: flex; align-items: center; gap: 6px;
}

/* EXAM SHELL */
.shell { max-width: 560px; margin: 0 auto; padding: 24px 20px 80px; }

/* STATS ROW */
.stats-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px;
}
.stat-box {
  background: var(--card); border: 1px solid var(--bc); border-radius: var(--r);
  padding: 12px 10px; text-align: center;
}
.stat-box .val { font-size: 20px; font-weight: 900; }
.stat-box .lbl { font-size: 11px; color: var(--text3); margin-top: 2px; }
.stat-correct { color: var(--success); }
.stat-wrong   { color: var(--danger); }
.stat-remain  { color: var(--accent); }

/* PROGRESS STRIP */
.prog-strip {
  background: var(--card); border: 1px solid var(--bc); border-radius: var(--r);
  padding: 14px 16px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 14px;
}
.prog-label { font-size: 13px; font-weight: 700; color: var(--text2); white-space: nowrap; }
.prog-track { flex: 1; height: 8px; background: var(--bg2); border-radius: 8px; overflow: hidden; }
.prog-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  border-radius: 8px; transition: width .4s;
}
.timer-badge {
  min-width: 64px; height: 36px; border-radius: 18px;
  background: var(--bg2); border: 1px solid var(--bc);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 900; color: var(--text);
  gap: 5px; padding: 0 12px; flex-shrink: 0;
}
.timer-badge.warn { color: var(--warn); border-color: rgba(217,119,6,.3); background: rgba(217,119,6,.08); }
.timer-badge.danger { color: var(--danger); border-color: rgba(220,38,38,.3); background: rgba(220,38,38,.08); animation: pulse .8s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

/* QUESTION CARD */
.q-card {
  background: var(--card); border: 1px solid var(--bc);
  border-radius: 20px; overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,.06);
  transition: box-shadow .3s;
}
.q-header {
  background: linear-gradient(135deg, var(--accent-dark), var(--accent));
  padding: 4px 18px 4px;
  display: flex; align-items: center; gap: 8px;
}
.q-num {
  background: rgba(255,255,255,.2); border-radius: 8px;
  padding: 3px 10px; font-size: 11px; font-weight: 700; color: #fff;
}
.q-text {
  padding: 22px 18px 14px; font-size: 15px; font-weight: 700; color: var(--text);
  line-height: 1.65; border-bottom: 1px solid var(--bc);
  text-align: left; direction: ltr;
}
.options { padding: 14px 18px 18px; display: flex; flex-direction: column; gap: 10px; }

/* OPTION */
.opt {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; border-radius: 12px;
  border: 1.5px solid var(--bc); background: var(--bg);
  cursor: pointer; font-size: 14px; font-weight: 600; color: var(--text);
  transition: var(--tr); user-select: none;
  direction: ltr; text-align: left;
}
.opt:hover:not(.disabled) {
  border-color: var(--accent); background: var(--accent-glow);
  transform: translateX(3px);
}
.opt-letter {
  width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
  background: var(--bg2); border: 1px solid var(--bc);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 900; color: var(--text3);
  transition: var(--tr);
}
.opt.correct {
  border-color: var(--success); background: rgba(22,163,74,.08);
}
.opt.correct .opt-letter {
  background: var(--success); color: #fff; border-color: var(--success);
}
.opt.wrong {
  border-color: var(--danger); background: rgba(220,38,38,.07);
}
.opt.wrong .opt-letter {
  background: var(--danger); color: #fff; border-color: var(--danger);
}
.opt.disabled { pointer-events: none; }

/* FEEDBACK */
.feedback-bar {
  margin: 14px 18px; padding: 12px 16px; border-radius: 12px;
  display: flex; align-items: center; gap: 10px;
  font-size: 14px; font-weight: 700;
  animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
.feedback-bar.ok { background: rgba(22,163,74,.1); color: var(--success); border: 1px solid rgba(22,163,74,.25); }
.feedback-bar.no { background: rgba(220,38,38,.08); color: var(--danger); border: 1px solid rgba(220,38,38,.2); }
.feedback-icon { font-size: 20px; }

/* EXPLANATION */
.explanation {
  margin: 0 18px 14px; padding: 12px 14px;
  background: rgba(var(--accent-rgb),.06);
  border-radius: 10px; border-right: 3px solid var(--accent);
  font-size: 13px; color: var(--text2); line-height: 1.6;
  display: none;
}

/* NAV BTNS */
.nav-btns { padding: 4px 18px 18px; display: flex; gap: 10px; }
.btn {
  flex: 1; padding: 13px; border: none; border-radius: 12px;
  font-size: 14px; font-weight: 900; cursor: pointer;
  font-family: 'Outfit', sans-serif; transition: var(--tr);
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.btn-next {
  background: linear-gradient(135deg, var(--accent-dark), var(--accent));
  color: #fff; box-shadow: 0 4px 14px var(--accent-glow);
}
.btn-next:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
.btn-skip {
  background: var(--bg2); color: var(--text2); border: 1px solid var(--bc); flex: 0 0 auto; padding: 13px 18px;
}
.btn-skip:hover { border-color: var(--warn); color: var(--warn); }

/* ===== RESULTS ===== */
.result-hero {
  text-align: center; padding: 36px 20px 28px;
  background: var(--card); border-radius: 20px;
  border: 1px solid var(--bc); margin-bottom: 20px;
  box-shadow: 0 4px 20px rgba(0,0,0,.06);
}
.score-ring {
  width: 110px; height: 110px; border-radius: 50%; margin: 0 auto 18px;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; border: 5px solid var(--bg2);
  position: relative;
}
.score-ring svg { position: absolute; inset: -5px; width: calc(100% + 10px); height: calc(100% + 10px); transform: rotate(-90deg); }
.score-ring circle { fill: none; stroke-width: 5; stroke-linecap: round; }
.ring-bg { stroke: var(--bg2); }
.ring-fill { stroke: var(--accent); transition: stroke-dashoffset 1s ease; }
.score-num { font-size: 28px; font-weight: 900; color: var(--text); }
.score-pct { font-size: 12px; color: var(--text3); }
.result-grade { font-size: 22px; font-weight: 900; margin-bottom: 6px; }
.result-sub { font-size: 14px; color: var(--text2); }
.result-stats {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 20px;
}
.rs { background: var(--bg2); border-radius: 10px; padding: 12px 8px; text-align: center; }
.rs .n { font-size: 20px; font-weight: 900; }
.rs .l { font-size: 11px; color: var(--text3); }

/* REPORT ITEMS */
.report-item {
  background: var(--card); border: 1px solid var(--bc); border-radius: 14px;
  padding: 16px; margin-bottom: 10px; border-right: 4px solid var(--bc);
}
.report-item.ok { border-right-color: var(--success); }
.report-item.no { border-right-color: var(--danger); }
.report-item .ri-q { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
.report-item .ri-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; margin-top: 5px; color: var(--text2);
}
.ri-badge {
  padding: 2px 8px; border-radius: 6px; font-weight: 700; font-size: 11px; flex-shrink: 0;
}
.ri-yours { background: rgba(220,38,38,.1); color: var(--danger); }
.ri-right { background: rgba(22,163,74,.1); color: var(--success); }

.result-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
.btn-retry { background: linear-gradient(135deg, var(--accent-dark), var(--accent)); color: #fff; }
.btn-retry:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
.btn-home { background: var(--bg2); color: var(--text); border: 1px solid var(--bc); }
.btn-home:hover { border-color: var(--accent); color: var(--accent); }

/* FOOTER */
footer {
  background: var(--bg2); border-top: 1px solid var(--bc);
  padding: 22px 24px; display: flex; align-items: center;
  justify-content: space-between; flex-wrap: wrap; gap: 10px;
}
.footer-brand { font-size: 14px; font-weight: 700; }
.footer-brand span { color: var(--accent); }
.footer-tg { display: flex; align-items: center; gap: 5px; text-decoration: none; color: #229ED9; font-size: 12px; font-weight: 600; }

@media (max-width: 480px) {
  nav { padding: 0 14px; }
  .shell { padding: 16px 14px 60px; }
  .nav-brand span { display: none; }
  .hero-band { padding: 30px 16px 28px; }
}
</style>
</head>
<body>

<div id="prog-bar" style="width:0%"></div>

<nav>
  <a href="https://gaith-team.github.io/exam/" class="nav-back"><i class="fa-solid fa-arrow-right"></i> رجوع</a>
  <div class="nav-brand">
    <div class="nav-logo-icon">GT</div>
    <span>GHAITH TEAM</span>
  </div>
  <div class="nav-right">
    <button class="theme-btn" id="themeBtn">🌙</button>
  </div>
</nav>

<div class="hero-band">
  <div class="hero-band-icon">😎</div>
  <h1> Hospital Departments</h1>
  <p>إنجليزي</p>
  <div class="hero-band-meta">
    <div class="meta-pill"><i class="fa-solid fa-list-ol"></i> <span id="totalBadge">-- سؤال</span></div>
    <div class="meta-pill"><i class="fa-solid fa-clock"></i> 45 Min</div>
    <div class="meta-pill"><i class="fa-solid fa-shuffle"></i> Shuffled</div>
  </div>
</div>

<div class="shell">
  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="val stat-correct" id="sCorrect">0</div>
      <div class="lbl">✔ صحيح</div>
    </div>
    <div class="stat-box">
      <div class="val stat-wrong" id="sWrong">0</div>
      <div class="lbl">✖ خطأ</div>
    </div>
    <div class="stat-box">
      <div class="val stat-remain" id="sRemain">--%</div>
      <div class="lbl">⏳ متبقي</div>
    </div>
  </div>

  <!-- PROGRESS STRIP -->
  <div class="prog-strip">
    <div class="prog-label" id="progLabel">سؤال ١</div>
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <div class="timer-badge" id="timerBadge"><i class="fa-regular fa-clock"></i> <span id="timerTxt">45:00</span></div>
  </div>

  <!-- APP -->
  <div id="app"></div>
</div>

<footer>
  <div class="footer-brand">GAITH <span>TEAM</span></div>
  <a href="https://t.me/nursing2bu" target="_blank" class="footer-tg">
    <i class="fa-brands fa-telegram"></i> @nursing2bu
  </a>
</footer>

<script>
const QUESTIONS = [
  {t:"A patient comes to the hospital for the first time to have his name and identity entered into the records and to arrange a future doctor's visit. Which area should handle this step?", o:["Admissions","Registration","Waiting room/area","Consulting room"], a:1},

  {t:"On the day of a planned procedure, the same patient is asked to provide personal information again and sign consent forms before being transferred to a ward. Where is he now?", o:["Registration","Waiting room/area","Admissions","Nurses' station"], a:2},

  {t:"Relatives arrive early and must remain in a designated place until the doctor is ready to see the patient. Which hospital area is this?", o:["Consulting room","Hospital ward","Waiting room/area","Outpatient department/clinic"], a:2},

  {t:"After waiting, the patient is called into the room where the doctor examines him and discusses his medical problem. Which room is this?", o:["Nurses' station","Consulting room","Admissions","Registration"], a:1},

  {t:"Between direct patient care tasks, nurses return to a central area behind which they complete documentation and other duties. What is this area called?", o:["Hospital ward","Nurses' station","Surgery","Canteen"], a:1},

  {t:"A patient with a sudden severe illness is taken immediately to the hospital section intended for emergency treatment of severe injuries or sudden illness. Which department is this?", o:["Accident and emergency","Geriatrics","Outpatient department/clinic","Laundry"], a:0},

  {t:"In another hospital, the department providing immediate treatment for emergency cases is labeled differently. What is this department called there?", o:["ICU","Casualty","Radiology","Pharmacy"], a:1},

  {t:"After emergency treatment, a critically ill patient requires very close monitoring and intensive care. To which unit should the patient be transferred?", o:["ICU","Hospital ward","Unit","Canteen"], a:0},

  {t:"A consultant explains that a patient's injury will be managed by the branch of medical practice involving the physical removal, repair, or readjustment of organs and tissues. Which branch is this?", o:["Surgery","Physiotherapy","Radiology","Pharmacy"], a:0},

  {t:"The patient's operation has been scheduled in the room where doctors perform medical operations. Which place is this?", o:["Surgery","Consulting room","Operating theatre","Nurses' station"], a:2},

  {t:"A patient says, 'I am going to the doctor's surgery this afternoon,' meaning the place where the practitioner treats or advises patients. Which term matches this meaning?", o:["Operating theatre","Surgery","Maternity unit","Hospital ward"], a:1},

  {t:"A mother and her baby are admitted to the hospital department specializing in treatment and care during pregnancy and childbirth. Which department is this?", o:["Obstetrics/Gynecology","Maternity unit","Pediatrics","Geriatrics"], a:1},

  {t:"A pregnant woman needs antenatal and postnatal care, maternal and fetal surveillance, and prenatal diagnosis. Which department best matches all these services?", o:["Maternity unit","Obstetrics/Gynecology","Oncology","Radiology"], a:1},

  {t:"A patient is referred for investigation and treatment of digestive disease affecting both the upper and lower gastrointestinal tract. Which department is most appropriate?", o:["Gastroenterology","Orthopedics","Neurology","Cardiology"], a:0},

  {t:"An elderly patient is referred mainly because the specialty focuses on the health and care of old people rather than on one organ system only. Which department is this?", o:["Pediatrics","Renal","Geriatrics","Oncology"], a:2},

  {t:"A hospital sign directs children with medical problems to the department concerned specifically with children and their diseases. Which department is this?", o:["Urology","Pediatrics","Geriatrics","Cardiology"], a:1},

  {t:"A laboratory request requires a clinical service that includes mycology, parasitology, and a high security pathology unit. Which department provides this?", o:["Radiology","Oncology","Microbiology","Gastroenterology"], a:2},

  {t:"A clinician requests an examination in the hospital's X-ray or imaging department. Which department is being referred to?", o:["Radiology","Pharmacy","ICU","Laundry"], a:0},

  {t:"A patient with a disorder involving diseases and abnormalities of the heart should be sent to which department?", o:["Neurology","Orthopedics","Cardiology","Renal"], a:2},

  {t:"A patient is diagnosed with a disorder of the nervous system rather than a heart or digestive problem. Which department should manage this case?", o:["Cardiology","Neurology","Geriatrics","Oncology"], a:1},

  {t:"A patient with a cancerous tumor is scheduled for chemotherapy and radiotherapy. Which department provides these treatments?", o:["Microbiology","Oncology","Radiology","Pediatrics"], a:1},

  {t:"An injury involves joints, ligaments, bones, muscles, tendons, and related nerves of the musculoskeletal system. Which department is most appropriate?", o:["Physiotherapy","Urology","Orthopedics","Neurology"], a:2},

  {t:"A patient has problems involving the ear, nose, and throat, but the condition also extends into other areas of the head and neck region. Which department should provide specialized care?", o:["Urology","Otolaryngology (Ear, Nose, and Throat)","Gastroenterology","Cardiology"], a:1},

  {t:"A patient requires peritoneal dialysis now and later support for home hemodialysis. Which department provides these facilities?", o:["Renal","Urology","Oncology","Pharmacy"], a:0},

  {t:"Another patient is being investigated by consultant urology surgeons for a condition linked to the kidney and bladder, without reference to dialysis services. Which department is this?", o:["Renal","Urology","Microbiology","Obstetrics/Gynecology"], a:1},

  {t:"A treatment plan focuses on physical methods such as massage rather than drugs or operations. Which department provides this care?", o:["Surgery","Orthopedics","Physiotherapy","Radiology"], a:2},

  {t:"A patient has been prescribed medication and now needs to go to the place where medicinal drugs are prepared or sold. Where should the patient go?", o:["Canteen","Pharmacy","Laundry","Registration"], a:1},

  {t:"A patient attends the hospital for diagnosis and treatment and is expected to return home the same day because no overnight care is required. Which part of the hospital is designed for this?", o:["Hospital ward","Outpatient department/clinic","ICU","Admissions"], a:1},

  {t:"A ward asks for specialist advice about a patient's diet, and the same service also advises outpatient clinics. Which service should be contacted?", o:["Dietitians and nutritionists","Pharmacy","Canteen","Laundry"], a:0},

  {t:"Hospital staff want a place inside the hospital where inexpensive meals are served during shifts. Which place is this?", o:["Canteen","Waiting room/area","Hospital ward","Registration"], a:0},

  {t:"A shortage of sheets and other linen is reported to the service responsible for the hospital's entire linen supply. Which service is this?", o:["Elevator","Laundry","Pharmacy","Nurses' station"], a:1},

  {t:"A bed-bound patient must be transported from one floor to another inside the hospital. Which facility is designed for this movement?", o:["Hospital ward","Operating theatre","Elevator","Unit"], a:2},

  {t:"A student is asked to identify the term for a large room in a hospital where patients stay, often grouped as general, maternity, or geriatric. Which term is correct?", o:["Unit","Hospital department","Hospital ward","Consulting room"], a:2},

  {t:"In hospital organization, which term means a subdivision of a hospital providing administrative oversight for one or more charge sources?", o:["Hospital department","Hospital ward","Unit","ICU"], a:0},

  {t:"An examiner asks for the term meaning 'a department of an institution, especially a hospital, which has a particular purpose.' Which answer is correct?", o:["Hospital ward","Registration","Unit","Canteen"], a:2},

  // True / False (10)
  {t:"Registration is the place where patients sign consent forms before being taken to a unit or ward.", o:["True","False"], a:1},

  {t:"A hospital ward and a hospital department mean the same thing.", o:["True","False"], a:1},

  {t:"The term 'surgery' may refer both to a branch of medical practice and to a place where a practitioner treats or advises patients.", o:["True","False"], a:0},

  {t:"Obstetrics/Gynecology includes antenatal and postnatal care, maternal and fetal surveillance, and prenatal diagnosis.", o:["True","False"], a:0},

  {t:"Renal and Urology are described in the syllabus as exactly the same service.", o:["True","False"], a:1},

  {t:"Otolaryngology is limited only to the ear, nose, and throat and does not cover any other area of the head and neck region.", o:["True","False"], a:1},

  {t:"The outpatient department/clinic is intended for patients who do not require overnight care.", o:["True","False"], a:0},

  {t:"Microbiology provides services that include mycology and parasitology.", o:["True","False"], a:0},

  {t:"The waiting room/area is the place where the doctor examines the patient and discusses medical problems.", o:["True","False"], a:1},

  {t:" both 'Casualty' and 'Accident and emergency' refer to emergency care areas.", o:["True","False"], a:0}

];

  function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function shuffleOptions(question) {
  const options = question.o.map((text, index) => ({
    text,
    originalIndex: index
  }));

  shuffle(options);

  return {
    ...question,
    o: options.map(x => x.text),
    a: options.findIndex(x => x.originalIndex === question.a)
  };
}
/* ============ ENGINE ============ */
let questions, i, correct, wrong, answers, wrongSet, answered;
let totalTime = 45*60, timeLeft, timerInterval;
const LETTERS = ['A','B','C','D','E','F'];

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function init(pool) {
questions = shuffle([...pool]).map(q => shuffleOptions(q));  i = 0; correct = 0; wrong = 0;
  answers = new Array(questions.length).fill(null);
  wrongSet = []; answered = 0;
  timeLeft = totalTime;
  document.getElementById('totalBadge').textContent = questions.length + ' سؤال';
  startTimer();
  render();
}

/* TIMER */
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
    document.getElementById('timerTxt').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
    const badge = document.getElementById('timerBadge');
    if (timeLeft <= 120) { badge.className = 'timer-badge danger'; }
    else if (timeLeft <= 300) { badge.className = 'timer-badge warn'; }
    if (timeLeft <= 0) { clearInterval(timerInterval); finish(); }
  }, 1000);
}

/* TOP UI */
function updateTop() {
  const total = questions.length;
  document.getElementById('sCorrect').textContent = correct;
  document.getElementById('sWrong').textContent = wrong;
  document.getElementById('sRemain').textContent = Math.round(((total - answered) / total) * 100) + '%';
  document.getElementById('progLabel').textContent = 'سؤال ' + (i + 1) + ' / ' + total;
  document.getElementById('progFill').style.width = ((i + 1) / total * 100) + '%';
  document.getElementById('prog-bar').style.width = ((i + 1) / total * 100) + '%';
}

/* RENDER QUESTION */
function render() {
  updateTop();
  const q = questions[i];
  document.getElementById('app').innerHTML = `
    <div class="q-card">
      <div class="q-header">
        <div class="q-num">سؤال ${i + 1} / ${questions.length}</div>
      </div>
      <div class="q-text">${q.t}</div>
      <div class="options">
        ${q.o.map((o, idx) => `
          <div class="opt" id="opt${idx}" onclick="choose(${idx})">
            <div class="opt-letter">${LETTERS[idx] || idx + 1}</div>
            ${o}
          </div>
        `).join('')}
      </div>
      <div class="nav-btns">
        <button class="btn btn-skip" onclick="skip()"><i class="fa-solid fa-forward"></i> تخطي</button>
      </div>
    </div>`;
}

/* CHOOSE */
function choose(v) {
  if (answers[i] !== null) return;
  answers[i] = v;
  answered++;
  const q = questions[i];
  const ok = v === q.a;
  ok ? correct++ : wrong++;
  updateTop();

  q.o.forEach((_, idx) => {
    const el = document.getElementById('opt' + idx);
    el.classList.add('disabled');
    if (idx === q.a) el.classList.add('correct');
    else if (idx === v) el.classList.add('wrong');
  });

  const fb = document.createElement('div');
  fb.className = 'feedback-bar ' + (ok ? 'ok' : 'no');
  fb.innerHTML = ok
    ? `<span class="feedback-icon">🎉</span> <span>عسل ، اللهم بارك </span>`
    : `<span class="feedback-icon">😔</span> <span>ركز يا شطور</span>`;

  const card = document.querySelector('.q-card');
  card.querySelector('.options').after(fb);
  if (q.exp) {
    const exp = document.createElement('div');
    exp.className = 'explanation';
    exp.style.display = 'block';
    exp.innerHTML = '<b>💬 شرح:</b> ' + q.exp;
    fb.after(exp);
  }

  const navBtns = card.querySelector('.nav-btns');
  navBtns.innerHTML = `<button class="btn btn-next" onclick="next()">
    ${i < questions.length - 1 ? '<i class="fa-solid fa-arrow-left"></i> السؤال التالي' : '<i class="fa-solid fa-flag-checkered"></i> إنهاء الامتحان'}
  </button>`;
}

/* SKIP */
function skip() {
  if (answers[i] === null) { answers[i] = -1; answered++; wrongSet.push(questions[i]); wrong++; updateTop(); }
  next();
}

/* NEXT */
function next() {
  if (i < questions.length - 1) { i++; render(); window.scrollTo({top: 0, behavior: 'smooth'}); }
  else finish();
}

/* FINISH */
function finish() {
  clearInterval(timerInterval);
  const total = questions.length;
  const score = Math.round((correct / total) * 100);

  questions.forEach((q, idx) => {
    if (answers[idx] !== q.a) wrongSet.push({...q, myAns: answers[idx]});
  });
  wrongSet = [...new Map(wrongSet.map(q => [q.t, q])).values()];

  let grade, gradeColor;
  if (score >= 90) { grade = '🥇 ممتاز'; gradeColor = 'var(--success)'; }
  else if (score >= 75) { grade = '🥈 جيد جداً'; gradeColor = 'var(--accent)'; }
  else if (score >= 60) { grade = '🥉 جيد'; gradeColor = 'var(--warn)'; }
  else { grade = '📚 راجع تاني'; gradeColor = 'var(--danger)'; }

  const circ = 2 * Math.PI * 45;
  const offset = circ - (score / 100) * circ;

  const reportHTML = questions.map((q, idx) => {
    const ok = answers[idx] === q.a;
    return `<div class="report-item ${ok ? 'ok' : 'no'}">
      <div class="ri-q">${ok ? '✅' : '❌'} ${q.t}</div>
      ${!ok ? `
        <div class="ri-row"><span class="ri-badge ri-yours">إجابتك</span> ${answers[idx] >= 0 ? q.o[answers[idx]] : 'تم التخطي'}</div>
        <div class="ri-row"><span class="ri-badge ri-right">الصحيح</span> ${q.o[q.a]}</div>
      ` : ''}
    </div>`;
  }).join('');

  document.getElementById('prog-bar').style.width = '100%';
  document.getElementById('app').innerHTML = `
    <div class="result-hero">
      <div class="score-ring">
        <svg viewBox="0 0 110 110">
          <circle class="ring-bg" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="0"/>
          <circle class="ring-fill" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            style="stroke:${gradeColor}" id="ringFill"/>
        </svg>
        <div class="score-num">${score}</div>
        <div class="score-pct">%</div>
      </div>
      <div class="result-grade" style="color:${gradeColor}">${grade}</div>
      <div class="result-sub">أجبت على ${answered} من ${total} سؤال</div>
      <div class="result-stats">
        <div class="rs"><div class="n" style="color:var(--success)">${correct}</div><div class="l">صحيح</div></div>
        <div class="rs"><div class="n" style="color:var(--danger)">${wrong}</div><div class="l">خطأ</div></div>
        <div class="rs"><div class="n" style="color:var(--accent)">${total - answered < 0 ? 0 : total - answered}</div><div class="l">تخطي</div></div>
      </div>
    </div>

    <div class="result-actions">
      ${wrongSet.length ? `<button class="btn btn-retry" onclick="retryWrong()"><i class="fa-solid fa-rotate-right"></i> إعادة الخطأ (${wrongSet.length})

</button>` : ''}
      <button class="btn btn-home" onclick="init(QUESTIONS)"><i class="fa-solid fa-shuffle"></i> امتحان جديد عشوائي</button>
      <a href="https://gaith-team.github.io/exam/" class="btn btn-home" style="text-decoration:none;"><i class="fa-solid fa-house"></i> رجوع للمادة</a>
    </div>

    <div style="margin-top:28px">
      <div style="font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text2)">📋 تقرير مفصّل</div>
      ${reportHTML}
    </div>`;

  setTimeout(() => { document.getElementById('ringFill').style.strokeDashoffset = offset; }, 100);
  window.scrollTo({top: 0, behavior: 'smooth'});
}

/* RETRY WRONG */
function retryWrong() {
  const pool = [...wrongSet];
  questions = shuffle(pool); i = 0; correct = 0; wrong = 0;
  answers = new Array(questions.length).fill(null);
  wrongSet = []; answered = 0; timeLeft = totalTime;
  startTimer(); render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

/* THEME */
const themeBtn = document.getElementById('themeBtn');
let theme = localStorage.getItem('theme') || 'light';
function applyTheme(t) {
  theme = t;
  document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : '');
  themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('theme', t);
}
applyTheme(theme);
themeBtn.addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'));

/* START */
init(QUESTIONS);
</script>
