<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent:       #db2777;
  --accent-light: #ec4899;
  --accent-dark:  #be185d;
  --accent-glow:  rgba(219,39,119,0.2);
  --bg:      #f8fafc;
  --bg2:     #eef2f7;
  --card:    #ffffff;
  --text:    #1a2332;
  --text2:   #4a5568;
  --text3:   #718096;
  --bc:      rgba(0,0,0,0.07);
  --success: #16a34a;
  --danger:  #dc2626;
  --warn:    #be185d;
  --r:       16px;
  --tr:      all 0.3s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg:   #0d1117; --bg2: #161b22; --card: #1c2333;
  --text: #e6edf3; --text2: #b1bac4; --text3: #7d8590;
  --bc:   rgba(255,255,255,0.08);
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
  transition: background .4s, color .4s;
}

/* PROGRESS TOP */
#prog-bar {
  position: fixed; top: 0; left: 0; height: 3px; z-index: 999;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  transition: width .2s;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 64px;
  background: rgba(248,250,252,.93); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--bc); transition: var(--tr);
}
[data-theme="dark"] nav { background: rgba(13,17,23,.95); }

.nav-back {
  display: flex; align-items: center; gap: 7px;
  color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 700;
  padding: 7px 13px; border-radius: 8px; border: 1px solid var(--bc);
  background: var(--card); transition: var(--tr);
}
.nav-back:hover { color: var(--accent); border-color: var(--accent-glow); transform: translateX(3px); }
.nav-brand { display: flex; align-items: center; gap: 9px; font-size: 15px; font-weight: 900; color: var(--text); }
.nav-logo-icon {
  width: 34px; height: 34px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 900;
}
.nav-right { display: flex; align-items: center; gap: 8px; }
.theme-btn {
  width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--bc);
  background: var(--card); cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center; transition: var(--tr);
}
.theme-btn:hover { border-color: var(--accent); transform: rotate(20deg); }

/* HERO BAND */
.hero-band {
  margin-top: 64px;
  background: linear-gradient(135deg, var(--accent-dark), var(--accent), var(--accent-light));
  padding: 40px 24px 36px; text-align: center;
  position: relative; overflow: hidden;
}
.hero-band::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 600px 200px at 50% 100%, rgba(255,255,255,.12) 0%, transparent 70%);
}
.hero-band-icon {
  width: 68px; height: 68px; border-radius: 20px;
  background: rgba(255,255,255,.2); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; margin: 0 auto 14px; border: 1.5px solid rgba(255,255,255,.35);
}
.hero-band h1 { font-size: clamp(20px,4vw,30px); font-weight: 900; color: #fff; margin-bottom: 6px; }
.hero-band p { font-size: 13px; color: rgba(255,255,255,.8); }
.hero-band-meta {
  display: flex; justify-content: center; gap: 24px; margin-top: 20px;
  flex-wrap: wrap;
}
.meta-pill {
  background: rgba(255,255,255,.18); backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,.3); border-radius: 50px;
  padding: 6px 16px; font-size: 12px; font-weight: 700; color: #fff;
  display: flex; align-items: center; gap: 6px;
}

/* EXAM SHELL */
.shell { max-width: 560px; margin: 0 auto; padding: 24px 20px 80px; }

/* STATS ROW */
.stats-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px;
}
.stat-box {
  background: var(--card); border: 1px solid var(--bc); border-radius: var(--r);
  padding: 12px 10px; text-align: center;
}
.stat-box .val { font-size: 20px; font-weight: 900; }
.stat-box .lbl { font-size: 11px; color: var(--text3); margin-top: 2px; }
.stat-correct { color: var(--success); }
.stat-wrong   { color: var(--danger); }
.stat-remain  { color: var(--accent); }

/* PROGRESS STRIP */
.prog-strip {
  background: var(--card); border: 1px solid var(--bc); border-radius: var(--r);
  padding: 14px 16px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 14px;
}
.prog-label { font-size: 13px; font-weight: 700; color: var(--text2); white-space: nowrap; }
.prog-track { flex: 1; height: 8px; background: var(--bg2); border-radius: 8px; overflow: hidden; }
.prog-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  border-radius: 8px; transition: width .4s;
}
.timer-badge {
  min-width: 64px; height: 36px; border-radius: 18px;
  background: var(--bg2); border: 1px solid var(--bc);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 900; color: var(--text);
  gap: 5px; padding: 0 12px; flex-shrink: 0;
}
.timer-badge.warn { color: var(--warn); border-color: rgba(217,119,6,.3); background: rgba(217,119,6,.08); }
.timer-badge.danger { color: var(--danger); border-color: rgba(220,38,38,.3); background: rgba(220,38,38,.08); animation: pulse .8s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

/* QUESTION CARD */
.q-card {
  background: var(--card); border: 1px solid var(--bc);
  border-radius: 20px; overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,.06);
  transition: box-shadow .3s;
}
.q-header {
  background: linear-gradient(135deg, var(--accent-dark), var(--accent));
  padding: 4px 18px 4px;
  display: flex; align-items: center; gap: 8px;
}
.q-num {
  background: rgba(255,255,255,.2); border-radius: 8px;
  padding: 3px 10px; font-size: 11px; font-weight: 700; color: #fff;
}
.q-text {
  padding: 22px 18px 14px; font-size: 15px; font-weight: 700; color: var(--text);
  line-height: 1.65; border-bottom: 1px solid var(--bc);
  text-align: left; direction: ltr;
}
.options { padding: 14px 18px 18px; display: flex; flex-direction: column; gap: 10px; }

/* OPTION */
.opt {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; border-radius: 12px;
  border: 1.5px solid var(--bc); background: var(--bg);
  cursor: pointer; font-size: 14px; font-weight: 600; color: var(--text);
  transition: var(--tr); user-select: none;
  direction: ltr; text-align: left;
}
.opt:hover:not(.disabled) {
  border-color: var(--accent); background: var(--accent-glow);
  transform: translateX(3px);
}
.opt-letter {
  width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
  background: var(--bg2); border: 1px solid var(--bc);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 900; color: var(--text3);
  transition: var(--tr);
}
.opt.correct {
  border-color: var(--success); background: rgba(22,163,74,.08);
}
.opt.correct .opt-letter {
  background: var(--success); color: #fff; border-color: var(--success);
}
.opt.wrong {
  border-color: var(--danger); background: rgba(220,38,38,.07);
}
.opt.wrong .opt-letter {
  background: var(--danger); color: #fff; border-color: var(--danger);
}
.opt.disabled { pointer-events: none; }

/* FEEDBACK */
.feedback-bar {
  margin: 14px 18px; padding: 12px 16px; border-radius: 12px;
  display: flex; align-items: center; gap: 10px;
  font-size: 14px; font-weight: 700;
  animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
.feedback-bar.ok { background: rgba(22,163,74,.1); color: var(--success); border: 1px solid rgba(22,163,74,.25); }
.feedback-bar.no { background: rgba(220,38,38,.08); color: var(--danger); border: 1px solid rgba(220,38,38,.2); }
.feedback-icon { font-size: 20px; }

/* EXPLANATION */
.explanation {
  margin: 0 18px 14px; padding: 12px 14px;
  background: rgba(var(--accent-rgb),.06);
  border-radius: 10px; border-right: 3px solid var(--accent);
  font-size: 13px; color: var(--text2); line-height: 1.6;
  display: none;
}

/* NAV BTNS */
.nav-btns { padding: 4px 18px 18px; display: flex; gap: 10px; }
.btn {
  flex: 1; padding: 13px; border: none; border-radius: 12px;
  font-size: 14px; font-weight: 900; cursor: pointer;
  font-family: 'Outfit', sans-serif; transition: var(--tr);
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.btn-next {
  background: linear-gradient(135deg, var(--accent-dark), var(--accent));
  color: #fff; box-shadow: 0 4px 14px var(--accent-glow);
}
.btn-next:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
.btn-skip {
  background: var(--bg2); color: var(--text2); border: 1px solid var(--bc); flex: 0 0 auto; padding: 13px 18px;
}
.btn-skip:hover { border-color: var(--warn); color: var(--warn); }

/* ===== RESULTS ===== */
.result-hero {
  text-align: center; padding: 36px 20px 28px;
  background: var(--card); border-radius: 20px;
  border: 1px solid var(--bc); margin-bottom: 20px;
  box-shadow: 0 4px 20px rgba(0,0,0,.06);
}
.score-ring {
  width: 110px; height: 110px; border-radius: 50%; margin: 0 auto 18px;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; border: 5px solid var(--bg2);
  position: relative;
}
.score-ring svg { position: absolute; inset: -5px; width: calc(100% + 10px); height: calc(100% + 10px); transform: rotate(-90deg); }
.score-ring circle { fill: none; stroke-width: 5; stroke-linecap: round; }
.ring-bg { stroke: var(--bg2); }
.ring-fill { stroke: var(--accent); transition: stroke-dashoffset 1s ease; }
.score-num { font-size: 28px; font-weight: 900; color: var(--text); }
.score-pct { font-size: 12px; color: var(--text3); }
.result-grade { font-size: 22px; font-weight: 900; margin-bottom: 6px; }
.result-sub { font-size: 14px; color: var(--text2); }
.result-stats {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 20px;
}
.rs { background: var(--bg2); border-radius: 10px; padding: 12px 8px; text-align: center; }
.rs .n { font-size: 20px; font-weight: 900; }
.rs .l { font-size: 11px; color: var(--text3); }

/* REPORT ITEMS */
.report-item {
  background: var(--card); border: 1px solid var(--bc); border-radius: 14px;
  padding: 16px; margin-bottom: 10px; border-right: 4px solid var(--bc);
}
.report-item.ok { border-right-color: var(--success); }
.report-item.no { border-right-color: var(--danger); }
.report-item .ri-q { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
.report-item .ri-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; margin-top: 5px; color: var(--text2);
}
.ri-badge {
  padding: 2px 8px; border-radius: 6px; font-weight: 700; font-size: 11px; flex-shrink: 0;
}
.ri-yours { background: rgba(220,38,38,.1); color: var(--danger); }
.ri-right { background: rgba(22,163,74,.1); color: var(--success); }

.result-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
.btn-retry { background: linear-gradient(135deg, var(--accent-dark), var(--accent)); color: #fff; }
.btn-retry:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
.btn-home { background: var(--bg2); color: var(--text); border: 1px solid var(--bc); }
.btn-home:hover { border-color: var(--accent); color: var(--accent); }

/* FOOTER */
footer {
  background: var(--bg2); border-top: 1px solid var(--bc);
  padding: 22px 24px; display: flex; align-items: center;
  justify-content: space-between; flex-wrap: wrap; gap: 10px;
}
.footer-brand { font-size: 14px; font-weight: 700; }
.footer-brand span { color: var(--accent); }
.footer-tg { display: flex; align-items: center; gap: 5px; text-decoration: none; color: #229ED9; font-size: 12px; font-weight: 600; }

@media (max-width: 480px) {
  nav { padding: 0 14px; }
  .shell { padding: 16px 14px 60px; }
  .nav-brand span { display: none; }
  .hero-band { padding: 30px 16px 28px; }
}
</style>
</head>

{t:"SCENARIO: A 31-year-old woman at 36 weeks with GDM has a blood glucose of 180 mg/dL one hour after a meal. The nurse knows the target one-hour postprandial glucose in GDM is:",o:["< 120 mg/dL","< 140 mg/dL","< 160 mg/dL","< 180 mg/dL"],a:1,type:"scenario",diff:"hard",topic:"diabetes"},

{t:"SCENARIO: A 22-year-old at 30 weeks with hemoglobin 6.5 g/dL develops dyspnea, tachycardia, and generalized edema. What is her anemia classification and immediate management?",o:["Mild anemia; oral iron","Moderate anemia; parenteral iron","Severe anemia; blood transfusion with packed RBCs","Very severe anemia; emergency hysterectomy"],a:2,type:"scenario",diff:"hard",topic:"anemia"},

{t:"SCENARIO: A 33-year-old woman with threatened abortion at 8 weeks is told to rest at home. The nurse advises all EXCEPT:",o:["Bed rest","Avoid sexual intercourse","Light exercise and walking immediately","Return immediately if bleeding increases or pain worsens"],a:2,type:"scenario",diff:"easy",topic:"abortion"},
{t:"SCENARIO: A nurse receives a woman with suspected pre-eclampsia. She has BP 155/100 mmHg, 2+ proteinuria, and facial edema. The nurse should position her:",o:["Flat supine to rest","Semi-Fowler's or left lateral position","Prone position","Trendelenburg position"],a:1,type:"scenario",diff:"medium",topic:"pih"},

{t:"SCENARIO: A 28-year-old woman at 20 weeks presents with nausea, excessive vomiting of fluid-filled 'grape-like' material, a uterus large for dates, and absent fetal heart sounds on Doppler. HCG is markedly elevated. What is the diagnosis?",o:["Twin pregnancy","Complete vesicular mole","Incomplete abortion","Severe pre-eclampsia"],a:1,type:"scenario",diff:"medium",topic:"abortion"},

{t:"SCENARIO: A 25-year-old woman at 35 weeks with iron deficiency anemia has very severe anemia (Hb 3.5 g/dL). She is breathless at rest. What is the most appropriate intervention?",o:["Oral ferrous sulfate 200 mg daily","Parenteral iron IM","Blood transfusion with packed RBCs","Folic acid supplementation"],a:2,type:"scenario",diff:"medium",topic:"anemia"},

{t:"SCENARIO: A 29-year-old at 34 weeks presents with BP 170/115, 4+ proteinuria, severe headache, and epigastric pain. She then has a seizure. What type of eclampsia is this?",o:["Postpartum eclampsia","Intrapartum eclampsia","Antepartum eclampsia","Superimposed eclampsia"],a:2,type:"scenario",diff:"medium",topic:"pih"},
{t:"SCENARIO: A nurse caring for a woman on MgSO4 drip notices that her respiratory rate is 12 breaths per minute and her knee jerk is absent. What is the CORRECT action?",o:["Continue infusion and document","Slow the infusion rate slightly","Stop MgSO4 and administer calcium gluconate 10 mL 10% IV","Administer a bolus of MgSO4"],a:2,type:"scenario",diff:"hard",topic:"pih"},
{t:"SCENARIO: A 24-year-old breastfeeding mother on day 4 develops a red, hard, painful area in one breast with fever of 38.5°C. This most likely represents:",o:["Normal breast engorgement","Breast abscess","Mastitis","Galactocele"],a:2,type:"scenario",diff:"medium",topic:"abnormal-labor"},
{t:"SCENARIO: A 38-year-old primigravida with longstanding hypertension (pre-existing, before 20 weeks) develops 3+ proteinuria at 28 weeks. This is classified as:",o:["Pre-eclampsia","Gestational hypertension","Superimposed pre-eclampsia","Chronic hypertension only"],a:2,type:"scenario",diff:"hard",topic:"pih"},
{t:"SCENARIO: During a postnatal check at 6 weeks, a woman is found to still have a palpable uterus above the symphysis pubis and complains of continued heavy lochia. This suggests:",o:["Normal involution","Sub-involution of the uterus","Postpartum psychosis","Normal breastfeeding effect"],a:1,type:"scenario",diff:"medium",topic:"puerperium"},
{t:"SCENARIO: A woman with eclampsia bites her tongue during a seizure. The equipment the nurse should have at the bedside to prevent this is:",o:["Oxygen mask","Mouth gag / tongue depressor","Suction apparatus","IV cannula"],a:1,type:"scenario",diff:"medium",topic:"pih"},
{t:"SCENARIO: A 20-year-old at 12 weeks presents with mild vaginal spotting, HCG is rising slowly, and ultrasound shows no cardiac activity. The cervix is closed and there is no pain. This is consistent with:",o:["Threatened abortion","Complete abortion","Missed abortion","Inevitable abortion"],a:2,type:"scenario",diff:"medium",topic:"abortion"},
{t:"SCENARIO: A multigravida at 38 weeks has a previous cesarean section scar and is found to have placenta previa centralis (complete). The nurse prepares her for:",o:["Vaginal delivery with oxytocin","Immediate amniotomy","Cesarean section","Expectant management at home"],a:2,type:"scenario",diff:"medium",topic:"late-bleeding"},
{t:"SCENARIO: A 30-year-old woman at 20 weeks has her antenatal booking visit. Her blood group is O negative. The nurse should advise her about:",o:["Increased iron intake only","Need for anti-D immunoglobulin (Rhesus factor management)","Increased folic acid supplementation","Avoiding all physical activity"],a:1,type:"scenario",diff:"medium",topic:"antenatal"},
{t:"SCENARIO: A 26-year-old woman at 18 weeks complains of leg cramps at night. The nurse advises her to:",o:["Take complete bed rest","Dorsiflex the foot of the affected leg and apply heat, evaluate diet","Take diuretics","Stop all exercise"],a:1,type:"scenario",diff:"easy",topic:"antenatal"},
{t:"SCENARIO: A primigravida in the second stage of labor develops variable decelerations on fetal monitoring. The nurse should FIRST:",o:["Administer oxygen by face mask and change maternal position","Perform cesarean section immediately","Increase oxytocin infusion rate","Apply fundal pressure"],a:0,type:"scenario",diff:"hard",topic:"labor"},
{t:"SCENARIO: A woman with complete placenta previa is at 35 weeks with her second bleeding episode. The bleeding has stopped. The physician decides on conservative management. The nurse should:",o:["Discharge her home with activity restrictions","Keep her hospitalized on complete bed rest, monitor vitals and fetal status, avoid vaginal examination","Perform amniotomy","Encourage ambulation"],a:1,type:"scenario",diff:"medium",topic:"late-bleeding"},
{t:"SCENARIO: A woman at 38 weeks has BP 190/120 mmHg, 4+ proteinuria, anuria, and jaundice. Based on Eden's criteria for severe eclampsia, which of the following does NOT apply?",o:["Systolic BP > 200 is not met (190)","Anuria meets the criteria","Jaundice meets the criteria","All criteria met"],a:0,type:"scenario",diff:"hard",topic:"pih"},

{t:"SCENARIO: A 34-year-old pregnant woman at 16 weeks has serum ferritin of 5 ng/mL (low), microcytic anemia, and fatigue. She is vegetarian. What factor MOST contributes to her iron deficiency?",o:["Increased iron requirement due to pregnancy","Vegetarian diet low in heme iron combined with increased requirements","Excessive blood loss","Malabsorption syndrome"],a:1,type:"scenario",diff:"medium",topic:"anemia"},
{t:"SCENARIO: A newborn weighs 5.2 kg, has a moon face, is coated with vernix caseosa, and appears plethoric. The mother's medical history most likely reveals:",o:["Hypertension","Gestational diabetes mellitus","Iron deficiency anemia","Cardiac disease"],a:1,type:"scenario",diff:"easy",topic:"diabetes"},
{t:"SCENARIO: A 22-year-old woman presents at 8 weeks with symptoms of pregnancy but her uterus is large for dates. Ultrasound shows no fetal parts, only a 'snowstorm' pattern. HCG is very high. She has nausea and hypertension. What is the diagnosis?",o:["Multiple pregnancy","Complete vesicular mole","Missed abortion","Pre-eclampsia of pregnancy"],a:1,type:"scenario",diff:"medium",topic:"abortion"},
{t:"SCENARIO: A primiparous woman at day 1 postpartum is unable to breastfeed because of flat nipples. The nurse should advise:",o:["Stop breastfeeding and use formula","Nipple manipulation and shield use, apply glycerin and olive oil mixture","Surgical nipple correction immediately","Give the baby formula until nipples improve"],a:1,type:"scenario",diff:"medium",topic:"puerperium"},
{t:"SCENARIO: A patient is receiving MgSO4 for eclampsia. The infusion rate must deliver 4 gm every 4 hours (maintenance dose). A sign that the drug level is therapeutic is:",o:["Absent knee jerk","Respiratory rate of 10/min","Knee jerk present, RR > 16/min, urine output > 30 mL/hr","Urine output 15 mL/hr"],a:2,type:"scenario",diff:"hard",topic:"pih"},
{t:"SCENARIO: A 27-year-old primigravida at 39 weeks is in labor. Her contractions are every 2 minutes, lasting 70 seconds, and the cervix is 8 cm dilated. She is restless and says she can't relax. The nurse assesses she is in:",o:["Latent phase","Active acceleration phase","Active deceleration (transition) phase","Second stage of labor"],a:2,type:"scenario",diff:"medium",topic:"labor"},

{t:"SCENARIO: A 31-year-old woman presents with 8 weeks of amenorrhea, sudden severe right lower quadrant pain, shoulder-tip pain, dizziness, and hypotension. The abdomen is rigid and there is internal bleeding. What complication is most likely?",o:["Acute appendicitis","Ruptured ectopic pregnancy","Placental abruption","Ovarian torsion"],a:1,type:"scenario",diff:"medium",topic:"abortion"},
{t:"SCENARIO: A 24-year-old at 28 weeks gestation has been diagnosed with gestational diabetes. Her HbA1c is 8.5%. The nurse knows this indicates:",o:["Well-controlled diabetes over the past 12 weeks","Poor glycemic control over the past 4–12 weeks","Normal range for a pregnant woman","Adequate insulin dosing"],a:1,type:"scenario",diff:"hard",topic:"diabetes"},
{t:"SCENARIO: A midwife is managing the third stage of labor using the active (Brandt-Andrews) method. With delivery of the anterior shoulder, she gives syntometrine IM. What is the next step?",o:["Immediately pull on the cord","Wait for the uterus to contract, apply suprapubic pressure pushing uterus upward, and apply gentle downward traction on the cord","Manually remove the placenta","Apply fundal massage only"],a:1,type:"scenario",diff:"hard",topic:"labor"},
{t:"SCENARIO: A nurse is providing health education to a pregnant woman with iron deficiency anemia. Which instruction is MOST important for maximizing iron absorption?",o:["Take iron with tea or coffee at meal times","Take iron on an empty stomach with vitamin C-rich juice or citrus","Take iron at bedtime only","Take iron with milk for better absorption"],a:1,type:"scenario",diff:"medium",topic:"anemia"},
{t:"SCENARIO: A 19-year-old multigravida develops pre-eclampsia at 30 weeks. She is 2 days postpartum and has a sudden convulsion. This is classified as:",o:["Antepartum eclampsia","Intrapartum eclampsia","Postpartum eclampsia","Superimposed eclampsia"],a:2,type:"scenario",diff:"medium",topic:"pih"},
{t:"SCENARIO: A woman at 36 weeks with NYHA Grade II heart disease has been managed conservatively. She enters labor spontaneously. During the second stage, the nurse should:",o:["Encourage maximum pushing effort to shorten labor","Use low or outlet forceps or vacuum to avoid prolonged pushing","Administer oxytocin to accelerate second stage","Ask her to bear down continuously"],a:1,type:"scenario",diff:"hard",topic:"cardiac"},
{t:"SCENARIO: A woman reports that her amniotic fluid was 'green' when her membranes ruptured at 38 weeks in active labor (cephalic presentation). This color is MOST significant because it indicates:",o:["Normal mucus plug","Fetal distress with meconium passage","Blood-stained fluid from abruption","Hemolytic disease of the newborn"],a:1,type:"scenario",diff:"medium",topic:"labor"},
{t:"SCENARIO: A nurse is teaching a newly postpartum woman about warning signs. Which symptom requires IMMEDIATE medical attention?",o:["Pink lochia on day 5","Mild breast tenderness","Fever over 38°C with chills 3 days after delivery","Occasional mild cramps"],a:2,type:"scenario",diff:"easy",topic:"puerperium"},
{t:"SCENARIO: A 32-year-old pregnant woman at 26 weeks complains of palpitations, orthopnea, and paroxysmal nocturnal dyspnea. On auscultation, a diastolic heart murmur is heard. The nurse should:",o:["Reassure her these are normal pregnancy symptoms","Refer her urgently to cardiologist for evaluation","Tell her to reduce physical activity at home","Administer diuretics immediately"],a:1,type:"scenario",diff:"medium",topic:"cardiac"},
{t:"SCENARIO: A woman at 38 weeks has a Bishop score of 2 (unfavorable cervix). She has placenta previa centralis. The physician decides on:",o:["Vaginal delivery with amniotomy","Expectant management at home","Emergency cesarean section","Induction with prostaglandins"],a:2,type:"scenario",diff:"hard",topic:"late-bleeding"},
{t:"SCENARIO: A 28-year-old woman at 32 weeks comes for her routine antenatal visit. Her BP is 130/88 mmHg (previously 110/70). She has no proteinuria and no symptoms. What is the appropriate action?",o:["Reassure and schedule next visit in 4 weeks","Increase frequency of visits and monitor BP closely; repeat BP and urine check","Admit for immediate delivery","Start antihypertensives immediately"],a:1,type:"scenario",diff:"medium",topic:"pih"},
{t:"SCENARIO: A woman at 40 weeks in active labor has her membranes intact. She asks to walk between contractions. The nurse should:",o:["Prohibit walking due to risk of cord prolapse","Permit walking if there is no contraindication and monitor","Insist on bed rest throughout all of labor","Perform artificial rupture of membranes first"],a:1,type:"scenario",diff:"easy",topic:"labor"},
{t:"SCENARIO: During the immediate newborn care, the nurse notes the baby's hands and feet are blue while the body is pink. The Apgar color score is:",o:["0 (all blue)","1 (body pink, limbs blue)","2 (all pink)","Not scorable"],a:1,type:"scenario",diff:"medium",topic:"labor"},
{t:"SCENARIO: A 25-year-old woman at 34 weeks is admitted with sudden onset of rigid abdomen, brown vaginal bleeding, and hypotension. Her fundus is measuring 36 weeks (large for dates). The most likely diagnosis is:",o:["Revealed placental abruption","Concealed placental abruption","Placenta previa","Uterine fibroids"],a:1,type:"scenario",diff:"medium",topic:"late-bleeding"},
{t:"SCENARIO: A 35-year-old woman undergoes a cesarean section for placenta previa. In the postoperative period, the nurse should monitor closely for:",o:["Hypertension only","Postpartum hemorrhage, infection, and thromboembolic events","Normal lochia only","Breast engorgement"],a:1,type:"scenario",diff:"medium",topic:"late-bleeding"},
{t:"SCENARIO: A 20-year-old primigravida at 10 weeks gestation is found to have her uterus deviated to the right on bimanual examination. The nurse correctly explains this is:",o:["An abnormal finding requiring further investigation","Normal as the uterus is typically dextrorotated (to the right) during pregnancy","Caused by uterine fibroids","A sign of ectopic pregnancy"],a:1,type:"scenario",diff:"hard",topic:"physiology"},
{t:"SCENARIO: A postpartum woman with grade I heart disease wants to breastfeed. The nurse should:",o:["Strongly discourage breastfeeding","Assist her to breastfeed in a comfortable side-lying position with moderate head elevation","Allow breastfeeding only for 5 minutes maximum","Advise exclusive formula feeding"],a:1,type:"scenario",diff:"medium",topic:"cardiac"},
{t:"SCENARIO: A 23-year-old at 28 weeks has been taking oral iron for 6 weeks with no improvement in hemoglobin. She reports severe constipation and nausea with the tablets. The nurse should recommend:",o:["Doubling the oral iron dose","Switching to parenteral iron after evaluation","Adding vitamin C supplements only","Stopping iron and using only dietary sources"],a:1,type:"scenario",diff:"medium",topic:"anemia"},
{t:"SCENARIO: A woman at 36 weeks is suspected to have an ectopic pregnancy. Pelvic ultrasound shows no intrauterine pregnancy. She is hemodynamically stable. Which medical treatment is appropriate?",o:["Immediate laparotomy","Methotrexate administration","Expectant management at home","Oxytocin infusion"],a:1,type:"scenario",diff:"hard",topic:"abortion"},
{t:"SCENARIO: A 30-year-old woman's newborn has just been delivered and has a heart rate of 110 bpm, slow irregular respirations, some flexion of limbs, grimace, and blue hands/feet with pink body. What is the Apgar score?",o:["4","5","6","7"],a:2,type:"scenario",diff:"hard",topic:"labor"},
{t:"SCENARIO: A 26-year-old woman has her second antenatal visit at 28 weeks. The nurse's priority screening action at this visit is:",o:["Repeat Rh antibody screen and hemoglobin, urine analysis","Perform cervical smear","Order echocardiography","Assess fetal sex"],a:0,type:"scenario",diff:"medium",topic:"antenatal"},
{t:"SCENARIO: A 35-week pregnant woman with known placenta previa reports sudden, painless, heavy vaginal bleeding. She is pale and tachycardic. The nurse's FIRST action is:",o:["Perform vaginal examination to assess cervical dilatation","Establish IV access, call for emergency assistance, prepare for blood transfusion, monitor vitals","Apply abdominal pressure","Encourage ambulation"],a:1,type:"scenario",diff:"hard",topic:"late-bleeding"},
{t:"SCENARIO: A nurse provides discharge teaching to a woman with gestational diabetes. Which statement by the woman indicates she understands the teaching?",o:["I will eat 3 large meals per day to prevent hypoglycemia","I will eat 3 small meals and 3 snacks daily and monitor blood glucose regularly","I will stop all insulin once the baby is born","I don't need to check my blood sugar again after delivery"],a:1,type:"scenario",diff:"medium",topic:"diabetes"},
{t:"SCENARIO: A 27-year-old woman is at 24 weeks gestation and has her glucose challenge test: blood glucose is 150 mg/dL one hour after 50g glucose. What is the appropriate next step?",o:["Diagnose GDM immediately – no further testing","Perform a 3-hour 100g oral glucose tolerance test","Repeat the challenge test in 4 weeks","No further testing as this is a normal result"],a:1,type:"scenario",diff:"medium",topic:"diabetes"},
{t:"SCENARIO: A 28-year-old woman at 32 weeks with severe pre-eclampsia is placed on MgSO4. She later develops flushing, nausea, and muscle weakness. The nurse suspects:",o:["Therapeutic level achieved","Signs of MgSO4 toxicity – notify physician and prepare calcium gluconate","Normal side effects requiring no action","Pre-eclampsia worsening"],a:1,type:"scenario",diff:"hard",topic:"pih"},
{t:"SCENARIO: A 19-year-old woman is 6 weeks postpartum and still has no return of menstruation. She is exclusively breastfeeding. The nurse explains this is because:",o:["She has a hormonal imbalance","Prolactin suppresses FSH/LH during breastfeeding, delaying menstruation","She has developed postpartum amenorrhea syndrome","She needs hormonal evaluation"],a:1,type:"scenario",diff:"medium",topic:"puerperium"},
{t:"SCENARIO: A woman with eclampsia has just had a convulsion. The nurse should position her:",o:["Flat supine","On her back with head hyperextended","On her side (lateral position) to prevent aspiration","In Trendelenburg position"],a:2,type:"scenario",diff:"medium",topic:"pih"},
{t:"SCENARIO: A 34-year-old pregnant woman at 28 weeks notices a sudden decrease in fetal movements over 24 hours. She last felt the baby move 6 hours ago. The nurse should:",o:["Reassure her and ask her to return in 1 week","Instruct her to come to the clinic immediately for fetal heart rate monitoring and assessment","Tell her to wait another 12 hours before worrying","Advise bed rest and increased fluid intake"],a:1,type:"scenario",diff:"medium",topic:"antenatal"},
{t:"SCENARIO: A nurse in the delivery room notes that the baby's mouth is full of meconium as the head is delivered. The nurse's FIRST action should be:",o:["Clamp and cut the cord immediately","Wipe the eyelids, nose, and mouth with dry gauze to remove mucus and meconium, then suction mouth then nose","Stimulate the baby vigorously","Administer oxygen by bag and mask immediately"],a:1,type:"scenario",diff:"hard",topic:"labor"},
{t:"SCENARIO: A 26-year-old woman had an emergency cesarean section for placenta previa. On day 2, she develops calf pain, tenderness, and unilateral leg swelling. What complication is suspected?",o:["Puerperal sepsis","Deep vein thrombosis (DVT)","Lochia serosa","Postpartum hemorrhage"],a:1,type:"scenario",diff:"medium",topic:"abnormal-labor"},
{t:"SCENARIO: A woman at 16 weeks presents with excessive vomiting causing dehydration and electrolyte imbalance. Her HCG is very high. Excluding molar pregnancy, what is the most likely diagnosis?",o:["Threatened abortion","Hyperemesis gravidarum","Pre-eclampsia","Gastroenteritis"],a:1,type:"scenario",diff:"medium",topic:"physiology"},
{t:"SCENARIO: A 31-year-old woman at 26 weeks has been told she has a complete (central) vesicular mole. Which symptom combination is MOST consistent with this diagnosis?",o:["Painless bright red bleeding with a uterus small for dates","Excessive nausea and vomiting, uterus large for dates, absent fetal heart tones, hypertension, high HCG","Severe abdominal pain and uterine rigidity","Regular uterine contractions with closed cervix"],a:1,type:"scenario",diff:"medium",topic:"abortion"},
{t:"SCENARIO: A woman at 28 weeks complains of ankle swelling by the end of the day that disappears overnight. Her BP is 118/76 mmHg and urine protein is negative. The nurse explains:",o:["This is a sign of pre-eclampsia requiring admission","This is a normal physiological finding of pregnancy (ankle edema) related to venous stasis","She needs diuretics immediately","She should restrict all fluid intake"],a:1,type:"scenario",diff:"easy",topic:"antenatal"},
{t:"SCENARIO: A woman at 12 weeks calls the antenatal clinic reporting passage of 'grape-like' tissue per vagina with heavy bleeding. The nurse should tell her to:",o:["Take an antispasmodic and return in 2 days","Come to the hospital immediately for evaluation (suspected molar pregnancy)","Rest at home and monitor","Take misoprostol at home"],a:1,type:"scenario",diff:"medium",topic:"abortion"},
{t:"SCENARIO: A 35-year-old para 3 woman delivered a healthy baby vaginally 30 minutes ago. The uterus is soft and not contracting. She is bleeding heavily. The nurse's FIRST action is:",o:["Administer oxytocin and massage the uterus fundus","Perform bimanual compression","Call a physician before any intervention","Apply ice pack to the abdomen"],a:0,type:"scenario",diff:"hard",topic:"abnormal-labor"},
{t:"SCENARIO: A diabetic pregnant woman at 38 weeks has blood glucose of 240 mg/dL. She is on insulin. The nurse recognizes the immediate danger for the fetus is:",o:["Fetal macrosomia only","Fetal hyperglycemia causing osmotic diuresis and potential hypoxia; also risk of fetal hyperinsulinism postnatally","Anemia","Structural anomalies developing now"],a:1,type:"scenario",diff:"hard",topic:"diabetes"},

/* ============ ENGINE ============ */
let questions, i, correct, wrong, answers, wrongSet, answered;
let totalTime = 300*60, timeLeft, timerInterval;
const LETTERS = ['A','B','C','D','E','F'];

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function init(pool) {
  questions = shuffle([...pool]);
  i = 0; correct = 0; wrong = 0;
  answers = new Array(questions.length).fill(null);
  wrongSet = []; answered = 0;
  timeLeft = totalTime;
  document.getElementById('totalBadge').textContent = questions.length + ' سؤال';
  startTimer();
  render();
}

/* TIMER */
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
    document.getElementById('timerTxt').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
    const badge = document.getElementById('timerBadge');
    if (timeLeft <= 120) { badge.className = 'timer-badge danger'; }
    else if (timeLeft <= 300) { badge.className = 'timer-badge warn'; }
    if (timeLeft <= 0) { clearInterval(timerInterval); finish(); }
  }, 1000);
}

/* TOP UI */
function updateTop() {
  const total = questions.length;
  document.getElementById('sCorrect').textContent = correct;
  document.getElementById('sWrong').textContent = wrong;
  document.getElementById('sRemain').textContent = Math.round(((total - answered) / total) * 100) + '%';
  document.getElementById('progLabel').textContent = 'سؤال ' + (i + 1) + ' / ' + total;
  document.getElementById('progFill').style.width = ((i + 1) / total * 100) + '%';
  document.getElementById('prog-bar').style.width = ((i + 1) / total * 100) + '%';
}

/* RENDER QUESTION */
function render() {
  updateTop();
  const q = questions[i];
  document.getElementById('app').innerHTML = `
    <div class="q-card">
      <div class="q-header">
        <div class="q-num">سؤال ${i + 1} / ${questions.length}</div>
      </div>
      <div class="q-text">${q.t}</div>
      <div class="options">
        ${q.o.map((o, idx) => `
          <div class="opt" id="opt${idx}" onclick="choose(${idx})">
            <div class="opt-letter">${LETTERS[idx] || idx + 1}</div>
            ${o}
          </div>
        `).join('')}
      </div>
      <div class="nav-btns">
        <button class="btn btn-skip" onclick="skip()"><i class="fa-solid fa-forward"></i> تخطي</button>
      </div>
    </div>`;
}

/* CHOOSE */
function choose(v) {
  if (answers[i] !== null) return;
  answers[i] = v;
  answered++;
  const q = questions[i];
  const ok = v === q.a;
  ok ? correct++ : wrong++;
  updateTop();

  q.o.forEach((_, idx) => {
    const el = document.getElementById('opt' + idx);
    el.classList.add('disabled');
    if (idx === q.a) el.classList.add('correct');
    else if (idx === v) el.classList.add('wrong');
  });

  const fb = document.createElement('div');
  fb.className = 'feedback-bar ' + (ok ? 'ok' : 'no');
  fb.innerHTML = ok
    ? `<span class="feedback-icon">🎉</span> <span>شطور جدا ، اللهم بارك</span>`
    : `<span class="feedback-icon">😔</span> <span>ركز يا سكر</span>`;

  const card = document.querySelector('.q-card');
  card.querySelector('.options').after(fb);
  if (q.exp) {
    const exp = document.createElement('div');
    exp.className = 'explanation';
    exp.style.display = 'block';
    exp.innerHTML = '<b>💬 شرح:</b> ' + q.exp;
    fb.after(exp);
  }

  const navBtns = card.querySelector('.nav-btns');
  navBtns.innerHTML = `<button class="btn btn-next" onclick="next()">
    ${i < questions.length - 1 ? '<i class="fa-solid fa-arrow-left"></i> السؤال التالي' : '<i class="fa-solid fa-flag-checkered"></i> إنهاء الامتحان'}
  </button>`;
}

/* SKIP */
function skip() {
  if (answers[i] === null) { answers[i] = -1; answered++; wrongSet.push(questions[i]); wrong++; updateTop(); }
  next();
}

/* NEXT */
function next() {
  if (i < questions.length - 1) { i++; render(); window.scrollTo({top: 0, behavior: 'smooth'}); }
  else finish();
}

/* FINISH */
function finish() {
  clearInterval(timerInterval);
  const total = questions.length;
  const score = Math.round((correct / total) * 100);

  questions.forEach((q, idx) => {
    if (answers[idx] !== q.a) wrongSet.push({...q, myAns: answers[idx]});
  });
  wrongSet = [...new Map(wrongSet.map(q => [q.t, q])).values()];

  let grade, gradeColor;
  if (score >= 90) { grade = '🥇 ممتاز'; gradeColor = 'var(--success)'; }
  else if (score >= 75) { grade = '🥈 جيد جداً'; gradeColor = 'var(--accent)'; }
  else if (score >= 60) { grade = '🥉 جيد'; gradeColor = 'var(--warn)'; }
  else { grade = '📚 راجع تاني'; gradeColor = 'var(--danger)'; }

  const circ = 2 * Math.PI * 45;
  const offset = circ - (score / 100) * circ;

  const reportHTML = questions.map((q, idx) => {
    const ok = answers[idx] === q.a;
    return `<div class="report-item ${ok ? 'ok' : 'no'}">
      <div class="ri-q">${ok ? '✅' : '❌'} ${q.t}</div>
      ${!ok ? `
        <div class="ri-row"><span class="ri-badge ri-yours">إجابتك</span> ${answers[idx] >= 0 ? q.o[answers[idx]] : 'تم التخطي'}</div>
        <div class="ri-row"><span class="ri-badge ri-right">الصحيح</span> ${q.o[q.a]}</div>
      ` : ''}
    </div>`;
  }).join('');

  document.getElementById('prog-bar').style.width = '100%';
  document.getElementById('app').innerHTML = `
    <div class="result-hero">
      <div class="score-ring">
        <svg viewBox="0 0 110 110">
          <circle class="ring-bg" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="0"/>
          <circle class="ring-fill" cx="55" cy="55" r="45" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            style="stroke:${gradeColor}" id="ringFill"/>
        </svg>
        <div class="score-num">${score}</div>
        <div class="score-pct">%</div>
      </div>
      <div class="result-grade" style="color:${gradeColor}">${grade}</div>
      <div class="result-sub">أجبت على ${answered} من ${total} سؤال</div>
      <div class="result-stats">
        <div class="rs"><div class="n" style="color:var(--success)">${correct}</div><div class="l">صحيح</div></div>
        <div class="rs"><div class="n" style="color:var(--danger)">${wrong}</div><div class="l">خطأ</div></div>
        <div class="rs"><div class="n" style="color:var(--accent)">${total - answered < 0 ? 0 : total - answered}</div><div class="l">تخطي</div></div>
      </div>
    </div>

    <div class="result-actions">
      ${wrongSet.length ? `<button class="btn btn-retry" onclick="retryWrong()"><i class="fa-solid fa-rotate-right"></i> إعادة الخطأ (${wrongSet.length})</button>` : ''}
      <button class="btn btn-home" onclick="init(QUESTIONS)"><i class="fa-solid fa-shuffle"></i> امتحان جديد عشوائي</button>
      <a href="https://gaith-team.github.io/exam/obstetric/index.html" class="btn btn-home" style="text-decoration:none;"><i class="fa-solid fa-house"></i> رجوع للمادة</a>
    </div>

    <div style="margin-top:28px">
      <div style="font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text2)">📋 تقرير مفصّل</div>
      ${reportHTML}
    </div>`;

  setTimeout(() => { document.getElementById('ringFill').style.strokeDashoffset = offset; }, 100);
  window.scrollTo({top: 0, behavior: 'smooth'});
}

/* RETRY WRONG */
function retryWrong() {
  const pool = [...wrongSet];
  questions = shuffle(pool); i = 0; correct = 0; wrong = 0;
  answers = new Array(questions.length).fill(null);
  wrongSet = []; answered = 0; timeLeft = totalTime;
  startTimer(); render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

/* THEME */
const themeBtn = document.getElementById('themeBtn');
let theme = localStorage.getItem('theme') || 'light';
function applyTheme(t) {
  theme = t;
  document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : '');
  themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('theme', t);
}
applyTheme(theme);
themeBtn.addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'));

/* START */
init(QUESTIONS);
</script>
</body>
</html>
