<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaith Team | Exam</title>

<style>
:root{
  --primary:#0284c7;
  --secondary:#0ea5e9;
  --bg:#f8fbff;
  --card:#ffffff;
  --soft:#e6f0ff;
  --question:#eef7ff;
  --option:#f9fcff;
  --success:#16a34a;
  --danger:#dc2626;
  --text:#0f172a;

  /* Brand dynamic */
  --brand1:#ffffff;
  --brand2:#e0f2fe;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Segoe UI",Tahoma,Arial,sans-serif;
  background:linear-gradient(180deg,var(--bg),#eef6ff);
  color:var(--text);
}

/* ================= HEADER ================= */
header{
  background:linear-gradient(90deg,var(--primary),var(--secondary));
  color:#fff;
  padding:18px;
  text-align:center;
  overflow:hidden;
}

/* ===== Brand ===== */
.logo{
  position:relative;
  font-size:28px;
  font-weight:900;
  display:inline-flex;
  align-items:center;
  gap:6px;
}

.brand-text{
  background:linear-gradient(90deg,var(--brand1),var(--brand2),var(--brand1));
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 4s linear infinite;
}
@keyframes shine{
  0%{background-position:0%}
  100%{background-position:200%}
}

.heart{
  display:inline-block;
  animation:heartbeat 1.6s infinite ease-in-out;
}
@keyframes heartbeat{
  0%{transform:scale(1)}
  50%{transform:scale(1.25)}
  100%{transform:scale(1)}
}

/* Sparkles */
.sparkle{
  position:absolute;
  font-size:14px;
  animation:twinkle 3s infinite ease-in-out;
}
@keyframes twinkle{
  0%{opacity:0;transform:scale(.6)}
  50%{opacity:1;transform:scale(1.2)}
  100%{opacity:0;transform:scale(.6)}
}

/* Reduced motion أثناء الامتحان */
.exam .sparkle{animation-duration:5s;opacity:.4}
.exam .heart{animation-duration:2.5s}

/* After exam */
.after .sparkle{animation-duration:2s}
.after .heart{animation-duration:1.1s}

/* ================= LAYOUT ================= */
.container{max-width:520px;margin:auto;padding:16px}

/* ===== Top Bar ===== */
.top-bar{
  display:flex;
  gap:12px;
  margin-bottom:16px;
}
.progress-box{
  flex:1;
  background:var(--card);
  padding:14px;
  border-radius:18px;
  box-shadow:0 10px 22px rgba(2,132,199,.12);
}
.progress-text{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:6px;
  font-weight:800;
  font-size:14px;
}
.progress{
  height:8px;
  background:var(--soft);
  border-radius:10px;
  overflow:hidden;
}
.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--primary),var(--secondary));
}

/* Timer */
.timer{
  width:64px;height:64px;border-radius:50%;
  background:conic-gradient(var(--primary) 0deg,var(--soft) 0deg);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:14px;
  background-color:var(--card);
}

/* ================= CARD ================= */
.card{
  background:var(--card);
  padding:22px;
  border-radius:24px;
  box-shadow:0 18px 36px rgba(2,132,199,.18);
}
.question-title{
  background:var(--question);
  padding:16px;
  border-radius:16px;
  font-weight:900;
  margin-bottom:16px;
}
.option{
  background:var(--option);
  border:2px solid var(--soft);
  border-radius:18px;
  padding:15px;
  margin:12px 0;
  font-weight:700;
  cursor:pointer;
}
.option.correct{background:#eafaf1;border-color:var(--success)}
.option.wrong{background:#fff1f1;border-color:var(--danger)}
.option.disabled{pointer-events:none;opacity:.9}

button{
  margin-top:18px;
  width:100%;
  padding:15px;
  border:none;
  border-radius:20px;
  background:linear-gradient(90deg,var(--primary),var(--secondary));
  color:#fff;
  font-weight:900;
}

/* Feedback */
.feedback{
  text-align:center;
  font-size:22px;
  margin-bottom:10px;
  animation:pop .5s;
}
@keyframes pop{
  0%{transform:scale(.6);opacity:0}
  100%{transform:scale(1);opacity:1}
}

/* Report */
.report{
  background:var(--card);
  padding:14px;
  border-radius:14px;
  margin:10px 0;
  border-left:6px solid var(--soft);
}
.report.correct{border-color:var(--success)}
.report.wrong{border-color:var(--danger)}
</style>
</head>

<body class="exam">

<header>
  <div class="logo">
    <span class="brand-text">Gaith Team</span>
    <span class="heart">💖</span>
    <span class="sparkle" style="top:-8px;left:0">✨</span>
    <span class="sparkle" style="top:6px;right:-8px">✨</span>
    <span class="sparkle" style="bottom:-8px;left:50%">✨</span>
  </div>
  <div style="margin-top:6px;font-weight:800">الإمتحان في جيبك 👏🏻</div>
</header>

<div class="container">

  <div class="top-bar">
    <div class="progress-box">
      <div class="progress-text">
        <span id="progressText"></span>
        <span>
          ✔️ <span id="correctCount">0</span> |
          ❌ <span id="wrongCount">0</span> |
          ⏳ <span id="remainPercent">100%</span>
        </span>
      </div>
      <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>
    <div class="timer" id="timer">30:00</div>
  </div>

  <div id="app"></div>
</div>

<script>
/* ===== Questions ===== */
let questions = [
 {
    "t": "A woman in labor is diagnosed with an Occipito-posterior position. She complains of severe, persistent backache. Which nursing action is most appropriate to help the fetus rotate?",
    "o": ["Encourage her to lie flat on her back", "Encourage different positions like hands-and-knees or side-lying", "Perform frequent vaginal examinations", "Administer oxytocin immediately"],
    "a": 1
  },
  {
    "t": "During a vaginal exam, the nurse feels the fetal chin (mentum) as the presenting part. The chin is directed towards the mother's sacrum (Mento-posterior). What is the likely management for this case?",
    "o": ["Vaginal delivery in 80% of cases", "Immediate Cesarean section (C-section)", "Manual rotation and vacuum extraction", "Wait for spontaneous rotation to Occiput"],
    "a": 1
  },
  {
    "t": "A primigravida is in labor and the membranes rupture. The nurse suddenly sees the umbilical cord protruding from the vagina. What is the priority nursing action?",
    "o": ["Push the cord back into the uterus", "Place the woman in a knee-chest or Trendelenburg position", "Perform a sterile vaginal exam to check for dilation", "Notify the family about the baby's condition"],
    "a": 1
  },
  {
    "t": "In which type of breech presentation are both the fetal hips and knees flexed (sitting cross-legged)?",
    "o": ["Frank breech", "Footling breech", "Complete breech", "Incomplete breech"],
    "a": 2
  },
  {
    "t": "A nurse is caring for a woman with a Brow presentation. Why is the insertion of a fetal scalp electrode contraindicated in this case?",
    "o": ["It causes maternal infection", "To prevent fetal injury to the face and eyes", "It increases the risk of cord prolapse", "It slows down cervical dilatation"],
    "a": 1
  },
  {
    "t": "A fetus is in a transverse lie (shoulder presentation). Which complication is the mother at highest risk for if this is not diagnosed and managed?",
    "o": ["Precipitate labor", "Uterine rupture", "Post-term pregnancy", "Hypertension"],
    "a": 1
  },
  {
    "t": "True or False: Cord presentation (funic presentation) occurs when the cord is in front of the presenting part BEFORE the rupture of membranes.",
    "o": ["True", "False"],
    "a": 0
  },
  {
    "t": "The nurse is assessing a woman in labor with an Occipito-posterior position. Why is it important to check the urine for ketone bodies?",
    "o": ["To detect infection", "To assess for dehydration from prolonged labor", "To check for protein loss", "To monitor fetal lung maturity"],
    "a": 1
  },
  {
    "t": "A newborn is delivered from a face presentation. The parents are distressed by the baby's swollen and bruised face. What should the nurse tell them?",
    "o": ["The swelling is permanent", "The facial appearance usually resolves by the fifth day", "A plastic surgeon should be consulted immediately", "This is a sign of a serious brain injury"],
    "a": 1
  },
  {
    "t": "Which pelvic shape is a common cause of Occipito-posterior position?",
    "o": ["Gynecoid pelvis", "Android or Anthropoid pelvis", "Platypelloid pelvis", "Normal female pelvis"],
    "a": 1
  },
  {
    "t": "A fetus is in a Frank breech position. This means the fetal hips and knees are in which state?",
    "o": ["Flexed hips and flexed knees", "Flexed hips and extended knees", "Extended hips and extended knees", "Extended hips and flexed knees"],
    "a": 1
  },
  {
    "t": "During a cord prolapse emergency, the nurse uses a sterile gloved hand to apply firm upward manual pressure to the presenting part. What is the goal of this action?",
    "o": ["To dilate the cervix faster", "To elevate the fetus and relieve pressure from the cord", "To stop the bleeding", "To rotate the fetus to a vertex position"],
    "a": 1
  },
  {
    "t": "True or False: Brow presentation is a cephalic presentation where the head is midway between flexion and extension.",
    "o": ["True", "False"],
    "a": 0
  },
  {
    "t": "Which of the following is a common cause of shoulder presentation?",
    "o": ["Primigravida status", "Contracted pelvic inlet", "Small amniotic fluid volume", "Fetal head engagement"],
    "a": 1
  },
  {
    "t": "A woman with a breech presentation has meconium-stained amniotic fluid. What does this finding indicate to the nurse?",
    "o": ["Normal finding in breech due to pressure on the fetal abdomen", "Severe fetal distress and hypoxia", "Maternal infection", "Placenta previa"],
    "a": 0
  },
  {
    "t": "What is the most common type of breech presentation, occurring in 65% of cases?",
    "o": ["Complete breech", "Frank breech", "Footling breech", "Kneeling breech"],
    "a": 1
  },
  {
    "t": "In a face presentation, if the chin is anterior (Mento-anterior), what is the expected outcome?",
    "o": ["80% chance of vaginal delivery", "100% chance of C-section", "High risk of uterine rupture", "Always requires forceps"],
    "a": 0
  },
  {
    "t": "True or False: In a shoulder presentation, the fetus's long axis is perpendicular to the maternal axis.",
    "o": ["True", "False"],
    "a": 0
  },
  {
    "t": "Which complication is specifically associated with Brow presentation due to the large diameter of the head entering the pelvis?",
    "o": ["Precipitate labor", "Perineal and vaginal lacerations", "Low blood pressure", "Excessive amniotic fluid"],
    "a": 1
  },
  {
    "t": "A nurse is preparing a woman for a C-section due to a prolapsed cord. What should she do with the protruding cord to prevent it from drying?",
    "o": ["Push it back inside the vagina", "Gently wrap it in gauze soaked in sterile normal warm saline", "Apply an ice pack to the cord", "Leave it as it is"],
    "a": 1
  },
  {
    "t": "True or False: Multiparous women are at higher risk for face presentation due to a weak abdominal wall.",
    "o": ["True", "False"],
    "a": 0
  },
  {
    "t": "Which of the following is NOT a cause of breech presentation?",
    "o": ["Prematurity", "Polyhydramnios", "Contracted pelvis", "Single fetus at term"],
    "a": 3
  },
  {
    "t": "A 'Pathological Ring' (Bandl's ring) is a warning sign of impending uterine rupture, often seen in which condition?",
    "o": ["Normal labor", "Neglected shoulder presentation", "Occipito-anterior position", "First stage of labor"],
    "a": 1
  },
  {
    "t": "True or False: In an Occipito-posterior position, labor is significantly shortened.",
    "o": ["True", "False"],
    "a": 1
  },
  {
    "t": "Which fetal malpresentation is associated with the highest risk of cord prolapse?",
    "o": ["Vertex presentation", "Footling breech or Shoulder presentation", "Face presentation", "Occipito-anterior position"],
    "a": 1
  },
  {
    "t": "A woman with an Occipito-posterior position is experiencing 'coupling' of uterine contractions. This means:",
    "o": ["Contractions are weak and far apart", "Two contractions occur close together followed by a pause", "Contractions have stopped completely", "Contractions are regular and efficient"],
    "a": 1
  },
  {
    "t": "True or False: Brow presentation usually results in vaginal delivery without any complications.",
    "o": ["True", "False"],
    "a": 1
  },
  {
    "t": "What is the primary maternal risk in a breech delivery?",
    "o": ["Infection and traumatic delivery", "Hypotension", "Diabetes", "Overactive bladder"],
    "a": 0
  },
  {
    "t": "In a face presentation, which finding would lead the nurse to prepare for a C-section?",
    "o": ["Mento-anterior position", "Mento-posterior position that does not rotate", "Active labor progress", "Fetal heart rate of 140 bpm"],
    "a": 1
  },
  {
    "t": "True or False: Footling breech involves one or both feet entering the pelvis first.",
    "o": ["True", "False"],
    "a": 0
  },
  {
    "t": "Which of the following is a cause of umbilical cord prolapse?",
    "o": ["Placenta previa", "Short umbilical cord", "Small fetus", "Late rupture of membranes"],
    "a": 0
  },
  {
    "t": "The nurse is monitoring the fetal heart rate (FHR) in a woman with a breech presentation. Why is electronic fetal monitoring particularly indicated?",
    "o": ["To check for maternal fever", "To monitor for distress, especially if meconium is present", "To measure the strength of contractions", "To determine the fetal weight"],
    "a": 1
  },
  {
    "t": "True or False: Android pelvis is heart-shaped and often leads to fetal malpositions like Occipito-posterior.",
    "o": ["True", "False"],
    "a": 0
  },
  {
    "t": "In a shoulder presentation, the nurse performs an abdominal examination to confirm the diagnosis. What would she likely find?",
    "o": ["The head in the fundus", "The head in the lower uterine segment", "The head in one of the iliac fossae (transverse)", "The buttocks in the lower segment"],
    "a": 2
  },
  {
    "t": "A woman with a Brow presentation is making slow progress in labor. What is a potential fetal risk in this situation?",
    "o": ["Excessive birth weight", "Damage to the central nervous system", "Stronger bones", "Better lung capacity"],
    "a": 1
  },
  {
    "t": "True or False: In a face presentation, the head is hyper-extended.",
    "o": ["True", "False"],
    "a": 0
  },
  {
    "t": "Which position should the nurse encourage for a woman with a prolapsed cord while waiting for the surgical team?",
    "o": ["Supine with legs flat", "Knee-chest or Trendelenburg", "Sitting upright in a chair", "Prone (on stomach)"],
    "a": 1
  },
  {
    "t": "What is the main cause of respiratory distress in a newborn delivered via face presentation?",
    "o": ["Large lungs", "Edema of the larynx", "Fast delivery", "High oxygen levels"],
    "a": 1
  },
  {
    "t": "True or False: A 'Pendulous abdomen' (lax abdominal wall) can contribute to malpresentations like Occipito-posterior.",
    "o": ["True", "False"],
    "a": 0
  },
  {
    "t": "In which type of breech presentation are the fetal knees extended and hips flexed?",
    "o": ["Complete breech", "Frank breech", "Footling breech", "Kneeling breech"],
    "a": 1
  },
  {
    "t": "A nurse is caring for a woman with a shoulder presentation. Which procedure might be attempted by a physician to change the fetal position?",
    "o": ["Internal rotation", "External version", "Episiotomy", "Amniotomy"],
    "a": 1
  },
  {
    "t": "True or False: Cord prolapse is more common in multiple births (twins).",
    "o": ["True", "False"],
    "a": 0
  },
  {
    "t": "What is the primary goal of the nursing role in a Brow presentation?",
    "o": ["To perform the delivery herself", "Close monitoring of labor progress and fetal status", "To administer heavy sedatives", "To encourage the mother to walk"],
    "a": 1
  },
  {
    "t": "In an Occipito-posterior position, why is the rate of instrumental delivery (forceps/vacuum) higher?",
    "o": ["The mother is too tired to push", "The fetus fails to rotate spontaneously to an anterior position", "The baby is always too small", "The cervix dilates too fast"],
    "a": 1
  },
  {
    "t": "True or False: Complete breech occurs in only 10% of all breech presentations.",
    "o": ["True", "False"],
    "a": 0
  },
  {
    "t": "Which of the following is a cause of Face presentation?",
    "o": ["Anencephaly", "Small maternal age", "Tight abdominal muscles", "Fetal head flexion"],
    "a": 0
  },
  {
    "t": "A nurse is preparing tocolytic administration for a woman with a breech presentation. What is the purpose of this medication?",
    "o": ["To speed up labor", "To relax the uterus and give time for better assessment", "To induce labor", "To stop bleeding"],
    "a": 1
  },
  {
    "t": "True or False: Manual rotation of the fetal head in Occipito-posterior position is a common intervention.",
    "o": ["True", "False"],
    "a": 0
  },
  {
    "t": "Which finding during a vaginal exam is most indicative of a shoulder presentation?",
    "o": ["Feeling the soft buttocks", "Feeling the hard occiput", "Feeling the ribs or an arm", "Feeling the nose and eyes"],
    "a": 2
  },
  {
    "t": "In a cord prolapse, if the cord stops pulsating, it means:",
    "o": ["The baby is sleeping", "Fetal circulation is compromised (fetal death risk)", "The cord is healthy", "Labor has ended"],
    "a": 1
  }
];



// ===== shuffle questions only =====
function shuffleQuestions(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

// خلط الأسئلة فقط
shuffleQuestions(questions);

// تعريف المتغيرات الناقصة
let i = 0;
let correct = 0;
let wrong = 0;
let answers = [];
let wrongSet = [];

/* ===== Timer ===== */
let totalTime=30*60, timeLeft=totalTime;
const timerInt=setInterval(()=>{
  timeLeft--;
  let m=Math.floor(timeLeft/60), s=timeLeft%60;
  timer.innerText=`${m}:${s<10?"0":""}${s}`;
  let deg=(timeLeft/totalTime)*360;
  timer.style.background=`conic-gradient(var(--primary) ${deg}deg,var(--soft) ${deg}deg)`;
  if(timeLeft<=0){clearInterval(timerInt);finishExam();}
},1000);

/* ===== UI ===== */
function updateTop(){
  let total=questions.length;
  let answered=correct+wrong;
  progressText.innerText=`سؤال ${i+1} من ${total}`;
  progressBar.style.width=((i+1)/total*100)+"%";
  correctCount.innerText=correct;
  wrongCount.innerText=wrong;
  remainPercent.innerText=Math.round(((total-answered)/total)*100)+"%";
}

/* ===== Render ===== */
function show(){
  updateTop();
  let q = questions[i];

  app.innerHTML = `
    <div class="card">
      <div class="question-title">${q.t}</div>
      ${q.o.map((o,idx)=>`
        <div class="option" onclick="choose(${idx})">${o}</div>
      `).join("")}
    </div>
  `;
}
/* ===== Choose ===== */
function choose(v){
  if(answers[i]!=null) return;
  answers[i]=v;
  let ok=v===questions[i].a;
  ok?correct++:wrong++;
  app.innerHTML=`
    <div class="feedback">${ok?"🎉 شاطر جدًا كمل":"😅 ركّز يا سُكر"}</div>
    <div class="card">
      <div class="question-title">${questions[i].t}</div>
      ${questions[i].o.map((o,j)=>`
        <div class="option ${j===questions[i].a?"correct":j===v?"wrong":""} disabled">${o}</div>
      `).join("")}
      <button onclick="next()">التالي</button>
    </div>`;
}

/* ===== Next ===== */
function next(){
  if(i<questions.length-1){i++;show();}
  else finishExam();
}

/* ===== Finish ===== */
function finishExam(){
  document.body.classList.remove("exam");
  document.body.classList.add("after");

  let score=Math.round((correct/questions.length)*100);

  if(score>=80){
    document.documentElement.style.setProperty("--brand1","#22c55e");
    document.documentElement.style.setProperty("--brand2","#fde047");
  }else if(score>=50){
    document.documentElement.style.setProperty("--brand1","#38bdf8");
    document.documentElement.style.setProperty("--brand2","#e0f2fe");
  }else{
    document.documentElement.style.setProperty("--brand1","#fb923c");
    document.documentElement.style.setProperty("--brand2","#fed7aa");
  }

  wrongSet=[];
  let report="";
  questions.forEach((q,idx)=>{
    let ok=answers[idx]===q.a;
    if(!ok) wrongSet.push(q);
    report+=`
      <div class="report ${ok?"correct":"wrong"}">
        <b>${q.t}</b><br>
إجابتك: ${answers[idx]!=null ? q.o[answers[idx]] : "لم يتم الحل"}<br>
الصح: ${q.o[q.a]}
      </div>`;
  });

  app.innerHTML=`
    <div class="card">
      <h3>?? تقريرك</h3>
      ${report}
      ${wrongSet.length?`<button onclick="retry()">إعادة حل الغلط فقط</button>`:"<p>أنت ممتاز 👑</p>"}
    </div>`;
}

/* ===== Retry Wrong ===== */
function retry(){
  // نبدأ امتحان جديد بالأسئلة الغلط فقط
  questions = [...wrongSet];

  answers = [];
  wrongSet = [];
  i = 0;
  correct = 0;
  wrong = 0;

  // رجوع لشكل الامتحان
  document.body.classList.remove("after");
  document.body.classList.add("exam");

  show();
}

show();
</script>

</body>
</html>
